apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cninodemigrations.network.deckhouse.io
spec:
  group: network.deckhouse.io
  scope: Cluster
  names:
    plural: cninodemigrations
    singular: cninodemigration
    kind: CNINodeMigration
    shortNames:
    - cninmig
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: |
            Defines the configuration for CNI migration on a specific node.
          properties:
            spec:
              type: object
              description: |
                Defines the desired state of CNI migration on a node.
              properties:
                nodeName:
                  type: string
                  description: |
                    The name of the node to migrate.
            status:
              type: object
              description: |
                Defines the observed state of CNI migration on a node.
              properties:
                phase:
                  type: string
                  description: |
                    The current phase of the migration on the node.
                message:
                  type: string
                  description: |
                    A detailed message about the migration status on the node.
