spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            Представляет версию пакета приложения.
          properties:
            spec:
              properties:
                packageName:
                  description: |
                    Название пакета приложения.
                packageRepositoryName:
                  description: |
                    Название репозитория пакетов, содержащего данный пакет.
                packageVersion:
                  description: |
                    Версия пакета приложения.
            status:
              description: |
                Статус ресурса.
              properties:
                conditions:
                  description: |
                    Условия представляют последние доступные наблюдения за состоянием версии пакета.
                  items:
                    properties:
                      lastTransitionTime:
                        description: |
                          Последнее время перехода условия из одного статуса в другой.
                      message:
                        description: |
                          Человеко-читаемое сообщение, указывающее детали последнего перехода.
                      observedGeneration:
                        description: |
                          Значение .metadata.generation, на основании которого было установлено условие.
                      reason:
                        description: |
                          Машино-читаемый текст в UpperCamelCase, указывающий причину последнего перехода условия.
                      status:
                        description: |
                          Статус условия.
                          Может быть True, False, Unknown.
                      type:
                        description: |
                          Тип условия.
                packageMetadata:
                  description: |
                    Метаданные о пакете, такие как описание, требования и т.д.
                  properties:
                    category:
                      description: |
                        Категория, к которой принадлежит этот пакет.
                    changelog:
                      description: |
                        Информация об изменениях в этой версии.
                      properties:
                        features:
                          description: |
                            Список новых функций в этой версии.
                        fixes:
                          description: |
                            Список исправлений ошибок в этой версии.
                    description:
                      description: |
                        Локализованные описания пакета.
                      properties:
                        en:
                          description: |
                            Английское описание пакета.
                        ru:
                          description: |
                            Русское описание пакета.
                    licensing:
                      description: |
                        Информация о лицензировании для разных редакций.
                      properties:
                        editions:
                          description: |
                            Информация о лицензировании для разных редакций пакета.
                          additionalProperties:
                            properties:
                              available:
                                description: |
                                  Доступна ли эта редакция для использования.
                    requirements:
                      description: |
                        Системные требования для этого пакета.
                      properties:
                        deckhouse:
                          description: |
                            Требуемая версия Deckhouse.
                          properties:
                            constraint:
                              description: |
                                Выражение semver-диапазона (например, `">= 1.26"`).
                        kubernetes:
                          description: |
                            Требуемая версия Kubernetes.
                          properties:
                            constraint:
                              description: |
                                Выражение semver-диапазона (например, `">= 1.26"`).
                        modules:
                          description: |
                            Зависимости от модулей, сгруппированные по семантике проверки.
                          properties:
                            anyOf:
                              description: |
                                Группы «удовлетворить хотя бы одному»: группа считается пройденной, если установлен и удовлетворяет ограничению версии хотя бы один из её модулей.
                              items:
                                properties:
                                  description:
                                    description: |
                                      Человеко-читаемое описание группы. Необязательная документация; планировщик его не использует. Сохраняется для UI и пользовательских сообщений о статусе.
                                  modules:
                                    description: |
                                      Модули в составе группы; хотя бы один из них должен быть установлен и удовлетворять ограничению версии.
                                    items:
                                      properties:
                                        constraint:
                                          description: |
                                            Выражение semver-диапазона, которому должен удовлетворять модуль. Пустое значение означает любую версию.
                                        name:
                                          description: |
                                            Название модуля.
                                  name:
                                    description: |
                                      Идентификатор группы. Отображается в сообщениях об ошибках планировщика, чтобы операторы могли определить, какая именно anyOf-группа не прошла проверку.
                            conditional:
                              description: |
                                Модули, проверяемые только если они установлены; отсутствующие модули молча пропускаются.
                              items:
                                properties:
                                  constraint:
                                    description: |
                                      Выражение semver-диапазона, которому должен удовлетворять модуль. Пустое значение означает любую версию.
                                  name:
                                    description: |
                                      Название модуля.
                            mandatory:
                              description: |
                                Модули, которые обязательно должны быть установлены и удовлетворять ограничению версии; иначе пакет не запустится.
                              items:
                                properties:
                                  constraint:
                                    description: |
                                      Выражение semver-диапазона, которому должен удовлетворять модуль. Пустое значение означает любую версию.
                                  name:
                                    description: |
                                      Название модуля.
                    stage:
                      description: |
                        Стадия разработки пакета (например, alpha, beta, stable).
                    subscribe:
                      description: |
                        Реактивные привязки: группы API, за которыми пакет хочет наблюдать, и пути к значениям другого пакета, изменение которых должно инициировать повторный запуск.
                      properties:
                        apis:
                          description: |
                            Группы API Kubernetes, за которыми ведётся наблюдение.
                        values:
                          description: |
                            Пути к значениям в других пакетах, изменение которых инициирует повторный запуск.
                          items:
                            description: |
                              Идентифицирует путь к значениям в другом пакете, изменение которых должно вызывать повторный запуск подписавшегося пакета.
                            properties:
                              module:
                                description: |
                                  Название целевого пакета.
                              path:
                                description: |
                                  Путь (с разделителями «точка») внутри документа значений целевого пакета.
                    versionCompatibilityRules:
                      description: |
                        Правила совместимости версий для обновлений и откатов.
                      properties:
                        downgrade:
                          description: |
                            Правила совместимости для отката с этой версии.
                          properties:
                            allowSkipMajor:
                              description: |
                                Сколько основных версий можно пропустить.
                            allowSkipMinor:
                              description: |
                                Сколько второстепенных версий можно пропустить.
                            allowSkipPatches:
                              description: |
                                Сколько патч-версий можно пропустить.
                            from:
                              description: |
                                Начальный диапазон версий для совместимости.
                            maxRollback:
                              description: |
                                Максимальное количество версий, которые можно откатить.
                            to:
                              description: |
                                Конечный диапазон версий для совместимости.
                        upgrade:
                          description: |
                            Правила совместимости для обновления до этой версии.
                          properties:
                            allowSkipMajor:
                              description: |
                                Сколько основных версий можно пропустить.
                            allowSkipMinor:
                              description: |
                                Сколько второстепенных версий можно пропустить.
                            allowSkipPatches:
                              description: |
                                Сколько патч-версий можно пропустить.
                            from:
                              description: |
                                Начальный диапазон версий для совместимости.
                            maxRollback:
                              description: |
                                Максимальное количество версий, которые можно откатить.
                            to:
                              description: |
                                Конечный диапазон версий для совместимости.
                packageSchemas:
                  description: |
                    Схемы OpenAPI для валидации настроек и значений, передаваемых пакету.
                  properties:
                    settingsSchema:
                      description: |
                        Схема OpenAPI v3, используемая для валидации пользовательских настроек пакета (`Application.spec.settings`).
                        Содержимое хранится как непрозрачный объект, поскольку представляет собой рекурсивную JSON-схему; её валидация выполняется контроллером при загрузке метаданных пакета.
                    valuesSchema:
                      description: |
                        Схема OpenAPI v3, используемая для валидации итоговых значений (значения по умолчанию, объединённые с пользовательскими настройками), передаваемых в хуки и чарты пакета.
                        Содержимое хранится как непрозрачный объект, поскольку представляет собой рекурсивную JSON-схему; её валидация выполняется контроллером при загрузке метаданных пакета.
                usedBy:
                  description: |
                    Информация о приложениях, которые используют эту версию пакета.
                  items:
                    properties:
                      name:
                        description: |
                          Название экземпляра приложения.
                      namespace:
                        description: |
                          Пространство имён, где установлено приложение.
                usedByCount:
                  description: |
                    Количество приложений, использующих эту версию пакета.
