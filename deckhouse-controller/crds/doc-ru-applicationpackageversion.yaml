spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            Представляет версию пакета приложения.
          properties:
            apiVersion:
              description: |-
                Определяет версионированную схему этого представления объекта. Серверы должны преобразовывать распознанные схемы в последнее внутреннее значение и могут отклонять нераспознанные значения.

                Больше информации [в документации](https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources).
            kind:
              description: |-
                Значение, представляющее REST-ресурс, который описывает данный объект. Серверы могут определить его из конечной точки, к которой клиент отправляет запросы. Не может быть изменено. Используется в CamelCase.

                Больше информации [в документации](https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds).
            spec:
              description: |
                Определяет параметры версии пакета приложения.
              properties:
                packageName:
                  description: |
                    Название пакета приложения.
                packageRepositoryName:
                  description: |
                    Название репозитория пакетов, содержащего данный пакет.
                packageVersion:
                  description: |
                    Версия пакета приложения.
            status:
              description: |
                Статус версии пакета приложения.
              properties:
                conditions:
                  description: |
                    Условия, отражающие последние наблюдения за состоянием версии пакета.
                  items:
                    description: |
                      Условие, описывающее один аспект текущего состояния версии пакета.
                    properties:
                      lastTransitionTime:
                        description: |
                          Последнее время перехода условия из одного статуса в другой.
                      message:
                        description: |
                          Сообщение с деталями перехода. Может быть пустым.
                      observedGeneration:
                        description: |
                          Значение `.metadata.generation`, на котором было установлено условие.
                          Позволяет определить актуальность условия для текущего состояния ресурса.
                      reason:
                        description: |
                          Программный идентификатор причины последнего перехода условия.
                      status:
                        description: |
                          Статус условия. Может быть `True`, `False` или `Unknown`.
                      type:
                        description: |
                          Тип условия версии пакета в CamelCase или в формате `foo.example.com/CamelCase`.
                packageMetadata:
                  description: |
                    Метаданные о пакете, такие как описание, требования и т.д.
                  properties:
                    category:
                      description: |
                        Категория, к которой принадлежит этот пакет.
                    changelog:
                      description: |
                        Информация об изменениях в этой версии.
                      properties:
                        features:
                          description: |
                            Список новых функций в этой версии.
                        fixes:
                          description: |
                            Список исправлений ошибок в этой версии.
                    description:
                      description: |
                        Локализованные описания пакета.
                      properties:
                        en:
                          description: |
                            Английское описание пакета.
                        ru:
                          description: |
                            Русское описание пакета.
                    licensing:
                      description: |
                        Информация о лицензировании для разных редакций.
                      properties:
                        editions:
                          description: |
                            Информация о лицензировании для разных редакций пакета.
                          additionalProperties:
                            properties:
                              available:
                                description: |
                                  Доступна ли эта редакция для использования.
                    requirements:
                      description: |
                        Системные требования для этого пакета.
                      properties:
                        deckhouse:
                          description: |
                            Требуемая версия Deckhouse.
                          properties:
                            constraint:
                              description: |
                                Выражение semver-ограничения.
                        kubernetes:
                          description: |
                            Требуемая версия Kubernetes.
                          properties:
                            constraint:
                              description: |
                                Выражение semver-ограничения.
                        modules:
                          description: |
                            Требуемые модули, разделённые на обязательные, условные, группы альтернатив и группы запрещённых модулей.
                          properties:
                            mandatory:
                              description: |
                                Обязательные зависимости — модуль должен быть установлен (и удовлетворять ограничению версии, если оно задано), чтобы пакет мог запуститься.
                              items:
                                description: |
                                  Именованная зависимость модуля с опциональным semver-ограничением. Пустое ограничение означает «любая версия».
                                properties:
                                  name:
                                    description: |
                                      Имя модуля.
                                  constraint:
                                    description: |
                                      Выражение semver-ограничения.
                            conditional:
                              description: |
                                Условные зависимости — модуль не обязан быть установлен, но если он установлен, его версия должна удовлетворять ограничению, чтобы пакет работал корректно. Заменяет устаревший суффикс `!optional` из формата требований v1.
                              items:
                                description: |
                                  Именованная зависимость модуля с опциональным semver-ограничением. Пустое ограничение означает «любая версия».
                                properties:
                                  name:
                                    description: |
                                      Имя модуля.
                                  constraint:
                                    description: |
                                      Выражение semver-ограничения.
                            anyOf:
                              description: |
                                Группы альтернативных зависимостей — хотя бы один модуль из каждой группы должен быть установлен (и удовлетворять ограничению, если оно задано), чтобы пакет мог запуститься. Группы не добавляют рёбер в граф зависимостей.
                              items:
                                description: |
                                  Группа альтернативных зависимостей. Хотя бы один из перечисленных модулей должен быть установлен.
                                properties:
                                  name:
                                    description: |
                                      Стабильный идентификатор группы, используемый в диагностических сообщениях планировщика.
                                  description:
                                    description: |
                                      Человеко-читаемое описание назначения группы.
                                  modules:
                                    description: |
                                      Альтернативные зависимости в группе.
                                    items:
                                      description: |
                                        Именованная зависимость модуля с опциональным semver-ограничением. Пустое ограничение означает «любая версия».
                                      properties:
                                        name:
                                          description: |
                                            Имя модуля.
                                        constraint:
                                          description: |
                                            Выражение semver-ограничения.
                            noneOf:
                              description: |
                                Группы запрещённых зависимостей — ни один модуль из каждой группы не должен быть установлен, чтобы пакет мог запуститься. Член без ограничения запрещён в любой версии; член с ограничением запрещён только в версиях, удовлетворяющих ограничению. Группы не добавляют рёбер в граф зависимостей.
                              items:
                                description: |
                                  Группа запрещённых зависимостей. Ни один из перечисленных модулей не должен быть установлен.
                                properties:
                                  name:
                                    description: |
                                      Стабильный идентификатор группы, используемый в диагностических сообщениях планировщика.
                                  description:
                                    description: |
                                      Человеко-читаемое описание назначения группы.
                                  modules:
                                    description: |
                                      Запрещённые зависимости в группе.
                                    items:
                                      description: |
                                        Именованная зависимость модуля с опциональным semver-ограничением. Пустое ограничение означает «модуль запрещён в любой версии».
                                      properties:
                                        name:
                                          description: |
                                            Имя модуля.
                                        constraint:
                                          description: |
                                            Выражение semver-ограничения для запрещённого диапазона версий.
                    stage:
                      description: |
                        Стадия разработки пакета (например, alpha, beta, stable).
                    versionCompatibilityRules:
                      description: |
                        Правила совместимости версий для обновлений и откатов.
                      properties:
                        downgrade:
                          description: |
                            Правила совместимости для отката с этой версии.
                          properties:
                            allowSkipMajor:
                              description: |
                                Сколько основных версий можно пропустить.
                            allowSkipMinor:
                              description: |
                                Сколько второстепенных версий можно пропустить.
                            allowSkipPatches:
                              description: |
                                Сколько патч-версий можно пропустить.
                            from:
                              description: |
                                Начальный диапазон версий для совместимости.
                            maxRollback:
                              description: |
                                Максимальное количество версий, которые можно откатить.
                            to:
                              description: |
                                Конечный диапазон версий для совместимости.
                        upgrade:
                          description: |
                            Правила совместимости для обновления до этой версии.
                          properties:
                            allowSkipMajor:
                              description: |
                                Сколько основных версий можно пропустить.
                            allowSkipMinor:
                              description: |
                                Сколько второстепенных версий можно пропустить.
                            allowSkipPatches:
                              description: |
                                Сколько патч-версий можно пропустить.
                            from:
                              description: |
                                Начальный диапазон версий для совместимости.
                            maxRollback:
                              description: |
                                Максимальное количество версий, которые можно откатить.
                            to:
                              description: |
                                Конечный диапазон версий для совместимости.
                packageSchemas:
                  description: |
                    Схемы OpenAPI для валидации настроек и значений, передаваемых пакету.
                  properties:
                    settingsSchema:
                      description: |
                        Схема OpenAPI v3, используемая для валидации пользовательских настроек пакета (`Application.spec.settings`).
                        Содержимое хранится как непрозрачный объект, поскольку представляет собой рекурсивную JSON-схему; её валидация выполняется контроллером при загрузке метаданных пакета.
                    valuesSchema:
                      description: |
                        Схема OpenAPI v3, используемая для валидации итоговых значений (значения по умолчанию, объединённые с пользовательскими настройками), передаваемых в хуки и чарты пакета.
                        Содержимое хранится как непрозрачный объект, поскольку представляет собой рекурсивную JSON-схему; её валидация выполняется контроллером при загрузке метаданных пакета.
                usedBy:
                  description: |
                    Информация о приложениях, которые используют эту версию пакета.
                  items:
                    properties:
                      name:
                        description: |
                          Название экземпляра приложения.
                      namespace:
                        description: |
                          Пространство имён, где установлено приложение.
                usedByCount:
                  description: |
                    Количество приложений, использующих эту версию пакета.
