spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            PackageRepository является источником пакетов для Deckhouse Kubernetes Platform.
          properties:
            apiVersion:
              description: |-
                Определяет версионированную схему этого представления объекта. Серверы должны преобразовывать распознанные схемы в последнее внутреннее значение и могут отклонять нераспознанные значения.

                Больше информации [в документации Kubernetes](https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources).
            kind:
              description: |-
                Значение представляет REST-ресурс, который описывает данный объект. Серверы могут определить его из конечной точки, к которой клиент отправляет запросы. Не может быть изменено. Используется в CamelCase.

                Больше информации [в документации Kubernetes](https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds).
            spec:
              description: |
                Определяет конфигурацию репозитория пакетов.
              properties:
                registry:
                  description: |
                    Конфигурация для доступа к хранилищу образов контейнеров с пакетами.
                  properties:
                    ca:
                      description: |
                        Корневой сертификат (в формате PEM), которым можно проверить сертификат хранилища образов контейнеров
                        при работе по HTTPS (если хранилище образов контейнеров использует самоподписанные SSL-сертификаты).
                    dockerCfg:
                      description: |
                        Строка с токеном доступа к хранилищу образов контейнеров в Base64 (формат `~/.docker/config.json`).
                        В случае анонимного доступа к хранилищу образов контейнеров не заполняйте это поле.
                    login:
                      description: |
                        Имя пользователя для аутентификации в хранилище образов контейнеров.
                    password:
                      description: |
                        Пароль для аутентификации в хранилище образов контейнеров.
                    repo:
                      description: |
                        Адрес репозитория пакетов в хранилище образов контейнеров.
                    scheme:
                      description: |
                        Протокол для доступа к репозиторию (например, `https`).
                scanInterval:
                  description: |
                    Интервал сканирования хранилища образов контейнеров.

                    Определяет частоту проверки хранилища образов контейнеров на наличие новых пакетов.
            status:
              description: |
                Статус репозитория пакетов.
              properties:
                conditions:
                  description: |
                    Условия, отражающие последние наблюдения за состоянием репозитория.
                  items:
                    description: |
                      Условие, описывающее один аспект текущего состояния репозитория.
                    properties:
                      lastTransitionTime:
                        description: |
                          Время последнего перехода условия из одного статуса в другой.
                      message:
                        description: |
                          Сообщение с деталями перехода. Может быть пустым.
                      observedGeneration:
                        description: |
                          Значение `.metadata.generation`, на котором было установлено условие.
                          Позволяет определить актуальность условия для текущего состояния ресурса.
                      reason:
                        description: |
                          Программный идентификатор причины последнего перехода условия.
                      status:
                        description: |
                          Статус условия. Может быть `True`, `False` или `Unknown`.
                      type:
                        description: |
                          Тип условия репозитория в CamelCase или в формате `foo.example.com/CamelCase`.
                message:
                  description: |
                    Человеко-читаемое сообщение о статусе репозитория.
                packages:
                  description: |
                    Список пакетов, доступных в этом репозитории.
                  items:
                    properties:
                      name:
                        description: |
                          Название пакета.
                      type:
                        description: |
                          Тип пакета.
                packagesCount:
                  description: |
                    Общее количество пакетов в этом репозитории.
                partialScanAvailable:
                  description: |
                    Указывает, поддерживает ли хранилище образов контейнеров пагинацию при получении списка тегов.
                phase:
                  description: |
                    Текущая фаза репозитория.
                lastChangeTime:
                  description: |
                    Время последнего сканирования, нашедшего хотя бы одну новую версию.
                    Сканирования, не нашедшие нового, это значение не обновляют.
                lastNewVersions:
                  description: |
                    Количество новых версий, найденных последним сканированием.
                    Равно нулю, если последнее сканирование не нашло ничего нового.
                lastScanTime:
                  description: |
                    Время последнего сканирования с любым результатом.
