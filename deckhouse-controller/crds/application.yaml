---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: applications.deckhouse.io
spec:
  group: deckhouse.io
  names:
    kind: Application
    listKind: ApplicationList
    plural: applications
    shortNames:
    - app
    singular: application
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.packageName
      name: Package
      type: string
    - jsonPath: .spec.packageVersion
      name: Version
      type: string
    - jsonPath: .spec.packageRepositoryName
      name: Repository
      priority: 1
      type: string
    - jsonPath: .status.summary.state
      name: State
      type: string
    - jsonPath: .status.conditions[?(@.type=='Installed')].status
      name: Installed
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      priority: 1
      type: string
    - jsonPath: .status.summary.message
      name: Message
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Application represents a namespace-scoped application instance.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info [in the Kubernetes documentation](https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources).
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info [in the Kubernetes documentation](https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds).
            type: string
          metadata:
            type: object
          spec:
            description: Defines the application configuration.
            properties:
              packageName:
                description: Name of the application package to install.
                type: string
                x-doc-examples:
                - console
              packageRepositoryName:
                description: |-
                  Name of the repository where the package is located.
                  If not specified, the default repository is used.
                type: string
                x-doc-examples:
                - deckhouse
              packageVersion:
                description: Version of the application package to install.
                type: string
                x-doc-examples:
                - v1.0.0
              releaseChannel:
                description: Release channel for the application package.
                type: string
                x-doc-examples:
                - stable
              settings:
                description: Configuration settings for the application.
                type: object
                x-kubernetes-preserve-unknown-fields: true
            required:
            - packageName
            - packageVersion
            type: object
          status:
            description: Application status.
            properties:
              conditions:
                description: Conditions reflecting the latest observations of the
                  application state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentVersion:
                description: Information about the currently installed version.
                properties:
                  channel:
                    description: Release channel from which the version was installed.
                    type: string
                  version:
                    description: Semantic version of the installed application.
                    type: string
                type: object
              lastAppliedConfiguration:
                description: |-
                  LastAppliedConfiguration is the effective settings (user configuration merged
                  with config-schema defaults) that drove the most recent successful apply.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              summary:
                description: |-
                  Summary aggregates the high-level user-facing state, message and
                  resolution hint for the application. The controller always populates it
                  on reconcile — every application maps to exactly one lifecycle state — so
                  it is the single source of truth for the UI; clients should not re-derive
                  these values from the conditions. The pointer leaves it absent only
                  before the first status computation.
                properties:
                  message:
                    description: Message is a human-readable description of the current
                      state.
                    type: string
                  state:
                    description: |-
                      State is the high-level lifecycle state observed for the application.
                      Always one of: Pending, Failed, Updating, Ready, Degraded, Suspended.
                    type: string
                  tip:
                    description: |-
                      Tip is a human-readable instruction on how to resolve the current
                      state. Empty when no action is required.
                    type: string
                type: object
              tracking:
                description: Nelm tracking.
                type: object
                x-kubernetes-preserve-unknown-fields: true
            type: object
        required:
        - spec
        type: object
        x-doc-examples:
        - apiVersion: deckhouse.io/v1alpha1
          kind: Application
          metadata:
            name: example
          spec:
            packageName: console
            packageRepositoryName: deckhouse
            packageVersion: v1.0.0
            releaseChannel: stable
    served: true
    storage: true
    subresources:
      status: {}
