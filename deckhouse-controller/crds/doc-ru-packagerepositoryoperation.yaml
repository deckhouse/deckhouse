spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            PackageRepositoryOperation представляет операцию по сканированию/обновлению репозитория пакетов.
          properties:
            spec:
              description: |
                Spec определяет поведение ресурса.
              properties:
                packageRepositoryName:
                  description: |
                    Название репозитория пакетов для выполнения операции.
                type:
                  description: |
                    Тип выполняемой операции.
                update:
                  description: |
                    Конфигурация для операций обновления.
                  properties:
                    fullScan:
                      description: |
                        Выполнять ли полное сканирование репозитория.
                    timeout:
                      description: |
                        Таймаут для операции.
            status:
              description: |
                Статус ресурса.
              properties:
                completionTime:
                  description: |
                    Время завершения операции.
                conditions:
                  description: |
                    Условия, отражающие последние наблюдения за состоянием операции.
                    Фаза операции определяется по условию `Completed`: пока оно имеет статус `False`,
                    операция находится в одной из промежуточных фаз (`Discover`, `Processing`);
                    при статусе `True` операция завершена с причиной `Succeeded` или `Failed`.
                  items:
                    properties:
                      lastTransitionTime:
                        description: |
                          Время последнего перехода условия из одного статуса в другой.
                      message:
                        description: |
                          Человекочитаемое сообщение с деталями перехода.
                      observedGeneration:
                        description: |
                          Значение `.metadata.generation`, на котором было установлено условие.
                          Позволяет определить, что условие актуально для текущего состояния ресурса.
                      reason:
                        description: |
                          Программный идентификатор причины последнего перехода условия.
                          Для условия `Completed` используются значения: `Discover`, `Processing`,
                          `Succeeded`, `Failed`.
                      status:
                        description: |
                          Статус условия, одно из: `True`, `False`, `Unknown`.
                      type:
                        description: |
                          Тип условия. Для данного ресурса используется условие `Completed`,
                          которое отражает, достигнута ли терминальная фаза операции.
                packages:
                  description: |
                    Информация о пакетах, обработанных во время операции.
                  properties:
                    discovered:
                      description: |
                        Список пакетов, обнаруженных во время операции.
                      items:
                        properties:
                          name:
                            description: |
                              Название обнаруженного пакета.
                    failed:
                      description: |
                        Список пакетов, обработка которых не удалась.
                      items:
                        properties:
                          errors:
                            description: |
                              Список ошибок, возникших при обработке этого пакета.
                            items:
                              properties:
                                message:
                                  description: |
                                    Сообщение об ошибке.
                                version:
                                  description: |
                                    Версия пакета, при обработке которой возникла ошибка.
                          name:
                            description: |
                              Название пакета, обработка которого не удалась.
                    processed:
                      description: |
                        Список успешно обработанных пакетов.
                      items:
                        properties:
                          name:
                            description: |
                              Название обработанного пакета.
                          type:
                            description: |
                              Тип пакета.
                          foundVersions:
                            description: |
                              Количество версий, найденных в рамках данной операции.
                    processedOverall:
                      description: |
                        Общее количество обработанных пакетов.
                    total:
                      description: |
                        Общее количество найденных пакетов.
                startTime:
                  description: |
                    Время начала операции.
