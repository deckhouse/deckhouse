spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            PackageRepositoryOperation представляет операцию по сканированию/обновлению репозитория пакетов.
          properties:
            apiVersion:
              description: |-
                Определяет версионированную схему этого представления объекта. Серверы должны преобразовывать распознанные схемы в последнее внутреннее значение и могут отклонять нераспознанные значения.

                Больше информации [в документации](https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources).
            kind:
              description: |-
                Значение, представляющее REST-ресурс, который описывает данный объект. Серверы могут определить его из конечной точки, к которой клиент отправляет запросы. Не может быть изменено. Используется в CamelCase.

                Больше информации [в документации](https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds).
            spec:
              description: |
                Определяет параметры операции над репозиторием пакетов.
              properties:
                packageRepositoryName:
                  description: |
                    Название репозитория пакетов для выполнения операции.
                type:
                  description: |
                    Тип выполняемой операции.
                update:
                  description: |
                    Конфигурация для операций обновления.
                  properties:
                    fullScan:
                      description: |
                        Выполнять ли полное сканирование репозитория.
                    timeout:
                      description: |
                        Таймаут для операции.
            status:
              description: |
                Статус операции над репозиторием пакетов.
              properties:
                completionTime:
                  description: |
                    Время завершения операции.
                conditions:
                  description: |
                    Условия, отражающие последние наблюдения за состоянием операции.
                    Фаза операции определяется по условию `Completed`: пока оно имеет статус `False`,
                    операция находится в одной из промежуточных фаз (`Discover`, `Processing`);
                    при статусе `True` операция завершена с причиной `Succeeded` или `Failed`.
                  items:
                    description: |
                      Условие, описывающее один аспект текущего состояния операции.
                    properties:
                      lastTransitionTime:
                        description: |
                          Время последнего перехода условия из одного статуса в другой.
                      message:
                        description: |
                          Сообщение с деталями перехода.
                      observedGeneration:
                        description: |
                          Значение `.metadata.generation`, на котором было установлено условие.
                          Позволяет определить актуальность условия для текущего состояния ресурса.
                      reason:
                        description: |
                          Программный идентификатор причины последнего перехода условия.
                          Для условия `Completed` используются значения: `Discover`, `Processing`,
                          `Succeeded`, `Failed`.
                      status:
                        description: |
                          Статус условия. Может быть `True`, `False` или `Unknown`.
                      type:
                        description: |
                          Тип условия. Для данного ресурса используется условие `Completed`,
                          которое отражает, достигнута ли терминальная фаза операции.
                packages:
                  description: |
                    Информация о пакетах, обработанных во время операции.
                  properties:
                    discovered:
                      description: |
                        Список пакетов, обнаруженных во время операции.
                      items:
                        properties:
                          name:
                            description: |
                              Название обнаруженного пакета.
                    failed:
                      description: |
                        Список пакетов, обработка которых не удалась.
                      items:
                        properties:
                          errors:
                            description: |
                              Список ошибок, возникших при обработке этого пакета.
                            items:
                              properties:
                                message:
                                  description: |
                                    Сообщение об ошибке.
                                version:
                                  description: |
                                    Версия пакета, при обработке которой возникла ошибка.
                          name:
                            description: |
                              Название пакета, обработка которого не удалась.
                    processed:
                      description: |
                        Список успешно обработанных пакетов.
                      items:
                        properties:
                          name:
                            description: |
                              Название обработанного пакета.
                          type:
                            description: |
                              Тип пакета.
                          foundVersions:
                            description: |
                              Количество версий, найденных в рамках данной операции.
                          newVersions:
                            description: |
                              Количество новых версий в рамках данной операции.
                              
                              Версия считается новой, если её `ApplicationPackageVersion`
                              или `ModulePackageVersion` отсутствовал в кластере, либо (только
                              для `ApplicationPackageVersion`) имел пометку «нет в реестре» и
                              его образ был найден в реестре в рамках этой операции.
                    processedOverall:
                      description: |
                        Общее количество обработанных пакетов.
                    total:
                      description: |
                        Общее количество найденных пакетов.
                    newVersionsOverall:
                      description: |
                        Общее количество новых версий по всем пакетам в рамках операции.
                        
                        Версия считается новой, если её `ApplicationPackageVersion`
                        или `ModulePackageVersion` отсутствовал в кластере, либо (только
                        для `ApplicationPackageVersion`) имел пометку «нет в реестре» и его
                        образ был найден в реестре в рамках этой операции.
                startTime:
                  description: |
                    Время начала операции.
