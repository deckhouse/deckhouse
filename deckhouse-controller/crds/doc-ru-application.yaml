spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            Представляет экземпляр приложения в пространстве имён.
          properties:
            apiVersion:
              description: |-
                Определяет версионированную схему этого представления объекта. Серверы должны преобразовывать распознанные схемы в последнее внутреннее значение и могут отклонять нераспознанные значения.

                Больше информации [в документации](https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources).
            kind:
              description: |-
                Значение, представляющее REST-ресурс, который описывает данный объект. Серверы могут определить его из конечной точки, к которой клиент отправляет запросы. Не может быть изменено. Используется в CamelCase.

                Больше информации [в документации](https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds).
            spec:
              description: |
                Определяет конфигурацию приложения.
              properties:
                packageName:
                  description: |
                    Название пакета приложения для установки.
                packageRepositoryName:
                  description: |
                    Название репозитория, где находится пакет.
                    Если не указано, используется репозиторий по умолчанию.
                packageVersion:
                  description: |
                    Версия пакета приложения для установки.
                releaseChannel:
                  description: |
                    Канал релиза для пакета приложения.
                settings:
                  description: |
                    Настройки конфигурации для приложения.
            status:
              description: |
                Статус приложения.
              properties:
                tracking:
                  description: |
                    Отображение Nelm-трекинга.
                lastAppliedConfiguration:
                  description: |
                    Конфигурация (пользовательские настройки с учётом значений по умолчанию
                    из схемы конфигурации), на основе которой было выполнено последнее успешное применение.
                summary:
                  description: |
                    Агрегированная сводка состояния приложения, выведенная из conditions.
                    Является единым источником истины для UI: клиентам не нужно
                    повторно вычислять эти значения.
                  properties:
                    state:
                      description: |
                        Высокоуровневое состояние жизненного цикла приложения.
                        Одно из: Pending, Failed, Updating. Пустое значение, если приложение работает
                        нормально и нет ничего, что требует внимания.
                    message:
                      description: |
                        Человеко-читаемое описание текущего состояния.
                    tip:
                      description: |
                        Человеко-читаемая инструкция о том, как разрешить текущее состояние.
                        Пустое значение, если действий не требуется.
                conditions:
                  description: |
                    Условия, отражающие последние наблюдения за состоянием приложения.
                  items:
                    description: |
                      Условие, описывающее один аспект текущего состояния приложения.
                    properties:
                      lastTransitionTime:
                        description: |
                          Последнее время перехода условия из одного статуса в другой.
                      message:
                        description: |
                          Человеко-читаемое сообщение, указывающее детали перехода.
                      observedGeneration:
                        description: |
                          Значение `.metadata.generation`, на котором было установлено условие.
                          Позволяет определить актуальность условия для текущего состояния ресурса.
                      reason:
                        description: |
                          Программный идентификатор причины последнего перехода условия.
                      status:
                        description: |
                          Статус условия. Может быть `True`, `False` или `Unknown`.
                      type:
                        description: |
                          Тип условия приложения в CamelCase или в формате `foo.example.com/CamelCase`.
                currentVersion:
                  description: |
                    Информация о текущей установленной версии.
                  properties:
                    channel:
                      description: |
                        Канал релиза, из которого была установлена версия.
                    version:
                      description: |
                        Семантическая версия установленного приложения.
