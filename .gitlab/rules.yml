# Pipeline creation rules.
# Pipeline runs only for: tags, main, merge requests, release-x.xx branches.
workflow:
  rules:
    # 1) Tag creation
    - if: $CI_COMMIT_TAG
    # 2) Push to main
    - if: $CI_COMMIT_BRANCH == "main"
    # 3) Merge request
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # 4) Push to release-x.xx (e.g. release-1.76)
    - if: $CI_COMMIT_BRANCH =~ /^release-\d+\.\d+$/
    # 5) Sheduled pipelines
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Fallback: block all other pipeline sources by default
    - when: never

# Reusable job-level rules (use via: extends: .rules:...)

.rules:on_tag:
  rules:
    - if: $CI_COMMIT_TAG

.rules:on_main:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

.rules:on_merge_request:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.rules:on_release_branch:
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^release-\d+\.\d+$/
