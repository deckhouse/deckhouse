{{- define "vsphere_cdd_pod_annotations" -}}
checksum/config: {{ include (print $.Template.BasePath "/cloud-data-discoverer/secret.yaml") . | sha256sum }}
{{- end -}}

{{- define "vsphere_cdd_envs" -}}
- name: GOVMOMI_HOST
  valueFrom:
    secretKeyRef:
      name: cloud-data-discoverer
      key: server
- name: GOVMOMI_USERNAME
  valueFrom:
    secretKeyRef:
      name: cloud-data-discoverer
      key: username
- name: GOVMOMI_PASSWORD
  valueFrom:
    secretKeyRef:
      name: cloud-data-discoverer
      key: password
- name: GOVMOMI_INSECURE
  valueFrom:
    secretKeyRef:
      name: cloud-data-discoverer
      key: insecure
- name: REGION
  valueFrom:
    secretKeyRef:
      name: cloud-data-discoverer
      key: region
- name: ZONES
  valueFrom:
    secretKeyRef:
      name: cloud-data-discoverer
      key: zones
- name: REGION_TAG_CATEGORY
  valueFrom:
    secretKeyRef:
      name: cloud-data-discoverer
      key: regionTagCategory
- name: ZONE_TAG_CATEGORY
  valueFrom:
    secretKeyRef:
      name: cloud-data-discoverer
      key: zoneTagCategory
- name: CLUSTER_UUID
  value: {{ .Values.global.discovery.clusterUUID | quote }}
- name: CSI_COMPATIBILITY_FLAG
  value: {{ .Values.cloudProviderVsphere.internal.compatibilityFlag | quote }}
- name: VM_FOLDER_PATH
  valueFrom:
    secretKeyRef:
      name: cloud-data-discoverer
      key: vmFolderPath
{{- end -}}

{{- $cddConfig := dict -}}
{{- $_ := set $cddConfig "fullname" "cloud-data-discoverer" -}}
{{- $_ := set $cddConfig "image" (include "helm_lib_module_image" (list . "cloudDataDiscoverer")) -}}
{{- $_ := set $cddConfig "additionalEnv" (include "vsphere_cdd_envs" . | fromYamlArray) -}}
{{- $_ := set $cddConfig "additionalPodAnnotations" (include "vsphere_cdd_pod_annotations" . | fromYaml) -}}
{{- $_ := set $cddConfig "vpaEnabled" true -}}

{{- include "helm_lib_cloud_data_discoverer_manifests" (list . $cddConfig) }}
