{{- define "vsphere_ccm_args" -}}
- --leader-elect=true
- --cloud-config=/etc/cloud-controller-manager-config/cloud-config
- --cloud-provider=vsphere
- --bind-address=127.0.0.1
- --secure-port=10471
- --v=4
{{- end -}}

{{- define "vsphere_ccm_pdb_annotations" -}}
checksum/config: {{ include (print $.Template.BasePath "/cloud-controller-manager/secret.yaml") . | sha256sum }}
{{- end -}}

{{- define "vsphere_ccm_pod_annotations" -}}
checksum/config: {{ include (print $.Template.BasePath "/cloud-controller-manager/secret.yaml") . | sha256sum }}
{{- end -}}

{{- define "vsphere_ccm_envs" -}}
- name: SKIP_NODE_DELETION
  value: "1"
{{- if .Values.cloudProviderVsphere.internal.providerClusterConfiguration.nsxt }}
- name: ENABLE_ALPHA_NSXT_LB
  value: "1"
{{- end }}
{{- end -}}

{{- define "vsphere_ccm_volume_mounts" -}}
- mountPath: /etc/kubernetes/pki
  name: k8s-certs
  readOnly: true
- mountPath: /etc/cloud-controller-manager-config
  name: config
  readOnly: true
- mountPath: /tmp
  name: tmp
{{- end -}}

{{- define "vsphere_ccm_volumes" -}}
- hostPath:
    path: /etc/kubernetes/pki
    type: DirectoryOrCreate
  name: k8s-certs
- name: config
  secret:
    secretName: cloud-controller-manager
- name: tmp
  emptyDir: {}
{{- end -}}

{{- $kubernetesSemVer := semver .Values.global.discovery.kubernetesVersion }}
{{- $ccmImageName := join "" (list "cloudControllerManager" $kubernetesSemVer.Major $kubernetesSemVer.Minor ) }}
{{- $ccmImage := include "helm_lib_module_image_no_fail" (list . $ccmImageName) }}
{{- if $ccmImage }}

{{- $ccmConfig := dict -}}
{{- $_ := set $ccmConfig "fullname" "cloud-controller-manager" -}}
{{- $_ := set $ccmConfig "image" $ccmImage -}}
{{- $_ := set $ccmConfig "containerName" "vsphere-cloud-controller-manager" -}}
{{- $_ := set $ccmConfig "additionalArgs" (include "vsphere_ccm_args" . | fromYamlArray) -}}
{{- $_ := set $ccmConfig "additionalEnvs" (include "vsphere_ccm_envs" . | fromYamlArray) -}}
{{- $_ := set $ccmConfig "additionalPodAnnotations" (include "vsphere_ccm_pod_annotations" . | fromYaml) -}}
{{- $_ := set $ccmConfig "additionalPDBAnnotations" (include "vsphere_ccm_pdb_annotations" . | fromYaml) -}}
{{- $_ := set $ccmConfig "additionalVolumeMounts" (include "vsphere_ccm_volume_mounts" . | fromYamlArray) -}}
{{- $_ := set $ccmConfig "additionalVolumes" (include "vsphere_ccm_volumes" . | fromYamlArray) -}}
{{- $_ := set $ccmConfig "vpaEnabled" true -}}
{{- $_ := set $ccmConfig "securityPolicyExceptionEnabled" true -}}

{{- include "helm_lib_cloud_controller_manager_manifests" (list . $ccmConfig) }}
{{- end }}
