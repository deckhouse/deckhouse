{{- define "zvirt_capi_envs" -}}
- name: ZVIRT_API_URL
  valueFrom:
    secretKeyRef:
      name: capi-zvirt-credentials
      key: server
- name: ZVIRT_USER
  valueFrom:
    secretKeyRef:
      name: capi-zvirt-credentials
      key: username
- name: ZVIRT_PASSWORD
  valueFrom:
    secretKeyRef:
      name: capi-zvirt-credentials
      key: password
- name: ZVIRT_CONNECT_INSECURE
  valueFrom:
    secretKeyRef:
      name: capi-zvirt-credentials
      key: insecure
- name: ZVIRT_CA_BUNDLE
  valueFrom:
    secretKeyRef:
      name: capi-zvirt-credentials
      key: caBundle
- name: ZVIRT_VM_TAGS
  value: {{ join "-" (list "cluster" .Values.global.discovery.clusterUUID) | quote }}
{{- end -}}

{{- $capiConfig := dict -}}
{{- $_ := set $capiConfig "fullname" "capz-controller-manager" -}}
{{- $_ := set $capiConfig "image" (include "helm_lib_module_image" (list . "capzControllerManager")) -}}
{{- $_ := set $capiConfig "capiProviderName" "infrastructure-zvirt" -}}
{{- $_ := set $capiConfig "additionalEnv" (include "zvirt_capi_envs" . | fromYamlArray) -}}
{{- $_ := set $capiConfig "vpaEnabled" true -}}

{{- include "helm_lib_capi_controller_manager_manifests" (list . $capiConfig) }}
