{{- $bashbilePath := "candi/bashible/" -}}
{{- $bashible := .Files.Glob (printf "%s**" $bashbilePath) -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: d8-node-manager-cloud-provider-zvirt-bashible
  namespace: kube-system
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
data:
{{- range $path, $_ :=  $bashible }}
  {{ $path | trimPrefix $bashbilePath }}: {{ $bashible.Get $path | b64enc }}
{{- end }}
