image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: common/distroless
import:
  - image: {{ .ModuleName }}/{{ .ImageName }}-artifact
    add: /egress-gateway-agent
    to: /egress-gateway-agent
    before: setup
imageSpec:
  config:
    entrypoint: ["/egress-gateway-agent"]
---
image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
git:
- add: /{{ .ModulePath }}modules/{{ .ModulePriority }}-{{ .ModuleName }}/images/{{ .ImageName }}/src
  to:  /src
  # Forces a rebuild when source files are modified.
  stageDependencies:
    install:
    - '**/*'
shell:
  install:
  - cd /src
---
---
image: {{ .ModuleName }}/glibc-artifact
final: false
from: {{ index $.Images "builder/distroless" }}
shell:
  beforeInstall:
  - pm install libatomic@15.2 libc@2.43 ncurses -d /out
---
import:
- from: {{ .ModuleName }}/glibc-artifact
  add: /out/lib64/libm.so.6
  to: /usr/lib64/libm.so.6
  before: install
- from: {{ .ModuleName }}/glibc-artifact
  add: /out/lib64/libc.so.6
  to: /usr/lib64/libc.so.6
  before: install
- from: {{ .ModuleName }}/glibc-artifact
  add: /out/lib64/ld-linux-x86-64.so.2
  to: /usr/lib64/ld-linux-x86-64.so.2
  before: install
- from: {{ .ModuleName }}/glibc-artifact
  add: /out/lib64/libpthread.so.0
  to: /usr/lib64/libpthread.so.0
  before: install
- from: {{ .ModuleName }}/glibc-artifact
  add: /out/lib64/libresolv.so.2
  to: /usr/lib64/libresolv.so.2
  before: install
- from: {{ .ModuleName }}/glibc-artifact
  add: /out/lib64/librt.so.1
  to: /usr/lib64/librt.so.1
  before: install
- from: {{ .ModuleName }}/glibc-artifact
  add: /out/lib64/libdl.so.2
  to: /usr/lib64/libdl.so.2
  before: install
- from: {{ .ModuleName }}/glibc-artifact
  add: /out/usr/lib/libtinfo*
  to: /usr/lib64/
  before: install
---
image: {{ .ModuleName }}/{{ .ImageName }}-artifact
from: {{ index $.Images ( eq $.SVACE_ENABLED "false" | ternary "builder/golang-alpine" "builder/golang-alpine-svace" ) }}
final: false
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
---
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  install:
    - cd /src
    - GOPROXY=$(cat /run/secrets/GOPROXY) go mod download
  setup:
    - cd /src
    - export GOOS=linux GOARCH=amd64 CGO_ENABLED=0
    - | 
      {{- $buildContext := deepCopy $ -}}
      {{- $_ := set $buildContext "SvaceBuildOptions" "--enable-ptrace-all" -}}
      {{- $_ := set $buildContext "BuildCommand" `go build -ldflags="-s -w" -o /egress-gateway-agent cmd/main.go` -}}
      {{- include "image-build.build" $buildContext | indent 6 }}
    - chown 64535:64535 /egress-gateway-agent
    - chmod 0755 /egress-gateway-agent
