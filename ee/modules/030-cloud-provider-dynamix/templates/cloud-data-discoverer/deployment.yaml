{{- define "dynamix_cdd_pod_annotations" -}}
checksum/config: {{ include (print $.Template.BasePath "/cloud-controller-manager/secret.yaml") . | sha256sum }}
{{- end -}}

{{- define "dynamix_cdd_envs" -}}
- name: DYNAMIX_APP_ID
  valueFrom:
    secretKeyRef:
      name: dynamix-credentials
      key: appId
- name: DYNAMIX_APP_SECRET
  valueFrom:
    secretKeyRef:
      name: dynamix-credentials
      key: appSecret
- name: DYNAMIX_OAUTH2_URL
  valueFrom:
    secretKeyRef:
      name: dynamix-credentials
      key: oAuth2Url
- name: DYNAMIX_CONTROLLER_URL
  valueFrom:
    secretKeyRef:
      name: dynamix-credentials
      key: controllerUrl
- name: DYNAMIX_INSECURE
  valueFrom:
    secretKeyRef:
      name: dynamix-credentials
      key: insecure
- name: DYNAMIX_ACCOUNT
  valueFrom:
    secretKeyRef:
      name: dynamix-credentials
      key: account
- name: DYNAMIX_LOCATION
  valueFrom:
    secretKeyRef:
      name: dynamix-credentials
      key: location
{{- end -}}

{{- $cddConfig := dict -}}
{{- $_ := set $cddConfig "image" (include "helm_lib_module_image" (list . "cloudDataDiscoverer")) -}}
{{- $_ := set $cddConfig "additionalEnv" (include "dynamix_cdd_envs" . | fromYamlArray) -}}
{{- $_ := set $cddConfig "additionalPodAnnotations" (include "dynamix_cdd_pod_annotations" . | fromYaml) -}}
{{- $_ := set $cddConfig "vpaEnabled" true -}}

{{- include "helm_lib_cloud_data_discoverer_manifests" (list . $cddConfig) }}
