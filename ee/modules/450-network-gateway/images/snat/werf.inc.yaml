---
image: {{ .ModuleName }}/{{ .ImageName }}-artifact
final: false
from: {{ index $.Images "builder/distroless" }}
shell:
  beforeInstall:
  - pm install baselayout -d /out
  - pm install python@3.12 gnu-glibc grep sed coreutils bash -d /out
---
image: {{ .ModuleName }}/{{ .ImageName }}
from: {{ index $.Images "base/scratch" }}
git:
- add: /{{ $.ModulePath }}modules/450-{{ $.ModuleName }}/images/{{ $.ImageName }}/src/iptables-loop.py
  to: /iptables-loop.py
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-artifact
  add: /out
  to: /
  before: setup
{{- include "image mount points" $ }}
