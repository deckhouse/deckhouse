---
image: {{ .ModuleName }}/{{ .ImageName }}-artifact
final: false
from: {{ index $.Images "builder/distroless" }}
shell:
  beforeInstall:
  - pm install baselayout -d /out
  - pm install dnsmasq sqlite python@3.12 gnu-glibc python-wheel -d /out
---
image: {{ .ModuleName }}/{{ .ImageName }}
from: {{ index $.Images "base/scratch" }}
git:
- add: /{{ $.ModulePath }}modules/450-{{ $.ModuleName }}/images/{{ $.ImageName }}/src/prepare-config.py
  to: /prepare-config.py
- add: /{{ $.ModulePath }}modules/{{ .ModulePriority }}-{{ .ModuleName }}/images/{{ .ImageName }}/src/requirements.txt
  to: /requirements.txt
  stageDependencies:
    install:
    - '**/*'
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-artifact
  add: /out
  to: /
  before: install
{{- include "image mount points" $ }}
shell:
  install:
  - python3 -m pip install -f file:///wheels --no-index --upgrade pip
  - python3 -m pip install -f file:///wheels --no-index -r /requirements.txt
