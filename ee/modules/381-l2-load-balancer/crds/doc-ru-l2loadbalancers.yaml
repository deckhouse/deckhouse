spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            Описывает ресурс L2LoadBalancer для кластера.
          properties:
            spec:
              properties:
                spec:
                  properties:
                    addressPool:
                      description: |-
                        Массив диапазонов публичных IP-адресов. Каждый диапазон может быть указан с помощью CIDR.
                        Или прямого указания, например, `10.10.10.1-10.10.10.100`.
                    interfaces:
                      description: |-
                        Список сетевых интерфесов, с которых будет производиться анонс присвоенных IP адресов.
                        Если поле не заполнено или задан пустой массив, то будет просиходить анонс со всех
                        интерфейсов на ноде.
                    nodeSelector:
                      description: |-
                        Позволяет ограничить список узлов, с которых будет происходить анонс.
                        Задается в виде набора лейблов для фильтрации нод.
