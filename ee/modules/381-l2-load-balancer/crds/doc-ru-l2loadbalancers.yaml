spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            Описывает ресурс L2LoadBalancer для кластера.
          properties:
            spec:
              properties:
                spec:
                  description: L2LoadBalancerSpec задает параметры для L2LoadBalancer
                  properties:
                    addressPool:
                      description: |-
                        Массив диапазонов ip адресов. Каждый диапазон может быть указан с помощью CIDR
                        или прямого указания диапазона адресов, например, 10.10.10.1-10.10.10.100
                    interfaces:
                      description: |-
                        Список сетевых интерфесов, с которых будет производиться анонс присвоенных IP адресов.
                        Если поле не заполнено или задан пустой массив интерфейсов, то будет просиходить анонс со всех
                        интерфейсов на ноде.
                    nodeSelector:
                      description: |-
                        Позволяет ограничить спсиок нод, с которых будет происходить анонс.
                        Задается в виде набора лейблов для фильтрации нод.
