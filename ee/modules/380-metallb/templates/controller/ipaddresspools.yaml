{{- range $ipaddressPool := .Values.metallb.internal.addressPools }}
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ $ipaddressPool.name }}
  namespace: d8-{{ $.Chart.Name }}
  {{- include "helm_lib_module_labels" (list $ (dict "app" "controller")) | nindent 2 }}
spec:
  addresses:
  {{- $ipaddressPool.addresses | toYaml | nindent 4 }}
  {{- if kindIs "invalid" $ipaddressPool.autoAssign }}
  autoAssign: true
  {{- else }}
  autoAssign: {{ $ipaddressPool.autoAssign }}
  {{- end }}
  {{- if kindIs "invalid" $ipaddressPool.avoidBuggyIPs }}
  avoidBuggyIPs: false
  {{- else }}
  avoidBuggyIPs: {{ $ipaddressPool.avoidBuggyIPs }}
  {{- end }}
{{- end }}
