# if you change this file please evaluate to change file
# ../../../../cse/modules/040-control-plane-manager/monitoring/prometheus-rules/signature.yaml
# unfortunately our build system cannot support symbol links now
- name: d8.control-plane-manager.signature
  rules:
  - alert: D8SignatureErrorsDetected
    for: 30m
    expr: |
      increase(apiserver_storage_signature_errors_total{mode="enforce"}[5m]) > 0
    labels:
      severity_level: "2"
      tier: cluster
    annotations:
      plk_protocol_version: "1"
      plk_markup_format: "markdown"
      plk_create_group_if_not_exists__d8_signature_errors: "D8SignatureErrors,tier=cluster,prometheus=deckhouse,kubernetes=~kubernetes"
      plk_grouped_by__d8_signature_errors: "D8SignatureErrors,tier=cluster,prometheus=deckhouse,kubernetes=~kubernetes"
      summary: A significant number of signature errors detected.
      description: |-
        There have been errors while reading/writing signed data from etcd.
        Errors may occur due to the following factors:

        - **Invalid Digital Signature**: The signature fails to verify the authenticity of the data.
        - **Unauthorized Modification**: Data has been altered after signing, compromising its integrity.
        - **Data Corruption**: Files or data are corrupted, impeding correct reading.
        - **Incorrect Data Format or Type**: Data is in an incorrect format or type, preventing proper processing.

        To investigate which records are generating alerts, follow instructions below.
        
        Log into the server with label `instance={{`{{ $labels.instance }}`}}` and inspect the audit log using the following command:
        ```bash
        jq 'select(.annotations["deckhouse.io/signature"])' /var/log/kube-audit/audit.log
        ```
  - alert: D8SignatureErrorsDetected
    for: 30m
    expr: |
      increase(apiserver_storage_signature_errors_total{mode=~"rollback|migrate"}[5m]) > 0
    labels:
      severity_level: "7"
      tier: cluster
    annotations:
      plk_protocol_version: "1"
      plk_markup_format: "markdown"
      plk_create_group_if_not_exists__d8_signature_errors: "D8SignatureErrors,tier=cluster,prometheus=deckhouse,kubernetes=~kubernetes"
      plk_grouped_by__d8_signature_errors: "D8SignatureErrors,tier=cluster,prometheus=deckhouse,kubernetes=~kubernetes"
      summary: A significant number of signature errors detected.
      description: |-
        There have been errors while reading/writing signed data from etcd.
        Errors can arise due to the following factors:

        - **Incorrect Data Format or Type**: Data is in an incorrect format or type, preventing proper processing.
        - **Invalid Digital Signature**: The signature fails to verify the authenticity of the data.
        - **Data Corruption**: Files or data are corrupted, impeding correct reading.
        - **Unauthorized Modification**: Data has been altered after signing, compromising its integrity.

        To investigate which records are generating alerts, follow instructions below.
        
        Log into the server with label `instance={{`{{ $labels.instance }}`}}` and inspect the audit log using the following command:
        ```bash
        jq 'select(.annotations["deckhouse.io/signature"])' /var/log/kube-audit/audit.log
        ```
