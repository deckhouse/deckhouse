{{- $providerClusterConfiguration := .Values.cloudProviderHuaweicloud.internal.providerClusterConfiguration | required "internal.providerClusterConfiguration is required" }}

{{- define "caphc_envs" }}
- name: HUAWEICLOUD_CLOUD
  valueFrom:
    secretKeyRef:
      name: huaweicloud-credentials
      key: cloud
- name: HUAWEICLOUD_REGION
  valueFrom:
    secretKeyRef:
      name: huaweicloud-credentials
      key: region
- name: HUAWEICLOUD_ACCESS_KEY
  valueFrom:
    secretKeyRef:
      name: huaweicloud-credentials
      key: access-key
- name: HUAWEICLOUD_SECRET_KEY
  valueFrom:
    secretKeyRef:
      name: huaweicloud-credentials
      key: secret-key
- name: HUAWEICLOUD_PROJECT_ID
  valueFrom:
    secretKeyRef:
      name: huaweicloud-credentials
      key: project-id
{{- if .Values.cloudProviderHuaweicloud.internal.providerClusterConfiguration.provider.enterpriseProjectID }}
- name: HUAWEICLOUD_ENTERPRISE_PROJECT_ID
  valueFrom:
    secretKeyRef:
      name: huaweicloud-credentials
      key: enterprise-project-id
{{- end }}
{{- end }}

{{- $capiConfig := dict }}
{{- $_ := set $capiConfig "fullname" "caphc-controller-manager" }}
{{- $_ := set $capiConfig "image" (include "helm_lib_module_image" (list . "caphcControllerManager")) }}
{{- $_ := set $capiConfig "capiProviderName" "infrastructure-huaweicloud" }}
{{- $_ := set $capiConfig "additionalEnv" (include "caphc_envs" . | fromYamlArray) }}
{{- $_ := set $capiConfig "additionalArgs" (list "--metrics-bind-address=:8080" "--metrics-secure=false") }}
{{- $_ := set $capiConfig "additionalPorts" (list (dict "containerPort" 8080 "name" "metrics" "protocol" "TCP")) }}
{{- $_ := set $capiConfig "vpaEnabled" true }}

{{- include "helm_lib_capi_controller_manager_manifests" (list . $capiConfig) }}
