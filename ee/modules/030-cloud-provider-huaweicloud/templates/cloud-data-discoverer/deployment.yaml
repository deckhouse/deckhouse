{{- define "huaweicloud_cdd_pod_annotations" }}
checksum/config: {{ printf "%s%s" (include (print $.Template.BasePath "/secret.yaml") . | toString) | sha256sum }}
{{- end }}

{{- define "huaweicloud_cdd_envs" }}
  - name: HUAWEICLOUD_CLOUD
    valueFrom:
      secretKeyRef:
        name: huaweicloud-credentials
        key: cloud
  - name: HUAWEICLOUD_REGION
    valueFrom:
      secretKeyRef:
        name: huaweicloud-credentials
        key: region
  - name: HUAWEICLOUD_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: huaweicloud-credentials
        key: access-key
  - name: HUAWEICLOUD_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: huaweicloud-credentials
        key: secret-key
  - name: HUAWEICLOUD_PROJECT_ID
    valueFrom:
      secretKeyRef:
        name: huaweicloud-credentials
        key: project-id
{{- end }}

{{- $cddConfig := dict }}
{{- $_ := set $cddConfig "image" (include "helm_lib_module_image" (list . "cloudDataDiscoverer")) }}
{{- $_ := set $cddConfig "additionalEnv" (include "huaweicloud_cdd_envs" . | fromYamlArray) }}
{{- $_ := set $cddConfig "additionalPodAnnotations" (include "huaweicloud_cdd_pod_annotations" . | fromYaml) }}
{{- $_ := set $cddConfig "vpaEnabled" true }}

{{- include "helm_lib_cloud_data_discoverer_manifests" (list . $cddConfig) }}
