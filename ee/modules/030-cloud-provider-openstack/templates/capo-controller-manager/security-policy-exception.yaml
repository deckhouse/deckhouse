{{- if .Values.global.enabledModules | has "admission-policy-engine-crd" }}
---
apiVersion: deckhouse.io/v1alpha1
kind: SecurityPolicyException
metadata:
  name: capo-controller-manager
  namespace: d8-cloud-provider-openstack
spec:
  network:
    hostNetwork:
      allowedValue: true
      metadata:
        description: |
          Allow host network access for CAPI infrastructure controller manager.
          The CAPI infrastructure controller manager requires host network access to continue infrastructure reconciliation even if the CNI or pod network is unavailable.
    hostPorts:
      - port: 4201
        protocol: TCP
        metadata:
          description: |
            Allow binding TCP port 4201 for the CAPO webhook server.
            This port is used by capo-controller-manager to serve admission webhooks via capo-controller-manager-webhook-service.
{{- end }}
