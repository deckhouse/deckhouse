{{- define "openstack_ccm_pod_annotations" -}}
checksum/config: {{ include (print $.Template.BasePath "/cloud-controller-manager/secret.yaml") . | sha256sum }}
{{- end -}}

{{- define "openstack_ccm_args" -}}
- --cluster-cidr={{ .Values.global.discovery.podSubnet }}
- --allocate-node-cidrs=true
- --configure-cloud-routes=true
- --cloud-config=/etc/config/cloud-config
- --cloud-provider=openstack
- --tls-cipher-suites=TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256,TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_256_CBC_SHA,TLS_RSA_WITH_AES_128_GCM_SHA256,TLS_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_AES_128_CBC_SHA,TLS_ECDHE_ECDSA_WITH_AES_256_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA
- --v=2
  {{- if .Values.global.clusterConfiguration.cloud }}
    {{- if .Values.global.clusterConfiguration.cloud.prefix }}
- --cluster-name={{ .Values.global.clusterConfiguration.cloud.prefix }}
    {{- end }}
  {{- end }}
{{- end -}}

{{- define "openstack_ccm_volume_mounts" -}}
- name: k8s-certs
  mountPath: /etc/kubernetes/pki
  readOnly: true
- name: config
  mountPath: /etc/config
  readOnly: true
{{- end -}}

{{- define "openstack_ccm_volumes" -}}
- name: k8s-certs
  hostPath:
    path: /etc/kubernetes/pki
    type: DirectoryOrCreate
- name: config
  secret:
    secretName: cloud-controller-manager
{{- end -}}

{{- $kubernetesSemVer := semver .Values.global.discovery.kubernetesVersion -}}
{{- $ccmImageName := join "" (list "cloudControllerManager" $kubernetesSemVer.Major $kubernetesSemVer.Minor ) -}}
{{- $ccmImage := include "helm_lib_module_image_no_fail" (list . $ccmImageName) -}}

{{- if $ccmImage -}}
  {{- $ccmConfig := dict -}}
  {{- $_ := set $ccmConfig "image" $ccmImage -}}
  {{- $_ := set $ccmConfig "additionalArgs" (include "openstack_ccm_args" . | fromYamlArray) -}}
  {{- $_ := set $ccmConfig "additionalPodAnnotations" (include "openstack_ccm_pod_annotations" . | fromYaml) -}}
  {{- $_ := set $ccmConfig "additionalVolumeMounts" (include "openstack_ccm_volume_mounts" . | fromYamlArray) -}}
  {{- $_ := set $ccmConfig "additionalVolumes" (include "openstack_ccm_volumes" . | fromYamlArray) -}}
  {{- $_ := set $ccmConfig "vpaEnabled" true -}}
  {{- $_ := set $ccmConfig "securityPolicyExceptionEnabled" true -}}

  {{- include "helm_lib_cloud_controller_manager_manifests" (list . $ccmConfig) }}
{{- end }}
