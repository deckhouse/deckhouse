type: object
properties:
  debug:
    description: |
      Включает уровень логирования debug для контроллера и агента, обеспечивая более подробный вывод логов, включая информацию о вызывающем коде.
  verboseStatus:
    description: |
      Если true, агент будет обновлять поле lastProbeTime в статусе ServiceWithHealthchecks при каждой проверке (каждые periodSeconds). Это может быть полезно для отладки, но создает высокую нагрузку на API-сервер. Если false, фиксируются только изменения состояния.
