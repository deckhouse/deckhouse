---
image: {{ .ModuleName }}/service-with-healthchecks-src-artifact
fromImage: common/src-artifact
final: false
git:
  - add: /{{ $.ModulePath }}modules/{{ $.ModulePriority }}-{{ $.ModuleName }}/images/{{ $.ImageName }}
    to: /src
    excludePaths:
      - "**/*.md"
      - "**/*.yaml"
    stageDependencies:
      install:
        - go.mod
        - go.sum
      setup:
        - "**/*.go"
shell:
  install:
    - cd /src
---
image: {{ $.ModuleName }}/service-with-healthchecks-build-artifact
final: false
from: {{ $.Images.BASE_GOLANG_23_ALPINE }}
mount:
- fromPath: ~/go-pkg-cache
  to: /go/pkg
import:
  - image: {{ .ModuleName }}/service-with-healthchecks-src-artifact
    add: /src
    to: /src
    before: install
git:
  - add: /{{ $.ModulePath }}modules/{{ $.ModulePriority }}-{{ $.ModuleName }}/images/patches
    to: /patches
    stageDependencies:
      install:
        - '**/*'
shell:
  install:
  - cd /src
  - go mod download
  beforeSetup:
  - BROTLI_PATH=$(find /go/pkg/mod/github.com/andybalholm/brotli@* -maxdepth 0 -type d | head -n 1)
  - if [ -z "$BROTLI_PATH" ]; then echo "Error: Brotli module not found in /go/pkg/mod"; exit 1; fi
  - cd "$BROTLI_PATH"
  - git apply /patches/*.patch --verbose
  setup:
  - export GO_VERSION=${GOLANG_VERSION} GOPROXY={{ $.GOPROXY }}
  - export GOOS=linux GOARCH=amd64 CGO_ENABLED=0
  - cd /src/cmd/agent
  - go build -ldflags="-s -w" -o /agent .
  - chown 64535:64535 /agent
  - chmod +x /agent
  - cd /src/cmd/controller
  - go build -ldflags="-s -w" -o /controller .
  - chown 64535:64535 /controller
  - chmod +x /controller
