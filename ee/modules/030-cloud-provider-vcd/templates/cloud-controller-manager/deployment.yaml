{{- define "vcd_ccm_args" -}}
- --cloud-config=/etc/cloud/cloud-config
- --cloud-provider=vmware-cloud-director
- --allow-untagged-cloud=true
- --configure-cloud-routes=false
- --controllers={{ .controllers }}
- --v=4
{{- end -}}

{{- define "vcd_ccm_pdb_annotations" -}}
checksum/config: {{ printf "%s%s" (include (print $.Template.BasePath "/cloud-controller-manager/secret.yaml") . | toString) (include (print $.Template.BasePath "/secret.yaml") . | toString) | sha256sum }}
{{- end -}}

{{- define "vcd_ccm_pod_annotations" -}}
checksum/config: {{ printf "%s%s" (include (print $.Template.BasePath "/registration.yaml") . | toString) (include (print $.Template.BasePath "/secret.yaml") . | toString) | sha256sum }}
{{- end -}}

{{- define "vcd_ccm_volume_mounts" -}}
- name: ccm-controller-config-volume
  mountPath: "/etc/cloud"
  readOnly: true
- name: vcd-credentials-volume
  mountPath: "/etc/kubernetes/vcloud/basic-auth"
  readOnly: true
{{- end -}}

{{- define "vcd_ccm_volumes" -}}
- name: ccm-controller-config-volume
  secret:
    secretName: "ccm-controller-manager"
- name: vcd-credentials-volume
  secret:
    secretName: "vcd-credentials"
{{- end -}}

{{- $ccmImageName := "" -}}
{{- if eq .Values.cloudProviderVcd.internal.legacyMode true -}}
  {{- $ccmImageName = "cloudControllerManagerLegacy" -}}
{{- else -}}
  {{- $ccmImageName = "cloudControllerManager" -}}
{{- end -}}

{{- $ccmEnabledControllers := "cloud-node,cloud-node-lifecycle" -}}
{{- if hasKey .Values.cloudProviderVcd.internal.providerDiscoveryData "loadBalancer" -}}
  {{- if hasKey .Values.cloudProviderVcd.internal.providerDiscoveryData.loadBalancer "enabled" -}}
    {{- if .Values.cloudProviderVcd.internal.providerDiscoveryData.loadBalancer.enabled -}}
      {{- $ccmEnabledControllers = printf "%s,service" $ccmEnabledControllers -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- $ccmImage := include "helm_lib_module_image_no_fail" (list . $ccmImageName) -}}

{{- $ccmConfig := dict -}}
{{- $_ := set $ccmConfig "fullname" "cloud-controller-manager" -}}
{{- $_ := set $ccmConfig "image" $ccmImage -}}
{{- $_ := set $ccmConfig "containerName" "vcd-cloud-controller-manager" -}}
{{- $_ := set $ccmConfig "additionalArgs" (include "vcd_ccm_args" (dict "controllers" $ccmEnabledControllers) | fromYamlArray) -}}
{{- $_ := set $ccmConfig "additionalPodAnnotations" (include "vcd_ccm_pod_annotations" . | fromYaml) -}}
{{- $_ := set $ccmConfig "additionalPDBAnnotations" (include "vcd_ccm_pdb_annotations" . | fromYaml) -}}
{{- $_ := set $ccmConfig "additionalVolumeMounts" (include "vcd_ccm_volume_mounts" . | fromYamlArray) -}}
{{- $_ := set $ccmConfig "additionalVolumes" (include "vcd_ccm_volumes" . | fromYamlArray) -}}
{{- $_ := set $ccmConfig "vpaEnabled" true -}}
{{- $_ := set $ccmConfig "securityPolicyExceptionEnabled" true -}}

{{- include "helm_lib_cloud_controller_manager_manifests" (list . $ccmConfig) }}
