{{- $crds_external := .Files.Glob "crds/**.yaml" -}}
{{- $capi := .Files.Glob "capi/**" -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: d8-node-manager-cloud-provider-vcd-capi
  namespace: kube-system
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
data:
{{- range $path, $_ :=  $crds_external }}
  {{ $path }}: {{ $crds_external.Get $path | b64enc }}
{{- end }}
{{- range $path, $_ :=  $capi }}
  {{ $path }}: {{ $capi.Get $path | b64enc }}
{{- end }}
