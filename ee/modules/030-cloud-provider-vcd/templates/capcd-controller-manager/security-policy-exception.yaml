{{- if .Values.global.enabledModules | has "admission-policy-engine-crd" }}
apiVersion: deckhouse.io/v1alpha1
kind: SecurityPolicyException
metadata:
  name: capcd-controller-manager
  namespace: d8-cloud-provider-vcd
spec:
  network:
    hostNetwork:
      allowedValue: true
      metadata:
        description: |
          Permit host networking for the Cluster API VMware Cloud Director (CAPCD) controller manager.
          Host network is used so the provider can reach the VMware Cloud Director API and expose the admission webhook and health checks in line with the module's networking model.
{{- end }}