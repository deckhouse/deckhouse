{{- define "capcd_controller_manager_pod_annotations" -}}
checksum/config: {{ printf "%s%s" (include (print $.Template.BasePath "/registration.yaml") . | toString) (include (print $.Template.BasePath "/secret.yaml") . | toString) | sha256sum }}
{{- end -}}

{{- define "capcd_controller_manager_pod_labels" -}}
  {{- if .Values.global.enabledModules | has "admission-policy-engine-crd" }}
security.deckhouse.io/security-policy-exception: capcd-controller-manager
  {{- end }}
{{- end -}}

{{- define "capcd_controller_manager_args" -}}
  {{- if eq .Values.cloudProviderVcd.internal.legacyMode true }}
- "--metrics-bind-address=127.0.0.1:9446"
  {{- else }}
- "--diagnostics-address=127.0.0.1:9446"
- "--insecure-diagnostics"
  {{- end }}
- "--health-probe-bind-address=:9445"
- "--zap-encoder=json"
{{- end -}}

{{- define "capcd_controller_manager_envs" -}}
- name: CAPVCD_SKIP_RDE
  value: "true"
- name: USE_K8S_ENV_AS_CONTROL_PLANE_IP
  value: "true"
{{- end }}

{{- define "capcd_controller_manager_ports" -}}
- name: webhook-server
  containerPort: 4201
  protocol: TCP
{{- end }}

{{- define "capcd_controller_manager_volume_mounts" -}}
- name: cert
  mountPath: "/tmp/k8s-webhook-server/serving-certs"
  readOnly: true
{{- end }}

{{- define "capcd_controller_manager_volumes" -}}
- name: cert
  secret:
    secretName: capcd-controller-manager-webhook-tls
    defaultMode: 420
{{- end }}

{{- define "capcd_controller_manager_liveness_probe" -}}
httpGet:
  path: "/healthz"
  port: 9445
initialDelaySeconds: 15
periodSeconds: 20
{{- end }}

{{- define "capcd_controller_manager_readiness_probe" -}}
httpGet:
  path: "/readyz"
  port: 9445
initialDelaySeconds: 5
periodSeconds: 10
{{- end }}

{{- $capiImageName := "" -}}
{{- if eq .Values.cloudProviderVcd.internal.legacyMode true -}}
  {{- $capiImageName = "capcdControllerManagerLegacy" -}}
{{- else -}}
  {{- $capiImageName = "capcdControllerManager" -}}
{{- end -}}

{{- $capiImage := include "helm_lib_module_image_no_fail" (list . $capiImageName) -}}

{{- $capiConfig := dict -}}
{{- $_ := set $capiConfig "fullname" "capcd-controller-manager" -}}
{{- $_ := set $capiConfig "image" $capiImage -}}
{{- $_ := set $capiConfig "capiProviderName" "infrastructure-static" -}}
{{- $_ := set $capiConfig "hostNetwork" true -}}
{{- $_ := set $capiConfig "dnsPolicy" "ClusterFirstWithHostNet" -}}
{{- $_ := set $capiConfig "nodeSelectorStrategy" "master" -}}
{{- $_ := set $capiConfig "tolerationsStrategies" (list "wildcard") -}}
{{- $_ := set $capiConfig "additionalArgs" (include "capcd_controller_manager_args" . | fromYamlArray) -}}
{{- $_ := set $capiConfig "additionalEnv" (include "capcd_controller_manager_envs" . | fromYamlArray) -}}
{{- $_ := set $capiConfig "additionalPorts" (include "capcd_controller_manager_ports" . | fromYamlArray) -}}
{{- $_ := set $capiConfig "additionalVolumeMounts" (include "capcd_controller_manager_volume_mounts" . | fromYamlArray) -}}
{{- $_ := set $capiConfig "additionalVolumes" (include "capcd_controller_manager_volumes" . | fromYamlArray) -}}
{{- $_ := set $capiConfig "additionalPodAnnotations" (include "capcd_controller_manager_pod_annotations" . | fromYaml) -}}
{{- $_ := set $capiConfig "additionalPodLabels" (include "capcd_controller_manager_pod_labels" . | fromYaml) -}}
{{- $_ := set $capiConfig "livenessProbe" (include "capcd_controller_manager_liveness_probe" . | fromYaml) -}}
{{- $_ := set $capiConfig "readinessProbe" (include "capcd_controller_manager_readiness_probe" . | fromYaml) -}}
{{- $_ := set $capiConfig "vpaEnabled" true -}}

{{- include "helm_lib_capi_controller_manager_manifests" (list . $capiConfig) }}