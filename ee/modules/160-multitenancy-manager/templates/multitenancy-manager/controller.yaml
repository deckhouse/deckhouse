---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multitenancy-manager
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "multitenancy-manager")) | nindent 2 }}
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: multitenancy-manager
  template:
    metadata:
      labels:
        app: multitenancy-manager
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/registry-secret.yaml") . | sha256sum }}
    spec:
      {{- include "helm_lib_node_selector" (tuple . "system") | nindent 6 }}
      {{- include "helm_lib_tolerations" (tuple . "system") | nindent 6 }}
      {{- include "helm_lib_priority_class" (tuple . "system-cluster-critical") | nindent 6 }}
      {{- include "helm_lib_module_pod_security_context_run_as_user_deckhouse" . | nindent 6 }}
      imagePullSecrets:
        - name: deckhouse-registry
      terminationGracePeriodSeconds: 60
      serviceAccountName: multitenancy-manager
      containers:
        - name: multitenancy-manager
          image: {{ include "helm_lib_module_image" (list . "multitenancyManager") }}
          {{- include "helm_lib_module_container_security_context_read_only_root_filesystem" . | nindent 8 }}
          args:
            - /multitenancy-manager
          imagePullPolicy: 'IfNotPresent'
          ports:
            - containerPort: 9090
              name: healthz
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9090
          resources:
            requests:
              {{- include "helm_lib_module_ephemeral_storage_logs_with_extra" 10 | nindent 12 }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gatekeeper-controller-manager
  namespace: d8-admission-policy-engine
  {{- include "helm_lib_module_labels" (list . (dict "app" "multitenancy-manager")) | nindent 2 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: multitenancy-manager