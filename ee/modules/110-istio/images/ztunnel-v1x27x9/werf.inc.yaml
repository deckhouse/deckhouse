{{- if ne $.Env "CSE" }}
{{- $istioVersion := "1.27.9" }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: common/distroless
import:
  - image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
    add: /src/ztunnel/bin/ztunnel
    to: /usr/local/bin/ztunnel
    owner: 1337
    group: 1337
    before: install
  - from: {{ index $.Images "libs/glibc-v2.41" }}
    add: /lib64/libc.so.6
    to: /lib64/libc.so.6
    before: install
  - from: {{ index $.Images "libs/glibc-v2.41" }}
    add: /lib64/libm.so.6
    to: /lib64/libm.so.6
    before: install
  - from: {{ index $.Images "libs/glibc-v2.41" }}
    add: /lib64/ld-linux-x86-64.so.2
    to: /lib64/ld-linux-x86-64.so.2
    before: install
  - from: {{ index $.Images "libs/xz-v5.8.1" }}
    add: /usr/lib/libc.so
    to: /lib64/libc.so
    before: install
  - from: {{ index $.Images "tools/gcc-gnu-releases/gcc-14.2.0" }}
    add: /usr/lib/libgcc_s.so.1
    to: /lib64/libgcc_s.so.1
    before: install
imageSpec:
  config:
    user: "1337:1337"
    env:  
      ISTIO_META_ISTIO_VERSION: {{ $istioVersion }}
    entrypoint: ["/usr/local/bin/ztunnel"]
---
image: {{ .ModuleName }}/{{ .ImageName }}-artifact
fromImage: common/alt-p11-artifact
final: false
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
  add: /src/ztunnel
  to: /src/ztunnel
  before: install
secrets:
- id: CARGO_PROXY
  value: {{ .CargoProxy }}
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  beforeInstall:
  {{- include "alt packages proxy" . | nindent 2 }}
  - apt-get install -y build-essential git openssl-devel wget perl-IPC-Cmd protobuf-compiler libsasl2-devel unzip zlib-devel rust rust-cargo
  install:
  - export CARGO_NET_GIT_FETCH_WITH_CLI=true
  - cd /src/ztunnel
  - |
    export CARGO_PROXY=$(cat /run/secrets/CARGO_PROXY)
    if ! [[ "${CARGO_PROXY}" = "false" ]]; then
      echo '[source.crates-io]' >> .cargo/config.toml
      echo 'replace-with = "crates-io-mirror"' >> .cargo/config.toml
      echo '[registries.crates-io-mirror]' >> .cargo/config.toml
      echo 'index = "sparse+http://'${CARGO_PROXY}'/index/"' >> .cargo/config.toml
    fi
  - git config --global url."$(cat /run/secrets/SOURCE_REPO)".insteadOf https://github.com
  - echo "StrictHostKeyChecking accept-new" > ~/.ssh/config
  - |
    cargo build \
    --release 
  - strip /src/ztunnel/out/rust/release/ztunnel
  - mkdir -p /src/ztunnel/bin
  - mv /src/ztunnel/out/rust/release/ztunnel /src/ztunnel/bin/ztunnel
#=====================================================================================================
---
image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
git:
- url: {{ .SOURCE_REPO }}/istio/ztunnel
  tag: {{ $istioVersion }}
  to: /src/ztunnel
---
{{- end }}
