{{- if .Values.istio.federation.enabled }}
{{- range $svc := .Values.istio.internal.federationServiceEntries }}
---
apiVersion: networking.istio.io/v1alpha3
kind: ServiceEntry
metadata:
  name: {{ $svc.name }}
  namespace: d8-{{ $.Chart.Name }}
  {{- include "helm_lib_module_labels" (list $) | nindent 2 }}
spec:
  hosts:
  - {{ $svc.hostname | quote }}
  location: MESH_INTERNAL
  ports:
  {{- range $port := $svc.ports }}
  - name: {{ $port.name }}
    number: {{ $port.port }}
    protocol: {{ $port.protocol }}
  {{- end }}
  resolution: {{ $svc.resolution | default "STATIC" }}
  endpoints:
  {{- range $endpoint := $svc.endpoints }}
  - address: {{ $endpoint.address | quote }}
    ports:
    {{- range $port := $svc.ports }}
      {{ $port.name }}: {{ $endpoint.port }}
    {{- end }}
  {{- end }}
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ $svc.name }}
  namespace: d8-{{ $.Chart.Name }}
  {{- include "helm_lib_module_labels" (list $) | nindent 2 }}
spec:
  host: {{ $svc.hostname | quote }}
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
{{- end }}
{{- end }}
