{{- if and
  (include "istioSupportsAmbient" .)
  (.Values.istio.ambient.enabled)
  (.Values.global.enabledModules | has "operator-prometheus")
}}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: ztunnel
  namespace: d8-monitoring
  {{- include "helm_lib_module_labels" (list . (dict "app" "ztunnel" "prometheus" "main")) | nindent 2 }}
spec:
  jobLabel: app
  podMetricsEndpoints:
  - port: ztunnel-stats
    scheme: http
    bearerTokenSecret:
      name: "prometheus-token"
      key: "token"
    honorLabels: true
    relabelings:
    - action: replace
      replacement: cluster
      targetLabel: tier
    - action: replace
      replacement: ztunnel
      targetLabel: job
  selector:
    matchLabels:
      app: ztunnel
  namespaceSelector:
    matchNames:
      - d8-{{ .Chart.Name }}
{{- end }}
