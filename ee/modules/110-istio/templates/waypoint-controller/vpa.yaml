{{- if and
  (include "istioSupportsAmbient" .)
  (.Values.istio.ambient.enabled)
  (eq .Values.istio.ambient.waypointController.resourcesManagement.mode "VPA")
  (.Values.global.enabledModules | has "vertical-pod-autoscaler")
}}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: waypoint-controller
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "waypoint-controller")) | nindent 2 }}
spec:
{{- include "helm_lib_resources_management_vpa_spec" (list
  "apps/v1"
  "Deployment"
  "waypoint-controller"
  "waypoint-controller"
  .Values.istio.ambient.waypointController.resourcesManagement
) | nindent 2 }}
{{- end }}
