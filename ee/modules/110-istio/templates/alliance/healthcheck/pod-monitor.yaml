{{- if and (or .Values.istio.federation.enabled .Values.istio.multicluster.enabled) (.Values.global.enabledModules | has "operator-prometheus") }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: alliance-healthcheck
  namespace: d8-monitoring
  {{- include "helm_lib_module_labels" (list . (dict "prometheus" "main")) | nindent 2 }}
spec:
  jobLabel: app
  selector:
    matchLabels:
      app: alliance-healthcheck
  namespaceSelector:
    matchNames:
      - d8-{{ $.Chart.Name }}
  podMetricsEndpoints:
    - port: http
      scheme: http
      relabelings:
        - regex: endpoint|namespace|pod|service|container|instance
          action: labeldrop
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
        - targetLabel: tier
          replacement: cluster
        - sourceLabels: [__meta_kubernetes_pod_ready]
          regex: "true"
          action: keep
{{- end }}
