{{- if or .Values.istio.federation.enabled .Values.istio.multicluster.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alliance-healthcheck
  namespace: d8-{{ $.Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "alliance-healthcheck")) | nindent 2 }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:istio:alliance:healthcheck
  {{- include "helm_lib_module_labels" (list . (dict "app" "alliance-healthcheck")) | nindent 2 }}
rules:
- apiGroups: ["deckhouse.io"]
  resources:
  - istiofederations
  - istiomulticlusters
  verbs:
  - get
  - list
  - watch
- apiGroups: ["deckhouse.io"]
  resources:
  - istiofederations/status
  - istiomulticlusters/status
  verbs:
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:istio:alliance:healthcheck
  {{- include "helm_lib_module_labels" (list . (dict "app" "alliance-healthcheck")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:istio:alliance:healthcheck
subjects:
- kind: ServiceAccount
  name: alliance-healthcheck
  namespace: d8-{{ $.Chart.Name }}
{{- end }}
