apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: istiomulticlusters.deckhouse.io
  labels:
    heritage: deckhouse
    module: istio
    backup.deckhouse.io/cluster-config: "true"
spec:
  group: deckhouse.io
  scope: Cluster
  names:
    plural: istiomulticlusters
    singular: istiomulticluster
    kind: IstioMulticluster
  preserveUnknownFields: false
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: |
            Custom resource for setting remote cluster as trusted one.
          x-doc-d8Editions:
            - ee
            - cse-pro
          required:
          - spec
          properties:
            spec:
              type: object
              x-doc-d8Editions:
                - ee
                - cse-pro
              required:
              - metadataEndpoint
              properties:
                enableIngressGateway:
                  type: boolean
                  default: true
                  x-doc-d8Editions:
                    - ee
                    - cse-pro
                  description: |
                    Using IngressGateway for accessing remote Pods.

                    If remote Pods are accessible directly from our cluster (flat network), it is efficient not to use extra hop.
                metadataEndpoint:
                  type: string
                  x-doc-d8Editions:
                    - ee
                    - cse-pro
                  description: |
                    HTTPS endpoint with remote cluster metadata.
                  x-kubernetes-validations:
                    - rule: "isURL(self)"
                      message: "must be a valid URL"
                    - rule: "url(self).getScheme() == 'https'"
                      message: "must use https"
                    - rule: "url(self).getHost() != ''"
                      message: "must include a host"
                    - rule: "url(self).getQuery().size() == 0"
                      message: "query parameters are not allowed"
                    - rule: "!self.contains('#')"
                      message: "fragments are not allowed"
                  x-doc-examples: ['https://istio.k8s.example.com/metadata/']
                metadata:
                  type: object
                  properties:
                    ca:
                      type: string
                      x-doc-d8Editions:
                        - ee
                        - cse-pro
                      description: |
                        HTTPS certificate authority for remote cluster metadata.
                    insecureSkipVerify:
                      type: boolean
                      x-doc-d8Editions:
                        - ee
                        - cse-pro
                      description: |
                        HTTPS check or not for remote cluster metadata.
                      default: false
                      x-doc-examples: [true]
            status:
              type: object
              properties:
                conditions:
                  type: array
                  description: |
                    Readiness of metadata exchange with the remote cluster.

                    - `PublicMetadataExchangeReady` — remote `public.json` is reachable and valid.
                    - `PrivateMetadataExchangeReady` — remote private metadata is reachable and valid.
                    - `RemoteAPIServerReady` — remote multicluster API host (`apiHost`) serves the authenticated `/api` endpoint.
                    - `DataplaneConnectionReady` — cross-cluster dataplane health probe to the remote `alliance-healthcheck` service succeeded.
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - reason
                      - message
                      - lastTransitionTime
                      - lastProbeTime
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - "Unknown"
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      lastProbeTime:
                        type: string
                        format: date-time
                metadataCache:
                  type: object
                  properties:
                    public:
                      type: object
                      properties:
                        rootCA:
                          type: string
                        authnKeyPub:
                          type: string
                        clusterUUID:
                          type: string
                    private:
                      type: object
                      properties:
                        apiHost:
                          type: string
                        networkName:
                          type: string
                        ingressGateways:
                          type: array
                          items:
                            type: object
                            properties:
                              address:
                                type: string
                              port:
                                type: integer
                        ca:
                          type: string
