---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: common/shell-operator
import:
  - artifact: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
    add: /usr/bin
    to: /usr/bin
    before: setup
    includePaths:
    - python3
    - python3.12
  - artifact: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
    add: /usr/lib/python3
    to: /usr/lib/python3
    before: setup
  - artifact: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
    add: /usr/lib64/python3
    to: /usr/lib64/python3
    before: setup
  - artifact: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
    add: /usr/lib64/python3.12
    to: /usr/lib64/python3.12
    before: setup
  - artifact: {{ $.ModuleName }}/falco-artifact
    add: /falco-package
    to: /
    includePaths:
    - usr/bin/
    - usr/share/
    before: install
git:
- add: /{{ $.ModulePath }}modules/650-{{ $.ModuleName }}/images/{{ $.ImageName }}/hooks
  to: /hooks
  stageDependencies:
    install:
    - '**/*'
docker:
  ENV:
    SHELL_OPERATOR_HOOKS_DIR: "/hooks"
    LOG_TYPE: json
    PYTHONPATH: "/hooks"
  ENTRYPOINT: ["tini", "--", "/shell-operator"]
  CMD: ["start"]
---
artifact: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
from: {{ $.Images.BASE_ALT_P11 }}
git:
- add: /{{ $.ModulePath }}modules/650-{{ $.ModuleName }}/images/{{ $.ImageName }}/requirements.txt
  to: /requirements.txt
  stageDependencies:
    install:
    - '**/*'
shell:
  install:
    - set -x
    - apt-get update
    - apt-get install -y python3 python3-module-pip-run
    - pip3 install -r /requirements.txt
