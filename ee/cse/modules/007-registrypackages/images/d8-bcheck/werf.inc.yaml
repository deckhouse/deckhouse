{{- $version := "0.1" }}
{{- $image_version := $version | replace "." "-" }}
---
image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact-{{ $image_version }}
final: false
fromImage: common/src-artifact
git:
- add: /{{ .ModulePath }}modules/{{ .ModulePriority }}-{{ .ModuleName }}/images/{{ .ImageName }}/scripts
  to: /src/scripts
  stageDependencies:
    setup:
    - '**/*'
- add: /{{ .ModulePath }}modules/{{ .ModulePriority }}-{{ .ModuleName }}/images/{{ .ImageName }}/src
  to: /src/d8-bcheck
  stageDependencies:
    setup:
    - '**/*'
shell:
  install:
  - cd /src
---
image: {{ .ModuleName }}/{{ .ImageName }}-{{ $image_version }}
from: {{ index .Images "builder/scratch" }}
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-artifact-{{ $image_version }}
  add: /
  to: /
  includePaths:
  - d8-bcheck
  - install
  - uninstall
  before: setup
imageSpec:
  config:
    labels: {"distro": "all", "version": "all", "d8-bcheck": "{{ $version }}" }
    clearUser: true
    clearWorkingDir: true
    clearCmd: true
    clearEntrypoint: true
    removeEnv: ["/.*/"]
---
image: {{ .ModuleName }}/{{ .ImageName }}-artifact-{{ $image_version }}
final: false
from: {{ index .Images "builder/golang-alpine" }}
mount:
{{ include "mount points for golang builds" . }}
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact-{{ $image_version }}
  add: /src
  to: /src
  before: install
- image: {{ index .Images "libs/musl" }}
  add: /
  to: /
  before: install
  includePaths:
    - lib/ld-musl-x86_64.so.1
    - usr/bin
    - usr/lib
    - usr/lib64
    - usr/include
- image: {{ index .Images "libs/zstd" }}
  add: /
  to: /libs/zstd
  before: install
  includePaths:
    - usr/lib
    - usr/lib64
    - usr/include
    - usr/bin
    - usr/sbin
    - usr/share
- image: {{ index .Images "libs/libuv" }}
  add: /
  to: /libs/libuv
  before: install
  includePaths:
    - usr/lib
    - usr/lib64
    - usr/include
    - usr/bin
    - usr/sbin
    - usr/share
- image: {{ index .Images "libs/zlib" }}
  add: /
  to: /libs/zlib
  before: install
  includePaths:
    - usr/lib
    - usr/lib64
    - usr/include
    - usr/bin
    - usr/sbin
    - usr/share
- image: {{ index .Images "tools/openssl" }}
  add: /
  to: /tools/openssl
  before: install
  includePaths:
    - usr/lib
    - usr/lib64
    - usr/include
    - usr/bin
    - usr/sbin
    - usr/share
- image: {{ index .Images "tools/elfutils" }}
  add: /
  to: /tools/elfutils
  before: install
  includePaths:
    - usr/lib
    - usr/lib64
    - usr/include
    - usr/bin
    - usr/sbin
    - usr/share
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  beforeInstall:
  {{- include "alpine packages proxy" . | nindent 2 }}
  - apk add --no-cache build-base rsync
  install:
  - |
    if [[ -d /libs ]]; then
        for lib in $(ls -1 /libs); do
          cd /libs/${lib}
          rsync -aulv * /
        done
      rm -rf /libs
    fi
  - |
    if [[ -d /tools ]]; then
      for tool in $(ls -1 /tools); do
        cd /tools/${tool}
        rsync -aulv * /
      done
      rm -rf /tools
    fi
  - ln -s /usr/lib/libuv.a /usr/lib/libuv_a.a
  - cd /src/d8-bcheck
  - export GOPROXY=$(cat /run/secrets/GOPROXY)
  - CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o /d8-bcheck d8-bcheck.go
  - mv /src/scripts/* /
