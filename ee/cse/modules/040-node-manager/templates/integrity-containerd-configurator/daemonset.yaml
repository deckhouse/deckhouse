{{- define "integrity_containerd_configurator_resources" }}
cpu: 25m
memory: 50Mi
{{- end }}

{{- if .Values.nodeManager.internal.containerdIntegrityControllerEnabled }}
{{- if (.Values.global.enabledModules | has "vertical-pod-autoscaler") }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: integrity-containerd-configurator
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "integrity-containerd-configurator")) | nindent 2 }}
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: DaemonSet
    name: integrity-containerd-configurator
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
  resourcePolicy:
    containerPolicies:
    - containerName: "integrity-containerd-configurator"
      minAllowed:
        {{- include "integrity_containerd_configurator_resources" . | nindent 8 }}
      maxAllowed:
        cpu: 50m
        memory: 50Mi
{{- end }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: integrity-containerd-configurator
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "integrity-containerd-configurator")) | nindent 2 }}
spec:
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app: integrity-containerd-configurator
  template:
    metadata:
      labels:
        app: integrity-containerd-configurator
        security.deckhouse.io/security-policy-exception: integrity-containerd-configurator
    spec:
      {{- include "helm_lib_priority_class" (tuple . "system-node-critical") | nindent 6 }}
      {{- include "helm_lib_tolerations" (tuple . "any-node" "with-uninitialized") | nindent 6 }}
      nodeSelector:
        node.deckhouse.io/cri-type: containerdv2
      {{- include "helm_lib_module_pod_security_context_run_as_user_root" . | nindent 6 }}
      automountServiceAccountToken: true
      serviceAccountName: integrity-containerd-configurator
      terminationGracePeriodSeconds: 10
      imagePullSecrets:
      - name: deckhouse-registry
      containers:
      - name: integrity-containerd-configurator
        image: {{ include "helm_lib_module_image" (list . "integrityContainerdConfigurator") }}
        {{- include "helm_lib_module_container_security_context_read_only_root_filesystem_capabilities_drop_all" dict | nindent 8 }}
        command:
        - /integrity-containerd-configurator
        args:
        - --health-probe-bind-address=0.0.0.0:8081
        - --config-dir=/host/etc/containerd/integrity
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            {{- include "helm_lib_module_ephemeral_storage_only_logs" . | nindent 12 }}
{{- if not ( .Values.global.enabledModules | has "vertical-pod-autoscaler") }}
            {{- include "integrity_containerd_configurator_resources" . | nindent 12 }}
{{- end }}
        volumeMounts:
        - name: containerd-integrity
          mountPath: /host/etc/containerd/integrity
      volumes:
      - name: containerd-integrity
        hostPath:
          path: /etc/containerd/integrity
          type: DirectoryOrCreate
{{- end }}
