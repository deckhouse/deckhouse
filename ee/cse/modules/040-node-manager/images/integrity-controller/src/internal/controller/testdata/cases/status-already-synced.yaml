---
apiVersion: v1
kind: Namespace
metadata:
  name: ns-1
  labels:
    foo: bar
---
apiVersion: v1
kind: Namespace
metadata:
  name: ns-2
  labels:
    foo: bar
    env: prod
---
apiVersion: v1
kind: Namespace
metadata:
  name: ns-3
  labels:
    foo: baz
---
apiVersion: deckhouse.io/v1alpha1
kind: ContainerdIntegrityPolicy
metadata:
  name: default
spec:
  ca: test-ca
  protectedNamespaces:
    matchLabels:
      foo: bar
status:
  protectedNamespaces:
    - ns-1
    - ns-2
