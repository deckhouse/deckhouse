apiVersion: deckhouse.io/v1alpha1
kind: ClusterLoggingConfig
metadata:
  name: loki-deckhouse-file-path
  {{- include "helm_lib_module_labels" (list . (dict "app" $.Chart.Name)) | nindent 2 }}
spec:
  destinationRefs:
    - d8-loki
  file:
    include:
      - /var/log/kube-audit/audit.log
  type: File
