{{- define "security_noises_falco_data" -}}
noises:
  - regex: '.*Falco metrics snapshot.*'
    description: "Periodic Falco self-metrics JSON snapshot emitted by the Falco process itself for health and throughput telemetry"
    example: >-
      07:38:11.405403981: Falco metrics snapshot
      {"cpu_usage_perc":0.1,"memory_rss_kb":88612,"n_evts":14353,"n_drops":0,"n_store_evts":14353,"n_retrieve_evts":14353}

  - regex: '.*command=(ip6tables|iptables) .* pcmdline=cilium-agent.*'
    description: "iptables/ip6tables command executed by cilium-agent (pcmdline=cilium-agent) during Cilium dataplane rule reconciliation on the node"
    example: >-
      06:12:44.120001234: Error Drift detected (open+create), new executable
      created in a container (user=root user_loginuid=-1 command=iptables -A CILIUM_OUTPUT -m comment --comment cilium-forward -j ACCEPT
      pid=28431 pcmdline=cilium-agent gparent=containerd-shim-runc-v2
      container_id=host image= name=/usr/sbin/iptables mode=0755 event=openat)

  - regex: '.*command=cilium-operator --config-dir=/tmp/cilium/config-map --leader-election-lease-duration=25s --leader-election-renew-deadline=20s.*'
    description: "cilium-operator startup command with leader-election lease parameters while operator components bootstrap and acquire leadership"
    example: >-
      06:13:01.553210987: Error Drift detected (open+create), new executable
      created in a container (user=<NA> user_loginuid=-1 command=cilium-operator --config-dir=/tmp/cilium/config-map --leader-election-lease-duration=25s --leader-election-renew-deadline=20s
      pid=1456 pcmdline=/pause gparent=<NA> container_id=1c2a3e4f
      image=quay.io/cilium/operator-generic:v1.14.6
      name=/tmp/cilium/config-map/config.yaml mode=0644 event=openat)
 
  - regex: '.*command=lvm\.static (vgs|lvs).*'
    description: "lvm.static vgs/lvs inventory commands reading volume-group and logical-volume metadata during node storage discovery"
    example: >-
      06:21:17.003456789: Error Drift detected (open+create), new executable
      created in a container (user=root user_loginuid=-1 command=lvm.static vgs -o +uuid,tags,shared --units B --nosuffix --reportformat json
      pid=1097518 pcmdline=node-monitor gparent=systemd container_id=host
      image= filename=<NA> name=/run/lock/lvm/V_root mode=0777 event=openat)

  - regex: '.*name=/run/lock/lvm/(V_root(:aux)?|P_global(:aux)?).*'
    description: "LVM lock files under /run/lock/lvm (V_root/P_global and :aux variants) touched during concurrent LVM scan/metadata locking"
    example: >-
      06:21:17.004234567: Error Drift detected (open+create), new executable
      created in a container (user=root user_loginuid=-1 command=lvm.static lvs -o +vg_uuid,tags,thin_id,metadata_lv,lv_dm_path --units B --nosuffix --all --reportformat json
      pid=1097516 pcmdline=node-monitor gparent=systemd container_id=host
      image= filename=<NA> name=/run/lock/lvm/P_global:aux mode=0777 event=openat)
  
  - regex: '.*Drift detected \(chmod\).*command=cp -a /var/lib/cilium-rw/bpf /var/lib/cilium/.*'
    description: "cp -a from /var/lib/cilium-rw/bpf to /var/lib/cilium with chmod events while Cilium synchronizes BPF runtime assets"
    example: >-
      06:25:10.998765432: Error Drift detected (chmod), new executable created
      in a container (user=root user_loginuid=-1 command=cp -a /var/lib/cilium-rw/bpf /var/lib/cilium/ pid=7812 pcmdline=cilium-agent
      gparent=containerd-shim-runc-v2 container_id=host image=
      filename=/var/lib/cilium/bpf/tc/globals/cilium_policy_112 name=<NA>
      mode=0644 event=chmod)
  
  - regex: '.*Drift detected \(chmod\).*command=virt-handler .*filename=/var/lib/kubevirt/init/usr/bin/container-disk.*event=fchmodat.*'
    description: "virt-handler chmod/fchmodat on /var/lib/kubevirt/init/usr/bin/container-disk when KubeVirt prepares init helper binary permissions"
    example: >-
      06:26:33.010203040: Error Drift detected (chmod), new executable created
      in a container (user=root user_loginuid=-1 command=virt-handler --hostname-override=worker-0 --pod-ip=10.111.0.24 pid=6321
      pcmdline=/usr/bin/virt-handler gparent=containerd-shim-runc-v2
      container_id=7a9b3c image=quay.io/kubevirt/virt-handler:v1.2.0
      filename=/var/lib/kubevirt/init/usr/bin/container-disk name=<NA>
      mode=0755 event=fchmodat)
  
  - regex: '.*command=nginx-ingress-c.*'
    description: "nginx-ingress-controller process activity (command=nginx-ingress-c*) opening/creating temporary runtime config artifacts"
    example: >-
      06:28:44.100200300: Error Drift detected (open+create), new executable
      created in a container (user=101 user_loginuid=-1 command=nginx-ingress-controller --configmap=d8-ingress-nginx/nginx-configuration --publish-service=d8-ingress-nginx/ingress-nginx-controller
      pid=5422 pcmdline=/pause gparent=<NA> container_id=8ab4ef
      image=registry.k8s.io/ingress-nginx/controller:v1.10.1 filename=<NA>
      name=/tmp/nginx/nginx-cfg18273645 mode=0644 event=openat)

  - regex: '.*command=cp -r /available_hooks/modules/[^ ]+ /hooks.*'
    description: "cp -r /available_hooks/modules/<module> /hooks when Deckhouse materializes module hooks during startup or reconcile loops"
    example: >-
      06:30:55.778899001: Error Drift detected (open+create), new executable
      created in a container (user=<NA> user_loginuid=-1 command=cp -r /available_hooks/modules/150-user-authn /hooks pid=13943
      pcmdline=/bin/bash /deckhouse/start.sh gparent=<NA> container_id=0f12ab
      image=dev-registry-cse.deckhouse.ru/sys/deckhouse-cse filename=<NA>
      name=/hooks/150-user-authn/webhooks/validating/user.py mode=0755 event=openat)

  - regex: '.*File below known binary directory renamed/removed.*command=(ip6tables|iptables) .*OLD_CILIUM_[^ ]+.*(name=iptables\(/usr/sbin/iptables\)|name=/usr/sbin/iptables).*image=.*deckhouse-cse.*'
    description: "Modify binary dirs events from iptables/ip6tables OLD_CILIUM_* chain cleanup in deckhouse-cse container during Cilium rule garbage collection"
    example: >-
      06:55:31.952712224: Error File below known binary directory
      renamed/removed (user=root user_loginuid=-1 command=iptables -w 5 -t filter -X OLD_CILIUM_FORWARD pid=1131944 pcmdline=<NA>
      operation=unlinkat file=/usr/sbin res=-30(EROFS) dirfd=3(<f>/usr/sbin)
      name=iptables(/usr/sbin/iptables) flags=0 container_id=d2c5de433c73
      image=dev-registry-cse.deckhouse.ru/sys/deckhouse-cse)

  - regex: '.*Drift detected \(chmod\).*command=upmeter start .*event=fchmod.*'
    description: "upmeter start emits fchmod/chmod events while initializing executable files and runtime artifacts during probe service startup"
    example: >-
      06:41:22.110022003: Error Drift detected (chmod), new executable created
      in a container (user=<NA> user_loginuid=-1 command=upmeter start --origins=1 --user-agent=Upmeter/1.0 (Deckhouse CSE v1.73.0) --storage-path=/db/downtime.db
      pid=9021 pcmdline=/pause gparent=<NA> container_id=4f2e1d
      image=dev-registry-cse.deckhouse.ru/sys/upmeter
      filename=/usr/local/bin/upmeter name=<NA> mode=0755 event=fchmod)

  - regex: '.*Drift detected \(open\+create\).*command=upmeter start .*name=/db/downtime\.db\.sqlite-journal.*event=open.*'
    description: "upmeter start creates/opens /db/downtime.db.sqlite-journal during SQLite journaling for downtime database transactions"
    example: >-
      06:41:22.210033004: Error Drift detected (open+create), new executable
      created in a container (user=<NA> user_loginuid=-1 command=upmeter start --origins=1 --user-agent=Upmeter/1.0 (Deckhouse CSE v1.73.0) --storage-path=/db/downtime.db
      pid=9021 pcmdline=/pause gparent=<NA> container_id=4f2e1d
      image=dev-registry-cse.deckhouse.ru/sys/upmeter filename=<NA>
      name=/db/downtime.db.sqlite-journal mode=0777 event=open)

  - regex: '.*user=system:serviceaccount:d8-system:deckhouse pod=prometheus-(longterm|main)-\d resource=pods ns=d8-monitoring action=exec command=df.*'
    description: "deckhouse serviceaccount executes 'df' in prometheus-main/longterm pods in d8-monitoring to collect volume usage information"
    example: >-
      06:45:09.501002003: Notice Attach/Exec to pod
      (user=system:serviceaccount:d8-system:deckhouse pod=prometheus-main-0
      resource=pods ns=d8-monitoring action=exec command=df -PT /prometheus)

  - regex: '.*upmeter-probe-namespace.*'
    description: "Events referencing upmeter-probe-namespace generated by short-lived synthetic namespaces created for Upmeter probe checks"
    example: >-
      06:46:17.345678901: Notice K8s Pod Created
      (user=system:serviceaccount:d8-upmeter:upmeter-probe-manager
      pod=webhook-check-7x9qp resource=pods ns=upmeter-probe-namespace-5b8d4
      action=create)

  - regex: '.*manager --enable-leader-election.*'
    description: "controller-manager process with --enable-leader-election flags while operator components coordinate lease ownership"
    example: >-
      06:48:55.321654987: Error Drift detected (open+create), new executable
      created in a container (user=65532 user_loginuid=-1 command=manager --enable-leader-election --metrics-addr=:8080 --health-probe-addr=:8000 --logtostderr=true --leader-election-namespace=d8-ingress-nginx
      pid=4112 pcmdline=/pause gparent=<NA> container_id=9be321
      image=ghcr.io/openkruise/kruise-manager:v1.6.2 filename=<NA>
      name=/tmp/kruise-webhook-certs/tls.crt mode=0644 event=openat)

  - regex: '.*filename=/tmp/[0-9a-f]+/etc/kubernetes/deckhouse name=.*'
    description: "deckhouse binary extracted to /tmp/<sha>/etc/kubernetes/deckhouse (exact file path) during temporary unpack stage before execution"
    example: >-
      06:50:44.987654321: Error new executable created in a container
      (  
      pcmdline=/bin/bash /deckhouse/start.sh gparent=<NA> container_id=host
      image= filename=/tmp/cac912e8605cafa636a779d728e15fe9d3b45607d2125f9503e6caab2585d2eb/etc/kubernetes/deckhouse
      name=<NA> mode=S_IXUSR|S_IWUSR|S_IRUSR event=fchmodat)
{{- end -}}
---
apiVersion: deckhouse.io/v1alpha2
kind: ClusterLoggingConfig
metadata:
  {{- include "helm_lib_module_labels" (list . (dict "app" $.Chart.Name "kind" "security-events")) | nindent 2 }}
  name: se-runtime-audit-engine
spec:
  type: KubernetesPods
  destinationRefs:
    - se-d8-loki
  labelFilter:
    - field: message
      operator: Regex
      values:
        - '^\{.+'
    - field: container
      operator: In
      values: ["falco"]
    - field: message
      operator: NotRegex
      values:
        {{- $data := include "security_noises_falco_data" . | fromYaml }}
        {{- range $data.noises }}
        - {{ .regex | quote }} # {{ .description }}{{ if .example }} e.g. {{ .example }}{{ end }}
        {{- end }}
  kubernetesPods:
    namespaceSelector:
      labelSelector:
        matchLabels:
          "kubernetes.io/metadata.name": d8-runtime-audit-engine
    labelSelector:
      matchLabels:
        app: runtime-audit-engine
---
apiVersion: deckhouse.io/v1alpha2
kind: ClusterLoggingConfig
metadata:
  {{- include "helm_lib_module_labels" (list . (dict "app" $.Chart.Name "kind" "security-events")) | nindent 2 }}
  name: se-user-authn
spec:
  type: KubernetesPods
  destinationRefs:
    - se-d8-loki
  labelFilter:
    - field: message
      operator: Regex
      values:
        - .*(failed login attempt|login successful).*
    - field: container
      operator: In
      values: ["dex"]
  kubernetesPods:
    namespaceSelector:
      labelSelector:
        matchLabels:
          "kubernetes.io/metadata.name": d8-user-authn
    labelSelector:
      matchLabels:
        app: dex

---
apiVersion: deckhouse.io/v1alpha2
kind: ClusterLoggingConfig
metadata:
  {{- include "helm_lib_module_labels" (list . (dict "app" $.Chart.Name "kind" "security-events")) | nindent 2 }}
  name: se-virtualization
spec:
  type: KubernetesPods
  destinationRefs:
    - se-d8-loki
  labelFilter:
    - field: message
      operator: Regex
      values:
        - '^\{.+'
    - field: container
      operator: In
      values: ["virtualization-audit"]
  kubernetesPods:
    namespaceSelector:
      labelSelector:
        matchLabels:
          "kubernetes.io/metadata.name": d8-virtualization
    labelSelector:
      matchLabels:
        app: virtualization-audit
---
apiVersion: deckhouse.io/v1alpha2
kind: ClusterLoggingConfig
metadata:
  name: se-containerd-verification-failed
  {{- include "helm_lib_module_labels" (list . (dict "app" $.Chart.Name "kind" "security-events")) | nindent 2 }}
spec:
  destinationRefs:
    - se-d8-loki
  file:
    include:
      - /var/log/containerd/containerd-integrity.log
  labelFilter:
    - field: message
      operator: NotRegex
      values:
        - .*namespace=d8-upmeter.* # e.g. ... namespace=d8-upmeter ... (Upmeter-related integrity lines, platform noise)
  type: File
---
apiVersion: deckhouse.io/v1alpha1
kind: ClusterLogDestination
metadata:
  {{- include "helm_lib_module_labels" (list . (dict "app" $.Chart.Name "kind" "security-events")) | nindent 2 }}
  name: se-d8-loki
spec:
  loki:
    endpoint: "https://loki.d8-monitoring:3100"
    auth:
      strategy: "Bearer"
      token: {{ .Values.loki.internal.logShipperToken | quote }}
    tls:
      verifyHostname: false
      verifyCertificate: false
  type: Loki
  extraLabels:
    deckhouse_io_type: "security-event"