{{- if .Values.userAuthz.enableMultiTenancy }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhook
  namespace: d8-user-authz
  {{- include "helm_lib_module_labels" (list . (dict "app" "webhook")) | nindent 2 }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:user-authz:webhook
  {{- include "helm_lib_module_labels" (list . (dict "app" "webhook")) | nindent 2 }}
rules:
- nonResourceURLs: ["/version", "/api/v1", "/apis/*"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
# Needed for the CAR-independent RBAC grants check: requests allowed by
# RoleBindings or by ClusterRoleBindings not generated from a
# ClusterAuthorizationRule must not be denied by the webhook.
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:user-authz:webhook
  {{- include "helm_lib_module_labels" (list . (dict "app" "webhook")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:user-authz:webhook
subjects:
  - kind: ServiceAccount
    name: webhook
    namespace: d8-user-authz
{{- end }}
