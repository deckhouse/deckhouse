---
image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
git:
- add: /{{ $.ModulePath }}modules/{{ $.ModulePriority }}-{{ $.ModuleName }}/images/{{ $.ImageName }}/src
  to: /src
  excludePaths:
  - "**/*.md"
  - "**/*.yaml"
  - hack
  stageDependencies:
    install:
    - go.mod
    - go.sum
    - "**/*.go"
shell:
  install:
    - cd /src
---
image: {{ .ModuleName }}/{{ .ImageName }}-artifact
from: {{ index $.Images ( eq $.SVACE_ENABLED "false" | ternary "builder/golang-alpine" "builder/golang-alt-svace" ) }}
final: false
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  install:
  - export GOPROXY=$(cat /run/secrets/GOPROXY) CGO_ENABLED=0 GOOS=linux GOARCH=amd64
  - cd /src
  - |
    {{- include "image-build.build" (set $ "BuildCommand" `go build -ldflags '-s -w' -o permission-browser-apiserver .`) | indent 4 }}
  - chown 64535:64535 permission-browser-apiserver
  - chmod 0700 permission-browser-apiserver
---
image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: common/distroless
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
  add: /src/permission-browser-apiserver
  to: /permission-browser-apiserver
  before: setup
{{- include "image mount points" . }}
imageSpec:
  config:
    # Category A TLS profile (deckhouse TLS standard, see
    # go_lib/hooks/tls_certificate/README.md): permission-browser is an
    # aggregated extension API server reached only through kube-apiserver
    # aggregation, so we pin the handshake floor to TLS 1.3 and let Go
    # pick the fixed AEAD cipher suite list.
    entrypoint: ["/permission-browser-apiserver", "--tls-min-version", "VersionTLS13"]
