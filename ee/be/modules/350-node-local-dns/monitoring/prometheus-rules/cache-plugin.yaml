- name: d8.node-local-dns.cache
  rules:
    - alert: D8NodeLocalDNSCacheSuccessEvictionsHigh
      expr: |
        increase(coredns_cache_evictions_total{type="success", pod=~"node-local-dns-.*"}[5m]) > 100
      for: 5m
      labels:
        severity_level: "5"
        tier: cluster
      annotations:
        plk_markup_format: markdown
        plk_protocol_version: "1"
        summary: node-local-dns success cache is being frequently evicted.
        description: |
          The `success` cache in the `node-local-dns` pod is frequently evicting entries (more than 100 evictions in 5 minutes).

          This may indicate that the success cache size (e.g. `success 39936`) is too small to hold hot DNS records.

          Consider increasing the cache capacity in the node-local-dns config if eviction is unexpected.

          Example pod:
          ```
          {{$labels.pod}} (node {{$labels.node}})
          ```

    - alert: D8NodeLocalDNSCacheDenialEvictionsHigh
      expr: |
        increase(coredns_cache_evictions_total{type="denial", pod=~"node-local-dns-.*"}[5m]) > 100
      for: 5m
      labels:
        severity_level: "5"
        tier: cluster
      annotations:
        plk_markup_format: markdown
        plk_protocol_version: "1"
        summary: node-local-dns denial cache is being frequently evicted.
        description: |
          The `denial` cache (NXDOMAIN responses) in `node-local-dns` is frequently evicting entries.

          This may increase load on kube-dns and slow down DNS propagation when services or pods appear.

          Consider increasing the denial cache size (e.g. `denial 2500`) in the node-local-dns configuration.

          Example pod:
          ```
          {{$labels.pod}} (node {{$labels.node}})
          ```

    - alert: D8NodeLocalDNSServingStaleRecords
      expr: |
        increase(coredns_cache_served_stale_total{pod=~"node-local-dns-.*"}[5m]) > 0
      for: 10m
      labels:
        severity_level: "4"
        tier: cluster
      annotations:
        plk_markup_format: markdown
        plk_protocol_version: "1"
        summary: node-local-dns is serving stale DNS entries.
        description: |
          `node-local-dns` is responding with expired DNS records (`serve_stale`), which indicates it cannot reach its upstream (e.g., `d8-kube-dns`).

          This usually happens when kube-dns is slow or unavailable, and may cause clients to receive outdated IPs.

          Check the health of kube-dns and underlying networking.

          Example pod:
          ```
          {{$labels.pod}} (node {{$labels.node}})
          ```

          Example command:
          ```bash
          kubectl get pods -n kube-system -l k8s-app=kube-dns
          ```
