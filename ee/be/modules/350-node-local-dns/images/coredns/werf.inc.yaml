{{- $iptables_version := "1.8.9" }}
{{- $iptables_image_version := $iptables_version | replace "." "-" }}
---
image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
git:
- add: /{{ $.ModulePath }}modules/350-{{ $.ModuleName }}/images/{{ $.ImageName }}/patches
  to: /patches
  stageDependencies:
    install:
    - '**/*'
shell:
  install:
  - cd /src
  - git clone --depth 1 {{ $.SOURCE_REPO }}/coredns/coredns.git --branch "v1.12.0" /src
  - git apply /patches/*.patch --verbose
  - rm -r .git
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
from: {{ $.Images.BASE_GOLANG_23_ALPINE }}
final: false
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
git:
- add: /{{ $.ModulePath }}modules/350-{{ $.ModuleName }}/images/{{ $.ImageName }}
  to: /src
  stageDependencies:
    install:
    - '**/*'
  includePaths:
    - '*.sh'
mount:
- fromPath: ~/go-pkg-cache
  to: /go/pkg
shell:
  beforeInstall:
  {{- include "alpine packages proxy" $ | nindent 2 }}
  - apk add --no-cache make bash rsync
  install:
  - export GO_VERSION=${GOLANG_VERSION}
  - export GOPROXY={{ $.GOPROXY }}
  - cd /src
  - go mod tidy
  - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -v -ldflags="-s -w" -o coredns
  - chmod -R 0700 /src/coredns
  - chown -R 64535:64535 /src/coredns
  - chmod -R 0700 /src/*.sh
  - chown -R 64535:64535 /src/*.sh
---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: common/distroless
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
  add: /relocate
  to: /
  before: setup
- image: registrypackages/iptables-artifact-{{ $iptables_image_version }}
  add: /
  to: /sbin
  includePaths:
  - xtables-legacy-multi
  - xtables-nft-multi
  before: setup
- image: common/iptables-wrapper
  add: /iptables-wrapper
  to: /sbin/iptables-wrapper
  before: setup
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
  add: /src/coredns
  to: /coredns
  before: setup
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
  add: /src
  to: /
  includePaths:
  - '**/*.sh'
  before: setup
docker:
  ENTRYPOINT: ["/coredns"]
---
{{ $corednsBinaries := "/usr/bin/dig /bin/echo /usr/bin/curl /usr/bin/jq /bin/bash /bin/grep /sbin/ip" }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
fromImage: common/relocate-artifact
final: false
shell:
  beforeInstall:
    - apt-get update -y
    - apt-get install -y bind-utils curl jq
    - rm -rf /var/lib/apt/lists/* /var/cache/apt/* && mkdir -p /var/lib/apt/lists/partial /var/cache/apt/archives/partial
  install:
    - /binary_replace.sh -i "{{ $corednsBinaries }}" -o /relocate
    - |
      for cmd in iptables iptables-save iptables-restore ip6tables ip6tables-save ip6tables-restore; do
        rm -f "/relocate/sbin/${cmd}"
        ln -s /sbin/iptables-wrapper "/relocate/sbin/${cmd}"
      done
    - |
      for mode in legacy nft; do
        for basecmd in iptables ip6tables; do
          for cmd in ${basecmd}-${mode} ${basecmd}-${mode}-save ${basecmd}-${mode}-restore; do
            ln -sf /sbin/xtables-${mode}-multi "/relocate/sbin/${cmd}"
          done
        done
      done
