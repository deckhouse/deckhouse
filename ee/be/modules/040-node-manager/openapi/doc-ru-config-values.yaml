properties:
  earlyOomEnabled:
    description: |
      Флаг отключения early OOM killer для случаев, когда его работа создаёт проблемы в нормальной работе узлов.
  instancePrefix:
    description: |
      Префикс, который следует использовать при создании инстансов в cloud-провайдере.

      Значение по умолчанию может вычисляться из данных структуры `ClusterConfiguration`, если кластер был установлен установщиком Deckhouse.
  mcmEmergencyBrake:
    description: |
      Флаг отключения `machine-controller-manager` для случаев, когда вносятся потенциально опасные изменения.

      > **Внимание.** Используйте только в полном осознании зачем это делается.
  capiEmergencyBrake:
    description: |
      Флаг отключения `CAPI` для случаев, когда вносятся потенциально опасные изменения.

      > **Внимание.** Используйте этот флаг только в том случае, если вы знаете, зачем это делаете, и четко понимаете последствия.
  clusterAutoscaler:
    description: |
      Параметры Cluster Autoscaler.
    properties:
      newPodScaleUpDelay:
        description: |
          Поды, возраст которых меньше указанного значения, не учитываются при принятии решения о масштабировании вверх.

          Чтобы переопределить значение для отдельных подов, используйте аннотацию `cluster-autoscaler.kubernetes.io/pod-scale-up-delay`.

          Полезно для сценариев с HPA, когда быстрая смена количества подов не должна приводить к созданию новых узлов.
      minReplicaCount:
        description: |
          Минимальное количество реплик ReplicaSet или ReplicationController, при котором допускается
          удаление их подов при масштабировании вниз.
          
          Если у контроллера меньше реплик, чем указано, его поды не будут вытесняться при удалении узла.

          Значение по умолчанию (`1`) защищает контроллеры с одной репликой от прерывания работы во время масштабирования вниз.
