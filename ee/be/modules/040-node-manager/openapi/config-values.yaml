x-config-version: 2
type: object
properties:
  earlyOomEnabled:
    type: boolean
    default: true
    x-examples:
    - false
    description: |
      Set to 'false' to disable early OOM killer in case it behaves incorrectly.
  instancePrefix:
    type: string
    description: |
      The prefix to use when creating instances via the corresponding cloud provider module.

      The default value can be calculated based on the `ClusterConfiguration` struct if the cluster is installed via the Deckhouse installer.
    x-examples:
      - kube
  mcmEmergencyBrake:
    type: boolean
    default: false
    x-examples:
    - false
    description: |
      Set to 'true' to disable machine-controller-manager in case of potentially cluster-damaging changes.

      > **Warning!** Use this flag only if you know what you are doing and clearly understand the consequences.
  gracefulShutdown:
    type: object
    default: {mode: "Default"}
    description: |
      Settings for the graceful shutdown of the Node.
    properties:
      mode:
        type: string
        x-examples: "BlockByPodLabel"
        enum:
          - "BlockByPodLabel"
          - "Default"
        default: "Default"
        description: |
          Graceful shutdown process mode:
          * `Default`: use original kubelet mechanism of the graceful shutdown.
          * `BlockByPodLabel`: block shutdown process until Pods with the label `pod.deckhouse.io/inhibit-node-shutdown` are present on the Node.
