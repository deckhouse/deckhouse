# The cni-flannel version corresponds to the flanneld version.
# https://github.com/deckhouse/deckhouse/blob/main/modules/035-cni-flannel/images/flanneld/werf.inc.yaml
# https://github.com/flannel-io/flannel/blob/v0.26.2/chart/kube-flannel/values.yaml#L18
{{- $cni_flannel_version := include "get_oss_version_by_id" (list "cni-flannel" $ )  -}}
{{- $cni_version := include "get_oss_version_by_id" (list "kubernetes-cni" $ )  -}}
{{- $image_version := $cni_version | replace "." "-" }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact-{{ $image_version }}
final: false
fromImage: common/src-artifact
git:
- add: /{{ $.ModulePath }}/modules/007-{{ $.ModuleName }}/images/{{ $.ImageName }}/patches
  to: /patches
  stageDependencies:
    install:
    - '**/*'
- add: /{{ $.ModulePath }}/modules/007-{{ $.ModuleName }}/images/{{ $.ImageName }}/scripts
  to: /src/scripts
  stageDependencies:
    install:
    - '**/*'
secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  install:
  - git clone --depth 1 --branch v{{ $cni_version }} $(cat /run/secrets/SOURCE_REPO)/containernetworking/plugins.git /src/plugins
  - cd /src/plugins
  - git apply /patches/plugins/*.patch --verbose
  - rm -rf .git
  - git clone --depth 1 --branch v{{ $cni_flannel_version }} $(cat /run/secrets/SOURCE_REPO)/flannel-io/cni-plugin.git /src/cni-plugin
  - cd /src/cni-plugin
  - git apply /patches/cni-plugins/*.patch --verbose
  - rm -rf .git
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-{{ $image_version }}
from: {{ index $.Images "builder/scratch" }}
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact-{{ $image_version }}
  add: /
  to: /
  includePaths:
  - bandwidth
  - bridge
  - dhcp
  - dummy
  - firewall
  - host-device
  - host-local
  - ipvlan
  - loopback
  - macvlan
  - portmap
  - ptp
  - sbr
  - static
  - tap
  - tuning
  - vlan
  - vrf
  - flannel
  - install
  - uninstall
  before: setup
imageSpec:
  config:
    labels: {"distro": "all", "version": "all", "kubernetes-cni": "{{ $cni_version }}", "flannel": "{{ $cni_flannel_version }}" }
    clearUser: true
    clearWorkingDir: true
    clearCmd: true
    clearEntrypoint: true
    removeEnv: ["/.*/"]
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact-{{ $image_version }}
final: false
from: {{ index $.Images "builder/golang" }}
mount:
{{ include "mount points for golang builds" . }}
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact-{{ $image_version }}
  add: /src
  to: /src
  before: install
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  beforeInstall:
  - pm install make bash
  setup:
    - export GOPROXY=$(cat /run/secrets/GOPROXY)
    - cd /src/plugins
    - go mod vendor
    - CGO_ENABLED=0 ./build_linux.sh -ldflags '-extldflags -static -X github.com/containernetworking/plugins/pkg/utils/buildversion.BuildVersion={{ $cni_version }}'
    - cp -f bin/* /
    - cd /src/cni-plugin
    - export VERSION=v{{ $cni_flannel_version }}
    - make build_linux
    - mv /src/scripts/* /
    - cp -f /src/cni-plugin/dist/flannel-amd64 /flannel
---

# kubernetes-cni sysext

---
image: {{ $.ModuleName }}/{{ $.ImageName }}-sysext-{{ $image_version }}
from: {{ index $.Images "builder/scratch" }}
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-sysext-artifact-{{ $image_version }}
  add: /out
  to: /
  includePaths:
  - '**/*'
  before: setup
imageSpec:
  config:
    labels: {"distro": "olcedar", "sysext_level": "1.0", "version": "all", "kubernetes-cni": "{{ $cni_version }}", "flannel": "{{ $cni_flannel_version }}" }
    clearUser: true
    clearWorkingDir: true
    clearCmd: true
    clearEntrypoint: true
    removeEnv: ["/.*/"]
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-sysext-artifact-{{ $image_version }}
final: false
from: {{ index $.Images "builder/distroless" }}
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-{{ $image_version }}
  add: /
  to: /sysext/opt/deckhouse/bin
  includePaths:
  - bandwidth
  - bridge
  - dhcp
  - dummy
  - firewall
  - host-device
  - host-local
  - ipvlan
  - loopback
  - macvlan
  - portmap
  - ptp
  - sbr
  - static
  - tap
  - tuning
  - vlan
  - vrf
  - flannel
  - install
  - uninstall
  before: install
git:
- add: /{{ $.ModulePath }}modules/007-{{ $.ModuleName }}/images/{{ $.ImageName }}/sysext
  to: /scripts
  includePaths:
  - extension-release.kubernetes-cni
  - sysext-kubernetes-cni.service
  stageDependencies:
    install:
    - extension-release.kubernetes-cni
    - sysext-kubernetes-cni.service
shell:
  beforeInstall:
  - pm install erofs-utils coreutils cryptsetup
  - mkdir -p /out
  install:
  - mkdir -p /sysext/usr/lib/extension-release.d /sysext/usr/lib/systemd/system
  - cp -f /scripts/sysext-kubernetes-cni.service /sysext/usr/lib/systemd/system/kubernetes-cni.service
  - cp -f /scripts/extension-release.kubernetes-cni /sysext/usr/lib/extension-release.d/
  - mkfs.erofs -L _sysext -U 00000000-0000-0000-0000-000000000000 -z lzma,9 kubernetes-cni.erofs sysext/
  - veritysetup format kubernetes-cni.erofs kubernetes-cni.verity > verity.txt
  - export ROOTHASH=$(awk '/^Root hash:/ {print $3}' verity.txt)
  - cat kubernetes-cni.erofs kubernetes-cni.verity > /out/kubernetes-cni.raw
  - printf '%s\n' "$ROOTHASH" > /out/kubernetes-cni.raw.roothash
