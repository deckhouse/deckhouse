{{- $version_map := include "get_oss_version_map_by_id_and_condition_key" (list "ecr-credential-provider-aws" "k8s" $) | fromYaml }}
{{- range $key, $value := $version_map }}
  {{- $k8s_version := toString $key }}
  {{- $image_version := toString $key | replace "." "-" }}
  {{- $version := toString $value }}
  {{- if $version }}
    {{- $patches := (printf "/%smodules/%s-%s/images/%s" $.ModulePath $.ModulePriority $.ModuleName $.ImageName) }}
    {{- $patch := false }}
    {{- range $path, $_ := $.Files.Glob (printf "%s/patches/%s/*.patch" $patches $k8s_version) }}
        {{- $patch = true }}
    {{- end }}
      {{- if ne $.Env "CSE" }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact-{{ $image_version }}
final: false
fromImage: common/src-artifact
git:
- add: /{{ $.ModulePath }}modules/{{ $.ModulePriority }}-{{ $.ModuleName }}/images/{{ $.ImageName }}/scripts
  to: /src/scripts
  stageDependencies:
    install:
    - '**/*'
  {{- if $patch }}
- add: {{ $patches }}/patches/{{ $k8s_version }}
  to: /patches
  stageDependencies:
    install:
    - '**/*'
  {{- end }}
secrets:
- id: SOURCE_REPO
  value: {{ $.SOURCE_REPO }}
shell:
  install:
  - cd /src
  - git clone --depth=1 --branch {{ $version }} $(cat /run/secrets/SOURCE_REPO)/kubernetes/cloud-provider-aws.git
  - cd cloud-provider-aws
  {{- if $patch }}
  - git apply /patches/*.patch --verbose
  {{- end }}
  - rm -rf .git vendor tests/e2e
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-{{ $image_version }}
from: {{ index $.Images "builder/scratch" }}
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact-{{ $image_version }}
  add: /
  to: /
  includePaths:
  - ecr-credential-provider
  - install
  - uninstall
  before: setup
imageSpec:
  config:
    labels: { "distro": "all", "version": "all", "ecr-credential-provider": "{{ $k8s_version }}" }
    clearUser: true
    clearWorkingDir: true
    clearCmd: true
    clearEntrypoint: true
    removeEnv: ["/.*/"]
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact-{{ $image_version }}
final: false
from: {{ index $.Images "builder/golang-alpine" }}
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact-{{ $image_version }}
  add: /src
  to: /src
  before: install
mount:
{{ include "mount points for golang builds" $ }}
secrets:
- id: GOPROXY
  value: {{ $.GOPROXY }}
shell:
  beforeInstall:
  {{- include "alpine packages proxy" $ | nindent 2 }}
  - apk add --no-cache make bash
  install:
    - export GOPROXY=$(cat /run/secrets/GOPROXY)
    - export CGO_ENABLED=0
    - export GOOS=linux
    - export GOARCH=amd64
    - cd /src/cloud-provider-aws
    - export VERSION={{ $version }}
    - make ecr-credential-provider
    - mv /src/scripts/* /
    - chown 64535:64535 ecr-credential-provider /install /uninstall
    - chmod 0755 ecr-credential-provider /install /uninstall
    - mv ecr-credential-provider /ecr-credential-provider
    {{- end }}
  {{- end }}
{{- end }}
