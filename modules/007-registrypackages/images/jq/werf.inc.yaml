{{- $version := include "get_oss_version_by_id" (list "jq" $ )  -}}
{{- $image_version := $version | replace "." "-" }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-{{ $image_version }}
from: {{ index $.Images "builder/scratch" }}
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact-{{ $image_version }}
  add: /
  to: /
  includePaths:
  - install
  - uninstall
  - jq
  before: setup
imageSpec:
  config:
    labels: { "distro": "all", "version": "all", "jq": "{{ $version }}" }
    clearUser: true
    clearWorkingDir: true
    clearCmd: true
    clearEntrypoint: true
    removeEnv: ["/.*/"]
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact-{{ $image_version }}
final: false
from: {{ index $.Images "builder/alpine" }}
git:
- add: /{{ $.ModulePath }}modules/007-{{ $.ModuleName }}/images/{{ $.ImageName }}/scripts
  to: /
  includePaths:
  - install
  - uninstall
  stageDependencies:
    setup:
    - '**/*'
import:
- from: {{ index $.Images "tools/jq" }}
  add: /usr/bin/jq
  to: /jq
  before: setup
shell:
  setup:
  - chmod +x /jq /install /uninstall
