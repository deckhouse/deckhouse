positive:
  configValues:
    - controlPlane:
        replicasManagement:
          mode: Static
          static:
            replicas: 3
        resourcesManagement:
          vpa:
            memory:
              max: "2.000G"
              min: "1.123G"
    - controlPlane:
        replicasManagement:
          mode: HPA
          hpa:
            minReplicas: 2
            maxReplicas: 5
            metrics:
            - type: CPU
              targetAverageUtilization: 80
        resourcesManagement:
          static:
            requests:
              memory: "2G"
    - sidecar:
        resourcesManagement:
          static:
            limits:
              cpu: 2000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 128Mi
    - ambient:
        enabled: false
    - ambient:
        enabled: true
      dataPlane:
        trafficRedirectionSetupMode: CNIPlugin
    - telemetryAPI:
        enabled: true
    - jwksResolverAdditionalRootCA: |
        -----BEGIN CERTIFICATE-----
        MIIDXTCCAkWgAwIBAgIJAN...
        -----END CERTIFICATE-----
    - dataPlane:
        extensionProviders:
        - name: authservice-grpc
          envoyExtAuthzGrpc:
            service: authservice.d8-istio.svc.cluster.local
            port: 10003
    - ca:
        secretRef:
          name: my-istio-ca
          namespace: my-pki
    - ca:
        secretRef:
          name: my-istio-ca
    - ca:
        cert: "---CERT PEM---"
        key: "---KEY PEM---"
    - ca:
        cert: "---CERT PEM---"
        key: "---KEY PEM---"
        chain: "---CHAIN PEM---"
        root: "---ROOT PEM---"
    - ca: {}
  values:
    - {}
negative:
  configValues:
  #Bad cpu limit value
    - sidecar:
        resourcesManagement:
          static:
            limits:
              cpu: 1
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 128Mi
    - ambient:
        enabled: true
    - ambient:
        enabled: true
      dataPlane:
        trafficRedirectionSetupMode: InitContainer
    - dataPlane:
        extensionProviders:
        - name: authservice-grpc
          envoyExtAuthzGrpc:
            service: authservice.istio-system.svc.cluster.local
            port: "10003"
  # cert and secretRef are mutually exclusive
    - ca:
        cert: "---CERT PEM---"
        key: "---KEY PEM---"
        secretRef:
          name: my-istio-ca
  # secretRef requires name
    - ca:
        secretRef:
          namespace: my-pki
  # inline cert requires key
    - ca:
        cert: "---CERT PEM---"
  # inline key requires cert
    - ca:
        key: "---KEY PEM---"
  # chain/root without cert are not allowed
    - ca:
        chain: "---CHAIN PEM---"
        root: "---ROOT PEM---"
  # secretRef must not be combined with any inline field
    - ca:
        root: "---ROOT PEM---"
        secretRef:
          name: my-istio-ca
