---
{{- $istioVersion := "1.21.6" }}
{{- $kialiVersion := "v1.81.0" }}
---
image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
git:
- url: {{ .SOURCE_REPO }}/istio/istio
  tag: {{ $istioVersion }}
  to: /src/istio
  excludePaths: 
  - samples
  - security
- url: {{ .SOURCE_REPO }}/istio/kiali
  tag: {{ $kialiVersion }}
  to: /src/kiali
  excludePaths: 
  - frontend
- add: /{{ .ModulePath }}modules/{{ .ModulePriority }}-{{ .ModuleName }}/images/{{ .ImageName }}/patches
  to: /patches
  stageDependencies:
    install:
    - '**/*'
shell:
  install:
  - patch -p1 -d /src/istio < /patches/001-istio-apply_go.patch
  - patch -p1 -d /src/istio < /patches/002-istio-gomod_gosum.patch
  - patch -p1 -d /src/istio < /patches/003-istio-server_fmtText.patch

  - patch -p1 -d /src/kiali < /patches/001-kiali-go-mod.patch

  - rm -rf /src/istio/.git
  - rm -rf /src/kiali/.git
  
  # getting rid of unused vulnerable code
  - rm -rf /src/istio/samples
  - rm -rf /src/istio/security/samples
  - rm -rf /src/istio/security/tools/jwt/samples
  - rm -rf /src/kiali/frontend
