---
{{- $istioVersion := include "get_oss_version_by_id" (list "istio-1-21" $ ) }}
{{- $kialiVersion := printf "v%s" (include "get_oss_version_by_id" (list "kiali-for-istio-1-21" $ )) }}
---
image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
git:
- add: /{{ .ModulePath }}modules/{{ .ModulePriority }}-{{ .ModuleName }}/images/{{ .ImageName }}/patches
  to: /patches
  stageDependencies:
    install:
    - '**/*'
- url: {{ .SOURCE_REPO }}/istio/istio.git
  tag: {{ $istioVersion }}
  add: /
  to: /src/istio
  excludePaths:
  - samples
  - security/samples
  - security/tools/jwt/samples
  stageDependencies:
    install:
    - '**/*'
- url: {{ .SOURCE_REPO }}/istio/kiali.git
  tag: {{ $kialiVersion }}
  add: /
  to: /src/kiali
  stageDependencies:
    install:
    - '**/*'
shell:
  install:
  - cd /src/istio/ && git apply --verbose /patches/001-istio-apply_go.patch
  - cd /src/istio/ && git apply --verbose /patches/002-istio-gomod_gosum.patch
  - cd /src/istio/ && git apply --verbose /patches/003-istio-server_fmtText.patch
  - cd /src/istio/ && git apply --verbose /patches/004-istio-multicluster_regenerate_token_timeout.patch
  - cd /src/kiali/ && git apply --verbose /patches/001-kiali-go-mod.patch
  - cd /src/kiali/ && git apply --verbose /patches/002-kiali-logout.patch
---
image: {{ .ModuleName }}/{{ .ImageName }}-kiali-frontend-build-artifact
from: {{ index $.Images "builder/node-alpine-22.16" }}
final: false
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
  add: /src/kiali/frontend
  to: /src/kiali/frontend
  before: install
shell:
  install:
  - cd /src/kiali/frontend
  {{- if .DistroPackagesProxy }}
  - sed -i 's|https://registry.yarnpkg.com|http://{{ $.DistroPackagesProxy }}/repository/yarnpkg|g' yarn.lock
  - sed -i 's|https://registry.npmjs.org|http://{{ $.DistroPackagesProxy }}/repository/npmjs|g' yarn.lock
  {{- end }}
  - export CYPRESS_INSTALL_BINARY=0
  - yarn install --frozen-lockfile
  - KIALI_ENV=production yarn run build
  - mkdir -p /src/kial-frontend-assets/static
  - cp -a build/. /src/kial-frontend-assets/static/
