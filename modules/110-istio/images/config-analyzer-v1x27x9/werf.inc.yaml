{{- if ne $.Env "CSE" }}
---
{{- $istioVersion := include "get_oss_version_by_id" (list "istio-1-27" $ ) }}
{{- $istioImageVersion := (printf "v%s" (replace "." "x" $istioVersion)) }} {{- /* 1.27.9 -> v1x27x9 */}}
---
image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: common/distroless
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-build-artifact
  add: /src/istio/out/istio-config-analyzer
  to: /istio-config-analyzer
  owner: 64535
  group: 64535
  before: install
imageSpec:
  config:
    user: "64535:64535"
    entrypoint: ["/istio-config-analyzer"]
---
image: {{ .ModuleName }}/{{ .ImageName }}-build-artifact
final: false
from: {{ index $.Images "builder/golang" }}
git:
- add: /{{ .ModulePath }}modules/{{ .ModulePriority }}-{{ .ModuleName }}/images/{{ .ImageName }}/src
  to: /src/istio/tools/istio-config-analyzer
  stageDependencies:
    install:
    - '**/*'
mount:
{{ include "mount points for golang builds" . }}
import:
- image: {{ .ModuleName }}/common-{{ $istioImageVersion }}-src-artifact
  add: /src/istio
  to: /src/istio
  before: install
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  beforeInstall:
  - pm install git binutils
  install:
  - cd /src/istio/
  - echo {{ $istioVersion }} > version
  - export VERSION={{ $istioVersion }}
  - export BUILDINFO=$(mktemp)
  - |
    cat > "${BUILDINFO}" <<EOF
    istio.io/istio/pkg/version.buildVersion={{ $istioVersion }}
    istio.io/istio/pkg/version.buildGitRevision={{ $istioVersion }}
    istio.io/istio/pkg/version.buildStatus=Clean
    istio.io/istio/pkg/version.buildTag={{ $istioVersion }}
    istio.io/istio/pkg/version.buildHub=docker.io/istio
    istio.io/istio/pkg/version.buildOS=linux
    istio.io/istio/pkg/version.buildArch=amd64
    EOF
  - export GOOS=linux GOARCH=amd64
  - export LDFLAGS='-extldflags -static -s -w'
  - GOPROXY=$(cat /run/secrets/GOPROXY) go mod download
  - common/scripts/gobuild.sh /src/istio/out/ -tags=disable_pgv,deckhouse_external /src/istio/tools/istio-config-analyzer/
  - strip /src/istio/out/istio-config-analyzer
  - chmod 0700 /src/istio/out/istio-config-analyzer
  - chown 64535:64535 /src/istio/out/istio-config-analyzer
{{- end }}
