---
{{- $istioVersion := include "get_oss_version_by_id" (list "istio-1-27" $ ) }}
{{- $istioImageVersion := (printf "v%s" (replace "." "x" $istioVersion)) }} {{- /* 1.27.9 -> v1x27x9 */}}
{{- $kialiVersion := printf "v%s" (include "get_oss_version_by_id" (list "kiali-for-istio-1-27" $ )) }}
---
# Based on https://github.com/kiali/kiali/blob/v2.12.0/deploy/docker/Dockerfile-distroless
image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: common/distroless
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-backend-build-artifact
  add: /src/kiali/out/kiali
  to: /opt/kiali/kiali
  owner: 64535
  group: 64535
  before: install
- image: {{ .ModuleName }}/{{ .ImageName }}-frontend-build-artifact
  add: /src/kiali/frontend/build
  to: /opt/kiali/console
  owner: 64535
  group: 64535
  before: install
git:
{{- include "image mount points" . }}
imageSpec:
  config:
    user: "64535:64535"
    workingDir: "/opt/kiali"
    entrypoint: ["/opt/kiali/kiali"]
---
image: {{ .ModuleName }}/{{ .ImageName }}-backend-build-artifact
final: false
from: {{ index $.Images "builder/golang-alpine" }}
mount:
{{ include "mount points for golang builds" . }}
import:
- image: {{ .ModuleName }}/common-{{ $istioImageVersion }}-src-artifact
  add: /src/kiali
  to: /src/kiali
  before: setup
# - image: {{ .ModuleName }}/{{ .ImageName }}-frontend-build-artifact
#   add: /src/kiali/frontend/build
#   to: /src/kiali/frontend/build
#   before: setup
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  beforeInstall:
  {{- include "alpine packages proxy" . | nindent 2 }}
  - apk add --no-cache bash git binutils
  setup:
  - cd /src/kiali/
  - export GOPROXY=$(cat /run/secrets/GOPROXY) GOOS=linux GOARCH=amd64 CGO_ENABLED=0
  - echo {{ $kialiVersion }} > version
  - export LDFLAGS='-extldflags -static -s -w -X main.version=${kialiVersion}'
  - go mod download
  - go build -o /src/kiali/out/kiali /src/kiali/
  - strip /src/kiali/out/kiali
  - chmod 0755 /src/kiali/out/kiali
