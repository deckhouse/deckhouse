---
{{- $istioVersion := "1.25.2" }}
{{- $kialiVersion := "v2.7.1" }}
---
image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
git:
- add: /{{ .ModulePath }}modules/{{ .ModulePriority }}-{{ .ModuleName }}/images/{{ .ImageName }}/patches
  to: /patches
  stageDependencies:
    install:
    - '**/*'
- url: {{ .SOURCE_REPO }}/istio/istio.git
  tag: {{ $istioVersion }}
  add: /
  to: /src/istio
  excludePaths:
  - samples
  stageDependencies:
    install:
    - '**/*'
- url: {{ .SOURCE_REPO }}/istio/kiali.git
  tag: {{ $kialiVersion }}
  add: /
  to: /src/kiali
  stageDependencies:
    install:
    - '**/*'
- url: {{ .SOURCE_REPO }}/istio/kiali-frontend-assets.git
  tag: {{ $kialiVersion }}
  add: /
  to: /src/kial-frontend-assets
  stageDependencies:
    install:
    - '**/*'
shell:
  install:
  - cd /src/istio/ && git apply --verbose /patches/001-istio-gomod_gosum.patch
  - cd /src/kiali/ && git apply --verbose /patches/001-kiali-go-mod.patch
