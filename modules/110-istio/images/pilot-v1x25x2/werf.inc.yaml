---
{{- $istioVersion := include "get_oss_version_by_id" (list "istio-1-25" $ ) }}
{{- $istioImageVersion := (printf "v%s" (replace "." "x" $istioVersion)) }} {{- /* 1.25.2 -> v1x25x2 */}}
---
# Based on https://github.com/istio/istio/blob/1.25.2/pilot/docker/Dockerfile.pilot
image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: common/distroless
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-build-artifact
  add: /src/istio/out/pilot-discovery
  to: /usr/local/bin/pilot-discovery
  owner: 64535
  group: 64535
  after: setup
- image: {{ .ModuleName }}/common-{{ $istioImageVersion }}-src-artifact
  add: /src/istio/tools/packaging/common/envoy_bootstrap.json
  to: /var/lib/istio/envoy/envoy_bootstrap_tmpl.json
  owner: 64535
  group: 64535
  after: setup
{{- include "image mount points" . }}
imageSpec:
  config:
    user: "64535:64535"
    entrypoint: ["/usr/local/bin/pilot-discovery"]
---
image: {{ .ModuleName }}/{{ .ImageName }}-build-artifact
final: false
from: {{ index $.Images "builder/golang" }}
mount:
{{ include "mount points for golang builds" . }}
import:
- image: {{ .ModuleName }}/common-{{ $istioImageVersion }}-src-artifact
  add: /src/istio
  to: /src/istio
  before: setup
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  beforeInstall:
  - pm install git binutils
  setup:
  - cd /src/istio/
  - echo {{ $istioVersion }} > version
  - export VERSION={{ $istioVersion }}
  - export BUILDINFO=$(mktemp)
  - |
    cat > "${BUILDINFO}" <<EOF
    istio.io/istio/pkg/version.buildVersion={{ $istioVersion }}
    istio.io/istio/pkg/version.buildGitRevision={{ $istioVersion }}
    istio.io/istio/pkg/version.buildStatus=Clean
    istio.io/istio/pkg/version.buildTag={{ $istioVersion }}
    istio.io/istio/pkg/version.buildHub=docker.io/istio
    istio.io/istio/pkg/version.buildOS=linux
    istio.io/istio/pkg/version.buildArch=amd64
    EOF
  - export GOPROXY=$(cat /run/secrets/GOPROXY) GOOS=linux GOARCH=amd64
  - export LDFLAGS='-extldflags -static -s -w'
  - go mod download
  - common/scripts/gobuild.sh /src/istio/out/ -tags=disable_pgv /src/istio/pilot/cmd/pilot-discovery/
  - strip /src/istio/out/pilot-discovery
  - chmod 0700 /src/istio/out/pilot-discovery
  - chown 64535:64535 /src/istio/out/pilot-discovery
---
{{- include "vex mitigation" (list $ (printf "%s/%s" $.ModuleName $.ImageName)) }}
