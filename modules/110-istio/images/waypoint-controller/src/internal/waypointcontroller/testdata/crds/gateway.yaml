# Minimal Gateway CRD for envtest. The real upstream CRD is ~140KB of schema
# and CEL validation; for controller tests we only need the apiserver to
# recognize the kind so that the controller can create/get/delete Gateway
# objects. We use x-kubernetes-preserve-unknown-fields to accept any spec.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gateways.gateway.networking.k8s.io
  annotations:
    # Required because gateway.networking.k8s.io is a kubernetes.io protected
    # group. This points at the real upstream approval PR.
    api-approved.kubernetes.io: https://github.com/kubernetes-sigs/gateway-api/pull/4530
spec:
  group: gateway.networking.k8s.io
  names:
    kind: Gateway
    listKind: GatewayList
    plural: gateways
    singular: gateway
    shortNames:
      - gtw
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
