{{- $ := index . 0 -}}
{{- $revision := index . 1 -}}
{{- $fullVersion := index . 3 -}}
defaultTemplates:
- sidecar
- d8-seccomp
policy: enabled
alwaysInjectSelector: []
neverInjectSelector:
- matchExpressions:
  - key: job-name
    operator: Exists
injectedAnnotations:
  istio.deckhouse.io/full-version: {{ $fullVersion | quote }}
template: '{{`{{ Template_Version_And_Istio_Version_Mismatched_Check_Installation }}`}}'
templates:
  sidecar: |
{{ $.Files.Get (printf "files/%s/static/sidecar-injection-template.yaml" $revision) | trim | indent 4 }}
  gateway: |
{{ $.Files.Get (printf "files/%s/static/gateway-injection-template.yaml" $revision) | trim | indent 4 }}
  d8-seccomp: |
    spec:
      {{- if eq $.Values.istio.dataPlane.trafficRedirectionSetupMode "CNIPlugin" }}
      initContainers:
      - name: istio-validation
        securityContext:
          seccompProfile:
            type: RuntimeDefault
      {{- end }}
      containers:
      - name: istio-proxy
        securityContext:
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /healthz/ready
            port: 15021
          initialDelaySeconds: 10
          periodSeconds: 2
          timeoutSeconds: 3
          failureThreshold: 30
  d8-hold-istio-proxy-termination-until-application-stops: |
    spec:
      containers:
      - name: istio-proxy
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "curl -X POST localhost:15000/drain_listeners?inboundonly; while [ $(ss -Htlp state all | grep -vE '(envoy|pilot-agent|TIME-WAIT)' | wc -l | xargs ) -ne 0 ]; do sleep 1; done"]
