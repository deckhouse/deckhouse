{{- define "istio_cni_resources" }}
cpu: 100m
memory: 100Mi
{{- end }}

{{- if eq $.Values.istio.dataPlane.trafficRedirectionSetupMode "CNIPlugin" }}
{{- $version := $.Values.istio.internal.globalVersion }}
{{- $versionInfo := get $.Values.istio.internal.versionMap $version }}
{{- $fullVersion := get $versionInfo "fullVersion" }}
{{- $imageSuffix := get $versionInfo "imageSuffix" }}
{{- $supportsAmbient := get $versionInfo "supportsAmbient" }}

{{- if (.Values.global.enabledModules | has "vertical-pod-autoscaler") }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: istio-cni-node
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list $ (dict "app" "istio-cni-node")) | nindent 2 }}
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: DaemonSet
    name: istio-cni-node
  updatePolicy:
    updateMode: "Initial"
  resourcePolicy:
    containerPolicies:
      {{- include "helm_lib_vpa_kube_rbac_proxy_resources" . | nindent 6 }}
      - containerName: "install-cni"
        minAllowed:
          cpu: 100m
          memory: 100Mi
        maxAllowed:
          cpu: 200m
          memory: 200Mi
{{- end }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: istio-cni-node
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list $ (dict "app" "istio-cni-node" "k8s-app" "istio-cni-node")) | nindent 2 }}
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: istio-cni-node
  updateStrategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: istio-cni-node
        k8s-app: istio-cni-node
        sidecar.istio.io/inject: "false"
        {{- if (semverCompare ">= 1.25.0" $fullVersion) }}
        istio.io/dataplane-mode: none
        {{- end }}
      annotations:
        {{ include "helm_lib_prevent_ds_eviction_annotation" . | nindent 8 }}
        sidecar.istio.io/inject: "false"
        {{- if (semverCompare ">= 1.25.0" $fullVersion) }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "15014"
        prometheus.io/path: "/metrics"
        container.apparmor.security.beta.kubernetes.io/install-cni: unconfined
        {{- end }}
    spec:
      {{- include "helm_lib_module_pod_security_context_run_as_user_root" . | nindent 6 }}
      automountServiceAccountToken: true
      imagePullSecrets:
      - name: deckhouse-registry
      {{- if and $supportsAmbient $.Values.istio.ambient.enabled }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- else }}
      dnsPolicy: ClusterFirst
      {{- end }}
      {{- include "helm_lib_tolerations" (tuple . "any-node") | nindent 6 }}
      {{- include "helm_lib_priority_class" (tuple . "system-node-critical") | nindent 6 }}
      serviceAccountName: cni
      terminationGracePeriodSeconds: 5
      containers:
        - name: install-cni
          image: {{ include "helm_lib_module_image" (list $ (printf "cni%s" $imageSuffix)) }}
          imagePullPolicy: IfNotPresent
          {{- if (semverCompare ">= 1.25.0" $fullVersion) }}
          ports:
            - containerPort: 15014
              name: metrics
              protocol: TCP
          {{- end }}
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: 8000
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: 8000
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          {{- if semverCompare "< 1.25.0" $fullVersion }}
          securityContext:
            {{- if and $supportsAmbient $.Values.istio.ambient.enabled }}
            privileged: true
            {{- end }}
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
          {{- else }}
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              drop:
              - ALL
              add:
              # CAP_NET_ADMIN is required to allow ipset and route table access
              - NET_ADMIN
              # CAP_NET_RAW is required to allow iptables mutation of the `nat` table
              - NET_RAW
              # CAP_SYS_PTRACE is required for repair and ambient mode to describe
              # the pod's network namespace.
              - SYS_PTRACE
              # CAP_SYS_ADMIN is required for both ambient and repair, in order to open
              # network namespaces in `/proc` to obtain descriptors for entering pod network
              # namespaces. There does not appear to be a more granular capability for this.
              - SYS_ADMIN
              # While we run as a 'root' (UID/GID 0), since we drop all capabilities we lose
              # the typical ability to read/write to folders owned by others.
              # This can cause problems if the hostPath mounts we use, which we require write access into,
              # are owned by non-root. DAC_OVERRIDE bypasses these and gives us write access into any folder.
              - DAC_OVERRIDE
          {{- end }}
          command: ["install-cni"]
          args:
            - --log_output_level=default:info
            {{- if semverCompare "< 1.25.0" $fullVersion }}
            # Before Istio 1.25: hostPath mounted under /tmp for readOnlyRootFilesystem + containerd v2.
            # CNI JSON on the node still lists /var/run/istio-cni/*.sock.
            - --log-uds-address=/tmp/istio-cni/log.sock
            {{- if and $supportsAmbient $.Values.istio.ambient.enabled }}
            - --cni-event-address=/tmp/istio-cni/pluginevent.sock
            {{- end }}
            {{- end }}
          envFrom:
          - configMapRef:
              name: cni-config
          env:
            - name: REPAIR_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: REPAIR_RUN_AS_DAEMON
              value: "true"
            - name: REPAIR_SIDECAR_ANNOTATION
              value: "sidecar.istio.io/status"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory
                  divisor: "1"
            - name: GOMAXPROCS
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
                  divisor: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CNI_NETWORK_CONFIG
              valueFrom:
                configMapKeyRef:
                  key: cni_network_config
                  name: cni-config
          volumeMounts:
            - mountPath: /host/opt/cni/bin
              name: cni-bin-dir
            {{- if and $supportsAmbient $.Values.istio.ambient.enabled }}
            - mountPath: /host/proc
              name: cni-host-procfs
              readOnly: true
            {{- end }}
            - mountPath: /host/etc/cni/net.d
              name: cni-net-dir
            - mountPath: {{ ternary "/tmp/istio-cni" "/var/run/istio-cni" (semverCompare "< 1.25.0" $fullVersion) }}
              name: cni-socket-dir
            {{- if and $supportsAmbient $.Values.istio.ambient.enabled }}
            - mountPath: /host/var/run/netns
              mountPropagation: HostToContainer
              name: cni-netns-dir
            - mountPath: /var/run/ztunnel
              name: cni-ztunnel-sock-dir
            {{- end }}
            {{- if semverCompare "< 1.25.0" $fullVersion }}
            - mountPath: /run/istio-cni
              name: cni-socket-dir
            {{- end }}
            - mountPath: /tmp
              name: install-cni-tmp
          resources:
            requests:
              {{- include "istio_cni_resources" . | nindent 14 }}
              {{- include "helm_lib_module_ephemeral_storage_only_logs" . | nindent 14 }}
        - name: kube-rbac-proxy
          {{- include "helm_lib_module_container_security_context_pss_restricted_flexible" dict | nindent 10 }}
          image: {{ include "helm_lib_module_common_image" (list . "kubeRbacProxy") }}
          args:
          {{- if and $supportsAmbient $.Values.istio.ambient.enabled }}
          - "--secure-listen-address=$(KUBE_RBAC_PROXY_LISTEN_ADDRESS):4286"
          {{- else }}
          - "--secure-listen-address=$(KUBE_RBAC_PROXY_LISTEN_ADDRESS):9734"
          {{- end }}
          - "--v=2"
          - "--logtostderr=true"
          - "--stale-cache-interval=1h30m"
          - "--livez-path=/livez"
          env:
          - name: KUBE_RBAC_PROXY_LISTEN_ADDRESS
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: KUBE_RBAC_PROXY_CONFIG
            value: |
              upstreams:
              - upstream: http://127.0.0.1:15014/metrics
                path: /metrics
                authorization:
                  resourceAttributes:
                    namespace: d8-{{ .Chart.Name }}
                    apiGroup: apps
                    apiVersion: v1
                    resource: daemonsets
                    subresource: prometheus-metrics
                    name: istio-cni-node
          {{- if and $supportsAmbient $.Values.istio.ambient.enabled }}
          ports:
            - containerPort: 4286
              name: https-metrics
          livenessProbe:
            httpGet:
              path: /livez
              port: 4286
              scheme: HTTPS
          readinessProbe:
            httpGet:
              path: /livez
              port: 4286
              scheme: HTTPS
          {{- else }}
          ports:
            - containerPort: 9734
              name: https-metrics
          livenessProbe:
            httpGet:
              path: /livez
              port: 9734
              scheme: HTTPS
          readinessProbe:
            httpGet:
              path: /livez
              port: 9734
              scheme: HTTPS
          {{- end }}
          resources:
            requests:
              {{- include "helm_lib_module_ephemeral_storage_only_logs" . | nindent 14 }}
      volumes:
        - name: cni-bin-dir
          hostPath:
            path: /opt/cni/bin
        {{- if and $supportsAmbient $.Values.istio.ambient.enabled }}
        - name: cni-host-procfs
          hostPath:
            path: /proc
            type: Directory
        - name: cni-ztunnel-sock-dir
          hostPath:
            path: /var/run/ztunnel
            type: DirectoryOrCreate
        {{- end }}
        - name: cni-net-dir
          hostPath:
            path: /etc/cni/net.d
        - name: cni-socket-dir
          hostPath:
            path: /var/run/istio-cni
        - name: cni-netns-dir
          hostPath:
            path: /var/run/netns
            type: DirectoryOrCreate
        - name: install-cni-tmp
          emptyDir: {}
{{- end }}
