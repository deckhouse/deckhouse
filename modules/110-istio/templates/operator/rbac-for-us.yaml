---
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: d8-{{ .Chart.Name }}
  name: operator
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:istio:operator
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
  # istio groups
  - apiGroups:
      - install.istio.io
    resources:
      - istiooperators
      - istiooperators/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - deletecollection
  - apiGroups: 
      - sailoperator.io
    resources: 
      - istiocnis
      - ztunnels
      - istiorevisions
      - istiorevisiontags
      - istios
    verbs: 
      - list
      - watch
  - apiGroups:
      - sailoperator.io
    resources:
      - istiorevisions
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - sailoperator.io
    resources:
      - istiorevisions/finalizers
    verbs:
      - update
  - apiGroups:
      - sailoperator.io
    resources:
      - istiorevisions/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - sailoperator.io
    resources:
      - istiorevisiontags
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - sailoperator.io
    resources:
      - istiorevisiontags/finalizers
    verbs:
      - update
  - apiGroups:
      - sailoperator.io
    resources:
      - istiorevisiontags/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - sailoperator.io
    resources:
      - istiocnis
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - sailoperator.io
    resources:
      - istiocnis/finalizers
    verbs:
      - update
  - apiGroups:
      - sailoperator.io
    resources:
      - istiocnis/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - sailoperator.io
    resources:
      - istios
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - sailoperator.io
    resources:
      - istios/finalizers
    verbs:
     - update
  - apiGroups:
      - sailoperator.io
    resources:
      - istios/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - sailoperator.io
    resources:
      - remoteistios
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - sailoperator.io
    resources:
      - remoteistios/finalizers
    verbs:
      - update
  - apiGroups:
      - sailoperator.io
    resources:
      - remoteistios/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - networking.istio.io
    resources:
      - destinationrules
      - destinationrules/status
      - envoyfilters
      - envoyfilters/status
      - gateways
      - gateways/status
      - proxyconfigs
      - proxyconfigs/status
      - serviceentries
      - serviceentries/status
      - sidecars
      - sidecars/status
      - virtualservices
      - virtualservices/status
      - workloadentries
      - workloadentries/status
      - workloadgroups
      - workloadgroups/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - deletecollection
  - apiGroups:
      - security.istio.io
    resources:
      - authorizationpolicies
      - authorizationpolicies/status
      - peerauthentications
      - peerauthentications/status
      - requestauthentications
      - requestauthentications/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - deletecollection
  # k8s groups
  - apiGroups:
      - admissionregistration.k8s.io
    resources:
      - mutatingwebhookconfigurations
      - validatingwebhookconfigurations
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - deletecollection
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions.apiextensions.k8s.io
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - deletecollection
  - apiGroups:
      - apps
      - extensions
    resources:
      - daemonsets
      - deployments
      - deployments/finalizers
      - ingresses
      - replicasets
      - statefulsets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - deletecollection
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - deletecollection
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - servicemonitors
    verbs:
      - get
      - create
      - update
  - apiGroups:
      - policy
    resources:
      - poddisruptionbudgets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - deletecollection
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterrolebindings
      - clusterroles
      - roles
      - rolebindings
    verbs:
      - create
      - get
      - list
      - watch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - create
      - update
  - apiGroups:
      - ""
    resources:
      - resourcequotas
    verbs:
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - configmaps
      - endpoints
      - events
      - namespaces
      - pods
      - pods/proxy
      - pods/portforward
      - persistentvolumeclaims
      - secrets
      - services
      - serviceaccounts
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - deletecollection
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: d8:istio:operator
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
subjects:
  - kind: ServiceAccount
    name: operator
    namespace: d8-{{ .Chart.Name }}
roleRef:
  kind: ClusterRole
  name: d8:istio:operator
  apiGroup: rbac.authorization.k8s.io
