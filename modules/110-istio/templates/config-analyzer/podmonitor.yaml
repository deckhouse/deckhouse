{{- if (.Values.global.enabledModules | has "operator-prometheus") }}
  {{- range $version := .Values.istio.internal.versionsToInstall }}
    {{- if has $version (list "1.21" "1.25" "1.27") }}
    {{- $versionInfo := get $.Values.istio.internal.versionMap $version }}
    {{- $revision := get $versionInfo "revision" }}
    {{- $fullVersion := get $versionInfo "fullVersion" }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: istio-config-analyzer-{{ $revision }}
  namespace: d8-monitoring
  {{- include "helm_lib_module_labels" (list $ (dict "app" "istio-config-analyzer" "prometheus" "main")) | nindent 2 }}
spec:
  jobLabel: app
  selector:
    matchLabels:
      app: istio-config-analyzer
      istio.io/rev: {{ $revision }}
  namespaceSelector:
    matchNames:
    - d8-{{ $.Chart.Name }}
  podMetricsEndpoints:
  - port: https-metrics
    scheme: https
    tlsConfig:
      insecureSkipVerify: true
    bearerTokenSecret:
      name: prometheus-token
      key: token
    honorLabels: true
    relabelings:
    - targetLabel: job
      replacement: istio-config-analyzer
    - regex: endpoint|pod|service
      action: labeldrop
    - sourceLabels: [__meta_kubernetes_pod_label_istio_io_rev]
      targetLabel: revision
    - targetLabel: tier
      replacement: cluster
    - targetLabel: version
      replacement: {{ $fullVersion | quote }}
    - sourceLabels: [__meta_kubernetes_pod_ready]
      regex: "true"
      action: keep
    {{- end }}
  {{- end }}
{{- end }}
