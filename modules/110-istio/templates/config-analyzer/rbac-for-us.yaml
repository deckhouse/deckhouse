{{- range $version := .Values.istio.internal.versionsToInstall }}
  {{- if eq $version "1.27" }}
  {{- $versionInfo := get $.Values.istio.internal.versionMap $version }}
  {{- $revision := get $versionInfo "revision" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:istio:config-analyzer:{{ $revision }}
  {{- include "helm_lib_module_labels" (list $ (dict "app" "istio-config-analyzer" "istio.io/rev" $revision)) | nindent 2 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - endpoints
  - namespaces
  - pods
  - replicationcontrollers
  - secrets
  - services
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - extensions
  - apps
  resources:
  - daemonsets
  - deployments
  - replicasets
  - statefulsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - cronjobs
  - jobs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.istio.io
  resources:
  - destinationrules
  - destinationrules/status
  - envoyfilters
  - envoyfilters/status
  - gateways
  - gateways/status
  - proxyconfigs
  - proxyconfigs/status
  - serviceentries
  - serviceentries/status
  - sidecars
  - sidecars/status
  - virtualservices
  - virtualservices/status
  - workloadentries
  - workloadentries/status
  - workloadgroups
  - workloadgroups/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - security.istio.io
  resources:
  - authorizationpolicies
  - authorizationpolicies/status
  - peerauthentications
  - peerauthentications/status
  - requestauthentications
  - requestauthentications/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - extensions.istio.io
  resources:
  - wasmplugins
  - wasmplugins/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - telemetry.istio.io
  resources:
  - telemetries
  - telemetries/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gatewayclasses
  - gatewayclasses/status
  - gateways
  - gateways/status
  - grpcroutes
  - grpcroutes/status
  - httproutes
  - httproutes/status
  - referencegrants
  - referencegrants/status
  - tcproutes
  - tcproutes/status
  - tlsroutes
  - tlsroutes/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - mutatingwebhookconfigurations
  - validatingwebhookconfigurations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:istio:config-analyzer:{{ $revision }}
  {{- include "helm_lib_module_labels" (list $ (dict "app" "istio-config-analyzer" "istio.io/rev" $revision)) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:istio:config-analyzer:{{ $revision }}
subjects:
- kind: ServiceAccount
  name: istio-config-analyzer-{{ $revision }}
  namespace: d8-{{ $.Chart.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: access-to-istio-config-analyzer-metrics-{{ $revision }}
  namespace: d8-{{ $.Chart.Name }}
  {{- include "helm_lib_module_labels" (list $ (dict "app" "istio-config-analyzer" "istio.io/rev" $revision)) | nindent 2 }}
rules:
- apiGroups:
  - apps
  resources:
  - deployments/prometheus-metrics
  resourceNames:
  - istio-config-analyzer-{{ $revision }}
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: access-to-istio-config-analyzer-metrics-{{ $revision }}
  namespace: d8-{{ $.Chart.Name }}
  {{- include "helm_lib_module_labels" (list $ (dict "app" "istio-config-analyzer" "istio.io/rev" $revision)) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: access-to-istio-config-analyzer-metrics-{{ $revision }}
subjects:
- kind: User
  name: d8-monitoring:scraper
- kind: ServiceAccount
  name: prometheus
  namespace: d8-monitoring
  {{- end }}
{{- end }}
