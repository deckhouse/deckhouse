{{- if and
  (include "istioSupportsAmbient" .)
  (.Values.istio.ambient.enabled)
  (.Values.istio.dataPlane.waypoint.enabled)
  (.Values.global.enabledModules | has "operator-prometheus")
}}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: istio-waypoint
  namespace: d8-monitoring
  {{- include "helm_lib_module_labels" (list . (dict
    "app" "waypoint"
    "prometheus" "main"
  )) | nindent 2 }}
spec:
  jobLabel: app
  namespaceSelector:
    matchNames:
    - d8-{{ .Chart.Name }}
  podMetricsEndpoints:
  - path: /stats/prometheus
    port: metrics
    relabelings:
    - action: replace
      replacement: cluster
      targetLabel: tier
    - action: replace
      replacement: istio-waypoint
      targetLabel: job
    - action: replace
      sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
    - action: replace
      sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
    - action: keep
      regex: istio-proxy
      sourceLabels: [__meta_kubernetes_pod_container_name]
    - action: labeldrop
      regex: endpoint
    scheme: http
  selector:
    matchExpressions:
    - key: app
      operator: In
      values: ["waypoint"]
{{- end }}
