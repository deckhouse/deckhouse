{{- if .Values.istio.internal.egressControllers }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: egress-gateway-controller
  namespace: d8-egress-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list $ (dict
      "app"  "egress-gateway-controller"
  )) | nindent 2 }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: istio:egress-gateway-controller
  namespace: d8-egress-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list $ (dict
      "app"  "egress-gateway-controller"
  )) | nindent 2 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: istio:egress-gateway-controller
  namespace: d8-egress-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list $ (dict
      "app"  "egress-gateway-controller"
  )) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: istio:egress-gateway-controller
subjects:
- kind: ServiceAccount
  name: egress-gateway-controller
{{- end }}
