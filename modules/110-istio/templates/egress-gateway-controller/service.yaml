{{- range $controller := .Values.istio.internal.egressControllers }}
---
apiVersion: v1
kind: Service
metadata:
  name: egress-gateway-controller-{{ $controller.name }}
  namespace: d8-egress-{{ $.Chart.Name }}
  {{- include "helm_lib_module_labels" (list $ (dict
      "app" "egress-gateway-controller"
      "instance" $controller.name
  )) | nindent 2 }}
spec:
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: https
    port: 443
    targetPort: https
    protocol: TCP
  selector:
    app: egress-gateway-controller
    instance: {{ $controller.name }}
    istio.deckhouse.io/egress-gateway-class: {{ $controller.spec.egressGatewayClass | quote }}
  sessionAffinity: None
  type: ClusterIP
{{- end }}
