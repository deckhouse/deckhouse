{{- range $controller := .Values.istio.internal.egressControllers }}
{{- $versionInfo := get $.Values.istio.internal.versionMap $.Values.istio.internal.globalVersion }}
{{- $imageSuffix := get $versionInfo "imageSuffix" }}
{{- $supportsAmbient := get $versionInfo "supportsAmbient" }}
{{- $resourcesManagement := include "istio_egress_gateway_resources_management" $controller | fromYaml }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: egress-gateway-controller-{{ $controller.name }}
  namespace: d8-egress-{{ $.Chart.Name }}
  {{- include "helm_lib_module_labels" (list $ (dict
      "app" "egress-gateway-controller"
      "instance" $controller.name
      "istio" "egressgateway"
      "istio.deckhouse.io/egress-gateway-class" $controller.spec.egressGatewayClass
      "istio.io/dataplane-mode" "none"
  )) | nindent 2 }}
spec:
  selector:
    matchLabels:
      app: egress-gateway-controller
      instance: {{ $controller.name }}
      istio.deckhouse.io/egress-gateway-class: "{{ $controller.spec.egressGatewayClass }}"
  template:
    metadata:
      annotations:
        {{ include "helm_lib_prevent_ds_eviction_annotation" $ | nindent 8 }}
      {{- include "helm_lib_module_labels" (list $ (dict
          "app" "egress-gateway-controller"
          "instance" $controller.name
          "istio" "egressgateway"
          "istio.deckhouse.io/egress-gateway-class" $controller.spec.egressGatewayClass
          "istio.io/dataplane-mode" "none"
          "sidecar.istio.io/inject" "false"
      )) | nindent 6 }}
    spec:
      {{- include "helm_lib_priority_class" (tuple $ "system-cluster-critical") | nindent 6 }}
      containers:
      - args:
        - proxy
        - router
        - --domain
        - $(POD_NAMESPACE).svc.{{ $.Values.global.discovery.clusterDomain }}
        - --log_as_json
        - --proxyLogLevel=warning
        - --proxyComponentLogLevel=misc:error
        - --log_output_level=default:info
        env:
        - name: PILOT_CERT_PROVIDER
          value: istiod
        - name: CA_ADDR
          value: istiod-{{ include "istioGlobalRevision" $ }}.d8-istio.svc:15012
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: INSTANCE_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: SERVICE_ACCOUNT
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.serviceAccountName
        - name: HOST_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.hostIP
        - name: ISTIO_CPU_LIMIT
          valueFrom:
            resourceFieldRef:
              divisor: "1"
              resource: limits.cpu
        - name: PROXY_CONFIG
          value: |
            {
              "discoveryAddress": "istiod-{{ include "istioGlobalRevision" $ }}.d8-istio.svc:15012",
              "proxyMetadata": {
                "CLOUD_PLATFORM": "{{ include "istioCloudPlatform" $ }}",
                "ISTIO_META_DNS_AUTO_ALLOCATE": "true",
                "ISTIO_META_DNS_CAPTURE": "true",
                {{- if and $supportsAmbient $.Values.istio.ambient.enabled }}
                "ISTIO_META_ENABLE_HBONE": "true",
                {{- end }}
                "ISTIO_META_IDLE_TIMEOUT": "{{ $.Values.istio.dataPlane.proxyConfig.idleTimeout }}",
                "PROXY_CONFIG_XDS_AGENT": "true"
              },
              "meshId": "d8-istio-mesh",
              "holdApplicationUntilProxyStarts": {{ $.Values.istio.dataPlane.proxyConfig.holdApplicationUntilProxyStarts }}
            }
        - name: ISTIO_META_POD_PORTS
          value: "[]"
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              divisor: "1"
              resource: limits.memory
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              divisor: "1"
              resource: limits.cpu
        - name: ISTIO_META_APP_CONTAINERS
          value: ""
        - name: ISTIO_META_NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: ISTIO_META_INTERCEPTION_MODE
          value: REDIRECT
        - name: ISTIO_META_WORKLOAD_NAME
          value: egress-gateway-controller-{{ $controller.name }}
        - name: ISTIO_META_OWNER
          value: kubernetes://apis/apps/v1/namespaces/d8-egress-{{ $.Chart.Name }}/daemonsets/egress-gateway-controller-{{ $controller.name }}
        - name: ISTIO_META_MESH_ID
          value: d8-istio-mesh
        - name: TRUST_DOMAIN
          value: {{ $.Values.global.discovery.clusterDomain | quote }}
        - name: CLOUD_PLATFORM
          value: {{ include "istioCloudPlatform" $ }}
        - name: ISTIO_META_DNS_AUTO_ALLOCATE
          value: "true"
        - name: ISTIO_META_DNS_CAPTURE
          value: "true"
        - name: ISTIO_META_IDLE_TIMEOUT
          value: {{ $.Values.istio.dataPlane.proxyConfig.idleTimeout | quote }}
        - name: PROXY_CONFIG_XDS_AGENT
          value: "true"
        {{- if $.Values.istio.dataPlane.enableHTTP10 }}
        - name: ISTIO_META_HTTP10
          value: "1"
        {{- end }}
        - name: ISTIO_META_CLUSTER_ID
          value: {{ $.Values.global.discovery.clusterDomain | replace "." "-" }}-{{ adler32sum $.Values.global.discovery.clusterUUID }}
        - name: ISTIO_META_NETWORK
          value: {{ include "istioNetworkName" $ }}
        - name: JWT_POLICY
          value: {{ include "istioJWTPolicy" $ }}
        image: {{ include "helm_lib_module_image" (list $ (printf "proxyv2%s" $imageSuffix )) }}
        imagePullPolicy: IfNotPresent
        name: istio-proxy
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: https
          containerPort: 8443
          protocol: TCP
        - name: metrics
          containerPort: 15020
          protocol: TCP
        - name: http-envoy-prom
          containerPort: 15090
          protocol: TCP
        - name: status-port
          containerPort: 15021
          protocol: TCP
        - name: tls-istiod
          containerPort: 15012
          protocol: TCP
        startupProbe:
          failureThreshold: 30
          httpGet:
            path: /healthz/ready
            port: 15021
            scheme: HTTP
          initialDelaySeconds: 1
          periodSeconds: 1
          successThreshold: 1
          timeoutSeconds: 1
        readinessProbe:
          failureThreshold: 4
          httpGet:
            path: /healthz/ready
            port: 15021
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 15
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          {{- include "helm_lib_resources_management_pod_resources" (list $resourcesManagement "60Mi") | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsUser: 1337
          runAsGroup: 1337
          runAsNonRoot: true
        volumeMounts:
        - mountPath: /var/run/secrets/workload-spiffe-uds
          name: workload-socket
        - mountPath: /var/run/secrets/credential-uds
          name: credential-socket
        - mountPath: /var/run/secrets/workload-spiffe-credentials
          name: workload-certs
        - mountPath: /var/run/secrets/istio
          name: istiod-ca-cert
        - mountPath: /var/lib/istio/data
          name: istio-data
        - mountPath: /etc/istio/proxy
          name: istio-envoy
        - mountPath: /var/run/secrets/tokens
          name: istio-token
        - mountPath: /etc/istio/pod
          name: istio-podinfo
      imagePullSecrets:
      - name: deckhouse-registry
      {{- if $controller.spec.nodeSelector }}
      nodeSelector:
        {{- $controller.spec.nodeSelector | toYaml | nindent 8 }}
      {{- else }}
      {{- include "helm_lib_node_selector" (tuple $ "frontend") | nindent 6 }}
      {{- end }}
      securityContext:
        sysctls:
        - name: net.ipv4.ip_unprivileged_port_start
          value: "0"
      serviceAccountName: egress-gateway-controller
      {{- if $controller.spec.tolerations }}
      tolerations:
      {{- $controller.spec.tolerations | toYaml | nindent 6 }}
      {{- else }}
      {{- include "helm_lib_tolerations" (tuple $ "frontend") | nindent 6 }}
      {{- end }}
      volumes:
      - emptyDir: {}
        name: workload-socket
      - emptyDir: {}
        name: credential-socket
      - emptyDir: {}
        name: workload-certs
      - emptyDir:
          medium: Memory
        name: istio-envoy
      - emptyDir: {}
        name: istio-data
      - downwardAPI:
          defaultMode: 420
          items:
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels
            path: labels
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.annotations
            path: annotations
        name: istio-podinfo
      - name: istio-token
        projected:
          defaultMode: 420
          sources:
          - serviceAccountToken:
              audience: istio-ca
              expirationSeconds: 43200
              path: istio-token
      - configMap:
          defaultMode: 420
          name: istio-ca-root-cert
        name: istiod-ca-cert
{{- end }}
