{{- $moduleGateway := dict }}
{{- include "helm_lib_module_gateway" (list . $moduleGateway) }}
{{- if and $moduleGateway .Values.global.modules.publicDomainTemplate (include "helm_lib_kind_exists" (list . "HTTPRoute")) (include "helm_lib_kind_exists" (list . "ListenerSet")) }}
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  {{- include "helm_lib_module_labels" (list . (dict "app" "istio")) | nindent 2 }}
  name: istio
  namespace: d8-{{ $.Chart.Name }}
spec:
  listeners:
{{- if (include "helm_lib_module_https_route_tls_enabled" .) }}
  - allowedRoutes:
      namespaces:
        from: Same
    hostname: {{ include "helm_lib_module_public_domain" (list . "istio") }}
    name: istio
    port: 443
    protocol: HTTPS
    tls:
      certificateRefs:
      - group: ""
        kind: Secret
        name: {{ include "helm_lib_module_https_secret_name" (list . "istio-httproute-tls") }}
        namespace: d8-{{ $.Chart.Name }}
      mode: Terminate
  - allowedRoutes:
      namespaces:
        from: Same
    hostname: {{ include "helm_lib_module_public_domain" (list . "istio") }}
    name: istio-redirect
    port: 80
    protocol: HTTP
{{- else }}
  - allowedRoutes:
      namespaces:
        from: Same
    hostname: {{ include "helm_lib_module_public_domain" (list . "istio") }}
    name: istio
    port: 80
    protocol: HTTP
{{- end }}
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ $moduleGateway.name }}
    namespace: {{ $moduleGateway.namespace }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kiali
  namespace: d8-{{ $.Chart.Name }}
  annotations:
    web.deckhouse.io/export-name: "istio"
    web.deckhouse.io/export-icon: "/public/img/istio.ico"
    alb.network.deckhouse.io/backend-tls-settings: '{"mode": "MUTUAL", "caCertificates": "/etc/kube-rbac-proxy-client-ssl/ca.crt", "clientCertificate": "/etc/kube-rbac-proxy-client-ssl/client.crt", "privateKey": "/etc/kube-rbac-proxy-client-ssl/client.key", "insecureSkipVerify": true}'
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
  {{- if and (ne (include "helm_lib_module_https_mode" .) "Disabled") .Values.istio.auth.externalAuthentication }}
    alb.network.deckhouse.io/auth-response-headers: Authorization
    alb.network.deckhouse.io/auth-signin: {{ replace "$host" (include "helm_lib_module_public_domain" (list . "istio")) .Values.istio.auth.externalAuthentication.authSignInURL | quote }}
    alb.network.deckhouse.io/auth-url: {{ .Values.istio.auth.externalAuthentication.authURL | quote }}
    {{- if .Values.istio.auth.satisfyAny }}
    alb.network.deckhouse.io/satisfy: "any"
    {{- end }}
  {{- else }}
    alb.network.deckhouse.io/basic-auth-secret: d8-{{ $.Chart.Name }}/kiali-basic-auth
  {{- end }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "kiali")) | nindent 2 }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "istio") }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: istio
    namespace: d8-{{ $.Chart.Name }}
    sectionName: istio
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: kiali
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
{{- if (include "helm_lib_module_https_route_tls_enabled" .) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kiali-redirect
  namespace: d8-{{ $.Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "kiali")) | nindent 2 }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "istio") }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: istio
    namespace: d8-{{ $.Chart.Name }}
    sectionName: istio-redirect
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
    matches:
    - path:
        type: PathPrefix
        value: /
{{- end }}
{{- end }}
