{{- $moduleGateway := dict }}
{{- include "helm_lib_module_gateway" (list . $moduleGateway) }}
{{- if and $moduleGateway .Values.global.modules.publicDomainTemplate }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kiali
  namespace: d8-{{ $.Chart.Name }}
  annotations:
    web.deckhouse.io/export-name: "istio"
    web.deckhouse.io/export-icon: "/public/img/istio.ico"
    alb-gateway.network.deckhouse.io/gateway: {{ printf "%s/%s" $moduleGateway.namespace $moduleGateway.name }}
    alb-gateway.network.deckhouse.io/auto-create-xlistenerset: "true"
    alb-gateway.network.deckhouse.io/backend-tls-settings: '{"mode": "MUTUAL", "caCertificates": "/etc/kube-rbac-proxy-client-ssl/ca.crt", "clientCertificate": "/etc/kube-rbac-proxy-client-ssl/client.crt", "privateKey": "/etc/kube-rbac-proxy-client-ssl/client.key", "insecureSkipVerify": true}'
  {{- if (include "helm_lib_module_https_route_tls_enabled" .) }}
    alb-gateway.network.deckhouse.io/tls-secrets: d8-{{ $.Chart.Name }}/{{ include "helm_lib_module_https_secret_name" (list . "istio-httproute-tls") }}
  {{- end }}
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb-gateway.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
  {{- if and (ne (include "helm_lib_module_https_mode" .) "Disabled") .Values.istio.auth.externalAuthentication }}
    alb-gateway.network.deckhouse.io/auth-response-headers: Authorization
    alb-gateway.network.deckhouse.io/auth-signin: {{ replace "$host" (include "helm_lib_module_public_domain" (list . "istio")) .Values.istio.auth.externalAuthentication.authSignInURL | quote }}
    alb-gateway.network.deckhouse.io/auth-url: {{ .Values.istio.auth.externalAuthentication.authURL | quote }}
    {{- if .Values.istio.auth.satisfyAny }}
    alb-gateway.network.deckhouse.io/satisfy: "any"
    {{- end }}
  {{- else }}
    alb-gateway.network.deckhouse.io/basic-auth-secret: d8-{{ $.Chart.Name }}/kiali-basic-auth
  {{- end }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "kiali")) | nindent 2 }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "istio") }}
  parentRefs:
  - group: gateway.networking.x-k8s.io
    kind: XListenerSet
    name: istio
    namespace: d8-{{ $.Chart.Name }}
    sectionName: istio
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: kiali
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
{{- if (include "helm_lib_module_https_route_tls_enabled" .) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kiali-redirect
  namespace: d8-{{ $.Chart.Name }}
  annotations:
    alb-gateway.network.deckhouse.io/gateway: {{ printf "%s/%s" $moduleGateway.namespace $moduleGateway.name }}
    alb-gateway.network.deckhouse.io/auto-create-xlistenerset: "true"
  {{- include "helm_lib_module_labels" (list . (dict "app" "kiali")) | nindent 2 }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "istio") }}
  parentRefs:
  - group: gateway.networking.x-k8s.io
    kind: XListenerSet
    name: istio
    namespace: d8-{{ $.Chart.Name }}
    sectionName: istio-redirect
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
    matches:
    - path:
        type: PathPrefix
        value: /
{{- end }}
{{- end }}
