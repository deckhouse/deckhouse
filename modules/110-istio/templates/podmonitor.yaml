{{- if (.Values.global.enabledModules | has "operator-prometheus") }}
  {{- if $.Values.istio.internal.applicationNamespacesToMonitor }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: istio-sidecars
  namespace: d8-monitoring
  {{- include "helm_lib_module_labels" (list . (dict "prometheus" "main" "app" "istio-sidecar")) | nindent 2 }}
spec:
  jobLabel: app
  podMetricsEndpoints:
  - scheme: http
    path: /stats/prometheus
    relabelings:
    - action: keep
      regex: istio-proxy
      sourceLabels:
      - __meta_kubernetes_pod_container_name
    - action: replace
      regex: ([^:]+)(:\d+)?
      replacement: ${1}:15020
      sourceLabels:
      - __address__
      targetLabel: __address__
    - action: labeldrop
      regex: endpoint
    - action: replace
      replacement: istio-sidecars
      targetLabel: job
    - action: replace
      replacement: cluster
      targetLabel: tier
    - action: keep
      regex: "true"
      sourceLabels:
        - __meta_kubernetes_pod_ready
    - action: replace
      sourceLabels:
      - __meta_kubernetes_pod_name
      targetLabel: pod
    - action: replace
      sourceLabels:
      - __meta_kubernetes_namespace
      targetLabel: namespace
    - targetLabel: source
      replacement: deckhouse
  selector:
    matchExpressions:
    - key: service.istio.io/canonical-name
      operator: Exists
  namespaceSelector:
    matchNames:
    {{- $.Values.istio.internal.applicationNamespacesToMonitor | toYaml | nindent 4 }}
  {{- end }}
{{- end }}
