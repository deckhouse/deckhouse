{{- range $controller := .Values.istio.internal.ingressControllers }}
---
apiVersion: v1
kind: Service
metadata:
  name: ingress-gateway-controller-{{ $controller.name }}
  namespace: d8-ingress-{{ $.Chart.Name }}
  {{- include "helm_lib_module_labels" (list $ (dict
      "app"  "ingress-gateway-controller"
      "instance" $controller.name
  )) | nindent 2 }}
  {{- with ($controller.spec.loadBalancer).annotations }}
  annotations:
    {{- . | toYaml | nindent 4 }}
  {{- end }}
spec:
  {{- if ne $controller.spec.inlet "HostPort" }}
  externalTrafficPolicy: Local
  {{- end }}
  {{- if and (eq $controller.spec.inlet "LoadBalancer") ($controller.spec.loadBalancer).loadBalancerClass }}
  loadBalancerClass: {{ ($controller.spec.loadBalancer).loadBalancerClass | quote }}
  {{- end }}
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
    {{- if and (eq $controller.spec.inlet "NodePort") ($controller.spec.nodePort).httpPort }}
    nodePort: {{ ($controller.spec.nodePort).httpPort }}
    {{- end }}
  - name: https
    port: 443
    targetPort: https
    protocol: TCP
    {{- if and (eq $controller.spec.inlet "NodePort") ($controller.spec.nodePort).httpsPort }}
    nodePort: {{ ($controller.spec.nodePort).httpsPort }}
    {{- end }}
  selector:
    app: ingress-gateway-controller
    instance: {{ $controller.name }}
    istio.deckhouse.io/ingress-gateway-class: {{ $controller.spec.ingressGatewayClass | quote }}
  sessionAffinity: None
  {{- if eq $controller.spec.inlet "NodePort" }}
  type: NodePort
  {{- else if eq $controller.spec.inlet "HostPort" }}
  type: ClusterIP
  {{- else }}
  type: LoadBalancer
  {{- end }}
{{- end }}
