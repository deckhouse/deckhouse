---
apiVersion: v1
kind: Secret
metadata:
  name: cacerts
  namespace: d8-istio
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
  {{- if .Values.istio.internal.ca.source }}
  annotations:
    # Provenance marker used by the CA hook to recognize durable last-good secretRef material
    # after volatile internal values are lost on restart.
    istio.deckhouse.io/ca-source: {{ .Values.istio.internal.ca.source | quote }}
  {{- end }}
type: istio.io/ca-root
data:
  ca-cert.pem:    {{ .Values.istio.internal.ca.cert  | b64enc | quote }}
  ca-key.pem:     {{ .Values.istio.internal.ca.key   | b64enc | quote }}
  cert-chain.pem: {{ .Values.istio.internal.ca.chain | b64enc | quote }}
  root-cert.pem:  {{ .Values.istio.internal.ca.root  | b64enc | quote }}
