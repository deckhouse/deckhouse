{{- $telemetryAPI := $.Values.istio.telemetryAPI | default dict }}
---
apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: main-access-log-format
  namespace: d8-istio
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  accessLogging:
  - disabled: false
    providers:
    - name: main-access-log-format
{{- if $telemetryAPI.enabled }}
  metrics:
  - providers:
    - name: prometheus
{{- with include "istio.tracing.telemetryAPIProviderName" . }}
  tracing:
  - providers:
    - name: {{ . }}
    randomSamplingPercentage: {{ $.Values.istio.tracing.sampling | default 1.0 }}
{{- end }}
{{- end }}
