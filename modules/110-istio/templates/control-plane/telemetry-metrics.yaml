{{- if (($.Values.istio.telemetryAPI | default dict).enabled) }}
---
apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: main-prometheus-metrics
  namespace: d8-istio
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  metrics:
  - providers:
    - name: prometheus
{{- end }}
