spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          properties:
            spec:
              properties:
                egressGatewayClass:
                  description: |
                    Имя Egress-gateway класса для обслуживания Istio egressgateway controller.

                    Значение данного параметра используется в качестве селектора лейблов ресурса [Gateway](https://istio.io/latest/docs/reference/config/networking/gateway/).

                    Пример лейбла ресурса Gateway: `istio.deckhouse.io/egress-gateway-class: <egressGatewayClass value>`

                    Неизменяемый в течение жизни ресурса параметр.
                nodeSelector:
                  description: |
                    Как в `spec.nodeSelector` у подов.

                    Если значение не указано или указано `false`, будет использоваться [автоматика](../../#выделение-узлов-под-определенный-вид-нагрузки).

                    **Формат**: стандартный список `nodeSelector`. Поды инстанса унаследуют это поле как есть.
                tolerations:
                  description: |
                    Как в `spec.tolerations` у подов.

                    Если значение не указано или указано `false`, будет использоваться [автоматика](../../#выделение-узлов-под-определенный-вид-нагрузки).

                    **Формат**: стандартный список [toleration](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/). Поды инстанса унаследуют это поле как есть.
                resourcesRequests:
                  description: |
                    Настройки запросов (requests) CPU и памяти подами egress gateway.

                    Если параметр не указан, используются встроенные настройки режима VPA. В режиме `Static` запросы задаются непосредственно в секции `static`. В режиме `VPA` VPA изменяет запросы в заданных минимальных и максимальных пределах.
                  properties:
                    mode:
                      description: |
                        Режим управления ресурсами:
                        - `Static` — позволяет задать запросы непосредственно в секции `static`;
                        - `VPA` — использует [VPA](https://github.com/kubernetes/design-proposals-archive/blob/main/autoscaling/vertical-pod-autoscaler.md). Настроить этот режим можно в секции `vpa`.
                    vpa:
                      description: |
                        Параметры управления ресурсами в режиме VPA.
                      properties:
                        mode:
                          description: |
                            Режим работы VPA.

                            - `Initial` — VPA устанавливает начальные значения requests при создании пода. В дальнейшем значения ресурсов не изменяются автоматически.

                            - `InPlaceOrRecreate` — VPA пытается изменить ресурсы пода «на месте» (in-place), если это поддерживается кластером. Если in-place обновление невозможно, под будет пересоздан.

                            - `Auto` — VPA автоматически пересоздаёт поды для применения новых значений ресурсов. Начиная с версии Deckhouse 1.75 данный режим считается устаревшим. Рекомендуется использовать `InPlaceOrRecreate`.
                        cpu:
                          description: |
                            Настройки VPA при работе с CPU.
                          properties:
                            max:
                              description: |
                                Максимальное значение, которое может выставить VPA для запроса CPU (CPU requests).
                            min:
                              description: |
                                Минимальное значение, которое может выставить VPA для запроса CPU (CPU requests).
                        memory:
                          description: |
                            Настройки VPA при работе с памятью.
                          properties:
                            max:
                              description: |
                                Максимальное значение, которое может выставить VPA для запроса памяти (memory requests).
                            min:
                              description: |
                                Минимальное значение, которое может выставить VPA для запроса памяти (memory requests).
                    static:
                      description: |
                        Настройка управления ресурсами в режиме `Static`.
                      properties:
                        cpu:
                          description: |
                            Настройка запроса CPU (CPU requests).
                        memory:
                          description: |
                            Настройка запроса памяти (memory requests).
