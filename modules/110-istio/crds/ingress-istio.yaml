apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ingressistiocontrollers.deckhouse.io
  labels:
    heritage: deckhouse
    module: istio
    backup.deckhouse.io/cluster-config: "true"
spec:
  group: deckhouse.io
  scope: Cluster
  names:
    plural: ingressistiocontrollers
    singular: ingressistiocontroller
    kind: IngressIstioController
  preserveUnknownFields: false
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-validations:
            - rule: 'size(self.metadata.name) <= 36'
              message: 'IngressIstioController name must be no longer than 36 characters.'
            - rule: "self.metadata.name.matches('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')"
              message: 'IngressIstioController name must be a DNS label.'
          required: ['spec']
          properties:
            spec:
              type: object
              x-kubernetes-validations:
                - rule: 'self.ingressGatewayClass == oldSelf.ingressGatewayClass'
                  message: 'ingressGatewayClass is immutable.'
              required: ['ingressGatewayClass', 'inlet']
              properties:
                ingressGatewayClass:
                  type: string
                  maxLength: 63
                  description: |
                    Ingress gateway class is used by application [Gateway](https://istio.io/latest/docs/reference/config/networking/gateway/) resources for identifying the right Ingress gateway setup.

                    The identification is organized by setting the spec.selector: `istio.deckhouse.io/ingress-gateway-class: <ingressGatewayClass value>`.

                    This parameter does not change during the entire resource life.
                  x-doc-examples: ['istio']
                  pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
                inlet:
                  type: string
                  description: |
                    The way traffic goes to cluster from the outer network.
                    * `LoadBalancer` — Ingress controller is deployed and the service of `LoadBalancer` type is provisioned.
                    * `NodePort` — Ingress controller is deployed and available through nodes' ports via `nodePort`.
                    * `HostPort` — Ingress controller is deployed and available through nodes' ports via `hostPort`.

                      > **Caution.** There can be only one controller with this inlet type on a host.
                  enum: ["LoadBalancer","HostPort","NodePort"]
                networkTopology:
                  type: object
                  description: |
                    Configures how the gateway extracts the client's original attributes (e.g. the source IP address) when it is deployed behind other proxies or load balancers.

                    See [Configuring Gateway Network Topology](https://istio.io/latest/docs/ops/configuration/traffic-management/network-topologies/) in the Istio documentation.
                  properties:
                    numTrustedProxies:
                      type: integer
                      minimum: 0
                      x-doc-examples: [2]
                      description: |
                        Number of trusted proxies deployed in front of the Istio gateway proxy.

                        It is used to correctly extract the client address from the `X-Forwarded-For` header and populate the `X-Envoy-External-Address` header consumed by upstream services.

                        For example, if there is a cloud load balancer and a reverse proxy in front of the gateway, set this to `2`.

                        It can be used with `proxyProtocol`. When both are configured and an incoming request contains an `X-Forwarded-For` header, Istio uses the trusted `X-Forwarded-For` chain in preference to the PROXY protocol attributes.
                    proxyProtocol:
                      type: boolean
                      x-doc-examples: [true]
                      description: |
                        Enables the [PROXY protocol](https://www.haproxy.org/download/1.8/doc/proxy-protocol.txt) on the gateway's TCP listeners, so that client attributes (such as the source IP) forwarded by an upstream L4/TCP load balancer are preserved.

                        It can be used with `numTrustedProxies`. When both are configured and an incoming request contains an `X-Forwarded-For` header, Istio uses the trusted `X-Forwarded-For` chain in preference to the PROXY protocol attributes.
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                  x-kubernetes-preserve-unknown-fields: true
                  description: |
                    The same as in the pods' `spec.nodeSelector` parameter in Kubernetes.

                    If the parameter is omitted or `false`, it will be determined [automatically](../../#advanced-scheduling).

                    **Format**: the standard `nodeSelector` list. Instance pods inherit this field as is.
                tolerations:
                  type: array
                  description: |
                    [The same](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/) as in the pods' `spec.tolerations` parameter in Kubernetes;

                    If the parameter is omitted or `false`, it will be determined [automatically](../../#advanced-scheduling).

                    **Format**: the standard [toleration](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/) list. Instance pods inherit this field as is.
                  items:
                    type: object
                    properties:
                      effect:
                        type: string
                        enum: ["NoSchedule","PreferNoSchedule","NoExecute"]
                      operator:
                        type: string
                        default: "Equal"
                        enum: ["Exists","Equal"]
                      key:
                        type: string
                      tolerationSeconds:
                        format: int64
                        type: integer
                      value:
                        type: string
                loadBalancer:
                  type: object
                  x-doc-required: false
                  description: |
                    A section of parameters of the `LoadBalancer` inlet.
                  properties:
                    annotations:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                      description: |
                        Annotations to assign to the service for flexible configuration of the load balancer.
                      additionalProperties:
                        type: string
                    loadBalancerClass:
                      type: string
                      description: |
                        Class of the load balancer for incoming network requests (passed to the `spec.loadBalancerClass` parameter of the provisioned service with the `LoadBalancer` type).
                hostPort:
                  type: object
                  description: |
                    `HostPort` inlet settings.
                  anyOf:
                  - {required: ["httpPort"]}
                  - {required: ["httpsPort"]}
                  properties:
                    httpPort:
                      type: integer
                      description: |
                        Port for insecure HTTP connections.

                        If the parameter is not set, the connection over HTTP cannot be established.

                        This parameter is mandatory if `httpsPort` is not set.
                      x-doc-examples: [80]
                    httpsPort:
                      type: integer
                      description: |
                        Port for secure HTTPS connections.

                        If the parameter is not set, the connection over HTTPS cannot be established.

                        This parameter is mandatory if `httpPort` is not set.
                      x-doc-examples: [443]
                nodePort:
                  type: object
                  description: |
                    `NodePort` inlet settings.
                  anyOf:
                    - {required: ["httpPort"]}
                    - {required: ["httpsPort"]}
                  properties:
                    httpPort:
                      type: integer
                      description: |
                        Port for insecure HTTP connections.

                        If the parameter is not set, the connection over HTTP cannot be established.

                        This parameter is mandatory if `httpsPort` is not set.
                      x-doc-examples: [30080]
                    httpsPort:
                      type: integer
                      description: |
                        Port for secure HTTPS connections.

                        If the parameter is not set, the connection over HTTPS cannot be established.

                        This parameter is mandatory if `httpPort` is not set.
                      x-doc-examples: [30443]
                resourcesRequests:
                  required: ['mode']
                  type: object
                  description: |
                    Settings for CPU and memory requests and limits by ingress gateway pods.

                    If omitted, the built-in VPA mode defaults are used. In `Static` mode, requests are specified directly in `static`. In `VPA` mode, the VPA adjusts requests within the configured minimum and maximum bounds.
                  properties:
                    mode:
                      type: string
                      description: |
                        Resource management mode:
                        - `Static` — allows you to specify requests directly in the `static` section;
                        - `VPA` — uses [VPA](https://github.com/kubernetes/design-proposals-archive/blob/main/autoscaling/vertical-pod-autoscaler.md). You can configure this mode by modifying parameters in the `vpa` section.
                      enum: ['VPA', 'Static']
                      default: 'VPA'
                    vpa:
                      type: object
                      description: |
                        Resource management options for the `VPA` mode.
                      properties:
                        mode:
                          type: string
                          description: |
                            VPA operating mode.

                            - `Initial` — VPA sets initial values for pod resource requests at pod creation time. Resource values are not changed automatically afterwards.

                            - `InPlaceOrRecreate` — VPA attempts to update pod resources in place when supported by the cluster. If in-place updates are not possible, the pod is recreated.

                            - `Auto` — VPA automatically recreates pods to apply updated resource values. This mode is considered legacy starting from Deckhouse version 1.75; `InPlaceOrRecreate` is recommended.
                          enum: ['Initial', 'InPlaceOrRecreate', 'Auto']
                          default: 'Initial'
                        cpu:
                          type: object
                          description: |
                            CPU-related VPA settings.
                          properties:
                            max:
                              description: |
                                The maximum value that the VPA can set for the CPU requests.
                              default: '1000m'
                              type: string
                            min:
                              description: |
                                The minimum value that the VPA can set for the CPU requests.
                              default: '100m'
                              type: string
                        memory:
                          type: object
                          description: |
                            Memory-related VPA settings.
                          properties:
                            max:
                              description: |
                                The maximum memory requests the VPA can set.
                              default: '2000Mi'
                              type: string
                            min:
                              description: |
                                The minimum memory requests the VPA can set.
                              default: '128Mi'
                              type: string
                    static:
                      type: object
                      description: |
                        Resource management options for the `Static` mode.
                      properties:
                        cpu:
                          type: string
                          description: |
                            Configuring CPU requests.
                          default: '100m'
                        memory:
                          type: string
                          description: |
                            Configuring memory requests.
                          default: '128Mi'
              oneOf:
                - properties:
                    inlet:
                      enum: ['LoadBalancer']
                    loadBalancer: {}
                - properties:
                    inlet:
                      enum: ['HostPort']
                    hostPort: {}
                  required: ['hostPort']
                - properties:
                    inlet:
                      enum: ['NodePort']
                    nodePort: {}
                  required: ['nodePort']
      additionalPrinterColumns:
        - jsonPath: .spec.ingressGatewayClass
          name: Ingress_Gateway_Class
          description: 'Name of served istio ingress gateway class.'
          type: string
        - jsonPath: .spec.inlet
          name: Inlet
          description: 'The way traffic goes to current Ingress Controller from the outer network.'
          type: string

