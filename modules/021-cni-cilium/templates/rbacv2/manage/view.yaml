apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  {{- include "helm_lib_module_labels" (list . (dict "rbac.deckhouse.io/aggregate-to-networking-as" "viewer" "rbac.deckhouse.io/kind" "manage" "rbac.deckhouse.io/level" "module" "rbac.deckhouse.io/namespace" "d8-cni-cilium")) | nindent 2 }}
  name: d8:manage:permission:module:cni-cilium:view
rules:
- apiGroups:
  - deckhouse.io
  resourceNames:
  - cni-cilium
  resources:
  - moduleconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cilium.io
  resources:
  - ciliumnetworkpolicies
  - ciliumclusterwidenetworkpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - network.deckhouse.io
  resources:
  - egressgateways
  - egressgatewaypolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - get
  - list
  - watch
