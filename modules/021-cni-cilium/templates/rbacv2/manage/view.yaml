apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  {{- include "helm_lib_module_labels" (list . (dict "rbac.deckhouse.io/capability" "system-capability.cni-cilium.view" "rbac.deckhouse.io/aggregate-to-networking-as" "viewer" "rbac.deckhouse.io/kind" "capability" "rbac.deckhouse.io/scope" "system" "rbac.deckhouse.io/namespace" "d8-cni-cilium")) | nindent 2 }}
  name: d8:system-capability:cni-cilium:view
  annotations:
    en.meta.deckhouse.io/title: "Module cni-cilium: view configuration"
    ru.meta.deckhouse.io/title: "Модуль cni-cilium: просмотр конфигурации"
    en.meta.deckhouse.io/description: "Read-only access to the cni-cilium module configuration."
    ru.meta.deckhouse.io/description: "Доступ только на чтение к конфигурации модуля cni-cilium."
rules:
- apiGroups:
  - deckhouse.io
  resourceNames:
  - cni-cilium
  resources:
  - moduleconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cilium.io
  resources:
  - ciliumnetworkpolicies
  - ciliumclusterwidenetworkpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - network.deckhouse.io
  resources:
  - egressgateways
  - egressgatewaypolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - get
  - list
  - watch
