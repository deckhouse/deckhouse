---
image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: common/kube-rbac-proxy
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-relocate-artifact
  add: /relocate/bin/true
  to: /bin/true
  before: setup
- image: common/pause
  add: /pause
  to: /pause
  before: install
imageSpec:
  config:
    # Category B TLS profile (deckhouse TLS standard, see
    # go_lib/hooks/tls_certificate/README.md): see
    # modules/000-common/images/kube-rbac-proxy/werf.inc.yaml for the
    # rationale. RSA-key-exchange, CBC and SHA1 suites were removed.
    entrypoint: ["/kube-rbac-proxy", "--tls-min-version", "VersionTLS12", "--tls-cipher-suites", "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256"]
    expose: ["8080"]
---
{{- $binaries := "/bin/true" }}
---
image: {{ .ModuleName }}/{{ .ImageName }}-relocate-artifact
fromImage: common/relocate-artifact
final: false
shell:
 setup:
   - /binary_replace.sh -i "{{ $binaries }}" -o /relocate
---
{{- include "vex mitigation" (list $ (printf "%s/%s" $.ModuleName $.ImageName)) }}
