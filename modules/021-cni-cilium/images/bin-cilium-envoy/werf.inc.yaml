{{- $ciliumProxyRev := "a7f42a3390781539911b5b9107881b35ecc4e752" }}
{{- $bazelVersions := "7.7.1" }}
{{- $envoySHA := "ee7784f95f506e2a606ae668f0d9f70f9d26af83" }}
{{- $ciliumProxyCacheRev := "v1.36.8-1781157951-a7f42a3390781539911b5b9107881b35ecc4e752-alt-p11-llvm18-gcc13-v1" }}
{{- $ciliumProxyDepsRev := "v1.36.8-1781157951-a7f42a3390781539911b5b9107881b35ecc4e752-alt-p11-llvm18-gcc13-lfs-v1" }}
#  to force manual creation of fresh build cache
{{- $buildWithPreparedCacheAndDeps := false }}
#
---
# #####################################################################
# Build cilium-envoy binaries
# Original IMAGE_TAG of cilium-envoy is v1.36.8-1781157951-a7f42a3390781539911b5b9107881b35ecc4e752
# Corresponding commit is a7f42a3390781539911b5b9107881b35ecc4e752
# Based on https://github.com/cilium/cilium/blob/v1.17.17/images/cilium/Dockerfile#L9
# and https://github.com/cilium/proxy/blob/a7f42a3390781539911b5b9107881b35ecc4e752/Dockerfile.builder
# and https://github.com/cilium/proxy/blob/a7f42a3390781539911b5b9107881b35ecc4e752/Dockerfile
# and https://github.com/cilium/proxy/blob/a7f42a3390781539911b5b9107881b35ecc4e752/.github/workflows/build-envoy-images-release.yaml
# #####################################################################
---
image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
git:
- add: /{{ .ModulePath }}modules/{{ .ModulePriority }}-{{ .ModuleName }}/images/{{ .ImageName }}/patches
  to: /patches
  stageDependencies:
    install:
    - '**/*'
secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  install:
  - git clone $(cat /run/secrets/SOURCE_REPO)/cilium/proxy.git /src/proxy
  - cd /src/proxy
  - git checkout {{ $ciliumProxyRev }}
  - ls /patches/proxy/*.patch >/dev/null 2>&1 && git apply --verbose --allow-empty /patches/proxy/*.patch
  - rm -rf /src/proxy/.git
  #
  - git clone $(cat /run/secrets/SOURCE_REPO)/envoyproxy/envoy.git /src/envoy
  - cd /src/envoy
  - git checkout {{ $envoySHA }}
  - ls /patches/envoy/*.patch >/dev/null 2>&1 && git apply --verbose --allow-empty /patches/envoy/*.patch
  # original cilium patches
  - git apply --verbose /src/proxy/patches/*.patch
  - rm -rf /src/envoy/.git
---
image: {{ .ModuleName }}/cilium-envoy-artifact
fromImage: {{ .ModuleName }}/base-cilium-dev
final: false
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
- from: {{ index $.Images "libs/glibc-v2.41" }}
  add: /lib64/libm.so.6
  to: /usr/lib64/libm.so.6
  before: install
- from: {{ index $.Images "libs/glibc-v2.41" }}
  add: /lib64/libc.so.6
  to: /usr/lib64/libc.so.6
  before: install
- from: {{ index $.Images "libs/glibc-v2.41" }}
  add: /lib64/ld-linux-x86-64.so.2
  to: /usr/lib64/ld-linux-x86-64.so.2
  before: install
mount:
{{ include "mount points for golang builds" . }}
- from: tmp_dir
  to: /root/.cache/bazel
{{- if $buildWithPreparedCacheAndDeps }}
- from: tmp_dir
  to: /home/cilium/.cache/bazel
- from: tmp_dir
  to: /home/cilium/.cache/go-build
- from: tmp_dir
  to: /tmp/bazel-cache
- from: tmp_dir
  to: /tmp/bazel-deps
{{- end }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  install:
  - mkdir -p /cilium && mv /src/proxy /cilium/
  - sed -i "s/# root ALL=(ALL:ALL) ALL/root ALL=(ALL:ALL) ALL/" /etc/sudoers
  - echo 'Defaults env_keep += "ALTWRAP_LLVM_VERSION GCC_VERSION"' >> /etc/sudoers
  - echo 'Defaults env_keep += "GOPROXY GOPATH GOROOT GOOS GOARCH GO_VERSION CGO_ENABLED"' >> /etc/sudoers
  - echo 'Defaults env_keep += "TARGETARCH ARCH BAZEL_VERSION USE_BAZEL_VERSION BAZEL_OUTPUT_BASE"' >> /etc/sudoers
  - echo 'Defaults env_keep += "BAZEL_BUILD_OPTS PKG_BUILD V DEBUG DESTDIR"' >> /etc/sudoers
  - groupadd -f -g 1337 cilium && useradd -m -g cilium -u 1337 cilium
  - chown -R 1337:1337 /home/cilium /cilium/proxy /src/envoy
  - chmod -R a+w /tmp
  setup:
  - ln -f -s llvm-18.1 "/usr/lib/llvm-18"
  #
  # cache
{{- if $buildWithPreparedCacheAndDeps }}
  - git clone --depth 1 --branch {{ $ciliumProxyCacheRev }} $(cat /run/secrets/SOURCE_REPO)/cilium/proxy-build-cache.git /tmp/bazel-cache
  - git lfs install
  - git clone --depth 1 --branch {{ $ciliumProxyDepsRev }} $(cat /run/secrets/SOURCE_REPO)/cilium/proxy-build-deps.git /tmp/bazel-deps
{{- else }}
  - mkdir -v -p /tmp/bazel-cache
  - mkdir -v -p /tmp/bazel-deps
{{- end }}
  - chown -R 1337:1337 /tmp/bazel-cache /tmp/bazel-deps /home/cilium/.cache
  #
  - export ALTWRAP_LLVM_VERSION=18.1 GCC_VERSION=13
  - export TARGETARCH=amd64 ARCH="x86_64"
  #
  - export GO_VERSION=${GOLANG_VERSION} GOPROXY=$(cat /run/secrets/GOPROXY)
  - export GOOS=linux GOARCH=amd64 CGO_ENABLED=0
  - cd /cilium/proxy
  - go mod vendor && go mod verify
  # Remove compile-time interface assertion in checkmate to fix newer Go versions compatibility (testing.TB interface changed).
  # This is safe because checkmate is a transitive test dependency, its *C type is not used in Cilium production code as testing.TB,
  # and this change just stops the compiler from failing on unused code interface checks.
  - '[ -f vendor/github.com/cilium/checkmate/check.go ] && sed -i "/var _ testing.TB =/d" vendor/github.com/cilium/checkmate/check.go || true'
  - sudo -u cilium PATH=${PATH} make -C proxylib all
  - sudo -u cilium PATH=${PATH} mkdir -p /tmp/install/usr/lib
  - mv proxylib/libcilium.so /tmp/install/usr/lib/libcilium.so
  #
  - export BAZEL_VERSION="{{ $bazelVersions }}" USE_BAZEL_VERSION="{{ $bazelVersions }}"
  # Forward ALTWRAP_LLVM_VERSION into bazel actions: /usr/bin/clang is an ALT altwrap wrapper that
  # selects the LLVM version from this env var (otherwise it falls back to the newest installed, e.g. 19.1).
  # bazel runs compile actions in a sandbox that does not inherit the shell env, so it must be passed explicitly.
{{- if $buildWithPreparedCacheAndDeps }}
  - export BAZEL_BUILD_OPTS="--disk_cache=/tmp/bazel-cache --nofetch --action_env=ALTWRAP_LLVM_VERSION=18.1 --host_action_env=ALTWRAP_LLVM_VERSION=18.1"
{{- else }}
  - export BAZEL_BUILD_OPTS="--disk_cache=/tmp/bazel-cache --action_env=ALTWRAP_LLVM_VERSION=18.1 --host_action_env=ALTWRAP_LLVM_VERSION=18.1"
{{- end }}
  - export PKG_BUILD=1 V=$V DEBUG=$DEBUG DESTDIR=/tmp/install
  #
  - cd /cilium/proxy
  - sudo -u cilium echo "{{ $ciliumProxyRev }}" >SOURCE_VERSION
  #
  - sudo -u cilium sed -i "30,52d" WORKSPACE
  - sudo -u cilium sed -i '30i local_repository(' WORKSPACE
  - sudo -u cilium sed -i '31i \    name = "envoy",' WORKSPACE
  - sudo -u cilium sed -i '32i \    path = "/src/envoy",' WORKSPACE
  - sudo -u cilium sed -i '33i )' WORKSPACE
  #
  # Inject ALT-specific clang/gcc paths into the bazel cc_toolchain_config.
  # Anchored on file content (not line numbers) because cilium/proxy reworked bazel/toolchains/BUILD
  # (two cc_toolchain blocks: aarch64 + x86_64). The aarch64 block also gets these entries, but it is
  # never built (target platform is //bazel:linux_x86_64), so the extra strings are harmless.
  - sudo -u cilium sed -i '\#"/usr/include"#a \        "/usr/lib/llvm-18.1/lib64/clang/18/include",' bazel/toolchains/BUILD
  - sudo -u cilium sed -i '\#-Wno-deprecated-builtins#a \        "--gcc-install-dir=/usr/bin/../lib64/gcc/x86_64-alt-linux/13",' bazel/toolchains/BUILD
  #
  - export BAZEL_OUTPUT_BASE=$(sudo -u cilium PATH=${PATH} bazel info output_base)
  - sudo -u cilium PATH=${PATH} mkdir -p ${BAZEL_OUTPUT_BASE}/external
{{- if $buildWithPreparedCacheAndDeps }}
  - sudo -u cilium PATH=${PATH} tar -zxf /tmp/bazel-deps/external.tar.gz -C ${BAZEL_OUTPUT_BASE}/external
{{- else }}
  - rm -rf /tmp/bazel-deps
{{- end }}
  #
  - sudo -u cilium PATH=${PATH} make clang.bazelrc
  #
  - sudo -u cilium PATH=${PATH} make bazel-bin/cilium-envoy-starter bazel-bin/cilium-envoy
  - sudo -u cilium PATH=${PATH} ./bazel/get_workspace_status
  - sudo -u cilium PATH=${PATH} make install
  - rm -rf /cilium/proxy/vendor
