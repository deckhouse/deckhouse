# #####################################################################
# Based on https://github.com/cilium/cilium/blob/v1.17.4/images/operator/Dockerfile
# #####################################################################
---
image: {{ .ModuleName }}/{{ .ImageName }}-build-artifact
from: {{ index $.Images ( eq $.SVACE_ENABLED "false" | ternary "builder/golang-alpine" "builder/golang-alpine-svace" ) }}
final: false
import:
- image: {{ .ModuleName }}/bin-cilium-src-artifact
  add: /src
  to: /src
  before: install
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  beforeInstall:
  {{- include "alpine packages proxy" . | nindent 2 }}
  - apk add --no-cache make git bash
  install:
  - export GO_VERSION=${GOLANG_VERSION}
  - export GOPROXY=$(cat /run/secrets/GOPROXY)
  - export GOOS=linux GOARCH=amd64
  - cd /src/cilium
  - go mod vendor && go mod verify
  # Remove compile-time interface assertion in checkmate to fix newer Go versions compatibility (testing.TB interface changed).
  # This is safe because checkmate is a transitive test dependency, its *C type is not used in Cilium production code as testing.TB,
  # and this change just stops the compiler from failing on unused code interface checks.
  - '[ -f vendor/github.com/cilium/checkmate/check.go ] && sed -i "/var _ testing.TB =/d" vendor/github.com/cilium/checkmate/check.go || true'
  - |
    {{- $buildContext := deepCopy $ -}}
    {{- $_ := set $buildContext "SvaceBuildOptions" "--enable-ptrace-all" -}}
    {{- $_ := set $buildContext "BuildCommand" `make DESTDIR=/out/linux/amd64 build-container-operator install-container-binary-operator` -}}
    {{- include "image-build.build" $buildContext | indent 4 }}
  - chown 64535:64535 /out/linux/amd64/usr/bin/cilium-operator
  - chmod 0700 /out/linux/amd64/usr/bin/cilium-operator
  - rm -rf /src/cilium/vendor
---
image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: common/distroless
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-build-artifact
  add: /out/linux/amd64/usr/bin/cilium-operator
  to: /usr/bin/cilium-operator
  before: install
git:
{{- include "image mount points" . }}
imageSpec:
  config:
    entrypoint: ["/usr/bin/cilium-operator"]
