{{- $bpftoolRev := "14bb1e8c8d4ad5d9d2febb7d19c70a3cf536e1e5" }}
---
# #####################################################################
# Build BPFTOOL binaries (based on base-cilium-dev)
# Original IMAGE_TAG of BPFTOOL is 5a9c4852a21287686009bfe1cdc1fed6e7aabdea
# Corresponding commit 0e4de6ffe79e97a9795f1ce887a45026e1af22a7 (https://github.com/cilium/image-tools/tree/3f125f524cdf74e20c1ac73855042a9254747855)
# Based on https://github.com/cilium/cilium/blob/v1.17.4/images/runtime/Dockerfile#L9
# and https://github.com/cilium/image-tools/blob/0e4de6ffe79e97a9795f1ce887a45026e1af22a7/images/bpftool/Dockerfile
# and https://github.com/cilium/image-tools/blob/0e4de6ffe79e97a9795f1ce887a45026e1af22a7/images/bpftool/checkout-linux.sh
# and https://github.com/cilium/image-tools/blob/0e4de6ffe79e97a9795f1ce887a45026e1af22a7/images/bpftool/build-bpftool-native.sh
# and https://github.com/cilium/image-tools/blob/063fa0d879d9560b85b6134c48ece08e672fa057/images/compilers/install-deps.sh
#
# Corresponding IMAGE_TAG of compilers is 5569a29cea6b3ad50aeb03102aaf3dc03841197c
# Corresponding commit is 063fa0d879d9560b85b6134c48ece08e672fa057 (https://github.com/cilium/image-tools/tree/063fa0d879d9560b85b6134c48ece08e672fa057)
# #####################################################################
# ---
# image: {{ .ModuleName }}/{{ .ImageName }}-zstd-dev
# from: dev-registry.deckhouse.io/base_images@sha256:14a97086e5d77537cc3a5252c7bc64206fc02f520530fc3b9430dbfd4317cb5b
# final: false
# ---
# image: {{ .ModuleName }}/{{ .ImageName }}-elfutils-dev
# from: dev-registry.deckhouse.io/base_images@sha256:f69c711420769fd390569d1286ca7a6af9eb283ffc69ae244b1406344588398f
# final: false
---
image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  install:
  - git clone $(cat /run/secrets/SOURCE_REPO)/bpf/bpf-next.git /src/linux
  - cd /src/linux
  - git checkout {{ $bpftoolRev }}
  - rm -rf /src/linux/.git
---
image: {{ .ModuleName }}/bpftool-artifact
# fromImage: {{ .ModuleName }}/base-cilium-dev
fromImage: builder/alpine
final: false
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
- image: libs/zlib
  add: /
  to: /libs/zlib
  before: install
  includePaths:
    - usr/lib
    - usr/lib64
    - usr/include
    - usr/bin
    - usr/sbin
    - usr/share
# - image: tools/elfutils
#   add: /
#   to: /tools/elfutils
#   before: install
#   includePaths:
#     - usr/lib
#     - usr/lib64
#     - usr/include
#     - usr/bin
#     - usr/sbin
#     - usr/share
- image: libs/zstd
  add: /
  to: /libs/zstd
  before: install
  includePaths:
    - usr/lib
    - usr/lib64
    - usr/include
    - usr/bin
    - usr/sbin
    - usr/share
- image: libs/musl
  add: /
  to: /libs/musl
  before: install
  includePaths:
    - usr/lib
    - usr/lib64
    - usr/include
    - usr/bin
    - usr/sbin
    - usr/share
- image: tools/openssl
  add: /
  to: /tools/openssl
  before: install
  includePaths:
    - usr/lib
    - usr/lib64
    - usr/include
    - usr/bin
    - usr/sbin
    - usr/share
shell:
  beforeInstall:
  - apk add --no-cache rsync make python3 gcc linux-headers bison binutils-dev clang20 glib-dev libbpf-dev libcap-dev libnl3-dev libtool libtraceevent-dev libunwind-dev llvm20-dev ncurses-dev numactl-dev elfutils
  install:
  - |
    if [[ -d /libs ]]; then
        for lib in $(ls -1 /libs); do
          cd /libs/${lib}
          rsync -aulv * /
        done
      rm -rf /libs
    fi
  - |
    if [[ -d /tools ]]; then
      for tool in $(ls -1 /tools); do
        cd /tools/${tool}
        rsync -aulv * /
      done
      rm -rf /tools
    fi
  - export GCC_VERSION=11
  - cd /src/linux/tools/bpf/bpftool
  - ls -la /usr/lib
  - make V=1 EXTRA_CFLAGS="--static" EXTRA_LDFLAGS="-L/usr/lib" -j "$(getconf _NPROCESSORS_ONLN)"
  - strip bpftool
  - cp -a bpftool /usr/local/bin
