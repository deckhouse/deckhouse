---
# #####################################################################
# Final image of cilium-agent (used in helm-templates)
# Based on https://github.com/cilium/cilium/blob/v1.17.4/images/runtime/Dockerfile
# and https://github.com/cilium/cilium/blob/v1.17.4/images/runtime/install-runtime-deps.sh
# and https://github.com/cilium/cilium/blob/v1.17.4/images/cilium/Dockerfile (release stage)
---
# #####################################################################
# List of binary files used by agent
{{ $binariesFromBaseImages := "" }}
# shell-scripts dependencies
{{ $binariesFromBaseImages := cat $binariesFromBaseImages "/usr/bin/awk /usr/bin/bash /usr/bin/find /usr/bin/grep /usr/bin/sed" }}
{{ $binariesFromBaseImages := cat $binariesFromBaseImages "/usr/bin/nsenter /bin/mount" }}
{{ $binariesFromBaseImages := cat $binariesFromBaseImages "/usr/bin/basename /usr/bin/cat /usr/bin/cp /usr/bin/cut /usr/bin/echo /usr/bin/head" }}
{{ $binariesFromBaseImages := cat $binariesFromBaseImages "/usr/bin/ln /usr/bin/mkdir /usr/bin/mv /usr/bin/od /usr/bin/printf /usr/bin/rm /usr/bin/wc" }}
# groups
{{ $binariesFromBaseImages := cat $binariesFromBaseImages "/usr/bin/groups" }}
# for prepull
{{ $binariesFromBaseImages := cat $binariesFromBaseImages "/usr/bin/true" }}
# for cilium-cli sysdump
{{ $binariesFromBaseImages := cat $binariesFromBaseImages "/usr/bin/tar /usr/bin/stat /usr/bin/tail /usr/bin/timeout" }}
# for debug and usability
{{ $binariesFromBaseImages := cat $binariesFromBaseImages "/usr/bin/curl /usr/bin/env /usr/bin/ls /usr/bin/sleep" }}
#####################################################################
{{ $binariesFromALT := "" }}
# from base install script
{{ $binariesFromALT := cat $binariesFromALT "/etc/localtime" }} #### create link /etc/localtime -> /usr/share/zoneinfo/Etc/UTC
# shell-scripts dependencies
{{ $binariesFromALT := cat $binariesFromALT "/bin/sh" }} #### see shell operator / create link /bin/sh -> /bin/bash
# clang dependencies
{{ $binariesFromALT := cat $binariesFromALT "/usr/lib64/libstdc++.so.6" }}
# bash-completion
{{ $binariesFromALT := cat $binariesFromALT "/etc/bashrc.d/bash_completion.sh" }} ###### see linux utils / fox
{{ $binariesFromALT := cat $binariesFromALT "/usr/share/bash-completion/bash_completion" }} ###### see linux utils / fox
# for debug
{{ $binariesFromALT := cat $binariesFromALT "/usr/bin/ldd /usr/bin/strace" }}
#####################################################################
{{ $selfBuiltBinaries := "" }}
# from llvm-artifact
{{ $selfBuiltBinaries := cat $selfBuiltBinaries "/usr/local/bin/clang /usr/local/bin/llc" }}
# from bpftool-artifact
# {{ $selfBuiltBinaries := cat $selfBuiltBinaries "/usr/local/bin/bpftool" }} #### problem with dynamic link
# from cilium-envoy-artifact
{{ $selfBuiltBinaries := cat $selfBuiltBinaries "/usr/bin/cilium-envoy /usr/lib/libcilium.so" }} #### problem with dynamic link
# from cni-plugins-artifact
{{ $selfBuiltBinaries := cat $selfBuiltBinaries "/cni/loopback" }}
# from gops-artifact
{{ $selfBuiltBinaries := cat $selfBuiltBinaries "/bin/gops" }}
# from hubble-artifact
{{ $selfBuiltBinaries := cat $selfBuiltBinaries "/usr/bin/hubble /etc/bash_completion.d/hubble" }}
# from cilium-artifact
{{ $selfBuiltBinaries := cat $selfBuiltBinaries "/cni-uninstall.sh /init-container.sh /install-plugin.sh" }}
{{ $selfBuiltBinaries := cat $selfBuiltBinaries "/LICENSE.all /etc/bash_completion.d/cilium-dbg" }}
{{ $selfBuiltBinaries := cat $selfBuiltBinaries "/opt/cni/bin/cilium-cni /usr/bin/cilium*" }}
# from common/pause
{{ $selfBuiltBinaries := cat $selfBuiltBinaries "/pause" }}
# from /jq
{{ $selfBuiltBinaries := cat $selfBuiltBinaries "/usr/bin/jq" }}
# for check and cleaning unnecessary iptables
{{ $selfBuiltBinaries := cat $selfBuiltBinaries "/check-n-cleaning-iptables.sh" }}
# iptables and dependencies
{{ $selfBuiltBinaries := cat $selfBuiltBinaries "/sbin/xtables*" }}
{{ $selfBuiltBinaries := cat $selfBuiltBinaries "/usr/sbin/iptables-wrapper" }}
# ipset and dependencies
# {{ $selfBuiltBinaries := cat $selfBuiltBinaries "/usr/sbin/ipset" }} ### test
# kmod and dependencies
# {{ $selfBuiltBinaries := cat $selfBuiltBinaries "/bin/kmod /bin/lsmod /sbin/depmod /sbin/insmod /sbin/lsmod /sbin/modinfo /sbin/modprobe /sbin/rmmod" }} ### test
# iproute2 and dependencies
# {{ $selfBuiltBinaries := cat $selfBuiltBinaries "/sbin/dcb /sbin/devlink /sbin/ip /sbin/rdma /sbin/rtmon /sbin/tc /sbin/vdpa" }} ### test
# {{ $selfBuiltBinaries := cat $selfBuiltBinaries "/usr/sbin/bridge /usr/sbin/genl /usr/sbin/lnstat /usr/sbin/nstat /usr/sbin/rtacct /usr/sbin/ss /usr/sbin/tipc" }} ### test
# {{ $selfBuiltBinaries := cat $selfBuiltBinaries "/usr/sbin/ctstat /usr/sbin/rtstat" }} ### test
