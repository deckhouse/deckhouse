{{- if hasKey .Values "nodeManager" }}
{{- if hasKey .Values.nodeManager "internal" }}
{{- if .Values.nodeManager.internal.capiControllerManagerEnabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: yandex-credentials-capyandex
  namespace: d8-cloud-provider-yandex
  {{- include "helm_lib_module_labels" (list . (dict "app" "capyandex-controller-manager")) | nindent 2 }}
type: Opaque
data:
  folderID: {{ .Values.cloudProviderYandex.internal.providerClusterConfiguration.provider.folderID | toString | b64enc | quote }}
  serviceAccountJSON: {{ .Values.cloudProviderYandex.internal.providerClusterConfiguration.provider.serviceAccountJSON | toString | b64enc | quote }}
  clusterUUID: {{ .Values.global.discovery.clusterUUID | toString | b64enc | quote }}
{{- end }}
{{- end }}
{{- end }}
