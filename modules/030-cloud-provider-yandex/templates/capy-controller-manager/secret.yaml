---
apiVersion: v1
kind: Secret
metadata:
  name: yandex-credentials-capy
  namespace: d8-cloud-provider-yandex
  {{- include "helm_lib_module_labels" (list . (dict "app" "capy-controller-manager")) | nindent 2 }}
type: Opaque
data:
  key: {{ .Values.cloudProviderYandex.internal.providerClusterConfiguration.provider.serviceAccountJSON | toString | b64enc | quote }}
