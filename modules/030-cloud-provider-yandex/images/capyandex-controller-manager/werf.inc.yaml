{{- $version := include "get_oss_version_by_id" (list "capy-yandex" $) }}
{{- $patches := (printf "/%smodules/%s-%s/images/%s" $.ModulePath $.ModulePriority $.ModuleName $.ImageName) }}
{{- $patch := false }}
{{- range $path, $_ := $.Files.Glob (printf "%s/patches/*.patch" $patches) }}
  {{- $patch = true }}
{{- end }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: common/distroless
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
  add: /src/manager
  to: /capyandex-controller-manager
  before: setup
imageSpec:
  config:
    entrypoint: ["/capyandex-controller-manager"]
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
final: false
fromImage: common/src-artifact
{{- if $patch }}
git:
  - add: {{ $patches }}/patches
    to: /patches
    stageDependencies:
      install:
        - '**/*'
{{- end }}
secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  install:
  - git clone --depth 1 --branch {{ $version }} https://github.com/yandex-cloud/cluster-api-provider-yandex.git /src
  - cd /src
  {{- if $patch }}
  - git apply /patches/*.patch --verbose
  {{- end }}
  - rm -rf .git
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
final: false
from: {{ index $.Images "builder/golang-alpine" }}
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  install:
  - cd /src
  - GOPROXY=$(cat /run/secrets/GOPROXY) go mod download
  setup:
  - cd /src
  - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o manager main.go
  - chown 64535:64535 /src/manager
  - chmod 0755 /src/manager
