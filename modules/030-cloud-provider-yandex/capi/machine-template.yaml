apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: YandexMachineTemplate
metadata:
  annotations:
    checksum/instance-class: {{ .instanceClassChecksum | quote }}
    helm.sh/resource-policy: keep
  namespace: d8-cloud-instance-manager
  name: {{ .templateName | quote }}
  {{- include "helm_lib_module_labels" (list . (dict "node-group" .nodeGroup.name)) | nindent 2 }}
spec:
  template:
    spec:
      region: {{ .Values.nodeManager.internal.cloudProvider.yandex.region | quote }}
      zone: {{ .zoneName | quote }}
      folderID: {{ .Values.nodeManager.internal.cloudProvider.yandex.folderID | quote }}
      platformID: {{ .nodeGroup.instanceClass.platformID | default "standard-v3" | quote }}
      resources:
        cores: {{ .nodeGroup.instanceClass.cores }}
        coreFraction: {{ .nodeGroup.instanceClass.coreFraction | default 100 }}
        memoryMiB: {{ .nodeGroup.instanceClass.memory }}
        gpus: {{ .nodeGroup.instanceClass.gpus | default 0 }}
      bootDisk:
        type: {{ .nodeGroup.instanceClass.diskType | default "network-hdd" | quote }}
        sizeGiB: {{ .nodeGroup.instanceClass.diskSizeGB | default 50 }}
        imageID: {{ .nodeGroup.instanceClass.imageID | default .Values.nodeManager.internal.cloudProvider.yandex.instanceClassDefaults.imageID | quote }}
      networkInterfaces:
        - subnetID: {{ .nodeGroup.instanceClass.mainSubnet | default (index .Values.nodeManager.internal.cloudProvider.yandex.zoneToSubnetIdMap .zoneName) | quote }}
          assignPublicIPAddress: {{- if hasKey .nodeGroup.instanceClass "assignPublicIPAddress" }} {{ .nodeGroup.instanceClass.assignPublicIPAddress }}{{- else }} {{ .Values.nodeManager.internal.cloudProvider.yandex.shouldAssignPublicIPAddress }}{{- end }}
{{- range .nodeGroup.instanceClass.additionalSubnets }}
        - subnetID: {{ . | quote }}
{{- end }}
{{- if .nodeGroup.instanceClass.preemptible }}
      schedulingPolicy:
        preemptible: true
{{- end }}
      labels:
        kubernetes-io-cluster-deckhouse-{{ .Values.global.discovery.clusterUUID | sha256sum | trunc 30 }}: "1"
{{- if le (len .nodeGroup.name) 19 }}
        kubernetes-io-role-deckhouse-{{ .nodeGroup.name }}-{{ .zoneName }}: "1"
{{- else }}
        kubernetes-io-role-deckhouse-{{ .nodeGroup.name | sha256sum | trunc 19 }}-{{ .zoneName }}: "1"
{{- end }}
{{- $effectiveLabels := dict  }}
{{- if .Values.nodeManager.internal.cloudProvider.yandex.labels }}
  {{- $effectiveLabels = merge $effectiveLabels .Values.nodeManager.internal.cloudProvider.yandex.labels }}
{{- end }}
{{- if hasKey .nodeGroup.instanceClass "additionalLabels" }}
  {{- $effectiveLabels = mergeOverwrite $effectiveLabels .nodeGroup.instanceClass.additionalLabels  }}
{{- end }}
{{- range $k, $v := $effectiveLabels }}
        {{ $k | trunc 63 }}: {{ $v | trunc 63 }}
{{- end }}
      metadata:
        ssh-keys: {{ printf "user:%s" .Values.nodeManager.internal.cloudProvider.sshPublicKey | quote }}
        node-network-cidr: {{ .Values.nodeManager.internal.cloudProvider.yandex.nodeNetworkCIDR | quote }}
{{- if hasKey .nodeGroup.instanceClass "networkType" }}
      networkType: {{ .nodeGroup.instanceClass.networkType | quote }}
{{- end }}
