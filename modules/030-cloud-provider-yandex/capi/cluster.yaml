apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: YandexCluster
metadata:
  name: {{ .clusterName | default "yandex" | quote }}
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "capi-controller-manager")) | nindent 2 }}
spec:
  region: {{ .Values.nodeManager.internal.cloudProvider.yandex.region | quote }}
  folderID: {{ .Values.nodeManager.internal.cloudProvider.yandex.folderID | quote }}
  zoneToSubnetIdMap:
{{ toYaml .Values.nodeManager.internal.cloudProvider.yandex.zoneToSubnetIdMap | indent 4 }}
  shouldAssignPublicIPAddress: {{ .Values.nodeManager.internal.cloudProvider.yandex.shouldAssignPublicIPAddress }}
  nodeNetworkCIDR: {{ .Values.nodeManager.internal.cloudProvider.yandex.nodeNetworkCIDR | quote }}
