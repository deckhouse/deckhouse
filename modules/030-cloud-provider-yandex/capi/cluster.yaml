{{- $zoneToSubnetIdMap := .Values.nodeManager.internal.cloudProvider.yandex.zoneToSubnetIdMap -}}
{{- $defaultZone := first (keys $zoneToSubnetIdMap | sortAlpha) -}}
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: YandexCluster
metadata:
  name: {{ .clusterName | default "yandex" | quote }}
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "capi-controller-manager")) | nindent 2 }}
spec:
  folderID: {{ .Values.nodeManager.internal.cloudProvider.yandex.folderID | quote }}
  {{- if and (hasKey .Values.nodeManager.internal.cloudProvider.yandex "controlPlaneEndpoint") .Values.nodeManager.internal.cloudProvider.yandex.controlPlaneEndpoint.host .Values.nodeManager.internal.cloudProvider.yandex.controlPlaneEndpoint.port }}
  controlPlaneEndpoint:
    host: {{ .Values.nodeManager.internal.cloudProvider.yandex.controlPlaneEndpoint.host | quote }}
    port: {{ .Values.nodeManager.internal.cloudProvider.yandex.controlPlaneEndpoint.port }}
  {{- end }}
  loadBalancer:
    type: "ALB"
    listener:
      subnet:
        id: {{ index $zoneToSubnetIdMap $defaultZone | quote }}
