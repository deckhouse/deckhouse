---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: access-to-registry-packages-proxy
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-packages-proxy")) | nindent 2 }}
rules:
- apiGroups: ["apps"]
  resources: ["deployments/prometheus-metrics"]
  resourceNames: ["registry-packages-proxy"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: access-to-registry-packages-proxy
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-packages-proxy")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: access-to-registry-packages-proxy
subjects:
- kind: User
  name: d8-monitoring:scraper
- kind: ServiceAccount
  name: prometheus
  namespace: d8-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: access-to-registry-packages-proxy-from-http
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-packages-proxy")) | nindent 2 }}
rules:
  - apiGroups: ["apps"]
    resources:
      - "deployments/http"
    resourceNames: ["registry-packages-proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: access-to-registry-packages-proxy-from-http
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-packages-proxy")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: access-to-registry-packages-proxy-from-http
subjects:
- kind: ServiceAccount
  name: registry-packages-proxy
  namespace: d8-cloud-instance-manager
---
# ClusterRole granting permission to download deckhouse-cli and its plugins through
# registry-packages-proxy. Bind it (via RoleBinding in d8-cloud-instance-manager or via
# ClusterRoleBinding) to the users/ServiceAccounts that should be allowed to pull binaries.
# kube-rbac-proxy authorizes /v1/images/* requests via a SubjectAccessReview with attributes:
#   namespace=d8-cloud-instance-manager, group=apps, resource=deployments,
#   subresource=cli-binary, resourceName=registry-packages-proxy, verb=get.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:registry-packages-proxy:cli-download
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-packages-proxy")) | nindent 2 }}
rules:
  - apiGroups: ["apps"]
    resources:
      - "deployments/cli-binary"
    resourceNames: ["registry-packages-proxy"]
    verbs: ["get"]
---
# ClusterRole for future authenticated /v1/packages/* endpoints (icons are served
# anonymously via kube-rbac-proxy excludePaths). Bind it when adding routes that still
# require SubjectAccessReview with attributes:
#   namespace=d8-cloud-instance-manager, group=apps, resource=deployments,
#   subresource=packages, resourceName=registry-packages-proxy, verb=get.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:registry-packages-proxy:packages-download
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-packages-proxy")) | nindent 2 }}
rules:
  - apiGroups: ["apps"]
    resources:
      - "deployments/packages"
    resourceNames: ["registry-packages-proxy"]
    verbs: ["get"]
