{{- if and .Values.global.modules.publicDomainTemplate .Values.global.clusterIsBootstrapped }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: registry-packages-proxy
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-packages-proxy")) | nindent 2 }}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      {{- include "helm_lib_module_ingress_configuration_snippet" $ | nindent 6 }}
spec:
  ingressClassName: {{ include "helm_lib_module_ingress_class" . | quote }}
  rules:
  - host: {{ include "helm_lib_module_public_domain" (list . "deckhouse-cli") }}
    http:
      paths:
      - path: /v1/images/
        pathType: ImplementationSpecific
        backend:
          service:
            name: registry-packages-proxy
            port:
              name: https
  - host: {{ include "helm_lib_module_public_domain" (list . "packages") }}
    http:
      paths:
      - path: /packages/v1/(metadata|images)/
        pathType: ImplementationSpecific
        backend:
          service:
            name: registry-packages-proxy
            port:
              name: https
  {{- if (include "helm_lib_module_https_ingress_tls_enabled" .) }}
  tls:
    - hosts:
        - {{ include "helm_lib_module_public_domain" (list . "deckhouse-cli") }}
        - {{ include "helm_lib_module_public_domain" (list . "packages") }}
      secretName: {{ include "helm_lib_module_https_secret_name" (list . "ingress-tls") }}
  {{- end }}
{{- if eq (include "helm_lib_module_https_mode" .) "CertManager" }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: registry-packages-proxy
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-packages-proxy")) | nindent 2 }}
spec:
  certificateOwnerRef: false
  secretName: {{ include "helm_lib_module_https_secret_name" (list . "ingress-tls") }}
  {{ include "helm_lib_module_generate_common_name" (list . "deckhouse-cli") | nindent 2 }}
  {{ include "helm_lib_module_generate_common_name" (list . "packages") | nindent 2 }}
  dnsNames:
  - {{ include "helm_lib_module_public_domain" (list . "deckhouse-cli") }}
  - {{ include "helm_lib_module_public_domain" (list . "packages") }}
  issuerRef:
    name: {{ include "helm_lib_module_https_cert_manager_cluster_issuer_name" . }}
    kind: ClusterIssuer
{{- end }}
{{- end }}
