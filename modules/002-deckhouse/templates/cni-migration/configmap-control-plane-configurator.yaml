{{- if .Values.global.internal.cniMigrationWebhooksDisable }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: control-plane-configurator
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "cni-migration-manager" "control-plane-configurator" "")) | nindent 2 }}
data:
  disableAdmissionPlugins: "MutatingAdmissionWebhook,ValidatingAdmissionWebhook"
{{- end }}
