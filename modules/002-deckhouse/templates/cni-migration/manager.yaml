{{- if .Values.global.internal.cniMigrationEnabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cni-migration-manager
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "cni-migration-manager")) | nindent 2 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cni-migration-manager
  template:
    metadata:
      labels:
        app: cni-migration-manager
    spec:
      serviceAccountName: cni-migration-manager
      containers:
      - name: manager
        image: {{ include "helm_lib_module_common_image" (list . "cniMigration") }}
        args:
        - "--mode=manager"
        - "--metrics-bind-address=:42285"
        - "--health-probe-bind-address=:42282"
        ports:
        - name: healthz
          containerPort: 42282
          protocol: TCP
        - name: webhook
          containerPort: 42443
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: healthz
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: healthz
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: tls-certs
          mountPath: /etc/tls
          readOnly: true
      volumes:
      - name: tls-certs
        secret:
          secretName: cni-migration-certs
{{- end }}
