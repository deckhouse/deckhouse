{{- if .Values.global.internal.cniMigrationEnabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: cni-migration-certs
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "cni-migration-manager")) | nindent 2 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.deckhouse.internal.cniMigrationCert.crt | b64enc | quote }}
  tls.key: {{ .Values.deckhouse.internal.cniMigrationCert.key | b64enc | quote }}
  ca.crt: {{ .Values.deckhouse.internal.cniMigrationCert.ca  | b64enc | quote }}
{{- end }}
