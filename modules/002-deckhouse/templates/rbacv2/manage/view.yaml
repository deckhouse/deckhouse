apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:manage:capability:module:deckhouse:view
  labels:
    heritage: deckhouse
    module: deckhouse
    rbac.deckhouse.io/aggregate-to-deckhouse: "true"
    rbac.deckhouse.io/aggregate-to-role: view
    rbac.deckhouse.io/kind: manage
rules:
  - apiGroups:
      - deckhouse.io
    resources:
      - deckhousereleases
      - modules
      - moduleconfigs
      - moduledocumentations
      - modulepulloverrides
      - modulereleases
      - modulesources
      - moduleupdatepolicies
    verbs:
      - get
      - list
      - watch