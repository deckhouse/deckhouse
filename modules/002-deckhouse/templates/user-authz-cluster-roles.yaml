---
# Only view
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    user-authz.deckhouse.io/access-level: User
  name: d8:user-authz:deckhouse:user
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups:
  - deckhouse.io
  resources:
  - deckhousereleases
  - moduleconfigs
  - moduledocumentations
  - modulepulloverrides
  - modulereleases
  - modules
  - moduleupdatepolicies
  - packagerepositoryoperations
  - applicationpackageversions
  - applicationpackages
  - applications
  verbs:
  - get
  - list
  - watch
---
# View with secrets (modulesources and packagerepositories)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    user-authz.deckhouse.io/access-level: PrivilegedUser
  name: d8:user-authz:deckhouse:privileged-user
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups:
  - deckhouse.io
  resources:
  - deckhousereleases
  - moduleconfigs
  - moduledocumentations
  - modulepulloverrides
  - modulereleases
  - modules
  - moduleupdatepolicies
  - packagerepositoryoperations
  - applicationpackageversions
  - applicationpackages
  - applications
  - modulesources
  - packagerepositories
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    user-authz.deckhouse.io/access-level: Editor
  name: d8:user-authz:deckhouse:editor
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups:
  - deckhouse.io
  resources:
  - deckhousereleases
  - moduleconfigs
  - moduledocumentations
  - modulepulloverrides
  - modulereleases
  - modules
  - modulesources
  - moduleupdatepolicies
  - packagerepositories
  - packagerepositoryoperations
  - applicationpackageversions
  - applicationpackages
  - applications
  verbs:
  - create
  - delete
  - deletecollection
  - patch
  - update
