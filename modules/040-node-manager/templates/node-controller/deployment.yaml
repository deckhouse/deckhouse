{{- define "node_controller_resources" }}
cpu: 10m
memory: 50Mi
{{- end }}

{{- if (.Capabilities.APIVersions.Has "autoscaling.k8s.io/v1/VerticalPodAutoscaler") }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: node-controller
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: node-controller
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
  resourcePolicy:
    containerPolicies:
    - containerName: "node-controller"
      minAllowed:
        {{- include "node_controller_resources" . | nindent 8 }}
      maxAllowed:
        cpu: 50m
        memory: 128Mi
    {{- include "helm_lib_vpa_kube_rbac_proxy_resources" . | nindent 4 }}
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: node-controller
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
spec:
  maxUnavailable: {{ include "helm_lib_is_ha_to_value" (list . 1 0) }}
  selector:
    matchLabels:
      app: node-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-controller
  namespace: d8-cloud-instance-manager
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
spec:
  {{- include "helm_lib_deployment_on_master_strategy_and_replicas_for_ha" . | nindent 2 }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: node-controller
  template:
    metadata:
      labels:
        app: node-controller
    spec:
      {{- include "helm_lib_priority_class" (tuple . "system-cluster-critical") | nindent 6 }}
      {{- include "helm_lib_node_selector" (tuple . "master") | nindent 6 }}
      {{- include "helm_lib_tolerations" (tuple . "any-node" "with-uninitialized") | nindent 6 }}
      {{- include "helm_lib_module_pod_security_context_run_as_user_deckhouse" . | nindent 6 }}
      automountServiceAccountToken: true
      serviceAccountName: node-controller
      terminationGracePeriodSeconds: 10
{{- if not .Values.global.clusterIsBootstrapped }}
      hostNetwork: true
      dnsPolicy: Default
{{- end }}
      imagePullSecrets:
      - name: deckhouse-registry
      containers:
      - image: {{ include "helm_lib_module_image" (list . "nodeController") }}
        name: node-controller
        {{- include "helm_lib_module_container_security_context_pss_restricted_flexible" dict | nindent 8 }}
        command:
        - /node-controller
        args:
        - --metrics-bind-address=127.0.0.1:4291
        - --health-probe-bind-address=0.0.0.0:4292
        - --webhook-port=4290
        - --max-concurrent-reconciles=10
        - --leader-elect={{ include "helm_lib_is_ha_to_value" (list . "true" "false") }}
        - -v=4
        livenessProbe:
          httpGet:
            path: /healthz
            port: 4292
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 4292
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            {{- include "helm_lib_module_ephemeral_storage_only_logs" . | nindent 12 }}
            {{- include "node_controller_resources" . | nindent 12 }}
        env:
      # KUBERNETES_SERVICE_HOST and KUBERNETES_SERVICE_PORT to kubernetes-api-proxy are needed on the bootstrap phase to make node-controller work without kube-proxy
  {{- if not .Values.global.clusterIsBootstrapped }}
        - name: KUBERNETES_SERVICE_HOST
          value: 127.0.0.1
        - name: KUBERNETES_SERVICE_PORT
          value: "6445"
  {{- end }}
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4290
          name: webhook-server
          protocol: TCP
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      - name: kube-rbac-proxy
        {{- include "helm_lib_module_container_security_context_pss_restricted_flexible" dict | nindent 8 }}
        image: {{ include "helm_lib_module_common_image" (list . "kubeRbacProxy") }}
        args:
        - "--secure-listen-address=$(KUBE_RBAC_PROXY_LISTEN_ADDRESS):4291"
        - "--v=2"
        - "--logtostderr=true"
        - "--stale-cache-interval=1h30m"
        - "--livez-path=/livez"
        env:
        - name: KUBE_RBAC_PROXY_LISTEN_ADDRESS
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: KUBE_RBAC_PROXY_CONFIG
          value: |
            excludePaths:
            - /healthz
            upstreams:
            - upstream: http://127.0.0.1:4291/
              path: /
              authorization:
                resourceAttributes:
                  namespace: d8-cloud-instance-manager
                  apiGroup: apps
                  apiVersion: v1
                  resource: deployments
                  subresource: prometheus-metrics
                  name: node-controller
        ports:
        - containerPort: 4291
          name: https-metrics
        livenessProbe:
          httpGet:
            path: /livez
            port: 4291
            scheme: HTTPS
        readinessProbe:
          httpGet:
            path: /livez
            port: 4291
            scheme: HTTPS
        resources:
          requests:
            {{- include "helm_lib_module_ephemeral_storage_only_logs" . | nindent 12 }}
            {{- include "helm_lib_container_kube_rbac_proxy_resources" . | nindent 12 }}
      volumes:
      - name: cert
        secret:
          secretName: node-controller-webhook-tls
