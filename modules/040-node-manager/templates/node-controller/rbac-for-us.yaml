---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-controller
  namespace: d8-cloud-instance-manager
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
automountServiceAccountToken: false
---
# ClusterRole for node-controller
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:node-manager:node-controller
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
rules:
# NodeGroups - full access for status updates
- apiGroups:
  - deckhouse.io
  resources:
  - nodegroups
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - deckhouse.io
  resources:
  - nodegroups/status
  verbs:
  - get
  - update
  - patch
# Nodes - read and update for labels/taints
- apiGroups:
  - deckhouse.io
  resources:
  - instances
  verbs:
  - get
  - list
  - delete
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - delete
  - get
  - list
  - patch
  - update
  - watch
# CSINodes - read to detect a registered CSI driver (spec.drivers) before removing
# the node.deckhouse.io/csi-not-bootstrapped taint (csitaint controller, taken over
# from the remove_csi_taints hook).
- apiGroups:
  - storage.k8s.io
  resources:
  - csinodes
  verbs:
  - get
  - list
  - watch
# Secrets - read for configuration checksums and cloud provider data
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - pods/eviction
  verbs:
  - create
- apiGroups:
  - apps
  resources:
  - daemonsets
  verbs:
  - get
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
# MCM Machine and MachineDeployment - read for status calculation
- apiGroups:
  - machine.sapcloud.io
  resources:
  - machines
  - machinedeployments
  verbs:
  - get
  - list
  - watch
# MCM MachineSet - read + patch the deployment.kubernetes.io/revision-history annotation
# to cap its unbounded growth (machinesetrevision controller, taken over from the
# trim_machine_set_revision_history hook).
- apiGroups:
  - machine.sapcloud.io
  resources:
  - machinesets
  verbs:
  - get
  - list
  - watch
  - patch
# MCM MachineDeployment - create/patch (SSA) + delete on NodeGroup removal (capi-machine-deployment controller)
- apiGroups:
  - machine.sapcloud.io
  resources:
  - machinedeployments
  verbs:
  - create
  - update
  - patch
  - delete
# MCM provider MachineClass CRs - generated + applied by capi-machine-deployment controller (SSA)
- apiGroups:
  - machine.sapcloud.io
  resources:
  - alicloudmachineclasses
  - awsmachineclasses
  - azuremachineclasses
  - gcpmachineclasses
  - openstackmachineclasses
  - packetmachineclasses
  - vspheremachineclasses
  - yandexmachineclasses
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# CAPI Machine and related resources
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - machines
  - machinedeployments
  - clusters
  - machinehealthchecks
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# CAPI infrastructure resources (DeckhouseControlPlane, provider machine templates)
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - deckhousecontrolplanes
  - deckhousecontrolplanes/status
  verbs:
  - get
  - list
  - watch
  - patch
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - deckhousemachinetemplates
  - dynamixmachinetemplates
  - huaweicloudmachinetemplates
  - openstackmachinetemplates
  - staticmachinetemplates
  - vcdmachinetemplates
  - yandexmachinetemplates
  - zvirtmachinetemplates
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# MCM Machine
- apiGroups:
  - machine.sapcloud.io
  resources:
  - machines/status
  - machines
  verbs:
  - get
  - list
  - watch
  - update
  - patch
  - delete
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - machines/status
  verbs:
  - get
  - list
  - watch
# NodeConfigs - the per-node desired state of olcedar nodes. The node-config
# controller renders one object per node of an immutable NodeGroup; the on-node
# agent watches it and owns its status, which is why status is not listed here.
# NodeOperations - the record of every interruption of a node: node-manager
# creates the ones a node asks for and carries them through their phases, an
# operator creates the rest.
- apiGroups:
  - deckhouse.io
  resources:
  - nodeoperations
  verbs:
  - get
  - list
  - watch
  - create
  - patch
  - update
  - delete
- apiGroups:
  - deckhouse.io
  resources:
  - nodeoperations/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - internal.deckhouse.io
  resources:
  - nodeconfigs
  verbs:
  - get
  - list
  - watch
  - create
  - patch
  - update
  - delete
# NodeBootstrapConfigs and their templates - the CAPI bootstrap provider for
# immutable NodeGroups. The MachineSet clones a config per Machine; the
# node-bootstrap controller renders that machine's userdata into a Secret (create
# is covered by the namespaced d8-cloud-instance-manager secret Role below) and
# writes the v1beta2 bootstrap contract into status.
- apiGroups:
  - bootstrap.deckhouse.io
  resources:
  - nodebootstrapconfigs
  - nodebootstrapconfigtemplates
  verbs:
  - get
  - list
  - watch
  - create
  - patch
  - update
  - delete
- apiGroups:
  - bootstrap.deckhouse.io
  resources:
  - nodebootstrapconfigs/status
  verbs:
  - get
  - patch
  - update
# Instance lifecycle and status reconciliation
- apiGroups:
  - deckhouse.io
  resources:
  - instances
  verbs:
  - get
  - list
  - watch
  - create
  - patch
  - delete
- apiGroups:
  - deckhouse.io
  resources:
  - instances/status
  verbs:
  - get
  - patch
  - update
# ModuleConfig - read for validation (customTolerationKeys)
- apiGroups:
  - deckhouse.io
  resources:
  - moduleconfigs
  verbs:
  - get
  - list
  - watch
# NodeUsers - read + patch status.errors to drop stale per-node entries whose node no
# longer exists (nodeusercleanup controller, taken over from the clear_nodeuser_errors hook).
- apiGroups:
  - deckhouse.io
  resources:
  - nodeusers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - deckhouse.io
  resources:
  - nodeusers/status
  verbs:
  - get
  - patch
  - update
# NodeGroupConfigurations - read to aggregate the d8_node_group_configurations_total metric
# (ngconfigmetrics controller, taken over from the metrics_node_group_configurations hook).
- apiGroups:
  - deckhouse.io
  resources:
  - nodegroupconfigurations
  verbs:
  - get
  - list
  - watch
# InstanceClasses + catalog - read for bashible-apiserver-context blob (check #2 known-class-names,
# check #3 scale-from-zero capacity, and the resolved instanceClass overlay). Missing read makes
# cloud NodeGroups fail validation and diverges the blob -> bashible checksum churn -> node re-bootstrap.
# patch: the instanceclassusage controller (taken over from the set_instance_class_ng_usage hook)
# writes status.nodeGroupConsumers on the main resource (InstanceClass has no status subresource).
- apiGroups:
  - deckhouse.io
  resources:
  - awsinstanceclasses
  - azureinstanceclasses
  - dvpinstanceclasses
  - gcpinstanceclasses
  - yandexinstanceclasses
  - dynamixinstanceclasses
  - huaweicloudinstanceclasses
  - openstackinstanceclasses
  - vcdinstanceclasses
  - vsphereinstanceclasses
  - zvirtinstanceclasses
  - instancetypescatalogs
  verbs:
  - get
  - list
  - watch
  - patch
# ConfigMaps - read for cluster configuration
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
# Services - read + watch for the bashible-apiserver-context cluster DNS discovery
# (globals.go clusterDNSAddress) and to keep the bashible-context Service informer synced.
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - get
  - list
  - watch
# Endpoints - read for master node count validation
- apiGroups:
  - ""
  resources:
  - endpoints
  verbs:
  - get
  - list
  - watch
# EndpointSlices - read the default/kubernetes slice for clusterMasterEndpoints
# (bashible-apiserver-context). Missing read silently drops the apiserver endpoint
# and diverges the bashible bootstrap checksum -> node re-bootstrap.
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
# CRDs - for CAPI CRD migration controller
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
  - create
  - patch
  - update
# CertificateSigningRequests - issue the kubernetes-api-proxy discovery client
# cert (apiproxycert controller, taken over from the create_rbac_and_certificate
# _for_kubernetes_api_proxy hook): create + self-approve on the kube-apiserver
# -client signer, then delete the CSR.
- apiGroups:
  - certificates.k8s.io
  resources:
  - certificatesigningrequests
  verbs:
  - get
  - list
  - watch
  - create
  - delete
- apiGroups:
  - certificates.k8s.io
  resources:
  - certificatesigningrequests/approval
  verbs:
  - update
- apiGroups:
  - certificates.k8s.io
  resources:
  - signers
  resourceNames:
  - kubernetes.io/kube-apiserver-client
  # kubelet-serving: auto-approve kubelet serving-cert CSRs (kubeletcsrapprover
  # controller, taken over from the kubelet_csr_approver hook).
  - kubernetes.io/kubelet-serving
  verbs:
  - approve
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:node-manager:node-controller
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:node-manager:node-controller
subjects:
- kind: ServiceAccount
  name: node-controller
  namespace: d8-cloud-instance-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:node-manager:node-controller:rbac-proxy
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:rbac-proxy
subjects:
- kind: ServiceAccount
  name: node-controller
  namespace: d8-cloud-instance-manager
---
# Namespaced write access for the bashible-apiserver-context Secret, the single-writer
# replacement for the helm define bashible_input_data. Scoped to d8-cloud-instance-manager
# (least privilege) instead of widening the cluster-wide secret read to cluster-wide write.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: d8:node-manager:node-controller:bashible-context
  namespace: d8-cloud-instance-manager
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - create
  - update
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: d8:node-manager:node-controller:bashible-context
  namespace: d8-cloud-instance-manager
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: d8:node-manager:node-controller:bashible-context
subjects:
- kind: ServiceAccount
  name: node-controller
  namespace: d8-cloud-instance-manager
---
# Namespaced write access for the kubernetes-api-proxy-discovery-cert Secret the
# apiproxycert controller issues (taken over from the hook). Scoped to kube-system
# (least privilege) rather than widening the cluster-wide secret read to write.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: d8:node-manager:node-controller:apiproxy-cert
  namespace: kube-system
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - create
  - update
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: d8:node-manager:node-controller:apiproxy-cert
  namespace: kube-system
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: d8:node-manager:node-controller:apiproxy-cert
subjects:
- kind: ServiceAccount
  name: node-controller
  namespace: d8-cloud-instance-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:node-manager:deckhouse-hooks
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:node-manager:deckhouse-hooks
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:node-manager:deckhouse-hooks
subjects:
  - kind: ServiceAccount
    name: deckhouse
    namespace: d8-system
---
# The agent on an immutable node reaches the API with the kubelet's identity
# (user system:node:<name>, group system:nodes). The Node authorizer does not
# cover custom resources, so without this the agent can neither read the
# NodeConfig it is meant to reconcile nor report what it did with it — and the
# rollout, which waits for exactly that report, would never move past the first
# node.
#
# The grants are cluster-wide because both resources are cluster-scoped: RBAC
# cannot narrow them to "this node's own object". A node can therefore read the
# configs of its neighbours, which is the same trade kubelet self-registration
# makes; restricting it needs an admission policy rather than RBAC.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:node-manager:node-agent
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
# The desired state of the node, and the report of what the node made of it.
- apiGroups:
  - internal.deckhouse.io
  resources:
  - nodeconfigs
  verbs:
  - get
  - list
  - watch
  # A node whose object is missing on first contact registers one from the
  # config it was provisioned with: its status has nowhere else to go.
  - create
- apiGroups:
  - internal.deckhouse.io
  resources:
  - nodeconfigs/status
  verbs:
  - get
  - patch
  - update
# Operations tell the node what the cluster has prepared for it — a reboot to
# carry out, permission to interrupt itself — and the node reports the outcome
# through their status. Creating one is not the node's to do: that is the
# cluster's decision, or an operator's.
- apiGroups:
  - deckhouse.io
  resources:
  - nodeoperations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - deckhouse.io
  resources:
  - nodeoperations/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:node-manager:node-agent
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:node-manager:node-agent
subjects:
- kind: Group
  name: system:nodes
  apiGroup: rbac.authorization.k8s.io
