---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-controller
  namespace: d8-cloud-instance-manager
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
automountServiceAccountToken: false
---
# ClusterRole for node-controller
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:node-manager:node-controller
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
rules:
# NodeGroups - full access for status updates
- apiGroups:
  - deckhouse.io
  resources:
  - nodegroups
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - deckhouse.io
  resources:
  - nodegroups/status
  verbs:
  - get
  - update
  - patch
# Nodes - read and update for labels/taints
- apiGroups:
  - deckhouse.io
  resources:
  - instances
  verbs:
  - get
  - list
  - delete
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Secrets - read for configuration checksums and cloud provider data
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
  - delete
- apiGroups:
  - ""
  resources:
  - pods/eviction
  verbs:
  - create
- apiGroups:
  - apps
  resources:
  - daemonsets
  verbs:
  - get
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
# MCM Machine and MachineDeployment - read for status calculation
- apiGroups:
  - machine.sapcloud.io
  resources:
  - machines
  - machinedeployments
  verbs:
  - get
  - list
  - watch
# MCM MachineDeployment - patch replicas + delete on NodeGroup removal (capi-machine-deployment controller)
- apiGroups:
  - machine.sapcloud.io
  resources:
  - machinedeployments
  verbs:
  - update
  - patch
  - delete
# CAPI Machine and related resources
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - machines
  - machinedeployments
  - clusters
  - machinehealthchecks
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# CAPI infrastructure resources (DeckhouseControlPlane, provider machine templates)
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - deckhousecontrolplanes
  - deckhousecontrolplanes/status
  verbs:
  - get
  - list
  - watch
  - patch
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - deckhousemachinetemplates
  - dynamixmachinetemplates
  - huaweicloudmachinetemplates
  - staticmachinetemplates
  - vcdmachinetemplates
  - yandexmachinetemplates
  - zvirtmachinetemplates
  verbs:
  - get
  - list
# MCM Machine
- apiGroups:
  - machine.sapcloud.io
  resources:
  - machines/status
  - machines
  verbs:
  - get
  - list
  - watch
  - update
  - patch
  - delete
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - machines/status
  verbs:
  - get
  - list
  - watch
# Instance lifecycle and status reconciliation
- apiGroups:
  - deckhouse.io
  resources:
  - instances
  verbs:
  - get
  - list
  - watch
  - create
  - patch
  - delete
- apiGroups:
  - deckhouse.io
  resources:
  - instances/status
  verbs:
  - get
  - patch
  - update
# ModuleConfig - read for validation (customTolerationKeys)
- apiGroups:
  - deckhouse.io
  resources:
  - moduleconfigs
  verbs:
  - get
  - list
  - watch
# InstanceClasses + catalog - read for bashible-apiserver-context blob (check #2 known-class-names,
# check #3 scale-from-zero capacity, and the resolved instanceClass overlay). Missing read makes
# cloud NodeGroups fail validation and diverges the blob -> bashible checksum churn -> node re-bootstrap.
- apiGroups:
  - deckhouse.io
  resources:
  - awsinstanceclasses
  - azureinstanceclasses
  - dvpinstanceclasses
  - gcpinstanceclasses
  - yandexinstanceclasses
  - dynamixinstanceclasses
  - huaweicloudinstanceclasses
  - openstackinstanceclasses
  - vcdinstanceclasses
  - vsphereinstanceclasses
  - zvirtinstanceclasses
  - instancetypescatalogs
  verbs:
  - get
  - list
  - watch
# ConfigMaps - read for cluster configuration
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
# Endpoints - read for master node count validation
- apiGroups:
  - ""
  resources:
  - endpoints
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
# CRDs - for CAPI CRD migration controller
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
  - create
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:node-manager:node-controller
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:node-manager:node-controller
subjects:
- kind: ServiceAccount
  name: node-controller
  namespace: d8-cloud-instance-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:node-manager:node-controller:rbac-proxy
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:rbac-proxy
subjects:
- kind: ServiceAccount
  name: node-controller
  namespace: d8-cloud-instance-manager
---
# Namespaced write access for the bashible-apiserver-context Secret, the single-writer
# replacement for the helm define bashible_input_data. Scoped to d8-cloud-instance-manager
# (least privilege) instead of widening the cluster-wide secret read to cluster-wide write.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: d8:node-manager:node-controller:bashible-context
  namespace: d8-cloud-instance-manager
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - create
  - update
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: d8:node-manager:node-controller:bashible-context
  namespace: d8-cloud-instance-manager
  annotations:
    werf.io/deploy-on: pre-install,pre-upgrade,pre-rollback
    werf.io/track-termination-mode: WaitUntilResourceReady
  {{- include "helm_lib_module_labels" (list . (dict "app" "node-controller")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: d8:node-manager:node-controller:bashible-context
subjects:
- kind: ServiceAccount
  name: node-controller
  namespace: d8-cloud-instance-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:node-manager:deckhouse-hooks
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:node-manager:deckhouse-hooks
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:node-manager:deckhouse-hooks
subjects:
  - kind: ServiceAccount
    name: deckhouse
    namespace: d8-system
