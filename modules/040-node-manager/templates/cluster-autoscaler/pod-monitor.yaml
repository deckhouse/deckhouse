{{- define "cluster_autoscaler_pod_monitor" }}
  {{- $ctx := index . 0 }}
  {{- $name := index . 1 }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $name }}
  namespace: d8-monitoring
  {{- include "helm_lib_module_labels" (list $ctx (dict "prometheus" "main" "app" $name)) | nindent 2 }}
spec:
  jobLabel: app
  podMetricsEndpoints:
  - port: https-metrics
    scheme: https
    bearerTokenSecret:
      name: "prometheus-token"
      key: "token"
    tlsConfig:
      insecureSkipVerify: true
    relabelings:
    - regex: endpoint
      action: labeldrop
    - targetLabel: tier
      replacement: cluster
    - sourceLabels: [__meta_kubernetes_pod_ready]
      regex: "true"
      action: keep
  selector:
    matchLabels:
      app: {{ $name }}
  namespaceSelector:
    matchNames:
    - d8-cloud-instance-manager
{{- end }}

{{- if and (.Values.global.enabledModules | has "operator-prometheus") (include "cluster_autoscaler_enabled" .) (hasKey $.Values.nodeManager.internal "cloudProvider") }}
  {{- if not (include "cluster_autoscaler_split_mode" .) }}
{{ include "cluster_autoscaler_pod_monitor" (list . "cluster-autoscaler") }}
  {{- else if include "cluster_autoscaler_mcm_enabled" . }}
{{ include "cluster_autoscaler_pod_monitor" (list . "cluster-autoscaler-mcm") }}
  {{- end }}
  {{- if and (include "cluster_autoscaler_split_mode" .) (include "cluster_autoscaler_capi_enabled" .) }}
{{ include "cluster_autoscaler_pod_monitor" (list . "cluster-autoscaler") }}
  {{- end }}
{{- end }}
