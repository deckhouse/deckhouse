{{- define "cluster_autoscaler_rbac" }}
  {{- $ctx := index . 0 }}
  {{- $name := index . 1 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list $ctx (dict "app" $name)) | nindent 2 }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list $ctx (dict "app" $name)) | nindent 2 }}
rules:
- apiGroups:
  - machine.sapcloud.io
  resources:
  - machinedeployments
  - machines
  - machinesets
  - awsmachineclasses
  - gcpmachineclasses
  - openstackmachineclasses
  - vspheremachineclasses
  - yandexmachineclasses
  - azuremachineclasses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  verbs:
  - get
  - list
  - watch
  resources:
  - vcdmachinetemplates
  - huaweicloudmachinetemplates
  - dynamixmachinetemplates
  - zvirtmachinetemplates
  - deckhousemachinetemplates
  - yandexmachinetemplates
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - machinedeployments
  - machines
  - machinesets
  - machinedeployments/scale
  - machinepools
  verbs:
  - get
  - list
  - watch
- apiGroups: [""]
  resources: ["endpoints"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["endpoints"]
  resourceNames: [{{ $name | quote }}]
  verbs: ["get", "update", "patch", "delete"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["create"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  resourceNames: [{{ $name | quote }}]
  verbs: ["get", "update", "patch", "delete"]
- apiGroups:
  - machine.sapcloud.io
  resources:
  - machinedeployments
  - machines
  - machinedeployments/scale
  verbs:
  - patch
  - update
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - machinedeployments
  - machines
  - machinedeployments/scale
  verbs:
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - configmaps
  resourceNames:
  - cluster-autoscaler-priority-expander
  verbs:
  - delete
  - get
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list $ctx (dict "app" $name)) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}
subjects:
- kind: ServiceAccount
  name: {{ $name }}
  namespace: d8-cloud-instance-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:node-manager:{{ $name }}
  {{- include "helm_lib_module_labels" (list $ctx (dict "app" $name)) | nindent 2 }}
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/eviction"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["services", "replicationcontrollers", "persistentvolumes", "persistentvolumeclaims", "namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps", "extensions"]
  resources: ["daemonsets", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["statefulsets", "deployments"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses", "csinodes", "csistoragecapacities", "csidrivers", "volumeattachments"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "update", "patch"]
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  verbs:
  - get
  - list
  - watch
  resources:
  - vcdmachinetemplates
  - huaweicloudmachinetemplates
  - dynamixmachinetemplates
  - zvirtmachinetemplates
  - deckhousemachinetemplates
  - yandexmachinetemplates
- apiGroups: ["cluster.x-k8s.io"]
  resources:
  - machinedeployments
  - machines
  - machinesets
  - machinedeployments/scale
  - machinepools
  verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:node-manager:{{ $name }}
  {{- include "helm_lib_module_labels" (list $ctx (dict "app" $name)) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:node-manager:{{ $name }}
subjects:
- kind: ServiceAccount
  name: {{ $name }}
  namespace: d8-cloud-instance-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:node-manager:{{ $name }}:rbac-proxy
  {{- include "helm_lib_module_labels" (list $ctx (dict "app" $name)) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:rbac-proxy
subjects:
- kind: ServiceAccount
  name: {{ $name }}
  namespace: d8-cloud-instance-manager
{{- end }}

{{- if include "cluster_autoscaler_enabled" . }}
  {{- if not (include "cluster_autoscaler_split_mode" .) }}
{{ include "cluster_autoscaler_rbac" (list . "cluster-autoscaler") }}
  {{- else if include "cluster_autoscaler_mcm_enabled" . }}
{{ include "cluster_autoscaler_rbac" (list . "cluster-autoscaler-mcm") }}
  {{- end }}
  {{- if and (include "cluster_autoscaler_split_mode" .) (include "cluster_autoscaler_capi_enabled" .) }}
{{ include "cluster_autoscaler_rbac" (list . "cluster-autoscaler") }}
  {{- end }}
{{- end }}
