{{- define "cluster_autoscaler_rbac_to_us" }}
  {{- $ctx := index . 0 }}
  {{- $name := index . 1 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: access-to-{{ $name }}-prometheus-metrics
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list $ctx (dict "app" $name)) | nindent 2 }}
rules:
- apiGroups: ["apps"]
  resources: ["deployments/prometheus-metrics"]
  resourceNames: [{{ $name | quote }}]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: access-to-{{ $name }}-prometheus-metrics
  namespace: d8-cloud-instance-manager
  {{- include "helm_lib_module_labels" (list $ctx (dict "app" $name)) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: access-to-{{ $name }}-prometheus-metrics
subjects:
- kind: User
  name: d8-monitoring:scraper
- kind: ServiceAccount
  name: prometheus
  namespace: d8-monitoring
{{- end }}

{{- if include "cluster_autoscaler_enabled" . }}
  {{- if not (include "cluster_autoscaler_split_mode" .) }}
{{ include "cluster_autoscaler_rbac_to_us" (list . "cluster-autoscaler") }}
  {{- else if include "cluster_autoscaler_mcm_enabled" . }}
{{ include "cluster_autoscaler_rbac_to_us" (list . "cluster-autoscaler-mcm") }}
  {{- end }}
  {{- if and (include "cluster_autoscaler_split_mode" .) (include "cluster_autoscaler_capi_enabled" .) }}
{{ include "cluster_autoscaler_rbac_to_us" (list . "cluster-autoscaler") }}
  {{- end }}
{{- end }}
