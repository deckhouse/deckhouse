{{ $ctx := . }}
{{- range $ng := .Values.nodeManager.internal.nodeGroups }}
  {{- $mode := dig "fencing" "mode" "" $ng }}
  {{- if or (eq $mode "Watchdog") (eq $mode "Notify") }}
    {{- $timeout := dig "fencing" "watchdog" "timeout" 60 $ng }}
---
apiVersion: deckhouse.io/v1alpha1
kind: NodeGroupConfiguration
metadata:
  name: enable-watchdog-for-nodegroup-{{ $ng.name }}.sh
  labels:
    app: fencing-agent
spec:
  weight: 99
  nodeGroups: ["{{ $ng.name }}"]
  bundles: ["*"]
  content: |
    bb-sync-file /etc/udev/rules.d/60-watchdog.rules - <<"EOF"
    KERNEL=="watchdog*", OWNER="64535", GROUP="root", MODE="0660"
    EOF

    bb-event-on 'nodegroup-watchdog-service-changed' '_nodegroup_watchdog_service'
    function _nodegroup_watchdog_service() {
      systemctl daemon-reload
      systemctl reload-or-restart nodegroup-watchdog.service
      systemctl enable --now nodegroup-watchdog.service
    }

    bb-sync-file /etc/systemd/system/nodegroup-watchdog.service - nodegroup-watchdog-service-changed <<"EOF"
    [Unit]
    Description=Nodegroup watchdog manager service
    After=multi-user.target

    [Service]
    Type=oneshot
    RemainAfterExit=yes
    ExecStart=/opt/deckhouse/bin/nodegroup-watchdog.sh start
    ExecStop=/opt/deckhouse/bin/nodegroup-watchdog.sh stop
    ExecReload=/opt/deckhouse/bin/nodegroup-watchdog.sh start

    [Install]
    WantedBy=multi-user.target
    EOF

    bb-sync-file /opt/deckhouse/bin/nodegroup-watchdog.sh - nodegroup-watchdog-service-changed <<-"EOF"
    #!/bin/bash

    WD="/dev/watchdog"
    MODE="{{ $mode }}"

    ensure_dev() {
      if [ -e "${WD}" ]; then
        chown 64535:root "${WD}"
        chmod 0660 "${WD}"
        return 0
      fi

      local minor
      minor=$(awk '/watchdog$/{print $1}' /proc/misc 2>/dev/null)
      if [ -n "${minor}" ]; then
        mknod "${WD}" c 10 "${minor}"
        chown 64535:root "${WD}"
        chmod 0660 "${WD}"
        return 0
      fi

      return 1
    }

    start_wd() {
      if [ "${MODE}" = "Notify" ]; then
        echo "[NOTIFY] Would run: modprobe softdog soft_margin={{ $timeout }} soft_panic=1"
        return 0
      fi

      if lsmod | grep -qw softdog; then
        if ensure_dev; then
          echo "softdog already loaded, device permissions fixed"
          return 0
        fi
        echo "softdog loaded but device missing and /proc/misc has no entry, reloading"
        rmmod softdog 2>/dev/null || true
        sleep 1
        if lsmod | grep -qw softdog; then
          echo "ERROR: cannot unload softdog (module in use)" >&2
          exit 1
        fi
      fi

      modprobe softdog soft_margin={{ $timeout }} soft_panic=1

      local retries=0
      while [ ! -e "${WD}" ] && [ "${retries}" -lt 10 ]; do
        sleep 0.5
        retries=$((retries + 1))
      done

      if ! ensure_dev; then
        echo "ERROR: ${WD} was not created after modprobe softdog" >&2
        exit 1
      fi
    }

    stop_wd() {
      if [ "${MODE}" = "Notify" ]; then
        echo "[NOTIFY] Would run: rmmod softdog"
      else
        while [[ $(lsof "${WD}" 2>/dev/null | tail -n +2 | wc -l) -ge 1 ]]; do
          fuser "${WD}" -k -TERM
          sleep 1
        done
        rmmod softdog
      fi
    }


    case "$1" in
        start)
            start_wd
            ;;
        stop)
            stop_wd
            ;;
        *)
            echo "Usage: $0 [start|stop]"
            exit 1
            ;;
    esac
    EOF

    chmod +x /opt/deckhouse/bin/nodegroup-watchdog.sh
  {{- end }}
{{- end }}
