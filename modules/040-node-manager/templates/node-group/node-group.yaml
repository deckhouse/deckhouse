{{- range $ng := .Values.nodeManager.internal.nodeGroups }}
  {{- $engine := $ng.engine | default "" }}
  {{- if or (eq $ng.nodeType "CloudEphemeral") (eq $ng.nodeType "Cloud") }}
    {{- if hasKey $.Values.nodeManager.internal "cloudProvider" }}
      {{- if eq $engine "" }}
        {{- if $.Values.nodeManager.internal.cloudProvider.capiClusterKind }}
          {{- $engine = "CAPI" }}
        {{- else if $.Values.nodeManager.internal.cloudProvider.machineClassKind }}
          {{- $engine = "MCM" }}
        {{- else }}
          {{- $engine = "None" }}
        {{- end }}
      {{- end }}
      {{- if eq $engine "CAPI" }}
        {{- /* The MachineDeployment and the infrastructure MachineTemplate are rendered by node-controller (capi.reconcileCloudMDsRendered) from the cloud-provider CAPI template secret. Helm only renders the bootstrap Secret (its cloud-init needs candi/tpl). Its content does not depend on the instance class, so it uses a stable per-zone name — node-controller sets the same name as the MD's dataSecretName. This means helm no longer computes the instance-class checksum, so the instanceClass no longer has to be threaded through values. */ -}}
        {{- range $zone_name := $ng.cloudInstances.zones }}
          {{ $zone_hash := printf "%v%v" $.Values.global.discovery.clusterUUID $zone_name | sha256sum | trunc 8 }}
          {{ $bootstrap_secret_name := printf "%s-%s" $ng.name $zone_hash }}
          {{- include "capi_node_group_machine_bootstrap_secret" (list $ $ng $zone_name $bootstrap_secret_name) }}
        {{- end }}
      {{- else if eq $engine "MCM" }}
        {{- /* MachineClass CR and MachineDeployment are rendered by node-controller (capi.reconcileCloudMCMs). Only the MachineClass Secret stays in helm. */ -}}
        {{- range $zone_name := $ng.cloudInstances.zones }}
          {{- include "node_group_machine_class_secret" (list $ $ng $zone_name) }}
        {{- end }}
      {{- else if eq $engine "None" }}
      {{- else }}
        {{- fail (printf "unsupported engine %q for CloudEphemeral NodeGroup %s" $engine $ng.name) }}
      {{- end }}
    {{- end }}
  {{- else }}
    {{- /* StaticMachineTemplate and MachineDeployment are rendered by node-controller (capi.reconcileStaticMDRendered). Only the manual-bootstrap Secret stays in helm. */ -}}
    {{- include "node_group_static_or_hybrid_secret" (list $ $ng) }}
  {{- end }}
{{- end }}
