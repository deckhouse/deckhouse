apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: scale-cloud-node
spec:
  description: |
    The ephemeral-node provisioning lifecycle on a LIVE DVP/CAPI cluster — the user-facing case:
    a CloudEphemeral NodeGroup orders one real node and, on teardown, gives it back. The full
    provisioning chain (NodeGroup -> MachineDeployment -> Machine -> Node) is owned by the
    set-replicas/CAPI/cloud-provider controllers, not by any single node-manager controller, so
    this is an integration test of the chain, not a unit/controller test.

      scale-UP:   apply NodeGroup -> NG reports a ready node, status counters internally consistent
                  -> CAPI MachineDeployment provisions a Machine (phase Running, Ready/Infrastructure
                  Ready/NodeReady conditions, a populated nodeRef) -> the node joins Ready. The
                  Instance the node-controller derives from the Machine is also checked here as a
                  by-product (it reflects the REAL machine + bashible state — the one thing envtest
                  cannot fake), but the Instance controller itself is covered by its envtest suite.
      scale-DOWN: delete NodeGroup -> CAPI removes the Machine and Node -> the derived Instance is
                  garbage-collected.

    Fully declarative: every check is a chainsaw assert/error tree that polls until the state
    matches, so the test is flap-proof and reads top to bottom with no embedded scripts. CAPI
    Machine and MachineDeployment objects are NOT readable by the default cluster identity (only
    the CAPI controllers may read them), so the whole suite is run impersonating the deckhouse
    super-admin — `chainsaw test --kube-as=system:sudouser`, wired in the Taskfile. The Machine is
    located VIA its MachineDeployment: both carry the node-group=<NG name> label. The Instance is
    cluster-scoped and unlabeled, so it is matched as a collection by a name predicate.

    Failure diagnostics (controller logs + cluster events) are collected by the suite-wide
    error.catch in chainsaw-config.yaml, so no per-step catch handlers are needed here. The
    Instance controller's own logic (status mapping, self-heal, GC, heartbeat, SSA field ownership)
    is covered exhaustively by its envtest suite
    (images/node-controller/src/internal/controller/instance/e2e_*_test.go), not re-checked here.
    Drives everything only through a NodeGroup (user-writable). Provisions a real cloud VM — can
    take 10-15 min.
  concurrent: false
  steps:
    - name: assert-dvpinstanceclass-worker-exists
      try:
        - description: The DVPInstanceClass backing the NodeGroup exists and is well-formed
          assert:
            file: asserts/assert-dvpinstanceclass-worker.yaml
      cleanup:
        # error/assert are not valid cleanup operations; a one-line wait keeps the next run clean.
        - description: Wait until all e2e-ephemeral-node nodes are removed (runs last in the cleanup chain)
          script:
            timeout: 18m
            content: |
              until [ "$(kubectl get nodes -l app=e2e-ephemeral-node-test --no-headers 2>/dev/null | wc -l | tr -d ' ')" = 0 ]; do sleep 10; done

    - name: cleanup-leftover-nodegroup
      try:
        - description: Delete a leftover NodeGroup e2e-ephemeral-node from a previous run
          continueOnError: true
          delete:
            ref:
              apiVersion: deckhouse.io/v1
              kind: NodeGroup
              name: e2e-ephemeral-node

    - name: apply-nodegroup
      try:
        - description: Create a CloudEphemeral NodeGroup that provisions one real VM
          apply:
            file: manifests/nodegroup.yaml
      cleanup:
        - description: Delete the NodeGroup
          delete:
            ref:
              apiVersion: deckhouse.io/v1
              kind: NodeGroup
              name: e2e-ephemeral-node

    - name: assert-nodegroup-scales-up
      try:
        - description: |
            The NodeGroup provisions and reports a ready node, with the status counters internally
            consistent (the invariants the nodegroup-status controller must maintain).
          assert:
            resource:
              apiVersion: deckhouse.io/v1
              kind: NodeGroup
              metadata:
                name: e2e-ephemeral-node
              status:
                (nodes >= `1`): true
                (ready >= `1`): true
                (ready <= nodes): true
                (upToDate <= nodes): true
                (min <= desired): true
                (desired <= max): true

    - name: assert-machine-provisioned
      try:
        - description: CAPI provisioned a MachineDeployment for the NodeGroup with a ready replica
          assert:
            timeout: 20m
            resource:
              apiVersion: cluster.x-k8s.io/v1beta2
              kind: MachineDeployment
              metadata:
                namespace: d8-cloud-instance-manager
                labels:
                  node-group: e2e-ephemeral-node
              status:
                (readyReplicas >= `1`): true
        - description: |
            The MachineDeployment's Machine reached Running with a populated nodeRef and the
            Ready/InfrastructureReady/NodeReady conditions (selected by the same node-group label).
          assert:
            timeout: 20m
            resource:
              apiVersion: cluster.x-k8s.io/v1beta2
              kind: Machine
              metadata:
                namespace: d8-cloud-instance-manager
                labels:
                  node-group: e2e-ephemeral-node
              status:
                phase: Running
                nodeRef: {}
                (conditions[?type == 'Ready'] | [0].status): "True"
                (conditions[?type == 'InfrastructureReady'] | [0].status): "True"
                (conditions[?type == 'NodeReady'] | [0].status): "True"

    - name: assert-node-ready
      try:
        - description: The provisioned node has joined and is Ready
          assert:
            file: asserts/assert-node-ready.yaml

    - name: verify-instance-contract
      try:
        # The Instance is cluster-scoped and unlabeled, so it is matched as a collection: chainsaw
        # lists Instances and asserts one whose name contains "e2e-ephemeral-node-" satisfies the whole
        # tree. The name predicate excludes the cluster's master/worker Instances, and requiring
        # phase Running ignores any leftover Terminating one.
        - description: |
            The Instance the node-controller derived from the ordered node reflects the REAL
            machine + bashible state: phase Running, the CAPI machineRef, the MachineReady/
            BashibleReady conditions and a "bashible: " message — the cross-resource integration
            envtest cannot fake. (The controller's internal SSA field ownership is asserted in
            envtest, not here — this test is about the node being ordered, not controller internals.)
          assert:
            timeout: 3m
            resource:
              apiVersion: deckhouse.io/v1alpha2
              kind: Instance
              metadata:
                (contains(name, 'e2e-ephemeral-node-')): true
                finalizers:
                  - node-manager.hooks.deckhouse.io/instance-controller
              spec:
                machineRef:
                  kind: Machine
                  apiVersion: cluster.x-k8s.io/v1beta2
                  namespace: d8-cloud-instance-manager
                  (contains(name, 'e2e-ephemeral-node-')): true
              status:
                phase: Running
                machineStatus: Ready
                bashibleStatus: Ready
                "(starts_with(message, 'bashible: '))": true
                (conditions[?type == 'MachineReady'] | [0].status): "True"
                (conditions[?type == 'MachineReady'] | [0].reason): Ready
                (conditions[?type == 'BashibleReady'] | [0].status): "True"

    - name: delete-nodegroup
      try:
        - description: Remove the NodeGroup — CAPI deletes the Machine and Node
          delete:
            ref:
              apiVersion: deckhouse.io/v1
              kind: NodeGroup
              name: e2e-ephemeral-node

    - name: assert-node-gone
      try:
        - description: The node is removed after the NodeGroup is deleted
          error:
            file: asserts/assert-no-node.yaml

    - name: assert-machine-and-instance-gone
      try:
        - description: CAPI removed the NodeGroup's Machine
          error:
            resource:
              apiVersion: cluster.x-k8s.io/v1beta2
              kind: Machine
              metadata:
                namespace: d8-cloud-instance-manager
                labels:
                  node-group: e2e-ephemeral-node
        - description: The controller removed the finalizer and the Instance was garbage-collected
          error:
            resource:
              apiVersion: deckhouse.io/v1alpha2
              kind: Instance
              metadata:
                (contains(name, 'e2e-ephemeral-node-')): true
