version: "3"

vars:
  CONFIG: ../../chainsaw-config.yaml
  # CAPI Machine/MachineDeployment are not readable by the default cluster identity, so the whole
  # suite impersonates the deckhouse super-admin. Override KUBE_AS if your kubeconfig already has
  # full CAPI access.
  KUBE_AS: system:sudouser

tasks:
  run:
    desc: Run e2e test with JUNIT report
    cmds:
      - mkdir -p ./reports
      - chainsaw test --test-dir . --config {{.CONFIG}} --kube-as {{.KUBE_AS}} --parallel 1 --report-format JUNIT-TEST --report-path ./reports/

  run:quiet:
    desc: Run e2e test with suppressed output (only errors, failures, summary)
    cmds:
      - mkdir -p ./reports
      - chainsaw test --test-dir . --config {{.CONFIG}} --kube-as {{.KUBE_AS}} --parallel 1 --report-format JUNIT-TEST --report-path ./reports/ --quiet

  dry-run:
    desc: Validate test and configuration YAML against the chainsaw schema (no cluster needed)
    cmds:
      - chainsaw lint test -f chainsaw-test.yaml
      - chainsaw lint configuration -f {{.CONFIG}}

  run:debug:
    desc: Run test with pause on failure and fail-fast
    cmds:
      - mkdir -p ./reports
      - chainsaw test --test-dir . --config {{.CONFIG}} --kube-as {{.KUBE_AS}} --parallel 1 --report-format JUNIT-TEST --report-path ./reports/ --pause-on-failure --fail-fast
