apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ca-scale-from-zero-dvp
spec:
  timeouts:
    apply: 60s
    assert: 120s
    delete: 300s
    exec: 120s

  steps:
    - name: check-prerequisites
      try:
        - script:
            timeout: 180s
            content: |
              set -eu
              echo "=== Checking prerequisites ==="

              if ! kubectl get deployment cluster-autoscaler -n d8-cloud-instance-manager --no-headers 2>/dev/null; then
                echo "FAIL: cluster-autoscaler deployment not found in d8-cloud-instance-manager"
                exit 1
              fi

              CA_ARGS=$(kubectl get deployment cluster-autoscaler -n d8-cloud-instance-manager \
                -o jsonpath='{.spec.template.spec.containers[0].args}')
              if ! echo "$CA_ARGS" | grep -q "clusterapi"; then
                echo "FAIL: CA cloud provider is not clusterapi. This test is for DVP (CAPI) only."
                echo "CA args: $CA_ARGS"
                exit 1
              fi

              if ! kubectl get dvpinstanceclass worker --no-headers 2>/dev/null; then
                echo "FAIL: Working DVPInstanceClass 'worker' not found"
                echo "Available DVPInstanceClasses:"
                kubectl get dvpinstanceclass 2>/dev/null || echo "  (none)"
                exit 1
              fi

              echo "Cleaning up leftover test resources from previous runs..."
              kubectl delete nodegroup e2e-worker-100 e2e-worker-50 --ignore-not-found 2>/dev/null || true

              echo "Restarting cluster-autoscaler to clear backoff state from previous runs..."
              kubectl rollout restart deployment cluster-autoscaler -n d8-cloud-instance-manager
              kubectl rollout status deployment cluster-autoscaler -n d8-cloud-instance-manager --timeout=120s

              echo "Waiting for CA to initialize..."
              sleep 15

              echo "OK: All prerequisites met"

    - name: test-scale-from-zero
      try:
        - script:
            timeout: 180s
            content: |
              set -eu
              echo "=== Creating NodeGroups ==="

              kubectl apply -f - <<'EOF'
              apiVersion: deckhouse.io/v1
              kind: NodeGroup
              metadata:
                name: e2e-worker-100
              spec:
                cloudInstances:
                  priority: 100
                  classReference:
                    kind: DVPInstanceClass
                    name: worker
                  maxPerZone: 3
                  minPerZone: 0
                nodeType: CloudEphemeral
                nodeTemplate:
                  labels:
                    app: e2e-autoscaler-test
                  taints:
                  - key: dedicated
                    value: "worker-100"
                    effect: NoExecute
              EOF
              echo "Created NodeGroup e2e-worker-100 (priority 100, working IC)"

              kubectl apply -f - <<'EOF'
              apiVersion: deckhouse.io/v1
              kind: NodeGroup
              metadata:
                name: e2e-worker-50
              spec:
                cloudInstances:
                  priority: 50
                  classReference:
                    kind: DVPInstanceClass
                    name: worker
                  maxPerZone: 3
                  minPerZone: 0
                nodeType: CloudEphemeral
                nodeTemplate:
                  labels:
                    app: e2e-autoscaler-test
                  taints:
                  - key: dedicated
                    value: "worker-50"
                    effect: NoExecute
              EOF
              echo "Created NodeGroup e2e-worker-50 (priority 50, working IC)"

              echo ""
              echo "=== Creating Deployment ==="

              kubectl apply -f - <<EOF
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: e2e-nginx
                namespace: $NAMESPACE
              spec:
                replicas: 3
                selector:
                  matchLabels:
                    app: e2e-nginx
                template:
                  metadata:
                    labels:
                      app: e2e-nginx
                  spec:
                    containers:
                    - name: pause
                      image: registry.k8s.io/pause:3.9
                      resources:
                        requests:
                          cpu: 100m
                          memory: 64Mi
                    nodeSelector:
                      app: e2e-autoscaler-test
                    affinity:
                      podAntiAffinity:
                        requiredDuringSchedulingIgnoredDuringExecution:
                        - labelSelector:
                            matchExpressions:
                            - key: app
                              operator: In
                              values:
                              - e2e-nginx
                          topologyKey: kubernetes.io/hostname
                    tolerations:
                    - key: dedicated
                      operator: Equal
                      value: "worker-100"
                      effect: NoExecute
                    - key: dedicated
                      operator: Equal
                      value: "worker-50"
                      effect: NoExecute
              EOF
              echo "Created Deployment e2e-nginx with 3 replicas"

              echo "Waiting for Deckhouse to create MachineDeployments..."
              for i in $(seq 1 24); do
                MD_COUNT=$(kubectl get machinedeployments.cluster.x-k8s.io -n d8-cloud-instance-manager \
                  -l node-group=e2e-worker-100 --no-headers 2>/dev/null | wc -l | tr -d ' ')
                if [ "$MD_COUNT" -gt 0 ]; then
                  echo "MachineDeployment for e2e-worker-100 created"
                  kubectl get machinedeployments.cluster.x-k8s.io -n d8-cloud-instance-manager \
                    -l 'node-group in (e2e-worker-100,e2e-worker-50)' 2>/dev/null || true
                  break
                fi
                if [ "$i" -eq 24 ]; then
                  echo "WARNING: MachineDeployments not found after 120s"
                fi
                sleep 5
              done

              echo ""
              echo "=== Current pod status ==="
              kubectl get pods -n "$NAMESPACE" -l app=e2e-nginx -o wide

        - script:
            timeout: 300s
            content: |
              echo "=== Verifying CA selects priority 100 group and scales from zero ==="

              get_ca_pod() {
                kubectl get pods -n d8-cloud-instance-manager -l app=cluster-autoscaler \
                  --no-headers -o custom-columns=':metadata.name' \
                  --field-selector=status.phase=Running 2>/dev/null | head -1
              }

              CA_POD=$(get_ca_pod)
              if [ -z "$CA_POD" ]; then
                echo "FAIL: No running cluster-autoscaler pod found"
                exit 1
              fi
              echo "CA pod: $CA_POD"

              for i in $(seq 1 60); do
                CURRENT_POD=$(get_ca_pod)
                if [ -n "$CURRENT_POD" ] && [ "$CURRENT_POD" != "$CA_POD" ]; then
                  echo "CA pod changed: $CA_POD -> $CURRENT_POD"
                  CA_POD="$CURRENT_POD"
                fi

                LOGS=$(kubectl logs -n d8-cloud-instance-manager "$CA_POD" \
                  -c cluster-autoscaler 2>/dev/null || true)

                if echo "$LOGS" | grep -q "failed to increase node group size.*e2e-worker"; then
                  echo "FAIL: CA encountered error during scale-up"
                  echo "$LOGS" | grep "failed to increase node group size" | tail -5
                  exit 1
                fi

                if echo "$LOGS" | grep -q "e2e-worker-100.*chosen as the highest available"; then
                  echo "PASS: Priority Expander selected e2e-worker-100 group"
                  echo ""
                  echo "=== Priority selection logs ==="
                  echo "$LOGS" | grep -i "priority\|chosen\|Best option\|scale-up plan\|setting group.*size" \
                    | grep "e2e-worker" | tail -10
                  echo ""
                  echo "=== Scale-up logs ==="
                  echo "$LOGS" | grep -i "Final scale-up plan\|setting group.*size\|Estimated.*nodes needed" \
                    | grep "e2e-worker-100" | tail -5
                  exit 0
                fi

                if echo "$LOGS" | grep -q "e2e-worker.*not ready for scaleup.*backoff"; then
                  echo "WARNING: Node group in backoff (attempt $i)"
                  echo "$LOGS" | grep "not ready for scaleup" | tail -3
                fi

                if [ "$i" -eq 60 ]; then
                  echo "FAIL: Timed out waiting for priority selection of e2e-worker-100"
                  echo "=== Recent CA logs ==="
                  echo "$LOGS" | grep -i "e2e-worker\|priority\|unschedulable\|discovered\|backoff\|failed" | tail -30
                  exit 1
                fi
                sleep 5
              done

        - script:
            timeout: 900s
            content: |
              echo "=== Waiting for pods to schedule on e2e-worker-100 nodes ==="

              for i in $(seq 1 90); do
                RUNNING=$(kubectl get pods -n "$NAMESPACE" -l app=e2e-nginx \
                  --no-headers 2>/dev/null | grep -c Running || true)

                if [ "$RUNNING" -ge 3 ]; then
                  echo "All 3 pods are Running"
                  echo ""
                  echo "=== Pod distribution ==="
                  kubectl get pods -n "$NAMESPACE" -l app=e2e-nginx -o wide
                  echo ""

                  FAIL=0
                  for NODE in $(kubectl get pods -n "$NAMESPACE" -l app=e2e-nginx \
                    -o jsonpath='{.items[*].spec.nodeName}'); do
                    NG=$(kubectl get node "$NODE" \
                      -o jsonpath='{.metadata.labels.node\.deckhouse\.io/group}' 2>/dev/null || echo "unknown")
                    echo "Node: $NODE -> NodeGroup: $NG"
                    if [ "$NG" != "e2e-worker-100" ]; then
                      echo "  FAIL: Expected e2e-worker-100, got $NG"
                      FAIL=1
                    fi
                  done

                  if [ "$FAIL" -eq 1 ]; then
                    echo ""
                    echo "FAIL: Some pods are NOT on e2e-worker-100 nodes"
                    exit 1
                  fi

                  echo ""
                  echo "=== Verifying e2e-worker-50 has no nodes ==="
                  W50_NODES=$(kubectl get nodes -l node.deckhouse.io/group=e2e-worker-50 \
                    --no-headers 2>/dev/null | wc -l | tr -d ' ')
                  if [ "$W50_NODES" -ne 0 ]; then
                    echo "FAIL: e2e-worker-50 should have 0 nodes, but has $W50_NODES"
                    kubectl get nodes -l node.deckhouse.io/group=e2e-worker-50 -o wide 2>/dev/null
                    exit 1
                  fi
                  echo "PASS: e2e-worker-50 remains at 0 nodes (not selected)"

                  echo ""
                  echo "PASS: All pods are running on e2e-worker-100 nodes (scale from zero succeeded)"
                  exit 0
                fi

                echo "Running pods: $RUNNING/3, waiting... ($i/90)"

                if [ $((i % 6)) -eq 0 ]; then
                  echo "--- Diagnostic snapshot ---"
                  echo "MachineDeployments:"
                  kubectl get machinedeployments.cluster.x-k8s.io -n d8-cloud-instance-manager \
                    -l 'node-group in (e2e-worker-100,e2e-worker-50)' --no-headers 2>/dev/null || true
                  echo "Machines:"
                  kubectl get machines.cluster.x-k8s.io -n d8-cloud-instance-manager --no-headers 2>/dev/null \
                    | grep "e2e-worker" || echo "  (none)"

                  CA_POD=$(kubectl get pods -n d8-cloud-instance-manager -l app=cluster-autoscaler \
                    --no-headers -o custom-columns=':metadata.name' \
                    --field-selector=status.phase=Running 2>/dev/null | head -1)
                  if [ -n "$CA_POD" ]; then
                    echo "CA scale status:"
                    kubectl logs -n d8-cloud-instance-manager "$CA_POD" -c cluster-autoscaler --tail=200 2>/dev/null \
                      | grep -i "e2e-worker.*scale-up\|e2e-worker.*backoff\|failed to increase\|setting group.*e2e-worker\|expansion options" \
                      | tail -5 || true
                  fi
                  echo "---"
                fi

                if [ "$i" -eq 90 ]; then
                  echo "FAIL: Timed out waiting for pods to be Running"
                  kubectl get pods -n "$NAMESPACE" -l app=e2e-nginx -o wide
                  kubectl get events -n "$NAMESPACE" --sort-by='.lastTimestamp' | tail -20
                  exit 1
                fi
                sleep 10
              done

      catch:
        - events: {}
        - events:
            namespace: d8-cloud-instance-manager
        - podLogs:
            namespace: d8-cloud-instance-manager
            selector: app=cluster-autoscaler

      finally:
        - script:
            timeout: 600s
            content: |
              echo "=== Cleanup ==="

              echo "Deleting test Deployment..."
              kubectl delete deployment e2e-nginx -n "$NAMESPACE" --ignore-not-found --timeout=60s 2>/dev/null || true

              echo "Deleting test NodeGroups..."
              kubectl delete nodegroup e2e-worker-100 e2e-worker-50 --ignore-not-found --timeout=300s 2>/dev/null || true

              echo "Waiting for test nodes to be removed..."
              for i in $(seq 1 60); do
                NODES=$(kubectl get nodes -l app=e2e-autoscaler-test \
                  --no-headers 2>/dev/null | wc -l | tr -d ' ')
                if [ "$NODES" -eq 0 ]; then
                  echo "All test nodes removed"
                  break
                fi
                echo "Still $NODES test node(s) remaining..."
                if [ "$i" -eq 60 ]; then
                  echo "WARNING: Timed out waiting for test nodes removal"
                  kubectl get nodes -l app=e2e-autoscaler-test -o wide 2>/dev/null || true
                fi
                sleep 10
              done

              echo "Cleanup complete"
