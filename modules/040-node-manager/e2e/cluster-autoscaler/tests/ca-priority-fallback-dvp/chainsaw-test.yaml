apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ca-priority-fallback-dvp
spec:
  description: |
    Verifies the Priority Expander fallback behavior on a DVP/CAPI cluster.
    Creates a broken high-priority NodeGroup and a working low-priority one,
    deploys a workload, and asserts that CA falls back to the working group
    after the high-priority group enters backoff.
  concurrent: false
  steps:
    - name: assert-dvpinstanceclass-worker-exists
      try:
        - description: Assert DVPInstanceClass worker resource exists
          assert:
            file: ../common/asserts/assert-dvp-instanceclass.yaml
      cleanup:
        - description: Wait until all test nodes are removed (runs last in cleanup chain)
          script:
            timeout: 15m
            content: |
              set -eu
              for i in $(seq 1 90); do
                NODES=$(kubectl get nodes -l app=e2e-autoscaler-test --no-headers 2>/dev/null | wc -l | tr -d ' ')
                if [ "$NODES" -eq 0 ]; then
                  exit 0
                fi
                sleep 10
              done
              echo "Timed out waiting for test nodes removal"
              exit 1
            check:
              ($error == null): true

    - name: cleanup-leftover-resources
      try:
        - description: Delete leftover NodeGroup e2e-worker-100
          continueOnError: true
          delete:
            ref:
              apiVersion: deckhouse.io/v1
              kind: NodeGroup
              name: e2e-worker-100
        - description: Delete leftover NodeGroup e2e-worker-50
          continueOnError: true
          delete:
            ref:
              apiVersion: deckhouse.io/v1
              kind: NodeGroup
              name: e2e-worker-50
        - description: Delete leftover DVPInstanceClass e2e-worker-broken
          continueOnError: true
          delete:
            ref:
              apiVersion: deckhouse.io/v1alpha1
              kind: DVPInstanceClass
              name: e2e-worker-broken
        - description: Delete leftover DVPInstanceClass e2e-worker-small
          continueOnError: true
          delete:
            ref:
              apiVersion: deckhouse.io/v1alpha1
              kind: DVPInstanceClass
              name: e2e-worker-small

    - name: create-e2e-worker-small-instanceclass
      try:
        - description: Clone DVPInstanceClass 'worker' as 'e2e-worker-small' with reduced specs
          script:
            timeout: 60s
            content: |
              set -eu
              kubectl get dvpinstanceclass worker -o json | \
                jq '{
                  apiVersion: .apiVersion,
                  kind: .kind,
                  metadata: { name: "e2e-worker-small" },
                  spec: (.spec |
                    .virtualMachine.cpu.cores = 2 |
                    .virtualMachine.cpu.coreFraction = "20%" |
                    .virtualMachine.memory.size = "4Gi" |
                    .rootDisk.size = "20Gi"
                  )
                }' | kubectl apply -f -
            check:
              ($error == null): true
      cleanup:
        - description: Delete DVPInstanceClass e2e-worker-small
          delete:
            ref:
              apiVersion: deckhouse.io/v1alpha1
              kind: DVPInstanceClass
              name: e2e-worker-small

    - name: create-broken-dvpinstanceclass
      try:
        - description: Clone DVPInstanceClass 'worker' as 'e2e-worker-broken' with invalid virtualMachineClassName
          script:
            timeout: 60s
            content: |
              set -eu
              kubectl get dvpinstanceclass worker -o json | \
                jq '{
                  apiVersion: .apiVersion,
                  kind: .kind,
                  metadata: { name: "e2e-worker-broken" },
                  spec: (.spec | .virtualMachine.virtualMachineClassName = "DOES-NOT-EXIST")
                }' | kubectl apply -f -
            check:
              ($error == null): true
      cleanup:
        - description: Delete DVPInstanceClass e2e-worker-broken
          delete:
            ref:
              apiVersion: deckhouse.io/v1alpha1
              kind: DVPInstanceClass
              name: e2e-worker-broken

    - name: apply-nodegroup-100-broken
      try:
        - description: Apply NodeGroup e2e-worker-100 manifest (broken IC)
          apply:
            file: manifests/nodegroup-100-broken.yaml
      cleanup:
        - description: Delete NodeGroup e2e-worker-100
          delete:
            ref:
              apiVersion: deckhouse.io/v1
              kind: NodeGroup
              name: e2e-worker-100

    - name: apply-nodegroup-50
      try:
        - description: Apply NodeGroup e2e-worker-50 manifest
          apply:
            file: ../common/manifests/nodegroup-50-dvp.yaml
      cleanup:
        - description: Delete NodeGroup e2e-worker-50
          delete:
            ref:
              apiVersion: deckhouse.io/v1
              kind: NodeGroup
              name: e2e-worker-50

    - name: assert-cluster-autoscaler-exists
      try:
        - description: Check cluster-autoscaler deployment has ready replicas
          assert:
            file: ../common/asserts/assert-ca-exists.yaml

    - name: assert-ca-uses-clusterapi-provider
      try:
        - description: Check CA container args contain 'clusterapi'
          script:
            timeout: 30s
            content: |
              set -eu
              CA_ARGS=$(kubectl get deployment cluster-autoscaler -n d8-cloud-instance-manager \
                -o jsonpath='{.spec.template.spec.containers[0].args}')
              echo "$CA_ARGS" | grep -q "clusterapi"
            check:
              ($error == null): true

    - name: restart-cluster-autoscaler
      try:
        - description: Rollout restart and wait for readiness
          script:
            timeout: 180s
            content: |
              set -eu
              kubectl rollout restart deployment cluster-autoscaler -n d8-cloud-instance-manager
              kubectl rollout status deployment cluster-autoscaler -n d8-cloud-instance-manager --timeout=120s
            check:
              ($error == null): true

    - name: wait-for-ca-initialization
      try:
        - description: Sleep 15s for CA initialization
          sleep:
            duration: 15s

    - name: apply-deployment
      try:
        - description: Apply shared Deployment manifest
          apply:
            file: ../common/manifests/deployment.yaml
      cleanup:
        - description: Delete e2e-nginx Deployment
          delete:
            ref:
              apiVersion: apps/v1
              kind: Deployment
              name: e2e-nginx

    - name: wait-for-deckhouse-processing
      try:
        - description: Sleep 30s for Deckhouse reconciliation
          sleep:
            duration: 30s

    - name: assert-ca-selects-priority-100
      try:
        - description: Poll CA logs for priority selection of e2e-worker-100
          script:
            timeout: 300s
            content: |
              set -eu
              for i in $(seq 1 60); do
                CA_POD=$(kubectl get pods -n d8-cloud-instance-manager -l app=cluster-autoscaler \
                  --no-headers -o custom-columns=':metadata.name' \
                  --field-selector=status.phase=Running 2>/dev/null | head -1)
                if [ -z "$CA_POD" ]; then
                  sleep 5
                  continue
                fi
                LOGS=$(kubectl logs -n d8-cloud-instance-manager "$CA_POD" \
                  --all-containers --since=10m 2>/dev/null || true)
                if echo "$LOGS" | grep -q "e2e-worker-100.*chosen as the highest available"; then
                  exit 0
                fi
                sleep 5
              done
              echo "Timed out waiting for priority selection of e2e-worker-100"
              exit 1
            check:
              ($error == null): true
      catch:
        - description: Collect CA logs on failure
          podLogs:
            namespace: d8-cloud-instance-manager
            selector: app=cluster-autoscaler

    - name: wait-for-ca-backoff-and-fallback
      try:
        - description: Poll CA logs for backoff on e2e-worker-100 and selection of e2e-worker-50
          script:
            timeout: 1800s
            content: |
              set -eu
              for i in $(seq 1 120); do
                CA_POD=$(kubectl get pods -n d8-cloud-instance-manager -l app=cluster-autoscaler \
                  --no-headers -o custom-columns=':metadata.name' \
                  --field-selector=status.phase=Running 2>/dev/null | head -1)
                if [ -z "$CA_POD" ]; then
                  sleep 15
                  continue
                fi
                LOGS=$(kubectl logs -n d8-cloud-instance-manager "$CA_POD" \
                  --all-containers --since=30m 2>/dev/null || true)
                if echo "$LOGS" | grep -q "e2e-worker-100.*not ready for scaleup"; then
                  if echo "$LOGS" | grep -q "e2e-worker-50.*chosen as the highest available"; then
                    exit 0
                  fi
                fi
                sleep 15
              done
              echo "Timed out waiting for fallback to e2e-worker-50"
              exit 1
            check:
              ($error == null): true
      catch:
        - description: Collect CA logs on failure
          podLogs:
            namespace: d8-cloud-instance-manager
            selector: app=cluster-autoscaler

    - name: assert-pods-running
      try:
        - description: Assert Deployment has 3 ready replicas
          assert:
            file: ../common/asserts/assert-deployment-ready.yaml
      catch:
        - description: Collect test namespace events on failure
          events: {}
        - description: Collect d8-cloud-instance-manager events on failure
          events:
            namespace: d8-cloud-instance-manager
        - description: Collect CA logs on failure
          podLogs:
            namespace: d8-cloud-instance-manager
            selector: app=cluster-autoscaler

    - name: assert-pods-on-worker-50-nodes
      try:
        - description: Check each pod's node belongs to e2e-worker-50
          script:
            timeout: 90s
            content: |
              set -eu
              kubectl_retry() {
                local attempts=5
                for i in $(seq 1 $attempts); do
                  if output=$(kubectl "$@" 2>&1); then
                    echo "$output"
                    return 0
                  fi
                  if echo "$output" | grep -qE "TLS handshake|connection refused|Unable to connect|EOF"; then
                    echo "kubectl connection error (attempt $i/$attempts), retrying..." >&2
                    sleep 5
                    continue
                  fi
                  echo "$output" >&2
                  return 1
                done
                echo "kubectl failed after $attempts attempts" >&2
                return 1
              }
              POD_COUNT=$(kubectl_retry get pods -n "$NAMESPACE" -l app=e2e-nginx --no-headers | wc -l | tr -d ' ')
              if [ "$POD_COUNT" -ne 3 ]; then
                echo "Expected 3 pods, got $POD_COUNT"
                exit 1
              fi
              for NODE in $(kubectl_retry get pods -n "$NAMESPACE" -l app=e2e-nginx \
                -o jsonpath='{.items[*].spec.nodeName}'); do
                NG=$(kubectl_retry get node "$NODE" \
                  -o jsonpath='{.metadata.labels.node\.deckhouse\.io/group}')
                if [ "$NG" != "e2e-worker-50" ]; then
                  echo "Node $NODE belongs to $NG, expected e2e-worker-50"
                  exit 1
                fi
              done
            check:
              ($error == null): true
