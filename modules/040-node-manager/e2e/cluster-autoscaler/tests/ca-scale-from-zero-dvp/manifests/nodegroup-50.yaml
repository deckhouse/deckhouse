apiVersion: deckhouse.io/v1
kind: NodeGroup
metadata:
  name: e2e-worker-50
spec:
  cloudInstances:
    priority: 50
    classReference:
      kind: DVPInstanceClass
      name: worker
    maxPerZone: 3
    minPerZone: 0
  nodeType: CloudEphemeral
  nodeTemplate:
    labels:
      app: e2e-autoscaler-test
    taints:
      - key: dedicated
        value: "worker-50"
        effect: NoExecute
