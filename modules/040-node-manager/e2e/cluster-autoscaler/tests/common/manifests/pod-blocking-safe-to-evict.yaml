apiVersion: v1
kind: Pod
metadata:
  name: e2e-blocking-pod
  annotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
spec:
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.9
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
  nodeSelector:
    app: e2e-autoscaler-test
  tolerations:
    - key: dedicated
      operator: Equal
      value: "safe-to-evict"
      effect: NoExecute
