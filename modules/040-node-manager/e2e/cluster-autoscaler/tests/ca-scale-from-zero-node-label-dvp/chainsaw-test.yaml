apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ca-scale-from-zero-node-label-dvp
spec:
  description: |
    Verifies the fix from PR #20174: scale-from-zero works on a DVP/CAPI cluster when
    a pod uses nodeSelector with node.deckhouse.io/group label.

    Before the fix, the serializeLabels function only included labels from
    spec.nodeTemplate.labels in the capacity.cluster-autoscaler.kubernetes.io/labels
    annotation on MachineDeployment. System labels like node.deckhouse.io/group (added
    by kubelet at bootstrap) were missing, so CA could not match pods using this label
    in nodeSelector to any node group during scale-from-zero simulation.

    This test creates a NodeGroup WITHOUT node.deckhouse.io/group in nodeTemplate.labels,
    deploys a pod with nodeSelector: node.deckhouse.io/group: <ng-name>, and verifies
    that CA correctly triggers scale-up.
  concurrent: false
  steps:
    - name: assert-dvpinstanceclass-worker-exists
      try:
        - description: Assert DVPInstanceClass worker resource exists
          assert:
            file: ../common/asserts/assert-dvp-instanceclass.yaml
      cleanup:
        - description: Wait until all test nodes are removed (runs last in cleanup chain)
          script:
            timeout: 15m
            content: |
              set -eu
              for i in $(seq 1 90); do
                NODES=$(kubectl get nodes -l app=e2e-autoscaler-test --no-headers 2>/dev/null | wc -l | tr -d ' ')
                if [ "$NODES" -eq 0 ]; then
                  exit 0
                fi
                sleep 10
              done
              echo "Timed out waiting for test nodes removal"
              exit 1
            check:
              ($error == null): true

    - name: cleanup-leftover-resources
      try:
        - description: Delete leftover NodeGroup e2e-worker-infra
          continueOnError: true
          delete:
            ref:
              apiVersion: deckhouse.io/v1
              kind: NodeGroup
              name: e2e-worker-infra
        - description: Delete leftover DVPInstanceClass e2e-worker-small
          continueOnError: true
          delete:
            ref:
              apiVersion: deckhouse.io/v1alpha1
              kind: DVPInstanceClass
              name: e2e-worker-small

    - name: create-e2e-worker-small-instanceclass
      try:
        - description: Clone DVPInstanceClass 'worker' as 'e2e-worker-small' with reduced specs
          script:
            timeout: 60s
            content: |
              set -eu
              kubectl get dvpinstanceclass worker -o json | \
                jq '{
                  apiVersion: .apiVersion,
                  kind: .kind,
                  metadata: { name: "e2e-worker-small" },
                  spec: (.spec |
                    .virtualMachine.cpu.cores = 2 |
                    .virtualMachine.cpu.coreFraction = "20%" |
                    .virtualMachine.memory.size = "4Gi" |
                    .rootDisk.size = "20Gi"
                  )
                }' | kubectl apply -f -
            check:
              ($error == null): true
      cleanup:
        - description: Delete DVPInstanceClass e2e-worker-small
          delete:
            ref:
              apiVersion: deckhouse.io/v1alpha1
              kind: DVPInstanceClass
              name: e2e-worker-small

    - name: apply-nodegroup-infra
      try:
        - description: Apply NodeGroup e2e-worker-infra (no node.deckhouse.io/group in nodeTemplate.labels)
          apply:
            file: ../common/manifests/nodegroup-infra-dvp.yaml
      cleanup:
        - description: Delete NodeGroup e2e-worker-infra
          delete:
            ref:
              apiVersion: deckhouse.io/v1
              kind: NodeGroup
              name: e2e-worker-infra

    - name: assert-cluster-autoscaler-exists
      try:
        - description: Check cluster-autoscaler deployment has ready replicas
          assert:
            file: ../common/asserts/assert-ca-exists.yaml

    - name: assert-ca-uses-clusterapi-provider
      try:
        - description: Check CA container args contain 'clusterapi'
          script:
            timeout: 30s
            content: |
              set -eu
              CA_ARGS=$(kubectl get deployment cluster-autoscaler -n d8-cloud-instance-manager \
                -o jsonpath='{.spec.template.spec.containers[0].args}')
              echo "$CA_ARGS" | grep -q "clusterapi"
            check:
              ($error == null): true

    - name: restart-cluster-autoscaler
      try:
        - description: Rollout restart and wait for readiness
          script:
            timeout: 180s
            content: |
              set -eu
              kubectl rollout restart deployment cluster-autoscaler -n d8-cloud-instance-manager
              kubectl rollout status deployment cluster-autoscaler -n d8-cloud-instance-manager --timeout=120s
            check:
              ($error == null): true

    - name: wait-for-ca-initialization
      try:
        - description: Sleep 15s for CA initialization
          sleep:
            duration: 15s

    - name: verify-machine-deployment-labels-annotation
      try:
        - description: Check that MachineDeployment has node.deckhouse.io/group in capacity labels annotation
          script:
            timeout: 300s
            content: |
              set -eu
              for i in $(seq 1 30); do
                MD_NAME=$(kubectl get machinedeployments.cluster.x-k8s.io -n d8-cloud-instance-manager \
                  -l node-group=e2e-worker-infra --no-headers \
                  -o custom-columns=':metadata.name' 2>/dev/null | head -1)
                if [ -n "$MD_NAME" ]; then
                  LABELS_ANN=$(kubectl get machinedeployments.cluster.x-k8s.io -n d8-cloud-instance-manager \
                    "$MD_NAME" -o jsonpath='{.metadata.annotations.capacity\.cluster-autoscaler\.kubernetes\.io/labels}' 2>/dev/null || echo "")
                  if echo "$LABELS_ANN" | grep -q "node.deckhouse.io/group=e2e-worker-infra"; then
                    echo "Found node.deckhouse.io/group=e2e-worker-infra in capacity labels annotation"
                    exit 0
                  fi
                  echo "Annotation content: $LABELS_ANN"
                fi
                sleep 10
              done
              echo "Timed out: node.deckhouse.io/group not found in MachineDeployment capacity labels annotation"
              echo "This indicates the PR #20174 fix is not applied"
              exit 1
            check:
              ($error == null): true
      catch:
        - description: Show MachineDeployment details
          script:
            timeout: 30s
            content: |
              kubectl get machinedeployments.cluster.x-k8s.io -n d8-cloud-instance-manager \
                -l node-group=e2e-worker-infra -o yaml 2>/dev/null || true

    - name: apply-deployment
      try:
        - description: Apply Deployment with nodeSelector node.deckhouse.io/group
          apply:
            file: ../common/manifests/deployment-node-label-selector.yaml
      cleanup:
        - description: Delete e2e-nginx Deployment
          delete:
            ref:
              apiVersion: apps/v1
              kind: Deployment
              name: e2e-nginx

    - name: wait-for-deckhouse-processing
      try:
        - description: Sleep 30s for Deckhouse reconciliation
          sleep:
            duration: 30s

    - name: assert-ca-triggers-scale-up
      try:
        - description: Poll CA logs for scale-up decision on e2e-worker-infra
          script:
            timeout: 300s
            content: |
              set -eu
              for i in $(seq 1 60); do
                CA_POD=$(kubectl get pods -n d8-cloud-instance-manager -l app=cluster-autoscaler \
                  --no-headers -o custom-columns=':metadata.name' \
                  --field-selector=status.phase=Running 2>/dev/null | head -1)
                if [ -z "$CA_POD" ]; then
                  sleep 5
                  continue
                fi
                LOGS=$(kubectl logs -n d8-cloud-instance-manager "$CA_POD" \
                  -c cluster-autoscaler 2>/dev/null || true)
                if echo "$LOGS" | grep -q "e2e-worker-infra"; then
                  if echo "$LOGS" | grep -qE "(Scale-up|setting group.*e2e-worker-infra.*size|Best option to resize.*e2e-worker-infra|e2e-worker-infra.*chosen)"; then
                    echo "CA triggered scale-up for e2e-worker-infra"
                    exit 0
                  fi
                fi
                if echo "$LOGS" | grep -q "failed to increase node group size.*e2e-worker-infra"; then
                  echo "CA encountered error during scale-up (still means scale-from-zero was triggered)"
                  exit 0
                fi
                sleep 5
              done
              echo "Timed out waiting for CA to trigger scale-up for e2e-worker-infra"
              echo "This likely means CA cannot match pods with nodeSelector node.deckhouse.io/group to the node group"
              exit 1
            check:
              ($error == null): true
      catch:
        - description: Collect CA logs on failure
          podLogs:
            namespace: d8-cloud-instance-manager
            selector: app=cluster-autoscaler

    - name: assert-pods-running
      try:
        - description: Assert Deployment has 3 ready replicas
          assert:
            file: ../common/asserts/assert-deployment-ready.yaml
      catch:
        - description: Collect test namespace events on failure
          events: {}
        - description: Collect d8-cloud-instance-manager events on failure
          events:
            namespace: d8-cloud-instance-manager
        - description: Collect CA logs on failure
          podLogs:
            namespace: d8-cloud-instance-manager
            selector: app=cluster-autoscaler

    - name: assert-pods-on-infra-nodes
      try:
        - description: Check each pod's node belongs to e2e-worker-infra
          script:
            timeout: 90s
            content: |
              set -eu
              kubectl_retry() {
                local attempts=5
                for i in $(seq 1 $attempts); do
                  if output=$(kubectl "$@" 2>&1); then
                    echo "$output"
                    return 0
                  fi
                  if echo "$output" | grep -qE "TLS handshake|connection refused|Unable to connect|EOF"; then
                    echo "kubectl connection error (attempt $i/$attempts), retrying..." >&2
                    sleep 5
                    continue
                  fi
                  echo "$output" >&2
                  return 1
                done
                echo "kubectl failed after $attempts attempts" >&2
                return 1
              }
              POD_COUNT=$(kubectl_retry get pods -n "$NAMESPACE" -l app=e2e-nginx --no-headers | wc -l | tr -d ' ')
              if [ "$POD_COUNT" -ne 3 ]; then
                echo "Expected 3 pods, got $POD_COUNT"
                exit 1
              fi
              for NODE in $(kubectl_retry get pods -n "$NAMESPACE" -l app=e2e-nginx \
                -o jsonpath='{.items[*].spec.nodeName}'); do
                NG=$(kubectl_retry get node "$NODE" \
                  -o jsonpath='{.metadata.labels.node\.deckhouse\.io/group}')
                if [ "$NG" != "e2e-worker-infra" ]; then
                  echo "Node $NODE belongs to $NG, expected e2e-worker-infra"
                  exit 1
                fi
              done
            check:
              ($error == null): true
