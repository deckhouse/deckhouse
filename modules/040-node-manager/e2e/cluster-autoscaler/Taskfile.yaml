    cmds:
      - task: ca-scale-from-zero-dvp:dry-run
      - task: ca-scale-from-zero-yandex:dry-run
      - task: ca-priority-fallback-dvp:dry-run
      - task: ca-priority-fallback-yandex:dry-run
      - task: ca-safe-to-evict-dvp:dry-run
