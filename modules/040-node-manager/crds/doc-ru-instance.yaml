spec:
  versions:
    - name: v1alpha2
      schema:
        openAPIV3Schema:
          description: |
            Instance описывает полный жизненный цикл сервера в Deckhouse Kubernetes Platform, агрегируя состояние от объектов Machine (инфраструктура) и сервиса Bashible на узле (конфигурация).
          properties:
            spec:
              description: Спецификация Instance, включая ссылки на связанные ресурсы.
              properties:
                nodeRef:
                  description: Ссылка на объект узла Kubernetes.
                  properties:
                    name:
                      description: Имя узла.
                machineRef:
                  description: Ссылка на объект машины облачного провайдера.
                  properties:
                    apiVersion:
                      description: Используемая версия API.
                    kind:
                      description: Тип объекта.
                    name:
                      description: Имя объекта.
                    namespace:
                      description: Пространство имён, в котором находится объект.
                classReference:
                  description: |
                    Ссылка на объект `InstanceClass`.

                    Уникален для каждого модуля `cloud-provider-*`.
                  properties:
                    kind:
                      description: |
                        Тип объекта (например, `OpenStackInstanceClass`).

                        Тип объекта указан в документации соответствующего модуля облачного провайдера.
                    name:
                      description: |
                        Имя нужного объекта `InstanceClass` (например, `finland-medium`).
            status:
              description: Последнее наблюдаемое состояние Instance.
              properties:
                phase:
                  description: |
                    Высокоуровневая фаза жизненного цикла Instance.

                    Соответствие: Pending -> Provisioning -> Provisioned -> Running -> Terminating.
                machineStatus:
                  description: |
                    Агрегированный статус инфраструктурной машины.

                    Вычисляется из условия `MachineReady`.
                bashibleStatus:
                  description: |
                    Агрегированный статус процесса конфигурации bashible.

                    Вычисляется из условия `BashibleReady`.
                message:
                  description: |
                    Человекочитаемое сообщение с деталями текущего состояния или ошибки.

                    В CLI отображается только при использовании флага `-o wide` при вызове `d8 k`.
                conditions:
                  description: Детализированные условия Instance (MachineReady, BashibleReady и т.д.).
                  items:
                    properties:
                      type:
                        description: Тип условия (например, `MachineReady`, `BashibleReady`).
                      status:
                        description: Статус условия (`True`, `False`, `Unknown`).
                      severity:
                        description: Серьёзность условия (`Error`, `Warning`, `Info`).
                      lastHeartbeatTime:
                        description: Время последнего heartbeat-обновления условия от источника.
                      lastTransitionTime:
                        description: Время последнего перехода условия из одного состояния в другое.
                      reason:
                        description: Причина последнего перехода условия.
                      message:
                        description: Человекочитаемое сообщение с деталями перехода.
                      observedGeneration:
                        description: Поколение ресурса, наблюдаемое контроллером.
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            Описывает независимый от реализации объект эфемерной машины.
          properties:
            status:
              properties:
                nodeRef:
                  description: Ссылка на объект узла Kubernetes.
                  properties:
                    name:
                      description: Имя узла.
                classReference:
                  description: |
                    Ссылка на объект `InstanceClass`. Уникален для каждого модуля `cloud-provider-*`.
                  properties:
                    kind:
                      description: |
                        Тип объекта (например, `OpenStackInstanceClass`). Тип объекта указан в документации соответствующего модуля облачного провайдера.
                    name:
                      description: |
                        Имя нужного объекта `InstanceClass` (например, `finland-medium`).
                machineRef:
                  description: Ссылка на объект машины облачного провайдера.
                  properties:
                    apiVersion:
                      description: Используемая версия API.
                    kind:
                      description: Тип объекта.
                    name:
                      description: Имя объекта.
                    namespace:
                      description: Пространство имён, в котором находится объект.
                currentStatus:
                  description: Текущий статус объекта.
                  properties:
                    lastUpdateTime:
                      description: Время последнего обновления статуса.
                    phase:
                      description: Фаза состояния машины в текущий момент времени.
                lastOperation:
                  description: Последняя выполненная операция.
                  properties:
                    description:
                      description: Описание текущей операции.
                    lastUpdateTime:
                      description: Время последнего обновления операции.
                    state:
                      description: Состояние операции.
                    type:
                      description: Тип операции.
                bootstrapStatus:
                  description: Информация о процессе начальной настройки узла.
                  properties:
                    logsEndpoint:
                      description: HTTP-эндпоинт для получения логов начальной настройки узла.
                    description:
                      description: Описание процесса получения логов начальной настройки узла.
