---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nodeconfigs.internal.deckhouse.io
  labels:
    heritage: deckhouse
    module: node-manager
spec:
  group: internal.deckhouse.io
  names:
    kind: NodeConfig
    listKind: NodeConfigList
    plural: nodeconfigs
    shortNames:
    - nc
    singular: nodeconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          NodeConfig is the top-level object stored at /config/nodeconfig.yaml and, in
          the cluster, a CRD (internal.deckhouse.io/v1alpha1). It describes the desired
          state of a Deckhouse olcedar node. The on-node loader parses the same type
          from the config file; the CRD is generated from it (see `task gen`).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NodeSpec is the desired state of the node.
            properties:
              apiServerEndpoints:
                description: |-
                  APIServerEndpoints is the list of API server URLs the node connects to
                  (via the node-local API proxy).
                items:
                  pattern: ^(https?://)?(\\[[0-9A-Fa-f:]+\\]|[A-Za-z0-9]([-A-Za-z0-9]*[A-Za-z0-9])?([.][A-Za-z0-9]([-A-Za-z0-9]*[A-Za-z0-9])?)*):(6553[0-5]|655[0-2][0-9]|65[0-4][0-9]{2}|6[0-4][0-9]{3}|[1-5][0-9]{4}|[1-9][0-9]{0,3})/?$
                  type: string
                type: array
              containerRuntime:
                description: ContainerRuntime holds containerd configuration.
                properties:
                  maxConcurrentDownloads:
                    default: 3
                    description: MaxConcurrentDownloads limits parallel image layer
                      downloads.
                    minimum: 1
                    type: integer
                  registryMirrors:
                    additionalProperties:
                      description: RegistryMirror lists mirror endpoints for a registry.
                      properties:
                        endpoints:
                          items:
                            type: string
                          type: array
                      type: object
                    description: |-
                      RegistryMirrors lists mirror endpoints per registry host (not yet rendered
                      into hosts.toml; reserved for future use).
                    type: object
                  sandboxImage:
                    default: registry.k8s.io/pause:3.10
                    description: SandboxImage is the pause image used for pod sandboxes.
                    pattern: ^[^[:space:]]+$
                    type: string
                type: object
              extensions:
                description: Extensions are the signed verity sysext images to merge
                  onto the root.
                items:
                  description: |-
                    Extension is a signed verity sysext built from a release channel. It is
                    fetched from the registry-packages-proxy by digest. The optional repository
                    (a registry host, e.g. "cr.flant.com") selects the proxy's per-registry
                    client config; when empty the proxy's default config is used. The optional
                    additionalPath (e.g. "deckhouse/sysext/containerd") is forwarded to the
                    proxy as the "path" query parameter to locate the artifact within the
                    repository.
                  properties:
                    additionalPath:
                      description: AdditionalPath is forwarded to the proxy as the
                        "path" query parameter.
                      type: string
                    digest:
                      description: Digest is the sha256 digest of the sysext image.
                      pattern: ^sha256:[a-f0-9]{64}$
                      type: string
                    name:
                      description: Name is the extension name (also the sysext image
                        basename).
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    repository:
                      description: Repository optionally selects the proxy's per-registry
                        client config.
                      type: string
                    requestedBy:
                      description: RequestedBy records who requested the extension
                        (e.g. "node-manager").
                      type: string
                  required:
                  - digest
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              kernel:
                description: Kernel holds sysctl settings and kernel modules to load.
                properties:
                  modules:
                    items:
                      description: KernelModule is a module to load with optional
                        parameters.
                      properties:
                        name:
                          minLength: 1
                          type: string
                        params:
                          items:
                            type: string
                          type: array
                      required:
                      - name
                      type: object
                    type: array
                  sysctl:
                    additionalProperties:
                      description: SysctlValue bounds a single sysctl value for predictable
                        CRD CEL cost.
                      maxLength: 4096
                      type: string
                    maxProperties: 256
                    type: object
                    x-kubernetes-validations:
                    - message: vm.overcommit_memory is required to be 1
                      rule: '!(''vm.overcommit_memory'' in self) || self[''vm.overcommit_memory'']
                        == ''1'''
                    - message: sysctl keys must use dotted notation
                      rule: self.all(key, key.matches('^[A-Za-z0-9_-]+([.][A-Za-z0-9_-]+)+$'))
                    - message: sysctl values must not be empty or whitespace
                      rule: self.all(key, self[key].trim() != '')
                type: object
              kubelet:
                description: Kubelet holds kubelet configuration parameters.
                properties:
                  bootstrapToken:
                    description: |-
                      BootstrapToken is the bootstrap token used by kubelet to obtain its
                      client certificate on first boot.
                    type: string
                  caCert:
                    description: |-
                      CACert is the base64-encoded cluster CA certificate used in the
                      bootstrap-kubelet.conf to verify the API server.
                    type: string
                  clusterDNS:
                    description: ClusterDNS is the list of DNS server IP addresses
                      for the cluster.
                    items:
                      maxLength: 45
                      type: string
                    maxItems: 8
                    type: array
                    x-kubernetes-validations:
                    - message: clusterDNS entries must be valid IP addresses
                      rule: self.all(address, isIP(address))
                  clusterDomain:
                    description: ClusterDomain is the DNS domain for this cluster
                      (e.g. "cluster.local").
                    maxLength: 253
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                  containerLogMaxFiles:
                    default: 4
                    description: ContainerLogMaxFiles is the number of rotated log
                      files to retain.
                    minimum: 1
                    type: integer
                  containerLogMaxSize:
                    default: 50Mi
                    description: |-
                      ContainerLogMaxSize is the maximum log file size before rotation
                      (e.g. "50Mi").
                    type: string
                    x-kubernetes-validations:
                    - message: containerLogMaxSize must be a positive Kubernetes quantity
                      rule: isQuantity(self) && sign(quantity(self)) > 0
                  externalCloudProvider:
                    description: |-
                      ExternalCloudProvider enables --cloud-provider=external so the
                      cloud-controller-manager manages the node (zone, region, providerID).
                    type: boolean
                  maxPods:
                    default: 110
                    description: MaxPods is the maximum number of pods per node.
                    maximum: 500
                    minimum: 1
                    type: integer
                  nodeLabels:
                    additionalProperties:
                      description: NodeLabelValue mirrors Kubernetes label-value validation
                        in the CRD.
                      maxLength: 63
                      pattern: ^([A-Za-z0-9]([-A-Za-z0-9_.]*[A-Za-z0-9])?)?$
                      type: string
                    description: NodeLabels are labels added to the node object when
                      kubelet registers.
                    maxProperties: 64
                    type: object
                    x-kubernetes-validations:
                    - message: nodeLabels keys and values are too long
                      rule: self.all(key, size(key) <= 317 && size(self[key]) <= 63)
                    - message: nodeLabels keys must be qualified names
                      rule: self.all(key, !format.qualifiedName().validate(key).hasValue())
                  registerWithTaints:
                    description: |-
                      RegisterWithTaints is a list of taints to add to the node object when
                      kubelet registers itself. Only takes effect on initial registration.
                    items:
                      description: Taint represents a Kubernetes taint applied to
                        a node during registration.
                      properties:
                        effect:
                          enum:
                          - NoSchedule
                          - PreferNoSchedule
                          - NoExecute
                          type: string
                        key:
                          maxLength: 317
                          minLength: 1
                          pattern: ^(([a-z0-9]([-a-z0-9]*[a-z0-9])?\.)*[a-z0-9]([-a-z0-9]*[a-z0-9])?/)?[A-Za-z0-9]([-A-Za-z0-9_.]*[A-Za-z0-9])?$
                          type: string
                        value:
                          maxLength: 63
                          pattern: ^([A-Za-z0-9]([-A-Za-z0-9_.]*[A-Za-z0-9])?)?$
                          type: string
                      required:
                      - effect
                      - key
                      type: object
                    type: array
                type: object
              network:
                description: Network holds hostname, DNS, NTP, interfaces and routes.
                properties:
                  dns:
                    description: DNS resolver configuration.
                    properties:
                      search:
                        items:
                          type: string
                        type: array
                      servers:
                        items:
                          type: string
                        type: array
                    type: object
                  hostname:
                    type: string
                  interfaces:
                    items:
                      description: NetworkInterface describes a single NIC.
                      properties:
                        addresses:
                          description: Addresses are static CIDR addresses (used when
                            DHCP is false).
                          items:
                            type: string
                          type: array
                        dhcp:
                          description: DHCP enables DHCPv4 on the interface.
                          type: boolean
                        gateway:
                          type: string
                        name:
                          minLength: 1
                          type: string
                      required:
                      - dhcp
                      - name
                      type: object
                    type: array
                  ntp:
                    description: NTP time-sync configuration.
                    properties:
                      servers:
                        items:
                          type: string
                        type: array
                    type: object
                  routes:
                    items:
                      description: Route is a static route.
                      properties:
                        gateway:
                          type: string
                        name:
                          type: string
                        networks:
                          items:
                            type: string
                          type: array
                      type: object
                    type: array
                type: object
              nodeName:
                description: NodeName is the Kubernetes node name this config applies
                  to.
                maxLength: 253
                minLength: 1
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                type: string
              osImage:
                description: OSImage is the system image the node boots (resolved
                  from the release channel).
                type: string
              registryPackagesProxyAccessTokenB64:
                description: |-
                  RegistryPackagesProxyAccessTokenB64 is a base64-encoded token used to
                  authenticate against the registry packages proxy.
                pattern: ^(([A-Za-z0-9+/]{4})*([A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?)?$
                type: string
              storage:
                description: |-
                  Storage selects the target disk for the OS install. The partition layout
                  is fixed (boot/config/data), so only the whole-disk device is needed.
                properties:
                  device:
                    description: |-
                      Device is the whole-disk block device to install onto, e.g. "/dev/sda",
                      "/dev/nvme0n1", or a stable "/dev/disk/by-id/..." path. Ignored when
                      diskSelector is set.
                    pattern: ^/dev/[A-Za-z0-9._/-]+$
                    type: string
                  diskSelector:
                    description: |-
                      DiskSelector picks the target disk by attributes instead of a fixed path.
                      It takes priority over device (matching Talos semantics). All specified
                      conditions must match; the first disk that matches is used.
                    properties:
                      busPath:
                        description: BusPath matches the hardware bus path (glob).
                        type: string
                      model:
                        description: Model matches the device model (glob), e.g. "Samsung*".
                        type: string
                      name:
                        description: Name matches the kernel device name (glob), e.g.
                          "nvme0n1".
                        type: string
                      rotational:
                        description: Rotational matches spinning (true) vs solid-state
                          (false) disks.
                        type: boolean
                      serial:
                        description: Serial matches the disk serial number (glob).
                        type: string
                      size:
                        description: |-
                          Size matches the disk capacity, optionally with a comparison operator,
                          e.g. ">=100Gi", ">1Ti", "512Gi".
                        type: string
                      type:
                        description: Type matches the disk kind.
                        enum:
                        - SSD
                        - HDD
                        - NVMe
                        - SD
                        type: string
                      wwid:
                        description: WWID matches the World Wide Identifier (glob).
                        type: string
                    type: object
                  wipe:
                    description: |-
                      Wipe controls whether an already-provisioned disk is wiped and
                      re-partitioned. Default false: only an unprovisioned (or non-matching)
                      disk is set up, so an existing correct layout is left intact and a reboot
                      never destroys data.
                    type: boolean
                type: object
              updatePolicy:
                description: UpdatePolicy controls how and when the node is updated.
                properties:
                  mode:
                    description: Mode is the update mode.
                    enum:
                    - Automatic
                    - Manual
                    type: string
                  window:
                    description: Window is the maintenance window for updates.
                    properties:
                      days:
                        description: Days are the weekdays the window applies to.
                        items:
                          enum:
                          - Mon
                          - Tue
                          - Wed
                          - Thu
                          - Fri
                          - Sat
                          - Sun
                          type: string
                        type: array
                      from:
                        description: From is the window start time, "HH:MM" (24h).
                        pattern: ^([01][0-9]|2[0-3]):[0-5][0-9]$
                        type: string
                      to:
                        description: To is the window end time, "HH:MM" (24h).
                        pattern: ^([01][0-9]|2[0-3]):[0-5][0-9]$
                        type: string
                    type: object
                type: object
            required:
            - nodeName
            - osImage
            type: object
          status:
            description: Status is reported by the on-node agent after each reconcile
              pass.
            properties:
              conditions:
                description: |-
                  Conditions are the node-level reconcile outcomes (ConfigurationApplied,
                  DisruptionRequired) plus the gate subsystems (APIEndpointsReachable,
                  SysctlApplied). Per-extension and per-unit outcomes live in Extensions and
                  Units instead, one entry each rather than a single aggregate condition.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              extensions:
                description: |-
                  Extensions is the outcome of each configured system extension, one entry
                  per extension, so a reader sees which one failed rather than a single
                  aggregate ExtensionsReady.
                items:
                  description: ExtensionStatus is the reconcile outcome of one system
                    extension.
                  properties:
                    digest:
                      description: Digest is the image digest the node installed for
                        it.
                      type: string
                    message:
                      description: Message carries the cause when State is Failed.
                      type: string
                    name:
                      description: Name is the extension name, matching spec.extensions[].name.
                      type: string
                    state:
                      description: |-
                        State is Ready when the extension is installed and merged, Pending while it
                        is being fetched or waiting for the update window, or Failed with the cause
                        in Message.
                      enum:
                      - Ready
                      - Pending
                      - Failed
                      type: string
                  required:
                  - name
                  - state
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest spec generation the node has processed —
                  seen and decided what to do about. It reaches the newest generation as soon
                  as the node has looked at it, even while that generation is still held for
                  approval and not yet running (see AppliedGeneration).
                format: int64
                type: integer
              appliedGeneration:
                description: |-
                  AppliedGeneration is the spec generation the node is actually running. It
                  lags ObservedGeneration while a disruptive config is held. The rollout's
                  "this node has converged" test is AppliedGeneration == metadata.generation.
                format: int64
                type: integer
              phase:
                description: |-
                  Phase summarises the node. Ready: running the published config, healthy.
                  Pending: healthy but not yet running the published config (held for approval).
                  Degraded: a subsystem failed, the config was rejected, or the node rolled back.
                enum:
                - Ready
                - Pending
                - Degraded
                type: string
              units:
                description: |-
                  Units is the outcome of each managed systemd unit (containerd, kubelet and
                  every unit an extension ships), one entry per unit.
                items:
                  description: UnitStatus is the reconcile outcome of one managed
                    systemd unit.
                  properties:
                    message:
                      description: Message carries the cause when State is Failed.
                      type: string
                    name:
                      description: Name is the systemd unit name (e.g. containerd.service).
                      type: string
                    state:
                      description: |-
                        State is Active when the unit is running, Pending when it is queued to be
                        started later this pass, or Failed with the cause in Message.
                      enum:
                      - Active
                      - Pending
                      - Failed
                      type: string
                  required:
                  - name
                  - state
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              maintenanceToken:
                description: |-
                  MaintenanceToken authenticates a push to the node's maintenance
                  endpoint. The on-node agent generates it at startup and republishes it
                  here; an operator reads it from the last status the node published
                  while the API was reachable and presents it when pushing a config to
                  the node's :50000 endpoint after the node has lost the API.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
