spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            Описывает операцию над узлом, прерывающую его работу: перезагрузку, вытеснение рабочей нагрузки или разрешение, которое нужно узлу перед применением конфигурации, применить которую без паузы нельзя.

            Операция — это запись о намерении, а не переключатель: она создаётся один раз, проводится node-manager и агентом на узле через свои фазы и остаётся после завершения историей того, что с узлом делали и почему. Изменение spec существующей операции отклоняется — создайте новую.

            Через операции координируется прерывающая работа на узлах NodeGroup с `systemType: Immutable`, и этот же ресурс доступен оператору, которому нужно вручную перезагрузить узел или вытеснить с него нагрузку.
          properties:
            spec:
              properties:
                type:
                  description: |
                    Операция, выполняемая над узлом:

                    * `Reboot` — перезагрузить узел;
                    * `Drain` — вытеснить рабочую нагрузку с узла и оставить его недоступным для планировщика. Операция завершается, как только нагрузка ушла; узел остаётся вне планировщика, пока его не вернёт оператор;
                    * `ApproveDisruption` — разрешить узлу применить конфигурацию, применение которой прерывает его работу (перезапуск kubelet или container runtime, пересборка оверлея системных расширений, смена образа системы).

                    Операцию `ApproveDisruption` обычно создаёт node-manager в ответ на запрос узла; остальные две предназначены для оператора.
                nodeName:
                  description: |
                    Имя узла, к которому относится операция.
                configGeneration:
                  description: |
                    Ревизия NodeConfig узла, на которую выдаётся разрешение (`.metadata.generation` объекта NodeConfig).

                    Разрешение намеренно узкое: оно санкционирует прерывание, необходимое одной конкретной конфигурации, поэтому опубликованная следом конфигурация запросит разрешение заново. Имеет смысл только для `ApproveDisruption`.
                drain:
                  description: |
                    Как вытеснять рабочую нагрузку перед прерыванием работы узла.

                    Вытеснение выполняется отдельной операцией `Drain`, создаваемой для этой и принадлежащей ей, — за ней можно наблюдать, как за любой другой операцией, и она удаляется вместе с родительской.
                  properties:
                    skip:
                      description: |
                        Прервать работу узла, не вытесняя рабочую нагрузку.

                        Нагрузка в этом случае будет прервана вместе с узлом, а не перенесена, поэтому параметр предназначен для узлов, поды которых нельзя вытеснять (группа из одного узла, узел с единственной репликой того, что нельзя перенести).
            status:
              properties:
                phase:
                  description: |
                    Текущая фаза операции:

                    * `Pending` — операция поставлена в очередь, node-manager ещё не начал её выполнять;
                    * `InProgress` — узел подготовлен (нагрузка вытеснена, если drain не был пропущен) и выполняет операцию;
                    * `Completed` — операция прошла успешно;
                    * `Failed` — операция завершилась неудачно. За подробностями обратитесь к полю `conditions` и событиям.
                observedGeneration:
                  description: |
                    Поколение spec, которому соответствует текущий status.
                startedAt:
                  description: |
                    Момент передачи операции узлу. От него отсчитывается ожидание ответа узла.
                conditions:
                  description: |
                    Подробности о ходе выполнения операции.
