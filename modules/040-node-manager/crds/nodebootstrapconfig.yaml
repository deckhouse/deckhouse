---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nodebootstrapconfigs.bootstrap.deckhouse.io
  labels:
    heritage: deckhouse
    module: node-manager
    # The Cluster API contract label. The Machine controller uses it to resolve
    # the bootstrap configRef to this version and to read the status contract
    # (status.initialization.dataSecretCreated, status.dataSecretName) below.
    cluster.x-k8s.io/v1beta2: v1alpha1
spec:
  group: bootstrap.deckhouse.io
  names:
    kind: NodeBootstrapConfig
    listKind: NodeBootstrapConfigList
    plural: nodebootstrapconfigs
    singular: nodebootstrapconfig
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Ready
      type: boolean
      jsonPath: .status.initialization.dataSecretCreated
    - name: Secret
      type: string
      jsonPath: .status.dataSecretName
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    schema:
      openAPIV3Schema:
        description: |-
          NodeBootstrapConfig is the per-Machine bootstrap request the Cluster API
          MachineSet clones from a NodeBootstrapConfigTemplate. node-controller
          renders the machine's NodeConfig userdata into a Secret and advertises
          it through the status, which the Machine controller waits on.
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: |-
              Empty in v1alpha1: the userdata is rendered by the controller from
              live cluster state, not carried in the object.
            type: object
          status:
            type: object
            properties:
              dataSecretName:
                description: Name of the Secret holding the rendered bootstrap userdata.
                type: string
              initialization:
                description: |-
                  The Cluster API v1beta2 bootstrap contract. The Machine
                  controller waits for dataSecretCreated before reading the secret.
                type: object
                properties:
                  dataSecretCreated:
                    description: True once the bootstrap Secret has been rendered.
                    type: boolean
              conditions:
                type: array
                items:
                  type: object
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                    observedGeneration:
                      type: integer
                      format: int64
                      minimum: 0
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
