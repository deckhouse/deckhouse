- name: d8.node-manager.migration
  rules:
    - alert: D8ObsoleteDefaultCRIInClusterConfiguration
      for: 5m
      expr: |
        d8_obsolete_default_cri_in_cluster_configuration == 1
      labels:
        d8_component: node-manager
        d8_module: node-manager
        severity_level: "6"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: "markdown"
        plk_create_group_if_not_exists__d8_obsolete_default_cri_in_cluster_configuration: "D8ObsoleteDefaultCRIInClusterConfiguration,tier=cluster,prometheus=deckhouse,kubernetes=~kubernetes"
        plk_grouped_by__d8_obsolete_default_cri_in_cluster_configuration: "D8ObsoleteDefaultCRIInClusterConfiguration,tier=cluster,prometheus=deckhouse,kubernetes=~kubernetes"
        summary: Obsolete `defaultCRI` in ClusterConfiguration needs to be migrated to `node-manager` ModuleConfig.
        description: |-
          The `defaultCRI` field is set to a non-default value in ClusterConfiguration but has not been migrated to ModuleConfig `node-manager` yet.

          Until the migration is complete, the value from ClusterConfiguration is used to avoid unintended container runtime changes on nodes.

          **To resolve this alert, migrate the setting:**

          1. Migrate the value from ClusterConfiguration to ModuleConfig in one command:

             ```bash
             d8 k patch moduleconfig node-manager --type merge -p "$(cat <<EOF
             {"spec": {"version": 3, "settings": {"defaultCRI": "$(d8 k -n kube-system get secret d8-cluster-configuration -o jsonpath='{.data.cluster-configuration\.yaml}' | base64 -d | grep defaultCRI | awk '{print $2}')"}}}
             EOF
             )"
             ```

          Once ModuleConfig is updated, this alert will be resolved automatically.

          2. Remove `defaultCRI` from ClusterConfiguration:

             ```bash
             d8 system edit cluster-configuration
             ```

             Delete the `defaultCRI` field and save.
