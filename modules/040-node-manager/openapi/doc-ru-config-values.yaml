properties:
  earlyOomEnabled:
    description: |
      Флаг отключения early OOM killer для случаев, когда его работа создает проблемы в нормальной работе узлов.
  instancePrefix:
    description: |
      Префикс, который следует использовать при создании инстансов в облачном провайдере.

      Значение по умолчанию может вычисляться из данных структуры `ClusterConfiguration`, если кластер был установлен установщиком Deckhouse.
  mcmEmergencyBrake:
    description: |
      Флаг отключения `machine-controller-manager` для случаев, когда вносятся потенциально опасные изменения.

      > **Внимание.** Используйте этот флаг только в том случае, если вы знаете, зачем это делаете, и четко понимаете последствия.
  capiEmergencyBrake:
    description: |
      Флаг отключения `CAPI` для случаев, когда вносятся потенциально опасные изменения.

      > **Внимание.** Используйте этот флаг только в том случае, если вы знаете, зачем это делаете, и четко понимаете последствия.
  clusterAutoscaler:
    description: |
      Параметры Cluster Autoscaler.
    properties:
      newPodScaleUpDelay:
        description: |
          Поды моложе указанного значения не будут учитываться при принятии решения о scale-up.
          Может быть переопределено для отдельных подов через аннотацию `cluster-autoscaler.kubernetes.io/pod-scale-up-delay`.

          Полезно для сценариев с HPA, когда быстрая смена количества подов не должна приводить к созданию новых нод.
      minReplicaCount:
        description: |
          Минимальное количество реплик ReplicaSet или ReplicationController, при котором допускается
          удаление их подов при scale-down. Если у контроллера меньше реплик, чем указано,
          его поды не будут эвакуированы при удалении ноды.

          Значение по умолчанию `1` защищает одиночные деплойменты от прерывания во время scale-down.
