properties:
  instancePrefix:
    description: |
      Префикс, который следует использовать при создании инстансов в облачном провайдере.

      Значение по умолчанию может вычисляться из данных структуры `ClusterConfiguration`, если кластер был установлен установщиком Deckhouse.
  defaultCRI:
    description: |
      Тип container runtime, используемый на узлах кластера (в NodeGroup'ах) по умолчанию.

      Используется для NodeGroup'ов, в которых явно не задан параметр `spec.cri.type`.

      Если используется значение `NotManaged`, то Deckhouse не будет управлять (устанавливать и настраивать) container runtime.
      В этом случае образы, используемые в NodeGroup'ах, должны содержать уже установленный container runtime.

      Если задано значение `ContainerdV2`, будет использоваться `CgroupsV2` (что обеспечивает улучшенную безопасность и управление ресурсами). Для использования `ContainerdV2` в качестве container runtime узлы кластера должны удовлетворять следующим требованиям:

      - Поддержка `CgroupsV2`.
      - Версия ядра Linux 5.8 или новее, за исключением диапазонов 6.12.0–6.12.28 и 6.14.0–6.14.6 (эти версии подвержены CVE-2025-37999 в EROFS).
      - Версия systemd `244` или новее.
      - Поддержка модуля ядра `erofs`.

      Если параметр не задан, используется значение из `ClusterConfiguration.defaultCRI` (по умолчанию `Containerd`).
  mcmEmergencyBrake:
    description: |
      Флаг отключения `machine-controller-manager` для случаев, когда вносятся потенциально опасные изменения.

      > **Внимание.** Используйте этот флаг только если полностью понимаете последствия.
  capiEmergencyBrake:
    description: |
      Флаг отключения `CAPI` для случаев, когда вносятся потенциально опасные изменения.

      > **Внимание.** Используйте этот флаг только если полностью понимаете последствия.
