---
image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: common/distroless
imageSpec:
  config:
    entrypoint: ["/node-controller"]
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-artifact
  add: /node-controller
  to: /node-controller
  before: setup
- image: {{ .ModuleName }}/{{ .ImageName }}-crds-artifact
  add: /crds
  to: /crds
  before: setup
- image: {{ .ModuleName }}/{{ .ImageName }}-templates-artifact
  add: /deckhouse
  to: /deckhouse
  before: setup
{{- include "image mount points" . }}
---
image: {{ .ModuleName }}/{{ $.ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
git:
- add: /{{ $.ModulePath }}modules/040-{{ .ModuleName }}/images/{{ .ImageName }}/src
  to: /src
  excludePaths:
  - "**/*.md"
  - "**/*.yaml"
  - hack
  stageDependencies:
    install:
    - go.mod
    - go.sum
    - "**/*.go"
- add: /{{ $.ModulePath }}go_lib/dependency/k8s/drain
  to: /go_lib/dependency/k8s/drain
  includePaths:
  - '**/*.go'
  - '**/*.mod'
  - '**/*.sum'
  stageDependencies:
    install:
    - '**/*.go'
    - 'go.mod'
    - 'go.sum'
shell:
  install:
  - cd /src
---
image: {{ .ModuleName }}/{{ .ImageName }}-artifact
from: {{ index $.Images "builder/golang" }}
final: false
import:
- image: {{ .ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
- image: {{ .ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /go_lib/dependency/k8s/drain
  to: /go_lib/dependency/k8s/drain
  before: install
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  install:
  - cd /src
  - GOPROXY=$(cat /run/secrets/GOPROXY) go mod download
  - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -a -o /node-controller cmd/main.go
  - chown 64535:64535 /node-controller
  - chmod 0700 /node-controller
---
image: {{ .ModuleName }}/{{ .ImageName }}-crds-artifact
fromImage: common/src-artifact
final: false
git:
- add: /{{ $.ModulePath }}modules/040-{{ .ModuleName }}/images/{{ .ImageName }}/crds
  to: /crds
  includePaths:
  - "*.yaml"
  stageDependencies:
    install:
    - "*.yaml"
---
# Provider MachineClass / MachineTemplate templates baked into the image at the
# /deckhouse/... paths that machineclass.DefaultTemplateBaseDirs resolves against
# (mirrors the helm symlinks capi/<type> and cloud-providers/<type>). This lets
# the controller render provider objects without mounting the module tree at runtime.
# EE providers live under ee/ and are only present in EE build trees, so they are
# guarded by .isEE (in CE builds those NodeGroups cannot exist).
image: {{ .ModuleName }}/{{ .ImageName }}-templates-artifact
fromImage: common/src-artifact
final: false
git:
{{- $tplIncludePaths := list "cloud-instance-manager/machine-class.yaml" "cloud-instance-manager/machine-class.checksum" "capi/instance-class.checksum" "capi/machine-template.yaml" }}
{{- range $provider := list "aws" "azure" "gcp" "yandex" "dvp" }}
- add: /{{ $.ModulePath }}modules/030-cloud-provider-{{ $provider }}
  to: /deckhouse/modules/030-cloud-provider-{{ $provider }}
  includePaths:
  {{- range $p := $tplIncludePaths }}
  - {{ $p }}
  {{- end }}
  stageDependencies:
    install:
    {{- range $p := $tplIncludePaths }}
    - {{ $p }}
    {{- end }}
{{- end }}
{{- if .isEE }}
{{- range $provider := list "openstack" "dynamix" "vcd" "huaweicloud" }}
- add: /ee/modules/030-cloud-provider-{{ $provider }}
  to: /deckhouse/ee/modules/030-cloud-provider-{{ $provider }}
  includePaths:
  {{- range $p := $tplIncludePaths }}
  - {{ $p }}
  {{- end }}
  stageDependencies:
    install:
    {{- range $p := $tplIncludePaths }}
    - {{ $p }}
    {{- end }}
{{- end }}
{{- range $provider := list "vsphere" "zvirt" }}
- add: /ee/se-plus/modules/030-cloud-provider-{{ $provider }}
  to: /deckhouse/ee/se-plus/modules/030-cloud-provider-{{ $provider }}
  includePaths:
  {{- range $p := $tplIncludePaths }}
  - {{ $p }}
  {{- end }}
  stageDependencies:
    install:
    {{- range $p := $tplIncludePaths }}
    - {{ $p }}
    {{- end }}
{{- end }}
{{- end }}
