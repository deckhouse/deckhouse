---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nodegroups.deckhouse.io
spec:
  group: deckhouse.io
  names:
    kind: NodeGroup
    listKind: NodeGroupList
    plural: nodegroups
    singular: nodegroup
  scope: Cluster
  versions:
  - name: v1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        description: NodeGroup is the Schema for the nodegroups API
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            properties:
              nodeType:
                description: NodeType specifies the type of nodes in this group
                type: string
                enum:
                - CloudEphemeral
                - CloudPermanent
                - CloudStatic
                - Static
              nodeTemplate:
                description: NodeTemplate specifies labels, annotations and taints for nodes
                type: object
                properties:
                  labels:
                    additionalProperties:
                      type: string
                    type: object
                  annotations:
                    additionalProperties:
                      type: string
                    type: object
                  taints:
                    type: array
                    items:
                      type: object
                      required:
                      - effect
                      - key
                      properties:
                        effect:
                          type: string
                        key:
                          type: string
                        timeAdded:
                          format: date-time
                          type: string
                        value:
                          type: string
              gpu:
                description: GPU specifies GPU settings
                type: object
                properties:
                  mode:
                    type: string
                  mig:
                    type: object
                    properties:
                      strategy:
                        type: string
                  timeSlicing:
                    type: object
                    properties:
                      partitionCount:
                        type: integer
                  exclusive:
                    type: object
              cri:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              cloudInstances:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              staticInstances:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              chaos:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              operatingSystem:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              disruptions:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              kubelet:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              update:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              fencing:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              nodeDrainTimeoutSecond:
                type: integer
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
