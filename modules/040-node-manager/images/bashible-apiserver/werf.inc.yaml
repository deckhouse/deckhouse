---
image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
git:
- add: /{{ $.ModulePath }}modules/040-{{ $.ModuleName }}/images/{{ $.ImageName }}/src
  to: /src
  excludePaths:
  - "**/*.md"
  - "**/*.yaml"
  - hack
  stageDependencies:
    install:
    - go.mod
    - go.sum
    - "**/*.go"
- add: /{{ $.ModulePath }}go_lib/registry
  to: /go_lib/registry
  includePaths:
  - '**/*.go'
  - '**/*.mod'
  - '**/*.sum'
  stageDependencies:
    install:
    - '**/*.go'
    - 'go.mod'
    - 'go.sum'
shell:
  install:
  - cd /src
---
image: {{ .ModuleName }}/{{ .ImageName }}-artifact
from: {{ index $.Images "builder/golang" }}
final: false
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
- image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
  add: /go_lib/registry
  to: /go_lib/registry
  before: install
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  install:
  - cd /src
  - GOPROXY=$(cat /run/secrets/GOPROXY) go mod download
  - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bashible-apiserver .
  - chown 64535:64535 bashible-apiserver
  - chmod 0700 bashible-apiserver
---
image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: common/distroless
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-artifact
  add: /src/bashible-apiserver
  to: /bashible-apiserver
  before: setup
{{- include "image mount points" . }}
git:
{{ .Files.Get (printf "tools/build_includes/candi-%s.yaml" .Env) }}
{{ .Files.Get (printf "tools/build_includes/candi-cloud-providers-%s.yaml" .Env) }}
- add: /{{ .ModulePath }}candi/bashible
  to: /deckhouse/candi/bashible
  stageDependencies:
    beforeSetup:
    - "*"
  includePaths:
  - bundles
  - common-steps
  - bootstrap
  - bb_node_ip.sh.tpl
  - bashible.sh.tpl
  - lib.sh.tpl
  {{- if eq .Env "CE" }}
  - detect_bundle.sh
  {{- end }}
  excludePaths:
  - "**/cluster-bootstrap"
shell:
  install:
  - set -e
  beforeSetup:
  - set -e
imageSpec:
  config:
    # Category A TLS profile (deckhouse TLS standard, see
    # go_lib/hooks/tls_certificate/README.md): bashible-apiserver is an
    # aggregated extension API server; its only client is kube-apiserver
    # (proxied through aggregation), so we pin the handshake floor to
    # TLS 1.3 and let Go pick the fixed AEAD cipher suite list. The old
    # RSA-key-exchange / CBC / SHA1 entries are gone.
    entrypoint: ["/bashible-apiserver", "--tls-min-version", "VersionTLS13"]
