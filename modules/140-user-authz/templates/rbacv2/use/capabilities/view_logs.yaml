apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:use:capability:kubernetes:view_logs
  labels:
    heritage: deckhouse
    rbac.deckhouse.io/kind: use
    rbac.deckhouse.io/aggregate-to-role: viewer
rules:
  - apiGroups:
      - ""
    resources:
      - pod/logs
    verbs:
      - get