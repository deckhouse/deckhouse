apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:use:capability:kubernetes:view_metrics
  labels:
    heritage: deckhouse
    rbac.deckhouse.io/kind: use
    rbac.deckhouse.io/aggregate-to-role: viewer
rules:
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
    verbs:
      - get
      - list
      - watch