apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:namespace-capability:kubernetes:view_secrets
  annotations:
    en.meta.deckhouse.io/title: "View secrets"
    ru.meta.deckhouse.io/title: "Просмотр секретов"
    en.meta.deckhouse.io/description: "Read access to Secrets in a namespace."
    ru.meta.deckhouse.io/description: "Доступ на чтение секретов в пространстве имён."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/kind: capability
    rbac.deckhouse.io/capability: "namespace-capability.kubernetes.view_secrets"
    rbac.deckhouse.io/scope: namespace
    rbac.deckhouse.io/aggregate-to-namespace-as: user
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch