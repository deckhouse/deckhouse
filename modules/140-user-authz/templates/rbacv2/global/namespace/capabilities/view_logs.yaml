apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:namespace-capability:kubernetes:view_logs
  annotations:
    en.meta.deckhouse.io/title: "View logs"
    ru.meta.deckhouse.io/title: "Просмотр логов"
    en.meta.deckhouse.io/description: "Read access to pod logs."
    ru.meta.deckhouse.io/description: "Доступ на чтение логов подов."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/kind: capability
    rbac.deckhouse.io/capability: "namespace-capability.kubernetes.view_logs"
    rbac.deckhouse.io/scope: namespace
    rbac.deckhouse.io/aggregate-to-namespace-as: viewer
rules:
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get