apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:namespace-capability:kubernetes:manage_quotas
  annotations:
    en.meta.deckhouse.io/title: "Manage quotas"
    ru.meta.deckhouse.io/title: "Управление квотами"
    en.meta.deckhouse.io/description: "Manage ResourceQuotas in a namespace."
    ru.meta.deckhouse.io/description: "Управление квотами (ResourceQuota) в пространстве имён."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/kind: capability
    rbac.deckhouse.io/scope: namespace
    rbac.deckhouse.io/aggregate-to-namespace-as: admin
rules:
  - apiGroups:
      - ""
    resources:
      - resourcequotas
    verbs:
      - create
      - update
      - patch
      - delete
      - deletecollection