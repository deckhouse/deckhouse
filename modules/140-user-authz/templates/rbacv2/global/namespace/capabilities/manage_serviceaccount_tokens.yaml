apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:namespace-capability:kubernetes:manage_serviceaccount_tokens
  annotations:
    en.meta.deckhouse.io/title: "Issue ServiceAccount tokens / impersonate"
    ru.meta.deckhouse.io/title: "Выпуск токенов ServiceAccount / имперсонация"
    en.meta.deckhouse.io/description: "Mint ServiceAccount tokens and impersonate ServiceAccounts in a namespace. This is a disaster-grade privilege-escalation primitive."
    ru.meta.deckhouse.io/description: "Выпуск токенов ServiceAccount и имперсонация ServiceAccount в пространстве имён. Это критически опасный примитив эскалации привилегий."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/kind: capability
    rbac.deckhouse.io/capability: "namespace-capability.kubernetes.manage_serviceaccount_tokens"
    rbac.deckhouse.io/scope: namespace
    rbac.deckhouse.io/aggregate-to-namespace-as: superadmin
rules:
  - apiGroups:
      - ""
    resources:
      - serviceaccounts/token
    verbs:
      - create
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
    verbs:
      - impersonate
