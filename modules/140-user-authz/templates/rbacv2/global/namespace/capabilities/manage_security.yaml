apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:namespace-capability:kubernetes:manage_security
  annotations:
    en.meta.deckhouse.io/title: "Manage security"
    ru.meta.deckhouse.io/title: "Управление безопасностью"
    en.meta.deckhouse.io/description: "Manage RBAC and security objects in a namespace."
    ru.meta.deckhouse.io/description: "Управление RBAC и объектами безопасности в пространстве имён."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/kind: capability
    rbac.deckhouse.io/capability: "namespace-capability.kubernetes.manage_security"
    rbac.deckhouse.io/scope: namespace
    rbac.deckhouse.io/aggregate-to-namespace-as: admin
rules:
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - rolebindings
      - roles
    verbs:
      - get
      - list
      - watch
      - create
      - delete
      - deletecollection
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete