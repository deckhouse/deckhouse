apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:namespace-capability:kubernetes:manage_limits
  annotations:
    en.meta.deckhouse.io/title: "Manage limits"
    ru.meta.deckhouse.io/title: "Управление лимитами"
    en.meta.deckhouse.io/description: "Manage LimitRanges in a namespace."
    ru.meta.deckhouse.io/description: "Управление лимитами (LimitRange) в пространстве имён."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/kind: capability
    rbac.deckhouse.io/capability: "namespace-capability.kubernetes.manage_limits"
    rbac.deckhouse.io/scope: namespace
    rbac.deckhouse.io/aggregate-to-namespace-as: admin
rules:
  - apiGroups:
      - ""
    resources:
      - limitranges
    verbs:
      - create
      - update
      - patch
      - delete
      - deletecollection
