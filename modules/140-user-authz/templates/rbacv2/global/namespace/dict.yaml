apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:dict
  annotations:
    en.meta.deckhouse.io/title: "Cluster Dictionary"
    ru.meta.deckhouse.io/title: "Справочные объекты кластера"
    en.meta.deckhouse.io/description: "Read-only access to cluster-scoped dictionary objects (StorageClasses, IngressClasses, PriorityClasses, etc.). Granted automatically to every namespace role holder."
    ru.meta.deckhouse.io/description: "Доступ только на чтение к кластерным справочным объектам (StorageClass, IngressClass, PriorityClass и т.п.). Выдаётся автоматически каждому обладателю namespace-роли."
  labels:
    heritage: deckhouse
    module: user-authz
rules:
  - apiGroups:
      - deckhouse.io
    resources:
      - clusterlogdestinations
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - node.k8s.io
    resources:
      - runtimeclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - scheduling.k8s.io
    resources:
      - priorityclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - storage.k8s.io
    resources:
      - csidrivers
      - csinodes
      - storageclasses
      - volumeattachments
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - snapshot.storage.k8s.io
    resources:
      - volumesnapshotclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingressclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - virtualization.deckhouse.io
    resources:
      - virtualmachineclasses
      - clustervirtualimages
    verbs:
      - get
      - list
      - watch
  - apiGroups:
    - apiextensions.k8s.io
    resources:
    - customresourcedefinitions
    verbs:
    - get
    - list
