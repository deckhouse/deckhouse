apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:system:manager
  annotations:
    en.meta.deckhouse.io/title: "System Manager"
    ru.meta.deckhouse.io/title: "Управление системой"
    en.meta.deckhouse.io/description: "Management of the Deckhouse platform configuration across all subsystems."
    ru.meta.deckhouse.io/description: "Управление конфигурацией платформы Deckhouse во всех подсистемах."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/use-role: user
    rbac.deckhouse.io/kind: role
    rbac.deckhouse.io/scope: system
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/aggregate-to-system-as: manager
rules: []
