apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:subsystem:observability:viewer
  annotations:
    en.meta.deckhouse.io/title: "Observability: Viewer"
    ru.meta.deckhouse.io/title: "Просмотр подсистемы наблюдаемости"
    en.meta.deckhouse.io/description: "Read-only access to the Observability subsystem configuration."
    ru.meta.deckhouse.io/description: "Доступ только на чтение к конфигурации подсистемы наблюдаемости."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/use-role: viewer
    rbac.deckhouse.io/kind: role
    rbac.deckhouse.io/scope: subsystem
    rbac.deckhouse.io/subsystem: observability
    rbac.deckhouse.io/aggregate-to-observability-as: manager
    rbac.deckhouse.io/aggregate-to-system-as: viewer
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/aggregate-to-observability-as: viewer
rules: []
