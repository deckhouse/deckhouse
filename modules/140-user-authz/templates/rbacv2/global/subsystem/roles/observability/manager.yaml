apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:subsystem:observability:manager
  annotations:
    en.meta.deckhouse.io/title: "Observability: Manager"
    ru.meta.deckhouse.io/title: "Управление подсистемы наблюдаемости"
    en.meta.deckhouse.io/description: "Management of the Observability subsystem configuration."
    ru.meta.deckhouse.io/description: "Управление конфигурацией подсистемы наблюдаемости."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/use-role: admin
    rbac.deckhouse.io/kind: role
    rbac.deckhouse.io/scope: subsystem
    rbac.deckhouse.io/subsystem: observability
    rbac.deckhouse.io/aggregate-to-observability-as: superadmin
    rbac.deckhouse.io/aggregate-to-system-as: manager
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/aggregate-to-observability-as: manager
rules: []
