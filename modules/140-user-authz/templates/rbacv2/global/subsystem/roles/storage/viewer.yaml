apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:subsystem:storage:viewer
  annotations:
    en.meta.deckhouse.io/title: "Storage: Viewer"
    ru.meta.deckhouse.io/title: "Просмотр подсистемы хранилища"
    en.meta.deckhouse.io/description: "Read-only access to the Storage subsystem configuration."
    ru.meta.deckhouse.io/description: "Доступ только на чтение к конфигурации подсистемы хранилища."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/use-role: viewer
    rbac.deckhouse.io/kind: role
    rbac.deckhouse.io/scope: subsystem
    rbac.deckhouse.io/subsystem: storage
    rbac.deckhouse.io/aggregate-to-storage-as: manager
    rbac.deckhouse.io/aggregate-to-system-as: viewer
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/aggregate-to-storage-as: viewer
rules: []
