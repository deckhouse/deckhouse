apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:subsystem:security:manager
  annotations:
    en.meta.deckhouse.io/title: "Security: Manager"
    ru.meta.deckhouse.io/title: "Управление подсистемы безопасности"
    en.meta.deckhouse.io/description: "Management of the Security subsystem configuration."
    ru.meta.deckhouse.io/description: "Управление конфигурацией подсистемы безопасности."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/use-role: admin
    rbac.deckhouse.io/kind: role
    rbac.deckhouse.io/scope: subsystem
    rbac.deckhouse.io/subsystem: security
    rbac.deckhouse.io/aggregate-to-security-as: superadmin
    rbac.deckhouse.io/aggregate-to-system-as: manager
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/aggregate-to-security-as: manager
rules: []
