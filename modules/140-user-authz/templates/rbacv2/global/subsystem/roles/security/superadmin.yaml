apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:subsystem:security:superadmin
  annotations:
    en.meta.deckhouse.io/title: "Security: Superadmin"
    ru.meta.deckhouse.io/title: "Суперадминистратор подсистемы безопасности"
    en.meta.deckhouse.io/description: "Full control over the Security subsystem, including its system resources."
    ru.meta.deckhouse.io/description: "Полный контроль над подсистемы безопасности, включая её системные ресурсы."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/use-role: superadmin
    rbac.deckhouse.io/kind: role
    rbac.deckhouse.io/scope: subsystem
    rbac.deckhouse.io/subsystem: security
    rbac.deckhouse.io/aggregate-to-system-as: superadmin
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/aggregate-to-security-as: superadmin
rules: []
