apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:subsystem:security:viewer
  annotations:
    en.meta.deckhouse.io/title: "Security: Viewer"
    ru.meta.deckhouse.io/title: "Просмотр подсистемы безопасности"
    en.meta.deckhouse.io/description: "Read-only access to the Security subsystem configuration."
    ru.meta.deckhouse.io/description: "Доступ только на чтение к конфигурации подсистемы безопасности."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/use-role: viewer
    rbac.deckhouse.io/kind: role
    rbac.deckhouse.io/scope: subsystem
    rbac.deckhouse.io/subsystem: security
    rbac.deckhouse.io/aggregate-to-security-as: manager
    rbac.deckhouse.io/aggregate-to-system-as: viewer
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/aggregate-to-security-as: viewer
rules: []
