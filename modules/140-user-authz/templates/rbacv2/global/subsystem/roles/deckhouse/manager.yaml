apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:subsystem:deckhouse:manager
  annotations:
    en.meta.deckhouse.io/title: "Deckhouse: Manager"
    ru.meta.deckhouse.io/title: "Управление подсистемы Deckhouse"
    en.meta.deckhouse.io/description: "Management of the Deckhouse subsystem configuration."
    ru.meta.deckhouse.io/description: "Управление конфигурацией подсистемы Deckhouse."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/use-role: admin
    rbac.deckhouse.io/kind: role
    rbac.deckhouse.io/scope: subsystem
    rbac.deckhouse.io/subsystem: deckhouse
    rbac.deckhouse.io/aggregate-to-deckhouse-as: superadmin
    rbac.deckhouse.io/aggregate-to-system-as: manager
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/aggregate-to-deckhouse-as: manager
rules: []
