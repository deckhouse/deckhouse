apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:subsystem:deckhouse:superadmin
  annotations:
    en.meta.deckhouse.io/title: "Deckhouse: Superadmin"
    ru.meta.deckhouse.io/title: "Суперадминистратор подсистемы Deckhouse"
    en.meta.deckhouse.io/description: "Full control over the Deckhouse subsystem, including its system resources."
    ru.meta.deckhouse.io/description: "Полный контроль над подсистемы Deckhouse, включая её системные ресурсы."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/use-role: superadmin
    rbac.deckhouse.io/kind: role
    rbac.deckhouse.io/scope: subsystem
    rbac.deckhouse.io/subsystem: deckhouse
    rbac.deckhouse.io/aggregate-to-system-as: superadmin
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/aggregate-to-deckhouse-as: superadmin
rules: []
