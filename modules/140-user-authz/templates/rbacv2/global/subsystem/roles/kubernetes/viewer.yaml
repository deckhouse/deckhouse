apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:subsystem:kubernetes:viewer
  annotations:
    en.meta.deckhouse.io/title: "Kubernetes: Viewer"
    ru.meta.deckhouse.io/title: "Просмотр подсистемы Kubernetes"
    en.meta.deckhouse.io/description: "Read-only access to the Kubernetes subsystem configuration."
    ru.meta.deckhouse.io/description: "Доступ только на чтение к конфигурации подсистемы Kubernetes."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/use-role: viewer
    rbac.deckhouse.io/kind: role
    rbac.deckhouse.io/scope: subsystem
    rbac.deckhouse.io/subsystem: kubernetes
    rbac.deckhouse.io/aggregate-to-kubernetes-as: manager
    rbac.deckhouse.io/aggregate-to-system-as: viewer
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/aggregate-to-kubernetes-as: viewer
rules: []
