apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:subsystem:kubernetes:superadmin
  annotations:
    en.meta.deckhouse.io/title: "Kubernetes: Superadmin"
    ru.meta.deckhouse.io/title: "Суперадминистратор подсистемы Kubernetes"
    en.meta.deckhouse.io/description: "Full control over the Kubernetes subsystem, including its system resources."
    ru.meta.deckhouse.io/description: "Полный контроль над подсистемы Kubernetes, включая её системные ресурсы."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/use-role: superadmin
    rbac.deckhouse.io/kind: role
    rbac.deckhouse.io/scope: subsystem
    rbac.deckhouse.io/subsystem: kubernetes
    rbac.deckhouse.io/aggregate-to-system-as: superadmin
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/aggregate-to-kubernetes-as: superadmin
rules: []
