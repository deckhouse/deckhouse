apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:subsystem-capability:security:manage_resources
  annotations:
    en.meta.deckhouse.io/title: "Security: manage cluster resources"
    ru.meta.deckhouse.io/title: "Безопасность: управление кластерными ресурсами"
    en.meta.deckhouse.io/description: "Manage cluster-scoped security resources."
    ru.meta.deckhouse.io/description: "Управление кластерными ресурсами безопасности."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/kind: capability
    rbac.deckhouse.io/capability: "subsystem-capability.security.manage_resources"
    rbac.deckhouse.io/scope: subsystem
    rbac.deckhouse.io/subsystem: security
    rbac.deckhouse.io/aggregate-to-kubernetes-as: manager
    rbac.deckhouse.io/aggregate-to-security-as: manager
rules:
  - apiGroups:
      - admissionregistration.k8s.io
    resources:
      - mutatingwebhookconfigurations
      - validatingadmissionpolicies
      - validatingadmissionpolicybindings
      - validatingwebhookconfigurations
    verbs:
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterrolebindings
      - clusterroles
    verbs:
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - certificates.k8s.io
    resources:
      - certificatesigningrequests
    verbs:
      - create
      - delete
      - deletecollection
      - patch
      - update