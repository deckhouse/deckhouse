apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:subsystem-capability:networking:view_resources
  annotations:
    en.meta.deckhouse.io/title: "Networking: view cluster resources"
    ru.meta.deckhouse.io/title: "Сеть: просмотр кластерных ресурсов"
    en.meta.deckhouse.io/description: "Read-only access to cluster-scoped networking resources."
    ru.meta.deckhouse.io/description: "Доступ только на чтение к кластерным сетевым ресурсам."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/kind: capability
    rbac.deckhouse.io/scope: subsystem
    rbac.deckhouse.io/subsystem: networking
    rbac.deckhouse.io/aggregate-to-kubernetes-as: viewer
    rbac.deckhouse.io/aggregate-to-networking-as: viewer
rules:
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingressclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - flowcontrol.apiserver.k8s.io
    resources:
      - prioritylevelconfigurations
      - flowschemas
    verbs:
      - get
      - list
      - watch