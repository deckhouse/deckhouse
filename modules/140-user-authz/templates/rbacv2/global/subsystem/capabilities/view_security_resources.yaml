apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:subsystem-capability:security:view_resources
  annotations:
    en.meta.deckhouse.io/title: "Security: view cluster resources"
    ru.meta.deckhouse.io/title: "Безопасность: просмотр кластерных ресурсов"
    en.meta.deckhouse.io/description: "Read-only access to cluster-scoped security resources."
    ru.meta.deckhouse.io/description: "Доступ только на чтение к кластерным ресурсам безопасности."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/kind: capability
    rbac.deckhouse.io/capability: "subsystem-capability.security.view_resources"
    rbac.deckhouse.io/scope: subsystem
    rbac.deckhouse.io/subsystem: security
    rbac.deckhouse.io/aggregate-to-kubernetes-as: viewer
    rbac.deckhouse.io/aggregate-to-security-as: viewer
rules:
  - apiGroups:
      - admissionregistration.k8s.io
    resources:
      - mutatingwebhookconfigurations
      - validatingadmissionpolicies
      - validatingadmissionpolicybindings
      - validatingwebhookconfigurations
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterrolebindings
      - clusterroles
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - authorization.k8s.io
    resources:
      - localsubjectaccessreviews
      - subjectaccessreviews
    verbs:
      - create
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
      - selfsubjectreviews
    verbs:
      - create
  - apiGroups:
      - certificates.k8s.io
    resources:
      - certificatesigningrequests
    verbs:
      - get
      - list
      - watch