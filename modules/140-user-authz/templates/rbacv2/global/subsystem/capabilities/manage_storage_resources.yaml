apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:subsystem-capability:storage:manage_resources
  annotations:
    en.meta.deckhouse.io/title: "Storage: manage cluster resources"
    ru.meta.deckhouse.io/title: "Хранилище: управление кластерными ресурсами"
    en.meta.deckhouse.io/description: "Manage cluster-scoped storage resources."
    ru.meta.deckhouse.io/description: "Управление кластерными ресурсами хранилища."
  labels:
    heritage: deckhouse
    module: user-authz
    rbac.deckhouse.io/kind: capability
    rbac.deckhouse.io/capability: "subsystem-capability.storage.manage_resources"
    rbac.deckhouse.io/scope: subsystem
    rbac.deckhouse.io/subsystem: storage
    rbac.deckhouse.io/aggregate-to-kubernetes-as: manager
    rbac.deckhouse.io/aggregate-to-storage-as: manager
rules:
  - apiGroups:
      - ""
    resources:
      - persistentvolumes
    verbs:
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - storage.k8s.io
    resources:
      - csidrivers
      - csinodes
      - storageclasses
      - volumeattachments
    verbs:
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - snapshot.storage.k8s.io
    resources:
      - volumesnapshotclasses
      - volumesnapshotcontents
    verbs:
      - create
      - update
      - patch
      - delete