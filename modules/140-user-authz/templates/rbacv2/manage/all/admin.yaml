  labels:
    {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
    rbac.deckhouse.io/kind: manage
aggregationRule:
  clusterRoleSelectors:
  - matchLabels:
      rbac.deckhouse.io/aggregate-to-all-role: admin
rules: []