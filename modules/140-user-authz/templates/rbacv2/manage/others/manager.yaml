apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:manage:all:manager
  labels:
    heritage: deckhouse
    rbac.deckhouse.io/kind: manage
    rbac.deckhouse.io/aggregate-to-all-role: manager
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/kind: manage
        rbac.deckhouse.io/aggregate-to-scope: others
        rbac.deckhouse.io/aggregate-to-role: manager
rules: []