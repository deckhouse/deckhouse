{{- $version_map := include "get_oss_version_map_by_id_and_condition_key" (list "ccm-aws" "k8s" $) | fromYaml }}
{{- range $key, $value := $version_map }}
  {{- $k8s_version := toString $key }}
  {{- $image_version := toString $key | replace "." "-" }}
  {{- $version := toString $value }}
  {{- if $version }}
    {{- $patches := (printf "/%smodules/%s-%s/images/%s" $.ModulePath $.ModulePriority $.ModuleName $.ImageName) }}
    {{- $patch := false }}
    {{- range $path, $_ := $.Files.Glob (printf "%s/patches/%s/*.patch" $patches $k8s_version) }}
        {{- $patch = true }}
    {{- end }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-{{ $image_version }}
fromImage: common/distroless
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact-{{ $image_version }}
  add: /src/aws-cloud-controller-manager
  to: /usr/local/bin/aws-cloud-controller-manager
  before: setup
imageSpec:
  config:
    entrypoint: ["/usr/local/bin/aws-cloud-controller-manager"]
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact-{{ $image_version }}
final: false
fromImage: common/src-artifact
{{- if $patch }}
git:
  - add: {{ $patches }}/patches/{{ $k8s_version }}
    to: /patches
    stageDependencies:
      install:
        - '**/*'
{{- end }}
secrets:
- id: SOURCE_REPO
  value: {{ $.SOURCE_REPO }}
shell:
  install:
    - git clone --depth 1 --branch {{ $version }} $(cat /run/secrets/SOURCE_REPO)/kubernetes/cloud-provider-aws.git /src
    - cd /src
    {{- if $patch }}
    - git apply /patches/*.patch --verbose
    {{- end }}
    - rm -rf .git vendor tests/e2e
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact-{{ $image_version }}
final: false
from: {{ index $.Images "builder/golang" }}
import:
  - image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact-{{ $image_version }}
    add: /src
    to: /src
    before: install
mount:
{{ include "mount points for golang builds" $ }}
secrets:
- id: GOPROXY
  value: {{ $.GOPROXY }}
shell:
  install:
  - cd /src
  - GOPROXY=$(cat /run/secrets/GOPROXY) go mod download
  setup:
  - cd /src
  - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-w -s -X k8s.io/component-base/version.gitVersion={{ $version }} -X main.gitVersion={{ $version }}" -o=aws-cloud-controller-manager cmd/aws-cloud-controller-manager/main.go
  - chown 64535:64535 /src/aws-cloud-controller-manager
  - chmod 0755 /src/aws-cloud-controller-manager
  {{- end }}
{{- end }}
