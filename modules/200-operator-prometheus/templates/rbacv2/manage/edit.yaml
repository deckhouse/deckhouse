apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:manage:capability:module:operator-prometheus:edit
  labels:
    heritage: deckhouse
    module: operator-prometheus
    rbac.deckhouse.io/aggregate-to-observability: "true"
    rbac.deckhouse.io/aggregate-to-role: manager
    rbac.deckhouse.io/kind: manage
rules:
  - apiGroups:
      - deckhouse.io
    resourceNames:
      - operator-prometheus
    resources:
      - moduleconfigs
    verbs:
      - create
      - update
      - patch
      - delete