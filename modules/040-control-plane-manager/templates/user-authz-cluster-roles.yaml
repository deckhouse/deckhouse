---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    user-authz.deckhouse.io/access-level: ClusterAdmin
  name: d8:user-authz:control-plane-manager:cluster-admin
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups:
  - control-plane.deckhouse.io
  resources:
  - controlplanenodes
  verbs:
  - get
  - list
  - watch
  - patch
  - update
- apiGroups:
  - control-plane.deckhouse.io
  resources:
  - controlplaneoperations
  verbs:
  - get
  - watch
