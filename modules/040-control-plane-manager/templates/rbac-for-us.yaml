---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: d8-control-plane-manager
  namespace: kube-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "d8-control-plane-manager")) | nindent 2 }}
automountServiceAccountToken: false
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: d8:control-plane-manager
  namespace: kube-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "d8-control-plane-manager")) | nindent 2 }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "watch", "list"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "create", "update"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: d8:control-plane-manager
  namespace: kube-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "d8-control-plane-manager")) | nindent 2 }}
subjects:
- kind: ServiceAccount
  name: d8-control-plane-manager
  namespace: kube-system
roleRef:
  kind: Role
  name: d8:control-plane-manager
  apiGroup: rbac.authorization.k8s.io

---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: d8:control-plane-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "d8-control-plane-manager")) | nindent 2 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: ["deckhouse.io"]
    resources: ["nodegroups"]
    verbs: ["get", "list", "watch"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: d8:control-plane-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "d8-control-plane-manager")) | nindent 2 }}
subjects:
  - kind: ServiceAccount
    name: d8-control-plane-manager
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: d8:control-plane-manager
  apiGroup: rbac.authorization.k8s.io
{{- $userAuthzEnabled := has "user-authz" ($.Values.global.enabledModules | default list) }}
{{- /*
  Granular admin.conf is gated by THREE independent flags to avoid the chicken-and-egg case on
  a fresh cluster: kubeadm pre-creates ClusterRoleBinding kubeadm:cluster-admins -> cluster-admin,
  Helm cannot mutate roleRef (it is immutable), and SSA fails permanently if the desired
  ClusterRole does not yet exist.

  1. $userAuthzEnabled            — user-authz module is turned on in values.
  2. $clusterBootstrapped         — set to true by the global hook cluster_is_bootstrapped after
                                    the first non-master node becomes Ready. Until then we MUST
                                    keep the kubeadm-default wildcard binding so the very first
                                    helm install of control-plane-manager can succeed.
  3. $userAuthzCRAvailable        — set to true by the OnBeforeHelm hook
                                    reconcile_kubeadm_cluster_admins_binding when it observes that
                                    ClusterRole user-authz:cluster-admin is actually present in
                                    the API. This catches the race where user-authz is enabled
                                    and the cluster is bootstrapped, but the user-authz module
                                    itself has not rendered yet (e.g., right after enabling it on
                                    an existing cluster). The flag lives under
                                    .internal.* and cannot be set via ModuleConfig.

  IMPORTANT: read the flags via `dig` (and not `.Values.<...> | default false`) because they are
  set asynchronously by hooks — an early helm render happens before the parent maps are populated,
  and a chained lookup through a missing parent would either fail or silently render the granular
  branch. The binding is switched ONLY when all three flags are explicitly true.
*/}}
{{- $clusterBootstrapped := dig "clusterIsBootstrapped" false .Values.global }}
{{- $userAuthzCRAvailable := dig "internal" "userAuthzClusterAdminClusterRoleAvailable" false .Values.controlPlaneManager }}
{{- if and $userAuthzEnabled (eq $clusterBootstrapped true) (eq $userAuthzCRAvailable true) }}
---
# Extra rules for identity kubernetes-admin (group kubeadm:cluster-admins) beyond user-authz:cluster-admin.
# No user-authz.deckhouse.io/access-level annotation: that pattern is for optional ClusterRoles merged into
# ClusterAuthorizationRule bindings; this role must apply only to kubeadm:cluster-admins via explicit bindings below.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:control-plane-manager:admin-kubeconfig-supplement
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups: [""]
  resources: ["pods/portforward"]
  verbs: ["create", "get"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["create", "delete", "deletecollection", "patch", "update"]
- apiGroups: [""]
  resources: ["nodes/status"]
  verbs: ["get", "patch", "update"]
- apiGroups: [""]
  resources: ["users", "groups", "serviceaccounts"]
  verbs: ["impersonate"]
# Standard k8s resources not granted by user-authz:cluster-admin.
- apiGroups: [""]
  resources: ["persistentvolumes"]
  verbs: ["create", "delete", "deletecollection", "patch", "update"]
- apiGroups: [""]
  resources: ["persistentvolumes/status"]
  verbs: ["get", "patch", "update"]
- apiGroups: [""]
  resources: ["replicationcontrollers"]
  verbs: ["create", "delete", "deletecollection", "patch", "update"]
- apiGroups: [""]
  resources: ["replicationcontrollers/scale"]
  verbs: ["get", "patch", "update"]
- apiGroups: [""]
  resources: ["componentstatuses"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["bindings", "pods/binding"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "delete", "deletecollection", "patch", "update"]
- apiGroups: ["events.k8s.io"]
  resources: ["events"]
  verbs: ["create", "delete", "deletecollection", "patch", "update"]
- apiGroups: ["apps"]
  resources: ["controllerrevisions"]
  verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "patch", "update"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingressclasses"]
  verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "patch", "update"]
- apiGroups: ["storage.k8s.io"]
  resources: ["volumeattachments", "csinodes", "csidrivers", "csistoragecapacities"]
  verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "patch", "update"]
- apiGroups: ["node.k8s.io"]
  resources: ["runtimeclasses"]
  verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "patch", "update"]
- apiGroups: ["flowcontrol.apiserver.k8s.io"]
  resources: ["flowschemas", "prioritylevelconfigurations"]
  verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "patch", "update"]
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["validatingadmissionpolicies", "validatingadmissionpolicybindings"]
  verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "patch", "update"]
- apiGroups: ["authorization.k8s.io"]
  resources: ["subjectaccessreviews", "localsubjectaccessreviews", "selfsubjectaccessreviews", "selfsubjectrulesreviews"]
  verbs: ["create"]
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews", "selfsubjectreviews"]
  verbs: ["create"]
- apiGroups: ["deckhouse.io"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["deckhouse.io"]
  resources:
  - moduleconfigs
  - deckhousereleases
  - modulesources
  - moduleupdatepolicies
  - modulepulloverrides
  - packagerepositories
  - packagerepositoryoperations
  - applicationpackageversions
  - applicationpackages
  - applications
  - nodegroups
  - nodeusers
  - staticinstances
  - sshcredentials
  - authorizationrules
  - clusterauthorizationrules
  - users
  - useroperations
  - dexproviders
  - dexauthenticators
  - ingressnginxcontrollers
  - securitypolicies
  - securitypolicyexceptions
  - operationpolicies
  - customprometheusrules
  - clusterlogdestinations
  - clusterloggingconfigs
  - podloggingconfigs
  - projects
  verbs: ["create", "delete", "deletecollection", "patch", "update"]
- apiGroups: ["certificates.k8s.io"]
  resources: ["certificatesigningrequests"]
  verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "patch", "update"]
- apiGroups: ["certificates.k8s.io"]
  resources: ["certificatesigningrequests/approval", "certificatesigningrequests/status"]
  verbs: ["get", "patch", "update"]
- nonResourceURLs: ["/api", "/api/*", "/apis", "/apis/*", "/healthz", "/healthz/*", "/version", "/openapi/*", "/logs", "/metrics"]
  verbs: ["get"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
- apiGroups: ["scheduling.k8s.io"]
  resources: ["priorityclasses"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
- apiGroups: ["apiregistration.k8s.io"]
  resources: ["apiservices"]
  verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "patch", "update"]
- apiGroups: ["apiregistration.k8s.io"]
  resources: ["apiservices/status"]
  verbs: ["get", "patch", "update"]
- apiGroups: ["apps", "extensions"]
  resources: ["deployments/scale", "statefulsets/scale", "replicasets/scale"]
  verbs: ["get", "patch", "update"]
{{/*
  ClusterRoleBinding kubeadm:cluster-admins: binds group from admin.conf to RBAC roles.
  - With user-authz AND cluster bootstrapped: two bindings so the union matches high-level ClusterAdmin
    (which now includes nodes/proxy for apiserver -> kubelet path) plus machine-only extras (same group).
  - Otherwise (fresh cluster or user-authz disabled): single binding to built-in cluster-admin (wildcard).
  Hook reconcile_kubeadm_cluster_admins_binding (OnBeforeHelm, Order=5) recreates this binding when its
  desired roleRef changes (roleRef is immutable in Kubernetes RBAC).
*/}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeadm:cluster-admins
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: user-authz:cluster-admin
subjects:
- kind: Group
  name: kubeadm:cluster-admins
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:control-plane-manager:kubeadm-cluster-admins-supplement
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:control-plane-manager:admin-kubeconfig-supplement
subjects:
- kind: Group
  name: kubeadm:cluster-admins
{{- else }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeadm:cluster-admins
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: Group
  name: kubeadm:cluster-admins
{{- end }}
