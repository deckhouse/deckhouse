{{- if (.Values.global.enabledModules | has "prometheus-metrics-adapter") }}
{{- /*
  PodMetrics expose 7d-average CPU/memory usage of control-plane static pods
  via custom.metrics.k8s.io. The autotune hook reads them (max across masters)
  instead of querying Prometheus directly.

  lookback window = 7d — must stay in sync with lookbackWindow in
  hooks/autotune_resources_requests.go.
*/}}
{{- $components := list
  (dict "container" "kube-apiserver")
  (dict "container" "etcd")
  (dict "container" "kube-controller-manager")
  (dict "container" "kube-scheduler")
}}
{{- range $c := $components }}
---
apiVersion: deckhouse.io/v1alpha1
kind: PodMetric
metadata:
  name: d8-cpm-autotune-{{ $c.container }}-cpu
  namespace: kube-system
  {{- include "helm_lib_module_labels" (list $ (dict "app" "d8-control-plane-manager")) | nindent 2 }}
spec:
  query: |
    sum(
      avg_over_time(
        rate(
          container_cpu_usage_seconds_total{<<.LabelMatchers>>,container="{{ $c.container }}"}[5m]
        )[7d:5m]
      )
    ) by (<<.GroupBy>>)
---
apiVersion: deckhouse.io/v1alpha1
kind: PodMetric
metadata:
  name: d8-cpm-autotune-{{ $c.container }}-memory
  namespace: kube-system
  {{- include "helm_lib_module_labels" (list $ (dict "app" "d8-control-plane-manager")) | nindent 2 }}
spec:
  query: |
    sum(
      avg_over_time(
        container_memory_working_set_bytes{<<.LabelMatchers>>,container="{{ $c.container }}"}[7d]
      )
    ) by (<<.GroupBy>>)
{{- end }}
{{- end }}
