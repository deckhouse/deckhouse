{{- $moduleGateway := dict }}
{{- include "helm_lib_module_gateway" (list . $moduleGateway) }}
{{- if and $moduleGateway .Values.global.modules.publicDomainTemplate .Values.controlPlaneManager.apiserver.publishAPI.ingress.enabled (include "helm_lib_kind_exists" (list . "HTTPRoute")) }}
{{- $apiHost := include "helm_lib_module_public_domain" (list . "api") }}
{{- if .Values.controlPlaneManager.internal.authn.enableBasicAuth }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubernetes-api-basic-auth
  namespace: kube-system
  annotations:
    alb.network.deckhouse.io/buffer-max-request-bytes: "10485760"
  {{- if .Values.controlPlaneManager.apiserver.publishAPI.ingress.whitelistSourceRanges }}
    alb.network.deckhouse.io/whitelist-source-range: {{ .Values.controlPlaneManager.apiserver.publishAPI.ingress.whitelistSourceRanges | join "," }}
  {{- end }}
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "kubernetes-configurator")) | nindent 2 }}
spec:
  hostnames:
  - {{ $apiHost }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: control-plane-manager
    namespace: kube-system
    sectionName: api
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: basic-auth-proxy
      namespace: d8-user-authn
      port: 7332
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /api
      headers:
      - name: Authorization
        type: RegularExpression
        value: ^(.*)Basic(.*)$
    - path:
        type: PathPrefix
        value: /apis
      headers:
      - name: Authorization
        type: RegularExpression
        value: ^(.*)Basic(.*)$
    - path:
        type: PathPrefix
        value: /openapi
      headers:
      - name: Authorization
        type: RegularExpression
        value: ^(.*)Basic(.*)$
    - path:
        type: Exact
        value: /version
      headers:
      - name: Authorization
        type: RegularExpression
        value: ^(.*)Basic(.*)$
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubernetes-api
  namespace: kube-system
  annotations:
    alb.network.deckhouse.io/backend-tls-settings: '{"mode": "SIMPLE", "insecureSkipVerify": true}'
    alb.network.deckhouse.io/buffer-max-request-bytes: "10485760"
  {{- if .Values.controlPlaneManager.apiserver.publishAPI.ingress.whitelistSourceRanges }}
    alb.network.deckhouse.io/whitelist-source-range: {{ .Values.controlPlaneManager.apiserver.publishAPI.ingress.whitelistSourceRanges | join "," }}
  {{- end }}
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "kubernetes-configurator")) | nindent 2 }}
spec:
  hostnames:
  - {{ $apiHost }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: control-plane-manager
    namespace: kube-system
    sectionName: api
  rules:
  # /healthz, /livez and /readyz are intentionally not published until HTTPRoute can return a direct 403.
  - backendRefs:
    - group: ""
      kind: Service
      name: kubernetes
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /api
  - backendRefs:
    - group: ""
      kind: Service
      name: kubernetes
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /apis
  - backendRefs:
    - group: ""
      kind: Service
      name: kubernetes
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /openapi
  - backendRefs:
    - group: ""
      kind: Service
      name: kubernetes
      port: 443
      weight: 1
    matches:
    - path:
        type: Exact
        value: /version
{{- if include "helm_lib_module_https_route_tls_enabled" . }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubernetes-api-redirect
  namespace: kube-system
  annotations:
  {{- include "helm_lib_module_labels" (list . (dict "app" "kubernetes-configurator")) | nindent 2 }}
spec:
  hostnames:
  - {{ $apiHost }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: control-plane-manager
    namespace: kube-system
    sectionName: api-redirect
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
    matches:
    - path:
        type: PathPrefix
        value: /
{{- end }}
{{- end }}
