{{- if .Values.controlPlaneManager.apiserver.publishAPI.ingress.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes
  namespace: kube-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "kubernetes-configurator")) | nindent 2 }}
spec:
  clusterIP: None
  ports:
  - name: https
    port: 443
    protocol: TCP
    targetPort: {{ .Values.controlPlaneManager.internal.kubernetesApiserverTargetPort }}
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kubernetes
  namespace: kube-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "kubernetes-configurator")) | nindent 2 }}
subsets:
- addresses:
  {{- range $address := .Values.controlPlaneManager.internal.kubernetesApiserverAddresses }}
  - ip: {{ $address }}
  {{- end }}
  ports:
  - name: https
    port: {{ .Values.controlPlaneManager.internal.kubernetesApiserverTargetPort }}
    protocol: TCP
{{- end }}
