{{- if .Values.controlPlaneManager.apiserver.publishAPI.ingress.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: d8-publish-api-config
  namespace: kube-system
data:
  publishedAPIKubeconfigGeneratorMasterCA: |
    {{ .Values.controlPlaneManager.internal.authn.publishedAPIKubeconfigGeneratorMasterCA | b64enc | nindent 4  }}
  addKubeconfigGeneratorEntry: |
    {{ .Values.controlPlaneManager.apiserver.publishAPI.ingress.addKubeconfigGeneratorEntry | toString | b64enc | nindent 4 }}
  httpsMode: |
    {{ .Values.controlPlaneManager.apiserver.publishAPI.ingress.https.mode | b64enc | nindent 4 }}
  {{- if .Values.controlPlaneManager.apiserver.publishAPI.ingress.ingressClass }}
  ingressClass: |
    {{ .Values.controlPlaneManager.apiserver.publishAPI.ingress.ingressClass | b64enc | nindent 4 }}
  {{- end }}
  {{- if .Values.controlPlaneManager.apiserver.publishAPI.ingress.whitelistSourceRanges }}
  whitelistSourceRanges: |
    {{ .Values.controlPlaneManager.apiserver.publishAPI.ingress.whitelistSourceRanges | toString |  b64enc | nindent 4 }}
  {{- end }}
{{- end }}