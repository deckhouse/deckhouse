{{- if (.Values.global.enabledModules | has "prometheus") }}
{{- $profiles := list "main" }}
{{- if .Values.controlPlaneManager.internal.hasEtcdArbiterNode }}
  {{- $profiles = append $profiles "etcd-arbiter" }}
{{- end }}

{{- range $profile := $profiles }}
{{- $appLabel := "control-plane-proxy" }}
{{- if ne $profile "main" }}
  {{- $appLabel = printf "%s-%s" $appLabel $profile }}
{{- end }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: control-plane-proxy{{- if ne $profile "main" }}-{{ $profile }}{{- end }}
  namespace: d8-monitoring
  {{- include "helm_lib_module_labels" (list $ (dict "prometheus" "main")) | nindent 2 }}
spec:
  selector:
    matchLabels:
      app: {{ $appLabel }}
      heritage: deckhouse
  namespaceSelector:
    matchNames:
    - kube-system
  endpoints:
  - scheme: https
    port: https-metrics
    path: /etcd/metrics
    tlsConfig:
      insecureSkipVerify: true
    bearerTokenSecret:
      name: "prometheus-token"
      key: "token"
    relabelings:
    - regex: endpoint|pod|container
      action: labeldrop
    - targetLabel: job
      replacement: kube-etcd3
    - sourceLabels: [__meta_kubernetes_pod_node_name]
      targetLabel: node
    - targetLabel: tier
      replacement: cluster
    - sourceLabels: [__meta_kubernetes_endpointslice_endpoint_conditions_ready]
      regex: "true"
      action: keep
  {{- if eq $profile "main" }}
  - scheme: https
    port: https-metrics
    path: /scheduler/metrics
    tlsConfig:
      insecureSkipVerify: true
    bearerTokenSecret:
      name: "prometheus-token"
      key: "token"
    relabelings:
    - regex: endpoint|pod|container
      action: labeldrop
    - targetLabel: job
      replacement: kube-scheduler
    - targetLabel: tier
      replacement: cluster
    - sourceLabels: [__meta_kubernetes_endpointslice_endpoint_conditions_ready]
      regex: "true"
      action: keep
  - scheme: https
    port: https-metrics
    path: /controller-manager/metrics
    tlsConfig:
      insecureSkipVerify: true
    bearerTokenSecret:
      name: "prometheus-token"
      key: "token"
    honorLabels: true
    relabelings:
    - regex: endpoint|pod|container
      action: labeldrop
    - targetLabel: job
      replacement: kube-controller-manager
    - targetLabel: tier
      replacement: cluster
    - sourceLabels: [__meta_kubernetes_endpointslice_endpoint_conditions_ready]
      regex: "true"
      action: keep
  {{- end }}
{{- end }}
{{- end }}