{{- if (.Values.global.enabledModules | has "prometheus") }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane-proxy
  namespace: kube-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "control-plane-proxy")) | nindent 2 }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:control-plane-manager:control-plane-proxy:rbac-proxy
  {{- include "helm_lib_module_labels" (list . (dict "app" "control-plane-proxy")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:rbac-proxy
subjects:
  - kind: ServiceAccount
    name: control-plane-proxy
    namespace: kube-system
{{- end }}
