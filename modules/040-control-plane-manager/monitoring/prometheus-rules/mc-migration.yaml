- name: d8.control-plane-manager.migration
  rules:
    - alert: D8ObsoletePublishAPIinUserAuthn
      for: 5m
      expr: |
        d8_obsolete_publishapi_in_user_authn == 1
      labels:
        d8_component: control-plane-manager
        d8_module: control-plane-manager
        severity_level: "6"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: "markdown"
        plk_create_group_if_not_exists__d8_obsolete_publishapi_in_user_authn: "D8ObsoletePublishAPIInUserAuthn,tier=cluster,prometheus=deckhouse,kubernetes=~kubernetes"
        plk_grouped_by__d8_obsolete_publishapi_in_user_authn: "D8ObsoletePublishAPIInUserAuthn,tier=cluster,prometheus=deckhouse,kubernetes=~kubernetes"
        summary: Obsolete Publish API settings in `user-authn` need to be migrated.
        description: |-
          Publish API ingress settings are being migrated from `mc user-authn` to `mc control-plane-manager`.

          **To complete the migration, follow the steps below:**

          1. Review current settings for `publishAPI` in the `moduleconfig user-authn` resource.

             Note that legacy `user-authn` `spec.version: 1` uses `publishAPI.enable` instead of `publishAPI.enabled`.
             No manual rewrite is required: the command in step 4 uses the normalized payload from the temporary ConfigMap.

          2. If the `moduleconfig control-plane-manager` resource exists, update its spec to `spec.version: 3`. If `settings.apiserver.loadBalancer` is set, migrate it to `settings.apiserver.publishAPI.loadBalancer`. If the resource does not exist, proceed to step 3.

          3. If `moduleconfig control-plane-manager` does not exist, create it via `d8`:

             ```
             d8 s module enable control-plane-manager
             ```

             And set the settings version:

             ```
             d8 k patch moduleconfig control-plane-manager --type merge \
             -p '{"spec":{"version":3}}'
             ```

          4. Apply the migrated settings into `moduleconfig control-plane-manager` from temporary configMap by executing the following script:

             ```bash
             d8 k patch moduleconfig control-plane-manager --type merge -p "$(cat <<EOF
             {"spec": {"settings": {"apiserver": {"publishAPI": {"ingress": \
             $(d8 k -n kube-system get cm d8-publishapi-config-migration -ojsonpath='{.data.config}')
                }}}}}
             EOF
             )"
             ```

          5. Remove obsolete `spec.settings.publishAPI` section from `moduleconfig user-authn`.
    - alert: D8ObsoleteGlobalControlPlaneResourcesRequests
      for: 5m
      expr: |
        d8_obsolete_global_control_plane_resources_requests == 1
      labels:
        d8_component: control-plane-manager
        d8_module: control-plane-manager
        severity_level: "6"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: "markdown"
        plk_create_group_if_not_exists__d8_obsolete_global_control_plane_resources_requests: "D8ObsoleteGlobalControlPlaneResourcesRequests,tier=cluster,prometheus=deckhouse,kubernetes=~kubernetes"
        plk_grouped_by__d8_obsolete_global_control_plane_resources_requests: "D8ObsoleteGlobalControlPlaneResourcesRequests,tier=cluster,prometheus=deckhouse,kubernetes=~kubernetes"
        summary: Obsolete global control-plane resource requests need to be migrated.
        description: |-
          Control-plane resource requests are being migrated from global settings to `moduleconfig control-plane-manager`.

          The obsolete settings are still used as a fallback, but they should be moved to the `control-plane-manager` module settings.
          The migration does not change the meaning of the values: `cpu` and `memory` remain the total resource requests for control-plane components on each master node.

          **To complete the migration, follow the steps below:**

          1. Review the current obsolete settings in `moduleconfig global`:

             ```bash
             d8 k get mc global -o jsonpath='{.spec.settings.modules.resourcesRequests.controlPlane}'; echo
             ```

             Example of obsolete settings:

             ```yaml
             spec:
               settings:
                 modules:
                   resourcesRequests:
                     controlPlane:
                       cpu: 1000m
                       memory: 500Mi
             ```

          2. Make sure the `moduleconfig control-plane-manager` resource exists and uses settings version `3`.

             If the resource does not exist, create it:

             ```bash
             d8 s module enable control-plane-manager
             ```

             Set the settings version:

             ```bash
             d8 k patch mc control-plane-manager --type merge \
               -p '{"spec":{"version":3}}'
             ```

          3. Copy the obsolete values from `moduleconfig global` to `moduleconfig control-plane-manager`.

             The following command preserves the original JSON value types, including numeric CPU values:

             ```bash
             d8 k patch mc control-plane-manager --type merge -p "$(
               d8 k get mc global -o json | jq -c \
                 '{"spec":{"version":3,"settings":{"resourcesRequests": .spec.settings.modules.resourcesRequests.controlPlane}}}'
             )"
             ```

             After migration, the `moduleconfig control-plane-manager` resource should contain:

             ```yaml
             spec:
               version: 3
               settings:
                 resourcesRequests:
                   cpu: 1000m
                   memory: 500Mi
             ```

          4. Check that the values were applied:

             ```bash
             d8 k get mc control-plane-manager -o jsonpath='{.spec.settings.resourcesRequests}'; echo
             ```

          5. Remove the obsolete settings from `moduleconfig global`:

             ```bash
             d8 k patch mc global --type merge \
               -p '{"spec":{"settings":{"modules":{"resourcesRequests":null}}}}'
             ```
    - alert: D8ObsoleteEncryptionAlgorithmInClusterConfiguration
      for: 5m
      expr: |
        d8_obsolete_encryption_algorithm_in_cluster_configuration == 1
      labels:
        d8_component: control-plane-manager
        d8_module: control-plane-manager
        severity_level: "6"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: "markdown"
        plk_create_group_if_not_exists__d8_obsolete_encryption_algorithm_in_cluster_configuration: "D8ObsoleteEncryptionAlgorithmInClusterConfiguration,tier=cluster,prometheus=deckhouse,kubernetes=~kubernetes"
        plk_grouped_by__d8_obsolete_encryption_algorithm_in_cluster_configuration: "D8ObsoleteEncryptionAlgorithmInClusterConfiguration,tier=cluster,prometheus=deckhouse,kubernetes=~kubernetes"
        summary: Obsolete `encryptionAlgorithm` in `ClusterConfiguration` needs to be migrated to `control-plane-manager` ModuleConfig.
        description: |-
          The `encryptionAlgorithm` field is set to a non-default value in `ClusterConfiguration` but has not been migrated to `ModuleConfig control-plane-manager` yet.

          Until the migration is complete, the value from `ClusterConfiguration` is used to avoid unintended certificate rotation.

          **To resolve this alert, migrate the setting:**

          1. If `moduleconfig control-plane-manager` does not exist, create it first:

             ```bash
             d8 s module enable control-plane-manager
             ```

          2. Migrate the value from `ClusterConfiguration` to `ModuleConfig` in one command:

             ```bash
             d8 k patch moduleconfig control-plane-manager --type merge -p "$(cat <<EOF
             {"spec": {"version": 3, "settings": {"encryptionAlgorithm": "$(d8 k -n kube-system get secret d8-cluster-configuration -o jsonpath='{.data.cluster-configuration\.yaml}' | base64 -d | grep encryptionAlgorithm | awk '{print $2}')"}}}
             EOF
             )"
             ```

          Once `ModuleConfig` is updated, this alert will be resolved automatically.

          3. Remove `encryptionAlgorithm` from ClusterConfiguration:

             ```bash
             d8 system edit cluster-configuration
             ```

             Delete the `encryptionAlgorithm` field and save.