- name: d8.control-plane-manager.encryption-algorithm-migration
  rules:
    - alert: D8EncryptionAlgorithmDeprecatedInClusterConfiguration
      for: 5m
      expr: |
        d8_encryption_algorithm_deprecated_in_cluster_configuration == 1
      labels:
        d8_component: control-plane-manager
        d8_module: control-plane-manager
        severity_level: "6"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: "markdown"
        plk_create_group_if_not_exists__d8_encryption_algorithm_deprecated_in_cluster_configuration: "D8EncryptionAlgorithmDeprecatedInClusterConfiguration,tier=cluster,prometheus=deckhouse,kubernetes=~kubernetes"
        plk_grouped_by__d8_encryption_algorithm_deprecated_in_cluster_configuration: "D8EncryptionAlgorithmDeprecatedInClusterConfiguration,tier=cluster,prometheus=deckhouse,kubernetes=~kubernetes"
        summary: "`encryptionAlgorithm` in `ClusterConfiguration` is deprecated and must be migrated to `control-plane-manager` ModuleConfig."
        description: |-
          The `encryptionAlgorithm` field is set to a non-default value in `ClusterConfiguration` but has not been migrated to `ModuleConfig control-plane-manager` yet.

          Until the migration is complete, the value from `ClusterConfiguration` is used to avoid unintended certificate rotation.

          **To resolve this alert, migrate the setting:**

          1. Check the current value in `ClusterConfiguration`:

             ```bash
             d8 k -n kube-system get secret d8-cluster-configuration -o jsonpath='{.data.cluster-configuration\.yaml}' | base64 -d | grep encryptionAlgorithm
             ```

          2. Set the same value in `ModuleConfig control-plane-manager`:

             ```bash
             d8 k patch moduleconfig control-plane-manager --type merge \
               -p '{"spec":{"settings":{"encryptionAlgorithm":"<value-from-step-1>"}}}'
             ```

          Once `ModuleConfig` is updated, this alert will be resolved automatically.

          3. Remove `encryptionAlgorithm` from `ClusterConfiguration`:

             ```bash
             d8 system edit cluster-configuration
             ```

             Delete the `encryptionAlgorithm` field and save.
