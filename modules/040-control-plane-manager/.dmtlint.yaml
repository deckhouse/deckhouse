linters-settings:
  openapi:
    exclude-rules:
      enum:
        # Real Kubernetes ClusterRole names (lowercase by RBAC conventions),
        # set by reconcile_kubeadm_cluster_admins_binding hook; cannot be capitalized.
        - "properties.internal.properties.kubeadmClusterAdminsTargetRoleName"
  container:
    exclude-rules:
      resources:
        - kind: DaemonSet
          name: d8-control-plane-manager
          container: image-holder-etcd
