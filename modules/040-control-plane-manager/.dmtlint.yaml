          name: d8-control-plane-manager
          container: image-holder-kube-scheduler
        - kind: DaemonSet
          name: d8-control-plane-manager
          container: image-holder-kube-controller-manager
        - kind: DaemonSet
          name: d8-control-plane-manager
          container: image-holder-kube-apiserver
