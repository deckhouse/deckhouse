apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kubeschedulerwebhookconfigurations.deckhouse.io
  labels:
    heritage: deckhouse
    module: control-plane-manager
spec:
  group: deckhouse.io
  scope: Cluster
  names:
    plural: kubeschedulerwebhookconfigurations
    singular: kubeschedulerwebhookconfiguration
    kind: KubeSchedulerWebhookConfiguration
  preserveUnknownFields: false
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: ['webhooks']
          description: |
            Определяет конфигурацию для включения внешних extender вебхуков для kube-scheduler.

            С их помощью можно гибко настраивать кластер Kubernetes.
          properties:
            webhooks:
              type: array
              items:
                type: object
                required: ['weight', 'clientConfig']
                properties:
                  weight:
                    type: integer
                    description: |
                      Числовой множитель для оценок узла, которые генерирует вызов расчета приоритезации.

                      Вес должен быть положительным целым числом.
                    minimum: 1
                  failurePolicy:
                    type: string
                    enum: ['Fail', 'Ignore']
                    description: |
                      Определяет политику - падать с ошибкой или пропускать если extender вернул ошибку или недоступен.
                    default: Fail
                  clientConfig:
                    type: object
                    required: ['service', 'caBundle']
                    description: |
                      Конфигурация webhook.
                    properties:
                      service:
                        type: object
                        required: ['name', 'namespace', 'port', 'path']
                        description: |
                          Параметры доступа к вебхуку через сервис в кластере.
                        properties:
                          name:
                            type: string
                            description: |
                              Имя сервиса.
                          namespace:
                            type: string
                            description: |
                              Namespace сервиса.
                          port:
                            type: integer
                            description: |
                              Порт сервиса.
                          path:
                            type: string
                            description: |
                              URI путь.
                      caBundle:
                        type: string
                        description: |
                          CA bundle для проверки сертификата webhook.
                  timeoutSeconds:
                    type: integer
                    description: |
                      Таймаут срабатывания webhook.
                    default: 5
