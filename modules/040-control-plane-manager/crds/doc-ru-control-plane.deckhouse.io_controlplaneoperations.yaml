spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |            
            Описывает операцию обновления компонента control plane на конкретном узле — например, перевыпуск сертификатов или применение нового манифеста.

            Ресурс создаётся и обновляется модулем `control-plane-manager` автоматически. Создавать и редактировать его вручную не требуется.

            Используется для диагностики: показывает, какая операция выполняется на узле, на каком этапе и завершилась ли она успешно (см. колонки `Phase` и `CurrentStep` при `kubectl get cpo`).
          properties:
            apiVersion:
              description: |-
                Определяет версию API, к которой относится данный объект.

                Сервер преобразует поддерживаемые версии ресурса в актуальный внутренний формат и может отклонять неизвестные версии.

                Подробнее с обязательными полями в ресурсах можно ознакомиться [в документации Kubernetes](https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources).
            kind:
              description: |-
                Строковое значение, определяющее тип ресурса, к которому относится данный объект.

                Сервер может определить это значение по эндпоинту, на который клиент отправляет запрос.

                Поле не подлежит изменению и указывается в формате CamelCase.

                Подробнее с типами ресурсов можно ознакомиться [в документации Kubernetes](https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds).
            spec:
              description: |
                Желаемое состояние операции.
              properties:
                approved:
                  description: |
                    Признак того, что операцию разрешено выполнять.

                    Одновременно на одном узле может выполняться только одна подтверждённая операция. Подтверждение проставляется модулем автоматически с учётом текущей конфигурации control plane.
                steps:
                  description: |
                    Упорядоченный список этапов, которые должны быть выполнены в рамках операции.

                    Возможные значения:

                    * `Backup` — резервное копирование текущей конфигурации компонента (манифест статического пода, связанные конфигурационные файлы) перед изменениями в папку `/etc/kubernetes/deckhouse/backup`;
                    * `SyncCA` — синхронизация CA-сертификатов (`ca.crt`, `ca.key`) с актуальной версией секрета `d8-pki`;
                    * `RenewPKICerts` — перевыпуск сертификатов компонента (`server`, `peer`, `client`);
                    * `RenewKubeconfigs` — перевыпуск kubeconfig-файлов, с помощью которых компонент аутентифицируется в API;
                    * `SyncManifests` — обновление манифеста статического пода и сопутствующих файлов (`/etc/kubernetes/manifests`, связанные конфигурационные файлы) а так же фиксация изменений сопутствующих файлов в папку `/etc/kubernetes/deckhouse/diffs`;
                    * `JoinEtcdCluster` — присоединение нового члена к etcd-кластеру;
                    * `WaitPodReady` — ожидание готовности статического пода после перезагрузки;
                    * `CertObserve` — сбор данных о текущих сроках действия сертификатов компонента и их публикация в `status.observedState`.
                  items:
                    description: |
                      Имя этапа операции.
                component:
                  description: |
                    Компонент control plane, к которому относится операция.
                nodeName:
                  description: |
                    Имя узла control plane, на котором должна быть выполнена операция.
                desiredConfigChecksum:
                  description: |
                    Ожидаемая контрольная сумма конфигурации компонента (манифест статического пода и сопутствующие файлы) после завершения операции.

                    Используется для подтверждения того, что операция действительно применила нужную конфигурацию. После перезагрузки пода контрольная сумма в `ControlPlaneNode.status` должна совпасть с этим значением.
                desiredPkiChecksum:
                  description: |
                    Ожидаемая контрольная сумма PKI-настроек компонента (`certSANs`, `encryption-algorithm`) после завершения операции.

                    Заполняется только для этапов, изменяющих PKI (`RenewPKICerts` и другие связанные).
                desiredCaChecksum:
                  description: |
                    Ожидаемая контрольная сумма CA-сертификатов после завершения операции.

                    Заполняется только для этапов, обновляющих корневой CA-сертификат (`SyncCA` и другие связанные).
            status:
              description: |
                Наблюдаемое состояние операции.
              properties:
                conditions:
                  description: |
                    Список условий, отражающих ход выполнения операции.

                    Главное условие — `Completed`. Его поле `reason` выводится в колонку `Phase` при `kubectl get cpo`:

                    * `InProgress` — операция выполняется. Имя текущего этапа можно увидеть в колонке `CurrentStep`;
                    * `Succeeded` — операция успешно завершена;
                    * `Failed` — операция завершилась с ошибкой; подробности — в поле `message`.
                  items:
                    properties:
                      type:
                        description: |
                          Тип условия.
                          
                          Помимо общего `Completed` для каждого выполненного этапа создаётся отдельное условие с именем этапа (например, `RenewPKICerts`, `SyncManifests`).
                      status:
                        description: |
                          Статус условия.
                      reason:
                        description: |
                          Машиночитаемая причина текущего значения условия (например, `InProgress`, `Succeeded`, `Failed`).
                      message:
                        description: |
                          Человекочитаемое описание текущего состояния. При ошибке здесь будет текст последней ошибки этапа.
                      lastTransitionTime:
                        description: |
                          Время последнего изменения статуса условия.
                      observedGeneration:
                        description: |
                          Значение `.metadata.generation`, для которого было рассчитано условие.
                observedState:
                  description: |
                    Состояние компонента, наблюдаемое на этапе `CertObserve`.
                    
                    Заполняется только для статических подов компонентов (etcd, kube-apiserver, kube-controller-manager, kube-scheduler).
                  properties:
                    certificatesExpirationDate:
                      description: |
                        Срок действия сертификатов компонента в формате «имя файла сертификата → время истечения (`NotAfter`)».

                        Используется модулем для своевременного перевыпуска сертификатов и для алертов.
