apiVersion: chainsaw.kyverno.io/v1alpha2
kind: Configuration
metadata:
  name: control-plane-manager-e2e
spec:
  timeouts:
    apply: 30s
    assert: 10m
    error: 2m
    delete: 30s
    cleanup: 5m
    exec: 30s
  execution:
    failFast: false
    parallel: 1            # cluster-scoped resources must run sequentially
  cleanup:
    delayBeforeCleanup: 15s
  discovery:
    testFile: chainsaw-test.yaml
