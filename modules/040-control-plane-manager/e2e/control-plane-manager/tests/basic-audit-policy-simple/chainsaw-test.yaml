apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: basic-audit-policy
spec:
  description: |
    Verifies that changing control-plane-manager apiserver settings triggers a new
    kube-apiserver ControlPlaneOperation that completes successfully with the
    expected pipeline steps. Restores the original ModuleConfig on completion.
  concurrent: false
  namespace: default
  steps:
    - name: backup-and-snapshot
      try:
        - description: Backup ModuleConfig spec and snapshot existing kube-apiserver ControlPlaneOperations
          script:
            timeout: 60s
            content: |
              set -eu
              . ./scripts/functions.sh
              backup_moduleconfig_spec "$CPM_E2E_BACKUP_FILE"
              snapshot_component_cpos kube-apiserver "$CPM_E2E_EXISTING_CPOS_FILE"
            check:
              ($error == null): true
      cleanup:
        - description: Always restore original control-plane-manager ModuleConfig
          script:
            timeout: 5m
            content: |
              set -eu
              . ./scripts/functions.sh
              restore_moduleconfig "$CPM_E2E_BACKUP_FILE"
            check:
              ($error == null): true

    - name: apply-moduleconfig
      try:
        - description: Apply control-plane-manager ModuleConfig (create or patch)
          script:
            timeout: 3m
            content: |
              set -eu
              . ./scripts/functions.sh
              apply_or_patch_moduleconfig "manifests/moduleconfig-target.yaml"
            check:
              ($error == null): true

    - name: assert-no-audit-policy
      try:
        - description: Wait until kube-apiserver pods no longer have audit-policy-file
          script:
            timeout: 2m
            content: |
              set -eu
              . ./scripts/functions.sh
              sleep 30
              wait_for_api
            check:
              ($error == null): true
        - description: Assert kube-apiserver pods have no audit-policy-file flag
          assert:
            timeout: 1m
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                labels:
                  component: kube-apiserver
                  tier: control-plane
                namespace: kube-system
              spec:
                containers:
                  - (length(command[?starts_with(@, '--audit-policy-file')]) == `0`): true
