apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: basic-audit-policy-maintenance
spec:
  description: |
    Verifies that control-plane-manager does not reconcile ModuleConfig settings while
    spec.maintenance is NoResourceReconciliation, then reconciles normally once
    maintenance is cleared. Restores the original ModuleConfig on completion.
  concurrent: false
  namespace: default
  steps:
    - name: backup-and-snapshot
      try:
        - description: Backup ModuleConfig spec, snapshot kube-apiserver ControlPlaneOperations, and audit-policy flag state
          script:
            timeout: 60s
            content: |
              set -eu
              . ./scripts/functions.sh
              backup_moduleconfig_spec "$CPM_E2E_BACKUP_FILE"
              snapshot_component_cpos kube-apiserver "$CPM_E2E_EXISTING_CPOS_FILE"
              snapshot_flag_state kube-apiserver audit-policy-file "$CPM_E2E_AUDIT_FLAG_STATE_FILE"
            check:
              ($error == null): true
      cleanup:
        - description: Always restore original control-plane-manager ModuleConfig
          script:
            timeout: 5m
            content: |
              set -eu
              . ./scripts/functions.sh
              restore_moduleconfig "$CPM_E2E_BACKUP_FILE"
            check:
              ($error == null): true

    - name: apply-moduleconfig-maintenance
      try:
        - description: Apply ModuleConfig with maintenance NoResourceReconciliation and basicAuditPolicyEnabled false
          script:
            timeout: 3m
            content: |
              set -eu
              . ./scripts/functions.sh
              apply_or_patch_moduleconfig "manifests/moduleconfig-maintenance.yaml"
            check:
              ($error == null): true

    - name: assert-no-reconciliation
      try:
        - description: Assert no new kube-apiserver ControlPlaneOperation appears during maintenance
          script:
            timeout: 3m
            content: |
              set -eu
              . ./scripts/functions.sh
              assert_no_new_component_cpo kube-apiserver "$CPM_E2E_EXISTING_CPOS_FILE" 20
            check:
              ($error == null): true
        - description: Assert kube-apiserver audit-policy flag state is unchanged during maintenance
          script:
            timeout: 2m
            content: |
              set -eu
              . ./scripts/functions.sh
              assert_flag_state_matches kube-apiserver audit-policy-file "$CPM_E2E_AUDIT_FLAG_STATE_FILE"
            check:
              ($error == null): true
      catch:
        - description: Collect kube-apiserver ControlPlaneOperations on failure
          script:
            content: |
              . ./scripts/functions.sh
              kubectl_run get controlplaneoperations -n kube-system \
                -l control-plane.deckhouse.io/component=kube-apiserver -o wide || true
            check:
              ($error == null): true
        - description: Collect control-plane-manager ModuleConfig on failure
          script:
            content: |
              . ./scripts/functions.sh
              kubectl_run get moduleconfig control-plane-manager -o yaml || true
            check:
              ($error == null): true

    - name: remove-maintenance
      try:
        - description: Remove spec.maintenance from ModuleConfig while keeping target settings
          script:
            timeout: 3m
            content: |
              set -eu
              . ./scripts/functions.sh
              remove_moduleconfig_maintenance
            check:
              ($error == null): true

    - name: wait-for-operation
      try:
        - description: Wait for a newly created ControlPlaneOperation kube-apiserver after maintenance removal
          script:
            timeout: 5m
            content: |
              set -eu
              . ./scripts/functions.sh
              wait_for_new_component_cpo kube-apiserver "$CPM_E2E_EXISTING_CPOS_FILE" "$CPM_E2E_NEW_CPO_FILE" 300
            check:
              ($error == null): true
      catch:
        - description: Collect kube-apiserver ControlPlaneOperations on failure
          script:
            content: |
              . ./scripts/functions.sh
              kubectl_run get controlplaneoperations -n kube-system \
                -l control-plane.deckhouse.io/component=kube-apiserver -o wide || true
            check:
              ($error == null): true
        - description: Collect control-plane-manager ModuleConfig on failure
          script:
            content: |
              . ./scripts/functions.sh
              kubectl_run get moduleconfig control-plane-manager -o yaml || true
            check:
              ($error == null): true
        - description: Collect control-plane-manager pod logs on failure
          podLogs:
            namespace: kube-system
            selector: app=d8-control-plane-manager
            tail: 200

    - name: assert-operation-complete
      try:
        - description: Load new ControlPlaneOperation name from snapshot file
          script:
            timeout: 30s
            content: |
              set -eu
              . ./scripts/functions.sh
              if [ ! -s "$CPM_E2E_NEW_CPO_FILE" ]; then
                e2e_log "new ControlPlaneOperation file is missing or empty: $CPM_E2E_NEW_CPO_FILE"
                exit 1
              fi
              cat "$CPM_E2E_NEW_CPO_FILE"
            outputs:
              - name: newCPO
                value: ($stdout)
            check:
              ($error == null): true
        - description: Assert the new operation has expected steps and completed successfully
          assert:
            timeout: 10m
            resource:
              apiVersion: control-plane.deckhouse.io/v1alpha1
              kind: ControlPlaneOperation
              metadata:
                name: ($newCPO)
                namespace: kube-system
              spec:
                component: KubeAPIServer
                steps:
                  - Backup
                  - SyncManifests
                  - WaitPodReady
                  - CertObserve
              status:
                (conditions[?type == 'Completed' && status == 'True' && reason == 'OperationCompleted'] | length(@) > `0`): true

    - name: assert-no-audit-policy
      try:
        - description: Assert kube-apiserver pods have no audit-policy-file flag after reconciliation
          script:
            timeout: 2m
            content: |
              set -eu
              . ./scripts/functions.sh
              e2e_log "checking kube-apiserver pods for audit-policy-file flag"
              if is_flag_in_component kube-apiserver audit-policy-file; then
                exit 1
              fi
              e2e_log "kube-apiserver pods do not contain audit-policy-file"
            check:
              ($error == null): true
