positive:
  configValues:
    - apiserver:
        publishAPI:
          loadBalancer:
            enabled: true
            sourceRanges:
            - 192.168.0.0/24
            port: 2533
            annotations:
              service.beta.kubernetes.io/aws-load-balancer-type: nlb
    - etcd:
        backup:
          cronSchedule: "0 0 * * *"
          hostPath: "/var/backup/etcd"
    - resourcesRequests:
        cpu: "1000m"
        memory: "500Mi"
  values:
    - internal:
        resourcesRequests:
          milliCpuControlPlane: 1024
          memoryControlPlane: 536870912
        effectiveKubernetesVersion: "1.31"
        etcdServers:
        - 1.2.3.4
        - 4.3.2.1
        kubeSchedulerExtenders: []
