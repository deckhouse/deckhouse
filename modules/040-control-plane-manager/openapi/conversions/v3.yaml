version: 3
conversions:
  - if .apiserver.loadBalancer != null then .apiserver.publishAPI.loadBalancer.enabled = true end
  - if .apiserver.loadBalancer.port != null then .apiserver.publishAPI.loadBalancer.port = .apiserver.loadBalancer.port | del(.apiserver.loadBalancer.port) end
  - if .apiserver.loadBalancer.sourceRanges != null then .apiserver.publishAPI.loadBalancer.sourceRanges = .apiserver.loadBalancer.sourceRanges | del(.apiserver.loadBalancer.sourcesRanges) end
  - if .apiserver.loadBalancer.annotations != null then .apiserver.publishAPI.loadBalancer.annotations = .apiserver.loadBalancer.annotations | del(.apiserver.loadBalancer.annotations) end
  - del(.apiserver.loadBalancer)
description:
  ru: "Замените `.apiserver.loadBalancer` на `.apiserver.publishAPI.loadBalancer`."
  en: "Replace `.apiserver.loadBalancer` with `.apiserver.publishAPI.loadBalancer`."