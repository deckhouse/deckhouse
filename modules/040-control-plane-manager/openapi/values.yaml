x-extend:
  schema: config-values.yaml
type: object
properties:
  internal:
    type: object
    default: {}
    x-required-for-helm:
    - effectiveKubernetesVersion
    - kubeSchedulerExtenders
    properties:
      audit:
        type: object
        default: {}
        properties:
          webhookURL:
            type: string
          webhookCA:
            type: string
      etcdQuotaBackendBytes:
        type: string
        x-examples: [ "123456789" ]
      effectiveKubernetesVersion:
        type: string
        enum: ["1.31", "1.32", "1.33", "1.34", "1.35"]
        x-examples: ["1.31"]
      etcdServers:
        type: array
        items:
          type: string
          pattern: '^[0-9a-zA-Z\.-:\/]+$'
      mastersNode:
        type: array
        items:
          type: string
          pattern: '^[0-9a-zA-Z\.-]+$'
          maxLength: 63
      nodesCount:
        type: integer
        minimum: 0
        x-examples: [3]
      hasEtcdArbiterNode:
        type: boolean
        default: false
        x-examples: [false]
      kubeadmClusterAdminsTargetRoleName:
        type: string
        enum: ["cluster-admin", "user-authz:cluster-admin"]
        default: "cluster-admin"
        description: |
          Target ClusterRole the kubeadm:cluster-admins ClusterRoleBinding must point at. Computed by
          reconcile_kubeadm_cluster_admins_binding hook from three independent signals (user-authz
          module enablement, cluster bootstrap state, presence of ClusterRole user-authz:cluster-admin
          in the API). The Helm template reads this value as-is and does NOT re-evaluate the gates,
          so the hook is the single source of truth for which role the binding targets.
        x-examples: ["cluster-admin"]
      kubeadmClusterAdminsSupplementEnabled:
        type: boolean
        default: false
        description: |
          Whether to render ClusterRole d8:control-plane-manager:admin-kubeconfig-supplement and the
          companion ClusterRoleBinding for Group/kubeadm:cluster-admins. Computed by the
          reconcile_kubeadm_cluster_admins_binding hook (true while the user-authz module is enabled).
          The supplement is purely additive on the same group, so it is rendered as soon as user-authz
          is on — independently of the immutable-roleRef switch — to close the transient nodes/proxy
          window during the main rebind.
        x-examples: [false]
      auditPolicy:
        type: string
      secretEncryptionKey:
        type: string
        minLength: 44
        maxLength: 44
      arguments:
        type: object
        properties:
          nodeMonitorGracePeriod:
            type: [integer, string]
          nodeMonitorPeriod:
            type: [integer, string]
          podEvictionTimeout:
            type: [integer, string]
          defaultUnreachableTolerationSeconds:
            type: [integer, string]
          nodeStatusUpdateFrequency:
            type: [integer, string]
      kubeSchedulerExtenders:
        type: array
        items:
          type: object
          properties:
            urlPrefix:
              type: string
            filterVerb:
              type: string
            preemptVerb:
              type: string
            prioritizeVerb:
              type: string
            weight:
              type: integer
            timeout:
              type: integer
            ignorable:
              type: boolean
            caData:
              type: string
        default: []
      disableAdmissionPlugins:
        type: string
        pattern: '^[a-zA-Z,]+$'
        description: "Comma-separated list of admission plugins to disable on kube-apiserver"
      allowedFeatureGates:
        type: object
        default: {}
        properties:
          apiserver:
            type: array
            items:
              type: string
              pattern: '^[a-zA-Z]+$'
            default: []
          kubelet:
            type: array
            items:
              type: string
              pattern: '^[a-zA-Z]+$'
            default: []
          kubeControllerManager:
            type: array
            items:
              type: string
              pattern: '^[a-zA-Z]+$'
            default: []
          kubeScheduler:
            type: array
            items:
              type: string
              pattern: '^[a-zA-Z]+$'
            default: []
      selfSignedCA:
        type: object
        default: {}
        x-examples:
        - cert: test
          key: test
        properties:
          cert:
            type: string
          key:
            type: string
      kubernetesApiserverTargetPort:
        type: integer
      kubernetesApiserverAddresses:
        type: array
        items: strings
      authn:
        type: object
        default: {}
        properties:
          enableBasicAuth:
            type: boolean
          publishedAPIKubeconfigGeneratorMasterCA:
            type: string
      customCertificateData:
        type: object
        default: {}
        x-examples:
        - tls.crt: plainstring
          tls.key: plainstring
          ca.crt: plainstring
        properties:
          ca.crt:
            type: string
          tls.key:
            type: string
          tls.crt:
            type: string
