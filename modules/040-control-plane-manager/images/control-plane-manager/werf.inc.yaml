---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: common/distroless
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
  add: /control-plane-manager
  to: /control-plane-manager
  before: install
{{- include "image mount points" $ }}
imageSpec:
  config:
    entrypoint: ["/control-plane-manager"]
---
{{- include "vex mitigation" (list $ (printf "%s/%s" $.ModuleName $.ImageName )) }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
from: {{ index $.Images "builder/golang-alpine" }}
final: false
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /go_lib/controlplane
  to: /go_lib/controlplane
  before: install
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  install:
    - cd /src/cmd/control-plane-manager
    {{ if eq $.Env "CSE"}}
    - export ETCD_SIGN_ENABLED="-X control-plane-manager/internal/constants.SignatureBuildEnabled=true"
    {{ else }}
    - export ETCD_SIGN_ENABLED="-X control-plane-manager/internal/constants.SignatureBuildEnabled=false"
    {{ end }}
    - GOPROXY=$(cat /run/secrets/GOPROXY) GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build $BUILD_TAGS -ldflags="-s -w $ETCD_SIGN_ENABLED" -o /control-plane-manager .
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
git:
- add: /{{ $.ModulePath }}modules/040-{{ $.ModuleName }}/images/{{ $.ImageName }}/src
  to: /src
  stageDependencies:
    install:
    - '**/*'
- add: /{{ $.ModulePath }}go_lib/controlplane
  to: /go_lib/controlplane
  includePaths:
  - '**/*.go'
  - '**/*.mod'
  - '**/*.sum'
  stageDependencies:
    install:
    - '**/*.go'
    - 'go.mod'
    - 'go.sum'
shell:
  install:
  - cd /src
