apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nodegroupconfigurations.deckhouse.io
  labels:
    heritage: deckhouse
    module: node-manager
spec:
  group: deckhouse.io
  scope: Cluster
  names:
    plural: nodegroupconfigurations
    singular: nodegroupconfiguration
    kind: NodeGroupConfiguration
    shortNames:
      - ngc
  preserveUnknownFields: false
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema: &schema
        openAPIV3Schema:
          type: object
          required:
            - spec
          description: |
            Executes bash scripts on nodes.

            Read more in the [module documentation](./#custom-node-settings).
          properties:
            spec:
              type: object
              required:
                - content
                - nodeGroups
                - bundles
              properties:
                content:
                  type: string
                  description: |
                    A bash script that does the same things you would do in a configuration step.

                    You can use [Go Template](https://pkg.go.dev/text/template) to generate a script.

                    The list of parameters available for use in templates can be retrieved from the `bashible-apiserver-context` Secret as follows:

                    ```shell
                    d8 k -n d8-cloud-instance-manager get secrets bashible-apiserver-context -o jsonpath='{.data.input\.yaml}'| base64 -d
                    ```

                    For example:

                    ```shell
                    {{- range .nodeUsers }}
                    echo 'Tuning environment for user {{ .name }}'
                    # Some code for tuning user environment
                    {{- end }}
                    ```

                    You can also use the pre-defined [bashbooster](https://github.com/deckhouse/deckhouse/tree/main/candi/bashible/bashbooster) commands in the script. For example:

                    ```shell
                    bb-event-on 'bb-package-installed' 'post-install'
                    post-install() {
                      bb-log-info "Setting reboot flag due to kernel was updated"
                      bb-flag-set reboot
                    }
                    ```


                    Example of using the proxy parameters of ClusterConfiguration resource:

                    ```shell
                    bb-set-proxy
                    curl -I https://google.com
                    bb-unset-proxy
                    ```
                    
                    ```shell
                    test-function-with-proxy() {
                      bb-set-proxy
                      trap bb-unset-proxy RETURN
                      curl -I https://google.com
                    }
                    test-function-with-proxy
                    ```
                weight:
                  type: integer
                  default: 100
                  description: Order of the step execution.
                nodeGroups:
                  type: array
                  minItems: 1
                  description: List of NodeGroups to apply the step for. You can set `'*'` for selecting all NodeGroups.
                  items:
                    type: string
                bundles:
                  type: array
                  minItems: 1
                  description: |
                    Bundles for step execution. You can set `'*'` for selecting all bundles.
                  items:
                    type: string
                    enum: [ 'ubuntu-lts', 'centos', 'debian', 'redos', 'rosa', 'astra', 'altlinux', 'opensuse', '*' ]
      additionalPrinterColumns:
        - name: Weight
          jsonPath: .spec.weight
          type: integer
        - name: NodeGroups
          jsonPath: .spec.nodeGroups
          type: string
        - name: Bundle
          jsonPath: .spec.bundles
          type: string
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nodeusers.deckhouse.io
  labels:
    heritage: deckhouse
    module: node-manager
spec:
  group: deckhouse.io
  scope: Cluster
  names:
    plural: nodeusers
    singular: nodeuser
    kind: NodeUser
  preserveUnknownFields: false
  versions:
    - name: v1alpha1
      served: true
      storage: false
      deprecated: true
      schema: &schema
        openAPIV3Schema:
          type: object
          description: |
            Defines the linux users to create on all nodes.

            The user's home directory is created in the `/home/deckhouse/` directory.
          required:
            - spec
          properties:
            spec:
              type: object
              oneOf:
              - required:
                - sshPublicKey
              - required:
                - sshPublicKeys
              required:
                - uid
              properties:
                uid:
                  type: number
                  description: |
                    Node user ID.

                    We recommend using the values `>= 1100` to avoid conflicts with manually created users.

                    This parameter does not change during the entire resource life.
                  minimum: 1001
                sshPublicKey:
                  type: string
                  description: |
                    Node user SSH public key.

                    Either `sshPublicKey` or `sshPublicKeys` **must** be specified.
                sshPublicKeys:
                  type: array
                  items:
                    type: string
                  description: |
                    Node user SSH public keys.

                    Either `sshPublicKey` or `sshPublicKeys` **must** be specified.
                passwordHash:
                  type: string
                  description: |
                    Hashed user password.

                    The format corresponds to the password hashes in `/etc/shadow`. You can get it using the following command: `openssl passwd -6`.
                isSudoer:
                  type: boolean
                  description: 'Persistence of node user in sudo group.'
                  default: false
                extraGroups:
                  type: array
                  description: 'Node user additional system groups.'
                  items:
                    type: string
                nodeGroups:
                  type: array
                  default: [ '*' ]
                  description: List of NodeGroups to apply the user for.
                  items:
                    type: string
      additionalPrinterColumns:
        - name: Uid
          jsonPath: .spec.uid
          type: number
          description: User ID
        - name: IsSudoer
          jsonPath: .spec.isSudoer
          type: boolean
          description: Can user run commands as root
        - name: ExtraGroups
          jsonPath: .spec.extraGroups
          type: string
          description: extra groups for user
        - name: NodeGroups
          jsonPath: .spec.nodeGroups
          type: string
          description: nodegroups for user
        - name: Age
          jsonPath: .metadata.creationTimestamp
          type: date
          description: >
            CreationTimestamp is a timestamp representing the server time when this object was created. It is not guaranteed to be set in happens-before order across separate operations. Clients may notset this value. It is represented in RFC3339 form and is in UTC. Populated by the system. Read-only. Null for lists. More info: https://git.k8s.io/community/contributors/devel/api-conventions.md#metadata
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: |
            Defines the linux users to create on all nodes.

            The user's home directory is created in the `/home/deckhouse/` directory.
          required:
            - spec
          properties:
            spec:
              type: object
              oneOf:
              - required:
                - sshPublicKey
              - required:
                - sshPublicKeys
              required:
                - uid
              properties:
                uid:
                  type: number
                  description: |
                    Node user ID.

                    We recommend using the values `>= 1100` to avoid conflicts with manually created users.

                    This parameter does not change during the entire resource life.
                  minimum: 1001
                sshPublicKey:
                  type: string
                  description: |
                    Node user SSH public key.

                    Either `sshPublicKey` or `sshPublicKeys` **must** be specified.
                sshPublicKeys:
                  type: array
                  items:
                    type: string
                  description: |
                    Node user SSH public keys.

                    Either `sshPublicKey` or `sshPublicKeys` **must** be specified.
                passwordHash:
                  type: string
                  description: |
                    Hashed user password.

                    The format corresponds to the password hashes in `/etc/shadow`. You can get it using the following command: `openssl passwd -6`.
                isSudoer:
                  type: boolean
                  description: 'Persistence of node user in sudo group.'
                  default: false
                extraGroups:
                  type: array
                  description: 'Node user additional system groups.'
                  items:
                    type: string
                nodeGroups:
                  type: array
