apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: modulesources.deckhouse.io
spec:
  group: deckhouse.io
  scope: Cluster
  names:
    plural: modulesources
    singular: modulesource
    kind: ModuleSource
    shortNames:
      - ms
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - registry
              properties:
                releaseChannel:
                  type: string
                scanInterval:
                  type: string
                registry:
                  type: object
                  required:
                    - repo
                  properties:
                    scheme:
                      type: string
                    repo:
                      type: string
                    dockerCfg:
                      type: string
                    ca:
                      type: string
            status:
              type: object
              properties:
                syncTime:
                  type: string
                phase:
                  type: string
                modulesCount:
                  type: integer
                modules:
                  type: array
                  items:
                    type: object
                message:
                  type: string
      subresources:
        status: {}