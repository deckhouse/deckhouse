apiVersion: v1
kind: Namespace
metadata:
  name: d8-cloud-instance-manager
---
apiVersion: v1
kind: Namespace
metadata:
  name: d8-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bashible-apiserver:auth
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["flowcontrol.apiserver.k8s.io"]
    resources: ["prioritylevelconfigurations", "flowschemas"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bashible-apiserver:auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bashible-apiserver:auth
subjects:
  - kind: User
    name: bashible-apiserver
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bashible-apiserver:nodeconfigurations
rules:
  - apiGroups: ["deckhouse.io"]
    resources: ["nodegroupconfigurations"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bashible-apiserver:nodeconfigurations
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bashible-apiserver:nodeconfigurations
subjects:
  - kind: User
    name: bashible-apiserver
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bashible-apiserver:nodeusers
rules:
  - apiGroups: ["deckhouse.io"]
    resources: ["nodeusers", "modulesources"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bashible-apiserver:nodeusers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bashible-apiserver:nodeusers
subjects:
  - kind: User
    name: bashible-apiserver
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bashible-apiserver:auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: User
    name: bashible-apiserver
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bashible-apiserver-readconfig
  namespace: d8-cloud-instance-manager
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bashible-apiserver-readconfig
  namespace: d8-cloud-instance-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bashible-apiserver-readconfig
subjects:
  - kind: User
    name: bashible-apiserver
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bashible-apiserver-readregsecret
  namespace: d8-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bashible-apiserver-readregsecret
  namespace: d8-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bashible-apiserver-readregsecret
subjects:
  - kind: User
    name: bashible-apiserver
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bashible-apiserver:auth-reader
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - kind: User
    name: bashible-apiserver
    apiGroup: rbac.authorization.k8s.io