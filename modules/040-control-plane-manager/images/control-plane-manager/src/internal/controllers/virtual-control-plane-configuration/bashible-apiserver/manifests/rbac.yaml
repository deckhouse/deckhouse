# The deckhouse module's chart renders this namespace too, so it is pre-created
# with helm adoption metadata — otherwise the tenant deckhouse fails the release
# install with "invalid ownership metadata" (same pattern as dhctl bootstrap).
apiVersion: v1
kind: Namespace
metadata:
  name: d8-cloud-instance-manager
  labels:
    heritage: deckhouse
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: deckhouse
    meta.helm.sh/release-namespace: d8-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: d8-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bashible-apiserver:auth
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["flowcontrol.apiserver.k8s.io"]
    resources: ["prioritylevelconfigurations", "flowschemas"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bashible-apiserver:auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bashible-apiserver:auth
subjects:
  - kind: User
    name: bashible-apiserver
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bashible-apiserver:nodeconfigurations
rules:
  - apiGroups: ["deckhouse.io"]
    resources: ["nodegroupconfigurations"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bashible-apiserver:nodeconfigurations
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bashible-apiserver:nodeconfigurations
subjects:
  - kind: User
    name: bashible-apiserver
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bashible-apiserver:nodeusers
rules:
  - apiGroups: ["deckhouse.io"]
    resources: ["nodeusers", "modulesources"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bashible-apiserver:nodeusers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bashible-apiserver:nodeusers
subjects:
  - kind: User
    name: bashible-apiserver
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bashible-apiserver:auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: User
    name: bashible-apiserver
    apiGroup: rbac.authorization.k8s.io
---
# This Role is also rendered by the tenant node-manager module chart, so it is pre-created with node-manager helm adoption metadata
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bashible-apiserver-readconfig
  namespace: d8-cloud-instance-manager
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: node-manager
    meta.helm.sh/release-namespace: d8-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "get", "watch", "list"]
---
# The tenant node-manager chart owns the RoleBinding named "bashible-apiserver-readconfig" (bound to its in-tenant ServiceAccount). 
# We using VCP-unique RoleBinding that never collides with node-manager.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: d8:vcp:bashible-apiserver-readconfig
  namespace: d8-cloud-instance-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bashible-apiserver-readconfig
subjects:
  - kind: User
    name: bashible-apiserver
    apiGroup: rbac.authorization.k8s.io
---
# Access to registry secrets in d8-system for the bashible-apiserver User is
# granted by the bashible-apiserver-readregsecret Role/RoleBinding of the
# tenant's deckhouse module chart (modules/002-deckhouse/templates/rbac-for-us.yaml);
# they must not be duplicated here, or the tenant's helm release fails with
# "invalid ownership metadata".
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bashible-apiserver:auth-reader
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - kind: User
    name: bashible-apiserver
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bashible:bootstrappers
rules:
  - apiGroups: ["bashible.deckhouse.io"]
    resources: ["bashibles", "nodegroupbundles", "bootstrap"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bashible:bootstrappers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bashible:bootstrappers
subjects:
  - kind: Group
    name: system:bootstrappers:d8:vcp
    apiGroup: rbac.authorization.k8s.io
  - kind: Group
    name: system:nodes
    apiGroup: rbac.authorization.k8s.io
---
# Bootstrapping nodes read the bashible config secrets (bashbooster lib, bundle steps, node-users, RPP token) with the bootstrap token before kubelet.conf exists.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bashible:bootstrappers-secrets
  namespace: d8-cloud-instance-manager
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - bashible-bashbooster
      - node-users
      - registry-packages-proxy-token
      - bashible-worker-ubuntu-lts
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bashible:bootstrappers-secrets
  namespace: d8-cloud-instance-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bashible:bootstrappers-secrets
subjects:
  - kind: Group
    name: system:bootstrappers:d8:vcp
    apiGroup: rbac.authorization.k8s.io
  - kind: Group
    name: system:nodes
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bashible:bootstrappers-nodes
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bashible:bootstrappers-nodes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bashible:bootstrappers-nodes
subjects:
  - kind: Group
    name: system:bootstrappers:d8:vcp
    apiGroup: rbac.authorization.k8s.io
  - kind: Group
    name: system:nodes
    apiGroup: rbac.authorization.k8s.io
