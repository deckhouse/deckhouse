{{- $moduleGateway := dict }}
{{- include "helm_lib_module_gateway" (list . $moduleGateway) }}
{{- if and $moduleGateway .Values.global.modules.publicDomainTemplate .Values.global.clusterIsBootstrapped (include "helm_lib_kind_exists" (list . "HTTPRoute")) (include "helm_lib_kind_exists" (list . "ListenerSet")) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  {{- include "helm_lib_module_labels" (list . (dict "app" "documentation")) | nindent 2 }}
  name: documentation
  namespace: d8-system
spec:
  listeners:
{{- if (include "helm_lib_module_https_route_tls_enabled" .) }}
  - allowedRoutes:
      namespaces:
        from: Same
    hostname: {{ include "helm_lib_module_public_domain" (list . "documentation") }}
    name: documentation
    port: 443
    protocol: HTTPS
    tls:
      certificateRefs:
      - group: ""
        kind: Secret
        name: {{ include "helm_lib_module_https_secret_name" (list . "httproute-tls") }}
        namespace: d8-system
      mode: Terminate
  - allowedRoutes:
      namespaces:
        from: Same
    hostname: {{ include "helm_lib_module_public_domain" (list . "documentation") }}
    name: documentation-redirect
    port: 80
    protocol: HTTP
{{- else }}
  - allowedRoutes:
      namespaces:
        from: Same
    hostname: {{ include "helm_lib_module_public_domain" (list . "documentation") }}
    name: documentation
    port: 80
    protocol: HTTP
{{- end }}
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ $moduleGateway.name }}
    namespace: {{ $moduleGateway.namespace }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: documentation-free-assets
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "documentation")) | nindent 2 }}
  annotations:
    alb.network.deckhouse.io/backend-tls-settings: '{"mode": "MUTUAL", "caCertificates": "/etc/kube-rbac-proxy-client-ssl/ca.crt", "clientCertificate": "/etc/kube-rbac-proxy-client-ssl/client.crt", "privateKey": "/etc/kube-rbac-proxy-client-ssl/client.key", "insecureSkipVerify": true}'
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "documentation") }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: documentation
    namespace: d8-system
    sectionName: documentation
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: documentation
      port: 443
      weight: 1
    matches:
    - path:
        type: RegularExpression
        value: /(apple-touch|favicon|safari-pinned)(-[a-z0-9-]*)?\.(png|ico|svg)
  - backendRefs:
    - group: ""
      kind: Service
      name: documentation
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /images
  - backendRefs:
    - group: ""
      kind: Service
      name: documentation
      port: 443
      weight: 1
    matches:
    - path:
        type: Exact
        value: /site.webmanifest
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: documentation
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "documentation")) | nindent 2 }}
  annotations:
    web.deckhouse.io/export-name: "documentation"
    web.deckhouse.io/export-icon: "/public/img/docs.png"
    alb.network.deckhouse.io/backend-tls-settings: '{"mode": "MUTUAL", "caCertificates": "/etc/kube-rbac-proxy-client-ssl/ca.crt", "clientCertificate": "/etc/kube-rbac-proxy-client-ssl/client.crt", "privateKey": "/etc/kube-rbac-proxy-client-ssl/client.key", "insecureSkipVerify": true}'
  {{- if and (ne (include "helm_lib_module_https_mode" .) "Disabled") .Values.documentation.auth.externalAuthentication }}
    alb.network.deckhouse.io/auth-signin: {{ replace "$host" (include "helm_lib_module_public_domain" (list . "documentation")) .Values.documentation.auth.externalAuthentication.authSignInURL | quote }}
    alb.network.deckhouse.io/auth-url: {{ .Values.documentation.auth.externalAuthentication.authURL | quote }}
    {{- if .Values.documentation.auth.satisfyAny }}
    alb.network.deckhouse.io/satisfy: "any"
    {{- end }}
  {{- end }}
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "documentation") }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: documentation
    namespace: d8-system
    sectionName: documentation
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: documentation
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /modules
  - backendRefs:
    - group: ""
      kind: Service
      name: documentation
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
{{- if (include "helm_lib_module_https_route_tls_enabled" .) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: documentation-redirect
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "documentation")) | nindent 2 }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "documentation") }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: documentation
    namespace: d8-system
    sectionName: documentation-redirect
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
    matches:
    - path:
        type: PathPrefix
        value: /
{{- end }}
{{- end }}
