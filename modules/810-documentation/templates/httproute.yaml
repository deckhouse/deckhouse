{{- $defaultGateway := dict }}
{{- include "helm_lib_default_gateway" (list . $defaultGateway) }}
{{- if and $defaultGateway .Values.global.modules.publicDomainTemplate .Values.global.clusterIsBootstrapped }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: documentation-free-assets
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "documentation")) | nindent 2 }}
  annotations:
    alb-istio.network.deckhouse.io/auto-create-xlistenerset: "true"
    alb-istio.network.deckhouse.io/backend-tls-settings: '{"mode": "MUTUAL", "caCertificates": "/etc/kube-rbac-proxy-client-ssl/ca.crt", "clientCertificate": "/etc/kube-rbac-proxy-client-ssl/client.crt", "privateKey": "/etc/kube-rbac-proxy-client-ssl/client.key", "insecureSkipVerify": true}'
  {{- if (include "helm_lib_module_https_ingress_tls_enabled" .) }}
    alb-istio.network.deckhouse.io/tls-secrets: d8-system/{{ include "helm_lib_module_https_secret_name" (list . "httproute-tls") }}
  {{- end }}
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb-istio.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "documentation") }}
  parentRefs:
  - group: gateway.networking.x-k8s.io
    kind: XListenerSet
    name: d8-default-listener-set
    namespace: d8-system
    sectionName: documentation
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: documentation
      port: 443
      weight: 1
    matches:
    - path:
        type: RegularExpression
        value: /(apple-touch|favicon|safari-pinned)(-[a-z0-9-]*)?\.(png|ico|svg)
  - backendRefs:
    - group: ""
      kind: Service
      name: documentation
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /images
  - backendRefs:
    - group: ""
      kind: Service
      name: documentation
      port: 443
      weight: 1
    matches:
    - path:
        type: Exact
        value: /site.webmanifest
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: documentation
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "documentation")) | nindent 2 }}
  annotations:
    web.deckhouse.io/export-name: "documentation"
    web.deckhouse.io/export-icon: "/public/img/docs.png"
    alb-istio.network.deckhouse.io/auto-create-xlistenerset: "true"
    alb-istio.network.deckhouse.io/backend-tls-settings: '{"mode": "MUTUAL", "caCertificates": "/etc/kube-rbac-proxy-client-ssl/ca.crt", "clientCertificate": "/etc/kube-rbac-proxy-client-ssl/client.crt", "privateKey": "/etc/kube-rbac-proxy-client-ssl/client.key", "insecureSkipVerify": true}'
  {{- if (include "helm_lib_module_https_ingress_tls_enabled" .) }}
    alb-istio.network.deckhouse.io/tls-secrets: d8-system/{{ include "helm_lib_module_https_secret_name" (list . "httproute-tls") }}
  {{- end }}
  {{- if and (ne (include "helm_lib_module_https_mode" .) "Disabled") .Values.documentation.auth.externalAuthentication }}
    alb-istio.network.deckhouse.io/auth-signin: {{ replace "$host" (include "helm_lib_module_public_domain" (list . "documentation")) .Values.documentation.auth.externalAuthentication.authSignInURL | quote }}
    alb-istio.network.deckhouse.io/auth-url: {{ .Values.documentation.auth.externalAuthentication.authURL | quote }}
  {{- end }}
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb-istio.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "documentation") }}
  parentRefs:
  - group: gateway.networking.x-k8s.io
    kind: XListenerSet
    name: d8-default-listener-set
    namespace: d8-system
    sectionName: documentation
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: documentation
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /modules
  - backendRefs:
    - group: ""
      kind: Service
      name: documentation
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
{{- if (include "helm_lib_module_https_ingress_tls_enabled" .) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: documentation-redirect
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "documentation")) | nindent 2 }}
  annotations:
    alb-istio.network.deckhouse.io/auto-create-xlistenerset: "true"
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "documentation") }}
  parentRefs:
  - group: gateway.networking.x-k8s.io
    kind: XListenerSet
    name: d8-default-listener-set
    namespace: d8-system
    sectionName: documentation-redirect
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
    matches:
    - path:
        type: PathPrefix
        value: /
{{- end }}
{{- end }}
