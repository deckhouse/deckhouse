---
image: {{ $.ModuleName }}/{{ $.ImageName }}
from: {{ index $.Images "builder/distroless" }}
git:
- add: /{{ $.ModulePath }}modules/035-{{ $.ModuleName }}/images/{{ $.ImageName }}/src/rootfs
  to: /
import:
{{- include "image mount points" . }}
shell:
  beforeInstall:
  - pm install python@3.12 jq gnu-glibc gawk coreutils grep bash iproute2 bridge-utils procps util-linux findutils curl
  install:
  - unlink /sbin
imageSpec:
  config:
    entrypoint: ["/sbin/iptables-wrapper"]
    env:
      "PATH": "/root/.local/bin:/root/bin:/opt/deckhouse/bin:/sbin:/usr/local/sbin:/bin:/usr/sbin:/usr/bin"

