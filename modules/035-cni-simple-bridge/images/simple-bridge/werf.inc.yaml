---
image: {{ $.ModuleName }}/{{ $.ImageName }}
from: {{ index $.Images "builder/distroless" }}
git:
- add: /{{ $.ModulePath }}modules/035-{{ $.ModuleName }}/images/{{ $.ImageName }}/src/rootfs
  to: /
import:
- image: registrypackages/d8-curl-artifact-8-9-1
  add: /d8-curl
  to: /usr/bin/curl
  before: setup
- from: {{ index $.Images "tools/jq" }}
  add: /usr/bin/jq
  to: /usr/bin/jq
  before: setup
{{- include "image mount points" . }}
shell:
  beforeInstall:
  - pm install python@3.12 gnu-glibc gawk coreutils grep bash iproute2 bridge-utils procps util-linux
imageSpec:
  config:
    entrypoint: ["/sbin/iptables-wrapper"]
