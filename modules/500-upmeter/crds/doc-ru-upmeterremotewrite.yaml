spec:
  versions:
    - name: v1alpha1
      schema: &schema
        openAPIV3Schema:
          description: Конфигурация отправки результатов проб модуля `upmeter` по протоколу `remote_write`.
          properties:
            spec:
              properties:
                config:
                  description: Конфигурация протокола Prometheus `remote_write`.
                  properties:
                    url:
                      description: URL endpoint'а для отправки данных.
                    basicAuth:
                      description: Параметры Basic-авторизации для endpoint'а.
                      properties:
                        username:
                          description: Имя для аутентификации.
                        password:
                          description: Пароль для аутентификации.
                    bearerToken:
                      description: Токен для аутентификации.
                    tlsConfig:
                      description: Параметры TLS.
                      properties:
                        insecureSkipVerify:
                          description: Отключить проверку сертификата.
                        ca:
                          description: Сертификат ЦС (CA), используемый при проверке сертификата API-сервера.
                    headers:
                      description: HTTP-заголовки, необходимые при отправке с каждым запросом.
                      properties:
                        X-Scope-OrgID:
                          description: |
                            Заголовок `X-Scope-OrgID`, указывающий ID тенанта.
                        X-Auth-Token:
                          description: |
                            Заголовок `X-Auth-Token`, указывающий токен аутентификации.
                additionalLabels:
                  description: Дополнительные лейблы для добавления ко всем метрикам.
                intervalSeconds:
                  description: Временной интервал между точками (в секундах).
                  
                maxSampleAgeSeconds:
                  description: |
                    Максимальный возраст эпизода (в секундах), при котором он ещё отправляется в удалённое хранилище.
                    Эпизоды старше этого порога удаляются без попытки отправки — это защищает от бесконечных HTTP 400
                    от хранилищ, которые отбрасывают сэмплы вне своего окна приёма (например, Grafana Mimir по умолчанию
                    отбрасывает сэмплы старше ~1 часа, если выключен приём «out-of-order»-сэмплов).

                    Значение следует выставлять чуть меньше окна приёма используемого хранилища:

                    * Grafana Mimir (значения по умолчанию): оставьте `3600` (1 час).
                    * Grafana Cloud или Mimir с `out_of_order_time_window: 2h`: установите `7200`.
                    * VictoriaMetrics: обычно допускает 24 часа и более, можно ставить `86400` или больше.

                    Параметр настраивается отдельно для каждого `UpmeterRemoteWrite`, поскольку у разных бэкендов
                    разные окна приёма. Агенты `upmeter` автоматически согласуют локальное хранение с максимальным
                    значением среди всех активных `UpmeterRemoteWrite` — отдельно настраивать их не требуется.
    - name: v1
      served: true
      storage: false
      schema: *schema
