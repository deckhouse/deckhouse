{{- $moduleGateway := dict }}
{{- include "helm_lib_module_gateway" (list . $moduleGateway) }}
{{- if and $moduleGateway .Values.global.modules.publicDomainTemplate (include "helm_lib_kind_exists" (list . "HTTPRoute")) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: webui
  namespace: d8-{{ .Chart.Name }}
  annotations:
    web.deckhouse.io/export-name: "upmeter"
    web.deckhouse.io/export-icon: "/public/img/upmeter.png"
  {{- if and (ne (include "helm_lib_module_https_mode" .) "Disabled") .Values.upmeter.auth.webui.externalAuthentication }}
    alb.network.deckhouse.io/auth-signin: {{ replace "$host" (include "helm_lib_module_public_domain" (list . .Chart.Name)) .Values.upmeter.auth.webui.externalAuthentication.authSignInURL | quote }}
    alb.network.deckhouse.io/auth-url: {{ .Values.upmeter.auth.webui.externalAuthentication.authURL | quote }}
  {{- else }}
    alb.network.deckhouse.io/basic-auth-secret: d8-{{ .Chart.Name }}/basic-auth-webui
  {{- end }}
  {{- if .Values.upmeter.auth.webui.whitelistSourceRanges }}
    alb.network.deckhouse.io/whitelist-source-range: {{ .Values.upmeter.auth.webui.whitelistSourceRanges | join "," }}
  {{- end }}
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "webui")) | nindent 2 }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . .Chart.Name) }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: upmeter
    namespace: d8-{{ .Chart.Name }}
    sectionName: upmeter
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: webui
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: upmeter-api
  namespace: d8-{{ .Chart.Name }}
  annotations:
    alb.network.deckhouse.io/backend-tls-settings: '{"mode": "MUTUAL", "caCertificates": "/etc/kube-rbac-proxy-client-ssl/ca.crt", "clientCertificate": "/etc/kube-rbac-proxy-client-ssl/client.crt", "privateKey": "/etc/kube-rbac-proxy-client-ssl/client.key", "insecureSkipVerify": true}'
  {{- if and (ne (include "helm_lib_module_https_mode" .) "Disabled") .Values.upmeter.auth.webui.externalAuthentication }}
    alb.network.deckhouse.io/auth-signin: {{ replace "$host" (include "helm_lib_module_public_domain" (list . .Chart.Name)) .Values.upmeter.auth.webui.externalAuthentication.authSignInURL | quote }}
    alb.network.deckhouse.io/auth-url: {{ .Values.upmeter.auth.webui.externalAuthentication.authURL | quote }}
  {{- else }}
    alb.network.deckhouse.io/basic-auth-secret: d8-{{ .Chart.Name }}/basic-auth-webui
  {{- end }}
  {{- if .Values.upmeter.auth.webui.whitelistSourceRanges }}
    alb.network.deckhouse.io/whitelist-source-range: {{ .Values.upmeter.auth.webui.whitelistSourceRanges | join "," }}
  {{- end }}
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "webui")) | nindent 2 }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . .Chart.Name) }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: upmeter
    namespace: d8-{{ .Chart.Name }}
    sectionName: upmeter
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: upmeter
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /api
{{- if (include "helm_lib_module_https_route_tls_enabled" .) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: webui-redirect
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "webui")) | nindent 2 }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . .Chart.Name) }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: upmeter
    namespace: d8-{{ .Chart.Name }}
    sectionName: upmeter-redirect
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
    matches:
    - path:
        type: PathPrefix
        value: /
{{- end }}
{{- end }}
