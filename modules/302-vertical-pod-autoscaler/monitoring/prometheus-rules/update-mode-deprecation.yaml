- name: vertical-pod-autoscaler.deprecation
  rules:
    - alert: VerticalPodAutoscalerDeprecatedUpdateModeAuto
      expr: |
        count(
          max by (namespace, verticalpodautoscaler) (
            kube_verticalpodautoscaler_spec_updatepolicy_updatemode{update_mode="Auto"} == 1
          )
        ) > 0
      for: 5m
      labels:
        severity_level: "9"
        tier: cluster
      annotations:
        plk_protocol_version: "1"
        plk_markup_format: markdown
        summary: VerticalPodAutoscaler objects use the deprecated `Auto` update mode.
        description: |
          There are `{{ $value }}` VerticalPodAutoscaler object(s) in the cluster
          with the deprecated `spec.updatePolicy.updateMode: Auto`.

          The `Auto` update mode is deprecated. It currently behaves like `Recreate`
          (the VPA updater evicts pods to apply new resource requests) and its semantics
          are reserved to change in future versions, which makes cluster behavior
          ambiguous and potentially disruptive.

          Set an explicit `spec.updatePolicy.updateMode` instead:

          - `InPlaceOrRecreate` — apply recommendations in place when possible, fall back to recreation (recommended);
          - `Recreate` — evict and recreate pods to apply recommendations;
          - `Initial` — apply only when pods are (re)created;
          - `Off` — recommendations only, no changes to running pods.

          To list the affected objects, open the **VPA Deprecated Update Mode** Grafana
          dashboard, or run:

          ```prometheus
          kube_verticalpodautoscaler_spec_updatepolicy_updatemode{update_mode="Auto"} == 1
          ```
