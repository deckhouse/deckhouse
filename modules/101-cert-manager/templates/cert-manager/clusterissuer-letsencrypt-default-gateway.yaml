{{- if not .Values.certManager.disableLetsencrypt }}
{{- $defaultGateway := dict }}
{{- include "helm_lib_default_gateway" (list . $defaultGateway) }}
  {{- if $defaultGateway }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ printf "letsencrypt-gateway-%s" $defaultGateway.name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "cert-manager")) | nindent 2 }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
  {{- if .Values.certManager.internal.email }}
    email: "{{ .Values.certManager.internal.email }}"
  {{- end }}
    privateKeySecretRef:
      name: cert-manager-letsencrypt-private-key
    solvers:
    - http01:
        gatewayHTTPRoute:
          parentRefs:
          - group: gateway.networking.x-k8s.io
            kind: XListenerSet
            name: d8-default-listener-set
  {{- end }}
{{- end }}
