apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  creationTimestamp: null
  labels:
    heritage: deckhouse
    module: cert-manager
    rbac.deckhouse.io/aggregate-to-namespace-as: manager
    rbac.deckhouse.io/kind: capability
    rbac.deckhouse.io/scope: namespace
  name: d8:namespace-capability:cert-manager:edit
  annotations:
    en.meta.deckhouse.io/title: "Module cert-manager: edit"
    ru.meta.deckhouse.io/title: "Модуль cert-manager: редактирование"
    en.meta.deckhouse.io/description: "Manage cert-manager resources in a namespace."
    ru.meta.deckhouse.io/description: "Управление ресурсами модуля cert-manager в пространстве имён."
rules:
- apiGroups:
  - cert-manager.io
  resources:
  - certificates
  - issuers  
  verbs:
  - create
  - update
  - patch
  - delete
  - deletecollection
- apiGroups:
  - cert-manager.io
  resources:
  - challenges
  - certificaterequests    
  verbs:
  - delete
  - deletecollection
- apiGroups:
  - acme.cert-manager.io
  resources:
  - orders
  verbs:
  - delete
  - deletecollection
