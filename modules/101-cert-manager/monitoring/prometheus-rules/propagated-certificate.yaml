- name: kubernetes.certmanager.certificate
  rules:
  - alert: CertmanagerCertificateExpiredSoon
    expr: |
     max by (name, exported_namespace) ((certmanager_certificate_expiration_timestamp_seconds{job="cert-manager"} - time() < 1209600) and certmanager_certificate_expiration_timestamp_seconds{job="cert-manager"} != 0)
    for: 1h
    labels:
      severity_level: "4"
    annotations:
      plk_protocol_version: "1"
      plk_create_group_if_not_exists__cluster_has_expiring_certificates: ClusterHasCertmanagerCertificatesExpiringSoon,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes
      plk_grouped_by__cluster_has_expiring_certificates: ClusterHasCertmanagerCertificatesExpiringSoon,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes
      summary: Certificate will expire soon.
      description: |
        The certificate `{{$labels.exported_namespace}}/{{$labels.name}}` will expire in less than two weeks.

        To check the certificate details, run the following command:

        ```bash
        d8 k -n <NAMESPACE> describe certificate <CERTIFICATE-NAME>
        ```

  - alert: CertmanagerCertificateExpired
    expr: |
      max by (name, exported_namespace) (
        (certmanager_certificate_expiration_timestamp_seconds{job="cert-manager"} - time() < 0)
        and
        (count_over_time(certmanager_certificate_expiration_timestamp_seconds{job="cert-manager"}[5m]) > 5)
      )
    for: 1h
    labels:
      severity_level: "4"
    annotations:
      plk_protocol_version: "1"
      plk_create_group_if_not_exists__cluster_has_expired_certificates: ClusterHasCertmanagerCertificatesExpired,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes
      plk_grouped_by__cluster_has_expired_certificates: ClusterHasCertmanagerCertificatesExpired,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes
      summary: Certificate {{$labels.exported_namespace}}/{{$labels.name}} is not provided.
      description: |
        Certificate is not provided.

        To check the certificate details, run the following command:

        ```shell
        d8 k -n {{$labels.exported_namespace}} describe certificate {{$labels.name}}
        ```
  - alert: CertmanagerCertificateOrderErrors
    expr: |
      sum by (scheme, host, path, status) (
        rate(
          certmanager_http_acme_client_request_count{status!~"2[0-9][0-9]"}[5m]
        )
      ) > 0
    for: 30m
    labels:
      severity_level: "5"
    annotations:
      plk_protocol_version: "1"
      plk_create_group_if_not_exists__d8_cert_manager_malfunctioning: D8CertmanagerMalfunctioning,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes
      plk_grouped_by__d8_cert_manager_malfunctioning: D8CertmanagerMalfunctioning,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes
      summary: Cert-manager couldn't order a certificate.
      description: |
        Cert-manager received responses with the status code `{{ $labels.status }}` when requesting `{{ $labels.scheme }}://{{ $labels.host }}{{ $labels.path }}`.

        This can affect certificate ordering and prolongation in the future. For details, check the cert-manager logs using the following command:

        ```bash
        d8 k -n d8-cert-manager logs -l app=cert-manager -c cert-manager
        ```
  - alert: CertmanagerCertificateChallengePending
    expr: |
      certmanager_certificate_challenge_status{job="cert-manager", status="pending"} == 1
    for: 10m
    labels:
      severity_level: "6"
    annotations:
      plk_protocol_version: "1"
      plk_markup_format: "markdown"
      plk_create_group_if_not_exists__cluster_has_pending_challenges: ClusterHasCertmanagerChallengesPending,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes
      plk_grouped_by__cluster_has_pending_challenges: ClusterHasCertmanagerChallengesPending,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes
      summary: ACME Challenge for domain "{{ $labels.domain }}" is pending for more than 10 minutes.
      description: |-
        The ACME Challenge `{{ $labels.exported_namespace }}/{{ $labels.name }}` for domain `{{ $labels.domain }}` has been in `pending` state for more than 10 minutes.

        This may indicate issues with the ACME challenge validation process.

        **Common causes:**
        * DNS propagation delays (for DNS-01 challenges).
        * Ingress or firewall issues blocking HTTP-01 validation.
        * ACME provider rate limiting or temporary unavailability.

        **Diagnostic steps:**

        1. Check the Challenge status:
           ```bash
           d8 k -n {{ $labels.exported_namespace }} describe challenge {{ $labels.name }}
           ```

        2. Check `cert-manager` logs for errors:
           ```bash
           d8 k -n d8-cert-manager logs -l app=cert-manager -c cert-manager --tail=100
           ```

  - alert: CertmanagerCertificateChallengePending
    expr: |
      certmanager_certificate_challenge_status{job="cert-manager", status="pending"} == 1
    for: 1h
    labels:
      severity_level: "4"
    annotations:
      plk_protocol_version: "1"
      plk_markup_format: "markdown"
      plk_create_group_if_not_exists__cluster_has_pending_challenges: ClusterHasCertmanagerChallengesPending,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes
      plk_grouped_by__cluster_has_pending_challenges: ClusterHasCertmanagerChallengesPending,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes
      summary: ACME Challenge for domain "{{ $labels.domain }}" is pending for more than 1 hour.
      description: |-
        The ACME Challenge `{{ $labels.exported_namespace }}/{{ $labels.name }}` for domain `{{ $labels.domain }}` has been in `pending` state for more than 1 hour and requires investigation.

        **Common causes:**
        * DNS misconfiguration (for DNS-01 challenges).
        * Ingress or firewall issues blocking HTTP-01 validation.
        * ACME provider rate limiting.
        * Network connectivity issues.

        **Resolution steps:**

        1. Check the Challenge status and reason:
           ```bash
           d8 k -n {{ $labels.exported_namespace }} describe challenge {{ $labels.name }}
           ```

        2. Check `cert-manager` logs for errors:
           ```bash
           d8 k -n d8-cert-manager logs -l app=cert-manager -c cert-manager --tail=100
           ```

        3. If the challenge is stuck, delete the Order to trigger a retry:
           ```bash
           d8 k -n {{ $labels.exported_namespace }} get orders
           d8 k -n {{ $labels.exported_namespace }} delete order <ORDER_NAME>
           ```

  - alert: CertmanagerCertificateChallengeStuck
    expr: |
      certmanager_certificate_challenge_status{job="cert-manager", status=~"invalid|expired|errored"} == 1
    for: 15m
    labels:
      severity_level: "4"
    annotations:
      plk_protocol_version: "1"
      plk_markup_format: "markdown"
      plk_create_group_if_not_exists__cluster_has_stuck_challenges: ClusterHasCertmanagerChallengesStuck,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes
      plk_grouped_by__cluster_has_stuck_challenges: ClusterHasCertmanagerChallengesStuck,tier=~tier,prometheus=deckhouse,kubernetes=~kubernetes
      summary: ACME Challenge for domain "{{ $labels.domain }}" is stuck in "{{ $labels.status }}" state.
      description: |-
        The ACME Challenge `{{ $labels.exported_namespace }}/{{ $labels.name }}` for domain `{{ $labels.domain }}` is in `{{ $labels.status }}` state and requires manual intervention.

        **Reason:** {{ $labels.reason }}

        The certificate will not be issued or renewed until the issue is resolved.

        **Common causes:**
        * DNS misconfiguration (for DNS-01 challenges).
        * Ingress or firewall issues (for HTTP-01 challenges).
        * Rate limiting by the ACME provider.
        * Authorization expired before challenge completion.

        **Resolution steps:**

        1. Check the Challenge status and reason:
           ```bash
           d8 k -n {{ $labels.exported_namespace }} describe challenge {{ $labels.name }}
           ```

        2. Delete the failed Order to trigger a new certificate request:
           ```bash
           d8 k -n {{ $labels.exported_namespace }} get orders
           d8 k -n {{ $labels.exported_namespace }} delete order <ORDER_NAME>
           ```
