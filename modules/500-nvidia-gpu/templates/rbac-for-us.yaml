---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nvidia-gpu
  namespace: d8-nvidia-gpu
  {{- include "helm_lib_module_labels" (list . (dict "app" "nvidia-gpu")) | nindent 2 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nvidia-gpu-feature-discovery
  namespace: d8-nvidia-gpu
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nvidia-gpu-feature-discovery
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nvidia-gpu-feature-discovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nvidia-gpu-feature-discovery
subjects:
- kind: ServiceAccount
  name: nvidia-gpu-feature-discovery
  namespace: d8-nvidia-gpu
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nvidia-gpu
  {{- include "helm_lib_module_labels" (list . (dict "app" "nvidia-gpu")) | nindent 2 }}
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: nvidia-gpu
  {{- include "helm_lib_module_labels" (list . (dict "app" "nvidia-gpu")) | nindent 2 }}
subjects:
- kind: ServiceAccount
  name: nvidia-gpu
  namespace: d8-nvidia-gpu
roleRef:
  kind: ClusterRole
  name: nvidia-gpu
  apiGroup: rbac.authorization.k8s.io
