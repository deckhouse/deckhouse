apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-feature-discovery-gc
  namespace: d8-nvidia-gpu
  labels:
    role: gc
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      role: gc
  template:
    metadata:
      labels:
        role: gc
    spec:
      serviceAccountName: node-feature-discovery-gc
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: gc
        image: {{ include "helm_lib_module_image" (list . "nodeFeatureDiscovery") }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        command:
          - "nfd-gc"
        args:
          - "-gc-interval=1h"
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ "ALL" ]
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        ports:
          - name: metrics
            containerPort: 8081
