{{ $version := "0.17.2" }}
---
image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  install:
  - git clone --depth 1 --branch v{{ $version}} $(cat /run/secrets/SOURCE_REPO)/NVIDIA/k8s-device-plugin.git /src
  - cd /src
  - echo $(git rev-parse --short HEAD) > .GIT_HASH
  - rm -rf /src/.git
---
image: {{ .ModuleName }}/{{ .ImageName }}-build-artifact
final: false
fromImage: builder/golang-bookworm-1.24
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  beforeInstall:
  - apt-get install gcc
  install:
  - cd /src
  - export CLI_VERSION_PACKAGE=github.com/NVIDIA/k8s-device-plugin/internal/info
  - export GOPROXY=$(cat /run/secrets/GOPROXY) GOOS=linux GOARCH=amd64
{{- range tuple "config-manager" "gpu-feature-discovery" "mps-control-daemon" "nvidia-device-plugin" }}
  - go build -ldflags "-s -w '-extldflags=-Wl,--export-dynamic -Wl,--unresolved-symbols=ignore-in-object-files' -X ${CLI_VERSION_PACKAGE}.gitCommit=$(cat .GIT_HASH) -X ${CLI_VERSION_PACKAGE}.version={{ $version }}" -o /{{ . }} ./cmd/{{ . }}
{{- end }}
  - chown 64535:64535 /config-manager /gpu-feature-discovery /mps-control-daemon /nvidia-device-plugin
  - chmod 0700 /config-manager /gpu-feature-discovery /mps-control-daemon /nvidia-device-plugin
---
image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: common/distroless
import:
- image: {{ .ModuleName }}/{{ .ImageName }}-build-artifact
  add: /
  includePaths:
  - config-manager
  - gpu-feature-discovery
  - mps-control-daemon
  - nvidia-device-plugin
  before: setup
