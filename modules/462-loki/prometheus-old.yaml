apiVersion: batch/v1
kind: CronJob
metadata:
  annotations:
    ci.werf.io/commit: 4792d2ba58500e6c07c0c731989ef49c657932bb
    gitlab.ci.werf.io/job-url: https://fox.flant.com/okmeter/victoria-metrics/-/jobs/2431294
