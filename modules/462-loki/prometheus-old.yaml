    project.werf.io/name: victoria-metrics
    werf.io/release-channel: 2 alpha
    werf.io/version: v2.10.10
  labels:
    app.kubernetes.io/managed-by: Helm
  name: test-federation-endpoint-prometheus-old
  namespace: d8-monitoring
spec:
  concurrencyPolicy: Allow
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - command:
            - bash
            - -c
            - |
              set -euo pipefail

              bytes=$(curl --fail-with-body -kv -H "Authorization: bearer eyJhbGciOiJSUzI1NiIsImtpZCI6Ikx0WU04VFo2RVQza2ZVOW84dzJDWjNYa2Ytb0JtQTVtSktna212TWp0Q0EifQ..IRLywkcxLptfIvRdu9y-4NkhBCYUEt0gLZI_26JUnYaKRm48QoBg3VdqeMMiaZyUIf__BXHiTHIkjLwBY5sU6g2kpfn1vIPDp5DvQ-PBXICf48EfCanbZh3HWwJ-fQ71VAWz8r4KerTNnXgXt2H4M3be1YMAY-VFFWR7Id58gca108xqaVCy9n6EJKrxIWuLA7wFMAgTgzq_AsGXMvOktq60dACiNmEf2y3cp5DhrabJ41gdptbaeTKadz7P79w4XrEOkJW8TCj2SBHbGusFa899NYhBpEB1zYfhJWPDY1vUnph18XpaHqcjOLMYIMerQKKyu8n5rictFeCx9kn1RQ" "https://prometheus-old:9090/federate?match[]=%7Bjob%3D~%22.%2B%22%7D" | wc -c)

              echo "Federation endpoint for prometheus-old is working. Received $bytes bytes."
            image: registry.flant.com/okmeter/victoria-metrics:a0b12ca4c85fbd7b800917d8cb75b99dbd6ceda1b647e4cf0d5f1e4e-1727954370669
            imagePullPolicy: IfNotPresent
            name: test-federation-endpoint
            resources: {}
            terminationMessagePath: /dev/termination-log
