apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/auth-signin: https://$host/dex-authenticator/sign_in
    nginx.ingress.kubernetes.io/auth-url: https://grafana-dex-authenticator.d8-monitoring.svc.cluster.local/dex-authenticator/auth
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_ssl_certificate /etc/nginx/ssl/client.crt;
      proxy_ssl_certificate_key /etc/nginx/ssl/client.key;
      proxy_ssl_protocols TLSv1.2;
      proxy_ssl_session_reuse on;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  labels:
    app: prometheus
    heritage: deckhouse
    module: prometheus
  name: prometheus-old
  namespace: d8-monitoring
spec:
  ingressClassName: nginx
  rules:
  - host: grafana.d8.flant.dev
    http:
      paths:
      - backend:
          service:
            name: prometheus-old
            port:
              name: https
        path: /prometheus-old(/|$)(.*)
        pathType: ImplementationSpecific
      - backend:
          service:
            name: prometheus-old-0
            port:
              name: https
        path: /prometheus-old-0(/|$)(.*)
        pathType: ImplementationSpecific
  tls:
  - hosts:
    - grafana.d8.flant.dev
    secretName: ingress-tls-customcertificate
