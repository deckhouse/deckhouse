{{- define "gcp_cdd_pod_annotations" -}}
checksum/config: {{ include (print $.Template.BasePath "/cloud-controller-manager/secret.yaml") . | sha256sum }}
{{- end -}}

{{- define "gcp_cdd_args" -}}
- --credentials-file=/etc/config/credentials.json
- --project={{ index (.Values.cloudProviderGcp.internal.providerClusterConfiguration.provider.serviceAccountJSON | fromJson) "project_id" }}
  {{- range $zone := .Values.cloudProviderGcp.internal.providerDiscoveryData.zones }}
- --zone={{ $zone }}
  {{- end }}
{{- end -}}

{{- define "gcp_cdd_volume_mounts" -}}
- name: config
  mountPath: /etc/config
  readOnly: true
{{- end -}}

{{- define "gcp_cdd_volumes" -}}
- name: config
  secret:
    secretName: cloud-controller-manager
{{- end -}}

{{- $cddConfig := dict -}}
{{- $_ := set $cddConfig "image" (include "helm_lib_module_image" (list . "cloudDataDiscoverer")) -}}
{{- $_ := set $cddConfig "additionalArgs" (include "gcp_cdd_args" . | fromYamlArray) -}}
{{- $_ := set $cddConfig "additionalPodAnnotations" (include "gcp_cdd_pod_annotations" . | fromYaml) -}}
{{- $_ := set $cddConfig "additionalVolumeMounts" (include "gcp_cdd_volume_mounts" . | fromYamlArray) -}}
{{- $_ := set $cddConfig "additionalVolumes" (include "gcp_cdd_volumes" . | fromYamlArray) -}}
{{- $_ := set $cddConfig "vpaEnabled" true -}}

{{- include "helm_lib_cloud_data_discoverer_manifests" (list . $cddConfig) }}
