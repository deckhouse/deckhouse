{{- $mcm := .Files.Glob "cloud-instance-manager/**" -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: d8-node-manager-cloud-provider-gcp-mcm
  namespace: kube-system
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
data:
{{- range $path, $_ :=  $mcm }}
  {{ $path }}: {{ $mcm.Get $path | b64enc }}
{{- end }}
