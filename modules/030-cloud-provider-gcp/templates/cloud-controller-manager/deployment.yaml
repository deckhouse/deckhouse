{{- define "gcp_ccm_pod_annotations" -}}
checksum/config: {{ include (print $.Template.BasePath "/cloud-controller-manager/secret.yaml") . | sha256sum }}
{{- end -}}

{{- define "gcp_ccm_envs" -}}
- name: GOOGLE_APPLICATION_CREDENTIALS
  value: /etc/credentials.json
{{- end -}}

{{- define "gcp_ccm_args" -}}
- --cluster-cidr={{ .Values.global.discovery.podSubnet }}
- --controllers=*,-nodeipam
- --allocate-node-cidrs=true
- --configure-cloud-routes=true
- --cloud-config=/etc/cloud-controller-manager-config/cloud-config
- --cloud-provider=gce
- --v=2
{{- end -}}

{{- define "gcp_ccm_volume_mounts" -}}
- name: k8s-certs
  mountPath: /etc/kubernetes/pki
  readOnly: true
- name: cloud-config
  mountPath: /etc/cloud-controller-manager-config
  readOnly: true
- name: cloud-config
  mountPath: /etc/credentials.json
  readOnly: true
  subPath: credentials.json
- name: tmp
  mountPath: /tmp
{{- end -}}

{{- define "gcp_ccm_volumes" -}}
- name: k8s-certs
  hostPath:
    path: /etc/kubernetes/pki
    type: DirectoryOrCreate
- name: cloud-config
  secret:
    secretName: cloud-controller-manager
- name: tmp
  emptyDir: {}
{{- end -}}

{{- $kubernetesSemVer := semver .Values.global.discovery.kubernetesVersion -}}
{{- $ccmImageName := join "" (list "cloudControllerManager" $kubernetesSemVer.Major $kubernetesSemVer.Minor ) -}}
{{- $ccmImage := include "helm_lib_module_image_no_fail" (list . $ccmImageName) -}}

{{- if $ccmImage -}}
  {{- $ccmConfig := dict -}}
  {{- $_ := set $ccmConfig "image" $ccmImage -}}
  {{- $_ := set $ccmConfig "additionalEnvs" (include "gcp_ccm_envs" . | fromYamlArray) -}}
  {{- $_ := set $ccmConfig "additionalArgs" (include "gcp_ccm_args" . | fromYamlArray) -}}
  {{- $_ := set $ccmConfig "additionalPodAnnotations" (include "gcp_ccm_pod_annotations" . | fromYaml) -}}
  {{- $_ := set $ccmConfig "additionalVolumeMounts" (include "gcp_ccm_volume_mounts" . | fromYamlArray) -}}
  {{- $_ := set $ccmConfig "additionalVolumes" (include "gcp_ccm_volumes" . | fromYamlArray) -}}
  {{- $_ := set $ccmConfig "vpaEnabled" true -}}
  {{- $_ := set $ccmConfig "securityPolicyExceptionEnabled" true -}}

  {{- include "helm_lib_cloud_controller_manager_manifests" (list . $ccmConfig) }}
{{- end }}
