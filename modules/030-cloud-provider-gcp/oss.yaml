- name: Google Cloud Platform Cloud provider
  link: https://github.com/kubernetes/cloud-provider-gcp
  description: Cloud Controller Manager for Google Cloud Platform.
  logo: /images/logos/gcp.svg
  license: Apache License 2.0
  id: ccm-gcp
  versions:
    - condition:
        k8s: "1.31"
      version: ccm/v30.1.4
    - condition:
        k8s: "1.32"
      version: ccm/v32.2.5
    - condition:
        k8s: "1.33"
      version: ccm/v33.4.0
    - condition:
        k8s: "1.34"
      version: ccm/v34.0.0
    - condition:
        k8s: "1.35"
      version: ccm/v35.0.1

- name: Google Cloud Platform CSI driver
  link: https://github.com/kubernetes-sigs/gcp-compute-persistent-disk-csi-driver
  description: CSI driver for Google Compute Engine persistent disks.
  logo: /images/logos/gcp.svg
  license: Apache License 2.0
  id: csi-gcp
  versions:
    - condition:
        k8s: "1.31"
      version: v1.15.4
    - condition:
        k8s: "1.32"
      version: v1.15.4
    - condition:
        k8s: "1.33"
      version: v1.15.4
    - condition:
        k8s: "1.34"
      version: v1.15.4
    - condition:
        k8s: "1.35"
      version: v1.15.4

- name: Google Cloud Platform Terraform provider
  link: https://github.com/hashicorp/terraform-provider-google
  description: Terraform provider for Google Cloud Platform.
  logo: /images/logos/terraform.svg
  license: Mozilla Public License 2.0
  id: terraform-provider-gcp
  version: "4.85.0"
