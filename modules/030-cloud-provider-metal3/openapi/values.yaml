type: object
properties:
  ironic:
    type: object
    default: {}
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        default: false
      name:
        type: string
        default: ironic
      version:
        type: string
      deployRamdisk:
        type: object
        additionalProperties: false
        properties:
          sshKey:
            type: string
      networking:
        type: object
        additionalProperties: false
        required:
        - interface
        - ipAddress
        - dhcp
        properties:
          interface:
            type: string
          ipAddress:
            type: string
            pattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$'
          ipAddressManager:
            type: string
            enum:
            - keepalived
            - disabled
          apiPort:
            type: integer
          imageServerPort:
            type: integer
          dhcp:
            type: object
            additionalProperties: false
            required:
            - networkCIDR
            - rangeBegin
            - rangeEnd
            properties:
              networkCIDR:
                type: string
                pattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/(3[0-2]|[1-2][0-9]|[0-9]))$'
              rangeBegin:
                type: string
                pattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$'
              rangeEnd:
                type: string
                pattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$'
              dnsAddress:
                type: string
                pattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$'
              gatewayAddress:
                type: string
                pattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$'
              serveDNS:
                type: boolean
  internal:
    type: object
    default: {}
    properties:
      providerDiscoveryData:
        type: object
        default: {}
        properties:
          zones:
            type: array
            items:
              type: string
