apiVersion: multitenancy.deckhouse.io/v1alpha1
kind: ClusterObjectGrant
metadata:
  name: production-storage
spec:
  # Applies to every project whose namespace carries these labels.
  projectSelector:
    matchLabels:
      environment: production
  clusterObjectGrantPolicies:
  - name: storageclasses
    # Per-grant default; overrides the policy's annotation-based default.
    default: fast-ssd
    # Explicitly granted names...
    allowed:
    - fast-ssd
    - standard
    # ...plus every StorageClass matching this selector (union).
    allowedSelector:
      matchLabels:
        shared: "true"
