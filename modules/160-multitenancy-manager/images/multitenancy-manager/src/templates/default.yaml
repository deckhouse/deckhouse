---
# Schema-based ProjectTemplate. The built-in templates declare their per-namespace objects as
# structured fields rendered natively by the controller (no Helm resourcesTemplate). Every field that
# used to be a per-project parameter is wired to that parameter via {fromParam: <name>}, so the
# template keeps exactly the override surface it had as v1alpha1 while gaining a typed, declarative
# shape. The parametersSchema below stays the per-project parameter contract (names, defaults, enums).
apiVersion: deckhouse.io/v1alpha2
kind: ProjectTemplate
metadata:
  name: default
  labels:
    heritage: deckhouse
spec:
  description: A template that covers basic project use cases.
  podSecurityStandard:
    fromParam: podSecurityProfile
  networkPolicy:
    mode:
      fromParam: networkPolicy
  features:
    monitoring:
      fromParam: extendedMonitoringEnabled
  logShipping:
    clusterDestinationRef:
      fromParam: clusterLogDestinationName
  namespaceMetadata:
    labels:
      fromParam: namespace.labels
    annotations:
      fromParam: namespace.annotations
  parametersSchema:
    openAPIV3Schema:
      type: object
      properties:
        namespace:
          type: object
          default: {}
          description: |
            Additional labels and annotations for the project namespace.
          properties:
            labels:
              type: object
              additionalProperties:
                type: string
            annotations:
              type: object
              additionalProperties:
                type: string
        networkPolicy:
          description: |
            NotRestricted — Allow all traffic by default.
            Isolated — Deny all traffic by default except namespaced traffic, dns, prometheus metrics scraping and ingress-nginx.
          enum:
            - Isolated
            - NotRestricted
          type: string
          default: Isolated
        podSecurityProfile:
          description: |
            Pod security profile name.

            The Pod Security Standards define three different profiles to broadly cover the security spectrum. These profiles are cumulative and range from highly-permissive to highly-restrictive.
            - Privileged — Unrestricted policy. Provides the widest possible permission level;
            - Baseline — Minimally restrictive policy which prevents known privilege escalations. Allows for the default (minimally specified) Pod configuration;
            - Restricted — Heavily restricted policy. Follows the most current Pod hardening best practices.
          type: string
          default: Baseline
          enum:
            - Baseline
            - Restricted
            - Privileged
        extendedMonitoringEnabled:
          description: |
            Enable extended monitoring for the project.
            When enabled, the project will be monitored by the Deckhouse monitoring system and send the following alerts:
             - Controller outages and restarts
             - 5xx errors in ingress-nginx
             - Low free space on the persistent volumes
          type: boolean
          default: true
        clusterLogDestinationName:
          description: |
            If specified, the project will be monitored by the Deckhouse log shipper and send logs to the specified cluster log destination.
            The names of the custom resource must be specified in the `clusterLogDestinationName` field.
          type: string
