
---
apiVersion: v1
kind: Namespace
metadata:
  annotations:
    owner: platform
  labels:
    extended-monitoring.deckhouse.io/enabled: ""
    heritage: multitenancy-manager
    projects.deckhouse.io/project: test
    projects.deckhouse.io/project-template: default
    security.deckhouse.io/pod-policy: baseline
    team: backend
  name: test

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    heritage: multitenancy-manager
    projects.deckhouse.io/project: test
    projects.deckhouse.io/project-template: default
  name: isolated
  namespace: test
spec:
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          projects.deckhouse.io/project: test
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
    - port: 5353
      protocol: UDP
    - port: 5353
      protocol: TCP
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          projects.deckhouse.io/project: test
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: d8-monitoring
      podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: d8-ingress-nginx
      podSelector:
        matchLabels:
          app: controller
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: d8-service-with-healthchecks
      podSelector:
        matchLabels:
          app: agent
  podSelector:
    matchLabels: {}
  policyTypes:
  - Ingress
  - Egress

---
apiVersion: deckhouse.io/v1alpha1
kind: OperationPolicy
metadata:
  labels:
    heritage: multitenancy-manager
    projects.deckhouse.io/project: test
    projects.deckhouse.io/project-template: default
  name: required-requests-9f86d081
  namespace: test
spec:
  match:
    namespaceSelector:
      labelSelector:
        matchLabels:
          projects.deckhouse.io/project: test
  policies:
    requiredResources:
      requests:
      - cpu
      - memory
