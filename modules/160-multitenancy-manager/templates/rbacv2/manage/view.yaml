apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  creationTimestamp: null
  labels:
    heritage: deckhouse
    module: multitenancy-manager
    rbac.deckhouse.io/aggregate-to-deckhouse-as: viewer
    rbac.deckhouse.io/kind: capability
    rbac.deckhouse.io/capability: "system-capability.multitenancy-manager.view"
    rbac.deckhouse.io/scope: system
    rbac.deckhouse.io/namespace: d8-multitenancy-manager
  name: d8:system-capability:multitenancy-manager:view
  annotations:
    en.meta.deckhouse.io/title: "Module multitenancy-manager: view configuration"
    ru.meta.deckhouse.io/title: "Модуль multitenancy-manager: просмотр конфигурации"
    en.meta.deckhouse.io/description: "Read-only access to the multitenancy-manager module configuration."
    ru.meta.deckhouse.io/description: "Доступ только на чтение к конфигурации модуля multitenancy-manager."
rules:
- apiGroups:
  - deckhouse.io
  resources:
  - projects
  - projecttemplates
  - clusterprojectrolebindings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - deckhouse.io
  resourceNames:
  - multitenancy-manager
  resources:
  - moduleconfigs
  verbs:
  - get
  - list
  - watch
# Cluster operators see the registrations, the reference paths, the per-project policies and the
# rendered catalog. None of these are created here — managers only view.
- apiGroups:
  - multitenancy.deckhouse.io
  resources:
  - grantableclusterresourcedefinitions
  - grantableclusterresourcereferences
  - clusterresourcegrantpolicies
  - availableclusterresources
  verbs:
  - get
  - list
  - watch
