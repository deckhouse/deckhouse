apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:project-capability:multitenancy-manager:manage_rbac
  annotations:
    en.meta.deckhouse.io/title: "Project: manage RBAC"
    ru.meta.deckhouse.io/title: "Проект: управление RBAC"
    en.meta.deckhouse.io/description: "Create, update and delete role bindings within the project (ProjectRoleBinding)."
    ru.meta.deckhouse.io/description: "Создание, изменение и удаление привязок ролей в пределах проекта (ProjectRoleBinding)."
  labels:
    heritage: deckhouse
    module: multitenancy-manager
    rbac.deckhouse.io/kind: capability
    rbac.deckhouse.io/capability: "project-capability.multitenancy-manager.manage_rbac"
    rbac.deckhouse.io/scope: project
    rbac.deckhouse.io/aggregate-to-project-as: admin
rules:
  - apiGroups:
      - deckhouse.io
    resources:
      - projectrolebindings
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterroles
    verbs:
      - bind
    resourceNames:
      - d8:project:viewer
      - d8:project:user
      - d8:project:manager
      - d8:project:admin
      - d8:namespace:viewer
      - d8:namespace:user
      - d8:namespace:manager
      - d8:namespace:admin
