apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:project:viewer
  annotations:
    en.meta.deckhouse.io/title: "Project Viewer"
    ru.meta.deckhouse.io/title: "Просмотр проекта"
    en.meta.deckhouse.io/description: "Read-only access to user resources in all project namespaces and to the project structure."
    ru.meta.deckhouse.io/description: "Доступ только на чтение к пользовательским ресурсам во всех пространствах имён проекта и к структуре проекта."
    rbac.deckhouse.io/bindable-only-via: "ProjectRoleBinding,ClusterProjectRoleBinding"
  labels:
    heritage: deckhouse
    module: multitenancy-manager
    rbac.deckhouse.io/delegatable: "true"
    rbac.deckhouse.io/kind: role
    rbac.deckhouse.io/scope: project
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/aggregate-to-project-as: viewer
rules: []
