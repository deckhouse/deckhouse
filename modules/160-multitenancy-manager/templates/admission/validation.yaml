{{- /*
  System/module writers are excluded at the apiserver level (CEL matchConditions, evaluated BEFORE any
  network call to the webhook backend). All of these webhooks are backed by the multitenancy-manager
  pod with the default failurePolicy: Fail; if that backend is denying, slow or unreachable, an
  admission call for a resource a module's Helm release applies (e.g. the deckhouse-controller creating
  a namespace) would fail and addon-operator would retry it forever, locking the module's queue.
  Excluding system writers makes that impossible regardless of backend health, while ordinary users are
  still validated. Mirrors the same exclusion on the cluster-objects grant webhooks.
*/ -}}
{{- $excludeSystemWriters := `matchConditions:
- name: exclude-system-writers
  expression: >-
    request.userInfo.username != "system:apiserver"
    && request.userInfo.username != "system:serviceaccount:d8-system:deckhouse"
    && request.userInfo.username != "system:serviceaccount:d8-multitenancy-manager:multitenancy-manager"
    && !request.userInfo.groups.exists(g, g == "system:serviceaccounts:d8-system" || g == "system:serviceaccounts:kube-system" || g == "system:masters" || g == "system:nodes")` }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: d8-multitenancy-manager-webhook
  {{- include "helm_lib_module_labels" (list . (dict "app" "multitenancy-webhook")) | nindent 2 }}
webhooks:
  - name: projects.multitenancy-webhook.deckhouse.io
    rules:
      - apiGroups:
          - deckhouse.io
        apiVersions:
          - v1alpha3
        resources:
          - projects
        operations:
          - CREATE
          - UPDATE
        scope: Cluster
    admissionReviewVersions:
      - v1
    matchPolicy: Equivalent
    {{- $excludeSystemWriters | nindent 4 }}
    sideEffects: None
    clientConfig:
      caBundle: {{ .Values.multitenancyManager.internal.admissionWebhookCert.ca | b64enc }}
      service:
        name: multitenancy-manager
        namespace: d8-multitenancy-manager
        port: 9443
        path: /validate/v1alpha3/projects
  - name: projectrolebindings.multitenancy-webhook.deckhouse.io
    rules:
      - apiGroups:
          - deckhouse.io
        apiVersions:
          - v1alpha3
        resources:
          - projectrolebindings
        operations:
          - CREATE
          - UPDATE
          - DELETE
        scope: Namespaced
    admissionReviewVersions:
      - v1
    matchPolicy: Equivalent
    sideEffects: None
    clientConfig:
      caBundle: {{ .Values.multitenancyManager.internal.admissionWebhookCert.ca | b64enc }}
      service:
        name: multitenancy-manager
        namespace: d8-multitenancy-manager
        port: 9443
        path: /validate/v1alpha3/projectrolebindings
  - name: projectnamespaces.multitenancy-webhook.deckhouse.io
    rules:
      - apiGroups:
          - deckhouse.io
        apiVersions:
          - v1alpha3
        resources:
          - projectnamespaces
        operations:
          - CREATE
          - UPDATE
        scope: Namespaced
    admissionReviewVersions:
      - v1
    matchPolicy: Equivalent
    sideEffects: None
    clientConfig:
      caBundle: {{ .Values.multitenancyManager.internal.admissionWebhookCert.ca | b64enc }}
      service:
        name: multitenancy-manager
        namespace: d8-multitenancy-manager
        port: 9443
        path: /validate/v1alpha3/projectnamespaces
  - name: clusterprojectrolebindings.multitenancy-webhook.deckhouse.io
    rules:
      - apiGroups:
          - deckhouse.io
        apiVersions:
          - v1alpha3
        resources:
          - clusterprojectrolebindings
        operations:
          - CREATE
          - UPDATE
          - DELETE
        scope: Cluster
    admissionReviewVersions:
      - v1
    matchPolicy: Equivalent
    sideEffects: None
    clientConfig:
      caBundle: {{ .Values.multitenancyManager.internal.admissionWebhookCert.ca | b64enc }}
      service:
        name: multitenancy-manager
        namespace: d8-multitenancy-manager
        port: 9443
        path: /validate/v1alpha3/clusterprojectrolebindings
  - name: projecttemplates.multitenancy-webhook.deckhouse.io
    rules:
      - apiGroups:
          - deckhouse.io
        # Only the full-fidelity storage version is listed. With matchPolicy: Equivalent the apiserver
        # losslessly up-converts a v1alpha1 request to v1alpha2 before delivery, so the handler always
        # receives the structured fields (grantPolicies, fromParam, podSecurityStandard, ...). Listing
        # v1alpha1 here would let the apiserver deliver the lossy v1alpha1 view, stripping those fields
        # and silently bypassing the structured validations.
        apiVersions:
          - v1alpha2
        resources:
          - projecttemplates
        operations:
          - CREATE
          - UPDATE
          - DELETE
        scope: Cluster
    admissionReviewVersions:
      - v1
    matchPolicy: Equivalent
    {{- $excludeSystemWriters | nindent 4 }}
    sideEffects: None
    clientConfig:
      caBundle: {{ .Values.multitenancyManager.internal.admissionWebhookCert.ca | b64enc }}
      service:
        name: multitenancy-manager
        namespace: d8-multitenancy-manager
        port: 9443
        path: /validate/v1alpha1/templates
  {{ if not .Values.multitenancyManager.allowNamespacesWithoutProjects }}
  - name: namespaces.multitenancy-webhook.deckhouse.io
    rules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        resources:
          - namespaces
        operations:
          - CREATE
        scope: Cluster
    admissionReviewVersions:
      - v1
    matchPolicy: Equivalent
    {{- $excludeSystemWriters | nindent 4 }}
    sideEffects: None
    clientConfig:
      caBundle: {{ .Values.multitenancyManager.internal.admissionWebhookCert.ca | b64enc }}
      service:
        name: multitenancy-manager
        namespace: d8-multitenancy-manager
        port: 9443
        path: /validate/v1/namespaces
  {{ end }}
