---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    user-authz.deckhouse.io/access-level: User
  name: d8:user-authz:multitenancy-manager:user
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups:
  - deckhouse.io
  resources:
  - projects
  - projecttemplates
  verbs:
  - get
  - list
  - watch
# Tenants discover what their project may use and how much quota is left.
- apiGroups:
  - multitenancy.deckhouse.io
  resources:
  - availableclusterresources
  - clusterresourcegrants
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    user-authz.deckhouse.io/access-level: ClusterAdmin
  name: d8:user-authz:multitenancy-manager:cluster-admin
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups:
  - deckhouse.io
  resources:
  - projects
  - projecttemplates
  verbs:
  - create
  - delete
  - deletecollection
  - patch
  - update
# Cluster admins author grants, registrations and the object-quota pool.
- apiGroups:
  - multitenancy.deckhouse.io
  resources:
  - clusterresourcegrantpolicies
  - grantableclusterresourcedefinitions
  - clusterresourcegrants
  verbs:
  - get
  - list
  - watch
  - create
  - delete
  - deletecollection
  - patch
  - update
