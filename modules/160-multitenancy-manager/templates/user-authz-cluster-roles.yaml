---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    user-authz.deckhouse.io/access-level: User
  name: d8:user-authz:multitenancy-manager:user
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups:
  - deckhouse.io
  resources:
  - projects
  - projecttemplates
  verbs:
  - get
  - list
  - watch
# Tenants discover what their project may use (the read-only catalog).
- apiGroups:
  - multitenancy.deckhouse.io
  resources:
  - availableclusterresources
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    user-authz.deckhouse.io/access-level: ClusterAdmin
  name: d8:user-authz:multitenancy-manager:cluster-admin
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups:
  - deckhouse.io
  resources:
  - projects
  - projecttemplates
  verbs:
  - create
  - delete
  - deletecollection
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    user-authz.deckhouse.io/access-level: ClusterEditor
  name: d8:user-authz:multitenancy-manager:cluster-editor
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
# Cluster editors view the module-shipped registrations and reference paths (read-only — nobody creates them).
- apiGroups:
  - multitenancy.deckhouse.io
  resources:
  - grantableclusterresourcedefinitions
  - grantableclusterresourcereferences
  verbs:
  - get
  - list
  - watch
# Cluster editors author the per-project availability policies.
- apiGroups:
  - multitenancy.deckhouse.io
  resources:
  - clusterresourcegrantpolicies
  verbs:
  - get
  - list
  - watch
  - create
  - delete
  - deletecollection
  - patch
  - update
