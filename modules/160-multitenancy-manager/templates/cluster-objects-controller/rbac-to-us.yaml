apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:cluster-objects-grants-admin
rules:
- apiGroups: ["multitenancy.deckhouse.io"]
  resources: ["clusterobjectgrants"]
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups: ["multitenancy.deckhouse.io"]
  resources:
  - clusterobjectgrants/status
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:cluster-object-grant-policies-reader
rules:
- apiGroups: ["multitenancy.deckhouse.io"]
  resources: ["clusterobjectgrantpolicies"]
  verbs: ["get", "list", "watch"]
