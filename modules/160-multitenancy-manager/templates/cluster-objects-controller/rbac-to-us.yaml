apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:cluster-objects-grants-admin
rules:
# Cluster admins author grants, registrations and the object-quota pool.
- apiGroups: ["multitenancy.deckhouse.io"]
  resources:
  - clusterobjectgrants
  - clustergrantableresources
  - grantquotas
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups: ["multitenancy.deckhouse.io"]
  resources:
  - clusterobjectgrants/status
  - clustergrantableresources/status
  - grantquotas/status
  - availableresources
  - availableresources/status
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:cluster-objects-grants-reader
rules:
# Module developers register resources; tenants discover availability and quota usage.
- apiGroups: ["multitenancy.deckhouse.io"]
  resources:
  - clustergrantableresources
  - clusterobjectgrants
  - availableresources
  - grantquotas
  verbs: ["get", "list", "watch"]
