{{- /*
  Example, module-shipped ClusterGrantableResource registrations so the feature works out of the box.
  Both use defaultAvailability: All, so nothing is restricted until a cluster admin creates a
  ClusterObjectGrant (to narrow availability) and/or a GrantQuota (to cap usage).
*/}}
---
apiVersion: multitenancy.deckhouse.io/v1alpha1
kind: ClusterGrantableResource
metadata:
  name: storageclasses
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  grantedResource:
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
  enforcement: Managed
  defaultAvailability: All
  defaultFrom:
    annotationKey: storageclass.kubernetes.io/is-default-class
  # The built-in DefaultStorageClass admission injects the cluster-default StorageClass into PVCs that
  # omit spec.storageClassName, before this module's webhook runs. Coerce such a value to the project
  # default when the cluster default is not available to the project, instead of rejecting the PVC.
  coerceToDefault: true
  usageReferences:
  - rule:
      apiGroups:
      - ""
      apiVersions:
      - v1
      resources:
      - persistentvolumeclaims
    fieldPath: $.spec.storageClassName
    countable: true
    quantities:
    - name: requests.storage
      fieldPath: $.spec.resources.requests.storage
---
apiVersion: multitenancy.deckhouse.io/v1alpha1
kind: ClusterGrantableResource
metadata:
  name: loadbalancerclasses
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  # value-backed: no grantedResource — the names are values of spec.loadBalancerClass, not objects.
  enforcement: Managed
  defaultAvailability: All
  usageReferences:
  - rule:
      apiGroups:
      - ""
      apiVersions:
      - v1
      resources:
      - services
    fieldPath: $.spec.loadBalancerClass
    match:
      fieldPath: $.spec.type
      equals: LoadBalancer
    countable: true
{{- if .Values.global.enabledModules | has "cert-manager" }}
---
apiVersion: multitenancy.deckhouse.io/v1alpha1
kind: ClusterGrantableResource
metadata:
  name: clusterissuers
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  grantedResource:
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
  enforcement: Managed
  defaultAvailability: All
  usageReferences:
  # Certificates that reference a ClusterIssuer by name.
  - rule:
      apiGroups:
      - cert-manager.io
      apiVersions:
      - v1
      resources:
      - certificates
    fieldPath: $.spec.issuerRef.name
    match:
      fieldPath: $.spec.issuerRef.kind
      equals: ClusterIssuer
    countable: true
  # Ingresses that request a certificate via the cert-manager cluster-issuer annotation.
  - rule:
      apiGroups:
      - networking.k8s.io
      apiVersions:
      - v1
      resources:
      - ingresses
    fieldPath: $.metadata.annotations['cert-manager.io/cluster-issuer']
    countable: true
{{- end }}
---
apiVersion: multitenancy.deckhouse.io/v1alpha1
kind: ClusterGrantableResource
metadata:
  name: clusterroles
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  grantedResource:
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
  enforcement: Managed
  # Deny by default: binding an arbitrary ClusterRole (e.g. cluster-admin) in a project namespace is a
  # privilege escalation. The shipped clusterroles ClusterObjectGrant below opens only the safe set.
  defaultAvailability: None
  usageReferences:
  # RoleBindings in project namespaces that reference a ClusterRole by name.
  - rule:
      apiGroups:
      - rbac.authorization.k8s.io
      apiVersions:
      - v1
      resources:
      - rolebindings
    fieldPath: $.roleRef.name
    match:
      fieldPath: $.roleRef.kind
      equals: ClusterRole
    countable: true
---
# Default policy: in every project, only delegatable ClusterRoles may be referenced from RoleBindings —
# the "use" capability/aggregate roles (rbac.deckhouse.io/kind: use) and the user-authz access-level
# roles (module: user-authz, no rbac.deckhouse.io/kind, which excludes the "manage" permission roles).
# Tune or remove this grant to change the policy.
apiVersion: multitenancy.deckhouse.io/v1alpha1
kind: ClusterObjectGrant
metadata:
  name: clusterroles
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  projectSelector: {}
  resources:
  - resourceRef: clusterroles
    availabilityDefault: None
    allowedSelector:
      matchExpressions:
      - key: rbac.deckhouse.io/kind
        operator: In
        values:
        - use
  - resourceRef: clusterroles
    availabilityDefault: None
    allowedSelector:
      matchExpressions:
      - key: module
        operator: In
        values:
        - user-authz
      - key: rbac.deckhouse.io/kind
        operator: DoesNotExist
