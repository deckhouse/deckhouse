{{- /*
  Example, module-shipped ClusterGrantableResource registrations so the feature works out of the box.
  Both use defaultAvailability: All, so nothing is restricted until a cluster admin creates a
  ClusterObjectGrant (to narrow availability) and/or a GrantQuota (to cap usage).
*/}}
---
apiVersion: multitenancy.deckhouse.io/v1alpha1
kind: ClusterGrantableResource
metadata:
  name: storageclasses
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  grantedResource:
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
  enforcement: Managed
  defaultAvailability: All
  defaultFrom:
    annotationKey: storageclass.kubernetes.io/is-default-class
  # The built-in DefaultStorageClass admission injects the cluster-default StorageClass into PVCs that
  # omit spec.storageClassName, before this module's webhook runs. Coerce such a value to the project
  # default when the cluster default is not available to the project, instead of rejecting the PVC.
  coerceToDefault: true
  usageReferences:
  - rule:
      apiGroups:
      - ""
      apiVersions:
      - v1
      resources:
      - persistentvolumeclaims
    fieldPath: $.spec.storageClassName
    countable: true
    quantities:
    - name: requests.storage
      fieldPath: $.spec.resources.requests.storage
---
apiVersion: multitenancy.deckhouse.io/v1alpha1
kind: ClusterGrantableResource
metadata:
  name: loadbalancerclasses
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  # value-backed: no grantedResource — the names are values of spec.loadBalancerClass, not objects.
  enforcement: Managed
  defaultAvailability: All
  usageReferences:
  - rule:
      apiGroups:
      - ""
      apiVersions:
      - v1
      resources:
      - services
    fieldPath: $.spec.loadBalancerClass
    match:
      fieldPath: $.spec.type
      equals: LoadBalancer
    countable: true
{{- if .Values.global.enabledModules | has "cert-manager" }}
---
apiVersion: multitenancy.deckhouse.io/v1alpha1
kind: ClusterGrantableResource
metadata:
  name: clusterissuers
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  grantedResource:
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
  enforcement: Managed
  defaultAvailability: All
  usageReferences:
  # Certificates that reference a ClusterIssuer by name.
  - rule:
      apiGroups:
      - cert-manager.io
      apiVersions:
      - v1
      resources:
      - certificates
    fieldPath: $.spec.issuerRef.name
    match:
      fieldPath: $.spec.issuerRef.kind
      equals: ClusterIssuer
    countable: true
  # Ingresses that request a certificate via the cert-manager cluster-issuer annotation.
  - rule:
      apiGroups:
      - networking.k8s.io
      apiVersions:
      - v1
      resources:
      - ingresses
    fieldPath: $.metadata.annotations['cert-manager.io/cluster-issuer']
    countable: true
{{- end }}
---
apiVersion: multitenancy.deckhouse.io/v1alpha1
kind: ClusterGrantableResource
metadata:
  name: clusterroles
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  grantedResource:
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
  enforcement: Managed
  # Available by default to every project — but only the delegatable cluster roles: the "use"
  # capability/aggregate roles (rbac.deckhouse.io/kind: use) and the user-authz access-level roles
  # (module: user-authz, with no rbac.deckhouse.io/kind). Everything else (cluster-admin, the
  # d8:manage:* permission roles, raw component roles) is hard-excluded, so binding it from a project
  # RoleBinding is rejected. The two excluded filters are unioned: a role is excluded if it matches
  # either, which keeps exactly (kind=use) OR (module=user-authz AND no kind).
  defaultAvailability: All
  excluded:
  # Exclude everything that is neither a "use" role nor a user-authz-module role.
  - matchExpressions:
    - key: rbac.deckhouse.io/kind
      operator: NotIn
      values:
      - use
    - key: module
      operator: NotIn
      values:
      - user-authz
  # Exclude the "manage" permission roles (these carry module: user-authz, so the filter above keeps
  # them; drop them explicitly).
  - matchExpressions:
    - key: rbac.deckhouse.io/kind
      operator: In
      values:
      - manage
  usageReferences:
  # RoleBindings in project namespaces that reference a ClusterRole by name.
  - rule:
      apiGroups:
      - rbac.authorization.k8s.io
      apiVersions:
      - v1
      resources:
      - rolebindings
    fieldPath: $.roleRef.name
    match:
      fieldPath: $.roleRef.kind
      equals: ClusterRole
    countable: true
