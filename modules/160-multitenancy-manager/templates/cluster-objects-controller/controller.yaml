{{- define "controller_resources" }}
cpu: 50m
memory: 75Mi
{{- end }}

{{- if (.Values.global.enabledModules | has "vertical-pod-autoscaler") }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: cluster-objects-controller
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "cluster-objects-controller")) | nindent 2 }}
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: cluster-objects-controller
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
  resourcePolicy:
    containerPolicies:
      - containerName: cluster-objects-controller
        minAllowed:
          {{- include "controller_resources" . | nindent 10 }}
        maxAllowed:
          cpu: 500m
          memory: 2000Mi
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-objects-controller
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "cluster-objects-controller")) | nindent 2 }}
spec:
  {{- include "helm_lib_deployment_strategy_and_replicas_for_ha" . | nindent 2 }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: cluster-objects-controller
  template:
    metadata:
      labels:
        app: cluster-objects-controller
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/registry-secret.yaml") . | sha256sum }}
    spec:
      {{- include "helm_lib_node_selector" (tuple . "system") | nindent 6 }}
      {{- include "helm_lib_tolerations" (tuple . "system") | nindent 6 }}
      {{- include "helm_lib_priority_class" (tuple . "system-cluster-critical") | nindent 6 }}
      {{- include "helm_lib_module_pod_security_context_run_as_user_deckhouse" . | nindent 6 }}
      {{- include "helm_lib_pod_anti_affinity_for_ha" (list . (dict "app" "cluster-objects-controller")) | nindent 6 }}
      automountServiceAccountToken: true
      imagePullSecrets:
        - name: deckhouse-registry
      terminationGracePeriodSeconds: 60
      serviceAccountName: cluster-objects-controller
      volumes:
        - name: certs
          secret:
            secretName: cluster-objects-controller-webhook-certs
      containers:
        - name: cluster-objects-controller
          image: {{ include "helm_lib_module_image" (list . "clusterObjectsController") }}
          {{- include "helm_lib_module_container_security_context_pss_restricted_flexible" dict | nindent 10 }}
          imagePullPolicy: 'IfNotPresent'
          args:
          - --metrics-bind-address=:8443
          - --leader-elect={{ include "helm_lib_is_ha_to_value" (list . "true" "false") }}
          - --webhook-cert-path=/certs
          - --metrics-cert-path=/certs
          env:
          ports:
            - containerPort: 8081
              name: healthz
              protocol: TCP
            - containerPort: 9443
              name: webhook
              protocol: TCP
            - containerPort: 8443
              name: metrics
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
          volumeMounts:
            - mountPath: /certs
              name: certs
              readOnly: true
          resources:
            requests:
              {{- include "helm_lib_module_ephemeral_storage_logs_with_extra" 10 | nindent 14 }}
              {{- include "controller_resources" . | nindent 14 }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cluster-objects-controller
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "cluster-objects-controller")) | nindent 2 }}
spec:
  minAvailable: {{ include "helm_lib_is_ha_to_value" (list . 1 0) }}
  selector:
    matchLabels:
      app: cluster-objects-controller

