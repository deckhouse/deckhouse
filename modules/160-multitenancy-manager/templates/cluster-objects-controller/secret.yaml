apiVersion: v1
kind: Secret
metadata:
  name: cluster-objects-controller-webhook-certs
  namespace: d8-multitenancy-manager
  {{- include "helm_lib_module_labels" (list . (dict "app" "multitenancy-manager")) | nindent 2 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.multitenancyManager.internal.clusterObjectsControllerWebhookCert.crt | b64enc | quote }}
  tls.key: {{ .Values.multitenancyManager.internal.clusterObjectsControllerWebhookCert.key | b64enc | quote }}
  ca.crt: {{ .Values.multitenancyManager.internal.clusterObjectsControllerWebhookCert.ca  | b64enc | quote }}
