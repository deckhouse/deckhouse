- name: d8.multitenancy-manager.grant-violation
  rules:
  - alert: ClusterObjectsGrantViolation
    expr: sum (d8_cluster_objects_grant_violated) != 0
    labels:
      severity_level: "4"
      tier: application
    annotations:
      plk_markup_format: "markdown"
      plk_protocol_version: "1"
      summary: One or more resources not allowed by ClusterObjetsGrant are in use.
      description: |
          One or more resources that are not allowed by ClusterObjectsGrant are in use within this cluster's projects.

          Check the "Security > Cluster Object Grant Violations" dashboard for detailed overview of violating objects.
