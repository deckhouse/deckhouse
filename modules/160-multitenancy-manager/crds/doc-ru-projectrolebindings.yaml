spec:
  versions:
    - name: v1alpha3
      schema:
        openAPIV3Schema:
          description: |
            ProjectRoleBinding выдаёт роль субъектам во всех пространствах имён одного проекта.

            Целевой проект определяется по метке `projects.deckhouse.io/project` на ресурсе.
          properties:
            spec:
              properties:
                subjects:
                  description: |
                    Субъекты (пользователи, группы или сервисные аккаунты), которым выдаётся роль.
                roleRef:
                  description: |
                    Ссылка на выдаваемую ClusterRole. Допускаются только роли уровня проекта (`d8:project:*`).
