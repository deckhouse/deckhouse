spec:
  versions:
    - name: v1alpha3
      schema:
        openAPIV3Schema:
          description: |
            ProjectNamespace заказывает дополнительное пространство имён внутри проекта.

            Ресурс должен создаваться в основном пространстве имён проекта (пространство имён, имя которого
            совпадает с именем проекта). Контроллер создаёт пространство имён `<project>-<spec.name>`, проставляет
            ему метки принадлежности проекту и добавляет его в `Project.status.namespaces` с типом `Additional`.
            Удаление ProjectNamespace удаляет это пространство имён.
          properties:
            spec:
              properties:
                name:
                  description: |
                    Суффикс итогового пространства имён. Создаётся пространство имён `<project>-<name>`, где
                    `<project>` — основное пространство имён, в котором создан этот объект.
                features:
                  description: |
                    Необязательное подмножество функций проекта для включения в пространстве имён. Передаётся как
                    есть: ресурс Project в этом коде пока не моделирует функции, поэтому валидация «подмножество
                    функций проекта» — заглушка без эффекта до появления функций проекта.
            status:
              properties:
                namespace:
                  description: |
                    Пространство имён, которое контроллер создал для этого ProjectNamespace.
