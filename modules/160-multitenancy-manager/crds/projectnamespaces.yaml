---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    heritage: deckhouse
    module: multitenancy-manager
    backup.deckhouse.io/cluster-config: "true"
  name: projectnamespaces.deckhouse.io
spec:
  group: deckhouse.io
  names:
    kind: ProjectNamespace
    listKind: ProjectNamespaceList
    plural: projectnamespaces
    singular: projectnamespace
    shortNames:
      - pns
  scope: Namespaced
  versions:
    - name: v1alpha3
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - jsonPath: .status.namespace
          name: Namespace
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      schema:
        openAPIV3Schema:
          type: object
          description: |
            ProjectNamespace orders an additional namespace inside a project.

            It must be created in the project's main namespace (the namespace whose name equals the project name).
            The controller creates a namespace named `<project>-<spec.name>`, labels it with the project ownership
            labels, and adds it to the parent `Project.status.namespaces` with kind `Additional`. Deleting the
            ProjectNamespace removes that namespace.
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - name
              properties:
                name:
                  description: |
                    Suffix of the resulting namespace. The created namespace is `<project>-<name>`, where
                    `<project>` is the main namespace this object lives in.
                  type: string
                  minLength: 1
                  maxLength: 61
                  pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
                  x-kubernetes-validations:
                    - rule: "self == oldSelf"
                      message: "spec.name is immutable."
                features:
                  description: |
                    Optional subset of the project features to enable for the namespace. Carried through as-is:
                    the Project resource does not model features yet, so the "subset of project features"
                    validation is a no-op placeholder until project features exist.
                  type: array
                  items:
                    type: string
            status:
              type: object
              properties:
                namespace:
                  description: |
                    The namespace the controller created for this ProjectNamespace.
                  type: string
                observedGeneration:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        format: date-time
                        type: string
                      lastProbeTime:
                        format: date-time
                        type: string
