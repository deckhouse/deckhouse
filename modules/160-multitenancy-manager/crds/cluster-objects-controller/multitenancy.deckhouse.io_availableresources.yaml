---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    heritage: deckhouse
    module: multitenancy-manager
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: availableresources.multitenancy.deckhouse.io
spec:
  group: multitenancy.deckhouse.io
  names:
    kind: AvailableResource
    listKind: AvailableResourceList
    plural: availableresources
    shortNames:
    - available
    singular: availableresource
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.grantedResourceKind
      name: Kind
      type: string
    - jsonPath: .status.default
      name: Default
      type: string
    - jsonPath: .status.availableCount
      name: Available
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AvailableResource is the per-project, controller-owned catalog (discovery only) for one
          ClusterGrantableResource. metadata.name equals the grantable resource name.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          status:
            description: status defines the observed catalog for this project.
            properties:
              available:
                description: Available lists the granted names available in this project,
                  with the default flagged.
                items:
                  description: AvailableObject is one granted name available in a
                    project, optionally the project default.
                  properties:
                    default:
                      description: Default is true for the per-project default name.
                      type: boolean
                    name:
                      description: Name is the granted object name available in the
                        project.
                      type: string
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              availableCount:
                description: |-
                  AvailableCount is the number of available names. It is the wide-column value, because the full
                  list can be long (e.g. dozens of cluster roles) and would break the table; get the names from
                  Available or AvailableSummary.
                type: integer
              availableSummary:
                description: |-
                  AvailableSummary is a comma-separated list of all available names, denormalized from Available
                  for on-demand display (kubectl get ... -o jsonpath='{.status.availableSummary}').
                type: string
              default:
                description: |-
                  Default is the per-project default name used when the referencing field is left empty (or
                  carries a value not available to the project). Empty when the project has no usable default.
                type: string
              grantedResourceKind:
                description: GrantedResourceKind is the kind of the granted resource
                  (informational).
                type: string
              observedGeneration:
                description: ObservedGeneration is the controller generation that
                  produced this status.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
