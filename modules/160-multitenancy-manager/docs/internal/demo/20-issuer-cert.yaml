# ClusterIssuer referenced from a Certificate (spec.issuerRef, kind: ClusterIssuer).
# Project allows only `selfsigned`. No coerceToDefault -> a disallowed explicit issuer is REJECTED
# (never silently swapped for self-signed).
#
# ALLOW  cert-ok    -> issuerRef.name: selfsigned
# DENY   cert-bad   -> issuerRef.name: letsencrypt (not available to the project)
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata: {name: cert-ok, namespace: demo}
spec:
  secretName: cert-ok-tls
  dnsNames: [ok.demo.example.com]
  issuerRef: {name: selfsigned, kind: ClusterIssuer, group: cert-manager.io}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata: {name: cert-bad, namespace: demo}
spec:
  secretName: cert-bad-tls
  dnsNames: [bad.demo.example.com]
  issuerRef: {name: letsencrypt, kind: ClusterIssuer, group: cert-manager.io}   # DENY
