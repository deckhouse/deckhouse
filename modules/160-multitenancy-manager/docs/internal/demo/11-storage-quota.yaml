# Storage object quota: 5Gi total requested storage, max 3 PVCs.
#
# DENY  pvc-big      -> 10Gi exceeds the 5Gi requests.storage quota.
# (Count quota: apply 10-storage.yaml first (3 PVCs), then this file's pvc-extra is the 4th -> DENY.)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: pvc-big, namespace: demo}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local
  resources: {requests: {storage: 10Gi}}   # DENY: exceeds 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: pvc-extra, namespace: demo}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local
  resources: {requests: {storage: 1Gi}}    # DENY if it is the 4th PVC (count quota = 3)
