# RoleBinding referencing a ClusterRole. The clusterroles ClusterGrantableResource makes available by
# default only the roles marked with the rbac.deckhouse.io/delegatable label — the namespace-level
# access roles: d8:use:role:{viewer,user,manager,admin} and user-authz:{user,privileged-user,editor,
# admin}. Everything else (use capabilities, cluster-admin/super-admin and other cluster-scoped roles,
# the d8:manage:* permission roles, admin-kubeconfig, raw component roles) is rejected.
#
# ALLOW  rb-use          -> ClusterRole d8:use:role:viewer
# ALLOW  rb-userauthz    -> ClusterRole user-authz:admin
# DENY   rb-clusteradmin -> ClusterRole cluster-admin
# DENY   rb-manage       -> ClusterRole d8:manage:all:manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-use
  namespace: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:use:role:viewer
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: demo-team
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-userauthz
  namespace: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: user-authz:admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: demo-team
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-clusteradmin
  namespace: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin   # DENY: not delegatable
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: demo-team
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-manage
  namespace: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:manage:all:manager   # DENY: manage permission role, not delegatable
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: demo-team
