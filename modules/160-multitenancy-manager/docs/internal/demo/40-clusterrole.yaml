# RoleBinding referencing a ClusterRole. The clusterroles GrantableClusterResourceDefinition makes available by
# default only the roles marked with the rbac.deckhouse.io/delegatable label — the namespace-level
# access roles: d8:namespace:{viewer,user,manager,admin,superadmin} and user-authz:{user,privileged-user,editor,
# admin}. Everything else (namespace capabilities, cluster-admin/super-admin and other cluster-scoped roles,
# the d8:system:* and d8:subsystem:* roles, admin-kubeconfig, raw component roles) is rejected.
#
# ALLOW  rb-namespace    -> ClusterRole d8:namespace:viewer
# ALLOW  rb-userauthz    -> ClusterRole user-authz:admin
# DENY   rb-clusteradmin -> ClusterRole cluster-admin
# DENY   rb-system       -> ClusterRole d8:system:manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-namespace
  namespace: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:namespace:viewer
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: demo-team
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-userauthz
  namespace: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: user-authz:admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: demo-team
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-clusteradmin
  namespace: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin   # DENY: not delegatable
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: demo-team
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-system
  namespace: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:system:manager   # DENY: system role, not delegatable
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: demo-team
