{{- $profiles := list "main" }}
{{- if .Values.global.discovery.hasEtcdArbiterNode }}
  {{- $profiles = append $profiles "etcd-arbiter" }}
{{- end }}

{{- range $profile := $profiles }}
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane-proxy{{- if ne $profile "main" }}-{{ $profile }}{{- end }}
  namespace: d8-monitoring
  {{- $appLabel := print "control-plane-proxy" (if ne $profile "main" (printf "-%s" $profile) "") }}
  {{- include "helm_lib_module_labels" (list $ (dict "app" $appLabel)) | nindent 2 }}
spec:
  selector:
    app: {{ $appLabel }}
  ports:
  - name: https-metrics
    port: 8080
    protocol: TCP
    targetPort: https-metrics
{{- end }}