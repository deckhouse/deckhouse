apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: useroperations.deckhouse.io
  labels:
    heritage: deckhouse
    module: user-authn
spec:
  group: deckhouse.io
  scope: Cluster
  names:
    plural: useroperations
    singular: useroperation
    kind: UserOperation
  preserveUnknownFields: false
  versions:
    - name: v1alpha1
      served: true
      storage: false
      deprecated: true
      schema:
        openAPIV3Schema:
          type: object
          description: |
            Describes an operation to be applied to a user (password reset, 2FA reset, lock/unlock).

            For local users, the `ResetPassword`, `Reset2FA`, and `Lock` operations also delete
            the user's Dex OfflineSessions and RefreshToken objects. This terminates active
            offline sessions and requires the user to authenticate again.
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - user
                - type
              properties:
                user:
                  type: string
                  description: "Name (username) of the target User resource."
                  x-doc-examples: ['jane.doe']
                type:
                  type: string
                  description: |
                    Type of the user operation. Possible values:
                    
                    * `ResetPassword`: Password reset.
                    * `Reset2FA`: Two-factor authentication reset.
                    * `Lock`: User lock.
                    * `Unlock`: User unlock.
                initiatorType:
                  type: string
                  description: |
                    Indicates who initiated the operation. Possible values:
 
                    * `admin`: By an administrator.
                    * `system`: Automatically by the system.
                    * `self`: By the user.
                resetPassword:
                  type: object
                  description: "Parameters for password reset."
                  properties:
                    newPasswordHash:
                      type: string
                      description: "Bcrypt hash of the new password."
                lock:
                  type: object
                  description: "Parameters for locking the user."
                  required:
                    - for
                  properties:
                    for:
                      type: string
                      description: |
                        Lock duration as a Go-style duration string (`30s`, `10m`, `1h`, `2h30m`, `7d`),
                        or `permanent` for an indefinite lock released only by `Unlock`.
                        Days are expanded as `1d = 24h` by the hook before parsing.
                      pattern: '^(permanent|([0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h|d))+)$'
                      x-kubernetes-validations:
                        # Self-sufficient: re-asserts shape (so garbage like "permanent7d" or
                        # "abc1d" cannot slip through if `pattern` ever regresses) and then
                        # requires at least one non-zero digit, which — combined with the
                        # all-segments-are-non-negative shape — guarantees a positive total
                        # ("30m" passes, "0s" / "0d0h" do not). We avoid CEL's `duration()`
                        # because it does not accept the "d" unit we surface here.
                        - rule: 'self == "permanent" || (self.matches("^([0-9]+(\\.[0-9]+)?(ns|us|µs|ms|s|m|h|d))+$") && self.matches("[1-9]"))'
                          message: 'lock.for must be "permanent" or a positive Go-style duration using ns/us/µs/ms/s/m/h/d (e.g. "30m", "1h", "2h30m", "7d").'
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: |
                    Current phase of the operation. Possible values:
 
                    * `Succeeded`: Operation completed successfully.
                    * `Failed`: Operation failed.
                  enum:
                    - "Succeeded"
                    - "Failed"
                message:
                  type: string
                  description: "Optional message about the result or failure of the operation."
                completedAt:
                  type: string
                  description: "Time when the operation was completed."
      subresources: &subresources
        status: {}
      additionalPrinterColumns: &additionalPrinterColumns
        - name: User
          type: string
          jsonPath: .spec.user
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: CompletedAt
          type: string
          jsonPath: .status.completedAt
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: |
            Describes an operation to be applied to a user (password reset, 2FA reset, lock/unlock).

            For local users, the `ResetPassword`, `Reset2FA`, and `Lock` operations also delete
            the user's Dex OfflineSessions and RefreshToken objects. This terminates active
            offline sessions and requires the user to authenticate again.
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - type
              oneOf:
                - required: [user]
                - required: [target]
              properties:
                user:
                  type: string
                  description: |
                    Name (username) of the target local User resource.

                    Used for operations on users that are managed
                    by DKP via the User CRD (the built-in local connector).
                    
                    > Only one of the fields can be specified at the same time: `user` or `target`.
                  x-doc-examples: ['jane.doe']
                target:
                  type: object
                  description: |
                    Identifier of an external (non-local) account managed by an external authentication
                    provider (LDAP, Atlassian Crowd, etc.).

                    The `Lock` and `Unlock` operations against `target` are performed against the
                    OfflineSessions object that holds the failed-attempt counter and lock state for
                    the corresponding `(connectorID, email)` pair.
                    
                    > Only one of the fields can be specified at the same time: `user` or `target`.
                  required:
                    - connectorID
                    - email
                  properties:
                    connectorID:
                      type: string
                      description: |
                        ID of the DexProvider (connector) through which the user logs in.
                      x-doc-examples: ['my-ldap', 'my-crowd']
                    email:
                      type: string
                      description: |
                        Email of the external user, as reported by the connector.

                        Stored in `OfflineSessions.email` and used as a stable handle for administrative actions.
                      x-doc-examples: ['jane.doe@example.org']
                type:
                  type: string
                  description: |
                    Type of the user operation. Possible values:
                    
                    * `ResetPassword`: Password reset.
                    * `Reset2FA`: Two-factor authentication reset.
                    * `Lock`: User lock.
                    * `Unlock`: User unlock.
                initiatorType:
                  type: string
                  description: |
                    Indicates who initiated the operation. Possible values:
 
                    * `admin`: By an administrator.
                    * `system`: Automatically by the system.
                    * `self`: By the user.
                resetPassword:
                  type: object
                  description: "Parameters for password reset."
                  properties:
                    newPasswordHash:
                      type: string
                      description: "Bcrypt hash of the new password."
                lock:
                  type: object
                  description: "Parameters for locking the user."
                  required:
                    - for
                  properties:
                    for:
                      type: string
                      description: |
                        Lock duration as a Go-style duration string (`30s`, `10m`, `1h`, `2h30m`, `7d`),
                        or `permanent` for an indefinite lock released only by `Unlock`.
                        Days are expanded as `1d = 24h` by the hook before parsing.
                      pattern: '^(permanent|([0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h|d))+)$'
                      x-kubernetes-validations:
                        # Self-sufficient: re-asserts shape (so garbage like "permanent7d" or
                        # "abc1d" cannot slip through if `pattern` ever regresses) and then
                        # requires at least one non-zero digit, which — combined with the
                        # all-segments-are-non-negative shape — guarantees a positive total
                        # ("30m" passes, "0s" / "0d0h" do not). We avoid CEL's `duration()`
                        # because it does not accept the "d" unit we surface here.
                        - rule: 'self == "permanent" || (self.matches("^([0-9]+(\\.[0-9]+)?(ns|us|µs|ms|s|m|h|d))+$") && self.matches("[1-9]"))'
                          message: 'lock.for must be "permanent" or a positive Go-style duration using ns/us/µs/ms/s/m/h/d (e.g. "30m", "1h", "2h30m", "7d").'
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: |
                    Current phase of the operation. Possible values:
 
                    * `Succeeded`: Operation was completed successfully.
                    * `Failed`: Operation failed.
                  enum:
                    - "Succeeded"
                    - "Failed"
                message:
                  type: string
                  description: "Optional message about the result or failure of the operation."
                completedAt:
                  type: string
                  description: "Time when the operation was completed."
      subresources: *subresources
      additionalPrinterColumns: *additionalPrinterColumns


