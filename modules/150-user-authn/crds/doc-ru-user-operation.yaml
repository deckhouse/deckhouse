spec:
  versions:
    - name: v1alpha1
      served: true
      storage: false
      deprecated: true
      schema:
        openAPIV3Schema:
          description: |
            Содержит информацию об операции над пользователем (сброс пароля, сброс 2FA, блокировка/разблокировка).
          properties:
            spec:
              properties:
                user:
                  description: |
                    Имя пользователя (ссылка на ресурс User).
                type:
                  description: |
                    Тип операции над пользователем. Возможные значения:

                    * `ResetPassword` — сброс пароля;
                    * `Reset2FA` — сброс двухфакторной аутентификации;
                    * `Lock` — блокировка пользователя;
                    * `Unlock` — разблокировка пользователя.
                initiatorType:
                  description: |
                    Указывает, кем инициирована операция. Возможные значения:

                    * `admin` — администратором;
                    * `system` — автоматически системой;
                    * `self` — самим пользователем.
                resetPassword:
                  description: |
                    Параметры операции по сбросу пароля.
                  properties:
                    newPasswordHash:
                      description: |
                        Новый пароль в виде bcrypt-хеша.  
                        Хеш должен быть получен заранее и передан в поле CR.
                lock:
                  description: |
                    Параметры операции по блокировке пользователя.
                  properties:
                    for:
                      description: |
                        Длительность блокировки.  
                        Указывается в формате: `30s`, `10m`, `1h`, `2h30m`.
            status:
              type: object
              properties:
                phase:
                  description: |
                    Текущий статус выполнения операции. Возможные значения:

                    * `Succeeded` — операция успешно выполнена;
                    * `Failed` — операция завершилась ошибкой.
                message:
                  description: |
                    Дополнительное сообщение о результате выполнения операции или причине ошибки.
                completedAt:
                  description: |
                    Время завершения операции.
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: |
            Содержит информацию об операции над пользователем (сброс пароля, сброс 2FA, блокировка/разблокировка).
          properties:
            spec:
              properties:
                user:
                  description: |
                    Имя локального пользователя (ссылка на ресурс User).

                    Используется для операций над пользователями,
                    которыми DKP управляет через CRD User (встроенный локальный коннектор).

                    > Одновременно можно указать только одно из полей: `user` или `target`.
                target:
                  description: |
                    Идентификатор внешней (нелокальной) учётной записи, которой управляет внешний провайдер
                    аутентификации (LDAP, Atlassian Crowd и т. п.).

                    Операции `Lock` и `Unlock` для `target` выполняются над объектом OfflineSessions,
                    который хранит счётчик неудачных попыток входа и состояние блокировки для соответствующей
                    пары `(connectorID, email)`.
                    
                    > Одновременно можно указать только одно из полей: `user` или `target`.
                  properties:
                    connectorID:
                      description: |
                        Идентификатор DexProvider (коннектора), через который входит пользователь.
                    email:
                      description: |
                        Email внешнего пользователя в том виде, в котором его сообщает коннектор.

                        Сохраняется в `OfflineSessions.email` и используется как стабильный
                        идентификатор для административных операций.
                type:
                  description: |
                    Тип операции над пользователем. Возможные значения:

                    * `ResetPassword` — сброс пароля;
                    * `Reset2FA` — сброс двухфакторной аутентификации;
                    * `Lock` — блокировка пользователя;
                    * `Unlock` — разблокировка пользователя.
                initiatorType:
                  description: |
                    Указывает, кем инициирована операция. Возможные значения:

                    * `admin` — администратором;
                    * `system` — автоматически системой;
                    * `self` — самим пользователем.
                resetPassword:
                  description: |
                    Параметры операции по сбросу пароля.
                  properties:
                    newPasswordHash:
                      description: |
                        Новый пароль в виде bcrypt-хеша.  
                        Хеш должен быть получен заранее и передан в поле CR.
                lock:
                  description: |
                    Параметры операции по блокировке пользователя.
                  properties:
                    for:
                      description: |
                        Длительность блокировки.  
                        Указывается в формате: `30s`, `10m`, `1h`, `2h30m`.
            status:
              type: object
              properties:
                phase:
                  description: |
                    Текущий статус выполнения операции. Возможные значения:

                    * `Succeeded` — операция успешно выполнена;
                    * `Failed` — операция завершилась ошибкой.
                message:
                  description: |
                    Дополнительное сообщение о результате выполнения операции или причине ошибки.
                completedAt:
                  description: |
                    Время завершения операции.


