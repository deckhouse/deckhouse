apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: offlinesessionses.dex.coreos.com
spec:
  group: dex.coreos.com
  names:
    kind: OfflineSessions
    listKind: OfflineSessionsList
    plural: offlinesessionses
    singular: offlinesessions
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        x-kubernetes-preserve-unknown-fields: true
    additionalPrinterColumns:
      - name: User
        type: string
        jsonPath: .userID
        description: |
          End-user identifier, as returned by the upstream connector.
      - name: Email
        type: string
        jsonPath: .email
        description: |
          Mirror of identity.Email; used as a stable handle for administrative actions.
      - name: Connector
        type: string
        jsonPath: .connID
        description: |
          ID of the connector through which the user logged in.
      - name: Attempts
        type: integer
        jsonPath: .incorrectPasswordLoginAttempts
        description: |
          Consecutive failed password attempts since the last successful login.
      - name: LockedUntil
        type: date
        jsonPath: .lockedUntil
        description: |
          Until when password logins are blocked. Empty when the user is not locked.
      - name: Age
        type: date
        jsonPath: .metadata.creationTimestamp
