{{- $moduleGateway := dict }}
{{- include "helm_lib_module_gateway" (list . $moduleGateway) }}
{{- if and $moduleGateway .Values.global.modules.publicDomainTemplate (or (and (.Values.userAuthn.publishAPI.enabled) (.Values.userAuthn.publishAPI.addKubeconfigGeneratorEntry)) (.Values.userAuthn.kubeconfigGenerator)) (include "helm_lib_kind_exists" (list . "HTTPRoute")) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubeconfig-generator
  namespace: d8-{{ .Chart.Name }}
  annotations:
    web.deckhouse.io/export-name: "kubeconfig"
    web.deckhouse.io/export-icon: "/public/img/kubeconfig-generator.jpeg"
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "kubernetes-configurator")) | nindent 2 }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "kubeconfig") }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: user-authn
    namespace: d8-{{ .Chart.Name }}
    sectionName: kubeconfig
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: kubeconfig-generator
      port: 5555
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
{{- if (include "helm_lib_module_https_route_tls_enabled" .) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubeconfig-generator-redirect
  namespace: d8-{{ .Chart.Name }}
  annotations:
  {{- include "helm_lib_module_labels" (list . (dict "app" "kubernetes-configurator")) | nindent 2 }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "kubeconfig") }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: user-authn
    namespace: d8-{{ .Chart.Name }}
    sectionName: kubeconfig-redirect
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
    matches:
    - path:
        type: PathPrefix
        value: /
{{- end }}
{{- end }}
