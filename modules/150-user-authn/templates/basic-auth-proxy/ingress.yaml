{{- if include "is_basic_auth_enabled" . }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: basic-auth-proxy
  namespace: d8-{{ .Chart.Name }}
  annotations:
    nginx.ingress.kubernetes.io/configuration-snippet: |
      {{ include "helm_lib_module_ingress_configuration_snippet" $ | nindent 6 }}
    nginx.ingress.kubernetes.io/rewrite-target: "/$2"
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
  {{- if .Values.userAuthn.internal.publishAPI.whitelistSourceRanges }}
    nginx.ingress.kubernetes.io/whitelist-source-range: {{ .Values.userAuthn.internal.publishAPI.whitelistSourceRanges | join "," }}
  {{- end }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "basic-auth-proxy")) | nindent 2 }}
spec:
  ingressClassName: {{ .Values.userAuthn.internal.publishAPI.ingressClass | default (include "helm_lib_module_ingress_class" . | quote ) }}
  rules:
  - host: {{ include "helm_lib_module_public_domain" (list . "api") }}
    http:
      paths:
      - path: /basic-auth(\/?)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: basic-auth-proxy
            port:
              number: 7332
{{- end }}
