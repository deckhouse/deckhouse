{{- $moduleGateway := dict }}
{{- include "helm_lib_module_gateway" (list . $moduleGateway) }}
{{- if and $moduleGateway .Values.global.modules.publicDomainTemplate (include "is_basic_auth_enabled" .) (include "helm_lib_kind_exists" (list . "HTTPRoute")) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubernetes-api-basic-auth-proxy
  namespace: d8-{{ .Chart.Name }}
  annotations:
    alb.network.deckhouse.io/buffer-max-request-bytes: "10485760"
  {{- if .Values.userAuthn.publishAPI.whitelistSourceRanges }}
    alb.network.deckhouse.io/whitelist-source-range: {{ .Values.userAuthn.publishAPI.whitelistSourceRanges | join "," }}
  {{- end }}
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "kubernetes-configurator")) | nindent 2 }}
spec:
  hostnames:
  - {{ $apiHost }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: user-authn
    namespace: d8-{{ .Chart.Name }}
    sectionName: api
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: basic-auth-proxy
      port: 7332
      weight: 1
    matches:
    - headers:
      - name: Authorization
        type: RegularExpression
        value: ^(.*)Basic(.*)$
      path:
        type: PathPrefix
        value: /
{{- end }}
