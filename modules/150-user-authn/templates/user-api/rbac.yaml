{{- if .Values.userAuthn.internal.dexUsersCRDs }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-api
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "user-api")) | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:user-authn:user-api
  {{- include "helm_lib_module_labels" (list . (dict "app" "user-api")) | nindent 2 }}
rules:
- apiGroups:
  - deckhouse.io
  resources:
  - useroperations
  verbs:
  - create
- apiGroups:
  - dex.coreos.com
  resources:
  - passwords
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:user-authn:user-api
  {{- include "helm_lib_module_labels" (list . (dict "app" "user-api")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:user-authn:user-api
subjects:
- kind: ServiceAccount
  name: user-api
  namespace: d8-{{ .Chart.Name }}
{{- end }}
