{{- if .Values.userAuthn.internal.dexUsersCRDs }}
---
apiVersion: v1
kind: Service
metadata:
  name: user-api
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "user-api")) | nindent 2 }}
spec:
  type: ClusterIP
  selector:
    app: user-api
  ports:
  - name: https
    port: 443
    targetPort: 8443
    protocol: TCP
{{- end }}
