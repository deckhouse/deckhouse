{{- $moduleGateway := dict }}
{{- include "helm_lib_module_gateway" (list . $moduleGateway) }}
{{- if and $moduleGateway .Values.global.modules.publicDomainTemplate .Values.userAuthn.publishAPI.enabled }}
{{- $apiHost := include "helm_lib_module_public_domain" (list . "api") }}
{{- if include "is_basic_auth_enabled" . }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubernetes-api-basic-auth
  namespace: d8-{{ .Chart.Name }}
  annotations:
    alb-gateway.network.deckhouse.io/gateway: {{ printf "%s/%s" $moduleGateway.namespace $moduleGateway.name }}
    alb-gateway.network.deckhouse.io/auto-create-xlistenerset: "true"
    alb-gateway.network.deckhouse.io/buffer-max-request-bytes: "10485760"
  {{- if (include "helm_lib_module_https_route_tls_enabled" .) }}
    alb-gateway.network.deckhouse.io/tls-secrets: d8-{{ .Chart.Name }}/{{ include "publish_api_http_route_certificate_name" . }}
  {{- end }}
  {{- if .Values.userAuthn.publishAPI.whitelistSourceRanges }}
    alb-gateway.network.deckhouse.io/whitelist-source-range: {{ .Values.userAuthn.publishAPI.whitelistSourceRanges | join "," }}
  {{- end }}
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb-gateway.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "kubernetes-configurator")) | nindent 2 }}
spec:
  hostnames:
  - {{ $apiHost }}
  parentRefs:
  - group: gateway.networking.x-k8s.io
    kind: XListenerSet
    name: d8-listenerset
    namespace: d8-{{ .Chart.Name }}
    sectionName: api
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: basic-auth-proxy
      port: 7332
      weight: 1
    matches:
    - headers:
      - name: Authorization
        type: RegularExpression
        value: ^(.*)Basic(.*)$
      path:
        type: PathPrefix
        value: /api
  - backendRefs:
    - group: ""
      kind: Service
      name: basic-auth-proxy
      port: 7332
      weight: 1
    matches:
    - headers:
      - name: Authorization
        type: RegularExpression
        value: ^(.*)Basic(.*)$
      path:
        type: PathPrefix
        value: /apis
  - backendRefs:
    - group: ""
      kind: Service
      name: basic-auth-proxy
      port: 7332
      weight: 1
    matches:
    - headers:
      - name: Authorization
        type: RegularExpression
        value: ^(.*)Basic(.*)$
      path:
        type: PathPrefix
        value: /openapi
  - backendRefs:
    - group: ""
      kind: Service
      name: basic-auth-proxy
      port: 7332
      weight: 1
    matches:
    - headers:
      - name: Authorization
        type: RegularExpression
        value: ^(.*)Basic(.*)$
      path:
        type: Exact
        value: /version
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubernetes-api
  namespace: d8-{{ .Chart.Name }}
  annotations:
    alb-gateway.network.deckhouse.io/gateway: {{ printf "%s/%s" $moduleGateway.namespace $moduleGateway.name }}
    alb-gateway.network.deckhouse.io/auto-create-xlistenerset: "true"
    alb-gateway.network.deckhouse.io/backend-tls-settings: '{"mode": "SIMPLE", "insecureSkipVerify": true}'
    alb-gateway.network.deckhouse.io/buffer-max-request-bytes: "10485760"
  {{- if (include "helm_lib_module_https_route_tls_enabled" .) }}
    alb-gateway.network.deckhouse.io/tls-secrets: d8-{{ .Chart.Name }}/{{ include "publish_api_http_route_certificate_name" . }}
  {{- end }}
  {{- if .Values.userAuthn.publishAPI.whitelistSourceRanges }}
    alb-gateway.network.deckhouse.io/whitelist-source-range: {{ .Values.userAuthn.publishAPI.whitelistSourceRanges | join "," }}
  {{- end }}
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb-gateway.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "kubernetes-configurator")) | nindent 2 }}
spec:
  hostnames:
  - {{ $apiHost }}
  parentRefs:
  - group: gateway.networking.x-k8s.io
    kind: XListenerSet
    name: d8-listenerset
    namespace: d8-{{ .Chart.Name }}
    sectionName: api
  rules:
  # /healthz, /livez and /readyz are intentionally not published until HTTPRoute can return a direct 403.
  - backendRefs:
    - group: ""
      kind: Service
      name: kubernetes
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /api
  - backendRefs:
    - group: ""
      kind: Service
      name: kubernetes
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /apis
  - backendRefs:
    - group: ""
      kind: Service
      name: kubernetes
      port: 443
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /openapi
  - backendRefs:
    - group: ""
      kind: Service
      name: kubernetes
      port: 443
      weight: 1
    matches:
    - path:
        type: Exact
        value: /version
{{- if and (include "helm_lib_module_https_route_tls_enabled" .) (not (include "is_basic_auth_enabled" .)) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubernetes-api-redirect
  namespace: d8-{{ .Chart.Name }}
  annotations:
    alb-gateway.network.deckhouse.io/gateway: {{ printf "%s/%s" $moduleGateway.namespace $moduleGateway.name }}
    alb-gateway.network.deckhouse.io/auto-create-xlistenerset: "true"
  {{- include "helm_lib_module_labels" (list . (dict "app" "kubernetes-configurator")) | nindent 2 }}
spec:
  hostnames:
  - {{ $apiHost }}
  parentRefs:
  - group: gateway.networking.x-k8s.io
    kind: XListenerSet
    name: d8-listenerset
    namespace: d8-{{ .Chart.Name }}
    sectionName: api-redirect
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
    matches:
    - path:
        type: PathPrefix
        value: /
{{- end }}
{{- end }}
