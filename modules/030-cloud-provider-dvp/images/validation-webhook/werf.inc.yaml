---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: common/distroless
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
  add: /validation-webhook
  to: /validation-webhook
  before: setup
imageSpec:
  config:
    entrypoint: ["/validation-webhook"]
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
final: false
fromImage: common/src-artifact
git:
- add: /{{ $.ModulePath }}modules/030-{{ $.ModuleName }}/images/{{ $.ImageName }}/src
  to: /src/validation-webhook/src
  excludePaths:
  - "**/*.md"
  - "**/*.yaml"
  stageDependencies:
    install:
    - go.mod
    - go.sum
    - "**/*.go"
- add: /{{ $.ModulePath }}modules/030-{{ $.ModuleName }}/pkg
  to: /src/validation-webhook/pkg
  excludePaths:
  - "**/*.md"
  - "**/*.yaml"
  stageDependencies:
    install:
    - go.mod
    - go.sum
    - "**/*.go"
- add: {{ .gitPrefix }}/go_lib/cloud-provider
  to: /src/go_lib/cloud-provider
  excludePaths:
  - "**/*.md"
  - "**/*.yaml"
  stageDependencies:
    install:
    - go.mod
    - go.sum
    - "**/*.go"
- add: {{ .gitPrefix }}/go_lib/dhctl-provider-protocol
  to: /src/go_lib/dhctl-provider-protocol
  excludePaths:
  - "**/*.md"
  stageDependencies:
    install:
    - go.mod
    - go.sum
    - "**/*.go"
shell:
  install:
  - cd /src/validation-webhook/pkg
  - sed -i -e 's# ../../../go_lib/cloud-provider# /src/go_lib/cloud-provider#g' go.mod
  - sed -i -e 's# ../../../go_lib/dhctl-provider-protocol# /src/go_lib/dhctl-provider-protocol#g' go.mod
  - cd /src/validation-webhook/src
  - sed -i -e 's# ../../../pkg# /src/validation-webhook/pkg#g' go.mod
  - sed -i -e 's# ../../../../../go_lib/cloud-provider# /src/go_lib/cloud-provider#g' go.mod
  - sed -i -e 's# ../../../../../go_lib/dhctl-provider-protocol# /src/go_lib/dhctl-provider-protocol#g' go.mod
  - cd /src/go_lib/cloud-provider
  - sed -i -e 's# ../dhctl-provider-protocol# /src/go_lib/dhctl-provider-protocol#g' go.mod
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
final: false
from: {{ index $.Images "builder/golang" }}
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
mount:
{{ include "mount points for golang builds" . }}
shell:
  install:
  - export GOPROXY={{ $.GOPROXY }}
  - cd /src/validation-webhook/src
  - go mod download
  setup:
  - cd /src/validation-webhook/src
  - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o /validation-webhook .
  - chown 64535:64535 /validation-webhook
  - chmod 0755 /validation-webhook
