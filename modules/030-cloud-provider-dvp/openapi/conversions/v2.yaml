version: 2
conversions:
  - if .provider == null then .provider = {} end
  - if .provider.parameters == null then .provider.parameters = {} end
  - if .provider.parameters.namespace == null then (if .provider.namespace != null then .provider.parameters.namespace = .provider.namespace else .provider.parameters.namespace = "default" end) end
  - del(.provider.namespace)
  - del(.provider.kubeconfigDataBase64)
  - if .nodes == null then .nodes = {} end
  - if .nodes.parameters == null then .nodes.parameters = {} end
  - if .nodes.parameters.layout == null then .nodes.parameters.layout = "Standard" end
  - if .nodes.parameters.sshPublicKey == null then .nodes.parameters.sshPublicKey = "ssh-rsa PLACEHOLDER_REPLACE_ME" end
  - if .zones != null then .nodes.parameters.zones = .zones end
  - del(.zones)
  - if .nodes.disabled == null then .nodes.disabled = false end
  - if .storage == null then .storage = {} end
  - if .storage.disabled == null then .storage.disabled = false end
  - if .ccm == null then .ccm = {} end
  - if .ccm.disabled == null then .ccm.disabled = false end
  - if .storage.parameters == null then .storage.parameters = {} end
description:
  ru: |
    Переход на новую схему ModuleConfig для cloud-provider-dvp.
    Структура `provider.kubeconfigDataBase64` / `provider.namespace` / `zones` заменена на `provider.parameters` / `nodes.parameters`.
    Поле `kubeconfigDataBase64` больше нет в ModuleConfig (хранится в Secret типа cloud-provider.deckhouse.io/credentials).
    Поле `nodes.parameters.layout` подставляется как "Standard" — заполните корректным значением вручную при необходимости.
    Поле `nodes.parameters.sshPublicKey` получает placeholder значение — обязательно замените его реальным публичным ключом SSH.
  en: |
    Migration to the new ModuleConfig schema for cloud-provider-dvp.
    Fields `provider.kubeconfigDataBase64` / `provider.namespace` / `zones` are replaced with `provider.parameters` / `nodes.parameters`.
    `kubeconfigDataBase64` no longer lives in ModuleConfig (moved to a cloud-provider.deckhouse.io/credentials Secret).
    `nodes.parameters.layout` gets a default value of "Standard" — update it manually if needed.
    `nodes.parameters.sshPublicKey` gets a placeholder value — replace it with a real SSH public key.
