type: object
description: |
  Описывает конфигурацию облачного кластера в Deckhouse Virtualization Platform (DVP).

  Используется облачным провайдером, если управляющий слой (control plane) кластера размещён в облаке.

  Выполните следующую команду, чтобы изменить конфигурацию в работающем кластере:

  ```shell```
  d8 k edit moduleconfig cloud-provider-dvp
  ```

  > Чтобы изменения вступили в силу, после изменения параметров узлов выполните команду `dhctl converge`.
properties:
  nodes:
    type: object
    properties:
      disabled:
        type: boolean
      parameters:
        type: object
        properties:
          ipAddresses:
            type: object
            additionalProperties:
              items:
                type: string
              type: array
            description: |
              Необходимо описать позже
          layout:
            description: |
              Название схемы размещения.

              [Подробнее о возможных схемах размещения провайдера](/modules/cloud-provider-dvp/layouts.html).
            type: string
          region:
            description: |
              Название региона.

              Чтобы использовать эту настройку, на узлах DVP должен быть установлен лейбл `topology.kubernetes.io/region`.
              [Подробнее о топологических лейблах](https://kubernetes.io/docs/reference/labels-annotations-taints/#topologykubernetesioregion)

              > Чтобы установить требуемый лейбл для узла DVP, следуйте [документации по NodeGroup](https://deckhouse.io/documentation/v1/modules/040-node-manager/cr.html#nodegroup-v1-spec-nodetemplate-labels).
            type: string
          sshPublicKey:
            description: |
              Публичный ключ для доступа на узлы.
            type: string
          zones:
            description: |
              Набор зон, в которых могут быть созданы узлы.

              Чтобы использовать эту настройку, на узлах DVP должна быть установлен лейбл `topology.kubernetes.io/zone`.
              [Подробнее о топологических лейблах.](https://kubernetes.io/docs/reference/labels-annotations-taints/#topologykubernetesioregion)

              > Чтобы установить требуемый лейбл для узла DVP, обратитесь к [документации по NodeGroup](https://deckhouse.io/documentation/v1/modules/040-node-manager/cr.html#nodegroup-v1-spec-nodetemplate-labels).
            items:
              type: string
            type: array
  provider:
    type: object
    properties:
      parameters:
        description: |
          Содержит настройки для подключения к API Deckhouse Kubernetes Platform.
        type: object
        properties:
          namespace:
            description: |
              Пространство имён, в котором будут созданы ресурсы кластера DKP.

              > Если не указано явно, будет использоваться пространство имён по умолчанию для kubeconfig.
            type: string
          networkPolicy:
            description: |
              Правила управления сетевым трафиком к нагрузкам и от нагрузок, запущенных в рамках ресурса Project.

              * `Isolated` — применяется ограничивающая allowlist-политика: разрешён только сетевой трафик, необходимый для работы платформенных компонентов; весь остальной трафик запрещён.
              * `None` — кластер не заказывает сетевые политики. Ограничения, заданные на уровне Project, продолжают действовать.
            type: string
  storage:
    type: object
    properties:
      disabled:
        type: boolean
      parameters:
        type: object
        properties:
          excludedStorageClasses:
            items:
              type: string
            type: array
  ccm:
    properties:
      disabled:
        type: boolean
    type: object
