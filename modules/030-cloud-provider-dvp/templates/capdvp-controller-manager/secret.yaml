{{- if .Values.cloudProviderDvp.nodes.enabled }}
{{- $credSecret := index .Values.cloudProviderDvp.internal.credentialSecrets "d8-credentials" }}
{{- $kubeconfigDataBase64 := "" }}
{{- if $credSecret }}
{{- $kubeconfigDataBase64 = $credSecret.secret | toString }}
{{- end }}
{{- $namespace := .Values.cloudProviderDvp.provider.parameters.namespace | required "provider.parameters.namespace is required" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: dvp-credentials-capdvp
  namespace: d8-cloud-provider-dvp
  {{- include "helm_lib_module_labels" (list . (dict "app" "capdvp-controller-manager")) | nindent 2 }}
type: Opaque
data:
  kubernetesConfigBase64: {{ $kubeconfigDataBase64 | quote }}
  namespace: {{ $namespace | toString | b64enc | quote }}
  clusterUUID: {{ .Values.global.discovery.clusterUUID | toString | b64enc | quote }}
{{- end }}
