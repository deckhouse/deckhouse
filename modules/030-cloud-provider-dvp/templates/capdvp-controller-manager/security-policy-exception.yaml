{{- if or (.Values.global.discovery.apiVersions | has "deckhouse.io/v1alpha1/SecurityPolicyException") (.Capabilities.APIVersions.Has "deckhouse.io/v1alpha1/SecurityPolicyException") }}
---
apiVersion: deckhouse.io/v1alpha1
kind: SecurityPolicyException
metadata:
  name: capdvp-controller-manager
  namespace: d8-cloud-provider-dvp
  {{- include "helm_lib_module_labels" (list . (dict "app" "capdvp-controller-manager")) | nindent 2 }}
spec:
  network:
    hostNetwork:
      allowedValue: true
      metadata:
        description: |
          Permit host networking for the Cluster API DVP (CAPDVP) controller manager.
          Host network is required to ensure the controller can operate before CNI is ready,
          expose the admission webhook, and maintain functionality even if the pod network fails,
          ensuring reliable cluster provisioning and node management operations.
{{- end }}