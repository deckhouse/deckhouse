apiVersion: v1
kind: Secret
metadata:
  name: validation-webhook-tls
  namespace: d8-cloud-provider-dvp
  {{- include "helm_lib_module_labels" (list . (dict "app" "validation-webhook")) | nindent 2 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.cloudProviderDvp.internal.validationWebhookCert.crt | b64enc | quote }}
  tls.key: {{ .Values.cloudProviderDvp.internal.validationWebhookCert.key | b64enc | quote }}
  ca.crt: {{ .Values.cloudProviderDvp.internal.validationWebhookCert.ca | b64enc | quote }}
