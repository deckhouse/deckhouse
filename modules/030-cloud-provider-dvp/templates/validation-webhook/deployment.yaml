{{- define "validation_webhook_resources" -}}
cpu: 25m
memory: 64Mi
{{- end -}}

{{- if .Values.global.clusterIsBootstrapped }}
{{- if (.Values.global.enabledModules | has "vertical-pod-autoscaler-crd") }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: validation-webhook
  namespace: d8-cloud-provider-dvp
  {{- include "helm_lib_module_labels" (list . (dict "app" "validation-webhook")) | nindent 2 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: validation-webhook
  updatePolicy:
    updateMode: InPlaceOrRecreate
  resourcePolicy:
    containerPolicies:
    - containerName: validation-webhook
      minAllowed:
        {{- include "validation_webhook_resources" . | nindent 8 }}
      maxAllowed:
        cpu: 100m
        memory: 128Mi
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: validation-webhook
  namespace: d8-cloud-provider-dvp
  {{- include "helm_lib_module_labels" (list . (dict "app" "validation-webhook")) | nindent 2 }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: validation-webhook
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: validation-webhook
  namespace: d8-cloud-provider-dvp
  {{- include "helm_lib_module_labels" (list . (dict "app" "validation-webhook")) | nindent 2 }}
spec:
  replicas: {{ include "helm_lib_is_ha_to_value" (list . 2 1) }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: validation-webhook
  template:
    metadata:
      labels:
        app: validation-webhook
      annotations:
        checksum/tls: {{ include (print $.Template.BasePath "/validation-webhook/secret-tls.yaml") . | sha256sum }}
    spec:
      serviceAccountName: validation-webhook
      {{- include "helm_lib_priority_class" (tuple . "system-cluster-critical") | nindent 6 }}
      {{- include "helm_lib_node_selector" (tuple . "master") | nindent 6 }}
      {{- include "helm_lib_tolerations" (tuple . "any-node") | nindent 6 }}
      {{- include "helm_lib_module_pod_security_context_run_as_user_deckhouse" . | nindent 6 }}
      containers:
        - name: validation-webhook
          image: {{ include "helm_lib_module_image" (list . "validationWebhook") }}
          imagePullPolicy: IfNotPresent
          {{- include "helm_lib_module_container_security_context_pss_restricted_flexible" dict | nindent 10 }}
          args:
            - --webhook-port=8443
            - --webhook-cert-dir=/tmp/k8s-webhook-server/serving-certs
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: https
              containerPort: 8443
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
              scheme: HTTP
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
              scheme: HTTP
          resources:
            requests:
              {{- include "helm_lib_module_ephemeral_storage_logs_with_extra" 10 | nindent 14 }}
              {{- if not (.Values.global.enabledModules | has "vertical-pod-autoscaler-crd") }}
              {{- include "validation_webhook_resources" . | nindent 14 }}
              {{- end }}
          volumeMounts:
            - name: cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
      volumes:
        - name: cert
          secret:
            secretName: validation-webhook-tls
{{- end }}
