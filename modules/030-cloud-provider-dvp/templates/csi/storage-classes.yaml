{{- range $index, $storageClass := .Values.cloudProviderDvp.internal.storageClasses }}
  {{- $scAnnotations := include "helm_lib_module_storage_class_annotations" (list $ $index $storageClass.name) | fromYaml }}
  {{- if ($.Values.global.enabledModules | has "snapshot-controller") }}
    {{- $_ := set $scAnnotations.annotations "storage.deckhouse.io/volumesnapshotclass" $.Chart.Name }}
  {{- end }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  {{- include "helm_lib_module_labels" (list $) | nindent 2 }}
  {{- $scAnnotations | toYaml | nindent 2 }}
  name: {{ $storageClass.name | quote }}
provisioner: csi.dvp.deckhouse.io
volumeBindingMode: {{ $storageClass.volumeBindingMode | quote }}
reclaimPolicy: {{ $storageClass.reclaimPolicy | quote }}
allowVolumeExpansion: {{ $storageClass.allowVolumeExpansion }}
parameters:
  dvpStorageClass: {{ $storageClass.dvpStorageClass | quote }}
{{- end }}
