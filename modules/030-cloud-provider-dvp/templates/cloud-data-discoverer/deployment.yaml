{{- define "dvp_cdd_pod_annotations" -}}
checksum/config: {{ printf "%s%s" (include (print $.Template.BasePath "/cloud-controller-manager/secret.yaml") . | toString) (include (print $.Template.BasePath "/registration.yaml") . | toString) | sha256sum }}
{{- end -}}

{{- define "dvp_cdd_envs" -}}
- name: DVP_KUBERNETES_CONFIG_BASE64
  valueFrom:
    secretKeyRef:
      name: dvp-credentials
      key: kubernetesConfigBase64
- name: DVP_NAMESPACE
  valueFrom:
    secretKeyRef:
      name: dvp-credentials
      key: namespace
{{- end -}}

{{- $cddConfig := dict -}}
{{- $_ := set $cddConfig "fullname" "cloud-data-discoverer" -}}
{{- $_ := set $cddConfig "image" (include "helm_lib_module_image" (list . "cloudDataDiscoverer")) -}}
{{- $_ := set $cddConfig "additionalEnv" (include "dvp_cdd_envs" . | fromYamlArray) -}}
{{- $_ := set $cddConfig "additionalPodAnnotations" (include "dvp_cdd_pod_annotations" . | fromYaml) -}}
{{- $_ := set $cddConfig "vpaEnabled" true -}}

{{- include "helm_lib_cloud_data_discoverer_manifests" (list . $cddConfig) }}
