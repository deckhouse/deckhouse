{{- define "dvp_ccm_args" -}}
- --cloud-provider=dvp
- --allow-untagged-cloud=true
- --configure-cloud-routes=false
- --controllers={{ .controllers }}
- --v=4
{{- end -}}

{{- define "dvp_ccm_pdb_annotations" -}}
checksum/config: {{ include (print $.Template.BasePath "/cloud-controller-manager/secret.yaml") . | sha256sum }}
{{- end -}}

{{- define "dvp_ccm_pod_annotations" -}}
checksum/config: {{ printf "%s%s" (include (print $.Template.BasePath "/registration.yaml") . | toString) (include (print $.Template.BasePath "/cloud-controller-manager/secret.yaml") . | toString) | sha256sum }}
{{- end -}}

{{- define "dvp_ccm_envs" -}}
- name: DVP_KUBERNETES_CONFIG_BASE64
  valueFrom:
    secretKeyRef:
      name: dvp-credentials
      key: kubernetesConfigBase64
- name: CLUSTER_UUID
  valueFrom:
    secretKeyRef:
      name: dvp-credentials
      key: clusterUUID
- name: DVP_NAMESPACE
  valueFrom:
    secretKeyRef:
      name: dvp-credentials
      key: namespace
{{- end -}}

{{- $ccmEnabledControllers := "cloud-node,cloud-node-lifecycle" -}}
{{- if hasKey .Values.cloudProviderDvp.internal.discoveryData "loadBalancer" -}}
  {{- if hasKey .Values.cloudProviderDvp.internal.discoveryData.loadBalancer "enabled" -}}
    {{- if .Values.cloudProviderDvp.internal.discoveryData.loadBalancer.enabled -}}
      {{- $ccmEnabledControllers = printf "%s,service-lb-controller" $ccmEnabledControllers -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- $ccmConfig := dict -}}
{{- $_ := set $ccmConfig "fullname" "cloud-controller-manager" -}}
{{- $_ := set $ccmConfig "image" (include "helm_lib_module_image" (list . "cloudControllerManager")) -}}
{{- $_ := set $ccmConfig "containerName" "dvp-cloud-controller-manager" -}}
{{- $_ := set $ccmConfig "additionalArgs" (include "dvp_ccm_args" (dict "controllers" $ccmEnabledControllers) | fromYamlArray) -}}
{{- $_ := set $ccmConfig "additionalEnvs" (include "dvp_ccm_envs" . | fromYamlArray) -}}
{{- $_ := set $ccmConfig "additionalPodAnnotations" (include "dvp_ccm_pod_annotations" . | fromYaml) -}}
{{- $_ := set $ccmConfig "additionalPDBAnnotations" (include "dvp_ccm_pdb_annotations" . | fromYaml) -}}
{{- $_ := set $ccmConfig "vpaEnabled" true -}}
{{- $_ := set $ccmConfig "securityPolicyExceptionEnabled" true -}}

{{- include "helm_lib_cloud_controller_manager_manifests" (list . $ccmConfig) }}
