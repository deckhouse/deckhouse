---
image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: base/distroless
final: true
fromCacheVersion: "2025-05-21.7"
import:
  - image: {{ .ModuleName }}/{{ .ImageName }}-build-artifact
    add: /src/monitoring-ping
    to: /monitoring-ping
    before: setup
  - image: {{ .ModuleName }}/{{ .ImageName }}-setcap-static-artifact
    add: /src/libcap/progs/setcap
    to: /tools/setcap
    before: setup
shell:
  setup:
  - /tools/setcap cap_net_raw=+eip /monitoring-ping # Need for run icmp ping from non root user
imageSpec:
  config:
    workingDir: /tools
    clearWorkingDir: true
    entrypoint: ["/monitoring-ping"]
    
---
image: {{ .ModuleName }}/{{ .ImageName }}-build-artifact
fromImage: builder/golang-alpine-1.23
fromCacheVersion: "2025-05-21.3"
final: false
import:
  - image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
    add: /src
    to: /src
    before: install
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  beforeInstall:
  {{- include "alpine packages proxy" . | nindent 2 }}
  - apk add --no-cache bash git binutils
  install:
  - cd /src
  - GOPROXY=$(cat /run/secrets/GOPROXY) go mod download
  setup:
  - cd /src
  - export GO_VERSION=${GOLANG_VERSION} GOPROXY={{ .GOPROXY }} CGO_ENABLED=0 GOOS=linux GOARCH=amd64
  - go build -ldflags="-s -w" -o /src/monitoring-ping
  - chmod 0755 /src/monitoring-ping # change to 0500 after removed init container
  - chown 64535:64535 /src/monitoring-ping
---
image: {{ .ModuleName }}/{{ .ImageName }}-src-artifact
fromImage: common/src-artifact
fromCacheVersion: "2025-05-21.1"
final: false
git:
  - add: /{{ $.ModulePath }}modules/{{ $.ModulePriority }}-{{ $.ModuleName }}/images/{{ $.ImageName }}/src
    to: /src
    stageDependencies:
      install:
        - "**/*"
shell:
  install:
    - cd /src
---
image: {{ .ModuleName }}/{{ .ImageName }}-setcap-static-artifact
fromImage: builder/alpine-3.20
final: false
shell:
  beforeInstall:
  {{- include "alpine packages proxy" . | nindent 2 }}
  - apk add --no-cache gcc musl-dev make linux-headers git
  - mkdir /src
  install:
  - cd /src
  - git clone https://kernel.googlesource.com/pub/scm/libs/libcap/libcap.git
  setup:
  - cd /src/libcap
  - make -C libcap CFLAGS="-static -O2" LDFLAGS="-static" libcap.a # build static lib
  - gcc -static -O2 -Dlinux -D_LARGEFILE64_SOURCE -D_FILE_OFFSET_BITS=64 -I./libcap/include progs/setcap.c -o progs/setcap libcap/libcap.a # build static setcap

