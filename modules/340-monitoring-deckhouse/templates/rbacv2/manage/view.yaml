apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:manage:capability:module:monitoring-deckhouse:view
  labels:
    heritage: deckhouse
    module: monitoring-deckhouse
    rbac.deckhouse.io/aggregate-to-infrastructure: "true"
    rbac.deckhouse.io/aggregate-to-role: viewer
    rbac.deckhouse.io/kind: manage
rules:
  - apiGroups:
      - deckhouse.io
    resourceNames:
      - monitoring-deckhouse
    resources:
      - moduleconfigs
    verbs:
      - get
      - list
      - watch