apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:manage:capability:module:monitoring-deckhouse:edit
  labels:
    heritage: deckhouse
    module: monitoring-deckhouse
    rbac.deckhouse.io/aggregate-to-infrastructure: "true"
    rbac.deckhouse.io/aggregate-to-role: manager
    rbac.deckhouse.io/kind: manage
rules:
  - apiGroups:
      - deckhouse.io
    resourceNames:
      - monitoring-deckhouse
    resources:
      - moduleconfigs
    verbs:
      - create
      - update
      - patch
      - delete