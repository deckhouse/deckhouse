{{- if not (.Values.ingressNginx.internal.legacyKruiseManagementEnabled | default false) }}
{{- if (.Values.global.enabledModules | has "vertical-pod-autoscaler") }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: ingress-nginx-manager
  namespace: d8-ingress-nginx
  {{- include "helm_lib_module_labels" (list . (dict "app" "ingress-nginx-manager" "component" "controller-manager")) | nindent 2 }}
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: ingress-nginx-manager
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
  resourcePolicy:
    containerPolicies:
    - containerName: manager
      minAllowed:
        cpu: 50m
        memory: 64Mi
      maxAllowed:
        cpu: 200m
        memory: 256Mi
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ingress-nginx-manager
  namespace: d8-ingress-nginx
  {{- include "helm_lib_module_labels" (list . (dict "app" "ingress-nginx-manager" "component" "controller-manager")) | nindent 2 }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: ingress-nginx-manager
      component: controller-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-nginx-manager
  namespace: d8-ingress-nginx
  {{- include "helm_lib_module_labels" (list . (dict "app" "ingress-nginx-manager" "component" "controller-manager")) | nindent 2 }}
spec:
  {{- include "helm_lib_deployment_on_master_strategy_and_replicas_for_ha" . | nindent 2 }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: ingress-nginx-manager
      component: controller-manager
  template:
    metadata:
      labels:
        app: ingress-nginx-manager
        component: controller-manager
    spec:
      {{- include "helm_lib_tolerations" (tuple . "any-node") | nindent 6 }}
      {{- include "helm_lib_node_selector" (tuple . "master") | nindent 6 }}
      {{- include "helm_lib_priority_class" (tuple . "system-cluster-critical") | nindent 6 }}
      {{- include "helm_lib_pod_affinity" (list . (dict "app" "ingress-nginx-manager" "component" "controller-manager") (list "amd64")) | nindent 6 }}
      {{- include "helm_lib_module_pod_security_context_run_as_user_deckhouse" . | nindent 6 }}
      automountServiceAccountToken: true
      serviceAccountName: manager
      imagePullSecrets:
      - name: deckhouse-registry
      terminationGracePeriodSeconds: 30
      containers:
      - name: manager
        image: {{ include "helm_lib_module_image" (list . "manager") }}
        imagePullPolicy: IfNotPresent
        {{- include "helm_lib_module_container_security_context_read_only_root_filesystem_capabilities_drop_all" . | nindent 8 }}
        ports:
        - containerPort: 8080
          name: metrics
        - containerPort: 8081
          name: health
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
        volumeMounts:
        - mountPath: /tmp
          name: tmp
        resources:
          requests:
            {{- include "helm_lib_module_ephemeral_storage_logs_with_extra" 10 | nindent 12 }}
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi
      volumes:
      - name: tmp
        emptyDir: {}
{{- end }}
