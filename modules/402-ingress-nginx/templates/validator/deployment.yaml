{{- define "ingress-validator" }}
{{- $context := index . 0 }}
{{- $crd := index . 1 }}
{{- $name := index . 2 }}
{{- $geoIP2 := $crd.spec.geoIP2 | default dict }}
{{- $geoproxyReady := $context.Values.ingressNginx.internal.geoproxyReady | default false }}
{{- $checksum := toJson $crd | sha256sum }}
{{- $controllerVersion := $crd.spec.controllerVersion | default $context.Values.ingressNginx.defaultControllerVersion }}
{{- $resourcesManagement := $crd.spec.resourcesManagement | default dict }}
{{- $validationIsolationMode := $crd.spec.validationIsolationMode | default "NoIsolation" }}
{{- $validationIsolationSupported := or (eq $controllerVersion "1.14") (eq $controllerVersion "1.15") }}
{{- $validationIsolationEnabled := and $validationIsolationSupported (not (eq $validationIsolationMode "NoIsolation")) }}
{{- $validatorServiceAccountName := "validator" }}
{{- if $validationIsolationEnabled }}
  {{- $validatorServiceAccountName = "validator-full" }}
{{- end }}
{{- $logLevels := dict "Error" 0 "Warn" 1 "Info" 2 "Extended" 3 "Debug" 4 "Trace" 5 }}

{{- if ( $context.Values.global.enabledModules | has "vertical-pod-autoscaler") }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: validator-{{ $name }}
  namespace: d8-ingress-nginx
{{ include "helm_lib_module_labels" (list $context (dict "app" "validator" "name" $name)) | nindent 2 }}
spec:
  {{- include "helm_lib_resources_management_vpa_spec"  (list "apps/v1" "Deployment" (printf "validator-%s" $name | quote) "validator" $resourcesManagement ) | nindent 2}}
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: validator-{{ $name }}
  namespace: d8-ingress-nginx
  {{ include "helm_lib_module_labels" (list $context (dict "app" "validator" "name" $name)) | nindent 2 }}
spec:
  minAvailable: {{ include "helm_lib_is_ha_to_value" (list $context 1 0) }}
  selector:
    matchLabels:
      app: validator
      name: {{ $name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: validator-{{ $name }}
  namespace: d8-ingress-nginx
  {{ include "helm_lib_module_labels" (list $context (dict "app" "validator" "name" $name)) | nindent 2 }}
  annotations:
    ingress-nginx-controller.deckhouse.io/validator-version: {{ $controllerVersion | quote }}
    ingress-nginx-controller.deckhouse.io/checksum: {{ $checksum }}
spec:
  {{- include "helm_lib_deployment_on_master_strategy_and_replicas_for_ha" $context | nindent 2 }}
  selector:
    matchLabels:
      app: validator
      name: {{ $name }}
  template:
    metadata:
      labels:
        app: validator
        name: {{ $name }}
    spec:
      {{- include "helm_lib_node_selector" (tuple $context "master") | nindent 6 }}
      {{- include "helm_lib_tolerations" (tuple $context "any-node") | nindent 6 }}
      {{- include "helm_lib_priority_class" (tuple $context "system-cluster-critical") | nindent 6 }}
      {{- include "helm_lib_pod_affinity" (list $context (dict "app" "validator" "name" $name ) (list "amd64")) | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 64535
        runAsGroup: 64535
      {{- if eq $validationIsolationMode "IsolatedProcess" }}
        sysctls:
        - name: net.ipv4.ip_unprivileged_port_start
          value: "0"
      {{- end }}
      serviceAccountName: {{ $validatorServiceAccountName }}
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 420
      imagePullSecrets:
      - name: deckhouse-registry
      initContainers:
      - image: {{ include "helm_lib_module_image" (list $context "init") }}
        name: init
        {{- include "helm_lib_module_container_security_context_read_only_root_filesystem_capabilities_drop_all" . | nindent 8 }}
        volumeMounts:
        {{- if $validationIsolationEnabled }}
        - mountPath: /etc/ingress-controller
        {{- else }}
        - mountPath: /chroot/etc/ingress-controller
        {{- end }}
          name: etc-ingress-controller
        - mountPath: /chroot/tmp
          name: tmp
        {{- if $validationIsolationEnabled }}
        - mountPath: /validation-chroot/tmp
          name: validation-tmp
        {{- end }}
        - mountPath: /chroot/var/lib/nginx
          name: var-lib-nginx
        - mountPath: /chroot/var/log/nginx
          name: var-log-nginx
        command:
        - /bin/bash
        - -ec
        - |
          mkdir -vp /chroot/var/lib/nginx/body /chroot/var/lib/nginx/fastcgi /chroot/var/lib/nginx/proxy \
            /chroot/var/lib/nginx/scgi /chroot/var/lib/nginx/uwsgi \
        {{- if $validationIsolationEnabled }}
            /etc/ingress-controller/ssl /etc/ingress-controller/lua /etc/ingress-controller/nginx \
            /etc/ingress-controller/resolv /etc/ingress-controller/geoip \
            /etc/ingress-controller/auth /etc/ingress-controller/telemetry \
            /validation-chroot/tmp/nginx \
        {{- else }}
            /chroot/etc/ingress-controller/ssl /chroot/etc/ingress-controller/lua /chroot/etc/ingress-controller/nginx \
            /chroot/etc/ingress-controller/resolv /chroot/etc/ingress-controller/geoip \
            /chroot/etc/ingress-controller/auth /chroot/etc/ingress-controller/telemetry \
        {{- end }}
            /chroot/tmp/nginx
          /usr/bin/touch /chroot/var/log/nginx/access.log
        {{- if $validationIsolationEnabled }}
          echo -e 'pid /tmp/nginx/nginx.pid;\nerror_log stderr;\nevents {}\nhttp {}\ndaemon off;' > /etc/ingress-controller/nginx/nginx.conf
        {{- else }}
          echo -e 'pid /tmp/nginx/nginx.pid;\nerror_log stderr;\nevents {}\nhttp {}\ndaemon off;' > /chroot/etc/ingress-controller/nginx/nginx.conf
        {{- end }}
        resources:
          requests:
            {{- include "helm_lib_module_ephemeral_storage_logs_with_extra" 10 | nindent 12 }}
        {{- if not ( $context.Values.global.enabledModules | has "vertical-pod-autoscaler") }}
            {{- include "init_resources" $context | nindent 12 }}
        {{- end }}
      containers:
      - name: validator
        image: {{ include "helm_lib_module_image" (list $context (printf "controller%s" ($controllerVersion | replace "." ""))) }}
        securityContext:
          seccompProfile:
            type: Unconfined
          readOnlyRootFilesystem: true
          capabilities:
            add:
            - SYS_CHROOT
            - NET_BIND_SERVICE
            drop:
            - ALL
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_IP
            value: "127.0.0.1"
          {{- if $validationIsolationEnabled }}
          - name: VALIDATION_ISOLATION_MODE
            value: {{ $validationIsolationMode | quote }}
          {{- end }}
          {{- if $geoIP2 }}
          - name: LUA_USE_GEOIP2
            value: "true"
          {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 10254
          initialDelaySeconds: 30
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 10254
          initialDelaySeconds: 10
          periodSeconds: 2
          timeoutSeconds: 5
        args:
          - /nginx-ingress-controller
          - --configmap=$(POD_NAMESPACE)/{{ $name }}-config
          - --v={{ get $logLevels (default "Info" $crd.spec.controllerLogLevel) }}
          - --healthz-port=10254
          - --healthz-host=0.0.0.0
          {{- if $geoIP2 }}
            {{- if $geoproxyReady }}
          - --maxmind-mirror=https://geoproxy:4250/download
          - --maxmind-skip-tls-verification=true
          - --maxmind-retries-count=5
          - --maxmind-retries-timeout=15s
              {{- if $geoIP2.maxmindEditionIDs }}
          - --maxmind-edition-ids={{ $geoIP2.maxmindEditionIDs | join "," }}
              {{- end }}
            {{- else }}
              {{- if $geoIP2.maxmindLicenseKey }}
          - --maxmind-license-key={{ $geoIP2.maxmindLicenseKey }}
              {{- end }}
              {{- if $geoIP2.maxmindEditionIDs }}
          - --maxmind-edition-ids={{ $geoIP2.maxmindEditionIDs | join "," }}
              {{- end }}
            {{- end }}
          {{- end }}
          - --validating-webhook=:8443
          - --validating-webhook-certificate=/etc/nginx/webhook-ssl/tls.crt
          - --validating-webhook-key=/etc/nginx/webhook-ssl/tls.key
          {{- if not $validationIsolationEnabled }}
          - --watch-namespace=d8-ingress-nginx
          {{- else }}
          - --controller-class={{ printf "ingress-nginx.deckhouse.io/%s" $crd.spec.ingressClass }}
          {{- end }}
          - --update-status=false
          - --update-status-on-shutdown=false
        lifecycle:
          preStop:
            exec:
              command: ["/wait-shutdown"]
        resources:
          requests:
            {{- include "helm_lib_module_ephemeral_storage_logs_with_extra" 100 | nindent 12 }}
            {{- if eq ($resourcesManagement.mode | default "") "Static" }}
            {{- $resourcesManagementStatic := $resourcesManagement.static | default dict }}
            {{- $requests := $resourcesManagementStatic.requests | default dict }}
            cpu: {{ $requests.cpu | default "350m" | quote }}
            memory: {{ $requests.memory | default "500Mi" | quote }}
            {{- $limits := $resourcesManagementStatic.limits | default dict }}
            {{- if $limits }}
          limits:
              {{- range $resource, $limit := $limits }}
            {{ $resource }}: {{ $limit | quote }}
              {{- end }}
            {{- end }}
            {{- end }}
        ports:
          - name: webhook
            containerPort: 8443
            protocol: TCP
        volumeMounts:
        {{- if $validationIsolationEnabled }}
        - mountPath: /validation-chroot/tmp
          name: validation-tmp
        - mountPath: /validation-chroot/etc/ingress-controller
          name: etc-ingress-controller
          readOnly: true
        - mountPath: /validation-chroot/etc/nginx/ssl/
          name: secret-nginx-auth-tls
          readOnly: true
        {{- end }}
        - mountPath: /chroot/etc/nginx/ssl/
          name: secret-nginx-auth-tls
          readOnly: true
        - mountPath: /chroot/etc/ingress-controller
          name: etc-ingress-controller
          readOnly: true
        - mountPath: /etc/ingress-controller
          name: etc-ingress-controller
        - mountPath: /etc/nginx/ssl/
          name: secret-nginx-auth-tls
          readOnly: true
        - name: webhook-cert
          mountPath: /chroot/etc/nginx/webhook-ssl/
          readOnly: true
        - mountPath: /chroot/tmp
          name: tmp
        - mountPath: /chroot/var/lib/nginx
          name: var-lib-nginx
        - mountPath: /chroot/var/log/nginx
          name: var-log-nginx
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if $validationIsolationEnabled }}
        - name: validation-tmp
          emptyDir: {}
        {{- end }}
        - name: etc-ingress-controller
          emptyDir: {}
        - name: var-lib-nginx
          emptyDir: {}
        - name: var-log-nginx
          emptyDir: {}
        - name: secret-nginx-auth-tls
          secret:
            secretName: ingress-nginx-{{ $crd.name }}-auth-tls
        - name: webhook-cert
          secret:
            secretName: ingress-admission-certificate
{{- end }}

{{- $context := . }}
{{- range $crd := $context.Values.ingressNginx.internal.ingressControllers }}
  {{- if $crd.spec.validationEnabled }}
  {{ include "ingress-validator" (list $context $crd $crd.name) }}
  {{- end }}
{{- end }}
