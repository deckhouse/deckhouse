{{/* OpenKruise does not allow configuring of custom certificates and controls them internally */}}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: kruise-mutating-webhook-configuration
  {{- include "helm_lib_module_labels" (list . ) | nindent 2 }}
  annotations:
    template: ""
    # state=present (not ready): OpenKruise's controller injects the caBundle into this
    # object at startup and refuses to become ready until the object already exists
    # (webhook_controller sync -> configuration.Ensure -> Get). A state=ready dependency
    # on kruise-controller-manager would therefore deadlock (object waits for the pod,
    # pod waits for the object). state=present breaks the cycle while keeping ordering.
    werf.io/deploy-dependency-deployment: state=present,kind=Deployment,name=kruise-controller-manager,namespace=d8-ingress-nginx
    werf.io/deploy-dependency-service: state=present,kind=Service,name=kruise-webhook-service,namespace=d8-ingress-nginx
webhooks:
  - clientConfig:
      service:
        name: kruise-webhook-service
        namespace: d8-ingress-nginx
        path: /mutate-apps-kruise-io-v1alpha1-daemonset
    failurePolicy: Fail
    admissionReviewVersions:
      - v1
    sideEffects: None
    timeoutSeconds: 28
    name: mdaemonset.kb.io
    rules:
      - apiGroups:
          - apps.kruise.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - daemonsets
  - clientConfig:
      service:
        name: kruise-webhook-service
        namespace: d8-ingress-nginx
        path: /mutate-pod
    failurePolicy: Ignore
    admissionReviewVersions:
      - v1
    sideEffects: None
    timeoutSeconds: 28
    name: mpod.kb.io
    namespaceSelector:
      matchExpressions:
        - key: control-plane
          operator: DoesNotExist
    rules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
        resources:
          - pods
---
# Source: kruise/templates/webhookconfiguration.yaml
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: kruise-validating-webhook-configuration
  {{- include "helm_lib_module_labels" (list . ) | nindent 2 }}
  annotations:
    template: ""
    # state=present (not ready): see the MutatingWebhookConfiguration above — kruise
    # self-injects the caBundle and needs this object to pre-exist, so a state=ready
    # dependency on its own controller would deadlock.
    werf.io/deploy-dependency-deployment: state=present,kind=Deployment,name=kruise-controller-manager,namespace=d8-ingress-nginx
    werf.io/deploy-dependency-service: state=present,kind=Service,name=kruise-webhook-service,namespace=d8-ingress-nginx
webhooks:
  - clientConfig:
      service:
        name: kruise-webhook-service
        namespace: d8-ingress-nginx
        path: /validate-apps-kruise-io-v1alpha1-daemonset
    failurePolicy: Fail
    admissionReviewVersions:
      - v1
    sideEffects: None
    timeoutSeconds: 28
    name: vdaemonset.kb.io
    rules:
      - apiGroups:
          - apps.kruise.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - daemonsets
