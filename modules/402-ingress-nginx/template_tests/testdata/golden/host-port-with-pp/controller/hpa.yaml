---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    component: rules
    heritage: deckhouse
    module: ingress-nginx
    prometheus: main
  name: prometheus-metrics-adapter-d8-ingress-nginx-cpu-utilization-for-hpa
  namespace: d8-monitoring
spec:
  groups:
  - name: prometheus-metrics-adapter.d8-ingress-nginx
    rules:
    - expr: avg by (controller_name) (sum by (pod, controller_name) (kube_controller_pod{controller_type="DaemonSet",
        namespace="d8-ingress-nginx"} * on (pod) group_right(controller_name) (rate(container_cpu_usage_seconds_total{source="deckhouse",
        namespace="d8-ingress-nginx", container!="POD"}[3m]) * 100)))
      record: kube_adapter_metric_d8_ingress_nginx_ds_cpu_utilization
