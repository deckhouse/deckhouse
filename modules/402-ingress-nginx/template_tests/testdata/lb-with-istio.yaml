apiVersion: deckhouse.io/v2
kind: IngressNginxController
metadata:
  name: test
spec:
  config:
    use-proxy-protocol: true
    load-balance: ewma
  ingressClass: nginx
  additionalLogFields:
    my-cookie: "$cookie_MY_COOKIE"
  validationEnabled: true
  controllerVersion: "1.10"
  inlet: LoadBalancer
  hsts: true
  hstsOptions:
    maxAge: "123456789123456789"
  resourcesManagement:
    mode: Static
    static:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 100m
  loadBalancer:
    annotations:
      my: annotation
      second: true
    sourceRanges:
      - 1.1.1.1
      - 2.2.2.2
    acceptClientIPHeadersFrom:
    - 0.0.0.0/0
  maxReplicas: 6
  minReplicas: 2
