                                Maximum value of allowed memory requests to be submitted by the VPA.
                              default: '2000Mi'
                              type: string
                            min:
                              description: |
                                Minimum value of allowed memory requests to be submitted by the VPA.
                              default: '500Mi'
                              type: string
                            limitRatio:
                              type: number
                              description: |
                                The memory limits/requests ratio.

                                If set, the limits are calculated based on the requests and the specified ratio.
                    static:
                      type: object
                      description: |
                        Static management mode parameters.
                      properties:
                        cpu:
                          type: string
                          description: |
                            Value for CPU requests.
                          default: '350m'
                        memory:
                          type: string
                          description: |
                            Value for memory requests.
                          default: '500Mi'
                        limits:
                          type: object
                          description: |
                            Resource limits.
                          properties:
                            cpu:
                              type: string
                              description: |
                                CPU limits.
                            memory:
                              type: string
                              description: |
                                Memory limits.
                customErrors:
                  type: object
                  description: |
                    Section with parameters for HTTP error customization.

                    > If this section is defined in the configuration, all its parameters are required.
                    >
                    > Changing any parameter causes the restart of all Ingress NGINX Controllers.
                  required: ['namespace', 'serviceName', 'codes']
                  properties:
                    serviceName:
                      type: string
                      description: |
                        Name of a service to be used as a default custom backend.
                      x-doc-examples: ['custom-errors-backend-service']
                    namespace:
                      type: string
                      description: |
                        Name of a namespace keeping the service used as a default custom backend.
                      x-doc-examples: ['default']
                    codes:
                      type: array
                      description: |
                        List of response codes (array) causing redirection to the custom backend.
                      items:
                        type: string
                        name: 'Error code.'
                        pattern: '^[1-5][0-9][0-9]$'
                underscoresInHeaders:
                  type: boolean
                  description: |
                    Enables using the underscore symbol in headers.

                    Related resources:

                    - [On using the underscores in headers](https://nginx.org/en/docs/http/ngx_http_core_module.html#underscores_in_headers).
                    - [Why you should be careful when enabling underscores in headers](https://docs.nginx.com/#missing-disappearing-http-headers).
                  default: false
                minReplicas:
                  type: integer
                  description: |
                    Minimum number of `LoadBalancer`, `LoadBalancerWithProxyProtocol` and `LoadBalancerWithSSLPassthrough` replicas for HPA.
                  default: 1
                  minimum: 1
                maxReplicas:
                  type: integer
                  description: |
                    Maximum number of `LoadBalancer`, `LoadBalancerWithProxyProtocol` and `LoadBalancerWithSSLPassthrough` replicas for HPA.
                  default: 1
                  minimum: 1
                defaultSSLCertificate:
                  description: |
                    The certificate that is used:

                    - For `catch-all` server requests (here, "catch-all server" refers to the [nginx server directive](https://nginx.org/en/docs/http/ngx_http_core_module.html#server). Requests without a corresponding Ingress resource end up on the `catch-all` server.
                    - For Ingress resources that do not have a `secretName` specified in the `tls` section.

                    By default, a self-signed certificate is used.

                    > **Caution.** This parameter does not affect certificates used in the Ingress resources of the Deckhouse modules. To specify the certificate to use in the Ingress resources of Deckhouse modules, use the global parameter [`modules.https.customCertificate`](/products/kubernetes-platform/documentation/v1/reference/api/global.html#parameters-modules-https-customcertificate).
                  type: object
                  properties:
                    secretRef:
                      description: |
                        Link to the Secret for passing to the Ingress controller.
                      type: object
                      properties:
                        name:
                          description: |
                            Name of Secret containing the SSL certificate.
                          type: string
                          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$'
                        namespace:
                          description: |
                            Name of the namespace containing the Secret with the SSL certificate.
                          default: d8-ingress-nginx
                          type: string
                          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
                controllerPodsAdditionalAnnotations:
                  type: object
                  description: |
                    Additional custom annotations for Ingress controller pods.

                    > Be careful when using this parameter, as backward compatibility or stability of the target Ingress controller are not guaranteed.
                  additionalProperties:
                    type: string
                  x-kubernetes-validations:
                    - rule: self.all(k, !k.matches('(^|\\.)deckhouse\\.io/'))
                      message: "Annotations with 'deckhouse.io' as a domain suffix are not allowed."
                    - rule: self.all(k, !k.matches('(^|\\.)istio\\.io/'))
                      message: "Annotations with 'istio.io' as a domain suffix are not allowed."
                    - rule: self.all(k, !k.matches('(^|\\.)kubernetes\\.io/'))
                      message: "Annotations with 'kubernetes.io' as a domain suffix are not allowed."
                controllerLogLevel:
                  type: string
                  description: Defines the verbosity level for the Ingress controller logs.
                  enum:
                    - Error
                    - Warn
                    - Info
                    - Extended
                    - Debug
                    - Trace
                  default: Info
                  x-enum-descriptions:
                    - "Only critical errors will be logged."
                    - "Warnings and errors will be logged."
                    - "Informational messages, including basic debugging information."
                    - "Extended information about changes in system state."
                    - "Verbose debugging output, potentially very noisy."
                    - "Trace-level logs with detailed step-by-step context."
                nginxProfilingEnabled:
                  type: boolean
                  description: |
                    Enables NGINX profiling using Valgrind.
                    A memory analysis report is saved to the `/var/log/valgrind` directory on the host.
                    When enabled, Valgrind creates a file named `memcheck.${timestamp}.log`.

                    After debugging is complete, don't forget to disable profiling mode!

                    The report contains information about the process behavior, including potential memory leaks.

                    > **Caution**. Enabling this option significantly increases memory usage and slows down HTTP/HTTPS request handling by the NGINX process.

                    > **Be aware.** When the option is enabled, the ingress-nginx controller pod starts in privileged mode.
              oneOf:
                - properties:
                    inlet:
                      enum: ['LoadBalancer']
                    loadBalancer: {}
                - properties:
                    inlet:
                      enum: ['LoadBalancerWithProxyProtocol']
                    loadBalancerWithProxyProtocol: {}
                - properties:
                    inlet:
                      enum: ['LoadBalancerWithSSLPassthrough']
                    loadBalancerWithSSLPassthrough: {}
                - properties:
                    inlet:
                      enum: ['HostPort']
                    hostPort: {}
                  required: ['hostPort']
                - properties:
                    inlet:
                      enum: ['HostPortWithProxyProtocol']
                    hostPortWithProxyProtocol: {}
                  required: ['hostPortWithProxyProtocol']
                - properties:
                    inlet:
                      enum: [ 'HostPortWithSSLPassthrough' ]
                    hostPortWithSSLPassthrough: { }
                  required: [ 'hostPortWithSSLPassthrough' ]
                - properties:
                    inlet:
                      enum: ['HostWithFailover']
                    hostWithFailover: {}
              x-kubernetes-validations:
                - message: .spec.enableHTTP3 cannot be enabled when inlet is HostPortWithProxyProtocol or LoadBalancerWithProxyProtocol
                  rule: "!((has(self.enableHTTP3) && self.enableHTTP3 == true) && self.inlet in ['HostPortWithProxyProtocol', 'LoadBalancerWithProxyProtocol'])"
                - message: '"enableIstioSidecar" cannot be enabled when "inlet" is "HostWithFailover".'
                  rule: "!((has(self.enableIstioSidecar) && self.enableIstioSidecar == true) && self.inlet == 'HostWithFailover')"
                - message: .spec.nginxProfilingEnabled experimental option available only in version 1.10
                  rule: "!has(self.nginxProfilingEnabled) || !self.nginxProfilingEnabled || (self.controllerVersion in ['1.10'])"
                - message: .spec.validationSandboxMode values "Standard" and "Full" are available only in version 1.14
                  rule: "!has(self.validationSandboxMode) || self.validationSandboxMode in ['Disabled'] || (has(self.controllerVersion) && self.controllerVersion in ['1.14'])"
      additionalPrinterColumns:
        - jsonPath: .spec.ingressClass
          name: Ingress Class
          description: 'Name of served ingress class.'
          type: string
        - jsonPath: .spec.inlet
          name: Inlet
          description: 'The way traffic goes to current Ingress Controller from the outer network.'
          type: string
        - jsonPath: .spec.controllerVersion
          name: Controller Version
          description: 'Current Ingress NGINX Controller version.'
          type: string
        - jsonPath: .status.loadBalancer.ip
          name: IP
          description: 'Current Ingress NGINX Controller LoadBalancer IP'
          type: string
        - jsonPath: .status.loadBalancer.hostname
          name: Hostname
          description: 'Current Ingress NGINX Controller LoadBalancer hostname'
          type: string
