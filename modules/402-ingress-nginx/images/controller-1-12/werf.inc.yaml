---
image: {{ $.ModuleName }}/{{ $.ImageName }}-nginx-artifact
fromImage: builder/alpine
fromCacheVersion: "2025-08-04.03"
final: false
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src/ingress-nginx/images/nginx/rootfs/
  to: /
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src/rootfs/etc
  to: /src/etc
  before: install
secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  beforeInstall:
  {{- include "alpine packages proxy" . | nindent 2 }}
  - apk add --no-cache build-base linux-headers autoconf automake g++ cmake bison libtool flex pkgconf pkgconfig make gcc clang
  - apk add --no-cache git openssh-client bash
  - mkdir -p ~/.ssh/
  - echo "StrictHostKeyChecking accept-new" > ~/.ssh/config
  install: # FIXME libs!
  - apk add libc-dev
  - apk add openssl-dev
  - apk add pcre-dev
  - apk add zlib-dev
  - apk add libxslt-dev
  - apk add gd-dev
  - apk add perl-dev
  - apk add libedit-dev
  - apk add libaio-dev
  - apk add curl-dev
  - apk add libmaxminddb-dev
  - apk add yajl-dev lmdb-dev
  # - apk add libxml2-dev
  - apk add gtest-dev
  # - apk add c-ares-dev
  - apk add re2-dev
  - apk add grpc-dev
  - apk add protobuf-dev

  - apk add doxygen
  - apk add mercurial
  - apk add alpine-sdk
  - apk add findutils
  - apk add curl
  - apk add ca-certificates
  # - apk add patch
  # - apk add openssl
  - apk add util-linux
  - apk add lmdb-tools
  - apk add wget
  - apk add libprotobuf
  # - apk add libxml2
  # - apk add python3
  - apk add bc
  - apk add unzip
  - apk add dos2unix
  - apk add yaml-cpp
  - apk add coreutils
  - apk add ninja
  beforeSetup:
  # Add deckhouse user
  - echo "deckhouse:x:64535:64535:deckhouse:/:/sbin/nologin" >> /etc/passwd
  - echo "deckhouse:x:64535:" >> /etc/group
  - echo "deckhouse:!::0:::::" >> /etc/shadow
  #
  - export SOURCE_REPO=$(cat /run/secrets/SOURCE_REPO)
  - export CONTROLLER_BRANCH={{ $controllerBranch }}
  - git config --global url."${SOURCE_REPO}".insteadOf https://github.com
  - cp -R /src/etc/* /etc/
  - /build.sh
  setup:
  # Source: chroot.sh
  - |
    bash -eu -c '
    writeDirs=(
      /chroot/etc/nginx
      /chroot/usr/local
      /chroot/etc/ingress-controller
      /chroot/etc/ingress-controller/ssl
      /chroot/etc/ingress-controller/auth
      /chroot/etc/ingress-controller/telemetry
      /chroot/etc/ingress-controller/geoip
      /chroot/opt/modsecurity/var/log
      /chroot/opt/modsecurity/var/upload
      /chroot/opt/modsecurity/var/audit
      /chroot/var/log/audit
      /chroot/var/lib/nginx
      /chroot/var/log/nginx
      /chroot/var/lib/nginx/body
      /chroot/var/lib/nginx/fastcgi
      /chroot/var/lib/nginx/proxy
      /chroot/var/lib/nginx/scgi
      /chroot/var/lib/nginx/uwsgi
      /chroot/tmp/nginx
    );
    for dir in "${writeDirs[@]}"; do
      mkdir -p ${dir};
      chown -R deckhouse:deckhouse ${dir};
    done'
  # Create opentelemetry.toml file as it doesn't present in controller_image
  - mkdir -p /etc/nginx && touch /etc/nginx/opentelemetry.toml
  - mkdir -p /etc/ingress-controller/telemetry && touch /etc/ingress-controller/telemetry/opentelemetry.toml
  - chown -R deckhouse:deckhouse /etc/nginx/opentelemetry.toml /etc/ingress-controller/telemetry/opentelemetry.toml
  #
  - mkdir -p  /chroot/lib /chroot/proc /chroot/usr /chroot/bin /chroot/dev /chroot/run
  - cp /etc/passwd /etc/group /etc/hosts /chroot/etc/
  - cp -a /usr/* /chroot/usr/
  - cp -a /etc/nginx/* /chroot/etc/nginx/
  - cp -a /etc/ingress-controller/* /chroot/etc/ingress-controller/
  - cp /lib/ld-musl-* /chroot/lib/
  - cp /usr/lib/libcrypto* /usr/lib/libssl* /usr/lib/libz* /chroot/usr/lib/
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-chroot-artifact
fromImage: builder/alpine
fromCacheVersion: "2025-08-04.05"
final: false
mount:
- from: build_dir
  to: /tmp/apps
import:
- image: tools/libcap
  add: /usr/sbin/setcap
  to: /tools/setcap
  before: install
- image: registrypackages/d8-curl-artifact-8-9-1 # FIXME build!
  add: /d8-curl
  to: /chroot/usr/bin/curl
  owner: "64535"
  group: "64535"
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-nginx-artifact
  add: /
  to: /
  includePaths:
  - chroot
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-lua-rocks-artifact
  add: /
  to: /chroot
  includePaths:
  - usr/local/lib/lua/5.1/iconv.so
  - usr/local/lib/lua/5.1/pb.so
  - usr/local/share/lua/5.1/protoc.lua
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-controller-artifact
  add: /src/rootfs/etc
  to: /src/rootfs/etc
  before: install
secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  setup:
  # Add deckhouse user
  - echo "deckhouse:x:64535:64535:deckhouse:/:/sbin/nologin" >> /etc/passwd
  - echo "deckhouse:x:64535:" >> /etc/group
  - echo "deckhouse:!::0:::::" >> /etc/shadow
  # Source: Dockerfile-chroot
  - cp -a /src/rootfs/etc/* /chroot/etc
  - chown -R deckhouse:deckhouse /chroot/etc
  - chown root:root /chroot/etc/passwd /chroot/etc/group

  - ln -s /usr/local/nginx/sbin/nginx /sbin/nginx

  - mkdir -p /var/log
  - chown -R deckhouse:deckhouse /var/log

  # LD_LIBRARY_PATH does not work so below is needed for  opentelemetry/other modules
  # Put libs of newer modules under `/modules_mount/<other>/lib` and add that path below
  # Could get complicated arch specific paths become a need
  - echo "/lib:/usr/lib:/usr/local/lib:/modules_mount/etc/nginx/modules/otel" > /chroot/etc/ld-musl-x86_64.path
  #
  - /tmp/apps/ln -sf /chroot/etc/nginx /etc/nginx
  - /tmp/apps/ln -sf /chroot/tmp/nginx /tmp/nginx
  - /tmp/apps/ln -sf /chroot/etc/ingress-controller /etc/ingress-controller
  - /tmp/apps/ln -sf /chroot/var/log/nginx /var/log/nginx
  - touch /chroot/var/log/nginx/access.log
  - chown deckhouse:deckhouse /chroot/var/log/nginx/access.log
  - echo "" > /chroot/etc/resolv.conf
  - chown -R deckhouse:deckhouse /chroot/var/log/nginx /chroot/etc/resolv.conf
  - mknod -m 0666 /chroot/dev/null c 1 3
  - mknod -m 0666 /chroot/dev/random c 1 8
  - mknod -m 0666 /chroot/dev/urandom c 1 9
  - mknod -m 0666 /chroot/dev/full c 1 7
  - mknod -m 0666 /chroot/dev/ptmx c 5 2
  - mknod -m 0666 /chroot/dev/zero c 1 5
  - mknod -m 0666 /chroot/dev/tty c 5 0

  - mkdir -p /chroot/modules_mount
  - mkdir -p modules_mount
  - ln -s /modules_mount /chroot/modules_mount

  # Utils for final image
  - cp -a /tools/setcap /tmp/apps
---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: builder/alpine # FIXME replace
# fromImage: common/distroless
fromCacheVersion: "2025-08-04.07"
mount:
- from: build_dir
  to: /tmp/apps
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-chroot-artifact
  add: /
  to: /
  includePaths:
  - chroot
  - modules_mount
  - var/log
  - etc/nginx
  - tmp/nginx
  - etc/ingress-controller
  - var/log/nginx
  - sbin/nginx
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-controller-artifact
  add: /src/rootfs/bin/amd64/dbg
  to: /dbg
  owner: "64535"
  group: "64535"
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-controller-artifact
  add: /src/rootfs/bin/amd64/nginx-ingress-controller
  to: /nginx-ingress-controller
  owner: "64535"
  group: "64535"
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-controller-artifact
  add: /src/rootfs/bin/amd64/wait-shutdown
  to: /wait-shutdown
  owner: "64535"
  group: "64535"
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src/curl-chroot-wrapper.sh
  to: /usr/bin/curl
  owner: "64535"
  group: "64535"
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src/nginx-chroot-wrapper.sh
  to: /usr/bin/nginx
  owner: "64535"
  group: "64535"
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-dumb-init
  add: /dumb-init
  to: /usr/bin/dumb-init
  before: install
- image: tools/bash
  add: /usr/bin/bash
  to: /bin/bash
  before: install
- image: tools/util-linux
  add: /usr/bin/unshare
  to: /usr/bin/unshare
  before: install
- image: tools/openssl
  add: /usr/lib
  to: /usr/lib
  includePaths:
  - libcrypto.so*
  - libssl.so*
  - engines-3
  - ossl-modules
  before: install
- image: tools/openssl
  add: /usr/bin/openssl
  to: /usr/bin/openssl
  before: install
shell:
  # FIXME utils: diffutils pgrep
  setup:
  - /tmp/apps/setcap    cap_sys_chroot,cap_net_bind_service=+ep /nginx-ingress-controller
  - /tmp/apps/setcap -v cap_sys_chroot,cap_net_bind_service=+ep /nginx-ingress-controller
  - /tmp/apps/setcap    cap_sys_chroot,cap_net_bind_service=+ep /usr/bin/unshare
  - /tmp/apps/setcap -v cap_sys_chroot,cap_net_bind_service=+ep /usr/bin/unshare
  - /tmp/apps/setcap    cap_net_bind_service=+ep /chroot/usr/local/nginx/sbin/nginx
  - /tmp/apps/setcap -v cap_net_bind_service=+ep /chroot/usr/local/nginx/sbin/nginx
  - /tmp/apps/setcap    cap_sys_chroot,cap_net_bind_service=+ep /usr/bin/dumb-init
  - /tmp/apps/setcap -v cap_sys_chroot,cap_net_bind_service=+ep /usr/bin/dumb-init
imageSpec:
  config:
    workingDir: /chroot/etc/nginx
    user: "64535"
    expose: ["80", "443"]
    entrypoint: ["/usr/bin/dumb-init", "--"]
    cmd: ["/nginx-ingress-controller"]
    env: { "PATH": "$PATH:/usr/local/luajit/bin:/usr/local/nginx/sbin:/usr/local/nginx/bin", "LUA_PATH": "/usr/local/share/luajit-2.1.0-beta3/?.lua;/usr/local/share/lua/5.1/?.lua;/usr/local/lib/lua/?.lua;;", "LUA_CPATH": "/usr/local/lib/lua/?/?.so;/usr/local/lib/lua/?.so;;" }
