---
image: {{ $.ModuleName }}/{{ $.ImageName }}-chroot-artifact
fromImage: common/alt-p11-artifact
fromCacheVersion: "2025-07-28.01"
final: false
mount:
- from: build_dir
  to: /tmp/apps
import:
- image: tools/coreutils
  add: /usr/bin
  to: /tools
  includePaths:
  - chmod
  - coreutils
  - ln
  - rm
  - mkdir
  before: install
- image: tools/libcap
  add: /usr/sbin/setcap
  to: /tools/setcap
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-nginx-artifact
  add: /usr/local
  to: /usr/local
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-nginx-artifact
  add: /etc/nginx
  to: /etc/nginx
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-lua-rocks-artifact
  add: /usr/lib64/lua/5.1/iconv.so
  to: /usr/local/lib/lua/5.1/iconv.so
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-lua-rocks-artifact
  add: /usr/lib64/lua/5.1/pb.so
  to: /usr/local/lib/lua/5.1/pb.so
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-lua-rocks-artifact
  add: /usr/share/lua/5.1/protoc.lua
  to: /usr/local/share/lua/5.1/protoc.lua
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-controller-artifact
  add: /src/rootfs/etc
  to: /src/rootfs/etc
  before: install
- image: registrypackages/d8-curl-artifact-8-9-1
  add: /d8-curl
  to: /chroot/usr/bin/curl
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-abseil-dev
  add: /usr
  to: /chroot
  includePaths:
