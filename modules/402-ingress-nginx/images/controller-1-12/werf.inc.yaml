{{- $controllerBranch := "controller-v1.12.1" }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
fromImage: common/src-artifact
fromCacheVersion: "2025-08-01.01"
final: false
git:
- add: /{{ $.ModulePath }}modules/{{ $.ModulePriority }}-{{ $.ModuleName }}/images/{{ $.ImageName }}/patches
  to: /patches
  stageDependencies:
    install:
      - '**/*'
- add: /{{ $.ModulePath }}modules/{{ $.ModulePriority }}-{{ $.ModuleName }}/images/{{ $.ImageName }}/rootfs
  to: /src/rootfs
  stageDependencies:
    install:
      - '**/*'
- add: /{{ $.ModulePath }}modules/{{ $.ModulePriority }}-{{ $.ModuleName }}/images/{{ $.ImageName }}/curl-chroot-wrapper.sh
  to: /src/curl-chroot-wrapper.sh
  stageDependencies:
    install:
      - '**/*'
- add: /{{ $.ModulePath }}modules/{{ $.ModulePriority }}-{{ $.ModuleName }}/images/{{ $.ImageName }}/nginx-chroot-wrapper.sh
  to: /src/nginx-chroot-wrapper.sh
  stageDependencies:
    install:
      - '**/*'
secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  setup:
  - mkdir -p /src
  - cd /src
  - git clone --branch v1.2.5 --depth 1 $(cat /run/secrets/SOURCE_REPO)/yelp/dumb-init.git
  - git clone --branch 0.5.1 --depth 1 $(cat /run/secrets/SOURCE_REPO)/starwing/lua-protobuf
  - git clone --branch 7-3 --depth 1 $(cat /run/secrets/SOURCE_REPO)/luarocks-sorces/lua-iconv
  - git clone --branch {{ $controllerBranch }} --depth 1 $(cat /run/secrets/SOURCE_REPO)/kubernetes/ingress-nginx.git
  - cd /src/ingress-nginx
  - git apply /patches/*.patch --verbose
  # pass env for build
  - echo "export COMMIT_SHA=git-$(git rev-parse --short HEAD)" > .env_pass
  - echo "export REPO_INFO=$(git config --get remote.origin.url)" >> .env_pass
  - echo "export TAG=$(git describe --tags --always)" >> .env_pass
  - rm -rf /src/dumb-init/.git
  - rm -rf /src/lua-protobuf/.git
  - rm -rf /src/lua-iconv/.git
  - rm -rf /src/ingress-nginx/.git
  - cat /patches/build.sh > /src/ingress-nginx/images/nginx/rootfs/build.sh # FIXME delete
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-dumb-init-artifact
fromImage: common/alt-p11-artifact
# fromCacheVersion: "2025-07-28.01"
final: false
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src/dumb-init
  to: /src
  before: install
shell:
  beforeInstall:
  - apt-get install -y gcc glibc-core glibc-devel-static
  setup:
  - cd /src/
  - cc -std=gnu99 -static -s -Wall -Werror -O3 -o dumb-init dumb-init.c
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-lua-rocks-artifact
fromImage: common/alt-p11-artifact
fromCacheVersion: "2025-07-28.01"
final: false
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src/lua-protobuf
  to: /src/lua-protobuf
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src/lua-iconv
  to: /src/lua-iconv
  before: install
shell:
  install:
  {{- include "alt packages proxy" . | nindent 2 }}
  - apt-get install -y gcc lua5.1-devel lua5.1 lua5.1-luarocks
  - apt-get install -y liblua5.1-devel --download-only
  setup:
  - cd /src/lua-protobuf
  - luarocks-5.1 make rockspecs/lua-protobuf-scm-1.rockspec
  - cd /src/lua-iconv
  - luarocks-5.1 install lua-iconv-7-3.src.rock
---
image: {{ .ModuleName }}/{{ $.ImageName }}-controller-artifact
fromImage: builder/golang-alpine
# fromCacheVersion: "2025-07-28.01"
final: false
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src/ingress-nginx
  to: /src
  before: install
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  install:
  {{- include "alpine packages proxy" . | nindent 2 }}
  # git needs for getting tag and commit sha for build purposes
  - apk --no-cache add make bash git
  setup:
  - export GOPROXY=$(cat /run/secrets/GOPROXY)
  - export GOARCH=amd64
  - export PKG="k8s.io/ingress-nginx"
  - cd /src/
  - go mod edit -go=1.23.6
  - go mod tidy
  - |
    source /src/.env_pass && \
    echo "Loaded: COMMIT_SHA=$COMMIT_SHA, REPO_INFO=$REPO_INFO, ARCH=$GOARCH, PKG=$PKG TAG=$TAG" && \
    make GO111MODULE=on USE_DOCKER=false build
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-nginx-artifact
fromImage: builder/alpine-3.21
fromCacheVersion: "2025-08-01.02"
final: false
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src/ingress-nginx/images/nginx/rootfs/
  to: /
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src/rootfs/etc
  to: /src/etc
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-controller-artifact
  add: /src/rootfs/etc
  to: /src/rootfs/etc
  before: install
secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  beforeInstall:
  {{- include "alpine packages proxy" . | nindent 2 }}
  - apk add --no-cache bash git openssh-client
  - mkdir -p ~/.ssh/
  - echo "StrictHostKeyChecking accept-new" > ~/.ssh/config
  install:
  - apk add gcc
  - apk add clang
  - apk add libc-dev
  - apk add make
  - apk add automake
  - apk add openssl-dev
  - apk add pcre-dev
  - apk add zlib-dev
  - apk add linux-headers
  - apk add libxslt-dev
  - apk add gd-dev
  - apk add perl-dev
  - apk add libedit-dev
  - apk add mercurial
  - apk add alpine-sdk
  - apk add findutils
  - apk add curl
  - apk add ca-certificates
  # - apk add patch
  - apk add libaio-dev
  # - apk add openssl
  - apk add cmake
  - apk add util-linux
  - apk add lmdb-tools
  - apk add wget
  - apk add curl-dev
  - apk add libprotobuf
  # - apk add g++ pkgconf libxml2 libxml2-dev
  - apk add flex bison doxygen yajl-dev lmdb-dev libtool autoconf
  # - apk add python3
  - apk add libmaxminddb-dev
  - apk add bc
  - apk add unzip
  - apk add dos2unix
  - apk add yaml-cpp
  - apk add coreutils
  - apk add ninja
  - apk add gtest-dev
  # - apk add build-base
  # - apk add pkgconfig
  # - apk add c-ares-dev
  - apk add re2-dev
  - apk add grpc-dev
  - apk add protobuf-dev
  beforeSetup:
  - export SOURCE_REPO=$(cat /run/secrets/SOURCE_REPO)
  - export CONTROLLER_BRANCH={{ $controllerBranch }}
  - git config --global url."${SOURCE_REPO}".insteadOf https://github.com
  - cp -R /src/etc/* /etc/
  # - rm -rf /usr/local
  # - export GIT_TRACE=1
  - /build.sh
  setup:
  # Prepare chroot directory
  - |
    bash -eu -c '
    writeDirs=(
      /chroot/etc/nginx
      /chroot/usr/local
      /chroot/etc/ingress-controller
      /chroot/etc/ingress-controller/ssl
      /chroot/etc/ingress-controller/auth
      /chroot/etc/ingress-controller/telemetry
      /chroot/etc/ingress-controller/geoip
      /chroot/opt/modsecurity/var/log
      /chroot/opt/modsecurity/var/upload
      /chroot/opt/modsecurity/var/audit
      /chroot/var/log/audit
      /chroot/var/lib/nginx
      /chroot/var/log/nginx
      /chroot/var/lib/nginx/body
      /chroot/var/lib/nginx/fastcgi
      /chroot/var/lib/nginx/proxy
      /chroot/var/lib/nginx/scgi
      /chroot/var/lib/nginx/uwsgi
      /chroot/tmp/nginx
    );
    for dir in "${writeDirs[@]}"; do
      mkdir -p ${dir};
      chown -R www-data:www-data ${dir};
    done'

  - mkdir -p  /chroot/lib /chroot/proc /chroot/usr /chroot/bin /chroot/dev /chroot/run
  - cp -R /etc/* /chroot/etc/
  - cp -R /src/rootfs/etc/* /chroot/etc
  - chown -R www-data:www-data /chroot/etc # FIXME Danger?
  - cp /etc/passwd /etc/group /etc/hosts /chroot/etc/
  - cp -a /usr/* /chroot/usr/
  - cp -a /etc/nginx/* /chroot/etc/nginx/
  # - cp -a /etc/ingress-controller/* /chroot/etc/ingress-controller/
  - cp /lib/ld-musl-* /chroot/lib/
  - cp /usr/lib/libcrypto* /usr/lib/libssl* /usr/lib/libz* /chroot/usr/lib/
