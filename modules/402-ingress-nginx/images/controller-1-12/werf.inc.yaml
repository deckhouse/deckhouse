---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: builder/alpine-3.21
# fromImage: common/distroless
fromCacheVersion: "2025-08-01.03"
# mount:
# - from: build_dir
#   to: /tmp/apps
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-nginx-artifact
  add: /
  to: /
  includePaths:
  # - etc/passwd
  # - etc/group
  - chroot
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-controller-artifact
  add: /src/rootfs/bin/amd64/dbg # chown=www-data:www-data
  to: /dbg
  owner: "101"
  group: "101"
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-controller-artifact
  add: /src/rootfs/bin/amd64/nginx-ingress-controller # chown=www-data:www-data
  to: /nginx-ingress-controller
  owner: "101"
  group: "101"
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-controller-artifact
  add: /src/rootfs/bin/amd64/wait-shutdown # chown=www-data:www-data
  to: /wait-shutdown
  owner: "101"
  group: "101"
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src/curl-chroot-wrapper.sh
  to: /usr/bin/curl
  owner: "101"
  group: "101"
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src/nginx-chroot-wrapper.sh # chown=www-data:www-data
  to: /usr/bin/nginx
  owner: "101"
  group: "101"
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-dumb-init-artifact
  add: /src/dumb-init
  to: /usr/bin/dumb-init
  before: install
# - image: tools/bash
#   add: /usr/bin/bash
#   to: /bin/bash
#   before: install
# - image: tools/util-linux
#   add: /usr/bin/unshare
#   to: /usr/bin/unshare
#   before: install
shell:
  install:
  {{- include "alpine packages proxy" . | nindent 2 }}
  - apk update && apk upgrade && apk add -U --no-cache bash openssl ca-certificates dumb-init tzdata diffutils util-linux
  setup:
  - ln -s /usr/local/nginx/sbin/nginx /sbin/nginx
  - adduser -S -D -H -u 101 -h /usr/local/nginx -s /sbin/nologin -G www-data -g www-data www-data

  - mkdir -p /var/log
  - chown -R www-data:www-data /var/log
  # LD_LIBRARY_PATH does not work so below is needed for  opentelemetry/other modules
  # Put libs of newer modules under `/modules_mount/<other>/lib` and add that path below
  # Could get complicated arch specific paths become a need
  - echo "/lib:/usr/lib:/usr/local/lib:/modules_mount/etc/nginx/modules/otel" > /chroot/etc/ld-musl-x86_64.path

  - ln -sf /chroot/etc/nginx /etc/nginx
  - ln -sf /chroot/tmp/nginx /tmp/nginx
  - ln -sf /chroot/etc/ingress-controller /etc/ingress-controller
  - ln -sf /chroot/var/log/nginx /var/log/nginx
  - touch /chroot/var/log/nginx/access.log
  - chown www-data:www-data /chroot/var/log/nginx/access.log
  - echo "" > /chroot/etc/resolv.conf
  - chown -R www-data:www-data /chroot/var/log/nginx /chroot/etc/resolv.conf
  - mknod -m 0666 /chroot/dev/null c 1 3
  - mknod -m 0666 /chroot/dev/random c 1 8
  - mknod -m 0666 /chroot/dev/urandom c 1 9
  - mknod -m 0666 /chroot/dev/full c 1 7
  - mknod -m 0666 /chroot/dev/ptmx c 5 2
  - mknod -m 0666 /chroot/dev/zero c 1 5
  - mknod -m 0666 /chroot/dev/tty c 5 0

  - mkdir -p /chroot/modules_mount
  - mkdir -p modules_mount
  - ln -s /modules_mount /chroot/modules_mount

  # - /tmp/apps/chmod 1777 /tmp
  # - /tmp/apps/rm -rf /etc/pki /usr/share/ca-certificates
  # - /tmp/apps/mkdir -p /var/log
  # - /tmp/apps/ln -sf /chroot/etc/pki /etc/pki
  # - /tmp/apps/ln -sf /chroot/usr/share/ca-certificates /usr/share/ca-certificates
  # - /tmp/apps/ln -sf /chroot/etc/nginx /etc/nginx
  # - /tmp/apps/ln -sf /chroot/tmp/nginx /tmp/nginx
  # - /tmp/apps/ln -sf /chroot/etc/ingress-controller /etc/ingress-controller
  # - /tmp/apps/ln -sf /chroot/var/log/nginx /var/log/nginx

  - apk add --no-cache libcap
  - setcap    cap_sys_chroot,cap_net_bind_service=+ep /nginx-ingress-controller
  - setcap -v cap_sys_chroot,cap_net_bind_service=+ep /nginx-ingress-controller
  - setcap    cap_sys_chroot,cap_net_bind_service=+ep /usr/bin/unshare
  - setcap -v cap_sys_chroot,cap_net_bind_service=+ep /usr/bin/unshare
  - setcap    cap_net_bind_service=+ep /chroot/usr/local/nginx/sbin/nginx
  - setcap -v cap_net_bind_service=+ep /chroot/usr/local/nginx/sbin/nginx
  - setcap    cap_sys_chroot,cap_net_bind_service=+ep /usr/bin/dumb-init
  - setcap -v cap_sys_chroot,cap_net_bind_service=+ep /usr/bin/dumb-init
  - apk del libcap

  # - /tmp/apps/setcap    cap_sys_chroot,cap_net_bind_service=+ep /nginx-ingress-controller
  # - /tmp/apps/setcap -v cap_sys_chroot,cap_net_bind_service=+ep /nginx-ingress-controller
  # - /tmp/apps/setcap    cap_sys_chroot,cap_net_bind_service=+ep /usr/bin/unshare
  # - /tmp/apps/setcap -v cap_sys_chroot,cap_net_bind_service=+ep /usr/bin/unshare
  # - /tmp/apps/setcap    cap_net_bind_service=+ep /chroot/usr/local/nginx/sbin/nginx
  # - /tmp/apps/setcap -v cap_net_bind_service=+ep /chroot/usr/local/nginx/sbin/nginx
  # - /tmp/apps/setcap    cap_sys_chroot,cap_net_bind_service=+ep /usr/bin/dumb-init
  # - /tmp/apps/setcap -v cap_sys_chroot,cap_net_bind_service=+ep /usr/bin/dumb-init
imageSpec:
  config:
    workingDir: /chroot/etc/nginx
    user: "101"
    expose: ["80", "443"]
    entrypoint: ["/usr/bin/dumb-init", "--"]
    cmd: ["/nginx-ingress-controller"]
    env: { "PATH": "$PATH:/usr/local/luajit/bin:/usr/local/nginx/sbin:/usr/local/nginx/bin", "LUA_PATH": "/usr/local/share/luajit-2.1.0-beta3/?.lua;/usr/local/share/lua/5.1/?.lua;/usr/local/lib/lua/?.lua;;", "LUA_CPATH": "/usr/local/lib/lua/?/?.so;/usr/local/lib/lua/?.so;;" }
