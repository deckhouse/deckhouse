x-config-version: 2
type: object
properties:
  deschedulingInterval:
    type: string
    enum: ["Frequent", "Moderate", "Rare"]
    default: "Moderate"
    description: |
      Interval between pod redistribution runs.

      Supported values:

      - `Frequent`: Runs every 5 minutes. Suitable for clusters where faster pod redistribution is important.
      - `Moderate`: Runs every 15 minutes (default).
      - `Rare`: Runs every 30 minutes. Suitable for clusters where it's important to minimize the number of pod redistributions.
