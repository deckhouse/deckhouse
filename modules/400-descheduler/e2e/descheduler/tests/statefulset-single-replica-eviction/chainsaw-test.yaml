apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: descheduler-statefulset-single-replica-eviction
spec:
  description: >-
    Single-replica StatefulSet without PDB: the descheduler evicts even the only
    pod of a StatefulSet because Deckhouse does not expose the upstream
    minReplicas protection. A deterministic inter-pod
    anti-affinity violation is used as the eviction trigger instead of the
    utilization-dependent lowNodeUtilization strategy.
  concurrent: false
  timeouts:
    apply: 30s
    assert: 120s
    delete: 60s

  bindings:
    - name: stsTestLabel
      value: sts-single-replica
    - name: stsReplicas
      value: 1
    - name: antiTargetValue
      value: sts-single-replica-conflict
    - name: workerNodes
      value: >-
        (x_k8s_list($client, 'v1', 'Node').items[?spec.unschedulable != `true`
        && metadata.labels."node-role.kubernetes.io/control-plane" == `null`
        && length(status.conditions[?type == 'Ready' && status == 'True']) > `0`])
    - name: targetNode
      value: ($workerNodes[0].metadata.name)

  catch:
    - description: Show pods in the test namespace on failure
      get:
        apiVersion: v1
        kind: Pod
    - description: Show events in the test namespace on failure
      events: {}
    - description: Show descheduler pod logs on failure
      podLogs:
        namespace: d8-descheduler
        selector: app=descheduler
        container: descheduler
        tail: 200

  steps:
    - name: assert-module-installed
      description: Verify that the descheduler module is installed in the cluster
      try:
        - description: Assert the Descheduler CRD exists
          assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: deschedulers.deckhouse.io

    - name: check-minimum-nodes
      description: Verify that the cluster has at least 2 eligible worker nodes so the evicted pod can be rescheduled
      try:
        - description: Assert at least 2 Ready, schedulable, non-control-plane worker nodes exist
          assert:
            resource:
              (length($workerNodes) >= `2`): true

    - name: create-statefulset
      description: >-
        Create a single-replica StatefulSet placed on the target node via spec.nodeName;
        its pod carries a required podAntiAffinity against the conflict pod label, inert
        for now because no such pod exists (and nodeName bypasses the scheduler anyway)
      try:
        - description: Create the StatefulSet pinned to the target node
          create:
            file: ../common/sts-pinned.yaml
            template: true

    - name: wait-statefulset-ready
      description: Wait until the single replica is Running on the target node
      try:
        - description: Assert pod test-sts-0 is Running on the target node
          assert:
            timeout: 180s
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: test-sts-0
              spec:
                nodeName: ($targetNode)
              status:
                phase: Running
        - description: Assert the StatefulSet reports 1 ready replica
          assert:
            resource:
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: test-sts
              status:
                readyReplicas: 1

    - name: release-node-pinning
      description: >-
        Clear the template nodeName so that the pod recreated after the eviction goes
        through the scheduler (which enforces its anti-affinity and keeps it away from
        the conflict pod's node); OnDelete keeps the current pod in place
      try:
        - description: Patch the StatefulSet pod template to stop bypassing the scheduler
          patch:
            file: ../common/sts-unpin-patch.yaml
        - description: Assert the patch did not restart the pod and it remains on the target node
          assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: test-sts-0
              spec:
                nodeName: ($targetNode)
              status:
                phase: Running

    - name: create-conflict-pod
      description: >-
        Force-place a bare pod carrying the repelled label onto the same node via
        spec.nodeName (kubelet admission does not enforce inter-pod anti-affinity),
        making test-sts-0 violate its own required podAntiAffinity
      try:
        - description: Create the conflict pod on the target node
          create:
            file: manifests/conflict-pod.yaml
            template: true
        - description: Assert the conflict pod is Running on the target node next to test-sts-0
          assert:
            timeout: 120s
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: conflict-pod
              spec:
                nodeName: ($targetNode)
              status:
                phase: Running

    - name: trigger-eviction-and-verify
      description: >-
        Apply the Descheduler CR and verify the single StatefulSet pod is evicted despite
        being the only replica. Kept as one step because the captured initial pod UID
        (operation outputs) is not visible across step boundaries
      try:
        - description: Capture the UID of test-sts-0 before the eviction and apply the Descheduler CR
          apply:
            file: manifests/descheduler-cr.yaml
            outputs:
              - name: initialPodUid
                value: (x_k8s_get($client, 'v1', 'Pod', $namespace, 'test-sts-0').metadata.uid)
        - description: Assert the policy ConfigMap contains the e2e-sts-single-replica profile
          assert:
            timeout: 120s
            resource:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: descheduler-policy
                namespace: d8-descheduler
              data:
                (contains("policy.yaml", 'e2e-sts-single-replica')): true
        - description: >-
            Assert the descheduler deployment finished rolling out and its single pod runs
            with the current policy checksum (a descheduling cycle runs at pod startup)
          assert:
            timeout: 300s
            file: ../common/assert-descheduler-rollout-complete.yaml
        - description: Assert pod test-sts-0 was evicted, recreated with a new UID and rescheduled to a different node
          assert:
            timeout: 420s
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: test-sts-0
              (metadata.uid != $initialPodUid): true
              (spec.nodeName != $targetNode): true
              status:
                phase: Running
        - description: >-
            Assert an eviction event was recorded for test-sts-0
            (event reason is the strategy name; 'Descheduled' is the event action)
          assert:
            timeout: 60s
            resource:
              apiVersion: v1
              kind: Event
              reason: RemovePodsViolatingInterPodAntiAffinity
              involvedObject:
                name: test-sts-0
        - description: Assert the StatefulSet reports 1 ready replica again
          assert:
            timeout: 120s
            resource:
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: test-sts
              status:
                readyReplicas: 1
      cleanup:
        - description: Delete the Descheduler CR
          delete:
            ref:
              apiVersion: deckhouse.io/v1alpha2
              kind: Descheduler
              name: e2e-sts-single-replica
      catch:
        - description: Show ConfigMap content on failure
          get:
            apiVersion: v1
            kind: ConfigMap
            name: descheduler-policy
            namespace: d8-descheduler
        - description: Show Descheduler CRs on failure
          get:
            apiVersion: deckhouse.io/v1alpha2
            kind: Descheduler
        - description: Show events in the descheduler namespace on failure
          events:
            namespace: d8-descheduler
