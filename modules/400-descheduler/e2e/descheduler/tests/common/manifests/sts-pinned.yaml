apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: test-sts
  labels:
    e2e-test: ($stsTestLabel)
spec:
  serviceName: test-sts
  replicas: ($stsReplicas)
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      e2e-test: ($stsTestLabel)
  template:
    metadata:
      labels:
        e2e-test: ($stsTestLabel)
    spec:
      nodeName: ($targetNode)
      terminationGracePeriodSeconds: 5
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  e2e-test: ($antiTargetValue)
              topologyKey: kubernetes.io/hostname
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
