# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  run:
    desc: Run all descheduler e2e tests
    cmds:
      - chainsaw test --test-dir ./tests/

  run:verbose:
    desc: Run all descheduler e2e tests with verbose output
    cmds:
      - chainsaw test --test-dir ./tests/ --full-name

  run:low-node-utilization:
    desc: Run LowNodeUtilization e2e test
    cmds:
      - chainsaw test --test-dir ./tests/low-node-utilization/

  run:high-node-utilization:
    desc: Run HighNodeUtilization e2e test
    cmds:
      - chainsaw test --test-dir ./tests/high-node-utilization/

  run:exclude-namespaces:
    desc: Run exclude-namespaces-from-processing e2e test
    cmds:
      - chainsaw test --test-dir ./tests/exclude-namespaces-from-processing/

  dry-run:
    desc: Validate all test YAML without executing (no cluster required)
    cmds:
      - chainsaw test --test-dir ./tests/ --no-cluster

  run:debug:
    desc: Run all tests and pause on failure for debugging
    cmds:
      - chainsaw test --test-dir ./tests/ --pause-on-failure --fail-fast

  run:report:
    desc: Run all tests and generate a JSON report
    cmds:
      - chainsaw test --test-dir ./tests/ --report-format JSON --report-name chainsaw-report --report-path ./reports/
