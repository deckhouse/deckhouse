apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: descheduler-high-node-utilization
spec:
  timeouts:
    apply: 30s
    assert: 120s
    delete: 30s
    exec: 120s

  steps:
    - name: assert-descheduler-ready
      description: Verify that the descheduler deployment exists and is ready
      try:
        - assert:
            file: ../common/assert-descheduler-ready.yaml

    - name: check-minimum-nodes
      description: Verify that the cluster has at least 2 nodes for the consolidation test
      try:
        - script:
            content: |
              NODE_COUNT=$(kubectl get nodes --no-headers | wc -l | tr -d ' ')
              echo "$NODE_COUNT"
              [ "$NODE_COUNT" -ge 2 ]
            check:
              ($error == null): true

    - name: apply-descheduler-cr
      description: Create Descheduler CR with HighNodeUtilization strategy
      try:
        - apply:
            file: files/descheduler-cr.yaml
        - assert:
            resource:
              apiVersion: deckhouse.io/v1alpha2
              kind: Descheduler
              metadata:
                name: e2e-high-node-utilization
      cleanup:
        - delete:
            ref:
              apiVersion: deckhouse.io/v1alpha2
              kind: Descheduler
              name: e2e-high-node-utilization

    - name: wait-descheduler-restart
      description: Wait for descheduler to restart with the new policy from CR
      try:
        - wait:
            apiVersion: apps/v1
            kind: Deployment
            name: descheduler
            namespace: d8-descheduler
            timeout: 120s
            for:
              condition:
                name: Available
                value: 'True'
        - assert:
            file: ../common/assert-descheduler-ready.yaml
      catch:
        - describe:
            apiVersion: apps/v1
            kind: Deployment
            name: descheduler
            namespace: d8-descheduler
        - get:
            apiVersion: v1
            kind: Pod
            namespace: d8-descheduler
            selector: app=descheduler
        - events:
            namespace: d8-descheduler
        - podLogs:
            namespace: d8-descheduler
            selector: app=descheduler

    - name: create-spread-workload
      description: Spread one pause pod per node to make all nodes underutilized
      try:
        - script:
            content: |
              NODES=$(kubectl get nodes --no-headers -o custom-columns=':metadata.name')
              INDEX=1
              for NODE in $NODES; do
                echo "Creating spread-pod-$INDEX on node $NODE"
                kubectl run spread-pod-$INDEX \
                  --namespace "$NAMESPACE" \
                  --image=registry.k8s.io/pause:3.9 \
                  --overrides="{\"spec\":{\"nodeName\":\"$NODE\"}}"
                INDEX=$((INDEX + 1))
              done
            check:
              ($error == null): true
      catch:
        - get:
            apiVersion: v1
            kind: Pod
        - events: {}

    - name: wait-pods-ready
      description: Wait for all spread pods to become ready
      try:
        - wait:
            apiVersion: v1
            kind: Pod
            name: spread-pod-1
            timeout: 60s
            for:
              condition:
                name: Ready
                value: 'True'
        - wait:
            apiVersion: v1
            kind: Pod
            name: spread-pod-2
            timeout: 60s
            for:
              condition:
                name: Ready
                value: 'True'

    - name: assert-pods-running
      description: Assert that spread pods are in Running phase
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: spread-pod-1
              status:
                phase: Running
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: spread-pod-2
              status:
                phase: Running

    - name: trigger-descheduler-cycle
      description: Restart descheduler to force an immediate descheduling cycle with the current workload
      try:
        - script:
            content: |
              kubectl rollout restart deployment/descheduler -n d8-descheduler
            check:
              ($error == null): true
        - wait:
            apiVersion: apps/v1
            kind: Deployment
            name: descheduler
            namespace: d8-descheduler
            timeout: 120s
            for:
              condition:
                name: Available
                value: 'True'
      catch:
        - describe:
            apiVersion: apps/v1
            kind: Deployment
            name: descheduler
            namespace: d8-descheduler
        - events:
            namespace: d8-descheduler

    - name: wait-for-descheduler-cycle
      description: Wait for descheduler to execute the HighNodeUtilization plugin after restart
      try:
        - script:
            timeout: 120s
            content: |
              for i in $(seq 1 24); do
                if kubectl logs -n d8-descheduler -l app=descheduler -c descheduler --since=2m 2>/dev/null | grep -q "HighNodeUtilization"; then
                  echo "HighNodeUtilization plugin has executed"
                  exit 0
                fi
                sleep 5
              done
              echo "Timed out waiting for HighNodeUtilization to execute"
              exit 1
            check:
              ($error == null): true
      catch:
        - describe:
            apiVersion: v1
            kind: Pod
            namespace: d8-descheduler
            selector: app=descheduler
        - get:
            apiVersion: v1
            kind: Pod
            namespace: d8-descheduler
            selector: app=descheduler
        - events:
            namespace: d8-descheduler
        - podLogs:
            namespace: d8-descheduler
            selector: app=descheduler
