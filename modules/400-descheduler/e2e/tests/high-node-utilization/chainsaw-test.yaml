apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: descheduler-high-node-utilization
spec:
  timeouts:
    apply: 30s
    assert: 120s
    delete: 30s
    exec: 120s

  steps:
    - name: assert-descheduler-ready
      description: Verify that the descheduler deployment exists and is ready
      try:
        - description: Check descheduler deployment has ready replicas
          assert:
            file: ../common/assert-descheduler-ready.yaml

    - name: check-minimum-nodes
      description: Verify that the cluster has at least 2 worker nodes for the consolidation test
      try:
        - description: Count worker nodes and verify at least 2 exist
          script:
            content: |
              NODE_COUNT=$(kubectl get nodes --no-headers -l 'node-role.kubernetes.io/control-plane!=' | wc -l | tr -d ' ')
              echo "Worker node count: $NODE_COUNT"
              [ "$NODE_COUNT" -ge 2 ]
            check:
              ($error == null): true

    - name: create-spread-workload
      description: Create a Deployment with topology spread to distribute pods across worker nodes
      try:
        - description: Create spread Deployment with topology constraints
          create:
            file: files/spread-deployment.yaml
      catch:
        - description: Show pod status on failure
          get:
            apiVersion: v1
            kind: Pod
        - description: Show events on failure
          events: {}

    - name: wait-deployment-ready
      description: Wait for the spread Deployment to have all replicas available
      try:
        - description: Wait for Deployment Available condition
          wait:
            apiVersion: apps/v1
            kind: Deployment
            name: spread-deployment
            timeout: 120s
            for:
              condition:
                name: Available
                value: 'True'
        - description: Assert Deployment has 3 ready replicas
          assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: spread-deployment
              status:
                readyReplicas: 3

    - name: assert-pods-spread
      description: Verify pods are distributed across multiple nodes
      try:
        - description: Check pods are on at least 2 nodes
          script:
            content: |
              NODE_COUNT=$(kubectl get pods -n "$NAMESPACE" -l e2e-test=high-node-utilization \
                -o jsonpath='{range .items[*]}{.spec.nodeName}{"\n"}{end}' | sort -u | wc -l | tr -d ' ')
              echo "Pods are spread across $NODE_COUNT node(s)"
              [ "$NODE_COUNT" -ge 2 ]
            check:
              ($error == null): true

    - name: apply-descheduler-cr
      description: Create Descheduler CR with HighNodeUtilization strategy (after workload is stable)
      try:
        - description: Apply the Descheduler CR manifest
          apply:
            file: files/descheduler-cr.yaml
        - description: Assert the Descheduler CR exists
          assert:
            resource:
              apiVersion: deckhouse.io/v1alpha2
              kind: Descheduler
              metadata:
                name: e2e-high-node-utilization
      cleanup:
        - description: Delete the Descheduler CR
          delete:
            ref:
              apiVersion: deckhouse.io/v1alpha2
              kind: Descheduler
              name: e2e-high-node-utilization

    - name: assert-configmap-updated
      description: Verify that Deckhouse reconciled the CR into the descheduler policy ConfigMap
      try:
        - description: Assert ConfigMap data contains the e2e-high-node-utilization profile
          assert:
            timeout: 120s
            resource:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: descheduler-policy
                namespace: d8-descheduler
              data:
                (contains("policy.yaml", 'e2e-high-node-utilization')): true
      catch:
        - description: Show ConfigMap content on failure
          get:
            apiVersion: v1
            kind: ConfigMap
            name: descheduler-policy
            namespace: d8-descheduler
        - description: Show Descheduler CRs on failure
          get:
            apiVersion: deckhouse.io/v1alpha2
            kind: Descheduler
        - description: Show events in descheduler namespace
          events:
            namespace: d8-descheduler

    - name: wait-descheduler-ready
      description: Wait for descheduler deployment to be ready with the new policy
      try:
        - description: Wait for descheduler deployment Available condition
          wait:
            apiVersion: apps/v1
            kind: Deployment
            name: descheduler
            namespace: d8-descheduler
            timeout: 120s
            for:
              condition:
                name: Available
                value: 'True'
        - description: Assert descheduler has ready replicas
          assert:
            file: ../common/assert-descheduler-ready.yaml
      catch:
        - description: Describe descheduler deployment on failure
          describe:
            apiVersion: apps/v1
            kind: Deployment
            name: descheduler
            namespace: d8-descheduler
        - description: Show descheduler pods on failure
          get:
            apiVersion: v1
            kind: Pod
            namespace: d8-descheduler
            selector: app=descheduler
        - description: Show events in descheduler namespace
          events:
            namespace: d8-descheduler

    - name: wait-for-descheduler-cycle
      description: Wait for descheduler to execute the HighNodeUtilization plugin
      try:
        - description: Poll descheduler logs for HighNodeUtilization execution
          script:
            timeout: 420s
            content: |
              DESCHEDULER_POD=$(kubectl get pods -n d8-descheduler -l app=descheduler -o jsonpath='{.items[0].metadata.name}')
              echo "Watching logs of pod: $DESCHEDULER_POD"
              for i in $(seq 1 80); do
                if kubectl logs -n d8-descheduler "$DESCHEDULER_POD" -c descheduler 2>/dev/null | grep -q "HighNodeUtilization"; then
                  echo "HighNodeUtilization plugin has executed"
                  exit 0
                fi
                sleep 5
              done
              echo "Timed out waiting for HighNodeUtilization to execute"
              kubectl logs -n d8-descheduler "$DESCHEDULER_POD" -c descheduler 2>/dev/null | tail -50
              exit 1
            check:
              ($error == null): true
      catch:
        - description: Describe descheduler pod on failure
          describe:
            apiVersion: v1
            kind: Pod
            namespace: d8-descheduler
            selector: app=descheduler
        - description: Show descheduler pod logs on failure
          podLogs:
            namespace: d8-descheduler
            selector: app=descheduler
