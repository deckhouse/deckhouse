apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: descheduler-low-node-utilization
spec:
  timeouts:
    apply: 30s
    assert: 120s
    delete: 30s
    exec: 120s

  steps:
    - name: assert-descheduler-ready
      description: Verify that the descheduler deployment exists and is ready
      try:
        - assert:
            file: ../common/assert-descheduler-ready.yaml

    - name: check-minimum-nodes
      description: Verify that the cluster has at least 2 nodes for the balancing test
      try:
        - script:
            content: |
              NODE_COUNT=$(kubectl get nodes --no-headers | wc -l | tr -d ' ')
              echo "$NODE_COUNT"
              [ "$NODE_COUNT" -ge 2 ]
            check:
              ($error == null): true

    - name: apply-descheduler-cr
      description: Create Descheduler CR with LowNodeUtilization strategy
      try:
        - apply:
            file: files/descheduler-cr.yaml
        - assert:
            resource:
              apiVersion: deckhouse.io/v1alpha2
              kind: Descheduler
              metadata:
                name: e2e-low-node-utilization
      cleanup:
        - delete:
            ref:
              apiVersion: deckhouse.io/v1alpha2
              kind: Descheduler
              name: e2e-low-node-utilization

    - name: wait-descheduler-restart
      description: Wait for descheduler to restart with the new policy from CR
      try:
        - wait:
            apiVersion: apps/v1
            kind: Deployment
            name: descheduler
            namespace: d8-descheduler
            timeout: 120s
            for:
              condition:
                name: Available
                value: 'True'
        - assert:
            file: ../common/assert-descheduler-ready.yaml
      catch:
        - describe:
            apiVersion: apps/v1
            kind: Deployment
            name: descheduler
            namespace: d8-descheduler
        - get:
            apiVersion: v1
            kind: Pod
            namespace: d8-descheduler
            selector: app=descheduler
        - events:
            namespace: d8-descheduler
        - podLogs:
            namespace: d8-descheduler
            selector: app=descheduler

    - name: create-imbalanced-workload
      description: Create 10 pause pods pinned to one node to produce resource imbalance
      try:
        - script:
            content: |
              TARGET_NODE=$(kubectl get nodes --no-headers -o custom-columns=':metadata.name' | head -1)
              echo "Pinning pods to node: $TARGET_NODE"
              for i in $(seq 1 10); do
                kubectl run pause-pod-$i \
                  --namespace "$NAMESPACE" \
                  --image=registry.k8s.io/pause:3.9 \
                  --overrides="{\"spec\":{\"nodeName\":\"$TARGET_NODE\"}}"
              done
            check:
              ($error == null): true
      catch:
        - get:
            apiVersion: v1
            kind: Pod
        - events: {}

    - name: wait-pods-ready
      description: Wait for all 10 pause pods to become ready
      try:
        - wait:
            apiVersion: v1
            kind: Pod
            name: pause-pod-1
            timeout: 60s
            for:
              condition:
                name: Ready
                value: 'True'
        - wait:
            apiVersion: v1
            kind: Pod
            name: pause-pod-5
            timeout: 60s
            for:
              condition:
                name: Ready
                value: 'True'
        - wait:
            apiVersion: v1
            kind: Pod
            name: pause-pod-10
            timeout: 60s
            for:
              condition:
                name: Ready
                value: 'True'

    - name: assert-pods-running
      description: Assert that representative pause pods are in Running phase
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: pause-pod-1
              status:
                phase: Running
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: pause-pod-5
              status:
                phase: Running
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: pause-pod-10
              status:
                phase: Running

    - name: trigger-descheduler-cycle
      description: Restart descheduler to force an immediate descheduling cycle with the current workload
      try:
        - script:
            content: |
              kubectl rollout restart deployment/descheduler -n d8-descheduler
            check:
              ($error == null): true
        - wait:
            apiVersion: apps/v1
            kind: Deployment
            name: descheduler
            namespace: d8-descheduler
            timeout: 120s
            for:
              condition:
                name: Available
                value: 'True'
      catch:
        - describe:
            apiVersion: apps/v1
            kind: Deployment
            name: descheduler
            namespace: d8-descheduler
        - events:
            namespace: d8-descheduler

    - name: wait-for-descheduler-cycle
      description: Wait for descheduler to execute the LowNodeUtilization plugin (descheduling-interval is 5m with Frequent preset)
      try:
        - script:
            timeout: 420s
            content: |
              for i in $(seq 1 80); do
                if kubectl logs -n d8-descheduler -l app=descheduler -c descheduler --since=7m 2>/dev/null | grep -q "LowNodeUtilization"; then
                  echo "LowNodeUtilization plugin has executed"
                  exit 0
                fi
                sleep 5
              done
              echo "Timed out waiting for LowNodeUtilization to execute"
              kubectl logs -n d8-descheduler -l app=descheduler -c descheduler --since=7m 2>/dev/null | tail -30
              exit 1
            check:
              ($error == null): true
      catch:
        - describe:
            apiVersion: v1
            kind: Pod
            namespace: d8-descheduler
            selector: app=descheduler
        - get:
            apiVersion: v1
            kind: Pod
            namespace: d8-descheduler
            selector: app=descheduler
        - events:
            namespace: d8-descheduler
        - podLogs:
            namespace: d8-descheduler
            selector: app=descheduler

    - name: verify-pod-redistribution
      description: Verify that descheduler redistributed pods across multiple nodes
      try:
        - script:
            content: |
              NODE_COUNT=$(kubectl get pods --namespace "$NAMESPACE" \
                -o jsonpath='{range .items[*]}{.spec.nodeName}{"\n"}{end}' | sort -u | wc -l | tr -d ' ')
              echo "Pods are distributed across $NODE_COUNT node(s)"
            check:
              ($error == null): true
