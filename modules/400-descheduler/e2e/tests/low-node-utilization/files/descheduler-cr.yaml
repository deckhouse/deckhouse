apiVersion: deckhouse.io/v1alpha2
kind: Descheduler
metadata:
  name: e2e-low-node-utilization
spec:
  strategies:
    lowNodeUtilization:
      enabled: true
      thresholds:
        cpu: 40
        memory: 45
        pods: 40
      targetThresholds:
        cpu: 70
        memory: 80
        pods: 70
