apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: descheduler-exclude-namespaces-from-processing
spec:
  timeouts:
    apply: 30s
    assert: 120s
    delete: 30s
    exec: 120s

  steps:
    - name: assert-descheduler-ready
      description: Verify that the descheduler deployment exists and is ready
      try:
        - assert:
            file: ../common/assert-descheduler-ready.yaml

    - name: check-minimum-nodes
      description: Verify that the cluster has at least 2 nodes for the namespace exclusion test
      try:
        - script:
            content: |
              NODE_COUNT=$(kubectl get nodes --no-headers | wc -l | tr -d ' ')
              echo "$NODE_COUNT"
              [ "$NODE_COUNT" -ge 2 ]
            check:
              ($error == null): true

    - name: apply-descheduler-cr
      description: Create Descheduler CR with LowNodeUtilization strategy to trigger evictions
      try:
        - apply:
            file: files/descheduler-cr.yaml
        - assert:
            resource:
              apiVersion: deckhouse.io/v1alpha2
              kind: Descheduler
              metadata:
                name: e2e-exclude-namespaces
      cleanup:
        - delete:
            ref:
              apiVersion: deckhouse.io/v1alpha2
              kind: Descheduler
              name: e2e-exclude-namespaces

    - name: wait-descheduler-restart
      description: Wait for descheduler to restart with the new policy from CR
      try:
        - wait:
            apiVersion: apps/v1
            kind: Deployment
            name: descheduler
            namespace: d8-descheduler
            timeout: 120s
            for:
              condition:
                name: Available
                value: 'True'
        - assert:
            file: ../common/assert-descheduler-ready.yaml
      catch:
        - describe:
            apiVersion: apps/v1
            kind: Deployment
            name: descheduler
            namespace: d8-descheduler
        - get:
            apiVersion: v1
            kind: Pod
            namespace: d8-descheduler
            selector: app=descheduler
        - events:
            namespace: d8-descheduler
        - podLogs:
            namespace: d8-descheduler
            selector: app=descheduler

    - name: create-protected-namespace
      description: Create the d8-chainsaw-test namespace protected from eviction by the Deckhouse patch
      try:
        - apply:
            file: files/protected-namespace.yaml
        - assert:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: d8-chainsaw-test
      cleanup:
        - delete:
            ref:
              apiVersion: v1
              kind: Namespace
              name: d8-chainsaw-test

    - name: create-protected-workload
      description: Create 5 pause pods in the protected d8-chainsaw-test namespace pinned to one node
      try:
        - script:
            content: |
              TARGET_NODE=$(kubectl get nodes --no-headers -o custom-columns=':metadata.name' | head -1)
              echo "Pinning protected pods to node: $TARGET_NODE"
              for i in $(seq 1 5); do
                kubectl run protected-pod-$i \
                  --namespace d8-chainsaw-test \
                  --image=registry.k8s.io/pause:3.9 \
                  --overrides="{\"spec\":{\"nodeName\":\"$TARGET_NODE\"}}"
              done
            check:
              ($error == null): true
      catch:
        - get:
            apiVersion: v1
            kind: Pod
            namespace: d8-chainsaw-test
        - events:
            namespace: d8-chainsaw-test

    - name: create-regular-workload
      description: Create 5 pause pods in the regular test namespace pinned to the same node
      try:
        - script:
            content: |
              TARGET_NODE=$(kubectl get nodes --no-headers -o custom-columns=':metadata.name' | head -1)
              echo "Pinning regular pods to node: $TARGET_NODE"
              for i in $(seq 1 5); do
                kubectl run regular-pod-$i \
                  --namespace "$NAMESPACE" \
                  --image=registry.k8s.io/pause:3.9 \
                  --overrides="{\"spec\":{\"nodeName\":\"$TARGET_NODE\"}}"
              done
            check:
              ($error == null): true
      catch:
        - get:
            apiVersion: v1
            kind: Pod
        - events: {}

    - name: wait-protected-pods-ready
      description: Wait for protected pods to become ready
      try:
        - wait:
            apiVersion: v1
            kind: Pod
            name: protected-pod-1
            namespace: d8-chainsaw-test
            timeout: 60s
            for:
              condition:
                name: Ready
                value: 'True'
        - wait:
            apiVersion: v1
            kind: Pod
            name: protected-pod-5
            namespace: d8-chainsaw-test
            timeout: 60s
            for:
              condition:
                name: Ready
                value: 'True'

    - name: assert-protected-pods-running
      description: Assert all protected pods in d8-chainsaw-test are running
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: protected-pod-1
                namespace: d8-chainsaw-test
              status:
                phase: Running
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: protected-pod-3
                namespace: d8-chainsaw-test
              status:
                phase: Running
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: protected-pod-5
                namespace: d8-chainsaw-test
              status:
                phase: Running

    - name: wait-regular-pods-ready
      description: Wait for regular pods to become ready
      try:
        - wait:
            apiVersion: v1
            kind: Pod
            name: regular-pod-1
            timeout: 60s
            for:
              condition:
                name: Ready
                value: 'True'
        - wait:
            apiVersion: v1
            kind: Pod
            name: regular-pod-5
            timeout: 60s
            for:
              condition:
                name: Ready
                value: 'True'

    - name: assert-regular-pods-running
      description: Assert all regular pods in the test namespace are running
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: regular-pod-1
              status:
                phase: Running
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: regular-pod-5
              status:
                phase: Running

    - name: trigger-descheduler-cycle
      description: Restart descheduler to force an immediate descheduling cycle with the current workload
      try:
        - script:
            content: |
              kubectl rollout restart deployment/descheduler -n d8-descheduler
            check:
              ($error == null): true
        - wait:
            apiVersion: apps/v1
            kind: Deployment
            name: descheduler
            namespace: d8-descheduler
            timeout: 120s
            for:
              condition:
                name: Available
                value: 'True'
      catch:
        - describe:
            apiVersion: apps/v1
            kind: Deployment
            name: descheduler
            namespace: d8-descheduler
        - events:
            namespace: d8-descheduler

    - name: wait-for-descheduler-cycle
      description: Wait for descheduler to execute the LowNodeUtilization plugin after restart
      try:
        - script:
            timeout: 120s
            content: |
              for i in $(seq 1 24); do
                if kubectl logs -n d8-descheduler -l app=descheduler -c descheduler --since=2m 2>/dev/null | grep -q "LowNodeUtilization"; then
                  echo "LowNodeUtilization plugin has executed"
                  exit 0
                fi
                sleep 5
              done
              echo "Timed out waiting for LowNodeUtilization to execute"
              exit 1
            check:
              ($error == null): true
      catch:
        - describe:
            apiVersion: v1
            kind: Pod
            namespace: d8-descheduler
            selector: app=descheduler
        - get:
            apiVersion: v1
            kind: Pod
            namespace: d8-descheduler
            selector: app=descheduler
        - events:
            namespace: d8-descheduler
        - podLogs:
            namespace: d8-descheduler
            selector: app=descheduler

    - name: verify-protected-pods-not-evicted
      description: Verify that all 5 pods in the protected d8-chainsaw-test namespace were NOT evicted
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: protected-pod-1
                namespace: d8-chainsaw-test
              status:
                phase: Running
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: protected-pod-2
                namespace: d8-chainsaw-test
              status:
                phase: Running
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: protected-pod-3
                namespace: d8-chainsaw-test
              status:
                phase: Running
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: protected-pod-4
                namespace: d8-chainsaw-test
              status:
                phase: Running
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: protected-pod-5
                namespace: d8-chainsaw-test
              status:
                phase: Running

    - name: verify-no-evictions-in-protected-namespace
      description: Verify zero eviction events occurred in the protected namespace
      try:
        - error:
            resource:
              apiVersion: v1
              kind: Event
              metadata:
                namespace: d8-chainsaw-test
              reason: Evicted

    - name: verify-namespace-filtering-logs
      description: Verify descheduler logs show namespace filtering by the Deckhouse patch
      try:
        - script:
            content: |
              FILTER_LOGS=$(kubectl logs -n d8-descheduler -l app=descheduler -c descheduler --since=5m 2>/dev/null | grep "pod in the deckhouse namespace" || true)
              if [ -n "$FILTER_LOGS" ]; then
                echo "Patch is active - descheduler filtered pods in protected namespaces"
                echo "$FILTER_LOGS" | head -10
              else
                echo "WARNING: No namespace filtering log entries found (patch may use different log format)"
              fi
            check:
              ($error == null): true
