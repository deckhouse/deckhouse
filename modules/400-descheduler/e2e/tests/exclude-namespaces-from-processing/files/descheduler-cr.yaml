apiVersion: deckhouse.io/v1alpha2
kind: Descheduler
metadata:
  name: e2e-exclude-namespaces
spec:
  strategies:
    lowNodeUtilization:
      enabled: true
      thresholds:
        cpu: 55
        memory: 65
        pods: 50
      targetThresholds:
        cpu: 70
        memory: 80
        pods: 70
