# This rule is not used by the project cni-switch-helper itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over network.deckhouse.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cni-switch-helper
    app.kubernetes.io/managed-by: kustomize
  name: cninodemigration-admin-role
rules:
- apiGroups:
  - network.deckhouse.io
  resources:
  - cninodemigrations
  verbs:
  - '*'
- apiGroups:
  - network.deckhouse.io
  resources:
  - cninodemigrations/status
  verbs:
  - get
