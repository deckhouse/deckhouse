---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - network.deckhouse.io
  resources:
  - cnimigrations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - network.deckhouse.io
  resources:
  - cnimigrations/finalizers
  verbs:
  - update
- apiGroups:
  - network.deckhouse.io
  resources:
  - cnimigrations/status
  verbs:
  - get
  - patch
  - update
