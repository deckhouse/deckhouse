---
image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: common/distroless
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
  add: /kube-rbac-proxy
  to: /kube-rbac-proxy
  before: setup
{{- include "image mount points" . }}
imageSpec:
  config:
    # Category B TLS profile (deckhouse TLS standard, see
    # go_lib/hooks/tls_certificate/README.md): kube-rbac-proxy fronts
    # metrics endpoints scraped by Prometheus and (possibly) third-party
    # scrapers, so TLS 1.2 stays as a compatibility floor but only ECDHE
    # + AEAD suites are allowed. RSA-key-exchange, CBC and SHA1 suites
    # were removed (CIS / Mozilla Modern alignment).
    entrypoint: ["/kube-rbac-proxy", "--tls-min-version", "VersionTLS12", "--tls-cipher-suites", "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256"]
    expose: ["8080"]
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
git:
- add: /{{ $.ModulePath }}modules/{{ .ModulePriority }}-{{ $.ModuleName }}/images/{{ $.ImageName }}/patches
  to: /patches
  stageDependencies:
    install:
    - '**/*'
secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  install:
  - git clone --depth 1 --branch v0.11.0 $(cat /run/secrets/SOURCE_REPO)/brancz/kube-rbac-proxy.git /src
  - cd /src
  - git apply /patches/*.patch --verbose
  - rm -r .git
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
from: {{ index $.Images "builder/golang" }}
final: false
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  install:
  - cd /src
  - export GOPROXY=$(cat /run/secrets/GOPROXY) GOOS=linux GOARCH=amd64 CGO_ENABLED=0
  - make build
  - cp /src/_output/kube-rbac-proxy-linux-$(go env GOARCH) /kube-rbac-proxy
  - chown 64535:64535 /kube-rbac-proxy
  - chmod 0755 /kube-rbac-proxy
---
{{- include "vex mitigation" (list $ (printf "%s/%s" $.ModuleName $.ImageName)) }}
