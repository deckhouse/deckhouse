{{- $iptables_version := "1.8.9" }}
{{- $iptables_image_version := $iptables_version | replace "." "-" }}
{{- $curl_version := "8.9.1" }}
{{- $curl_image_version := $curl_version | replace "." "-" }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
fromImage: common/relocate-artifact
final: false
import:
  # From the base_image repository
- image: tools/coreutils
  add: /
  to: /coreutils
  includePaths:
  - usr
  before: install
- image: tools/bash
  add: /
  to: /bash
  includePaths:
  - usr
  before: install
- image: tools/findutils
  add: /
  to: /findutils
  includePaths:
  - usr
  before: install
- image: tools/gawk
  add: /
  to: /gawk
  includePaths:
  - usr
  before: install
- image: tools/grep
  add: /
  to: /grep
  includePaths:
  - usr
  before: install
- image: tools/jq
  add: /
  to: /jq
  includePaths:
  - usr
  before: install
- image: tools/less
  add: /
  to: /less
  includePaths:
  - usr
  before: install
- image: tools/sed
  add: /
  to: /sed
  includePaths:
  - usr
  before: install
- image: tools/vim
  add: /
  to: /vim
  includePaths:
  - usr
  before: install
- image: tools/openssl
  add: /
  to: /openssl
  includePaths:
  - usr
  - lib
  before: install
- image: libs/musl
  add: /
  to: /musl
  includePaths:
  - usr
  - lib
  before: install

  # TODO: Move to the base_image repository
- image: common/pwru
  add: /pwru
  to: /common/pwru
  before: install

  # From common and registrypackages
- image: common/ethtool
  add: /ethtool
  to: /common/ethtool
  before: install
- image: registrypackages/iptables-artifact-{{ $iptables_image_version }}
  add: /
  to: /iptables
  includePaths:
  - xtables-legacy-multi
  - xtables-nft-multi
  before: install
- image: registrypackages/d8-curl-artifact-{{ $curl_image_version }}
  add: /
  to: /curl
  includePaths:
  - d8-curl
  before: install
shell:
  install:
  - mkdir -p /relocate/{bin,lib}
  # From the base_image repository
  - cp -r /coreutils/usr /relocate/
  - cp -r /bash/usr /relocate/
  - cp -r /findutils/usr /relocate/
  - cp -r /gawk/usr /relocate/
  - cp -r /grep/usr /relocate/
  - cp -r /jq/usr /relocate/
  - cp -r /less/usr /relocate/
  - cp -r /sed/usr /relocate/
  - cp -r /vim/usr /relocate/
  - cp -r /openssl/usr /relocate/
  - cp -r /openssl/lib /relocate/lib
  - cp -r /musl/usr /relocate/
  - cp -r /musl/lib /relocate/lib

  # TODO: Move to the base_image repository
  - cp /common/pwru /relocate/bin/

  # From common and registrypackages
  - cp /common/ethtool /relocate/bin/
  - cp /curl/d8-curl /relocate/bin/ && mv /relocate/bin/d8-curl /relocate/bin/curl

  - mkdir -p /relocate/sbin
  - cp -r /iptables/* /relocate/sbin
  - |
    # broken symlinks are not imported from the artifact
    touch /sbin/{xtables-legacy-multi,xtables-nft-multi}
    for mode in legacy nft; do
      for basecmd in iptables ip6tables; do
        for cmd in ${basecmd}-${mode} ${basecmd}-${mode}-save ${basecmd}-${mode}-restore; do
          ln -sf /sbin/xtables-${mode}-multi "/relocate/sbin/${cmd}"
        done
      done
    done

  # Reducing the image size
  - rm -rf /relocate/share/{doc,man}
  - rm -rf /relocate/share/vim/{doc,tutor}
  - rm -rf /relocate/bin/vimtutor

  - mkdir base-items && cd base-items
  - ln -sf /usr/bin bin
  - ln -sf /usr/sbin sbin
  - ln -sf /usr/lib lib
  - ln -sf /usr/lib64 lib64
  - mkdir run
---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: base/distroless
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
  add: /relocate
  to: /usr
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
  add: /base-items
  to: /
  includePaths:
  - bin
  - sbin
  - lib
  - lib64
  - run
  before: install
imageSpec:
  config:
    env: { "PATH": "/usr/sbin:/usr/bin:/sbin:/bin", "LD_LIBRARY_PATH": "/usr/lib64:/usr/lib", "LANG": "C.UTF-8", "LANGUAGE": "C.UTF-8", "LC_ALL": "C.UTF-8" }
    workingDir: "/"
    user: "root:root"
    cmd: ["/usr/bin/bash"]
