{{- $iptables_version := "1.8.9" }}
{{- $iptables_image_version := $iptables_version | replace "." "-" }}
{{- $curl_version := "8.9.1" }}
{{- $curl_image_version := $curl_version | replace "." "-" }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
fromImage: common/relocate-artifact
final: false
import:
  # From the base_image repository
- image: tools/coreutils
  add: /usr
  to: /coreutils
  before: install
- image: tools/bash
  add: /usr
  to: /bash
  before: install
- image: tools/findutils
  add: /usr
  to: /findutils
  before: install
- image: tools/gawk
  add: /usr
  to: /gawk
  before: install
- image: tools/grep
  add: /usr
  to: /grep
  before: install
- image: tools/jq
  add: /usr
  to: /jq
  before: install
- image: tools/less
  add: /usr
  to: /less
  before: install
- image: tools/sed
  add: /usr
  to: /sed
  before: install
- image: tools/vim
  add: /usr
  to: /vim
  before: install
- image: libs/openssl
  add: /usr
  to: /openssl
  before: install
- image: libs/musl
  add: /usr
  to: /musl
  before: install

  # TODO: Move to the base_image repository
- image: common/pwru
  add: /pwru
  to: /common/pwru
  before: install

  # From common and registrypackages
- image: common/ethtool
  add: /ethtool
  to: /common/ethtool
  before: install
- image: registrypackages/iptables-artifact-{{ $iptables_image_version }}
  add: /
  to: /iptables
  includePaths:
  - xtables-legacy-multi
  - xtables-nft-multi
  before: install
- image: registrypackages/d8-curl-artifact-{{ $curl_image_version }}
  add: /
  to: /curl
  includePaths:
  - d8-curl
  before: install
shell:
  install:
  - mkdir -p /relocate
  # From the base_image repository
  - cp -r /coreutils/* /relocate/
  - cp -r /bash/* /relocate/
  - cp -r /findutils/* /relocate/
  - cp -r /gawk/* /relocate/
  - cp -r /grep/* /relocate/
  - cp -r /jq/* /relocate/
  - cp -r /less/* /relocate/
  - cp -r /sed/* /relocate/
  - cp -r /vim/* /relocate/
  - cp -r /openssl/* /relocate/
  - cp -r /musl/* /relocate/

  # TODO: Move to the base_image repository
  - cp /common/pwru /relocate/bin/

  # From common and registrypackages
  - cp /common/ethtool /relocate/bin/
  - cp /curl/d8-curl /relocate/bin/ && mv /relocate/bin/d8-curl /relocate/bin/curl

  - mkdir -p /relocate/sbin
  - cp -r /iptables/* /relocate/sbin
  - |
    # broken symlinks are not imported from the artifact
    touch /sbin/{xtables-legacy-multi,xtables-nft-multi}
    for mode in legacy nft; do
      for basecmd in iptables ip6tables; do
        for cmd in ${basecmd}-${mode} ${basecmd}-${mode}-save ${basecmd}-${mode}-restore; do
          ln -sf /sbin/xtables-${mode}-multi "/relocate/sbin/${cmd}"
        done
      done
    done

  # Reducing the image size
  - rm -rf /relocate/share/{doc,man}
  - rm -rf /relocate/share/vim/{doc,tutor}
  - rm -rf /relocate/bin/vimtutor
---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: base/distroless
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
  add: /relocate
  to: /usr
  before: install
shell:
  install:
  - rm -rf /bin /sbin /lib /lib64
  - ln -sf /usr/bin /bin
  - ln -sf /usr/sbin /sbin
  - ln -sf /usr/lib /lib
  - ln -sf /usr/lib64 /lib64
  - mkdir -p /run
imageSpec:
  config:
    env: { "PATH": "/usr/sbin:/usr/bin:/sbin:/bin", "LD_LIBRARY_PATH": "/usr/lib64:/usr/lib", "LANG": "C.UTF-8", "LANGUAGE": "C.UTF-8", "LC_ALL": "C.UTF-8" }
    workingDir: "/"
    user: "root:root"
    cmd: ["/usr/bin/bash"]
