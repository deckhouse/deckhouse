---
image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
fromImage: common/relocate-artifact
final: false
import:
- image: tools/coreutils
  add: /usr
  to: /coreutils
  before: install
- image: tools/bash
  add: /usr
  to: /bash
  before: install
- image: common/ethtool
  add: /ethtool
  to: /common/ethtool
  before: install
- image: common/pwru
  add: /pwru
  to: /common/pwru
  before: install
shell:
  install:
  - mkdir -p /relocate
  - cp -r /coreutils/* /relocate/
  - cp -r /bash/* /relocate/
  - cp /common/ethtool /relocate/bin/
  - cp /common/pwru /relocate/bin/
---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: base/distroless
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
  add: /relocate
  to: /usr
  before: install
shell:
  install:
  - ln -s /usr/bin /bin
  # - ln -s /usr/sbin /sbin
imageSpec:
  config:
    env: { "PATH": "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin", "LANG": "C.UTF-8", "LANGUAGE": "C.UTF-8", "LC_ALL": "C.UTF-8" }
    workingDir: "/"
    cmd: ["/usr/bin/bash"]
