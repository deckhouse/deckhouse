---
image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
fromImage: common/relocate-artifact
final: false
import:
- image: tools/coreutils
  add: /usr
  to: /coreutils
  before: install
- image: tools/bash
  add: /usr
  to: /bash
  before: install
- image: tools/findutils
  add: /usr
  to: /findutils
  before: install
- image: tools/gawk
  add: /usr
  to: /gawk
  before: install
- image: tools/grep
  add: /usr
  to: /grep
  before: install
- image: tools/jq
  add: /usr
  to: /jq
  before: install
- image: tools/less
  add: /usr
  to: /less
  before: install
- image: tools/sed
  add: /usr
  to: /sed
  before: install
- image: tools/vim
  add: /usr
  to: /vim
  before: install
- image: libs/openssl
  add: /usr
  to: /openssl
  before: install
  #
- image: common/ethtool
  add: /ethtool
  to: /common/ethtool
  before: install
- image: common/pwru
  add: /pwru
  to: /common/pwru
  before: install
shell:
  install:
  - mkdir -p /relocate
  - cp -r /coreutils/* /relocate/
  - cp -r /bash/* /relocate/
  - cp -r /findutils/* /relocate/
  - cp -r /gawk/* /relocate/
  - cp -r /grep/* /relocate/
  - cp -r /jq/* /relocate/
  - cp -r /less/* /relocate/
  - cp -r /sed/* /relocate/
  - cp -r /vim/* /relocate/
  - cp -r /openssl/* /relocate/
  #
  - cp /common/ethtool /relocate/bin/
  - cp /common/pwru /relocate/bin/
  #
  - rm -rf /relocate/share/{doc,man}
  - rm -rf /relocate/share/vim/{doc,tutor}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: base/distroless
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
  add: /relocate
  to: /usr
  before: install
shell:
  install:
  - ln -s /usr/bin /bin
  - ln -s /usr/sbin /sbin
  - ln -s /usr/lib /lib
  - ln -s /usr/lib64 /lib64
imageSpec:
  config:
    env: { "PATH": "/usr/sbin:/usr/bin:/sbin:/bin", "LANG": "C.UTF-8", "LANGUAGE": "C.UTF-8", "LC_ALL": "C.UTF-8" }
    workingDir: "/"
    user: "root:root"
    cmd: ["/usr/bin/bash"]
