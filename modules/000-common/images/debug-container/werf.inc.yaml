{{- $iptables_version := "1.8.9" }}
{{- $iptables_image_version := $iptables_version | replace "." "-" }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
from: {{ index $.Images "builder/alpine" }}
final: false
import:
- image: registrypackages/iptables-artifact-{{ $iptables_image_version }}
  add: /
  to: /usr/bin
  includePaths:
  - xtables-legacy-multi
  - xtables-nft-multi
  before: install
shell:
  install:
  - cd /usr/bin
  - |
    for mode in legacy nft; do
      for base in iptables ip6tables; do
        for cmd in ${base}-${mode} ${base}-${mode}-save ${base}-${mode}-restore; do
          ln -sf xtables-${mode}-multi "${cmd}"
        done
      done
    done
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
final: false
from: {{ index $.Images "builder/distroless" }}
shell:
  install:
  - pm install baselayout -d /out
  - pm install curl bash jq yq sed grep gawk procps iproute2 findutils coreutils openssl vim less ethtool pwru gnu-glibc-locale util-linux -d /out
---
image: {{ $.ModuleName }}/{{ $.ImageName }}
from: {{ index $.Images "base/scratch" }}
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
  add: /out
  to: /
  before: install
- image: control-plane-manager/etcd
  add: /usr/bin
  to: /usr/bin
  includePaths:
  - etcdctl
  - etcdutl
  before: install
- image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
  add: /usr/bin
  to: /usr/bin
  includePaths:
  - xtables-legacy-multi
  - xtables-nft-multi
  - iptables-*
  - ip6tables-*
  before: install
shell:
  install:
  - ln -fs /var/run /run
  - ln -fs /bin/bash /bin/sh
imageSpec:
  config:
    env:
      "LANG": "C.UTF-8"
      "LANGUAGE": "C.UTF-8"
      "LC_ALL": "C.UTF-8"
      "CRYPTOGRAPHY_OPENSSL_NO_LEGACY": "true"
      "EDITOR": "/usr/bin/vim"
      "KUBE_EDITOR": "/usr/bin/vim"
      "PS1": '\\[\\033[01;30m\\][debug]\\[\\033[00m\\] \\[\\033[01;33m\\]\\u@\\h\\[\\033[01;34m\\] \\w \\$\\[\\033[00m\\] '
    workingDir: "/"
    user: "root:root"
    cmd: ["/bin/bash"]
