{{- $version_map := include "get_oss_version_map_by_id_and_condition_key" (list "csi-vsphere" "k8s" $) | fromYaml }}
{{- range $key, $value := $version_map }}
  {{- $image_version := toString $key | replace "." "-" }}
  {{- $version := toString $value }}
  {{- if $version }}
    {{- $patches := (printf "/%smodules/%s-%s/images/%s" $.ModulePath $.ModulePriority $.ModuleName $.ImageName) }}
    {{- $patch := false }}
    {{- range $path, $_ := $.Files.Glob (printf "%s/patches/%s/*.patch" $patches $version) }}
        {{- $patch = true }}
    {{- end }}
      {{- if ne $.Env "CSE" }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-{{ $image_version }}
fromImage: common/distroless
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact-{{ $image_version }}
  add: /src/vsphere-syncer
  to: /bin/vsphere-syncer
  before: setup
imageSpec:
  config:
    entrypoint: ["/bin/vsphere-syncer"]
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact-{{ $image_version }}
fromImage: common/src-artifact
final: false
    {{- if $patch }}
git:
- add: {{ $patches }}/patches/{{ $version }}
  to: /patches
  stageDependencies:
    install:
    - '**/*'
    {{- end }}
secrets:
- id: SOURCE_REPO
  value: {{ $.SOURCE_REPO }}
shell:
  install:
  - cd /src
  - git clone --depth 1 --branch {{ $version }} $(cat /run/secrets/SOURCE_REPO)/kubernetes-sigs/vsphere-csi-driver.git  .
  {{- if $patch }}
  - git apply /patches/*.patch --verbose
  {{- end }}
  - rm -rf vendor
  - rm -rf .git
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact-{{ $image_version }}
from: {{ index $.Images "builder/golang-alpine" }}
final: false
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact-{{ $image_version }}
  add: /src
  to: /src
  before: install
mount:
{{ include "mount points for golang builds" $ }}
secrets:
- id: GOPROXY
  value: {{ $.GOPROXY }}
shell:
  install:
  - export GO_VERSION=${GOLANG_VERSION}
  - cd /src
  - GOPROXY=$(cat /run/secrets/GOPROXY) go mod download
  - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -a -ldflags="-w -s -extldflags=static -X sigs.k8s.io/vsphere-csi-driver/v3/pkg/syncer.Version={{ $version }}" -o vsphere-syncer ./cmd/syncer
---
{{- include "vex mitigation" (list $ (printf "%s/%s-%s" $.ModuleName $.ImageName ($image_version))) }}
    {{- end }}
  {{- end }}
{{- end }}
