# Cross-namespace RBAC for in-cluster dhctl in the cloud provider namespace:
#   - terraform-state-exporter reads provider credential Secrets (CloudProviderVars);
#   - terraform-auto-converger writes the candi discovery-data Secret after converge
#     (saveCandiCloudProviderDiscoveryData; reads come from its cluster-wide role).
# The dmt rbac placement rule maps every name to the module's own or a system
# namespace and has no pattern for another module's namespace; files under
# templates/rbac* are exempt from that rule, so this cross-namespace RBAC lives
# here instead of the components' rbac-for-us.yaml.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: d8:terraform-manager:terraform-state-exporter
  namespace: d8-cloud-provider-{{ .Values.global.clusterConfiguration.cloud.provider | lower }}
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: d8:terraform-manager:terraform-state-exporter
  namespace: d8-cloud-provider-{{ .Values.global.clusterConfiguration.cloud.provider | lower }}
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: d8:terraform-manager:terraform-state-exporter
subjects:
- kind: ServiceAccount
  name: terraform-state-exporter
  namespace: d8-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: d8:terraform-manager:terraform-auto-converger
  namespace: d8-cloud-provider-{{ .Values.global.clusterConfiguration.cloud.provider | lower }}
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: d8:terraform-manager:terraform-auto-converger
  namespace: d8-cloud-provider-{{ .Values.global.clusterConfiguration.cloud.provider | lower }}
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: d8:terraform-manager:terraform-auto-converger
subjects:
- kind: ServiceAccount
  name: terraform-auto-converger
  namespace: d8-system
