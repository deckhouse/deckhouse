{{- $moduleGateway := dict }}
{{- include "helm_lib_module_gateway" (list . $moduleGateway) }}
{{- $orchestrator := .Values.registry.internal.orchestrator -}}
{{- if and $moduleGateway (($orchestrator).state).ingress_enabled .Values.global.modules.publicDomainTemplate (.Values.global.enabledModules | has "cert-manager") (include "helm_lib_kind_exists" (list . "HTTPRoute")) (include "helm_lib_kind_exists" (list . "ListenerSet")) -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry")) | nindent 2 }}
  name: registry
  namespace: d8-system
spec:
  listeners:
{{- if (include "helm_lib_module_https_route_tls_enabled" .) }}
  - allowedRoutes:
      namespaces:
        from: Same
    hostname: {{ include "helm_lib_module_public_domain" (list . "registry") }}
    name: registry
    port: 443
    protocol: HTTPS
    tls:
      certificateRefs:
      - group: ""
        kind: Secret
        name: {{ include "helm_lib_module_https_secret_name" (list . "registry-httproute-tls") }}
        namespace: d8-system
      mode: Terminate
  - allowedRoutes:
      namespaces:
        from: Same
    hostname: {{ include "helm_lib_module_public_domain" (list . "registry") }}
    name: registry-redirect
    port: 80
    protocol: HTTP
{{- else }}
  - allowedRoutes:
      namespaces:
        from: Same
    hostname: {{ include "helm_lib_module_public_domain" (list . "registry") }}
    name: registry
    port: 80
    protocol: HTTP
{{- end }}
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ $moduleGateway.name }}
    namespace: {{ $moduleGateway.namespace }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: registry
  namespace: d8-system
  annotations:
    registry.deckhouse.io/config-hash: {{ $orchestrator.hash | quote }}
    alb.network.deckhouse.io/hash-key: source-ip
    alb.network.deckhouse.io/backend-tls-settings: '{"mode": "MUTUAL", "caCertificates": "/etc/kube-rbac-proxy-client-ssl/ca.crt", "clientCertificate": "/etc/kube-rbac-proxy-client-ssl/client.crt", "privateKey": "/etc/kube-rbac-proxy-client-ssl/client.key", "insecureSkipVerify": true}'
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains"}'
  {{- end }}
  {{- if .Values.registry.whitelistSourceRanges }}
    alb.network.deckhouse.io/whitelist-source-range: {{ .Values.registry.whitelistSourceRanges | join "," }}
  {{- end }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry")) | nindent 2 }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "registry") }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: registry
    namespace: d8-system
    sectionName: registry
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: registry-push
      port: 5001
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
{{- if (include "helm_lib_module_https_route_tls_enabled" . ) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: registry-redirect
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry")) | nindent 2 }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "registry") }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: registry
    namespace: d8-system
    sectionName: registry-redirect
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
    matches:
    - path:
        type: PathPrefix
        value: /
{{- end }}
{{- end }}
