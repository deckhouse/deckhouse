{{- with .Values.registry.internal.webhook }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-webhook
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list $ (dict "app" "registry-webhook")) | nindent 2 }}
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: registry-webhook
  template:
    metadata:
      labels:
        app: registry-webhook
      annotations:
        checksum/creds: {{ $.Values.registry.internal.pki.hash | quote }}
    spec:
      {{- include "helm_lib_priority_class" (tuple $ "system-cluster-critical") | nindent 6 }}
      {{- include "helm_lib_node_selector" (tuple $ "system") | nindent 6 }}
      {{- include "helm_lib_tolerations" (tuple $ "any-node" "with-uninitialized") | nindent 6 }}
      {{- include "helm_lib_module_pod_security_context_run_as_user_deckhouse" $ | nindent 6 }}
      imagePullSecrets:
      - name: deckhouse-registry
      serviceAccountName: registry-webhook
      volumes:
      - name: certs
        secret:
          secretName: registry-webhook-tls
      - name: registry-module-pki
        secret:
          secretName: registry-module-pki
      containers:
      - name: registry-webhook
        {{- include "helm_lib_module_container_security_context_pss_restricted_flexible" dict | nindent 8 }}
        image: {{ include "helm_lib_module_image" (list $ "registryWebhook") }}
        imagePullPolicy: IfNotPresent
        ports:
        - name: webhook
          containerPort: 9443
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9443
            scheme: HTTPS
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9443
            scheme: HTTPS
        volumeMounts:
        - name: certs
          mountPath: /certs
          readOnly: true
        - name: registry-module-pki
          mountPath: /etc/registry-module-pki
          readOnly: true
        resources:
          requests:
            {{- include "helm_lib_module_ephemeral_storage_logs_with_extra" 10 | nindent 12 }}
            {{- if not ($.Values.global.enabledModules | has "vertical-pod-autoscaler") }}
            cpu: 25m
            memory: 64Mi
            {{- end }}
{{- end }}
