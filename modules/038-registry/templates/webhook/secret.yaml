{{- with .Values.registry.internal.webhook }}
---
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: registry-webhook-tls
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list $ (dict "app" "registry-webhook")) | nindent 2 }}
data:
  tls.crt: {{ .crt | b64enc | quote }}
  tls.key: {{ .key | b64enc | quote }}
  ca.crt: {{ .ca | b64enc | quote }}
{{- end }}
