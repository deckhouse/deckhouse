{{- if .Values.registry.internal.webhook }}
{{- if ($.Values.global.enabledModules | has "vertical-pod-autoscaler") }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: registry-webhook
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-webhook")) | nindent 2 }}
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: registry-webhook
  updatePolicy:
    updateMode: "Recreate"
  resourcePolicy:
    containerPolicies:
    - containerName: "registry-webhook"
      minAllowed:
        cpu: 25m
        memory: 64Mi
      maxAllowed:
        cpu: 100m
        memory: 128Mi
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: registry-webhook
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-webhook")) | nindent 2 }}
spec:
  maxUnavailable: {{ include "helm_lib_is_ha_to_value" (list . 1 0) }}
  selector:
    matchLabels:
      app: registry-webhook
{{- end }}
