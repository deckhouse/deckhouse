---
apiVersion: v1
kind: Service
metadata:
  name: registry-webhook
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-webhook")) | nindent 2 }}
spec:
  type: ClusterIP
  selector:
    app: registry-webhook
  ports:
  - name: webhook
    port: 443
    targetPort: webhook
    protocol: TCP
