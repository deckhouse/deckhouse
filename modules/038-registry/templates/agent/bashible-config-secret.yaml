{{- /* Gate on a non-empty module CA: rendering the seed with an empty ca while
       scheme is https would make containerd HTTPS-verify against the system trust
       store and fail. The PKI hook (OnBeforeHelm Order 10) populates the CA before
       render; this guard avoids emitting a broken seed in the degenerate window.
       `dig` reads the CA nil-safely — helm `and` does NOT short-circuit, so a bare
       .Values.registry.internal.pki.ca.cert would panic when internal.pki is absent. */ -}}
{{- if and (include "registry.renderNew" .) (dig "internal" "pki" "ca" "cert" "" .Values.registry) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-bashible-config
  namespace: d8-system
  annotations:
    helm.sh/resource-policy: keep
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry" "name" "registry-bashible-config")) | nindent 2 }}
data:
  config: {{ include "registry.joiningNodeConfig" . | b64enc }}
{{- end }}
