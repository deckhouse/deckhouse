{{- define "registry_agent_resources" }}
cpu: 25m
memory: 40Mi
{{- end }}

{{- if (include "registry.renderNew" .) }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: registry-agent
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-agent")) | nindent 2 }}
spec:
  selector:
    matchLabels:
      app: registry-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: registry-agent
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- include "helm_lib_module_pod_security_context_run_as_user_root" . | nindent 6 }}
      {{- include "helm_lib_priority_class" (tuple . "system-node-critical") | nindent 6 }}
      {{- include "helm_lib_tolerations" (tuple . "any-node") | nindent 6 }}
      imagePullSecrets:
      - name: deckhouse-registry
      serviceAccountName: registry-agent
      containers:
      - name: registry-agent
        {{- include "helm_lib_module_container_security_context_read_only_root_filesystem_capabilities_drop_all" . | nindent 8 }}
        image: {{ include "helm_lib_module_image" (list . "registryAgent") }}
        command: ["/agent"]
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        volumeMounts:
        - name: containerd-registry-d
          mountPath: /etc/containerd/registry.d
        - name: registry-agent-pki
          mountPath: /etc/kubernetes/registry-agent/pki
          readOnly: true
        - name: registry-agent-users
          mountPath: /etc/kubernetes/registry-agent
          readOnly: true
        - name: registry-bootstrap
          mountPath: /etc/kubernetes/registry-agent-bootstrap
          readOnly: true
        resources:
          requests:
            {{- include "helm_lib_module_ephemeral_storage_logs_with_extra" 50 | nindent 12 }}
            {{- if not ($.Values.global.enabledModules | has "vertical-pod-autoscaler") }}
              {{- include "registry_agent_resources" . | nindent 12 }}
            {{- end }}
        readinessProbe:
          httpGet:
            path: /readyz
            port: 5051
            host: 127.0.0.1
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
      volumes:
      - name: containerd-registry-d
        hostPath:
          path: /etc/containerd/registry.d
          type: DirectoryOrCreate
      - name: registry-agent-pki
        secret:
          secretName: registry-agent-pki
          optional: true
      - name: registry-agent-users
        secret:
          secretName: registry-agent-users
          optional: true
      - name: registry-bootstrap
        secret:
          secretName: registry-bootstrap
          optional: true
          items:
          - key: bootstrap-seed.yaml
            path: bootstrap-seed.yaml
{{- end }}
