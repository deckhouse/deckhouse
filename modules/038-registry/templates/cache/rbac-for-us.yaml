{{- if .Values.registry.cache.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: registry-cache
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-cache")) | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: registry-cache
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-cache")) | nindent 2 }}
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "create", "update"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: registry-cache
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-cache")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: registry-cache
subjects:
- kind: ServiceAccount
  name: registry-cache
  namespace: d8-system
{{- end }}
