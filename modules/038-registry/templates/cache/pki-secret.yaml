{{- if .Values.registry.cache.enabled }}
{{- with .Values.registry.internal.pki }}
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-cache-pki
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list $ (dict "app" "registry-cache")) | nindent 2 }}
type: Opaque
data:
  ca.crt: {{ .ca.cert | b64enc }}
  token.crt: {{ .token.cert | b64enc }}
  token.key: {{ .token.key | b64enc }}
  distribution.crt: {{ .distribution.cert | b64enc }}
  distribution.key: {{ .distribution.key | b64enc }}
  auth.crt: {{ .auth.cert | b64enc }}
  auth.key: {{ .auth.key | b64enc }}
  {{- if (include "registry.cache.ingressEnabled" $) }}
  ingress-client-ca.crt: {{ $.Values.global.internal.modules.kubeRBACProxyCA.cert | b64enc }}
  {{- end }}
  {{- with $.Values.registry.upstream }}
  {{- if .ca }}
  upstream-registry-ca.crt: {{ .ca | b64enc }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
