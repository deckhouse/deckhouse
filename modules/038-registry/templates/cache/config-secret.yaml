{{- if .Values.registry.cache.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-cache-config
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-cache")) | nindent 2 }}
type: Opaque
stringData:
  distribution-config.yaml: |
{{ include "registry.cache.distributionConfig" (dict "pki" .Values.registry.internal.pki "cache" .Values.registry.internal.cache "ingress" (include "registry.cache.ingressEnabled" .)) | indent 4 }}
  auth-config.yaml: |
{{ include "registry.cache.authConfig" (dict "pki" .Values.registry.internal.pki) | indent 4 }}
{{- end }}
