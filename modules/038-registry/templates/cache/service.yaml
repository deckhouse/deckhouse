{{- if .Values.registry.cache.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: registry-cache-peers
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-cache")) | nindent 2 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: registry-cache
  ports:
    - { name: distribution, port: 5001, targetPort: distribution }
---
apiVersion: v1
kind: Service
metadata:
  name: registry-cache
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-cache")) | nindent 2 }}
spec:
  selector:
    app: registry-cache
  ports:
    - { name: distribution, port: 5001, protocol: TCP, targetPort: distribution }
---
apiVersion: v1
kind: Service
metadata:
  name: registry-cache-leader
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry-cache")) | nindent 2 }}
spec:
  selector:
    app: registry-cache
    registry-cache-role: leader
  ports:
    - { name: distribution, port: 5001, protocol: TCP, targetPort: distribution }
{{- end }}
