{{- if .Values.registry.cache.enabled }}
{{- with .Values.registry.internal.pki }}
{{- $ro := dict }}{{- $rw := dict }}
{{- range .users }}{{- if eq .role "ReadOnly" }}{{- $ro = . }}{{- else if eq .role "ReadWrite" }}{{- $rw = . }}{{- end }}{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-cache-agent
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list $ (dict "app" "registry-cache")) | nindent 2 }}
type: Opaque
stringData:
  config.yaml: |
    leaderAddress: registry-cache-leader.d8-system.svc:5001
    localAddress: 127.0.0.1:5001
    readUser:
      name: {{ $ro.name | quote }}
      password: {{ $ro.password | quote }}
    writeUser:
      name: {{ $rw.name | quote }}
      password: {{ $rw.password | quote }}
    ca: |
{{ .ca.cert | indent 6 }}
    syncIntervalSeconds: 60
    gcIntervalSeconds: 3600
{{- end }}
{{- end }}
