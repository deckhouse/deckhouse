{{- $phase := .Values.registry.internal.takeover.phase | default "Legacy" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-takeover
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list . (dict "app" "registry" "type" "registry-takeover")) | nindent 2 }}
type: registry/takeover
stringData:
  phase: {{ $phase | quote }}
  flippedAt: {{ (.Values.registry.internal.takeover).flippedAt | default "" | quote }}
  takingOverStartedAt: {{ (.Values.registry.internal.takeover).takingOverStartedAt | default "" | quote }}
  derived: {{ (.Values.registry.internal.takeover).derived | default dict | toJson | quote }}
