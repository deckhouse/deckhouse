{{- with .Values.registry.internal.pki }}
{{- if and .users (include "registry.renderNew" $) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-agent-users
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list $ (dict "app" "registry-agent" "type" "registry-agent-users")) | nindent 2 }}
  annotations:
    registry.deckhouse.io/config-hash: {{ .hash | quote }}
type: Opaque
stringData:
  users.yaml: |
    users:
    {{- range .users }}
      - name: {{ .name | quote }}
        passwordHash: {{ .passwordHash | quote }}
        role: {{ .role | quote }}
    {{- end }}
{{- end }}
{{- end }}
