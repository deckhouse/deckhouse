{{- with .Values.registry.internal.pki }}
{{- if .ca }}
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-module-pki
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list $ (dict "app" "registry" "type" "registry-module-pki")) | nindent 2 }}
  annotations:
    registry.deckhouse.io/config-hash: {{ .hash | quote }}
type: registry/pki
data:
  ca.crt: {{ .ca.cert | b64enc }}
  ca.key: {{ .ca.key | b64enc }}
  token.crt: {{ .token.cert | b64enc }}
  token.key: {{ .token.key | b64enc }}
  agent.crt: {{ .agent.cert | b64enc }}
  agent.key: {{ .agent.key | b64enc }}
  distribution.crt: {{ .distribution.cert | b64enc }}
  distribution.key: {{ .distribution.key | b64enc }}
  auth.crt: {{ .auth.cert | b64enc }}
  auth.key: {{ .auth.key | b64enc }}
  users.json: {{ .users | toJson | b64enc }}
  http-secret: {{ .httpSecret | b64enc }}
{{- end }}
{{- end }}
