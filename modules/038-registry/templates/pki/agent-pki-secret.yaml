{{- with .Values.registry.internal.pki }}
{{- if and .ca .agent (include "registry.renderNew" $) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-agent-pki
  namespace: d8-system
  {{- include "helm_lib_module_labels" (list $ (dict "app" "registry-agent" "type" "registry-agent-pki")) | nindent 2 }}
  annotations:
    registry.deckhouse.io/config-hash: {{ .hash | quote }}
type: kubernetes.io/tls
data:
  ca.crt: {{ .ca.cert | b64enc }}
  tls.crt: {{ .agent.cert | b64enc }}
  tls.key: {{ .agent.key | b64enc }}
{{- end }}
{{- end }}
