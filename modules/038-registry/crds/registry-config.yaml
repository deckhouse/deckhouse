apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    heritage: deckhouse
    module: registry
    backup.deckhouse.io/cluster-config: "true"
  name: registryconfigs.deckhouse.io
spec:
  group: deckhouse.io
  names:
    kind: RegistryConfig
    listKind: RegistryConfigList
    plural: registryconfigs
    singular: registryconfig
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - jsonPath: .status.ready
          name: Ready
          type: boolean
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      schema:
        openAPIV3Schema:
          type: object
          description: |
            Desired state of the registry module data plane, consumed by the per-node agent.
            Rendered by the module from ModuleConfig; not intended for manual editing.
          properties:
            spec:
              type: object
              properties:
                registries:
                  type: array
                  description: Registries intercepted on nodes and proxied through the agent.
                  items:
                    type: object
                    required: [host]
                    properties:
                      host:
                        type: string
                        description: Virtual address intercepted on nodes (containerd registry.d/<host>).
                      source:
                        type: string
                        enum: [Primary, Additional, ModuleSource]
                        default: Additional
                        description: Provenance of the entry.
                      upstream:
                        type: object
                        description: Real upstream registry. Absent means air-gap (served from cache only).
                        required: [host]
                        properties:
                          host: {type: string}
                          path: {type: string}
                          scheme: {type: string, enum: [HTTP, HTTPS], default: HTTPS}
                          ca: {type: string}
                          credentials:
                            type: object
                            properties:
                              username: {type: string}
                              password: {type: string}
                              dockerCfg: {type: string}
                          mirrors:
                            type: array
                            items:
                              type: object
                              required: [host]
                              properties:
                                host: {type: string}
                                scheme: {type: string, enum: [HTTP, HTTPS], default: HTTPS}
                                ca: {type: string}
                                credentials:
                                  type: object
                                  properties:
                                    username: {type: string}
                                    password: {type: string}
                                    dockerCfg: {type: string}
                      cache:
                        type: object
                        properties:
                          enabled: {type: boolean, default: false}
                          ttl: {type: string}
                          storageSize: {type: string}
                          storageClass: { type: string }
                          publish: { type: boolean, default: false }
                auth:
                  type: object
                  description: Local auth presented by the agent/cache to in-cluster clients and containerd.
                  properties:
                    users:
                      type: array
                      items:
                        type: object
                        required: [name, role]
                        properties:
                          name: {type: string}
                          role: {type: string, enum: [ReadOnly, ReadWrite]}
            status:
              type: object
              properties:
                ready: {type: boolean}
                observedGeneration: {type: integer, format: int64}
                message: {type: string}
