x-extend:
  schema: config-values.yaml
type: object
properties:
  internal:
    type: object
    default: {}
    properties:
      bootstrapMasterEndpoints:
        type: array
        default: [ ]
        description: |-
          Ready control-plane node InternalIPs (written by hooks/master-endpoints).
          A joining node's containerd uses https://<ip>:5001 as a pre-CNI registry
          fallback (the master's hostNetwork agent) until its own agent takes over.
        items:
          type: string
      customCertificateData:
        type: object
        properties:
          tls.crt:
            type: string
            x-examples:
              - plainstring
          tls.key:
            type: string
            x-examples:
              - plainstring
          ca.crt:
            type: string
            x-examples:
              - plainstring

      cache:
        type: object
        default: {}
        properties:
          enabled:
            type: boolean
            default: false
          upstream:
            type: object
            properties:
              scheme:
                type: string
              host:
                type: string
              path:
                type: string
              username:
                type: string
              password:
                type: string
              hasCA:
                type: boolean
              ttl:
                type: string
      pki:
        type: object
        default: {}
        properties:
          hash:
            type: string
          httpSecret:
            type: string
          ca: &pkiCertKey
            type: object
            properties:
              cert:
                type: string
              key:
                type: string
          token:
            <<: *pkiCertKey
          agent:
            <<: *pkiCertKey
          distribution:
            <<: *pkiCertKey
          auth:
            <<: *pkiCertKey
          users:
            type: array
            default: []
            items:
              type: object
              properties:
                name:
                  type: string
                password:
                  type: string
                passwordHash:
                  type: string
                role:
                  type: string
                  enum: [ReadOnly, ReadWrite]
      takeover:
        type: object
        default: {}
        description: |-
          Migration phase between the legacy registry arch and the new arch.
          Written by hooks/takeover; gates in-place-reworked templates.
        properties:
          phase:
            type: string
            enum: ["Legacy", "TakingOver", "New", "CleanupPending"]
            description: |-
              Legacy: old orchestrator in control. New: new arch in control.
              TakingOver/CleanupPending: transitional (set by 7b / cleanup).
          flippedAt:
            type: string
            description: |-
              RFC3339 timestamp at which the cluster entered the New phase. Empty
              until the flip completes.
          takingOverStartedAt:
            type: string
            description: RFC3339 time the cluster entered TakingOver (drives migrateTimeout).
          storeSynced:
            type: boolean
            description: |-
              True once the air-gap Local store-sync Job has copied the legacy
              registry into the new cache. Gates TakingOver -> New for air-gap.
          derived:
            type: object
            default: {}
            description: |-
              New-arch config auto-translated from the legacy registry-config during
              the takeover (written by hooks/takeover). The RegistryConfig CR prefers
              this over the operator's upstream/cache while migrating.
            properties:
              present:
                type: boolean
              upstream:
                type: object
                additionalProperties: true
              cache:
                type: object
                additionalProperties: true
      orchestrator:
        type: object
        default: {}
        properties:
          ready:
            type: boolean
          hash:
            type: string
          state:
            type: object
            default: {}
            properties:
              target_mode:
                type: string
                enum: [Unmanaged, Direct, Proxy, Local]
              mode:
                type: string
                enum: [Unmanaged, Direct, Proxy, Local]
              init_params:
                type: object
                properties:
                  generation:
                    format: int64
                    type: integer
                  mode:
                    type: string
                  images_repo:
                    type: string
                  user_name:
                    type: string
                  password:
                    type: string
                  ttl:
                    type: string
                  scheme:
                    type: string
                  ca:
                    type: string
                  check_mode:
                    type: string
              pki:
                type: object
                properties:
                  ca: &certKey
                    type: object
                    properties:
                      cert:
                        type: string
                      key:
                        type: string
                  token:
                    <<: *certKey
              secrets:
                type: object
                properties:
                  http:
                    type: string
              users:
                type: object
                properties:
                  ro: &user
                    type: object
                    properties:
                      name:
                        type: string
                      password:
                        type: string
                      password_hash:
                        type: string
                  rw:
                    <<: *user
                  mirror_puller:
                    <<: *user
                  mirror_pusher:
                    <<: *user
              bashible:
                type: object
                properties:
                  unmanaged_params:
                    type: object
                    properties:
                      imagesRepo:
                        type: string
                      scheme:
                        type: string
                      ca:
                        type: string
                      username:
                        type: string
                      password:
                        type: string
                  actual_params:
                    type: object
                    properties:
                      mode:
                        type: string
                        enum: [Unmanaged, Direct, Proxy, Local]
                      proxy:
                        type: object
                        properties:
                          ca:
                            type: string
                          username:
                            type: string
                          password:
                            type: string
                      local:
                        type: object
                        properties:
                          ca:
                            type: string
                          username:
                            type: string
                          password:
                            type: string
                      unmanaged:
                        type: object
                        properties:
                          imagesRepo:
                            type: string
                          scheme:
                            type: string
                          ca:
                            type: string
                          username:
                            type: string
                          password:
                            type: string
                      direct:
                        type: object
                        properties:
                          imagesRepo:
                            type: string
                          scheme:
                            type: string
                          ca:
                            type: string
                          username:
                            type: string
                          password:
                            type: string
                  config:
                    type: object
                    additionalProperties: true
                    x-kubernetes-preserve-unknown-fields: true
              in_cluster_proxy:
                type: object
                properties:
                  config:
                    type: object
                    properties:
                      version:
                        type: string
                      config:
                        type: object
                        properties:
                          ca:
                            type: string
                          auth_cert:
                            type: string
                          auth_key:
                            type: string
                          token_cert:
                            type: string
                          token_key:
                            type: string
                          distribution_cert:
                            type: string
                          distribution_key:
                            type: string
                          http_secret:
                            type: string
                          upstream:
                            type: object
                            properties:
                              scheme:
                                type: string
                              host:
                                type: string
                              path:
                                type: string
                              ca:
                                type: string
                              user:
                                <<: *user
              node_services:
                type: object
                properties:
                  run:
                    type: boolean
                    default: false
                  nodes:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        config:
                          type: object
                          additionalProperties: true
                          x-kubernetes-preserve-unknown-fields: true
                        version:
                          type: string
              ingress_enabled:
                type: boolean
              registry_service:
                type: string
              conditions:
                x-kubernetes-patch-strategy: merge
                x-kubernetes-patch-merge-key: type
                type: array
                default: []
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    lastTransitionTime:
                      format: date-time
                      type: string
                    observedGeneration:
                      format: int64
                      type: integer
      checker:
        type: object
        default: {}
        properties:
          initialized:
            type: boolean
            default: false
          params:
            type: object
            default: {}
            properties:
              registries:
                type: object
                additionalProperties:
                  type: object
                  required: ["address", "scheme"]
                  properties:
                    address:
                      type: string
                    scheme:
                      type: string
                      enum: [HTTP, HTTPS]
                      default: "HTTPS"
                    ca:
                      type: string
                    username:
                      type: string
                    password:
                      type: string
              version:
                type: string
              checkMode:
                type: string
                enum: [Default, Relax]
                default: Default
          state:
            type: object
            default: {}
            properties:
              queues:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    processed:
                      type: integer
                      format: int
                    items:
                      type: array
                      items:
                        type: object
                        properties:
                          image:
                            type: string
                          info:
                            type: string
                          error:
                            type: string
                    retry:
                      type: array
                      items:
                        type: object
                        properties:
                          image:
                            type: string
                          info:
                            type: string
                          error:
                            type: string
                    last_attempt:
                      type: string
                      format: date-time
                    params_hash:
                      type: string
              version:
                type: string
              ready:
                type: boolean
                default: false
              message:
                type: string
