{{- $iptables_version := "1.8.9" }}
{{- $iptables_image_version := $iptables_version | replace "." "-" }}
---
image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: common/distroless
fromCacheVersion: "2025-09-05"
import:
- image: tools/coreutils
  add: /
  to: /
  before: setup
  includePaths:
  - usr/bin/coreutils
  - usr/bin/rm
  - usr/bin/cp
- image: tools/bash
  add: /usr/bin/bash
  to: /bin/bash
  before: setup
- image: common/iptables-wrapper
  add: /iptables-wrapper
  to: /iptables-wrapper
  before: setup
- image: registrypackages/iptables-artifact-{{ $iptables_image_version }}
  add: /
  to: /_sbin
  includePaths:
  - xtables-legacy-multi
  - xtables-nft-multi
  before: setup
- image: {{ .ModuleName }}/openvpn-binaries-artifact
  add: /relocate
  to: /relocate
  before: setup

