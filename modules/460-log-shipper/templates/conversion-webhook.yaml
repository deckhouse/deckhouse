---
apiVersion: deckhouse.io/v1alpha1
kind: ConversionWebhook
metadata:
  name: clusterlogdestinations.deckhouse.io
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
conversions:
  - from: v1alpha1
    to: v1alpha2
    handler:
      python: |
        def v1alpha1_to_v1alpha2(self, o: dict) -> typing.Tuple[str | None, dict]:
            import copy
            import json

            lac_key = "kubectl.kubernetes.io/last-applied-configuration"

            def decode_spec_from_last_applied(val: str):
                try:
                    payload = json.loads(val)
                except Exception:
                    return None
                return payload.get("spec")

            md = o.get("metadata") or {}
            ann = md.get("annotations") or {}
            if lac_key in ann:
                spec_from_lac = decode_spec_from_last_applied(ann[lac_key])
                if spec_from_lac is not None:
                    out = copy.deepcopy(o)
                    out["apiVersion"] = "deckhouse.io/v1alpha2"
                    out["spec"] = copy.deepcopy(spec_from_lac)
                    out.setdefault("metadata", {}).setdefault("annotations", copy.deepcopy(ann))
                    return None, out

            out = copy.deepcopy(o)
            out["apiVersion"] = "deckhouse.io/v1alpha2"
            spec = out.get("spec") or {}
            bo, bc = "{", "}"

            for t in spec.get("transformations") or []:
                if not isinstance(t, dict):
                    continue
                if t.get("action") == "DropLabels" and isinstance(t.get("dropLabels"), dict):
                    dl = t["dropLabels"]
                    labs = dl.get("labels")
                    if isinstance(labs, list) and labs and isinstance(labs[0], str):
                        dl["labels"] = [{"label": p} for p in labs]
                if t.get("action") == "ParseMessage" and isinstance(t.get("parseMessage"), dict):
                    pm = t["parseMessage"]
                    if pm.get("sourceFormat") == "String" and isinstance(pm.get("string"), dict):
                        st = dict(pm["string"])
                        tf = st.pop("targetField", None)
                        if not tf:
                            continue
                        st.clear()
                        st["regex"] = r"^(?P<%s>.*)$" % tf
                        st["setLabels"] = {tf: (bo * 2 + " %s " % tf + bc * 2)}
                        pm["string"] = st
            return None, out

  - from: v1alpha2
    to: v1alpha1
    handler:
      python: |
        def v1alpha2_to_v1alpha1(self, o: dict) -> typing.Tuple[str | None, dict]:
            import copy

            def catch_all_group_name(rx: str):
                pfx = "^(?P<"
                sfx = ">.*)$"
                if not isinstance(rx, str) or not rx.startswith(pfx) or not rx.endswith(sfx):
                    return None
                return rx[len(pfx) : -len(sfx)]

            out = copy.deepcopy(o)
            out["apiVersion"] = "deckhouse.io/v1alpha1"
            spec = out.get("spec") or {}

            for t in spec.get("transformations") or []:
                if not isinstance(t, dict):
                    continue
                if t.get("action") == "DropLabels" and isinstance(t.get("dropLabels"), dict):
                    dl = t["dropLabels"]
                    labs = dl.get("labels")
                    if isinstance(labs, list) and labs and isinstance(labs[0], dict):
                        dl["labels"] = [
                            e["label"]
                            for e in labs
                            if isinstance(e, dict) and isinstance(e.get("label"), str)
                        ]
                if t.get("action") == "ParseMessage" and isinstance(t.get("parseMessage"), dict):
                    pm = t["parseMessage"]
                    pm.pop("targetLabel", None)
                    if pm.get("sourceFormat") == "String" and isinstance(pm.get("string"), dict):
                        st = pm["string"]
                        rx = st.get("regex") or ""
                        sl = st.get("setLabels") or {}
                        name = catch_all_group_name(rx)
                        if name and isinstance(sl, dict) and len(sl) == 1 and name in sl:
                            val = str(sl[name]).strip()
                            bo, bc = "{", "}"
                            if val in (bo * 2 + name + bc * 2, bo * 2 + " " + name + " " + bc * 2):
                                pm["string"] = {"targetField": name}
                                continue
                        if isinstance(sl, dict) and sl:
                            pm["string"] = {"targetField": next(iter(sl))}
                        else:
                            pm["string"] = {"targetField": "msg"}

            return None, out
