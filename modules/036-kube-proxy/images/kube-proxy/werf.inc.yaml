---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
from: {{ index $.Images "builder/distroless" }}
final: false
shell:
  beforeInstall:
  - pm install conntrack-tools -d /relocate

  {{- range $key, $value := .CandiVersionMap.k8s }}
  {{- $version := toString $key }}
  {{- $patch := $value.patch | toString }}
  {{- $v := semver $version }}
  {{- $image_version := printf "%s.%s" $version $patch | replace "." "-" }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-{{ $version | replace "." "-" }}
fromImage: common/distroless
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
  add: /relocate
  to: /
  before: setup
- image: common/kubernetes-artifact-{{ $image_version }}
  add: /src/_output/bin/kube-proxy
  to: /usr/local/bin/kube-proxy
  before: setup
{{- include "image mount points" $ }}
imageSpec:
  config:
    entrypoint: ["/usr/bin/kube-proxy"]
---
{{- include "vex mitigation" (list $ (printf "%s/%s-%s" $.ModuleName $.ImageName ($version | replace "." "-"))) }}
{{- end }}
