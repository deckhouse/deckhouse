{{- $moduleGateway := dict }}
{{- include "helm_lib_module_gateway" (list . $moduleGateway) }}
{{- if and $moduleGateway .Values.prometheus.internal.grafana.enabled .Values.global.modules.publicDomainTemplate (include "helm_lib_kind_exists" (list . "HTTPRoute")) }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    alb.network.deckhouse.io/session-affinity: '{"mode": "cookie", "path": "/", "ttl": 0}'
    alb.network.deckhouse.io/backend-tls-settings: '{"mode": "MUTUAL", "caCertificates": "/etc/kube-rbac-proxy-client-ssl/ca.crt", "clientCertificate": "/etc/kube-rbac-proxy-client-ssl/client.crt", "privateKey": "/etc/kube-rbac-proxy-client-ssl/client.key", "insecureSkipVerify": true}'
  {{- if or (eq (include "helm_lib_module_https_mode" .) "CertManager") (eq (include "helm_lib_module_https_mode" .) "CustomCertificate") }}
    alb.network.deckhouse.io/response-headers-to-add: '{"Strict-Transport-Security":"max-age=31536000; includeSubDomains","X-Content-Type-Options":"nosniff"}'
  {{- end }}
  {{- if and (ne (include "helm_lib_module_https_mode" .) "Disabled") .Values.prometheus.auth.externalAuthentication }}
    alb.network.deckhouse.io/auth-signin: {{ replace "$host" (include "helm_lib_module_public_domain" (list . "grafana")) .Values.prometheus.auth.externalAuthentication.authSignInURL | quote }}
    alb.network.deckhouse.io/auth-url: {{ .Values.prometheus.auth.externalAuthentication.authURL | quote }}
    alb.network.deckhouse.io/auth-response-headers: X-Auth-Request-User,X-Auth-Request-Email
    {{- if .Values.prometheus.auth.satisfyAny }}
    alb.network.deckhouse.io/satisfy: "any"
    {{- end }}
  {{- else }}
    alb.network.deckhouse.io/basic-auth-secret: d8-monitoring/basic-auth
  {{- end }}
  {{- if .Values.prometheus.auth.whitelistSourceRanges }}
    alb.network.deckhouse.io/whitelist-source-range: {{ .Values.prometheus.auth.whitelistSourceRanges | join "," }}
  {{- end }}
  name: grafana-v10
  namespace: d8-monitoring
  {{- include "helm_lib_module_labels" (list . (dict "app" "grafana-v10")) | nindent 2 }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "grafana") }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: prometheus
    namespace: d8-monitoring
    sectionName: grafana
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: grafana-v10
      port: 443
      weight: 1
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          replaceFullPath: /
          type: ReplaceFullPath
    matches:
    - path:
        type: Exact
        value: /login
  - backendRefs:
    - group: ""
      kind: Service
      name: grafana-v10
      port: 443
      weight: 1
    filters:
    - requestHeaderModifier:
        set:
        - name: X-Content-Type-Options
          value: nosniff
      type: RequestHeaderModifier
    matches:
    - path:
        type: PathPrefix
        value: /
{{- if (include "helm_lib_module_https_route_tls_enabled" .) }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-redirect
  namespace: d8-monitoring
  {{- include "helm_lib_module_labels" (list . (dict "app" "grafana-v10")) | nindent 2 }}
spec:
  hostnames:
  - {{ include "helm_lib_module_public_domain" (list . "grafana") }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: prometheus
    namespace: d8-monitoring
    sectionName: grafana-redirect
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
    matches:
    - path:
        type: PathPrefix
        value: /
{{- end }}
{{- end }}
