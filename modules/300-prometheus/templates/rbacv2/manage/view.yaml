    rbac.deckhouse.io/namespace: d8-monitoring
  name: d8:system-capability:prometheus:view
  annotations:
    en.meta.deckhouse.io/title: "Module prometheus: view configuration"
    ru.meta.deckhouse.io/title: "Модуль prometheus: просмотр конфигурации"
    en.meta.deckhouse.io/description: "Read-only access to the prometheus module configuration."
    ru.meta.deckhouse.io/description: "Доступ только на чтение к конфигурации модуля prometheus."
rules:
- apiGroups:
  - deckhouse.io
  resources:
