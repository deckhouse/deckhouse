{{- $MimirVersion := "2.14.2" }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
fromImage: common/src-artifact
shell:
  install:
    - apk add --no-cache make git openssh-client
    - mkdir -p ~/.ssh && echo "StrictHostKeyChecking accept-new" > ~/.ssh/config
    - --mount=type=ssh git clone --depth 1 --branch mimir-{{ $MimirVersion }} {{ .SOURCE_REPO }}/grafana/mimir.git /src
    - /src
    - rm -r .git
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
fromImage: {{ $.Images.BASE_GOLANG_23_ALPINE }}
import:
  - image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
    add: /src
    to: /src
    before: install
shell:
  install:
    - cd /src
    - go mod tidy
    - go mod vendor
    - GOPROXY={{ $.GOPROXY }} CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o mimir ./cmd/mimir
    - chown -R 64535:64535 /src/
    - chmod 0700 /src/mimir
---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: common/distroless
import:
  - artifact: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
    add: /src/mimir
    to: /bin/mimir
    after: install
docker:
  ENTRYPOINT: ["/bin/mimir"]
