{{- $MimirVersion := "2.14.3" }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
git:
- add: /{{ .ModulePath }}modules/{{ .ModulePriority }}-{{ .ModuleName }}/images/{{ .ImageName }}/patches
  to: /patches
  stageDependencies:
    install:
      - "**/*"
- add: /{{ .ModulePath }}modules/{{ .ModulePriority }}-{{ .ModuleName }}/images/{{ .ImageName }}/vendor-patches
  to: /vendor-patches
  stageDependencies:
    install:
      - "**/*"
secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  install:
    - git clone --depth 1 --branch mimir-{{ $MimirVersion }} $(cat /run/secrets/SOURCE_REPO)/grafana/mimir.git /src
    - cd /src
    - git apply /patches/*.patch --verbose
    - cp -r /vendor-patches /src/.vendor-patches
    - rm -rf .git ./operations
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
from: {{ index $.Images ( eq $.SVACE_ENABLED "false" | ternary "builder/golang-alpine" "builder/golang-alpine-svace" ) }}
fromCacheVersion: "2025-20-10"
final: false
import:
  - image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
    add: /src
    before: install
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  install:
    - cd /src
    - export CGO_ENABLED=0 GOOS=linux GOARCH=amd64
    - GOPROXY=$(cat /run/secrets/GOPROXY) go mod download
    - go mod vendor
    - GOPROXY=$(cat /run/secrets/GOPROXY) go install golang.org/x/tools/cmd/goyacc@latest
    - cp /src/.vendor-patches/op_parser_init.go.tpl /src/vendor/github.com/prometheus/prometheus/promql/op_parser_init.go
    - patch -d /src/vendor/github.com/prometheus/prometheus -p1 < /src/.vendor-patches/op-functions.patch
    - cd /src/vendor/github.com/prometheus/prometheus/promql/parser && goyacc -l -o generated_parser.y.go generated_parser.y
    - cd /src
    - |
      {{- $buildContext := deepCopy $ -}}
      {{- $_ := set $buildContext "SvaceBuildOptions" "--enable-ptrace-all" -}}
      {{- $_ := set $buildContext "BuildCommand" `go build -o mimir ./cmd/mimir` -}}
      {{- include "image-build.build" $buildContext | indent 6 }}
    - chown -R 64535:64535 /src/mimir
    - chmod 0700 /src/mimir
---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: common/distroless
import:
  - image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
    add: /src/mimir
    to: /bin/mimir
    after: setup
git:
{{- include "image mount points" . }}
imageSpec:
  config:
    entrypoint: ["/bin/mimir"]
