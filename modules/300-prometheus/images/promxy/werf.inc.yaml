---
# Pinned to master HEAD (2026-05-19) to pull in:
#  - Migration to Prometheus 3.5 LTS (enables native UTF-8 label support via
#    prometheus/common's UTF8Validation default).
#  - Bump of google.golang.org/grpc to v1.79.3 (CVE-2026-33186).
#  - Bump of golang.org/x/oauth2 and golang-jwt to fix CVE-2025-47914/-58181.
# When jacksontj/promxy cuts a new tagged release, switch back to a tag.
{{- $PromxyVersion := "0cabe7fcf17855a054dbbb5205202768b324b9b1" }}
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
fromImage: common/src-artifact
final: false
git:
- add: /{{ $.ModulePath }}modules/{{ .ModulePriority }}-{{ $.ModuleName }}/images/{{ $.ImageName }}/patches
  to: /patches
  stageDependencies:
    install:
    - '**/*'
secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}
shell:
  install:
    - git clone $(cat /run/secrets/SOURCE_REPO)/jacksontj/promxy.git /src
    - cd /src
    - git checkout {{ $PromxyVersion }}
    - rm -rf .git ./vendor/github.com/prometheus/prometheus/web
---
image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
from: {{ index $.Images ( eq $.SVACE_ENABLED "false" | ternary "builder/golang-alpine" "builder/golang-alpine-svace" ) }}
final: false
import:
  - image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
    add: /src
    before: install
  - image: {{ $.ModuleName }}/{{ $.ImageName }}-src-artifact
    add: /patches
    to: /patches
    before: install
mount:
{{ include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  install:
  - cd /src
  - export CGO_ENABLED=0 GOOS=linux GOARCH=amd64
  - GOPROXY=$(cat /run/secrets/GOPROXY) go mod vendor
  - GOPROXY=$(cat /run/secrets/GOPROXY) go install golang.org/x/tools/cmd/goyacc@latest
  - cp /patches/op_func.go.tpl /src/vendor/github.com/prometheus/prometheus/promql/op_func.go
  - cp /patches/op_top.go.tpl /src/vendor/github.com/prometheus/prometheus/promql/op_top.go
  - patch -d /src/vendor/github.com/prometheus/prometheus -p1 < /patches/002-op-functions.patch
  - patch -d /src/vendor/github.com/prometheus/prometheus -p1 < /patches/003-printer-op-top-aggregate-string.patch
  - cd /src/vendor/github.com/prometheus/prometheus/promql/parser && goyacc -l -o generated_parser.y.go generated_parser.y
  - cd /src
  - |
    {{- $buildContext := deepCopy $ -}}
    {{- $_ := set $buildContext "SvaceBuildOptions" "--enable-ptrace-all" -}}
    {{- $_ := set $buildContext "BuildCommand" `go build -o promxy ./cmd/promxy` -}}
    {{- include "image-build.build" $buildContext | indent 4 }}
  - chown -R 64535:64535 /src/promxy
  - chmod 0700 /src/promxy
  - rm -rf /src/vendor
---
image: {{ $.ModuleName }}/{{ $.ImageName }}
fromImage: common/distroless
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-artifact
  add: /src/promxy
  to: /app/promxy
  after: setup
{{- include "image mount points" . }}
imageSpec:
  config:
    entrypoint: ["/app/promxy"]
---
{{- include "vex mitigation" (list $ (printf "%s/%s" $.ModuleName $.ImageName )) }}
