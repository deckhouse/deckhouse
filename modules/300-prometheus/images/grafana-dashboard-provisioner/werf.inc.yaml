image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: common/shell-operator
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
  add: /
  to: /
  before: setup
  includePaths:
  - opt/python-static
git:
- add: /{{ $.ModulePath }}modules/300-{{ $.ModuleName }}/images/{{ $.ImageName }}/hooks
  to: /hooks
  stageDependencies:
    install:
    - '**/*'
docker:
  ENV:
    PATH: "/opt/python-static/bin:$PATH"

---
image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
final: false
from: {{ $.Images.BASE_ALT_P11 }}
import:
- image: common/python-static
  add: /
  to: /
  before: install
  includePaths:
  - opt/python-static
git:
- add: /{{ $.ModulePath }}modules/300-{{ $.ModuleName }}/images/{{ $.ImageName }}/requirements.txt
  to: /requirements.txt
  stageDependencies:
    install:
    - '**/*'
shell:
  install:
  - /opt/python-static/bin/pip3 install -r /requirements.txt
