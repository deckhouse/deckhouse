image: {{ .ModuleName }}/{{ .ImageName }}
fromImage: common/shell-operator
import:
- image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
  add: /
  to: /
  before: setup
  includePaths:
  - usr/bin/python3
  - usr/bin/python3.*
  - usr/lib/python3
  - usr/lib64/python3
  - usr/lib64/python3.*
  - opt/python-static
git:
- add: /{{ $.ModulePath }}modules/300-{{ $.ModuleName }}/images/{{ $.ImageName }}/hooks
  to: /hooks
  stageDependencies:
    install:
    - '**/*'

---
image: {{ $.ModuleName }}/{{ $.ImageName }}-binaries-artifact
final: false
from: {{ $.Images.BASE_ALT_P11 }}
import:
- image: common/python-static
  add: /
  to: /
  before: install
  includePaths:
  - opt/python-static
  - usr/bin/pip3
  - usr/bin/python3
git:
- add: /{{ $.ModulePath }}modules/300-{{ $.ModuleName }}/images/{{ $.ImageName }}/requirements.txt
  to: /requirements.txt
  stageDependencies:
    install:
    - '**/*'
shell:
  install:
  - pip3 install -r /requirements.txt
