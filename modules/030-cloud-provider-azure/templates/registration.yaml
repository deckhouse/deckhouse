{{- $providerID := "azure" }}
{{- define "registration_values" }}
{{- $context := index . 0 }}
# obligatory
type: {{ b64enc "azure" | quote }}
region: {{ $context.Values.cloudProviderAzure.internal.providerClusterConfiguration.provider.location | b64enc | quote }}
zones: {{ $context.Values.cloudProviderAzure.internal.providerDiscoveryData.zones | toJson | b64enc | quote }}
instanceClassKind: {{ b64enc "AzureInstanceClass" | quote }}
machineClassKind: {{ b64enc "AzureMachineClass" | quote }}

# Azure
{{- $azureValues := dict }}
{{- $_ := set $azureValues "sshPublicKey" $context.Values.cloudProviderAzure.internal.providerClusterConfiguration.sshPublicKey }}

{{- $_ := set $azureValues "clientId" $context.Values.cloudProviderAzure.internal.providerClusterConfiguration.provider.clientId }}
{{- $_ := set $azureValues "clientSecret" $context.Values.cloudProviderAzure.internal.providerClusterConfiguration.provider.clientSecret }}
{{- $_ := set $azureValues "subscriptionId" $context.Values.cloudProviderAzure.internal.providerClusterConfiguration.provider.subscriptionId }}
{{- $_ := set $azureValues "tenantId" $context.Values.cloudProviderAzure.internal.providerClusterConfiguration.provider.tenantId }}
{{- $_ := set $azureValues "location" $context.Values.cloudProviderAzure.internal.providerClusterConfiguration.provider.location }}

{{- $_ := set $azureValues "resourceGroupName" $context.Values.cloudProviderAzure.internal.providerDiscoveryData.resourceGroupName }}

{{- $_ := set $azureValues "vnetName" $context.Values.cloudProviderAzure.internal.providerDiscoveryData.vnetName }}
{{- $_ := set $azureValues "subnetName" $context.Values.cloudProviderAzure.internal.providerDiscoveryData.subnetName }}

{{- $_ := set $azureValues "urn" $context.Values.cloudProviderAzure.internal.providerDiscoveryData.instances.urn }}
{{- $_ := set $azureValues "diskType" $context.Values.cloudProviderAzure.internal.providerDiscoveryData.instances.diskType }}
{{- $_ := set $azureValues "additionalTags" $context.Values.cloudProviderAzure.internal.providerDiscoveryData.instances.additionalTags }}

azure: {{ $azureValues | toJson | b64enc | quote }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: d8-node-manager-cloud-provider
  namespace: kube-system
  {{- include "helm_lib_module_labels" (list . (dict
    "cloud-provider.deckhouse.io/registration" ""
    "cloud-provider.deckhouse.io/name" $providerID
    )) | nindent 2 }}
type: Opaque
data: {{- include "registration_values" (list . ) | nindent 2 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "d8-node-manager-cloud-provider-%s" $providerID }}
  namespace: kube-system
  {{- include "helm_lib_module_labels" (list . (dict
    "cloud-provider.deckhouse.io/registration" ""
    "cloud-provider.deckhouse.io/name" $providerID
    )) | nindent 2 }}
type: Opaque
data: {{- include "registration_values" (list . ) | nindent 2 }}
