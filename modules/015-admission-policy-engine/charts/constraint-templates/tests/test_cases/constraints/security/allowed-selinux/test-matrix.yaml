      - path: spec.securityContext.seLinuxOptions.allowedValues
        scenario: speAbsent
      exception: ''
      exceptionRef: ''
      inventory:
      - base: securityPolicyException
        merge:
          metadata:
            name: empty-spec
          spec:
            test: test
      object:
        base: admissionPod
        merge:
          metadata:
            labels:
              security.deckhouse.io/security-policy-exception: empty-spec
