apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: d8allowedseccompprofiles
  labels:
    heritage: deckhouse
    module: admission-policy-engine
    security.deckhouse.io: security-policy
  annotations:
    metadata.gatekeeper.sh/title: "Seccomp"
    metadata.gatekeeper.sh/version: 1.0.0
    description: >-
      Controls the seccomp profile used by containers. Corresponds to the
      `seccomp.security.alpha.kubernetes.io/allowedProfileNames` annotation on
      a PodSecurityPolicy. For more information, see
      https://kubernetes.io/docs/concepts/policy/pod-security-policy/#seccomp
spec:
  crd:
    spec:
      names:
        kind: D8AllowedSeccompProfiles
      validation:
        # Schema for the `parameters` field
        openAPIV3Schema:
          type: object
          description: >-
            Controls the seccomp profile used by containers. Corresponds to the
            `seccomp.security.alpha.kubernetes.io/allowedProfileNames` annotation on
            a PodSecurityPolicy. For more information, see
            https://kubernetes.io/docs/concepts/policy/pod-security-policy/#seccomp
          properties:
            allowedProfiles:
              type: array
              description: >-
                An array of allowed profile values for seccomp on Pods/Containers.

                Can use the annotation naming scheme: `runtime/default`, `docker/default`, `unconfined` and/or
                `localhost/some-profile.json`. The item `localhost/*` will allow any localhost based profile.

                Can also use the securityContext naming scheme: `RuntimeDefault`, `Unconfined`
                and/or `Localhost`. For securityContext `Localhost`, use the parameter `allowedLocalhostProfiles`
                to list the allowed profile JSON files.

                The policy code will translate between the two schemes so it is not necessary to use both.

                Putting a `*` in this array allows all Profiles to be used.

                This field is required since with an empty list this policy will block all workloads.
              items:
                type: string
            allowedLocalhostFiles:
              type: array
              description: >-
                When using securityContext naming scheme for seccomp and including `Localhost` this array holds
                the allowed profile JSON files.

                Putting a `*` in this array will allows all JSON files to be used.

                This field is required to allow `Localhost` in securityContext as with an empty list it will block.
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            version: "v1"
            libs:
              - |
                # =============================================================================
                # Library: lib.common
                # =============================================================================
                # Container iteration, field access helpers, and exception label utilities.
                # =============================================================================
                package lib.common
                
                # Backwards-compatible container iterator (uses input.review)
                input_containers contains c if {
                  c := input.review.object.spec.containers[_]
                }
                
                input_containers contains c if {
                  c := input.review.object.spec.initContainers[_]
                }
                
                input_containers contains c if {
                  c := input.review.object.spec.ephemeralContainers[_]
                }
                
                # Parameterized container iterator (uses passed object)
                input_containers_from(obj) := containers if {
                  base := object.get(obj, ["spec", "containers"], [])
                  init := object.get(obj, ["spec", "initContainers"], [])
                  eph := object.get(obj, ["spec", "ephemeralContainers"], [])
                  containers := array.concat(array.concat(base, init), eph)
                }
                
                has_field(object, field) if {
                  object[field]
                }
                
                has_path(obj, path) if {
                  object.get(obj, path, {"__missing__": true}) != {"__missing__": true}
                }
                
                get_field(obj, path, _default) := out if {
                  out := object.get(obj, path, _default)
                }
                
                # Backwards-compatible exception label lookup (uses input.review)
                get_exception_label(container) := label if {
                  key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                  label := input.review.object.metadata.labels[key]
                  label != ""
                } else := label if {
                  key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                  object.get(input.review.object.metadata.labels, key, "") == ""
                  label := object.get(input.review.object.metadata.labels, "security.deckhouse.io/security-policy-exception", "")
                  label != ""
                } else := "" if {
                  true
                }
                
                # Parameterized exception label lookup (uses labels map)
                get_exception_label_from_labels(container, labels) := label if {
                  key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                  label := object.get(labels, key, "")
                  label != ""
                } else := label if {
                  key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                  object.get(labels, key, "") == ""
                  label := object.get(labels, "security.deckhouse.io/security-policy-exception", "")
                  label != ""
                } else := "" if {
                  true
                }
                
              - |
                # =============================================================================
                # Library: lib.check_set
                # =============================================================================
                # Set membership validators with SPE support.
                #
                # Usage:
                # - Container scalar: check_container_value_in_set(container, field_path, field_name, allowed_set, spe_path, labels, namespace)
                # - Pod scalar: check_pod_value_in_set(obj, field_path, field_name, allowed_set, spe_path)
                # - Pod array: check_pod_array_in_set(obj, field_path, field_name, allowed_set, spe_path)
                # - Scalar w/ wildcards: check_value_in_set_with_wildcards(value, allowed_set, spe_allowed, opts)
                # - Glob patterns: check_value_with_glob(value, allowed_set, spe_allowed)
                # - Allow/Deny lists: check_allowlist_denylist(value, allowlist, denylist, spe_allowed, opts)
                # Returns: {"allowed": bool, "msg": string, "detail": object}
                # =============================================================================
                package lib.check_set
                
                import data.lib.common.get_field
                import data.lib.exception.allowed_values_or_empty
                import data.lib.exception.path_value_resolved
                import data.lib.exception.resolve_spe_for_container
                import data.lib.exception.resolve_spe_from_labels
                import data.lib.match.glob_any
                
                # Check that a container field value is in an allowed set, with SPE support
                check_container_value_in_set(container, field_path, field_name, allowed_set, spe_path, labels, namespace) := result if {
                  value := get_field(container, field_path, null)
                  value == null
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_container_value_in_set(container, field_path, field_name, allowed_set, spe_path, labels, namespace) := result if {
                  value := get_field(container, field_path, null)
                  value != null
                  value_in_set(value, allowed_set)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_container_value_in_set(container, field_path, field_name, allowed_set, spe_path, labels, namespace) := result if {
                  value := get_field(container, field_path, null)
                  value != null
                  not value_in_set(value, allowed_set)
                  exception := resolve_spe_for_container(container, labels, namespace)
                  spe_allowed := allowed_values_or_empty(exception, spe_path)
                  value_in_set(value, spe_allowed)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_container_value_in_set(container, field_path, field_name, allowed_set, spe_path, labels, namespace) := result if {
                  value := get_field(container, field_path, null)
                  value != null
                  not value_in_set(value, allowed_set)
                  exception := resolve_spe_for_container(container, labels, namespace)
                  spe_allowed := allowed_values_or_empty(exception, spe_path)
                  not value_in_set(value, spe_allowed)
                  spe_used := path_value_resolved(exception, spe_path)
                  msg := set_violation_msg(field_name, value, allowed_set, spe_used, spe_allowed)
                  detail := set_violation_detail(field_name, value, allowed_set, spe_used, spe_allowed)
                  result := {
                    "allowed": false,
                    "msg": msg,
                    "detail": detail
                  }
                }
                
                # Check that a pod-level field value is in an allowed set
                check_pod_value_in_set(obj, field_path, field_name, allowed_set, spe_path) := result if {
                  value := get_field(obj, field_path, null)
                  value == null
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_pod_value_in_set(obj, field_path, field_name, allowed_set, spe_path) := result if {
                  value := get_field(obj, field_path, null)
                  value != null
                  value_in_set(value, allowed_set)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_pod_value_in_set(obj, field_path, field_name, allowed_set, spe_path) := result if {
                  value := get_field(obj, field_path, null)
                  value != null
                  not value_in_set(value, allowed_set)
                  labels := object.get(obj, ["metadata", "labels"], {})
                  namespace := object.get(obj, ["metadata", "namespace"], "")
                  exception := resolve_spe_from_labels(labels, namespace)
                  spe_allowed := allowed_values_or_empty(exception, spe_path)
                  value_in_set(value, spe_allowed)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_pod_value_in_set(obj, field_path, field_name, allowed_set, spe_path) := result if {
                  value := get_field(obj, field_path, null)
                  value != null
                  not value_in_set(value, allowed_set)
                  labels := object.get(obj, ["metadata", "labels"], {})
                  namespace := object.get(obj, ["metadata", "namespace"], "")
                  exception := resolve_spe_from_labels(labels, namespace)
                  spe_allowed := allowed_values_or_empty(exception, spe_path)
                  not value_in_set(value, spe_allowed)
                  spe_used := path_value_resolved(exception, spe_path)
                  msg := set_violation_msg(field_name, value, allowed_set, spe_used, spe_allowed)
                  detail := set_violation_detail(field_name, value, allowed_set, spe_used, spe_allowed)
                  result := {
                    "allowed": false,
                    "msg": msg,
                    "detail": detail
                  }
                }
                
                # Check that all values in an array field are in an allowed set (with wildcard and prefix support)
                check_pod_array_in_set(obj, field_path, field_name, allowed_set, spe_path) := result if {
                  values := get_field(obj, field_path, [])
                  count(values) == 0
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_pod_array_in_set(obj, field_path, field_name, allowed_set, spe_path) := result if {
                  values := get_field(obj, field_path, [])
                  count(values) > 0
                  all_in_set_or_prefix(values, allowed_set)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_pod_array_in_set(obj, field_path, field_name, allowed_set, spe_path) := result if {
                  values := get_field(obj, field_path, [])
                  count(values) > 0
                  not all_in_set_or_prefix(values, allowed_set)
                  labels := object.get(obj, ["metadata", "labels"], {})
                  namespace := object.get(obj, ["metadata", "namespace"], "")
                  exception := resolve_spe_from_labels(labels, namespace)
                  spe_allowed := allowed_values_or_empty(exception, spe_path)
                  all_in_set_or_prefix(values, spe_allowed)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_pod_array_in_set(obj, field_path, field_name, allowed_set, spe_path) := result if {
                  values := get_field(obj, field_path, [])
                  count(values) > 0
                  not all_in_set_or_prefix(values, allowed_set)
                  labels := object.get(obj, ["metadata", "labels"], {})
                  namespace := object.get(obj, ["metadata", "namespace"], "")
                  exception := resolve_spe_from_labels(labels, namespace)
                  spe_allowed := allowed_values_or_empty(exception, spe_path)
                  not all_in_set_or_prefix(values, spe_allowed)
                  spe_used := path_value_resolved(exception, spe_path)
                  msg := array_set_violation_msg(field_name, values, allowed_set, spe_used, spe_allowed)
                  detail := set_violation_detail(field_name, values, allowed_set, spe_used, spe_allowed)
                  result := {
                    "allowed": false,
                    "msg": msg,
                    "detail": detail
                  }
                }
                
                # Check a scalar value in set with wildcard/prefix and optional localhost file matching
                check_value_in_set_with_wildcards(value, allowed_set, spe_allowed, opts) := result if {
                  value == null
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_value_in_set_with_wildcards(value, allowed_set, spe_allowed, opts) := result if {
                  value != null
                  value_in_set_or_prefix(value, allowed_set)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_value_in_set_with_wildcards(value, allowed_set, spe_allowed, opts) := result if {
                  value != null
                  not value_in_set_or_prefix(value, allowed_set)
                  value_in_set_or_prefix(value, spe_allowed)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_value_in_set_with_wildcards(value, allowed_set, spe_allowed, opts) := result if {
                  value != null
                  not value_in_set_or_prefix(value, allowed_set)
                  not value_in_set_or_prefix(value, spe_allowed)
                  msg := value_set_violation_msg(value, allowed_set, spe_allowed)
                  detail := {
                    "field": "value",
                    "actual": value,
                    "policy_allowed": allowed_set,
                    "spe_applied": count(spe_allowed) > 0,
                    "spe_allowed": spe_allowed,
                  }
                  result := {
                    "allowed": false,
                    "msg": msg,
                    "detail": detail
                  }
                }
                
                # Check a scalar value against glob patterns with SPE fallback
                check_value_with_glob(value, allowed_set, spe_allowed) := result if {
                  value == null
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_value_with_glob(value, allowed_set, spe_allowed) := result if {
                  value != null
                  glob_any(allowed_set, value)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_value_with_glob(value, allowed_set, spe_allowed) := result if {
                  value != null
                  not glob_any(allowed_set, value)
                  glob_any(spe_allowed, value)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_value_with_glob(value, allowed_set, spe_allowed) := result if {
                  value != null
                  not glob_any(allowed_set, value)
                  not glob_any(spe_allowed, value)
                  msg := value_glob_violation_msg(value, allowed_set, spe_allowed)
                  detail := {
                    "field": "value",
                    "actual": value,
                    "policy_allowed": allowed_set,
                    "spe_applied": count(spe_allowed) > 0,
                    "spe_allowed": spe_allowed,
                  }
                  result := {
                    "allowed": false,
                    "msg": msg,
                    "detail": detail
                  }
                }
                
                # Check allowlist/denylist with wildcard/prefix
                check_allowlist_denylist(value, allowlist, denylist, spe_allowed, opts) := result if {
                  value == null
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_allowlist_denylist(value, allowlist, denylist, spe_allowed, opts) := result if {
                  value != null
                  denied(value, denylist)
                  not value_in_set_or_prefix(value, spe_allowed)
                  msg := sprintf("Value %v is forbidden by %v", [value, denylist])
                  detail := {
                    "field": "value",
                    "actual": value,
                    "policy_allowed": {"allowlist": allowlist, "denylist": denylist},
                    "spe_applied": count(spe_allowed) > 0,
                    "spe_allowed": spe_allowed,
                  }
                  result := {"allowed": false, "msg": msg, "detail": detail}
                }
                
                check_allowlist_denylist(value, allowlist, denylist, spe_allowed, opts) := result if {
                  value != null
                  denied(value, denylist)
                  value_in_set_or_prefix(value, spe_allowed)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_allowlist_denylist(value, allowlist, denylist, spe_allowed, opts) := result if {
                  value != null
                  not denied(value, denylist)
                  value_in_set_or_prefix(value, allowlist)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_allowlist_denylist(value, allowlist, denylist, spe_allowed, opts) := result if {
                  value != null
                  not denied(value, denylist)
                  not value_in_set_or_prefix(value, allowlist)
                  value_in_set_or_prefix(value, spe_allowed)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_allowlist_denylist(value, allowlist, denylist, spe_allowed, opts) := result if {
                  value != null
                  not denied(value, denylist)
                  not value_in_set_or_prefix(value, allowlist)
                  not value_in_set_or_prefix(value, spe_allowed)
                  msg := sprintf("Value %v is not allowed by %v", [value, allowlist])
                  detail := {
                    "field": "value",
                    "actual": value,
                    "policy_allowed": {"allowlist": allowlist, "denylist": denylist},
                    "spe_applied": count(spe_allowed) > 0,
                    "spe_allowed": spe_allowed,
                  }
                  result := {"allowed": false, "msg": msg, "detail": detail}
                }
                
                value_in_set(value, set) if {
                  set[_] == value
                }
                
                value_in_set(_, set) if {
                  set[_] == "*"
                }
                
                all_in_set_or_prefix(values, allowed) if {
                  every v in values {
                    value_in_set_or_prefix(v, allowed)
                  }
                }
                
                value_in_set_or_prefix(value, allowed) if {
                  value_in_set(value, allowed)
                }
                
                value_in_set_or_prefix(value, allowed) if {
                  a := allowed[_]
                  endswith(a, "*")
                  startswith(value, trim_suffix(a, "*"))
                }
                
                value_in_set_or_prefix(value, allowed) if {
                  a := allowed[_]
                  endswith(a, "/*")
                  startswith(value, trim_suffix(a, "*"))
                }
                
                set_violation_msg(field_name, value, allowed_set, false, _) := out if {
                  out := sprintf("%v has value %v which is not in allowed set %v. %v", [field_name, value, allowed_set, ""])
                }
                
                set_violation_msg(field_name, value, allowed_set, true, spe_allowed) := out if {
                  ctx := spe_set_ctx(value, allowed_set, spe_allowed)
                  out := sprintf("%v has value %v which is not in allowed set %v. %v", [field_name, value, allowed_set, ctx])
                }
                
                array_set_violation_msg(field_name, values, allowed_set, false, _) := out if {
                  out := sprintf("%v has values %v which are not in allowed set %v. %v", [field_name, values, allowed_set, ""])
                }
                
                array_set_violation_msg(field_name, values, allowed_set, true, spe_allowed) := out if {
                  bad_values := [v | v := values[_]; not value_in_set_or_prefix(v, allowed_set); not value_in_set_or_prefix(v, spe_allowed)]
                  bad_value := sort(bad_values)[0]
                  ctx := spe_set_ctx(bad_value, allowed_set, spe_allowed)
                  out := sprintf("%v has values %v which are not in allowed set %v. %v", [field_name, values, allowed_set, ctx])
                }
                
                spe_set_ctx(actual, policy_allowed, spe_allowed) := out if {
                  out := sprintf("forbidden: %v; policy allows: %v; SPE allows: %v", [actual, policy_allowed, spe_allowed])
                }
                
                value_set_violation_msg(value, allowed_set, spe_allowed) := out if {
                  count(spe_allowed) == 0
                  out := sprintf("Value %v is not in allowed set %v. %v", [value, allowed_set, ""])
                }
                
                value_set_violation_msg(value, allowed_set, spe_allowed) := out if {
                  count(spe_allowed) > 0
                  ctx := spe_set_ctx(value, allowed_set, spe_allowed)
                  out := sprintf("Value %v is not in allowed set %v. %v", [value, allowed_set, ctx])
                }
                
                value_glob_violation_msg(value, allowed_set, spe_allowed) := out if {
                  count(spe_allowed) == 0
                  out := sprintf("Value %v does not match allowed patterns %v. %v", [value, allowed_set, ""])
                }
                
                value_glob_violation_msg(value, allowed_set, spe_allowed) := out if {
                  count(spe_allowed) > 0
                  ctx := spe_set_ctx(value, allowed_set, spe_allowed)
                  out := sprintf("Value %v does not match allowed patterns %v. %v", [value, allowed_set, ctx])
                }
                
                value_set_violation_msg(value, allowed_set, spe_allowed) := out if {
                  count(spe_allowed) == 0
                  out := sprintf("Value %v is not in allowed set %v. %v", [value, allowed_set, ""])
                }
                
                value_set_violation_msg(value, allowed_set, spe_allowed) := out if {
                  count(spe_allowed) > 0
                  ctx := spe_set_ctx(value, allowed_set, spe_allowed)
                  out := sprintf("Value %v is not in allowed set %v. %v", [value, allowed_set, ctx])
                }
                
                value_glob_violation_msg(value, allowed_set, spe_allowed) := out if {
                  count(spe_allowed) == 0
                  out := sprintf("Value %v does not match allowed patterns %v. %v", [value, allowed_set, ""])
                }
                
                set_violation_detail(field, actual, policy_allowed, spe_applied, spe_allowed) := {
                  "field": field,
                  "actual": actual,
                  "policy_allowed": policy_allowed,
                  "spe_applied": spe_applied,
                  "spe_allowed": spe_allowed,
                }
                
                value_glob_violation_msg(value, allowed_set, spe_allowed) := out if {
                  count(spe_allowed) > 0
                  ctx := spe_set_ctx(value, allowed_set, spe_allowed)
                  out := sprintf("Value %v does not match allowed patterns %v. %v", [value, allowed_set, ctx])
                }
                
                denied(value, denylist) if {
                  denylist[_] == "*"
                }
                
                denied(value, denylist) if {
                  denylist[_] == value
                }
                
                denied(value, denylist) if {
                  d := denylist[_]
                  endswith(d, "*")
                  startswith(value, trim_suffix(d, "*"))
                }
                
              - |
                # =============================================================================
                # Library: lib.resolve_value
                # =============================================================================
                # Multi-source value resolution with priority ordering.
                #
                # Usage:
                # - resolve_from_sources(obj, container, sources) where sources are {type: "container_field"|"pod_field"|"annotation", path|key}
                # - resolve_seccomp_profile(container, obj) or resolve_apparmor_profile(container, obj)
                # Returns: {"profile": value, "location": string} for profile helpers.
                # =============================================================================
                package lib.resolve_value
                
                import data.lib.common.get_field
                
                resolve_from_sources(obj, container, sources) := out if {
                  values := [v | source := sources[_]; v := resolve_from_source(obj, container, source)]
                  count(values) > 0
                  out := values[0]
                }
                
                resolve_from_source(obj, container, source) := out if {
                  source.type == "container_field"
                  out := object.get(container, source.path, null)
                  out != null
                }
                
                resolve_from_source(obj, container, source) := out if {
                  source.type == "pod_field"
                  out := object.get(obj, source.path, null)
                  out != null
                }
                
                resolve_from_source(obj, container, source) := out if {
                  source.type == "annotation"
                  annotations := object.get(obj, ["metadata", "annotations"], {})
                  out := annotations[source.key]
                  out != null
                }
                
                resolve_seccomp_profile(container, obj) := out if {
                  sources := [
                    {"type": "container_field", "path": ["securityContext", "seccompProfile", "type"]},
                    {"type": "pod_field", "path": ["spec", "securityContext", "seccompProfile", "type"]},
                    {"type": "annotation", "key": sprintf("container.seccomp.security.alpha.kubernetes.io/%v", [container.name])},
                    {"type": "annotation", "key": "seccomp.security.alpha.kubernetes.io/pod"}
                  ]
                  value := resolve_from_sources(obj, container, sources)
                  out := {"profile": value, "location": source_location(value, sources, obj, container)}
                }
                
                resolve_apparmor_profile(container, obj) := out if {
                  sources := [
                    {"type": "container_field", "path": ["securityContext", "appArmorProfile"]},
                    {"type": "annotation", "key": sprintf("container.apparmor.security.beta.kubernetes.io/%v", [container.name])},
                    {"type": "pod_field", "path": ["spec", "securityContext", "appArmorProfile"]}
                  ]
                  value := resolve_from_sources(obj, container, sources)
                  out := {"profile": value, "location": source_location(value, sources, obj, container)}
                }
                
                source_location(value, sources, obj, container) := location if {
                  source := sources[_]
                  resolved := resolve_from_source(obj, container, source)
                  resolved == value
                  location := source_desc(source)
                }
                
                source_desc(source) := out if {
                  source.type == "annotation"
                  out := sprintf("annotation %v", [source.key])
                }
                
                source_desc(source) := out if {
                  source.type == "container_field"
                  out := sprintf("container field %v", [source.path])
                }
                
                source_desc(source) := out if {
                  source.type == "pod_field"
                  out := sprintf("pod field %v", [source.path])
                }
                
              - |
                # =============================================================================
                # Library: lib.expand_synonyms
                # =============================================================================
                # Synonym expansion and normalization helpers.
                #
                # Usage:
                # - expand(values, translation_table) expands values with synonyms.
                # - normalize(value, translation_table) returns canonical value.
                # translation_table example: {"alias": ["canonical"], "localhost": ["localhost/*", "localhost/"]}
                # =============================================================================
                package lib.expand_synonyms
                
                expand(values, translation_table) := expanded if {
                  expanded := {v | v := values[_]} | {syn | v := values[_]; syn := translation_table[v][_]} | localhost_wildcards(values, translation_table)
                }
                
                normalize(value, translation_table) := out if {
                  value == null
                  out := null
                }
                
                normalize(value, translation_table) := out if {
                  value != null
                  normalized := translation_table[value][0]
                  out := normalized
                }
                
                normalize(value, translation_table) := out if {
                  value != null
                  not translation_table[value]
                  out := value
                }
                
                localhost_wildcards(values, translation_table) := out if {
                  out := {translation_table.localhost[_] | v := values[_]; startswith(v, "localhost/")}
                }
                
              - |
                # =============================================================================
                # Library: lib.match
                # =============================================================================
                # Regex and glob helpers.
                # =============================================================================
                package lib.match
                
                import data.lib.common.get_field
                
                regex_any(patterns, value) if {
                  p := patterns[_]
                  regex.match(p, value)
                }
                
                glob_any(patterns, value) if {
                  p := patterns[_]
                  glob.match(p, [], value)
                }
                
                check_regex(obj, fields, _) := {"allowed": true, "msg": ""} if {
                  not regex_violation(obj, fields)
                }
                
                check_regex(obj, fields, _) := {"allowed": false, "msg": msg} if {
                  v := regex_violation(obj, fields)
                  msg := v.msg
                }
                
                regex_violation(obj, fields) := {"msg": msg} if {
                  field := fields[_]
                  value := get_field(obj, field.path, null)
                  pattern := object.get(field, "pattern", "")
                  pattern != ""
                  not regex.match(pattern, value)
                  name := object.get(field, "name", field.path)
                  msg := sprintf("Field %v with value %v does not match regex %v", [name, value, pattern])
                }
                
                check_glob(obj, fields, _) := {"allowed": true, "msg": ""} if {
                  not glob_violation(obj, fields)
                }
                
                check_glob(obj, fields, _) := {"allowed": false, "msg": msg} if {
                  v := glob_violation(obj, fields)
                  msg := v.msg
                }
                
                glob_violation(obj, fields) := {"msg": msg} if {
                  field := fields[_]
                  value := get_field(obj, field.path, null)
                  patterns := object.get(field, "patterns", [])
                  count(patterns) > 0
                  not glob_any(patterns, value)
                  name := object.get(field, "name", field.path)
                  msg := sprintf("Field %v with value %v does not match allowed patterns %v", [name, value, patterns])
                }
                
              - |
                # =============================================================================
                # Library: lib.exception
                # =============================================================================
                # SecurityPolicyException (SPE) resolution utilities.
                # =============================================================================
                package lib.exception
                
                import data.lib.common.get_exception_label_from_labels
                
                resolve_spe_from_labels(labels, namespace) := spe if {
                  label := object.get(labels, "security.deckhouse.io/security-policy-exception", "")
                  label != ""
                  spe := data.inventory.namespace[namespace]["deckhouse.io/v1alpha1"].SecurityPolicyException[label]
                } else := {} if {
                  true
                }
                
                resolve_spe_for_container(container, labels, namespace) := spe if {
                  label := get_exception_label_from_labels(container, labels)
                  label != ""
                  spe := data.inventory.namespace[namespace]["deckhouse.io/v1alpha1"].SecurityPolicyException[label]
                } else := {} if {
                  true
                }
                
                path_value_resolved(spe, path) := true if {
                  object.get(spe, path, null) != null
                } else := false if {
                  true
                }
                
                allowed_values_or_empty(spe, path) := out if {
                  val := object.get(spe, path, null)
                  val == null
                  out := []
                } else := out if {
                  val := object.get(spe, path, null)
                  is_array(val)
                  out := val
                } else := out if {
                  val := object.get(spe, path, null)
                  not is_array(val)
                  out := [val]
                }
                
              - |
                # =============================================================================
                # Library: lib.message
                # =============================================================================
                # Standardized violation message builder.
                #
                # Usage:
                # - build(violation_type, subject, actual_value, allowed_by_policy, exception_info)
                #   (legacy API, kept for backward compatibility)
                # - violation_message(reason, context, detail)
                #   detail preferred shape:
                #   {
                #     "field": "hostPID",
                #     "actual": true,
                #     "policy_allowed": false,
                #     "spe_applied": true,
                #     "spe_allowed": false
                #   }
                # =============================================================================
                package lib.message
                
                build(violation_type, subject, actual_value, allowed_by_policy, exception_info) := msg if {
                  exception_info != ""
                  msg := sprintf("%v: %v | %v | %v | %v", [violation_type, subject, actual_value, allowed_by_policy, exception_info])
                }
                
                build(violation_type, subject, actual_value, allowed_by_policy, exception_info) := msg if {
                  exception_info == ""
                  msg := sprintf("%v: %v | %v | %v", [violation_type, subject, actual_value, allowed_by_policy])
                }
                
                violation_message(reason, context, detail) := msg if {
                  not detail_has_spe_context(detail)
                  msg := sprintf("%v, %v | %v: %v | policy allows: %v", [
                    reason,
                    context,
                    detail_field(detail),
                    detail_actual(detail),
                    detail_policy_allowed(detail),
                  ])
                }
                
                violation_message(reason, context, detail) := msg if {
                  detail_has_spe_context(detail)
                  msg := sprintf("%v, %v | %v: %v | policy allows: %v | SPE allows: %v", [
                    reason,
                    context,
                    detail_field(detail),
                    detail_actual(detail),
                    detail_policy_allowed(detail),
                    detail_spe_allowed(detail),
                  ])
                }
                
                # Backward-compatible helpers for old check_bool detail keys.
                detail_field(detail) := object.get(detail, "field", "value")
                
                detail_actual(detail) := object.get(detail, "actual", object.get(detail, "forbidden", "unknown"))
                
                detail_policy_allowed(detail) := object.get(detail, "policy_allowed", object.get(detail, "policy_allows", "unknown"))
                
                detail_spe_allowed(detail) := object.get(detail, "spe_allowed", object.get(detail, "spe_allows", "unknown"))
                
                detail_has_spe_context(detail) if {
                  object.get(detail, "spe_applied", false)
                }
                
            rego: |
              package d8.security_policies

              import data.lib.check_set.check_value_in_set_with_wildcards
              import data.lib.message.violation_message
              import data.lib.exception.allowed_values_or_empty
              import data.lib.exception.resolve_spe_for_container
              import data.lib.expand_synonyms.expand
              import data.lib.resolve_value.resolve_from_sources

              container_annotation_key_prefix := "container.seccomp.security.alpha.kubernetes.io/"
              pod_annotation_key := "seccomp.security.alpha.kubernetes.io/pod"

              naming_translation := {
                "RuntimeDefault": ["runtime/default", "docker/default"],
                "Unconfined": ["unconfined"],
                "Localhost": ["localhost"],
                "runtime/default": ["RuntimeDefault"],
                "docker/default": ["RuntimeDefault"],
                "unconfined": ["Unconfined"],
                "localhost": ["Localhost"],
              }

              violation contains {"msg": msg} if {
                not input.review.operation == "DELETE"
                not input_wildcard_allowed_profiles
                container := review_containers[_]
                sources := [
                  {"type": "container_field", "path": ["securityContext", "seccompProfile", "type"]},
                  {"type": "pod_field", "path": ["spec", "securityContext", "seccompProfile", "type"]},
                  {"type": "annotation", "key": sprintf("%v%v", [container_annotation_key_prefix, container.name])},
                  {"type": "annotation", "key": pod_annotation_key}
                ]
                profile_raw := resolve_from_sources(input.review.object, container, sources)
                profile := normalize_seccomp_profile(profile_raw, container, input.review.object)
                allowed_base := expand(input.parameters.allowedProfiles, naming_translation)
                allowed := allowed_with_localhost_files(
                  normalize_empty_undefined_values(allowed_base),
                  object.get(input.parameters, "allowedLocalhostFiles", [])
                )
                labels := object.get(input.review.object.metadata, "labels", {})
                exception := resolve_spe_for_container(container, labels, input.review.object.metadata.namespace)
                spe_allowed_base := allowed_values_or_empty(exception, ["spec", "securityContext", "seccompProfile", "allowedValues"])
                spe_allowed := normalize_empty_undefined_values(spe_allowed_base)
                result := check_value_in_set_with_wildcards(
                  profile,
                  allowed,
                  spe_allowed,
                  {"prefix_wildcard": true, "wildcard": "*"}
                )
                not result.allowed
                msg := violation_message("Seccomp profile is not allowed", sprintf("container: %v", [container.name]), result.detail)
              }

              input_wildcard_allowed_profiles if {
                input.parameters.allowedProfiles[_] == "*"
              }

              review_containers contains c if {
                c := input.review.object.spec.containers[_]
              }

              review_containers contains c if {
                c := input.review.object.spec.initContainers[_]
              }

              review_containers contains c if {
                c := input.review.object.spec.ephemeralContainers[_]
              }

              review_containers contains c if {
                c := input.review.object.spec.template.spec.containers[_]
              }

              review_containers contains c if {
                c := input.review.object.spec.template.spec.initContainers[_]
              }

              review_containers contains c if {
                c := input.review.object.spec.template.spec.ephemeralContainers[_]
              }

              allowed_with_localhost_files(allowed, files) := out if {
                allows_localhost(allowed)
                extra := {"localhost/*" | files[_] == "*"} | {sprintf("localhost/%v", [f]) | f := files[_]; f != "*"}
                out := {v | v := allowed[_]} | extra
              } else := out if {
                not allows_localhost(allowed)
                out := {v | v := allowed[_]}
              }

              allows_localhost(allowed) if {
                allowed[_] == "localhost"
              }

              normalize_seccomp_profile(profile_raw, container, obj) := profile if {
                profile_raw == null
                profile := ""
              } else := profile if {
                profile_raw == "undefined"
                profile := ""
              } else := profile if {
                profile_raw == "Localhost"
                profile := resolve_localhost_profile(container, obj)
              } else := profile if {
                profile := profile_raw
              }

              normalize_empty_undefined_values(values) := out if {
                out := {v | v := values[_]}
                  | {"" | values[_] == "undefined"}
                  | {"undefined" | values[_] == ""}
              }

              resolve_localhost_profile(container, obj) := out if {
                lp := object.get(container, ["securityContext", "seccompProfile", "localhostProfile"], null)
                lp != null
                out := sprintf("localhost/%v", [lp])
              } else := out if {
                lp := object.get(obj, ["spec", "securityContext", "seccompProfile", "localhostProfile"], null)
                lp != null
                out := sprintf("localhost/%v", [lp])
              } else := out if {
                lp := object.get(obj, ["spec", "template", "spec", "securityContext", "seccompProfile", "localhostProfile"], null)
                lp != null
                out := sprintf("localhost/%v", [lp])
              } else := "localhost" if {
                true
              }
