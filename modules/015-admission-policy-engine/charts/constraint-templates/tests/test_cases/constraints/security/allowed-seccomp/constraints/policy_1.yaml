apiVersion: constraints.gatekeeper.sh/v1beta1
kind: D8AllowedSeccompProfiles
metadata:
  name: security-policy
spec:
  enforcementAction: "deny"
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["DaemonSet", "Deployment"]
    namespaceSelector:
      matchLabels:
        custom-policy: example
  parameters:
    allowedProfiles:
      - Localhost
    allowedLocalhostFiles:
      - "verySpecialFile"
