apiVersion: constraints.gatekeeper.sh/v1beta1
kind: D8PrivilegedContainer
metadata:
  name: pod-security-standards-baseline
spec:
  enforcementAction: "deny"
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaceSelector:
      matchExpressions:
        - key: security.deckhouse.io/pod-policy
          operator: In
          values:
            - baseline
            - restricted
