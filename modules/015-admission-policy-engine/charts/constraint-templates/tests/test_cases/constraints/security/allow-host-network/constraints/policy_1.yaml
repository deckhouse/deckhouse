apiVersion: constraints.gatekeeper.sh/v1beta1
kind: D8HostNetwork
metadata:
  name: security-policy-1
spec:
  enforcementAction: "deny"
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaceSelector:
      matchLabels:
        custom-policy: example
  parameters:
    allowHostNetwork: true
    ranges:
    - min: 20000
      max: 30000
