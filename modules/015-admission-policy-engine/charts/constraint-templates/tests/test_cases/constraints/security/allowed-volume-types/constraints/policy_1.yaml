apiVersion: constraints.gatekeeper.sh/v1beta1
kind: D8AllowedVolumeTypes
metadata:
  name: security-policy
spec:
  enforcementAction: "deny"
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaceSelector:
      matchLabels:
        custom-policy: example
  parameters:
    volumes:
      - "*"
