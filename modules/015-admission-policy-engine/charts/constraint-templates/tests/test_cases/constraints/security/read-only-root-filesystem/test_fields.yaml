apiVersion: deckhouse.io/v1alpha1
kind: ConstraintTestFields
metadata:
  name: read-only-root-filesystem
spec:
  objectKind: Pod
  objectFields:
    - path: spec.containers[].securityContext.readOnlyRootFilesystem
      level: container
      description: Controls whether a container root filesystem is read-only
      requiredScenarios: [positive, negative, absent, multiContainer, initContainer, ephemeralContainer]
  speFields:
    - path: spec.securityContext.readOnlyRootFilesystem.allowedValue
      level: container
      description: SPE override for readOnlyRootFilesystem per container
      requiredScenarios: [speMatch, speMismatch, speAbsent, speContainerSpecific]
  applicableTracks:
    functional: true
    spePod: true
    speContainer: true
