apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: d8allowedcapabilities
  labels:
    heritage: deckhouse
    module: admission-policy-engine
    security.deckhouse.io: security-policy
  annotations:
    metadata.gatekeeper.sh/title: "The allowed capabilities"
    metadata.gatekeeper.sh/version: 1.0.0
    description: >-
      Controls Linux capabilities on containers. Corresponds to the
      `allowedCapabilities` in a PodSecurityPolicy. For more information, see
      https://kubernetes.io/docs/concepts/security/pod-security-standards/
spec:
  crd:
    spec:
      names:
        kind: D8AllowedCapabilities
      validation:
        # Schema for the `parameters` field
        openAPIV3Schema:
          type: object
          description: >-
            Controls Linux capabilities on containers. Corresponds to the
            `allowedCapabilities` in a PodSecurityPolicy. For more information, see
            https://kubernetes.io/docs/concepts/security/pod-security-standards/
          properties:
            allowedCapabilities:
              type: array
              description: "A list of Linux capabilities that can be added to a container."
              items:
                type: string
            requiredDropCapabilities:
              type: array
              description: "A list of Linux capabilities that are required to be dropped from a container."
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            version: "v1"
            libs:
              - |
                # =============================================================================
                # Library: lib.common
                # =============================================================================
                # Container iteration, field access helpers, and exception label utilities.
                # =============================================================================
                package lib.common
                
                # Backwards-compatible container iterator (uses input.review)
                input_containers contains c if {
                  c := input.review.object.spec.containers[_]
                }
                
                input_containers contains c if {
                  c := input.review.object.spec.initContainers[_]
                }
                
                input_containers contains c if {
                  c := input.review.object.spec.ephemeralContainers[_]
                }
                
                # Parameterized container iterator (uses passed object)
                input_containers_from(obj) := containers if {
                  base := object.get(obj, ["spec", "containers"], [])
                  init := object.get(obj, ["spec", "initContainers"], [])
                  eph := object.get(obj, ["spec", "ephemeralContainers"], [])
                  containers := array.concat(array.concat(base, init), eph)
                }
                
                has_field(object, field) if {
                  object[field]
                }
                
                has_path(obj, path) if {
                  object.get(obj, path, {"__missing__": true}) != {"__missing__": true}
                }
                
                get_field(obj, path, _default) := out if {
                  out := object.get(obj, path, _default)
                }
                
                # Backwards-compatible exception label lookup (uses input.review)
                get_exception_label(container) := label if {
                  key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                  label := input.review.object.metadata.labels[key]
                  label != ""
                } else := label if {
                  key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                  object.get(input.review.object.metadata.labels, key, "") == ""
                  label := object.get(input.review.object.metadata.labels, "security.deckhouse.io/security-policy-exception", "")
                  label != ""
                } else := "" if {
                  true
                }
                
                # Parameterized exception label lookup (uses labels map)
                get_exception_label_from_labels(container, labels) := label if {
                  key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                  label := object.get(labels, key, "")
                  label != ""
                } else := label if {
                  key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                  object.get(labels, key, "") == ""
                  label := object.get(labels, "security.deckhouse.io/security-policy-exception", "")
                  label != ""
                } else := "" if {
                  true
                }
                
              - |
                # =============================================================================
                # Library: lib.check_subset
                # =============================================================================
                # Subset/superset validators with SPE support.
                #
                # Usage:
                # - Subset: check_container_subset(container, field_path, field_name, allowed, spe_path, labels, namespace, opts)
                # - Superset: check_container_superset(container, field_path, field_name, required, spe_path, labels, namespace, opts)
                # opts: {"case_insensitive": true} (optional)
                # Returns: {"allowed": bool, "msg": string, "detail": object}
                # =============================================================================
                package lib.check_subset
                
                import data.lib.common.get_field
                import data.lib.exception.allowed_values_or_empty
                import data.lib.exception.resolve_spe_for_container
                import data.lib.set.to_lower_set
                import data.lib.set.is_subset
                
                check_container_subset(container, field_path, field_name, allowed, spe_path, labels, namespace, opts) := result if {
                  actual := get_field(container, field_path, [])
                  allowed_set := normalize_set(allowed, opts)
                  actual_set := normalize_set(actual, opts)
                  is_subset(actual_set, allowed_set)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_container_subset(container, field_path, field_name, allowed, spe_path, labels, namespace, opts) := result if {
                  actual := get_field(container, field_path, [])
                  allowed_set := normalize_set(allowed, opts)
                  actual_set := normalize_set(actual, opts)
                  not is_subset(actual_set, allowed_set)
                  exception := resolve_spe_for_container(container, labels, namespace)
                  spe_allowed := allowed_values_or_empty(exception, spe_path)
                  spe_set := normalize_set(spe_allowed, opts)
                  is_subset(actual_set, spe_set)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_container_subset(container, field_path, field_name, allowed, spe_path, labels, namespace, opts) := result if {
                  actual := get_field(container, field_path, [])
                  allowed_set := normalize_set(allowed, opts)
                  actual_set := normalize_set(actual, opts)
                  not is_subset(actual_set, allowed_set)
                  exception := resolve_spe_for_container(container, labels, namespace)
                  spe_allowed := allowed_values_or_empty(exception, spe_path)
                  spe_set := normalize_set(spe_allowed, opts)
                  not is_subset(actual_set, spe_set)
                  msg := sprintf("%v must be subset of %v", [field_name, allowed])
                  result := {
                    "allowed": false,
                    "msg": msg,
                    "detail": {
                      "field": field_name,
                      "actual": actual,
                      "policy_allowed": allowed,
                      "spe_applied": count(spe_allowed) > 0,
                      "spe_allowed": spe_allowed,
                    }
                  }
                }
                
                check_container_superset(container, field_path, field_name, required, spe_path, labels, namespace, opts) := result if {
                  actual := get_field(container, field_path, [])
                  required_set := normalize_set(required, opts)
                  actual_set := normalize_set(actual, opts)
                  is_subset(required_set, actual_set)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_container_superset(container, field_path, field_name, required, spe_path, labels, namespace, opts) := result if {
                  actual := get_field(container, field_path, [])
                  required_set := normalize_set(required, opts)
                  actual_set := normalize_set(actual, opts)
                  not is_subset(required_set, actual_set)
                  exception := resolve_spe_for_container(container, labels, namespace)
                  spe_required := allowed_values_or_empty(exception, spe_path)
                  count(spe_required) > 0
                  spe_set := normalize_set(spe_required, opts)
                  is_subset(spe_set, actual_set)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_container_superset(container, field_path, field_name, required, spe_path, labels, namespace, opts) := result if {
                  actual := get_field(container, field_path, [])
                  required_set := normalize_set(required, opts)
                  actual_set := normalize_set(actual, opts)
                  not is_subset(required_set, actual_set)
                  exception := resolve_spe_for_container(container, labels, namespace)
                  spe_required := allowed_values_or_empty(exception, spe_path)
                  count(spe_required) == 0
                  msg := sprintf("%v must contain %v", [field_name, required])
                  result := {
                    "allowed": false,
                    "msg": msg,
                    "detail": {
                      "field": field_name,
                      "actual": actual,
                      "policy_allowed": required,
                      "spe_applied": false,
                      "spe_allowed": spe_required,
                    }
                  }
                }
                
                check_container_superset(container, field_path, field_name, required, spe_path, labels, namespace, opts) := result if {
                  actual := get_field(container, field_path, [])
                  required_set := normalize_set(required, opts)
                  actual_set := normalize_set(actual, opts)
                  not is_subset(required_set, actual_set)
                  exception := resolve_spe_for_container(container, labels, namespace)
                  spe_required := allowed_values_or_empty(exception, spe_path)
                  count(spe_required) > 0
                  spe_set := normalize_set(spe_required, opts)
                  not is_subset(spe_set, actual_set)
                  msg := sprintf("%v must contain %v", [field_name, required])
                  result := {
                    "allowed": false,
                    "msg": msg,
                    "detail": {
                      "field": field_name,
                      "actual": actual,
                      "policy_allowed": required,
                      "spe_applied": true,
                      "spe_allowed": spe_required,
                    }
                  }
                }
                
                normalize_set(list, opts) := out if {
                  object.get(opts, "case_insensitive", false)
                  out := to_lower_set(list)
                }
                
                normalize_set(list, opts) := out if {
                  not object.get(opts, "case_insensitive", false)
                  out := {v | v := list[_]}
                }
                
              - |
                # =============================================================================
                # Library: lib.exception
                # =============================================================================
                # SecurityPolicyException (SPE) resolution utilities.
                # =============================================================================
                package lib.exception
                
                import data.lib.common.get_exception_label_from_labels
                
                resolve_spe_from_labels(labels, namespace) := spe if {
                  label := object.get(labels, "security.deckhouse.io/security-policy-exception", "")
                  label != ""
                  spe := data.inventory.namespace[namespace]["deckhouse.io/v1alpha1"].SecurityPolicyException[label]
                } else := {} if {
                  true
                }
                
                resolve_spe_for_container(container, labels, namespace) := spe if {
                  label := get_exception_label_from_labels(container, labels)
                  label != ""
                  spe := data.inventory.namespace[namespace]["deckhouse.io/v1alpha1"].SecurityPolicyException[label]
                } else := {} if {
                  true
                }
                
                path_value_resolved(spe, path) := true if {
                  object.get(spe, path, null) != null
                } else := false if {
                  true
                }
                
                allowed_values_or_empty(spe, path) := out if {
                  val := object.get(spe, path, null)
                  val == null
                  out := []
                } else := out if {
                  val := object.get(spe, path, null)
                  is_array(val)
                  out := val
                } else := out if {
                  val := object.get(spe, path, null)
                  not is_array(val)
                  out := [val]
                }
                
              - |
                # =============================================================================
                # Library: lib.set
                # =============================================================================
                # Set membership helpers.
                # =============================================================================
                package lib.set
                
                import data.lib.common.get_field
                
                set_contains(list, elem) if {
                  list[_] = elem
                }
                
                contains_any(list, elems) if {
                  e := elems[_]
                  set_contains(list, e)
                }
                
                contains_all(list, elems) if {
                  every e in elems {
                    set_contains(list, e)
                  }
                }
                
                to_lower_set(list) := out if {
                  out := {v | v := lower(list[_])}
                }
                
                is_subset(a, b) if {
                  count(a - b) == 0
                }
                
                check_fields_in_list(obj, fields, allowed, _) := {"allowed": true, "msg": ""} if {
                  not list_violation(obj, fields, allowed)
                }
                
                check_fields_in_list(obj, fields, allowed, _) := {"allowed": false, "msg": msg} if {
                  v := list_violation(obj, fields, allowed)
                  msg := v.msg
                }
                
                list_violation(obj, fields, allowed) := {"msg": msg} if {
                  field := fields[_]
                  value := get_field(obj, field.path, null)
                  required := object.get(field, "required", false)
                  value == null
                  required
                  name := object.get(field, "name", field.path)
                  msg := sprintf("Field %v must be set", [name])
                }
                
                list_violation(obj, fields, allowed) := {"msg": msg} if {
                  field := fields[_]
                  value := get_field(obj, field.path, null)
                  value != null
                  not set_contains(allowed, value)
                  name := object.get(field, "name", field.path)
                  msg := sprintf("Field %v has value %v which is not allowed (%v)", [name, value, allowed])
                }
                
              - |
                # =============================================================================
                # Library: lib.message
                # =============================================================================
                # Standardized violation message builder.
                #
                # Usage:
                # - build(violation_type, subject, actual_value, allowed_by_policy, exception_info)
                #   (legacy API, kept for backward compatibility)
                # - violation_message(reason, context, detail)
                #   detail preferred shape:
                #   {
                #     "field": "hostPID",
                #     "actual": true,
                #     "policy_allowed": false,
                #     "spe_applied": true,
                #     "spe_allowed": false
                #   }
                # =============================================================================
                package lib.message
                
                build(violation_type, subject, actual_value, allowed_by_policy, exception_info) := msg if {
                  exception_info != ""
                  msg := sprintf("%v: %v | %v | %v | %v", [violation_type, subject, actual_value, allowed_by_policy, exception_info])
                }
                
                build(violation_type, subject, actual_value, allowed_by_policy, exception_info) := msg if {
                  exception_info == ""
                  msg := sprintf("%v: %v | %v | %v", [violation_type, subject, actual_value, allowed_by_policy])
                }
                
                violation_message(reason, context, detail) := msg if {
                  not detail_has_spe_context(detail)
                  msg := sprintf("%v, %v | %v: %v | policy allows: %v", [
                    reason,
                    context,
                    detail_field(detail),
                    detail_actual(detail),
                    detail_policy_allowed(detail),
                  ])
                }
                
                violation_message(reason, context, detail) := msg if {
                  detail_has_spe_context(detail)
                  msg := sprintf("%v, %v | %v: %v | policy allows: %v | SPE allows: %v", [
                    reason,
                    context,
                    detail_field(detail),
                    detail_actual(detail),
                    detail_policy_allowed(detail),
                    detail_spe_allowed(detail),
                  ])
                }
                
                # Backward-compatible helpers for old check_bool detail keys.
                detail_field(detail) := object.get(detail, "field", "value")
                
                detail_actual(detail) := object.get(detail, "actual", object.get(detail, "forbidden", "unknown"))
                
                detail_policy_allowed(detail) := object.get(detail, "policy_allowed", object.get(detail, "policy_allows", "unknown"))
                
                detail_spe_allowed(detail) := object.get(detail, "spe_allowed", object.get(detail, "spe_allows", "unknown"))
                
                detail_has_spe_context(detail) if {
                  object.get(detail, "spe_applied", false)
                }
                
            rego: |
              package d8.security_policies

              import data.lib.check_subset.check_container_subset
              import data.lib.check_subset.check_container_superset
              import data.lib.common.input_containers
              import data.lib.message.violation_message

              violation contains {"msg": msg, "details": {}} if {
                not input.review.operation == "DELETE"
                container := input_containers[_]
                result := check_container_subset(
                  container,
                  ["securityContext", "capabilities", "add"],
                  "capabilities.add",
                  input.parameters.allowedCapabilities,
                  ["spec", "securityContext", "capabilities", "allowedValues", "add"],
                  object.get(input.review.object, ["metadata", "labels"], {}),
                  object.get(input.review.object, ["metadata", "namespace"], ""),
                  {"case_insensitive": true}
                )
                not result.allowed
                msg := violation_message("container has a disallowed capability", sprintf("container: %v", [container.name]), result.detail)
              }

              violation contains {"msg": msg, "details": {}} if {
                not input.review.operation == "DELETE"
                container := input_containers[_]
                result := check_container_superset(
                  container,
                  ["securityContext", "capabilities", "drop"],
                  "capabilities.drop",
                  input.parameters.requiredDropCapabilities,
                  ["spec", "securityContext", "capabilities", "allowedValues", "drop"],
                  object.get(input.review.object, ["metadata", "labels"], {}),
                  object.get(input.review.object, ["metadata", "namespace"], ""),
                  {"case_insensitive": true}
                )
                not result.allowed
                msg := violation_message("container is not dropping all required capabilities", sprintf("container: %v", [container.name]), result.detail)
              }
