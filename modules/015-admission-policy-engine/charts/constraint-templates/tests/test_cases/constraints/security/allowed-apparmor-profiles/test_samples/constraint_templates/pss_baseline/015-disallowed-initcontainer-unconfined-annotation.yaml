apiVersion: v1
kind: Pod
metadata:
  name: disallowed-initcontainer-unconfined-annotation
  namespace: testns
  annotations:
    container.apparmor.security.beta.kubernetes.io/init: unconfined
spec:
  initContainers:
    - name: init
      image: busybox
      command: ["/bin/sh", "-c", "echo init"]
  containers:
    - name: nginx
      image: nginx
