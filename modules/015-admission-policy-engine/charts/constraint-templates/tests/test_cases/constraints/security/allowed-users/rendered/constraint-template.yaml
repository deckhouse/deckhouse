apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: d8allowedusers
  labels:
    heritage: deckhouse
    module: admission-policy-engine
    security.deckhouse.io: security-policy
  annotations:
    metadata.gatekeeper.sh/title: "Allowed Users"
    metadata.gatekeeper.sh/version: 1.0.0
    description: >-
      Controls the user and group IDs of the container and some volumes.
      Corresponds to the `runAsUser`, `runAsGroup`, `supplementalGroups`, and
      `fsGroup` fields in a PodSecurityPolicy. For more information, see
      https://kubernetes.io/docs/concepts/policy/pod-security-policy/#users-and-groups
spec:
  crd:
    spec:
      names:
        kind: D8AllowedUsers
      validation:
        openAPIV3Schema:
          type: object
          description: >-
            Controls the user and group IDs of the container and some volumes.
            Corresponds to the `runAsUser`, `runAsGroup`, `supplementalGroups`, and
            `fsGroup` fields in a PodSecurityPolicy. For more information, see
            https://kubernetes.io/docs/concepts/policy/pod-security-policy/#users-and-groups
          properties:
            runAsUser:
              type: object
              description: "Controls which user ID values are allowed in a Pod or container-level SecurityContext."
              properties:
                rule:
                  type: string
                  description: "A strategy for applying the runAsUser restriction."
                  enum:
                    - MustRunAs
                    - MustRunAsNonRoot
                    - RunAsAny
                ranges:
                  type: array
                  description: "A list of user ID ranges affected by the rule."
                  items:
                    type: object
                    description: "The range of user IDs affected by the rule."
                    properties:
                      min:
                        type: integer
                        description: "The minimum user ID in the range, inclusive."
                      max:
                        type: integer
                        description: "The maximum user ID in the range, inclusive."
            runAsGroup:
              type: object
              description: "Controls which group ID values are allowed in a Pod or container-level SecurityContext."
              properties:
                rule:
                  type: string
                  description: "A strategy for applying the runAsGroup restriction."
                  enum:
                    - MustRunAs
                    - MayRunAs
                    - RunAsAny
                ranges:
                  type: array
                  description: "A list of group ID ranges affected by the rule."
                  items:
                    type: object
                    description: "The range of group IDs affected by the rule."
                    properties:
                      min:
                        type: integer
                        description: "The minimum group ID in the range, inclusive."
                      max:
                        type: integer
                        description: "The maximum group ID in the range, inclusive."
            supplementalGroups:
              type: object
              description: "Controls the supplementalGroups values that are allowed in a Pod or container-level SecurityContext."
              properties:
                rule:
                  type: string
                  description: "A strategy for applying the supplementalGroups restriction."
                  enum:
                    - MustRunAs
                    - MayRunAs
                    - RunAsAny
                ranges:
                  type: array
                  description: "A list of group ID ranges affected by the rule."
                  items:
                    type: object
                    description: "The range of group IDs affected by the rule."
                    properties:
                      min:
                        type: integer
                        description: "The minimum group ID in the range, inclusive."
                      max:
                        type: integer
                        description: "The maximum group ID in the range, inclusive."
            fsGroup:
              type: object
              description: "Controls the fsGroup values that are allowed in a Pod or container-level SecurityContext."
              properties:
                rule:
                  type: string
                  description: "A strategy for applying the fsGroup restriction."
                  enum:
                    - MustRunAs
                    - MayRunAs
                    - RunAsAny
                ranges:
                  type: array
                  description: "A list of group ID ranges affected by the rule."
                  items:
                    type: object
                    description: "The range of group IDs affected by the rule."
                    properties:
                      min:
                        type: integer
                        description: "The minimum group ID in the range, inclusive."
                      max:
                        type: integer
                        description: "The maximum group ID in the range, inclusive."
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            version: "v1"
            libs:
              - |
                # =============================================================================
                # Library: lib.common
                # =============================================================================
                # Container iteration, field access helpers, and exception label utilities.
                # =============================================================================
                package lib.common
                
                # Backwards-compatible container iterator (uses input.review)
                input_containers contains c if {
                  c := input.review.object.spec.containers[_]
                }
                
                input_containers contains c if {
                  c := input.review.object.spec.initContainers[_]
                }
                
                input_containers contains c if {
                  c := input.review.object.spec.ephemeralContainers[_]
                }
                
                # Parameterized container iterator (uses passed object)
                input_containers_from(obj) := containers if {
                  base := object.get(obj, ["spec", "containers"], [])
                  init := object.get(obj, ["spec", "initContainers"], [])
                  eph := object.get(obj, ["spec", "ephemeralContainers"], [])
                  containers := array.concat(array.concat(base, init), eph)
                }
                
                has_field(object, field) if {
                  object[field]
                }
                
                has_path(obj, path) if {
                  object.get(obj, path, {"__missing__": true}) != {"__missing__": true}
                }
                
                get_field(obj, path, _default) := out if {
                  out := object.get(obj, path, _default)
                }
                
                # Backwards-compatible exception label lookup (uses input.review)
                get_exception_label(container) := label if {
                  key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                  label := input.review.object.metadata.labels[key]
                  label != ""
                } else := label if {
                  key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                  object.get(input.review.object.metadata.labels, key, "") == ""
                  label := object.get(input.review.object.metadata.labels, "security.deckhouse.io/security-policy-exception", "")
                  label != ""
                } else := "" if {
                  true
                }
                
                # Parameterized exception label lookup (uses labels map)
                get_exception_label_from_labels(container, labels) := label if {
                  key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                  label := object.get(labels, key, "")
                  label != ""
                } else := label if {
                  key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                  object.get(labels, key, "") == ""
                  label := object.get(labels, "security.deckhouse.io/security-policy-exception", "")
                  label != ""
                } else := "" if {
                  true
                }
                
              - |
                # =============================================================================
                # Library: lib.check_range
                # =============================================================================
                # Range validators with SPE support.
                #
                # Usage:
                # - Container numeric: check_container_in_range(container, field_path, field_name, ranges, spe_path, labels, namespace)
                # - Ports array: check_ports_in_ranges(ports, field_name, ranges, spe_ranges)
                # Returns: {"allowed": bool, "msg": string, "detail": object}
                # =============================================================================
                package lib.check_range
                
                import data.lib.common.get_field
                import data.lib.exception.allowed_values_or_empty
                import data.lib.exception.path_value_resolved
                import data.lib.exception.resolve_spe_for_container
                import data.lib.exception.resolve_spe_from_labels
                import data.lib.range.is_in_any_range
                
                # Check that numeric values extracted from field paths are within allowed ranges
                check_container_in_range(container, field_path, field_name, ranges, spe_path, labels, namespace) := result if {
                  value := get_field(container, field_path, null)
                  value == null
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_container_in_range(container, field_path, field_name, ranges, spe_path, labels, namespace) := result if {
                  value := get_field(container, field_path, null)
                  value != null
                  is_in_any_range(value, ranges)
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_container_in_range(container, field_path, field_name, ranges, spe_path, labels, namespace) := result if {
                  value := get_field(container, field_path, null)
                  value != null
                  not is_in_any_range(value, ranges)
                  exception := resolve_spe_for_container(container, labels, namespace)
                  spe_allowed := allowed_values_or_empty(exception, spe_path)
                  value in spe_allowed
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_container_in_range(container, field_path, field_name, ranges, spe_path, labels, namespace) := result if {
                  value := get_field(container, field_path, null)
                  value != null
                  not is_in_any_range(value, ranges)
                  exception := resolve_spe_for_container(container, labels, namespace)
                  spe_allowed := allowed_values_or_empty(exception, spe_path)
                  not value in spe_allowed
                  spe_used := path_value_resolved(exception, spe_path)
                  msg := range_violation_msg(field_name, value, ranges, spe_used, spe_allowed)
                  detail := {
                    "field": field_name,
                    "actual": value,
                    "policy_allowed": ranges,
                    "spe_applied": spe_used,
                    "spe_allowed": spe_allowed,
                  }
                  result := {
                    "allowed": false,
                    "msg": msg,
                    "detail": detail
                  }
                }
                
                # Check array of numeric port values against ranges
                check_ports_in_ranges(ports, field_name, ranges, spe_ranges) := result if {
                  count(ports) == 0
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_ports_in_ranges(ports, field_name, ranges, spe_ranges) := result if {
                  count(ports) > 0
                  every p in ports {
                    is_in_any_range(p, ranges)
                  }
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_ports_in_ranges(ports, field_name, ranges, spe_ranges) := result if {
                  count(ports) > 0
                  bad_port := ports[_]
                  not is_in_any_range(bad_port, ranges)
                  not port_in_spe(bad_port, spe_ranges)
                  msg := ports_range_violation_msg(field_name, bad_port, ranges, spe_ranges)
                  detail := {
                    "field": field_name,
                    "actual": bad_port,
                    "policy_allowed": ranges,
                    "spe_applied": count(spe_ranges) > 0,
                    "spe_allowed": spe_ranges,
                  }
                  result := {
                    "allowed": false,
                    "msg": msg,
                    "detail": detail
                  }
                }
                
                range_violation_msg(field_name, value, ranges, false, _) := out if {
                  out := sprintf("%v has value %v which is out of allowed ranges %v", [field_name, value, ranges])
                }
                
                range_violation_msg(field_name, value, ranges, true, spe_allowed) := out if {
                  ctx := spe_range_ctx(value, ranges, spe_allowed)
                  out := sprintf("%v has value %v which is out of allowed ranges %v. %v", [field_name, value, ranges, ctx])
                }
                
                ports_range_violation_msg(field_name, bad_port, ranges, spe_ranges) := out if {
                  count(spe_ranges) == 0
                  out := sprintf("%v: port %v is out of allowed ranges %v", [field_name, bad_port, ranges])
                }
                
                ports_range_violation_msg(field_name, bad_port, ranges, spe_ranges) := out if {
                  count(spe_ranges) > 0
                  ctx := spe_range_ctx(bad_port, ranges, spe_ranges)
                  out := sprintf("%v: port %v is out of allowed ranges %v. %v", [field_name, bad_port, ranges, ctx])
                }
                
                spe_range_ctx(actual, policy_ranges, spe_allowed) := out if {
                  out := sprintf("forbidden: %v; policy allows: %v; SPE allows: %v", [actual, policy_ranges, spe_allowed])
                }
                
                spe_port_ctx(port_obj, policy_ranges, spe_allowed) := out if {
                  out := sprintf("forbidden: {\"port\": %v, \"protocol\": \"%v\"}; policy allows: %v; SPE allows: %v", [port_obj.port, upper(port_obj.protocol), policy_ranges, spe_allowed])
                }
                
                port_in_spe(port, spe_ranges) if {
                  count(spe_ranges) > 0
                  is_in_any_range(port, spe_ranges)
                }
                
                # Check array of port objects {"port": int, "protocol": string} against ranges and SPE port/protocol list.
                check_ports_with_protocol_in_ranges(ports, field_name, ranges, spe_ports_raw) := result if {
                  count(ports) == 0
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_ports_with_protocol_in_ranges(ports, field_name, ranges, spe_ports_raw) := result if {
                  count(ports) > 0
                  spe_ports := sanitize_spe_ports(spe_ports_raw)
                  every p in ports {
                    port_object_allowed(p, ranges, spe_ports)
                  }
                  result := {"allowed": true, "msg": "", "detail": {}}
                }
                
                check_ports_with_protocol_in_ranges(ports, field_name, ranges, spe_ports_raw) := result if {
                  count(ports) > 0
                  spe_ports := sanitize_spe_ports(spe_ports_raw)
                  bad := first_disallowed_port(ports, ranges, spe_ports)
                  ctx := spe_port_ctx(bad, ranges, spe_ports)
                  msg := sprintf("%v: port %v/%v is out of allowed ranges %v. %v", [field_name, bad.port, bad.protocol, ranges, ctx])
                  detail := {
                    "field": field_name,
                    "actual": sprintf("port %v/%v", [bad.port, bad.protocol]),
                    "policy_allowed": ranges,
                    "spe_applied": count(spe_ports) > 0,
                    "spe_allowed": spe_ports,
                  }
                  result := {
                    "allowed": false,
                    "msg": msg,
                    "detail": detail
                  }
                }
                
                port_object_allowed(port_obj, ranges, spe_ports) if {
                  count(ranges) > 0
                  is_in_any_range(port_obj.port, ranges)
                  spe_port_requirement_satisfied(port_obj, spe_ports)
                }
                
                port_object_allowed(port_obj, ranges, spe_ports) if {
                  count(ranges) == 0
                  count(spe_ports) > 0
                  port_object_in_spe(port_obj, spe_ports)
                }
                
                spe_port_requirement_satisfied(_, spe_ports) if {
                  count(spe_ports) == 0
                }
                
                spe_port_requirement_satisfied(port_obj, spe_ports) if {
                  count(spe_ports) > 0
                  port_object_in_spe(port_obj, spe_ports)
                }
                
                first_disallowed_port(ports, ranges, spe_ports) := bad if {
                  disallowed := [p |
                    p := ports[_]
                    not port_object_allowed(p, ranges, spe_ports)
                  ]
                  bad := disallowed[0]
                }
                
                port_object_in_spe(port_obj, spe_ports) if {
                  spe := spe_ports[_]
                  spe.port == port_obj.port
                  upper(spe.protocol) == upper(port_obj.protocol)
                }
                
                sanitize_spe_ports(spe_ports_raw) := sanitized if {
                  sanitized := [entry |
                    p := spe_ports_raw[_]
                    entry := spe_port_entry(p)
                    entry != null
                  ]
                }
                
                spe_port_entry(p) := {"port": p, "protocol": "TCP"} if {
                  is_number(p)
                }
                
                spe_port_entry(p) := {"port": object.get(p, "port", null), "protocol": normalize_protocol(object.get(p, "protocol", "TCP"))} if {
                  not is_number(p)
                  object.get(p, "port", null) != null
                }
                
                spe_port_entry(p) := null if {
                  not is_number(p)
                  object.get(p, "port", null) == null
                }
                
                normalize_protocol(p) := "TCP" if {
                  p == ""
                }
                
                normalize_protocol(p) := out if {
                  p != ""
                  out := upper(p)
                }
                
                
              - |
                # =============================================================================
                # Library: lib.range
                # =============================================================================
                # Numeric range helpers.
                # =============================================================================
                package lib.range
                
                import data.lib.common.get_field
                
                value_within_range(range, value) if {
                  range.min <= value
                  range.max >= value
                }
                
                value_within_range(range, value) if {
                  not range.min
                  range.max >= value
                }
                
                value_within_range(range, value) if {
                  range.min <= value
                  not range.max
                }
                
                is_in_any_range(value, ranges) if {
                  range := ranges[_]
                  value_within_range(range, value)
                }
                
                all_values_in_ranges(values, ranges) if {
                  every val in values {
                    is_in_any_range(val, ranges)
                  }
                }
                
                check_fields_in_ranges(obj, fields, ranges, _) := {"allowed": true, "msg": ""} if {
                  not range_violation(obj, fields, ranges)
                }
                
                check_fields_in_ranges(obj, fields, ranges, _) := {"allowed": false, "msg": msg} if {
                  v := range_violation(obj, fields, ranges)
                  msg := v.msg
                }
                
                range_violation(obj, fields, ranges) := {"msg": msg} if {
                  field := fields[_]
                  value := get_field(obj, field.path, null)
                  required := object.get(field, "required", false)
                  value == null
                  required
                  name := object.get(field, "name", field.path)
                  msg := sprintf("Field %v must be set", [name])
                }
                
                range_violation(obj, fields, ranges) := {"msg": msg} if {
                  field := fields[_]
                  value := get_field(obj, field.path, null)
                  value != null
                  not is_in_any_range(value, ranges)
                  name := object.get(field, "name", field.path)
                  msg := sprintf("Field %v with value %v is out of allowed ranges %v", [name, value, ranges])
                }
                
              - |
                # =============================================================================
                # Library: lib.exception
                # =============================================================================
                # SecurityPolicyException (SPE) resolution utilities.
                # =============================================================================
                package lib.exception
                
                import data.lib.common.get_exception_label_from_labels
                
                resolve_spe_from_labels(labels, namespace) := spe if {
                  label := object.get(labels, "security.deckhouse.io/security-policy-exception", "")
                  label != ""
                  spe := data.inventory.namespace[namespace]["deckhouse.io/v1alpha1"].SecurityPolicyException[label]
                } else := {} if {
                  true
                }
                
                resolve_spe_for_container(container, labels, namespace) := spe if {
                  label := get_exception_label_from_labels(container, labels)
                  label != ""
                  spe := data.inventory.namespace[namespace]["deckhouse.io/v1alpha1"].SecurityPolicyException[label]
                } else := {} if {
                  true
                }
                
                path_value_resolved(spe, path) := true if {
                  object.get(spe, path, null) != null
                } else := false if {
                  true
                }
                
                allowed_values_or_empty(spe, path) := out if {
                  val := object.get(spe, path, null)
                  val == null
                  out := []
                } else := out if {
                  val := object.get(spe, path, null)
                  is_array(val)
                  out := val
                } else := out if {
                  val := object.get(spe, path, null)
                  not is_array(val)
                  out := [val]
                }
                
            rego: |
              package d8.security_policies

              import data.lib.check_range.check_container_in_range
              import data.lib.exception.allowed_values_or_empty
              import data.lib.exception.path_value_resolved
              import data.lib.exception.resolve_spe_for_container
              import data.lib.exception.resolve_spe_from_labels
              import data.lib.range.is_in_any_range

              violation contains {"msg": msg} if {
                not input.review.operation == "DELETE"
                fields := ["runAsUser", "runAsGroup", "supplementalGroups", "fsGroup"]
                field := fields[_]
                container := review_containers[_]
                msg := get_type_violation(field, container)
              }

              get_type_violation(field, container) := msg if {
                field == "runAsUser"
                params := input.parameters[field]
                msg := get_user_violation(params, container)
              }

              get_type_violation(field, container) := msg if {
                field != "runAsUser"
                params := input.parameters[field]
                msg := get_group_violation(field, params, container)
              }

              # RunAsUser
              get_user_violation(params, container) := msg if {
                rule := params.rule
                provided_user := get_field_value("runAsUser", container, review_pod_spec)
                not accept_users(rule, provided_user)
                allowed_by_policy := sprintf("Allowed runAsUser: %v", [params])
                actual_value := sprintf("Actual runAsUser: %v", [provided_user])
                labels := object.get(input.review.object.metadata, "labels", {})
                namespace := object.get(input.review.object.metadata, "namespace", "")
                spe := resolve_spe_for_container(container, labels, namespace)
                run_as_non_root := get_field_value_or_default("runAsNonRoot", container, review_pod_spec, false)
                not allow_user_by_spe(rule, provided_user, run_as_non_root, spe)
                spe_ctx := run_as_user_spe_ctx(spe, provided_user, params)
                msg := build_user_violation_message(container.name, actual_value, allowed_by_policy, spe_ctx)
              }

              get_user_violation(params, container) := msg if {
                not get_field_value("runAsUser", container, review_pod_spec)
                params.rule == "MustRunAs"
                allowed_by_policy := sprintf("Allowed runAsUser: %v", [params])
                actual_value := "Actual runAsUser: not set"
                labels := object.get(input.review.object.metadata, "labels", {})
                namespace := object.get(input.review.object.metadata, "namespace", "")
                spe := resolve_spe_for_container(container, labels, namespace)
                spe_ctx := run_as_user_spe_ctx(spe, "not set", params)
                msg := build_user_violation_message(container.name, actual_value, allowed_by_policy, spe_ctx)
              }

              get_user_violation(params, container) := msg if {
                params.rule == "MustRunAsNonRoot"
                not get_field_value("runAsUser", container, review_pod_spec)
                not get_field_value("runAsNonRoot", container, review_pod_spec)
                allowed_by_policy := sprintf("Allowed runAsUser: %v", [params])
                actual_value := "Actual runAsUser: not set, runAsNonRoot: not set"
                labels := object.get(input.review.object.metadata, "labels", {})
                namespace := object.get(input.review.object.metadata, "namespace", "")
                spe := resolve_spe_for_container(container, labels, namespace)
                spe_ctx := run_as_user_spe_ctx(spe, "not set", params)
                msg := build_user_violation_message(container.name, actual_value, allowed_by_policy, spe_ctx)
              }

              build_user_violation_message(container_name, actual_value, allowed_by_policy, "") := msg if {
                msg := sprintf("Container %v is attempting to run as disallowed user. | %v | %v", [container_name, actual_value, allowed_by_policy])
              }

              build_user_violation_message(container_name, actual_value, allowed_by_policy, spe_ctx) := msg if {
                spe_ctx != ""
                msg := sprintf("Container %v is attempting to run as disallowed user. | %v | %v | %v", [container_name, actual_value, allowed_by_policy, spe_ctx])
              }

              run_as_user_spe_ctx(spe, actual, params) := out if {
                user_path := ["spec", "securityContext", "runAsUser", "allowedValues"]
                non_root_path := ["spec", "securityContext", "runAsNonRoot", "allowedValue"]
                has_run_as_user_spe_ctx(spe, user_path, non_root_path)
                spe_user := allowed_values_or_empty(spe, user_path)
                spe_non_root := allowed_values_or_empty(spe, non_root_path)
                out := sprintf("forbidden: %v; policy allows: %v; SPE allows runAsUser: %v; SPE allows runAsNonRoot: %v", [actual, params, spe_user, spe_non_root])
              } else := "" if {
                true
              }

              has_run_as_user_spe_ctx(spe, user_path, _) if {
                path_value_resolved(spe, user_path)
              }

              has_run_as_user_spe_ctx(spe, _, non_root_path) if {
                path_value_resolved(spe, non_root_path)
              }

              accept_users("RunAsAny", _) := true

              allow_user_by_spe("MustRunAsNonRoot", provided_user, run_as_non_root, spe) if {
                user_path := ["spec", "securityContext", "runAsUser", "allowedValues"]
                non_root_path := ["spec", "securityContext", "runAsNonRoot", "allowedValue"]
                path_value_resolved(spe, user_path)
                path_value_resolved(spe, non_root_path)
                spe_user := allowed_values_or_empty(spe, user_path)
                spe_non_root := allowed_values_or_empty(spe, non_root_path)
                provided_user in spe_user
                run_as_non_root in spe_non_root
              }

              allow_user_by_spe(rule, provided_user, _, spe) if {
                rule != "MustRunAsNonRoot"
                user_path := ["spec", "securityContext", "runAsUser", "allowedValues"]
                path_value_resolved(spe, user_path)
                spe_user := allowed_values_or_empty(spe, user_path)
                provided_user in spe_user
              }

              accept_users("MustRunAsNonRoot", provided_user) := res if res := provided_user != 0

              accept_users("MustRunAs", provided_user) := res if {
                ranges := input.parameters.runAsUser.ranges
                res := is_in_range(provided_user, ranges)
              }

              # Group Options
              get_group_violation(field, params, container) := msg if {
                rule := params.rule
                provided_value := get_field_value(field, container, review_pod_spec)
                not is_array(provided_value)
                not accept_value(rule, provided_value, params.ranges)
                allowed_by_policy := sprintf("Allowed %v: %v", [field, params])
                actual_value := sprintf("Actual %v: %v", [field, provided_value])
                msg := sprintf("Container %v is attempting to run as disallowed %v. | %v | %v", [container.name, field, actual_value, allowed_by_policy])
              }

              # SupplementalGroups is array value
              get_group_violation(field, params, container) := msg if {
                rule := params.rule
                array_value := get_field_value(field, container, review_pod_spec)
                is_array(array_value)
                provided_value := array_value[_]
                not accept_value(rule, provided_value, params.ranges)
                allowed_by_policy := sprintf("Allowed %v: %v", [field, params])
                actual_value := sprintf("Actual %v: %v", [field, array_value])
                msg := sprintf("Container %v is attempting to run as disallowed %v. | %v | %v", [container.name, field, actual_value, allowed_by_policy])
              }

              get_group_violation(field, params, container) := msg if {
                not get_field_value(field, container, review_pod_spec)
                params.rule == "MustRunAs"
                allowed_by_policy := sprintf("Allowed %v: %v", [field, params])
                actual_value := sprintf("Actual %v: not set", [field])
                msg := sprintf("Container %v is attempting to run as disallowed %v. | %v | %v", [container.name, field, actual_value, allowed_by_policy])
              }

              accept_value("RunAsAny", _, _) := true

              accept_value("MayRunAs", provided_value, ranges) := res if res := is_in_range(provided_value, ranges)

              accept_value("MustRunAs", provided_value, ranges) := res if res := is_in_range(provided_value, ranges)

              # If container level is provided, that takes precedence
              get_field_value(field, container, _) := out if {
                container_value := get_seccontext_field(field, container)
                out := container_value
              }

              # If no container level exists, use pod level
              get_field_value(field, container, pod_spec) := out if {
                not has_seccontext_field(field, container)
                pod_value := get_seccontext_field(field, pod_spec)
                out := pod_value
              }

              is_in_range(val, ranges) := res if {
                res := is_in_any_range(val, ranges)
              }

              has_seccontext_field(field, obj) if {
                get_seccontext_field(field, obj)
              }

              has_seccontext_field(field, obj) if {
                get_seccontext_field(field, obj) == false
              }

              get_seccontext_field(field, obj) := out if {
                out = obj.securityContext[field]
              }

              get_field_value_or_default(field, container, pod_spec, default_val) := out if {
                has_seccontext_field(field, container)
                sec_ctx := object.get(container, "securityContext", {})
                out := object.get(sec_ctx, field, default_val)
              } else := out if {
                not has_seccontext_field(field, container)
                pod_ctx := object.get(pod_spec, "securityContext", {})
                out := object.get(pod_ctx, field, default_val)
              }

              review_pod_spec := object.get(
                object.get(
                  object.get(input.review.object, "spec", {}),
                  "template",
                  {},
                ),
                "spec",
                input.review.object.spec,
              )

              review_containers := array.concat(
                array.concat(
                  object.get(review_pod_spec, "containers", []),
                  object.get(review_pod_spec, "initContainers", []),
                ),
                object.get(review_pod_spec, "ephemeralContainers", []),
              )
