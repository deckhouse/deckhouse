apiVersion: constraints.gatekeeper.sh/v1beta1
kind: D8AllowPrivilegeEscalation
metadata:
  name: pod-security-standards-restricted
spec:
  enforcementAction: "deny"
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaceSelector:
      matchExpressions:
        - key: security.deckhouse.io/pod-policy
          operator: In
          values:
            - baseline
            - restricted
  parameters:
    allowPrivilegeEscalation: false
