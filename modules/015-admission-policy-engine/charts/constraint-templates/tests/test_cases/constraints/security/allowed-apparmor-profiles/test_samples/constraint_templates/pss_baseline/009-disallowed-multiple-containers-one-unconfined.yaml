apiVersion: v1
kind: Pod
metadata:
  name: disallowed-multiple-containers-one-unconfined
  namespace: testns
spec:
  containers:
    - name: nginx
      image: nginx
      securityContext:
        appArmorProfile:
          type: Unconfined
    - name: sidecar
      image: busybox
      command: ["/bin/sh", "-c", "sleep 3600"]
      securityContext:
        appArmorProfile:
          type: RuntimeDefault
