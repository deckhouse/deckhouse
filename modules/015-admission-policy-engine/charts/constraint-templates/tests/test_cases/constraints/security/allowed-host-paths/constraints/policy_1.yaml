apiVersion: constraints.gatekeeper.sh/v1beta1
kind: D8AllowedHostPaths
metadata:
  name: test
spec:
  enforcementAction: "deny"
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaceSelector:
      matchLabels:
        custom-policy: example
  parameters:
    allowedHostPaths:
      - pathPrefix: /proc/rw
        readOnly: false
      - pathPrefix: /proc/ro
        readOnly: true
