apiVersion: deckhouse.io/v1alpha1
kind: ConstraintTestFields
metadata:
  name: vulnerable-images
spec:
  objectKind: Pod
  objectFields:
    - path: spec.containers[].image
      level: container

      description: Image reference checked via external data provider
      requiredScenarios: [positive, negative, initContainer, multiContainer, ephemeralContainer]
  applicableTracks:
    functional: true
