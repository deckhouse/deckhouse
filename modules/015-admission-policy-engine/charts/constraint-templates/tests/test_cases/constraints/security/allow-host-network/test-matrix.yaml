apiVersion: deckhouse.io/v1alpha1
kind: ConstraintTestMatrix
metadata:
  name: allow-host-network
spec:
  suiteName: d8-host-network-ports
  outputTestDirectory: rendered
  defaultObjectBase: admissionPod
  defaultInventory:
    - ref: ../../../_test-samples/ns.yaml
  bases:
    admissionPod:
      document:
        apiVersion: v1
        kind: Pod
        metadata:
          namespace: testns
        spec:
          containers:
            - image: nginx
              name: nginx
    securityPolicyException:
      document:
        apiVersion: deckhouse.io/v1alpha1
        kind: SecurityPolicyException
        metadata:
          namespace: testns
  namedExceptions: {}
  blocks:
    - name: pss-baseline-functional
      gatorBlock: pss-baseline-functional
      defaultObjectBase: ""
      template: ../rendered/constraint-template.yaml
      constraint: constraints/pss_baseline.yaml
      cases:
        - name: allowed-no-hostnetwork
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.hostNetwork
              scenario: absent
            - path: spec.initContainers[].ports[].hostPort
              scenario: absent
          exception: ""
          exceptionRef: ""
          inventory: []
          object:
            base: admissionPod
            merge:
              metadata:
                name: allowed-no-hostnetwork
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    ports:
                      - containerPort: 80
        - name: disallowed-no-hostnetwork-multiple-containers
          violations: "yes"
          assertionMessage: ""
          fields:
            - path: spec.hostNetwork
              scenario: absent
            - path: spec.containers[].ports[].hostPort
              scenario: multiContainer
            - path: spec.containers[].ports[].protocol
              scenario: multiContainer
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed-no-hostnetwork-multiple-containers
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    ports:
                      - containerPort: 80
                        hostPort: 8080
                        protocol: TCP
                  - image: redis
                    name: redis
                    ports:
                      - containerPort: 6379
                        hostPort: 9090
                        protocol: TCP
        - name: disallowed-hostnetwork-true
          violations: "yes"
          assertionMessage: ""
          fields:
            - path: spec.hostNetwork
              scenario: negative
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed-hostnetwork-true
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    ports:
                      - containerPort: 80
                hostNetwork: true
        - name: disallowed-initcontainer-hostport-in-range
          violations: "yes"
          assertionMessage: ""
          fields:
            - path: spec.initContainers[].ports[].hostPort
              scenario: positive
            - path: spec.containers[].ports[].hostPort
              scenario: initContainer
            - path: spec.containers[].ports[].protocol
              scenario: initContainer
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed-initcontainer-hostport-in-range
              spec:
                hostNetwork: false
                initContainers:
                  - image: busybox
                    name: init
                    ports:
                      - containerPort: 8080
                        hostPort: 8080
                        protocol: TCP
        - name: disallowed-initcontainer-hostport-out-of-range
          violations: "yes"
          assertionMessage: ""
          fields:
            - path: spec.initContainers[].ports[].hostPort
              scenario: negative
            - path: spec.containers[].ports[].hostPort
              scenario: initContainer
            - path: spec.containers[].ports[].protocol
              scenario: initContainer
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed-initcontainer-hostport-out-of-range
              spec:
                hostNetwork: false
                initContainers:
                  - image: busybox
                    name: init
                    ports:
                      - containerPort: 999
                        hostPort: 999
                        protocol: TCP
        - name: disallowed-ephemeralcontainer-hostport-in-range
          violations: "yes"
          assertionMessage: ""
          fields:
            - path: spec.containers[].ports[].hostPort
              scenario: ephemeralContainer
            - path: spec.containers[].ports[].protocol
              scenario: ephemeralContainer
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed-ephemeralcontainer-hostport-in-range
              spec:
                hostNetwork: false
                ephemeralContainers:
                  - image: busybox
                    name: eph
                    ports:
                      - containerPort: 8080
                        hostPort: 8080
                        protocol: TCP
