apiVersion: v1
kind: Pod
metadata:
  name: disallowed-multiple-containers-one-unconfined-annotation
  namespace: testns
  annotations:
    container.apparmor.security.beta.kubernetes.io/nginx: unconfined
spec:
  containers:
    - name: nginx
      image: nginx
    - name: sidecar
      image: busybox
      command: ["/bin/sh", "-c", "sleep 3600"]
