apiVersion: constraints.gatekeeper.sh/v1beta1
kind: D8AllowedSysctls
metadata:
  name: test
spec:
  enforcementAction: "deny"
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaceSelector:
      matchLabels:
        custom-policy: example
  parameters:
    allowedSysctls:
      - kernel.shm_rmid_forced
      - net.core.rmem_max
    forbiddenSysctls: []
