apiVersion: deckhouse.io/v1alpha1
kind: ConstraintTestMatrix
metadata:
  name: allowed-flex-volumes
spec:
  suiteName: d8-allowed-volume-types
  outputTestDirectory: rendered
  defaultObjectBase: admissionPod
  defaultInventory:
    - ref: ../../../_test-samples/ns.yaml
  bases:
    admissionPod:
      document:
        apiVersion: v1
        kind: Pod
        metadata:
          namespace: testns
        spec:
          containers:
            - image: nginx
              name: nginx
  namedExceptions: {}
  blocks:
    - name: security-policy
      gatorBlock: security-policy
      defaultObjectBase: ""
      template: ../rendered/constraint-template.yaml
      constraint: constraints/policy_1.yaml
      cases:
        - name: 001-example-allowed
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.volumes[].flexVolume.driver
              scenario: positive
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                labels:
                  app: nginx-flex-volumes
                name: nginx-flex-volumes
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    volumeMounts:
                      - mountPath: /cache
                        name: demo-vol
                volumes:
                  - flexVolume:
                      driver: volume.sh
                    name: demo-vol
        - name: 002-example-disallowed
          violations: "yes"
          assertionMessage: ""
          fields:
            - path: spec.volumes[].flexVolume.driver
              scenario: negative
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                labels:
                  app: nginx-flex-volumes
                name: nginx-flex-volumes
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    volumeMounts:
                      - mountPath: /cache
                        name: demo-vol
                volumes:
                  - flexVolume:
                      driver: volume.sh/lvm
                    name: demo-vol
        - name: 003-no-flex-volume
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.volumes[].flexVolume.driver
              scenario: absent
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                labels:
                  app: nginx-no-flex-volume
                name: nginx-no-flex-volume
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    volumeMounts:
                      - mountPath: /cache
                        name: demo-vol
                volumes:
                  - emptyDir: {}
                    name: demo-vol
