    - name: 032-038-disallowed-by-exception-empty-spec
      violations: 'yes'
      assertionMessage: ''
      fields:
      - path: spec.securityContext.seccompProfile.allowedValues
        scenario: speAbsent
      exception: ''
      exceptionRef: ''
      inventory:
      - base: securityPolicyException
        merge:
          metadata:
            name: empty-spec
          spec:
