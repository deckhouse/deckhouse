          spec:
            containers:
            - image: nginx
              name: nginx
              securityContext:
                seccompProfile:
                  type: Unconfined
  - name: security-policy
    gatorBlock: security-policy
    defaultObjectBase: ''
    template: ../rendered/constraint-template.yaml
    constraint: constraints/policy_1.yaml
    cases:
    - name: 021-allowed-localhost-verySpecialFile-annotation
      violations: 'no'
      assertionMessage: ''
      fields:
      - path: metadata.annotations["container.seccomp.security.alpha.kubernetes.io/*"]
