  - name: pss-baseline-with-exception
    gatorBlock: pss-baseline-with-exception
    defaultObjectBase: ''
    template: ../rendered/constraint-template.yaml
    constraint: constraints/pss_baseline.yaml
    cases:
    - name: 031-033-allowed-by-exception-localhost-profile
      violations: 'no'
      assertionMessage: ''
      fields:
      - path: spec.securityContext.seccompProfile.allowedValues
        scenario: speMatch
      exception: ''
      exceptionRef: ''
      inventory:
      - base: securityPolicyException
        merge:
          metadata:
            name: allow-localhost-profile
          spec:
            securityContext:
              seccompProfile:
                allowedLocalhostFiles:
                - my-custom-profile.json
                allowedValues:
                - Localhost
      object:
        base: admissionPod
        merge:
          metadata:
            labels:
              security.deckhouse.io/security-policy-exception: allow-localhost-profile
            name: allowed-by-exception-localhost-profile
          spec:
            containers:
            - image: nginx
              name: nginx
              securityContext:
                seccompProfile:
                  localhostProfile: my-custom-profile.json
                  type: Localhost
