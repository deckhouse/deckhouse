        merge:
          metadata:
            name: allow-unconfined-container
          spec:
            securityContext:
              seccompProfile:
                allowedValues:
                - Unconfined
      object:
        base: admissionPod
        merge:
          metadata:
            labels:
              security.deckhouse.io/security-policy-exception/nginx: allow-unconfined-container
            name: allowed-by-container-exception-unconfined
          spec:
            containers:
            - image: nginx
              name: nginx
              securityContext:
                seccompProfile:
                  type: Unconfined
            - command:
              - /bin/sh
              - -c
              - sleep 3600
              image: busybox
              name: sidecar
              securityContext:
                seccompProfile:
                  type: RuntimeDefault
    - name: 030-037-disallowed-by-exception-profile-mismatch
      violations: 'yes'
      assertionMessage: ''
      fields:
      - path: spec.securityContext.seccompProfile.allowedValues
        scenario: speMismatch
      exception: ''
      exceptionRef: ''
      inventory:
      - base: securityPolicyException
        merge:
          metadata:
            name: allow-localhost-profile
          spec:
            securityContext:
              seccompProfile:
                allowedLocalhostFiles:
                - my-custom-profile.json
                allowedValues:
                - Localhost
      object:
        base: admissionPod
        merge:
          metadata:
            labels:
              security.deckhouse.io/security-policy-exception: allow-localhost-profile
            name: disallowed-by-exception-profile-mismatch
          spec:
            containers:
            - image: nginx
              name: nginx
              securityContext:
                seccompProfile:
                  type: Unconfined
    - name: 036-disallowed-no-exception-label
      violations: 'yes'
      assertionMessage: ''
      fields:
      - path: spec.securityContext.seccompProfile.allowedValues
        scenario: speAbsent
      exception: ''
