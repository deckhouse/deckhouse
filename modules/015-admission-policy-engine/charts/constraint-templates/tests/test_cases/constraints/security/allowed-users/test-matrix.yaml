            merge:
              metadata:
                name: disallowed-runAsUser-zero-pod
              spec:
                securityContext:
                  runAsUser: 0
        - name: 011-disallowed-runAsNonRoot-false-container
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.containers[].securityContext.runAsUser
              scenario: absent
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed-runAsNonRoot-false-container
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      fsGroup: 50
                      runAsGroup: 50
                      runAsNonRoot: false
                      supplementalGroups:
                        - 50
                securityContext:
                  fsGroup: 50
                  runAsGroup: 50
                  supplementalGroups:
                    - 50
        - name: 009-disallowed-multiple-containers-one-root
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.containers[].securityContext.runAsUser
              scenario: multiContainer
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed-multiple-containers-one-root
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      fsGroup: 50
                      runAsGroup: 50
                      runAsUser: 1000
                      supplementalGroups:
                        - 50
                  - image: redis
                    name: redis
                    securityContext:
