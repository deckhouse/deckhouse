apiVersion: deckhouse.io/v1alpha1
kind: ConstraintTestMatrix
metadata:
  name: allowed-users
spec:
  suiteName: d8-allowed-users
  outputTestDirectory: rendered
  defaultObjectBase: admissionPod
  defaultInventory:
    - ref: ../../../_test-samples/ns.yaml
  bases:
    admissionPod:
      document:
        apiVersion: v1
        kind: Pod
        metadata:
          namespace: testns
        spec:
          containers:
            - image: nginx
              name: nginx
    securityPolicyException:
      document:
        apiVersion: deckhouse.io/v1alpha1
        kind: SecurityPolicyException
        metadata:
          namespace: testns
    restrictedNamespace:
      document:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: testns
          labels:
            security.deckhouse.io/pod-policy: restricted
            custom-policy: example
  namedExceptions: {}
  blocks:
    - name: pss-restricted
      gatorBlock: pss-restricted
      defaultObjectBase: ""
      template: ../rendered/constraint-template.yaml
      constraint: constraints/pss_restricted.yaml
      cases:
        - name: 003-allowed-runAsNonRoot-true-container
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.containers[].securityContext.runAsUser
              scenario: positive
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: allowed-runAsNonRoot-true-container
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      runAsNonRoot: true
        - name: 004-allowed-runAsNonRoot-true-pod
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.securityContext.runAsUser
              scenario: positive
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: allowed-runAsNonRoot-true-pod
              spec:
                securityContext:
                  runAsNonRoot: true
        - name: 005-allowed-runAsUser-non-zero-container
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.containers[].securityContext.runAsUser
              scenario: positive
            - path: spec.containers[].securityContext.runAsUser
              scenario: initContainer
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: allowed-runAsUser-non-zero-container
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      runAsUser: 1000
                initContainers:
                  - image: nginx
                    name: init
                    securityContext:
                      runAsUser: 1000
        - name: 006-allowed-runAsUser-non-zero-pod
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.securityContext.runAsUser
              scenario: positive
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: allowed-runAsUser-non-zero-pod
              spec:
                securityContext:
                  runAsUser: 1000
        - name: 002-allowed-deployment-runAsNonRoot-true-container
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.containers[].securityContext.runAsUser
              scenario: positive
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: allowed-deployment-runAsNonRoot-true-container
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: nginx
                template:
                  metadata:
                    labels:
                      app: nginx
                  spec:
                    containers:
                      - image: nginx
                        name: nginx
                        securityContext:
                          runAsNonRoot: true
        - name: 001-allowed-daemonset-runAsNonRoot-true-container
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.containers[].securityContext.runAsUser
              scenario: positive
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: allowed-daemonset-runAsNonRoot-true-container
              spec:
                selector:
                  matchLabels:
                    app: nginx
                template:
                  metadata:
                    labels:
                      app: nginx
                  spec:
                    containers:
                      - image: nginx
                        name: nginx
                        securityContext:
                          runAsNonRoot: true
        - name: 010-disallowed-no-securityContext
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.containers[].securityContext.runAsUser
              scenario: absent
            - path: spec.securityContext.runAsUser
              scenario: absent
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed-no-securityContext
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      fsGroup: 50
                      runAsGroup: 50
                      supplementalGroups:
                        - 50
                securityContext:
                  fsGroup: 50
                  runAsGroup: 50
                  supplementalGroups:
                    - 50
        - name: 012-disallowed-runAsUser-zero-container
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.containers[].securityContext.runAsUser
