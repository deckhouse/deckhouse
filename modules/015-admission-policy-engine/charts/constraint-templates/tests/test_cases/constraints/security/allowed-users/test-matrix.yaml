                name: disallowed-runAsUser-zero-container
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      fsGroup: 50
                      runAsGroup: 50
                      runAsUser: 0
                      supplementalGroups:
                        - 50
                securityContext:
                  fsGroup: 50
                  runAsGroup: 50
                  supplementalGroups:
                    - 50
        - name: 013-disallowed-runAsUser-zero-pod
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.securityContext.runAsUser
              scenario: negative
          exception: ""
          exceptionRef: ""
          object:
