apiVersion: deckhouse.io/v1alpha1
kind: ConstraintTestMatrix
metadata:
  name: allow-privileged
spec:
  suiteName: d8-privileged-container
  outputTestDirectory: rendered
  defaultObjectBase: admissionPod
  defaultInventory:
    - ref: $TEST_ROOT/constraints/_test-samples/ns.yaml
  bases:
    admissionPod:
      document:
        apiVersion: v1
        kind: Pod
        metadata:
          namespace: testns
        spec:
          containers:
            - image: nginx
              name: nginx
    securityPolicyException:
      document:
        apiVersion: deckhouse.io/v1alpha1
        kind: SecurityPolicyException
        metadata:
          namespace: testns
  namedExceptions: {}
  blocks:
    - name: pss-baseline
      gatorBlock: pss-baseline
      defaultObjectBase: ""
      template: ../rendered/constraint-template.yaml
      constraint: constraints/pss_baseline.yaml
      cases:
        - name: 002-allowed-privileged-false
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.containers[].securityContext.privileged
              scenario: positive
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: allowed-privileged-false
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      privileged: false
        - name: 007-allowed-no-securitycontext
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.containers[].securityContext.privileged
              scenario: absent
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: allowed-no-securitycontext
        - name: 006-disallowed-privileged-true
          violations: "yes"
          assertionMessage: ""
          fields:
            - path: spec.containers[].securityContext.privileged
              scenario: negative
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed-privileged-true
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      privileged: true
        - name: 005-disallowed-multiple-containers-one-privileged-true
          violations: "yes"
          assertionMessage: ""
          fields:
            - path: spec.containers[].securityContext.privileged
              scenario: multiContainer
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed-multiple-containers-one-privileged-true
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      privileged: true
                  - command:
                      - /bin/sh
                      - -c
                      - sleep 3600
                    image: busybox
                    name: sidecar
                    securityContext:
                      privileged: false
        - name: 004-disallowed-initcontainer-privileged-true
          violations: "yes"
          assertionMessage: ""
          fields:
            - path: spec.containers[].securityContext.privileged
              scenario: initContainer
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed-initcontainer-privileged-true
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      privileged: false
                initContainers:
                  - command:
                      - /bin/sh
                      - -c
                      - echo init
                    image: busybox
                    name: init
                    securityContext:
                      privileged: true
        - name: 008-disallowed-ephemeralcontainer-privileged-true
          violations: "yes"
          assertionMessage: ""
          fields:
            - path: spec.containers[].securityContext.privileged
              scenario: ephemeralContainer
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed-ephemeralcontainer-privileged-true
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      privileged: false
                ephemeralContainers:
                  - command:
                      - /bin/sh
                      - -c
                      - echo eph
                    image: busybox
                    name: eph
                    securityContext:
                      privileged: true
    - name: pss-baseline-with-exception
      gatorBlock: pss-baseline-with-exception
      defaultObjectBase: ""
      template: ../rendered/constraint-template.yaml
      constraint: constraints/pss_baseline.yaml
      cases:
        - name: 014-023-allowed-by-exception-privileged-true
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.securityContext.privileged.allowedValue
              scenario: speMatch
          exception: ""
          exceptionRef: ""
          inventory:
            - base: securityPolicyException
              merge:
                metadata:
                  name: allow-privileged-true
                spec:
                  securityContext:
                    privileged:
                      allowedValue: true
          object:
            base: admissionPod
            merge:
              metadata:
                labels:
                  security.deckhouse.io/security-policy-exception: allow-privileged-true
                name: allowed-by-exception-privileged-true
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      privileged: true
        - name: 020-disallowed-no-exception-label
          violations: "yes"
          assertionMessage: ""
          fields:
            - path: spec.securityContext.privileged.allowedValue
              scenario: speAbsent
          exception: ""
          exceptionRef: ""
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed-no-exception-label
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      privileged: true
        - name: 012-021-disallowed-by-exception-empty-spec
          violations: "yes"
          assertionMessage: ""
          fields:
            - path: spec.securityContext.privileged.allowedValue
              scenario: speMismatch
          exception: ""
          exceptionRef: ""
          inventory:
            - base: securityPolicyException
              merge:
                metadata:
                  name: empty-spec
                spec:
                  test: test
          object:
            base: admissionPod
            merge:
              metadata:
                labels:
                  security.deckhouse.io/security-policy-exception: empty-spec
                name: disallowed-by-exception-empty-spec
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      privileged: true
    - name: pss-baseline-spe-container
      gatorBlock: pss-baseline-spe-container
      defaultObjectBase: ""
      template: ../rendered/constraint-template.yaml
      constraint: constraints/pss_baseline.yaml
      cases:
        - name: 013-022-allowed-by-container-specific-exception-privileged-true
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.securityContext.privileged.allowedValue
              scenario: speContainerSpecific
          exception: ""
          exceptionRef: ""
          inventory:
            - base: securityPolicyException
              merge:
                metadata:
                  name: allow-privileged-true-container
                spec:
                  securityContext:
                    privileged:
                      allowedValue: true
          object:
            base: admissionPod
            merge:
              metadata:
                labels:
                  security.deckhouse.io/security-policy-exception/nginx: allow-privileged-true-container
                name: allowed-by-container-exception-privileged-true
              spec:
                containers:
                  - image: nginx
                    name: nginx
                    securityContext:
                      privileged: true
                  - command:
                      - /bin/sh
                      - -c
                      - sleep 3600
                    image: busybox
                    name: sidecar
                    securityContext:
                      privileged: false
