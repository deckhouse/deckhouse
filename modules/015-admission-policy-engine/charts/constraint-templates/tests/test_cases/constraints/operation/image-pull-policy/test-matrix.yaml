apiVersion: deckhouse.io/v1alpha1
kind: ConstraintTestMatrix
metadata:
  name: image-pull-policy
spec:
  suiteName: d8imagepullpolicy
  outputTestDirectory: rendered
  defaultObjectBase: admissionPod
  defaultInventory: []
  bases:
    admissionPod:
      document:
        apiVersion: v1
        kind: Pod
        metadata:
          namespace: testns
        spec:
          containers:
          - image: nginx
            name: nginx
    admissionDeployment:
      document:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          namespace: testns
        spec:
          template:
            spec:
              containers:
              - image: nginx
                name: nginx
  namedExceptions: {}
  blocks:
  - name: d8imagepullpolicy
    gatorBlock: d8imagepullpolicy
    defaultObjectBase: ''
    template: ../../templates/operation/image-pull-policy.yaml
    constraint: constraints/policy_1.yaml
    cases:
    - name: example-allowed
      violations: 'no'
      assertionMessage: ''
      fields:
      - path: spec.containers[].imagePullPolicy
        scenario: positive
      exception: ''
      exceptionRef: ''
      inventory: []
      object:
        base: admissionPod
        merge:
          metadata:
            name: allowed
          spec:
            containers:
            - name: nginx
              image: nginx
              imagePullPolicy: Always
    - name: example-disallowed
      violations: 'yes'
      assertionMessage: 'Container <nginx> in your Pod <disallowed> has invalid pull policy: <IfNotPresent>'
      fields:
      - path: spec.containers[].imagePullPolicy
        scenario: negative
      exception: ''
      exceptionRef: ''
      inventory: []
      object:
        base: admissionPod
        merge:
          metadata:
            name: disallowed
          spec:
            containers:
            - name: nginx
              image: nginx
              imagePullPolicy: IfNotPresent
  - name: pss-controller-deployment
    gatorBlock: pss-controller-deployment
    template: ../rendered/constraint-template.yaml
    constraint: constraints/policy_1.yaml
    cases:
    - name: controller-allowed-image-pull-policy
      violations: 'no'
      assertionMessage: ''
      fields:
      - path: spec.template.spec.containers[].imagePullPolicy
        scenario: positive
      object:
        base: admissionDeployment
        merge:
          metadata:
            name: controller-allowed-image-pull-policy
          spec:
            template:
              spec:
                containers:
                - image: nginx
                  name: nginx
                  imagePullPolicy: Always
      exception: ''
      exceptionRef: ''
