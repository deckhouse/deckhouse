apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
    annotations:
        description: |-
            Deny Pods that have tolerations from the ones in the specified list.
            https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-tolerations/
        metadata.gatekeeper.sh/title: Disallow tolerations
        metadata.gatekeeper.sh/version: 1.0.0
    labels:
        heritage: deckhouse
        module: admission-policy-engine
        security.deckhouse.io: operation-policy
    name: d8disallowedtolerations
spec:
    crd:
        spec:
            names:
                kind: D8DisallowedTolerations
            validation:
                openAPIV3Schema:
                    properties:
                        tolerations:
                            description: Disallowed toleration patterns (partial match by specified fields).
                            items:
                                properties:
                                    effect:
                                        enum:
                                            - NoSchedule
                                            - PreferNoSchedule
                                            - NoExecute
                                        type: string
                                    key:
                                        type: string
                                    operator:
                                        enum:
                                            - Exists
                                            - Equal
                                        type: string
                                    value:
                                        type: string
                                type: object
                            type: array
                    type: object
    targets:
        - code:
            - engine: Rego
              source:
                libs:
                    - |
                      # =============================================================================
                      # Library: lib.common
                      # =============================================================================
                      # Container iteration, field access helpers, and exception label utilities.
                      # =============================================================================
                      package lib.common

                      # Backwards-compatible container iterator (uses input.review)
                      input_containers contains c if {
                        c := input.review.object.spec.containers[_]
                      }

                      input_containers contains c if {
                        c := input.review.object.spec.initContainers[_]
                      }

                      input_containers contains c if {
                        c := input.review.object.spec.ephemeralContainers[_]
                      }

                      # Parameterized container iterator (uses passed object)
                      input_containers_from(obj) := containers if {
                        base := object.get(obj, ["spec", "containers"], [])
                        init := object.get(obj, ["spec", "initContainers"], [])
                        eph := object.get(obj, ["spec", "ephemeralContainers"], [])
                        containers := array.concat(array.concat(base, init), eph)
                      }

                      has_field(object, field) if {
                        object[field]
                      }

                      has_path(obj, path) if {
                        object.get(obj, path, {"__missing__": true}) != {"__missing__": true}
                      }

                      get_field(obj, path, _default) := out if {
                        out := object.get(obj, path, _default)
                      }

                      # Backwards-compatible exception label lookup (uses input.review)
                      get_exception_label(container) := label if {
                        key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                        label := input.review.object.metadata.labels[key]
                        label != ""
                      } else := label if {
                        key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                        object.get(input.review.object.metadata.labels, key, "") == ""
                        label := object.get(input.review.object.metadata.labels, "security.deckhouse.io/security-policy-exception", "")
                        label != ""
                      } else := "" if {
                        true
                      }

                      # Parameterized exception label lookup (uses labels map)
                      get_exception_label_from_labels(container, labels) := label if {
                        key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                        label := object.get(labels, key, "")
                        label != ""
                      } else := label if {
                        key := sprintf("security.deckhouse.io/security-policy-exception/%v", [container.name])
                        object.get(labels, key, "") == ""
                        label := object.get(labels, "security.deckhouse.io/security-policy-exception", "")
                        label != ""
                      } else := "" if {
                        true
                      }
                rego: |
                    package d8.operation_policies

                    import data.lib.common.has_field

                    is_pod if {
                      input.review.kind.kind == "Pod"
                    }

                    # k8s default NoExecute tolerations that get injected for all pods
                    is_default_noexecute(t) if {
                      t.effect == "NoExecute"
                      t.key == "node.kubernetes.io/not-ready"
                    }

                    is_default_noexecute(t) if {
                      t.effect == "NoExecute"
                      t.key == "node.kubernetes.io/unreachable"
                    }

                    # Collect pod tolerations but skip the default NoExecute ones
                    pod_tolerations contains t if {
                      t := input.review.object.spec.tolerations[_]
                      not is_default_noexecute(t)
                    }

                    # helpers: "absent in pattern OR equal" semantics
                    key_match(rt, _) if {
                      not has_field(rt, "key")
                    }

                    key_match(rt, pt) if {
                      rt.key == pt.key
                    }

                    op_match(rt, _) if {
                      not has_field(rt, "operator")
                    }

                    op_match(rt, pt) if {
                      rt.operator == pt.operator
                    }

                    val_match(rt, _) if {
                      not has_field(rt, "value")
                    }

                    val_match(rt, pt) if {
                      rt.value == pt.value
                    }

                    eff_match(rt, _) if {
                      not has_field(rt, "effect")
                    }

                    eff_match(rt, pt) if {
                      rt.effect == pt.effect
                    }

                    tol_match(rt, pt) if {
                      key_match(rt, pt)
                      op_match(rt, pt)
                      val_match(rt, pt)
                      eff_match(rt, pt)
                    }

                    violation contains {"msg": msg} if {
                      not input.review.operation == "DELETE"
                      is_pod
                      rt := input.parameters.tolerations[_]
                      pt := pod_tolerations[_]
                      tol_match(rt, pt)
                      msg := sprintf("Pod <%v> has a disallowed toleration matching %v", [input.review.object.metadata.name, rt])
                    }
                version: v1
          target: admission.k8s.gatekeeper.sh
