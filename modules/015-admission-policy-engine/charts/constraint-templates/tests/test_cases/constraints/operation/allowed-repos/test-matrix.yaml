apiVersion: deckhouse.io/v1alpha1
kind: ConstraintTestMatrix
metadata:
  name: allowed-repos
spec:
  suiteName: d8-allowed-repos
  outputTestDirectory: rendered
  defaultObjectBase: admissionPod
  defaultInventory:
    - ref: ../../../_test-samples/ns.yaml
  bases:
    admissionPod:
      document:
        apiVersion: v1
        kind: Pod
        metadata:
          namespace: testns
        spec:
          containers:
            - image: nginx
              name: nginx
  namedExceptions: {}
  blocks:
    - name: operation-policy
      gatorBlock: operation-policy
      defaultObjectBase: ""
      template: ../../templates/operation/allowed-repos.yaml
      constraint: constraints/policy_1.yaml
      cases:
        - name: example-allowed
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.containers[].image
              scenario: positive
          exception: ""
          exceptionRef: ""
          inventory: []
          object:
            base: admissionPod
            merge:
              metadata:
                name: allowed
              spec:
                containers:
                  - name: foo
                    image: my.repo/app:v1
        - name: example-disallowed
          violations: "yes"
          assertionMessage: ""
          fields:
            - path: spec.containers[].image
              scenario: negative
          exception: ""
          exceptionRef: ""
          inventory: []
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed
              spec:
                containers:
                  - name: foo
                    image: gcr.io/app:v1
        - name: example-allowed-init-container
          violations: "no"
          assertionMessage: ""
          fields:
            - path: spec.containers[].image
              scenario: initContainer
          exception: ""
          exceptionRef: ""
          inventory: []
          object:
            base: admissionPod
            merge:
              metadata:
                name: allowed-init-container
              spec:
                containers:
                  - name: foo
                    image: my.repo/app:v1
                initContainers:
                  - name: init
                    image: my.repo/init:v1
        - name: example-disallowed-ephemeral-container
          violations: "yes"
          assertionMessage: ""
          fields:
            - path: spec.containers[].image
              scenario: ephemeralContainer
          exception: ""
          exceptionRef: ""
          inventory: []
          object:
            base: admissionPod
            merge:
              metadata:
                name: disallowed-ephemeral-container
              spec:
                containers:
                  - name: foo
                    image: my.repo/app:v1
                ephemeralContainers:
                  - name: eph
                    image: docker.io/bad/app:v1
