apiVersion: constraints.gatekeeper.sh/v1beta1
kind: D8DenyExecHeritage
metadata:
  name: security-policy-test
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["PodExecOptions", "PodAttachOptions"]
    scope: Namespaced
    namespaces:
      - "d8-*"
      - "kube-*"

