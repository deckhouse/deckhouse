apiVersion: v1
kind: Pod
metadata:
  name: disallowed-hostnetwork-with-hostport-only-exception-restrictive
  namespace: testns
  labels:
    security.deckhouse.io/security-policy-exception: allow-hostport-only
spec:
  hostNetwork: true
  containers:
    - name: nginx
      image: nginx
      ports:
        - hostPort: 5000
          containerPort: 5000
          protocol: TCP