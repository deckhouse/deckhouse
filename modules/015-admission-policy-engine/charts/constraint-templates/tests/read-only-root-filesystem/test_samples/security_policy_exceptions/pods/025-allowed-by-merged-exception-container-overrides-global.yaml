apiVersion: v1
kind: Pod
metadata:
  name: allowed-by-merged-exception-container-overrides-global
  namespace: testns
  labels:
    security.deckhouse.io/security-policy-exception: allow-writable-container
    security.deckhouse.io/security-policy-exception/nginx: allow-writable-container
spec:
  containers:
    - name: nginx
      image: nginx
      securityContext:
        readOnlyRootFilesystem: false
    - name: redis
      image: redis
      securityContext:
        readOnlyRootFilesystem: false