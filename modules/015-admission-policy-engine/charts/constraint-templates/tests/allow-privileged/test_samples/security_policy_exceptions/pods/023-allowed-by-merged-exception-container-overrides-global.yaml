apiVersion: v1
kind: Pod
metadata:
  name: allowed-by-merged-exception-container-overrides-global
  namespace: testns
  labels:
    security.deckhouse.io/security-policy-exception: allow-privileged-false
    security.deckhouse.io/security-policy-exception/nginx: allow-privileged-true-container
spec:
  containers:
    - name: nginx
      image: nginx
      securityContext:
        privileged: true
