apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: d8hostnetwork
  labels:
    heritage: deckhouse
    module: admission-policy-engine
    security.deckhouse.io: security-policy
  annotations:
    metadata.gatekeeper.sh/title: "Host Networking"
    metadata.gatekeeper.sh/version: 1.0.0
    description: >-
      Controls usage of host network namespace by pod containers. Specific
      ports must be specified. Corresponds to the `hostNetwork` and
      `hostPorts` fields in a PodSecurityPolicy. For more information, see
      https://kubernetes.io/docs/concepts/policy/pod-security-policy/#host-namespaces
spec:
  crd:
    spec:
      names:
        kind: D8HostNetwork
      validation:
        # Schema for the `parameters` field
        openAPIV3Schema:
          type: object
          description: >-
            Controls usage of host network namespace by pod containers. Specific
            ports must be specified. Corresponds to the `hostNetwork` and
            `hostPorts` fields in a PodSecurityPolicy. For more information, see
            https://kubernetes.io/docs/concepts/policy/pod-security-policy/#host-namespaces
          properties:
            allowHostNetwork:
              description: "Determines if the policy allows the use of HostNetwork in the pod spec."
              type: boolean
            ranges:
              type: array
              description: "A list of of hostPort ranges allowed by the rule."
              items:
                type: object
                description: "The range of hostPorts allowed by the rule."
                properties:
                  min:
                    description: "The start of the allowed port range, inclusive."
                    type: integer
                  max:
                    description: "The end of the allowed port range, inclusive."
                    type: integer
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            version: "v1"
            libs:
              - |
                {{- include "constraint-templates.lib.common.container-review" . | nindent 16 }}
              - |
                {{- include "constraint-templates.lib.check_bool" . | nindent 16 }}
              - |
                {{- include "constraint-templates.lib.range" . | nindent 16 }}
              - |
                {{- include "constraint-templates.lib.check_range" . | nindent 16 }}
              - |
                {{- include "constraint-templates.lib.exception.spe" . | nindent 16 }}
              - |
                {{- include "constraint-templates.lib.message" . | nindent 16 }}
            rego: |
              package d8.security_policies

              import data.lib.check_bool.check_pod_bool
              import data.lib.check_range.check_ports_with_protocol_in_ranges
              import data.lib.message.violation_message
              import data.lib.common.input_containers
              import data.lib.exception.allowed_values_or_empty
              import data.lib.exception.resolve_spe_from_labels

              violation contains {"msg": msg, "details": {}} if {
                not input.review.operation == "DELETE"
                obj := input.review.object
                bool_result := check_pod_bool(
                  obj,
                  ["spec", "hostNetwork"],
                  "hostNetwork",
                  false,
                  false,
                  ["spec", "network", "hostNetwork", "allowedValue"]
                )
                host_network := object.get(obj.spec, "hostNetwork", false)
                ports := collect_ports(obj, host_network)
                spe := resolve_spe_from_labels(obj.metadata.labels, obj.metadata.namespace)
                spe_ports := allowed_values_or_empty(spe, ["spec", "network", "hostPorts"])
                range_result := check_ports_with_protocol_in_ranges(ports, "hostPorts", input.parameters.ranges, spe_ports)
                failed := failed_result(bool_result, range_result)
                msg := violation_message("The hostNetwork or hostPort are not allowed", sprintf("pod: %v", [obj.metadata.name]), failed.detail)
              }

              failed_result(bool_result, _) := bool_result if {
                not bool_result.allowed
              }

              failed_result(bool_result, range_result) := range_result if {
                bool_result.allowed
                not range_result.allowed
              }

              collect_ports(obj, host_network) := ports if {
                host_ports := [
                  {"port": p.hostPort, "protocol": object.get(p, "protocol", "TCP")} |
                  p := input_containers[_].ports[_]
                  object.get(p, "hostPort", null) != null
                ]
                container_ports := [
                  {"port": p.containerPort, "protocol": object.get(p, "protocol", "TCP")} |
                  p := input_containers[_].ports[_]
                  object.get(p, "containerPort", null) != null
                ]
                host_network
                ports := array.concat(host_ports, container_ports)
              }

              collect_ports(obj, host_network) := ports if {
                host_ports := [
                  {"port": p.hostPort, "protocol": object.get(p, "protocol", "TCP")} |
                  p := input_containers[_].ports[_]
                  object.get(p, "hostPort", null) != null
                ]
                not host_network
                ports := host_ports
              }

