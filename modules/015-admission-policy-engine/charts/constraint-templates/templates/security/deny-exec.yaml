apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: d8denyexec
  labels:
    heritage: deckhouse
    module: admission-policy-engine
    security.deckhouse.io: security-policy
  annotations:
    metadata.gatekeeper.sh/title: "Deny Exec"
    metadata.gatekeeper.sh/version: 1.0.0
    description: >-
      Defines an allow-list of commands that could be executed via the pod/exec action.
      Interactive exec is not permitted.
spec:
  crd:
    spec:
      names:
        kind: D8DenyExec
      validation:
        # Schema for the `parameters` field
        openAPIV3Schema:
          type: object
          description: >-
            Defines an allow-list of commands that could be executed via the pod/exec action.
                  Interactive exec is not permitted.
          properties:
            allowedCommands:
              type: array
              description: "An allow-list of exec commands."
              items:
                type: string
                description: "Shell command."
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package d8.security_policies

        import future.keywords.in

        all_containers[c] {
          c := object.get(input.review.object.spec, "containers", [])[_]
        }

        all_containers[c] {
          c := object.get(input.review.object.spec, "initContainers", [])[_]
        }

        all_containers[c] {
          c := object.get(input.review.object.spec, "ephemeralContainers", [])[_]
        }

        violation[{"msg": msg}] {
          not input.review.operation == "DELETE"
          c := all_containers[_]
          object.get(c, "stdin", false) == true
          msg := "Interactive exec is not permitted."
        }

        violation[{"msg": msg}] {
          not input.review.operation == "DELETE"
          c := all_containers[_]
          some command in object.get(c, "command", [])
          not command in object.get(input.parameters, "allowedCommands", [])
          msg := sprintf("Only %v commands are allowed.", [object.get(input.parameters, "allowedCommands", [])])
        }
