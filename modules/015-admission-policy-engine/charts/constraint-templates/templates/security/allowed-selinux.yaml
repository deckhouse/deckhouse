apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: d8selinux
  labels:
    heritage: deckhouse
    module: admission-policy-engine
    security.deckhouse.io: security-policy
  annotations:
    metadata.gatekeeper.sh/title: "SELinux V2"
    metadata.gatekeeper.sh/version: 1.0.0
    description: >-
      Defines an allow-list of seLinuxOptions configurations for pod
      containers. Corresponds to a PodSecurityPolicy requiring SELinux configs.
      For more information, see
      https://kubernetes.io/docs/concepts/policy/pod-security-policy/#selinux
spec:
  crd:
    spec:
      names:
        kind: D8SeLinux
      validation:
        # Schema for the `parameters` field
        openAPIV3Schema:
          type: object
          description: >-
            Defines an allow-list of seLinuxOptions configurations for pod
            containers. Corresponds to a PodSecurityPolicy requiring SELinux configs.
            For more information, see
            https://kubernetes.io/docs/concepts/policy/pod-security-policy/#selinux
          properties:
            allowedSELinuxOptions:
              type: array
              description: "An allow-list of SELinux options configurations."
              items:
                type: object
                description: "An allowed configuration of SELinux options for a pod container."
                properties:
                  level:
                    type: string
                    description: "An SELinux level."
                  role:
                    type: string
                    description: "An SELinux role."
                  type:
                    type: string
                    description: "An SELinux type."
                  user:
                    type: string
                    description: "An SELinux user."
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            version: "v1"
            libs:
              - |
                {{- include "constraint-templates.lib.common.container-review" . | nindent 16 }}
              - |
                {{- include "constraint-templates.lib.check_object_match" . | nindent 16 }}
              - |
                {{- include "constraint-templates.lib.exception.spe" . | nindent 16 }}
            rego: |
              package d8.security_policies

              import data.lib.check_object_match.check_partial_match_in_list
              import data.lib.common.has_field
              import data.lib.exception.allowed_values_or_empty
              import data.lib.exception.resolve_spe_for_container
              import data.lib.exception.resolve_spe_from_labels

              # Disallow top-level custom SELinux options
              violation contains {"msg": msg, "details": {}} if {
                not input.review.operation == "DELETE"
                has_field(input.review.object.spec.securityContext, "seLinuxOptions")
                labels := object.get(input.review.object.metadata, "labels", {})
                spe := resolve_spe_from_labels(labels, input.review.object.metadata.namespace)
                spe_allowed := allowed_values_or_empty(spe, ["spec", "securityContext", "seLinuxOptions", "allowedValues"])
                result := check_partial_match_in_list(
                  input.review.object.spec.securityContext.seLinuxOptions,
                  input.parameters.allowedSELinuxOptions,
                  ["level", "role", "type", "user"],
                  spe_allowed
                )
                not result.allowed
                actual_value := sprintf("Actual SELinux options: %v", [input.review.object.spec.securityContext.seLinuxOptions])
                allowed_by_policy := sprintf("Allowed options: %v", [input.parameters.allowedSELinuxOptions])
                msg := sprintf("SELinux options are not allowed, pod: %v. | %v | %v", [input.review.object.metadata.name, actual_value, allowed_by_policy])
              }

              # Disallow container-level custom SELinux options
              violation contains {"msg": msg, "details": {}} if {
                not input.review.operation == "DELETE"
                c := input_security_context[_]
                has_field(c.securityContext, "seLinuxOptions")
                labels := object.get(input.review.object.metadata, "labels", {})
                spe := resolve_spe_for_container(c, labels, input.review.object.metadata.namespace)
                spe_allowed := allowed_values_or_empty(spe, ["spec", "securityContext", "seLinuxOptions", "allowedValues"])
                result := check_partial_match_in_list(
                  c.securityContext.seLinuxOptions,
                  input.parameters.allowedSELinuxOptions,
                  ["level", "role", "type", "user"],
                  spe_allowed
                )
                not result.allowed
                actual_value := sprintf("Actual SELinux options: %v", [c.securityContext.seLinuxOptions])
                allowed_by_policy := sprintf("Allowed options: %v", [input.parameters.allowedSELinuxOptions])
                msg := sprintf("SELinux options are not allowed, pod: %v, container %v. | %v | %v", [input.review.object.metadata.name, c.name, actual_value, allowed_by_policy])
              }

              input_security_context contains c if {
                c := input.review.object.spec.containers[_]
                has_field(c.securityContext, "seLinuxOptions")
              }

              input_security_context contains c if {
                c := input.review.object.spec.initContainers[_]
                has_field(c.securityContext, "seLinuxOptions")
              }

              input_security_context contains c if {
                c := input.review.object.spec.ephemeralContainers[_]
                has_field(c.securityContext, "seLinuxOptions")
              }

