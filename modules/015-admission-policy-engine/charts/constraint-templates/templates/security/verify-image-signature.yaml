---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: d8verifyimagesignatures
  labels:
    heritage: deckhouse
    module: admission-policy-engine
    security.deckhouse.io: external-data
spec:
  crd:
    spec:
      names:
        kind: D8VerifyImageSignatures
      validation:
        openAPIV3Schema:
          type: object
          description: >-
            Restricts running container images without a correct signature.
          properties:
            references:
              description: "The list of image references to check"
              type: array
              items:
                type: string
            isTest:
              type: boolean
              description: >-
                Optional test-mode flag for CI/gator tests.
                When true, policy reads mocked provider response from inventory ExternalDataInventory.
  targets:
    - rego: |
        package d8.verify_image_signatures

        # Get data from Ratify in production, or mocked data in test mode.
        remote_data := response {
          images := [img | img = retrieve_images[_]]
          filtered_images := [image |
            image := images[_];
            regex.match(input.parameters.references[_], image)
          ]
          response := get_data(filtered_images)
        }

        get_data(filtered_images) = response {
          is_test_mode
          response := external_data_from_inventory("ratify-provider", filtered_images)
        }

        get_data(filtered_images) = response {
          not is_test_mode
          response := external_data_from_inventory("ratify-provider", filtered_images)
        }

        external_data_from_inventory(provider, keys) = response {
          namespace := object.get(input.review.object.metadata, "namespace", "default")
          ns_inventory := object.get(object.get(data.inventory, "namespace", {}), namespace, {})
          api_inventory := object.get(ns_inventory, "deckhouse.io/v1alpha1", {})
          kinds_inventory := object.get(api_inventory, "ExternalDataInventory", {})
          external_inventory := object.get(kinds_inventory, "default", {})
          providers := object.get(object.get(external_inventory, "spec", {}), "providers", {})
          provider_data := object.get(providers, provider, {})

          responses_map := object.get(provider_data, "responses", {})
          responses := [[k, object.get(responses_map, k, {})] |
            k := keys[_]
          ]

          response := {
            "errors": object.get(provider_data, "errors", []),
            "system_error": object.get(provider_data, "system_error", ""),
            "responses": responses,
          }
        }

        is_test_mode {
          object.get(input.parameters, "isTest", false)
        }

        retrieve_images[imgs] {
          count(input.review.object.spec.containers[_].image) > 0
          imgs := input.review.object.spec.containers[_].image
        }

        retrieve_images[imgs] {
          count(input.review.object.spec.initContainers[_].image) > 0
          imgs := input.review.object.spec.initContainers[_].image
        }

        # Base Gatekeeper violation
        violation[{"msg": msg}] {
          not input.review.operation == "DELETE"
          general_violation[{"result": msg}]
        }

        # Check if there are any system errors
        general_violation[{"result": result}] {
          err := remote_data.system_error
          err != ""
          result := sprintf("System error calling external data provider: %s", [err])
        }

        # Check if there are errors for any of the images
        general_violation[{"result": result}] {
          count(remote_data.errors) > 0
          result := sprintf("Error validating one or more images: %s", remote_data.errors)
        }

        # Check if the success criteria is true
        general_violation[{"result": result}] {
          subject_validation := remote_data.responses[_]
          subject_validation[1].isSuccess == false
          result := sprintf("Image signature verification failed: %s", [subject_validation[0]])
        }
      target: admission.k8s.gatekeeper.sh
