apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: d8automountserviceaccounttokenpod
  labels:
    heritage: deckhouse
    module: admission-policy-engine
    security.deckhouse.io: security-policy
  annotations:
    metadata.gatekeeper.sh/title: "Automount Service Account Token for Pod"
    metadata.gatekeeper.sh/version: 1.0.1
    description: >-
      Controls the ability of any Pod to enable automountServiceAccountToken.
spec:
  crd:
    spec:
      names:
        kind: D8AutomountServiceAccountTokenPod
      validation:
        openAPIV3Schema:
          type: object
          description: >-
            Controls the ability of any Pod to enable automountServiceAccountToken.
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            version: "v1"
            libs:
              - |
                {{- include "constraint-templates.lib.common.container-review" . | nindent 16 }}
              - |
                package lib.exclude_update

                is_update(review) if {
                  review.operation == "UPDATE"
                }
            rego: |
              package d8.security_policies

              import data.lib.common.input_containers
              import data.lib.common.pod_spec
              import data.lib.exclude_update.is_update

              violation contains {"msg": msg} if {
                not input.review.operation == "DELETE"
                # spec.automountServiceAccountToken and spec.containers.volumeMounts fields are immutable.
                not is_update(input.review)
                obj := input.review.object
                mount_service_account_token(pod_spec)
                msg := sprintf("Automounting service account token is disallowed, workload: %v", [obj.metadata.name])
              }

              mount_service_account_token(spec) if {
                spec.automountServiceAccountToken == true
              }

              # if there is no automountServiceAccountToken spec, check on volumeMount in containers.
              # Service Account token is mounted on /var/run/secrets/kubernetes.io/serviceaccount
              mount_service_account_token(spec) if {
                not has_key(spec, "automountServiceAccountToken")
                "/var/run/secrets/kubernetes.io/serviceaccount" == input_containers[_].volumeMounts[_].mountPath
              }

              has_key(x, k) if {
                _ = x[k]
              }