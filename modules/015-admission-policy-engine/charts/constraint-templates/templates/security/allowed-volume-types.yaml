apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: d8allowedvolumetypes
  labels:
    heritage: deckhouse
    module: admission-policy-engine
    security.deckhouse.io: security-policy
  annotations:
    metadata.gatekeeper.sh/title: "Volume Types"
    description: >-
      Restricts mountable volume types to those specified by the user.
      Corresponds to the `volumes` field in a PodSecurityPolicy. For more
      information, see https://kubernetes.io/docs/concepts/security/pod-security-standards/
spec:
  crd:
    spec:
      names:
        kind: D8AllowedVolumeTypes
      validation:
        # Schema for the `parameters` field
        openAPIV3Schema:
          type: object
          description: >-
            Restricts mountable volume types to those specified by the user.
            Corresponds to the `volumes` field in a PodSecurityPolicy. For more
            information, see https://kubernetes.io/docs/concepts/security/pod-security-standards/
          properties:
            volumes:
              description: "`volumes` is an array of volume types. All volume types can be enabled using `*`."
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            version: "v1"
            libs:
              - |
                {{- include "constraint-templates.lib.common.container-review" . | nindent 16 }}
              - |
                {{- include "constraint-templates.lib.check_set" . | nindent 16 }}
              - |
                {{- include "constraint-templates.lib.match" . | nindent 16 }}
              - |
                {{- include "constraint-templates.lib.exception.spe" . | nindent 16 }}
            rego: |
              package d8.security_policies
 
              import data.lib.check_set.check_value_in_set_with_wildcards
              import data.lib.exception.allowed_values_or_empty
              import data.lib.exception.resolve_spe_from_labels
 
              violation contains {"msg": msg, "details": {}} if {
                not input.review.operation == "DELETE"
                obj := input.review.object
                volume_fields := {x | obj.spec.volumes[_][x]; x != "name"}
                field := volume_fields[_]
                spe := resolve_spe_from_labels(obj.metadata.labels, obj.metadata.namespace)
                spe_allowed := allowed_values_or_empty(spe, ["spec", "volumes", "types", "allowedValues"])
                result := check_value_in_set_with_wildcards(
                  field,
                  input.parameters.volumes,
                  spe_allowed,
                  {}
                )
                not result.allowed
                msg := sprintf("The volume type %v is not allowed, pod: %v. | %v", [field, obj.metadata.name, result.msg])
              }
