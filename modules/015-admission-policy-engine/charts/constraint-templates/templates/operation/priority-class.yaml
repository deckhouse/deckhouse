apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: d8priorityclass
  labels:
    heritage: deckhouse
    module: admission-policy-engine
    security.deckhouse.io: operation-policy
  annotations:
    metadata.gatekeeper.sh/title: "Required Priority Class"
    metadata.gatekeeper.sh/version: 1.0.0
    description: "Required Priority Class"
spec:
  crd:
    spec:
      names:
        kind: D8PriorityClass
      validation:
        openAPIV3Schema:
          type: object
          properties:
            priorityClassNames:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            version: "v1"
            libs:
              - |
                {{- include "constraint-templates.lib.common.container-review" . | nindent 16 }}
            rego: |
              package d8.operation_policies

              import data.lib.common.pod_spec

              violation contains {"msg": msg} if {
                not input.review.operation == "DELETE"
                priority_class := object.get(pod_spec, "priorityClassName", "")
                not contains(input.parameters.priorityClassNames, priority_class)
                msg := sprintf("Workload <%v> has invalid priority class: %v, allowed: %v", [input.review.object.metadata.name, priority_class, input.parameters.priorityClassNames])
              }

              contains(list, elem) if {
                list[_] = elem
              }
