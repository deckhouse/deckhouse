{{- define "pss_restricted_params_allowed_capabilities" -}}
allowedCapabilities:
  - NET_BIND_SERVICE
requiredDropCapabilities:
  - ALL
{{- end }}
{{- define "pss_restricted_params_allowed_privilege_escalation" -}}
allowPrivilegeEscalation: false
{{- end }}

{{- define "pss_restricted_params_allowed_volume_types" -}}
volumes:
  - configMap
  - csi
  - downwardAPI
  - emptyDir
  - ephemeral
  - persistentVolumeClaim
  - projected
  - secret
{{- end }}

{{- define "pss_restricted_params_allowed_users" -}}
runAsUser:
  rule: MustRunAsNonRoot
{{- end }}

{{- define "pss_restricted_params_allowed_seccomp_profiles" -}}
allowedProfiles:
  - RuntimeDefault
  - Localhost
allowedLocalhostFiles:
  - "*"
{{- end }}

{{- $context := . }}

{{- range $enforcementAction := .Values.admissionPolicyEngine.internal.podSecurityStandards.enforcementActions }}

  {{- $parameters := fromYaml (include "pss_restricted_params_allowed_capabilities" .) }}
  {{- include "pod_security_standard_restricted" (list $context "D8AllowedCapabilities" $enforcementAction $parameters) }}

  {{- $parameters := fromYaml (include "pss_restricted_params_allowed_privilege_escalation" .) }}
  {{- include "pod_security_standard_restricted" (list $context "D8AllowPrivilegeEscalation" $enforcementAction  $parameters) }} # Privilege Escalation

  {{- $parameters := fromYaml (include "pss_restricted_params_allowed_volume_types" .) }} # Volumes
  {{- include "pod_security_standard_restricted" (list $context "D8AllowedVolumeTypes" $enforcementAction $parameters) }}

  {{- $parameters := fromYaml (include "pss_restricted_params_allowed_users" .) }} # Allowed Users
  {{- include "pod_security_standard_restricted" (list $context "D8AllowedUsers" $enforcementAction $parameters) }}

  {{- $parameters := fromYaml (include "pss_restricted_params_allowed_seccomp_profiles" .) }}
  {{- include "pod_security_standard_restricted" (list $context "D8AllowedSeccompProfiles" $enforcementAction $parameters) }}

{{- end }}
