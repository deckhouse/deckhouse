{{- define "pss_baseline_params_host_network" -}}
allowHostNetwork: false
ranges: []
{{- end }}

{{- define "pss_baseline_host_process" -}}
allowHostPID: false
allowHostIPC: false
{{- end }}

{{- define "pss_baseline_params_app_armor" -}}
allowedProfiles:
  - runtime/default
  - localhost/*
{{- end }}

{{- define "pss_baseline_params_allowed_capabilities" -}}
allowedCapabilities:
  - AUDIT_WRITE
  - CHOWN
  - DAC_OVERRIDE
  - FOWNER
  - FSETID
  - KILL
  - MKNOD
  - NET_BIND_SERVICE
  - SETFCAP
  - SETGID
  - SETPCAP
  - SETUID
  - SYS_CHROOT
{{- end }}

{{- define "pss_baseline_params_allowed_proc_mount" -}}
allowedProcMount: Default
{{- end }}

{{- define "pss_baseline_params_se_linux" -}}
allowedSELinuxOptions:
  - type: ""
  - type: container_t
  - type: container_init_t
  - type: container_kvm_t
  - type: container_engine_t
{{- end }}

{{- define "pss_baseline_params_allowed_sysctls" -}}
allowedSysctls:
  - kernel.shm_rmid_forced
  - net.ipv4.ip_local_port_range
  - net.ipv4.ip_unprivileged_port_start
  - net.ipv4.tcp_syncookies
  - net.ipv4.ping_group_range
  - net.ipv4.ip_local_reserved_ports
  - net.ipv4.tcp_keepalive_time
  - net.ipv4.tcp_fin_timeout
  - net.ipv4.tcp_keepalive_intvl
  - net.ipv4.tcp_keepalive_probes
{{- end }}

{{- define "pss_baseline_params_allowed_seccomp_profiles" -}}
allowedProfiles:
  - RuntimeDefault
  - Localhost
  - ""
  - undefined
allowedLocalhostFiles:
  - "*"
{{- end }}

{{- define "pss_baseline_params_allowed_host_paths" -}}
allowedHostPaths: []
{{- end }}

{{- $context := . }}

{{- $knownList := list }} # Host Networking
{{- if .Values.admissionPolicyEngine.podSecurityStandards.policies }}
  {{- range $known := .Values.admissionPolicyEngine.podSecurityStandards.policies.hostPorts.knownRanges }}
    {{- $knownList = append $knownList $known }}
  {{- end }}
{{- end }}

{{- range $enforcementAction := .Values.admissionPolicyEngine.internal.podSecurityStandards.enforcementActions }}

  {{- $parameters := fromYaml (include "pss_baseline_params_host_network" .) }}
  {{- $_ := set $parameters "ranges" $knownList }}
  {{- include "pod_security_standard_baseline" (list $context "D8HostNetwork" $enforcementAction $parameters) }}
  
  {{- $parameters := fromYaml (include "pss_baseline_host_process" .) }} 
  {{- include "pod_security_standard_baseline" (list $context "D8HostProcesses" $enforcementAction $parameters) }} # Host Processes

  {{- include "pod_security_standard_baseline" (list $context "D8PrivilegedContainer" $enforcementAction) }} # Privileged Container

  {{- $parameters := fromYaml (include "pss_baseline_params_app_armor" .) }} # App Armor
  {{- include "pod_security_standard_baseline" (list $context "D8AppArmor" $enforcementAction $parameters) }}

  {{- $parameters := fromYaml (include "pss_baseline_params_allowed_capabilities" .) }} # Capabilities
  {{- include "pod_security_standard_baseline" (list $context "D8AllowedCapabilities" $enforcementAction $parameters) }}

  {{- $parameters := fromYaml (include "pss_baseline_params_allowed_host_paths" .) }} # Capabilities
  {{- include "pod_security_standard_baseline" (list $context "D8AllowedHostPaths" $enforcementAction $parameters) }} # Host Path


  {{- $parameters := fromYaml (include "pss_baseline_params_allowed_proc_mount" .) }} # Proc Mount
  {{- include "pod_security_standard_baseline" (list $context "D8AllowedProcMount" $enforcementAction $parameters)}}

  {{- $parameters := fromYaml (include "pss_baseline_params_se_linux" .) }} # Selinux
  {{- include "pod_security_standard_baseline" (list $context "D8SeLinux" $enforcementAction $parameters) }}

  {{- $parameters := fromYaml (include "pss_baseline_params_allowed_sysctls" .) }} # Sysctls
  {{- include "pod_security_standard_baseline" (list $context "D8AllowedSysctls" $enforcementAction $parameters) }}

  {{- $parameters := fromYaml (include "pss_baseline_params_allowed_seccomp_profiles" .) }} # Seccomp Profiles
  {{- include "pod_security_standard_baseline" (list $context "D8AllowedSeccompProfiles" $enforcementAction $parameters) }}

{{- end }}
