{{- $_ := set . "Env" (.Env | default "EE") }}
{{- $_ := set . "UsePrebuildJekyllImage" true }}
{{- $_ := set . "Mode" "production" }}
{{- $_ := set . "Edition" "EE" }}
{{- if or (eq $.Env "CE") (eq $.Env "BE") (eq $.Env "SE") (eq $.Env "SE-plus") (eq $.Env "EE") -}}
  {{- $_ := set . "Edition" $.Env }}
{{- else if eq $.Env "FE"  }}
  {{- $_ := set . "Edition" "EE" }}
{{- else }}
  {{- $_ := set . "Mode" $.Env }}
{{- end }}
project: deckhouse-web
configVersion: 1
---
# Base Images
{{- $imageVersions := .Files.Get "../../candi/image_versions.yml" | fromYaml }}
{{- $baseImages := .Files.Get "../../candi/base_images.yml" | fromYaml }}
  {{- range $k, $v := $baseImages }}
    {{- $baseImagePath := (printf "%s@%s" $baseImages.REGISTRY_PATH (trimSuffix "/" $v)) }}
    {{- if ne $k "REGISTRY_PATH" }}
      {{- $_ := set $baseImages $k $baseImagePath }}
    {{- end }}
  {{- end }}
  {{- $_ := unset $baseImages "REGISTRY_PATH" }}

  {{- range $k, $v := $imageVersions }}
    {{- $baseImagePath := (printf "%s%s" $imageVersions.REGISTRY_PATH (trimSuffix "/" $v)) }}
    {{- if or (eq $.Mode "development") (eq $.Mode "module") (eq $.Mode "local") }}
      {{- if or ( ne $k "BASE_JEKYLL" ) ( and (not $.UsePrebuildJekyllImage ) ( eq $k "BASE_JEKYLL" ) )}}
        {{- $baseImagePath = trimSuffix "/" $v | splitList "@" | first }}
      {{- end }}
    {{- end }}
    {{- if ne $k "REGISTRY_PATH" }}
      {{- $_ := set $imageVersions $k $baseImagePath }}
    {{- end }}
  {{- end }}
  {{- $_ := unset $imageVersions "REGISTRY_PATH" }}
  {{- $_ := set . "Images" (mustMerge $imageVersions $baseImages) }}
  {{- range $k, $v := .Images }}
---
image: {{ $k }}
from: {{ $v }}
final: false
  {{- end }}
---
{{- $context := . }}
{{- $_ := set $context "ModuleName" "docs" }}
{{- $_ := set $context "ImageName" "web" }}
{{- $_ := set $context "ModulePath" "../../" }}
{{ tpl (.Files.Get "werf-web.inc.yaml") $context }}
---
