{% assign i18n_pdf = site.data.i18n.common %}
<div id="pdf-download-modal" markdown="0" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:1000;">
  <div id="pdf-download-modal-backdrop" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4);"></div>
  <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; border-radius:0.5em; padding:2em 2em 1.5em; min-width:320px; max-width:480px; z-index:1001; box-shadow:0 4px 24px rgba(0,0,0,0.18);">
    <a href="#" id="pdf-download-modal-close" style="position:absolute; top:0.7em; right:1em; font-size:1.2em; text-decoration:none; color:#666;">✕</a>
    <h3 style="margin-top:0; margin-bottom:0.5em;">{{ i18n_pdf['pdf_download_title'][page.lang] }}</h3>
    <p style="margin-bottom:1.2em;">{{ i18n_pdf['pdf_download_choose'][page.lang] }}</p>
    <a href="pdf/deckhouse-admin-guide.pdf" class="button button--outline" style="display:block; text-align:center; margin-bottom:0.7em;">
      {{ i18n_pdf['pdf_admin_guide'][page.lang] }}
    </a>
    <a href="pdf/deckhouse-user-guide.pdf" class="button button--outline" style="display:block; text-align:center; margin-bottom:1.2em;">
      {{ i18n_pdf['pdf_user_guide'][page.lang] }}
    </a>
    <div style="text-align:center;">
      <a href="#" id="pdf-download-modal-cancel" style="display:inline-block; background:#004df2; color:#fff; border:2px solid transparent; border-radius:1px; padding:10px 18px; font-size:16px; font-weight:500; text-transform:uppercase; text-decoration:none; cursor:pointer;">{{ i18n_pdf['pdf_download_cancel'][page.lang] }}</a>
    </div>
  </div>
</div>

<script>
(function() {
  function openPdfModal() { document.getElementById('pdf-download-modal').style.display = 'block'; }
  function closePdfModal() { document.getElementById('pdf-download-modal').style.display = 'none'; }
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('[data-open-pdf-modal]').forEach(function(btn) {
      btn.addEventListener('click', function(e) { e.preventDefault(); openPdfModal(); });
    });
    document.getElementById('pdf-download-modal-close').addEventListener('click', function(e) { e.preventDefault(); closePdfModal(); });
    document.getElementById('pdf-download-modal-cancel').addEventListener('click', function(e) { e.preventDefault(); closePdfModal(); });
    document.getElementById('pdf-download-modal-backdrop').addEventListener('click', closePdfModal);
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePdfModal(); });
  });
})();
</script>
