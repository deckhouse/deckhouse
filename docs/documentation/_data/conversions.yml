cilium-hubble:
    - version: 2
      conversions:
        - del(.auth.password) | if .auth == {} then del(.auth) end
cloud-provider-dvp:
    - version: 2
      description:
        en: |
            * Move `provider.namespace` to `provider.parameters.namespace`.
            * Move `zones` to `nodes.parameters.zones`.
            * Delete `provider.kubeconfigDataBase64`. The kubeconfig is stored in a Secret of type `cloud-provider.deckhouse.io/credentials`.
            * Set `nodes.parameters.layout` (defaults to `Standard`).
            * Replace the placeholder in `nodes.parameters.sshPublicKey` with a real SSH public key.
        ru: |
            * Перенесите `provider.namespace` в `provider.parameters.namespace`.
            * Перенесите `zones` в `nodes.parameters.zones`.
            * Удалите `provider.kubeconfigDataBase64`. Kubeconfig хранится в Secret типа `cloud-provider.deckhouse.io/credentials`.
            * Задайте `nodes.parameters.layout` (по умолчанию — `Standard`).
            * Замените placeholder в `nodes.parameters.sshPublicKey` на реальный публичный SSH-ключ.
      conversions:
        - if .provider == null then .provider = {} end
        - if .provider.parameters == null then .provider.parameters = {} end
        - if .provider.parameters.namespace == null then (if .provider.namespace != null then .provider.parameters.namespace = .provider.namespace else .provider.parameters.namespace = "default" end) end
        - del(.provider.namespace)
        - del(.provider.kubeconfigDataBase64)
        - if .nodes == null then .nodes = {} end
        - if .nodes.parameters == null then .nodes.parameters = {} end
        - if .nodes.parameters.layout == null then .nodes.parameters.layout = "Standard" end
        - if .nodes.parameters.sshPublicKey == null then .nodes.parameters.sshPublicKey = "ssh-rsa PLACEHOLDER_REPLACE_ME" end
        - if .zones != null then .nodes.parameters.zones = .zones end
        - del(.zones)
        - if .nodes.disabled == null then .nodes.disabled = false end
        - if .storage == null then .storage = {} end
        - if .storage.disabled == null then .storage.disabled = false end
        - if .ccm == null then .ccm = {} end
        - if .ccm.disabled == null then .ccm.disabled = false end
        - if .storage.parameters == null then .storage.parameters = {} end
cloud-provider-vsphere:
    - version: 2
      description:
        en: If the field `.storageClass.compatibilityFlag` exists, capitalize the field value.
        ru: Если поле `.storageClass.compatibilityFlag` существует, перепишите значение с заглавной буквы.
      conversions:
        - if .storageClass | has("compatibilityFlag") then .storageClass.compatibilityFlag |= (.[0:1] | ascii_upcase) + (.[1:] | ascii_downcase) end
control-plane-manager:
    - version: 2
      description:
        en: Delete `etcd.externalMembersNames`
        ru: Удалите `etcd.externalMembersNames`
      conversions:
        - del(.etcd.externalMembersNames) | if .etcd == {} then del(.etcd) end
    - version: 3
      description:
        en: Replace `.apiserver.loadBalancer` with `.apiserver.publishAPI.loadBalancer`.
        ru: Замените `.apiserver.loadBalancer` на `.apiserver.publishAPI.loadBalancer`.
      conversions:
        - if .apiserver.loadBalancer != null then .apiserver.publishAPI.loadBalancer.enabled = true end
        - if .apiserver.loadBalancer.port != null then .apiserver.publishAPI.loadBalancer.port = .apiserver.loadBalancer.port | del(.apiserver.loadBalancer.port) end
        - if .apiserver.loadBalancer.sourceRanges != null then .apiserver.publishAPI.loadBalancer.sourceRanges = .apiserver.loadBalancer.sourceRanges | del(.apiserver.loadBalancer.sourceRanges) end
        - if .apiserver.loadBalancer.annotations != null then .apiserver.publishAPI.loadBalancer.annotations = .apiserver.loadBalancer.annotations | del(.apiserver.loadBalancer.annotations) end
        - del(.apiserver.loadBalancer)
descheduler:
    - version: 2
      description:
        en: Delete `settings`.
        ru: Удалите `settings`.
      conversions:
        - del(.)
global:
    - version: 2
      description:
        en: Move `storageClass` to `modules.storageClass`. Remove `modules.resourcesRequests.everyNode`, `modules.resourcesRequests.masterNode` and `modules.proxy` parameters.
        ru: Перенесите `storageClass` в `modules.storageClass`. Удалите параметры `modules.resourcesRequests.everyNode`, `modules.resourcesRequests.masterNode` и `modules.proxy`.
      conversions:
        - if .storageClass and .modules.storageClass == null then .modules.storageClass = .storageClass end
        - del(.storageClass)
        - del(.modules.resourcesRequests.everyNode)
        - del(.modules.resourcesRequests.masterNode)
        - del(.modules.proxy)
istio:
    - version: 2
      description:
        en: Delete `.settings.auth.password`.
        ru: Удалите `.settings.auth.password`.
      conversions:
        - del(.auth.password) | if .auth == {} then del(.auth) end
    - version: 3
      description:
        en: |
            * Move `.settings.enableHTTP10` to `.settings.dataPlane.enableHTTP10`.
            * Move `.settings.proxyConfig` to `.settings.dataPlane.proxyConfig`.
        ru: |
            * Перенесите `.settings.enableHTTP10` в `.settings.dataPlane.enableHTTP10`.
            * Перенесите `.settings.proxyConfig` в `.settings.dataPlane.proxyConfig`.
      conversions:
        - if has("enableHTTP10") then .dataPlane.enableHTTP10 = .enableHTTP10 | del(.enableHTTP10) else . end
        - if has("proxyConfig") then .dataPlane.proxyConfig = .proxyConfig | del(.proxyConfig) else . end
metallb:
    - version: 2
      description:
        en: Remove all `addressPool` elements with the `layer2` protocol.
        ru: Удалите все элементы `addressPool` с протоколом `layer2`.
      conversions:
        - del(.addressPools[]? | select(.protocol == "layer2"))
    - version: 3
      description:
        en: |
            Address pools and BGP settings have been moved to separate Custom Resources. Please remove the following fields from the `metallb` `ModuleConfig`:
              - `.settings.addressPools`
              - `.settings.bgpPeers`
              - `.settings.bgpCommunities`
        ru: |
            Настройки пулов и BGP вынесены в отдельные Custom Resources. Пожалуйста, удалите следующие поля из `ModuleConfig` `metallb`:
              - `.settings.addressPools`
              - `.settings.bgpPeers`
              - `.settings.bgpCommunities`
      conversions:
        - del(.bgpPeers, .bgpCommunities, .addressPools)
node-manager:
    - version: 2
      description:
        en: Delete `allowedKubernetesVersions` and `allowedBundles`.
        ru: Удалите `allowedKubernetesVersions` и `allowedBundles`.
      conversions:
        - del(.allowedKubernetesVersions, .allowedBundles)
    - version: 3
      description:
        en: Delete `earlyOomEnabled`.
        ru: Удалите `earlyOomEnabled`.
      conversions:
        - del(.earlyOomEnabled)
openvpn:
    - version: 2
      conversions:
        - del(.auth.password) | if .auth == {} then del(.auth) end
        - del(.storageClass)
user-authn:
    - version: 2
      description:
        en: Replace `publishAPI.enable` with `publishAPI.enabled`.
        ru: Замените `publishAPI.enable` на `publishAPI.enabled`.
      conversions:
        - if .publishAPI.enable != null then .publishAPI.enabled = .publishAPI.enable | del(.publishAPI.enable) end
