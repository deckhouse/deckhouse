---
image: {{ .ModuleName }}/{{ .ImageName }}/static
from: {{ .ModuleName }}/{{ .ImageName }}/base-jekyll
final: false
shell:
  setup:
  - |
        echo "Ruby: $(ruby --version)"
        echo "Gem: $(gem --version)"
        echo "Bundle: $(bundle --version)"
        jekyll -version
        yq -V
        echo "jq: $(jq -V)"

        cd /srv/jekyll-data/documentation/

        echo '[] Edition - {{ .Edition }}.'

        echo '[] Creating modules list...'
        export MODULES_DIR=/src/modules-metadata
        _tools/modules_list.sh > _data/modules/internal.json
        # Creating list of ALL the modules...
        cat _data/modules/internal.json | jq -MsS '.[0] * .[1]' - _data/modules/modules-addition.json > _data/modules/all.json

        echo "[] Getting modules metadata from module.yaml files..."
        export METADATA_SOURCE_DIR=/src/modules-metadata
        export METADATA_TARGET_FILE=${PWD}/_data/modules/metadata.json
        bash _tools/modules_generate_metadata.sh

        echo "Render global OpenAPI DKP schemas..."
        bash _tools/prepare_resources.sh

        echo '[] Filling in the array of supported OS & K8S versions...'
        cd _data
        yq eval-all -i 'select(fileIndex == 0) * {"k8s": select(fileIndex == 1).k8s, "d8": select(fileIndex == 1).d8}' supported_versions.yml version_map.yml

        {{ .Files.Get (printf "%sdocs/documentation/werf-editions-convert-partials.inc.yaml" .ModulePath) | indent 8 }}

{{ if eq .ModuleName "documentation" }}
        # Rules for building documentation module
        # Syncing file from the documentation to the main site...
        #cp /srv/jekyll-data/documentation/_plugins/{alert.rb,codeblock_unknown_lang_fallback.rb,jekyll_asset_pipeline.rb,custom_filters.rb,utils.rb,breadcrumbs_generator.rb,sidebar_custom.rb,offtopic.rb,navigation_helper.rb,tabs.rb} /srv/jekyll-data/site/_plugins/
        #cp /srv/jekyll-data/documentation/_assets/js/search.js /srv/jekyll-data/site/_assets/

        # "Converting public documentation links to internal relative..."
        grep -rl '](https://deckhouse.io' /srv/jekyll-data/documentation/_data/schemas/ | \
          xargs sed -Ei 's$\]\(https://deckhouse.io/(ru|en)/documentation/v[0-9]+/(modules/|#)$](/\1/\2$'

        cat <<'EOD' > /tmp/_config_additional.yml
        {{- .Files.Get (printf "%smodules/810-documentation/images/web/_config.yml" .ModulePath) | nindent 8 }}
        EOD
        cat <<'EOD' > /tmp/_config_section_defaults.yml
        {{- .Files.Get (printf "%smodules/810-documentation/images/web/_config_section_defaults.yml" .ModulePath) | nindent 8 }}
        EOD

        yq eval-all 'select(fi==0).defaults += select(fi==1).defaults | select(fi==0)' /srv/jekyll-data/documentation/_config.yml /tmp/_config_section_defaults.yml > /srv/jekyll-data/documentation/_config_merged.yml
        mv -f /srv/jekyll-data/documentation/_config_merged.yml /srv/jekyll-data/documentation/_config.yml

        # Use CSE sidebar for CSE edition
        {{ if eq .Edition "CSE" }}
        sed -i 's/sidebar: main/sidebar: cse/' /srv/jekyll-data/documentation/_config.yml
        {{ end }}

        # Use topnav for the documentation module
        #cat <<'EOD' > /srv/jekyll-data/documentation/_data/topnav.yml
        # /* Files.Get (printf "%smodules/810-documentation/images/web/site/_data/topnav.yml" .ModulePath) | nindent 8
        #EOD
        rm -f /srv/jekyll-data/documentation/_includes/icons
        cp -rf /srv/jekyll-data/site/* /srv/jekyll-data/documentation/
        cp -rf /srv/jekyll-data/documentation_override/* /srv/jekyll-data/documentation
{{ end }}
        # Creating additional config...
        echo -e "\nd8Revision: {{ .Edition }}" >> /tmp/_config_additional.yml

        echo '[] Generating static files of the documentation part...'
        cd ..
        mkdir -m 777 -p /app/_site/
{{ if ne .ModuleName "documentation" }}
        {{- if eq .Mode "development" }}
        JEKYLL_ENV=development jekyll build -d /app/_site/ --config _config.yml,/tmp/_config_additional.yml --profile -t
        {{- else }}
        JEKYLL_ENV=production jekyll build -d /app/_site/ --config _config.yml,/tmp/_config_additional.yml
        {{- end }}
{{ else }}
        JEKYLL_ENV=production jekyll build -d /app/_site/documentation/ --config _config.yml,/tmp/_config_additional.yml

        echo '[] Generating static files of the main part...'
        #cd /srv/jekyll-data/site/
        #JEKYLL_ENV=production jekyll build -d /app/_site/site/ --config _config.yml,/tmp/_config_additional.yml

        #cp -Rf /app/_site/site/assets /app/_site/documentation/
        #cp -Rf /app/_site/site/images /app/_site/documentation/
        ##cp -Rf /app/_site/site/ru/includes /app/_site/documentation/ru
        ##cp -Rf /app/_site/site/en/includes /app/_site/documentation/en
        #cp -Rf /app/_site/site/ru /app/_site/documentation/
        #cp -Rf /app/_site/site/en /app/_site/documentation/
        #rm -rf /app/_site/documentation/compare/
{{ end }}
git:
- add: /{{ .ModulePath }}docs
  to: /srv/jekyll-data
  includePaths:
    - site/_includes/head.html
{{ if eq .ModuleName "documentation" }}
    - site/_includes/copyright.html
    - site/_includes/head-site.html
    - site/_includes/header.html
    - site/_includes/header-menu-fill-items.html
    - site/_includes/header-mobile.liquid
    - site/pages/includes/banner.html
    - site/pages/includes/banner_ru.html
    - site/pages/includes/head-site*
    - site/pages/includes/header.html
    - site/pages/includes/header_ru.html
    - site/pages/includes/footer.html
    - site/pages/includes/footer_ru.html
    - site/pages/includes/channel-menu*.html
    - site/pages/includes/group-menu*.html
    - site/_includes/group-menu.html
    - site/_includes/channel-menu*.html
    - site/assets
    - site/_sass
    - site/images/*.*
    - site/images/og
    - site/images/module
    - site/images/logos
    - site/images/icons
    - site/images/favicon
    - site/images/external
    - site/images/diagrams
    - site/images/common
{{ end }}
    - documentation
  excludePaths:
    - '**/werf*.yaml'
    - '**/docker-compose.yml'
    - '**/Makefile'
    - '**/.werf'
    - '**/.helm'
    - documentation/pages/internal
    - documentation/config
    - documentation/search-embedded-modules-*
    - documentation/pages/drafts
{{ if and ( eq .ModuleName "documentation") (ne .Edition "CSE") }}
    - documentation/pages/cse
{{ end }}
#{{ if ne .ModuleName "website-docs" }}
#    - site/_faq
#    - site/pages
#    - site/images/code
