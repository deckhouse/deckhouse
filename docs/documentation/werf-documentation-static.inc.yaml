#    - site/images/stronghold
#    - site/images/upmeter
#    - site/images/virtualization-platform
#    - site/presentations
#    - documentation/_includes/footer.html
#    - site/_includes/footer.html
#    - documentation/_data/topnav.*
#    - site/_data/topnav.*
#    - site/backends
#    - site/_plugins/gs_generator.rb
#    - site/_plugins/dvp_resource_generator.rb
#{{ end }}
  stageDependencies:
    setup: '**/*'
{{ if eq .ModuleName "documentation" }}
- add: /{{ $.ModulePath }}modules/{{ .ModulePriority }}-{{ $.ModuleName }}/images/{{ $.ImageName }}/documentation
  to: /srv/jekyll-data/documentation_override
{{ if eq .Edition "CE" }}
  excludePaths:
    - pages/LICENSE_AGREEMENT_RU.md
{{ end }}
  stageDependencies:
    setup:
    - '**/*'
#{{ if ne .Edition "CE" }}
#- add: /{{ $.ModulePath }}modules/{{ .ModulePriority }}-{{ $.ModuleName }}/images/{{ $.ImageName }}/site/pages/LICENSE_AGREEMENT_RU.md
#  to: /srv/jekyll-data/documentation/pages/LICENSE_AGREEMENT_RU.md
#  stageDependencies:
#    setup:
#    - '**/*'
#{{ end }}
{{ end }}
{{ tpl (.Files.Get (printf "%sdocs/documentation/werf-git-section.inc.yaml" .ModulePath)) . }}
{{ tpl (.Files.Get (printf "%sdocs/documentation/werf-git-section-modules-bundles.inc.yaml" .ModulePath)) . }}
