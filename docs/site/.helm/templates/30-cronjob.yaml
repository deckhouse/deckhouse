apiVersion: batch/v1
kind: CronJob
metadata:
  name: doc-installer-updater
  namespace: {{ .Release.Namespace }}
spec:
  schedule: "*/15 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: configmap-installer-updater-sa
          priorityClassName: {{ pluck .Values.werf.env .Values.priorityClassName | first | default .Values.priorityClassName._default }}
          restartPolicy: OnFailure
          volumes:
            - name: scripts
              configMap:
                name: doc-installer-update-script
                defaultMode: 0755
                items:
                  - key: update.sh
                    path: update.sh
          containers:
            - name: updater
              image: alpine/k8s:1.32.12
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
              command:
                - /bin/sh
              args:
                - -c
                - |
                  echo "=== Update started at $(date) ==="
                  /scripts/update.sh
                  echo "=== Completed at $(date) ==="
---
apiVersion: batch/v1
kind: Job
metadata:
  name: embedded-modules-history-sync-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: embedded-modules-history-sync-sa
      priorityClassName: {{ pluck .Values.werf.env .Values.priorityClassName | first | default .Values.priorityClassName._default }}
      restartPolicy: Never
      initContainers:
        - name: s3-downloader
          image: amazon/aws-cli:2.28.16
          env:
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.global.doc_s3_access_key_id }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.global.doc_s3_secret_access_key }}
          volumeMounts:
            - name: embedded-modules-history-data-tmp
              mountPath: /data
          command:
            - /bin/sh
          args:
            - -c
            - |
              set -eu

              SOURCE_PATH="s3://{{ .Values.global.doc_s3_bucket }}/deckhouse-{{ $.Values.werf.env }}/embedded_modules_list.json"
              TARGET_PATH="/data/embedded_modules_list.json"
              CA_BUNDLE_PATH="/data/s3-root.crt"

              cat <<'EOF' > "${CA_BUNDLE_PATH}"
{{ pluck .Values.werf.env .Values.s3.ca_bundle | first | default .Values.s3.ca_bundle._default | nindent 14 }}
              EOF

              if download_error="$(aws s3 cp "${SOURCE_PATH}" "${TARGET_PATH}" --ca-bundle "${CA_BUNDLE_PATH}" --endpoint-url https://{{ .Values.global.doc_s3_ep }} --region {{ .Values.global.doc_s3_region }} 2>&1)"; then
                if [ -s "${TARGET_PATH}" ]; then
                  echo "ok" > /data/download.status
                  echo "Downloaded '${SOURCE_PATH}' successfully."
                  exit 0
                fi

                echo "Downloaded file '${TARGET_PATH}' is empty." > /data/download.error
              else
                if printf '%s' "${download_error}" | grep -Eq '\(404\)|does not exist'; then
                  echo "S3 object '${SOURCE_PATH}' was not found." > /data/download.error
                else
                  printf '%s\n' "${download_error}" > /data/download.error
                fi
              fi

              echo "error" > /data/download.status
              exit 0
      volumes:
        - name: embedded-modules-history-data-tmp
          emptyDir: {}
      containers:
        - name: updater
          image: alpine/k8s:1.32.12
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: BOOTSTRAP_MODE
              value: "true"
          volumeMounts:
            - name: embedded-modules-history-data-tmp
              mountPath: /data
          command:
            - /bin/sh
          args:
            - -c
            - |
              echo "=== Embedded modules history bootstrap started at $(date) ==="
              cat <<'EOF' > /tmp/sync.sh
{{ include "embedded_modules_history_sync_script" . | nindent 14 }}
              EOF
              chmod 0755 /tmp/sync.sh
              /tmp/sync.sh
              echo "=== Completed at $(date) ==="
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: embedded-modules-history-sync
  namespace: {{ .Release.Namespace }}
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      template:
        spec:
          imagePullSecrets:
            - name: deckhouse-registry-site
          serviceAccountName: embedded-modules-history-sync-sa
          priorityClassName: {{ pluck .Values.werf.env .Values.priorityClassName | first | default .Values.priorityClassName._default }}
          restartPolicy: OnFailure
          initContainers:
            - name: s3-downloader
              image: amazon/aws-cli:2.28.16
              env:
                - name: AWS_ACCESS_KEY_ID
                  value: {{ .Values.global.doc_s3_access_key_id }}
                - name: AWS_SECRET_ACCESS_KEY
                  value: {{ .Values.global.doc_s3_secret_access_key }}
              volumeMounts:
                - name: s3-ca-bundle
                  mountPath: /.aws/s3-root.crt
                  subPath: ca.yaml
                - name: embedded-modules-history-data-tmp
                  mountPath: /data
              command:
                - /bin/sh
              args:
                - -c
                - |
                  set -eu

                  SOURCE_PATH="s3://{{ .Values.global.doc_s3_bucket }}/deckhouse-{{ $.Values.werf.env }}/embedded_modules_list.json"
                  TARGET_PATH="/data/embedded_modules_list.json"

                  if download_error="$(aws s3 cp "${SOURCE_PATH}" "${TARGET_PATH}" --ca-bundle /.aws/s3-root.crt --endpoint-url https://{{ .Values.global.doc_s3_ep }} --region {{ .Values.global.doc_s3_region }} 2>&1)"; then
                    if [ -s "${TARGET_PATH}" ]; then
                      echo "ok" > /data/download.status
                      echo "Downloaded '${SOURCE_PATH}' successfully."
                      exit 0
                    fi

                    echo "Downloaded file '${TARGET_PATH}' is empty." > /data/download.error
                  else
                    if printf '%s' "${download_error}" | grep -Eq '\(404\)|does not exist'; then
                      echo "S3 object '${SOURCE_PATH}' was not found." > /data/download.error
                    else
                      printf '%s\n' "${download_error}" > /data/download.error
                    fi
                  fi

                  echo "error" > /data/download.status
                  exit 0
          volumes:
            - name: scripts
              configMap:
                name: embedded-modules-history-sync-script
                defaultMode: 0755
                items:
                  - key: sync.sh
                    path: sync.sh
            - name: s3-ca-bundle
              configMap:
                name: doc-s3-ca-bundle
            - name: embedded-modules-history-data-tmp
              emptyDir: {}
          containers:
            - name: updater
              image: alpine/k8s:1.32.12
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: embedded-modules-history-data-tmp
                  mountPath: /data
              command:
                - /bin/sh
              args:
                - -c
                - |
                  echo "=== Embedded modules history sync started at $(date) ==="
                  /scripts/sync.sh
                  echo "=== Completed at $(date) ==="
