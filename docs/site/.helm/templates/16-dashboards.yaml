---
{{- if (pluck $.Values.web.env .Values.observability.enable | first | default .Values.observability.enable._default) }}
apiVersion: deckhouse.io/v1
kind: GrafanaDashboardDefinition
metadata:
  labels:
    prometheus.deckhouse.io/grafana-dashboard: ""
{{- if eq $.Values.web.env "web-production" }}
  name: registry-modules-watcher
{{- else }}
  name: registry-modules-watcher-{{ .Release.Namespace }}
{{- end }}
spec:
  folder: Custom
  definition: |
{{ tpl (.Files.Get "dashboards/registry-modules-watcher-stats.yaml") . | indent 4 }}
{{- end }}
---
{{- if eq $.Values.web.env "web-production" }}
{{- if (pluck $.Values.web.env .Values.observability.enable | first | default .Values.observability.enable._default) }}
apiVersion: deckhouse.io/v1
kind: GrafanaDashboardDefinition
metadata:
  labels:
    prometheus.deckhouse.io/grafana-dashboard: ""
  name: modules-validation
spec:
  folder: Custom
  definition: |
{{ tpl (.Files.Get "dashboards/modules-validation.yaml") . | indent 4 }}
{{- end }}
{{- end }}
