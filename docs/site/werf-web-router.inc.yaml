image: web-router-artifact
from: {{ index $.Images "builder/distroless" }}
mount:
{{ include "mount points for golang builds" . }}
shell:
  beforeInstall:
  - pm install golang
  install:
  - cd /go/src/app
  - go mod download
  setup:
  - cd /go/src/app
  - go build -ldflags "-w -s" -v -o /go/src/app/server /go/src/app/cmd/v-router
git:
  - url: https://github.com/flant/web-router.git
    tag: v1.0.14
    add: /
    to: /go/src/app
    stageDependencies:
      install: 'go.mod'
      setup: '**/*'
---
image: web-router
imageSpec:
  config:
    workingDir: "/app"
from: {{ index $.Images "base/scratch" }}
import:
  - image: web-router-artifact
    add: /go/src/app/server
    to: /app/server
    before: setup
    owner: "64535"
    group: "64535"
  - image: web-frontend-artifact
    add: /app/_site
    to: /app/root
    before: setup
    owner: "64535"
    group: "64535"
    includePaths:
    - en/includes/
    - ru/includes/
