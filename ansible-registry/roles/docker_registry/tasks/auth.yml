---
- name: Check if token signing key exists
  ansible.builtin.stat:
    path: "{{ docker_auth_config_dir }}/token.key"
  register: token_key_stat

- name: Generate RSA key pair for JWT token signing
  when: not token_key_stat.stat.exists
  ansible.builtin.command:
    cmd: >-
      openssl req -new -newkey rsa:4096 -days 3650 -nodes -x509
      -subj "/CN={{ token_issuer }}"
      -keyout {{ docker_auth_config_dir }}/token.key
      -out {{ docker_auth_config_dir }}/token.crt
  changed_when: true

- name: Set token key permissions
  ansible.builtin.file:
    path: "{{ docker_auth_config_dir }}/token.key"
    owner: "{{ docker_auth_user }}"
    group: "{{ docker_auth_user }}"
    mode: "0600"

- name: Set token certificate permissions
  ansible.builtin.file:
    path: "{{ docker_auth_config_dir }}/token.crt"
    owner: "{{ docker_auth_user }}"
    group: "{{ docker_auth_user }}"
    mode: "0644"

- name: Copy token certificate to registry config dir
  ansible.builtin.copy:
    src: "{{ docker_auth_config_dir }}/token.crt"
    dest: "{{ registry_config_dir }}/token.crt"
    remote_src: true
    owner: "{{ registry_user }}"
    group: "{{ registry_user }}"
    mode: "0644"

- name: Deploy docker_auth configuration
  ansible.builtin.template:
    src: docker-auth-config.yml.j2
    dest: "{{ docker_auth_config_dir }}/config.yml"
    owner: "{{ docker_auth_user }}"
    group: "{{ docker_auth_user }}"
    mode: "0640"
  notify: Restart docker-auth

- name: Deploy docker-auth systemd unit
  ansible.builtin.template:
    src: docker-auth.service.j2
    dest: /etc/systemd/system/docker-auth.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker-auth

- name: Enable and start docker-auth
  ansible.builtin.systemd:
    name: docker-auth
    state: started
    enabled: true
    daemon_reload: true
