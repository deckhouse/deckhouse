---
# --- Base dependencies ---

- name: Install Python passlib and bcrypt on controller (needed for password_hash filter)
  ansible.builtin.apt:
    name:
      - python3-passlib
      - python3-bcrypt
    state: present
  delegate_to: localhost
  become: true
  run_once: true

- name: Install base OS packages
  ansible.builtin.apt:
    name:
      - openssl
      - ca-certificates
      - curl
      - gnupg2
      - lsb-release
    state: present
    update_cache: true

# --- Install crane (lightweight image tool, no Docker daemon needed) ---

- name: Check if crane is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/crane
  register: crane_stat

- name: Install crane
  when: not crane_stat.stat.exists
  block:
    - name: Download crane tarball
      ansible.builtin.get_url:
        url: "https://github.com/google/go-containerregistry/releases/download/{{ crane_version }}/go-containerregistry_Linux_x86_64.tar.gz"
        dest: /tmp/crane.tar.gz
        mode: "0644"

    - name: Extract crane binary
      ansible.builtin.unarchive:
        src: /tmp/crane.tar.gz
        dest: /usr/local/bin
        remote_src: true
        extra_opts:
          - crane

    - name: Clean up crane tarball
      ansible.builtin.file:
        path: /tmp/crane.tar.gz
        state: absent

- name: Ensure crane is executable
  ansible.builtin.file:
    path: /usr/local/bin/crane
    mode: "0755"
    owner: root
    group: root

# --- Registry binary ---

- name: Check if registry binary exists
  ansible.builtin.stat:
    path: "{{ registry_binary }}"
  register: registry_binary_stat

- name: Extract registry binary from image via crane
  when: not registry_binary_stat.stat.exists
  ansible.builtin.shell:
    cmd: >-
      crane export {{ registry_image }} - |
      tar -xf - --to-stdout {{ registry_binary_container_path }} > {{ registry_binary }}
  args:
    creates: "{{ registry_binary }}"

- name: Set registry binary permissions
  ansible.builtin.file:
    path: "{{ registry_binary }}"
    mode: "0755"
    owner: root
    group: root

# --- docker_auth binary ---

- name: Check if docker_auth binary exists
  ansible.builtin.stat:
    path: "{{ docker_auth_binary }}"
  register: docker_auth_binary_stat

- name: Extract docker_auth binary from image via crane
  when: not docker_auth_binary_stat.stat.exists
  ansible.builtin.shell:
    cmd: >-
      crane export {{ docker_auth_image }} - |
      tar -xf - --to-stdout {{ docker_auth_binary_container_path }} > {{ docker_auth_binary }}
  args:
    creates: "{{ docker_auth_binary }}"

- name: Set docker_auth binary permissions
  ansible.builtin.file:
    path: "{{ docker_auth_binary }}"
    mode: "0755"
    owner: root
    group: root

# --- System users ---

- name: Create registry system user
  ansible.builtin.user:
    name: "{{ registry_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ registry_data_dir }}"
    create_home: false

- name: Create docker-auth system user
  ansible.builtin.user:
    name: "{{ docker_auth_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ docker_auth_config_dir }}"
    create_home: false

- name: Create registry data directory
  ansible.builtin.file:
    path: "{{ registry_data_dir }}"
    state: directory
    owner: "{{ registry_user }}"
    group: "{{ registry_user }}"
    mode: "0750"

- name: Create registry config directory
  ansible.builtin.file:
    path: "{{ registry_config_dir }}"
    state: directory
    owner: "{{ registry_user }}"
    group: "{{ registry_user }}"
    mode: "0750"

- name: Create docker-auth config directory
  ansible.builtin.file:
    path: "{{ docker_auth_config_dir }}"
    state: directory
    owner: "{{ docker_auth_user }}"
    group: "{{ docker_auth_user }}"
    mode: "0750"
