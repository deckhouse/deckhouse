---
- name: Deploy registry garbage collection script
  ansible.builtin.template:
    src: registry-gc.sh.j2
    dest: /usr/local/bin/registry-gc.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy registry-gc systemd service
  ansible.builtin.template:
    src: registry-gc.service.j2
    dest: /etc/systemd/system/registry-gc.service
    owner: root
    group: root
    mode: "0644"

- name: Deploy registry-gc systemd timer
  ansible.builtin.template:
    src: registry-gc.timer.j2
    dest: /etc/systemd/system/registry-gc.timer
    owner: root
    group: root
    mode: "0644"

- name: Enable and start registry-gc timer
  ansible.builtin.systemd:
    name: registry-gc.timer
    state: started
    enabled: true
    daemon_reload: true
