---
- name: Deploy registry configuration
  ansible.builtin.template:
    src: registry-config.yml.j2
    dest: "{{ registry_config_dir }}/config.yml"
    owner: "{{ registry_user }}"
    group: "{{ registry_user }}"
    mode: "0640"
  notify: Restart docker-registry

- name: Deploy registry systemd unit
  ansible.builtin.template:
    src: registry.service.j2
    dest: /etc/systemd/system/docker-registry.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker-registry

- name: Enable and start registry
  ansible.builtin.systemd:
    name: docker-registry
    state: started
    enabled: true
    daemon_reload: true
