---
# Component versions
registry_version: "3.0.0"
docker_auth_version: "1.14.0"
crane_version: "v0.20.3"

# Container images used to extract binaries (via crane)
registry_image: "registry:{{ registry_version }}"
docker_auth_image: "cesanta/docker_auth:{{ docker_auth_version }}"

# Binary paths inside container images
registry_binary_container_path: "bin/registry"
docker_auth_binary_container_path: "docker_auth/auth_server"

# Install paths on host
registry_binary: "/usr/local/bin/registry"
docker_auth_binary: "/usr/local/bin/docker_auth"

# Domain
registry_domain: "dev-registry.okmetric.com"

# Listen addresses (localhost only, nginx terminates TLS)
registry_listen_addr: "127.0.0.1:5000"
docker_auth_listen_addr: "127.0.0.1:5001"

# Storage
registry_data_dir: "/var/lib/registry"

# Config directories
registry_config_dir: "/etc/docker-registry"
docker_auth_config_dir: "/etc/docker-auth"

# System users
registry_user: "registry"
docker_auth_user: "docker-auth"

# Registry users — override passwords via --extra-vars or ansible-vault
registry_users:
  admin:
    password: "changeme"
  rw:
    password: "changeme"
  ro:
    password: "changeme"
  cleanup:
    password: "changeme"

# ACL policy
registry_acl:
  - actions: ["*"]
    comment: "Superuser"
    match:
      account: admin
  - actions: ["pull", "push"]
    comment: "Read-write user can push images."
    match:
      account: rw
  - actions: ["pull"]
    comment: "Read-only user can pull images."
    match:
      account: ro
  - actions: ["pull", "push", "delete"]
    comment: "Cleanup user can delete images."
    match:
      account: cleanup

# Token settings
token_issuer: "Docker Registry Auth Service"
token_expiration: 900

# Certbot
certbot_email: "admin@okmetric.com"
certbot_webroot: "/var/www/certbot"

# Garbage collection — systemd timer OnCalendar value
gc_calendar: "*-*-* 03:00:00"
