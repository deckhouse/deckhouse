apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dvpinstanceclasses.deckhouse.io
  labels:
    heritage: deckhouse
    module: cloud-provider-dvp
spec:
  group: deckhouse.io
  preserveUnknownFields: false
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - cpu
                - memory
                - vmClassName
                - osImageRef
              properties:
                osImageRef:
                  type: object
                  required:
                    - kind
                    - name
                  description: Reference to the image of the operating system used to bootstrap VM's
                  properties:
                    kind:
                      type: string
                      enum:
                        - ClusterVirtualImage
                        - VirtualImage
                        - VirtualDisk
                      default: VirtualImage
                      x-doc-examples: [ VirtualImage, ClusterVirtualImage, VirtualDisk ]
                      x-doc-default: VirtualImage
                      description: Kind of resource describing the image
                    name:
                      type: string
                      description: Name of the resource describing the image
                vmClassName:
                  type: string
                  description: >
                    Name of the VirtualMachineClass resource describing the
                    requirements for a virtual CPU, memory, and the resource
                    allocation policy.
                cpu:
                  type: object
                  description: Section describing the CPU settings for a VM.
                  required:
                    - cores
                  properties:
                    cores:
                      format: int32
                      type: integer
                      minimum: 1
                      default: 4
                      x-doc-examples: [ 4 ]
                      x-doc-default: 4
                      description: Number of cores.
                    coreFraction:
                      type: string
                      default: 100%
                      x-doc-examples: [ 10%, 25%, 100% ]
                      x-doc-default: 100%
                      description: >
                        Guaranteed share of CPU time that will be allocated to
                        the VM. Specified as a percentage.
                memory:
                  type: integer
                  default: 8192
                  minimum: 8
                  x-doc-examples: [ 8192 ]
                  x-doc-default: 8192
                  description: RAM amount in megabytes.
                rootDiskSize:
                  description: |
                    Root disk size in GiB.

                    The disk will be automatically resized if its VirtualImage size differs from specified.
                  x-doc-examples: [ 50 ]
                  x-doc-default: 50
                  default: 50
                  type: integer
                bootloader:
                  type: string
                  enum:
                    - BIOS
                    - EFI
                    - EFIWithSecureBoot
                  default: EFI
                  x-doc-examples: [ EFI, BIOS ]
                  x-doc-default: EFI
                  description: >
                    Defines a bootloader for a VM.


                    * `BIOS`: Use BIOS.

                    * `EFI`: Use Unified Extensible Firmware (EFI/UEFI).

                    * `EFIWithSecureBoot`: Use UEFI/EFI with the Secure Boot
                    support.

  scope: Cluster
  names:
    plural: dvpinstanceclasses
    singular: dvpinstanceclass
    kind: DVPInstanceClass
    categories:
      - cloudinstanceclasses
