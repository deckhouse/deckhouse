{!{- $pullRequestContext := coll.Dict "pullRequestRefField" "needs.pull_request_info.outputs.ref" "withChangedImages" true -}!}
{!{- $ctx := coll.Merge $pullRequestContext . }!}

# on every push to dev branches
name: Build and test for dev branches
on:
  pull_request_target:
     types:
      - opened
      - synchronize
      - reopened
env:
{!{ tmpl.Exec "werf_envs" | strings.Indent 2 }!}

# Cancel in-progress jobs for the same PR (pull_request_target event) or for the same branch (push event).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: read

jobs:
{!{ tmpl.Exec "pull_request_info_job" $ctx | strings.Indent 2 }!}
{!{ tmpl.Exec "git_info_job" $ctx | strings.Indent 2 }!}

  build_fe:
    name: Build FE
    needs:
      - git_info
      - pull_request_info
    env:
      WERF_ENV: "FE"
      SVACE_ENABLED: ${{ contains(github.event.pull_request.labels.*.name, 'analyze/svace') && true || false }}
{!{ tmpl.Exec "build_template" (slice $ctx "dev" "FE") | strings.Indent 4 }!}

  build_tests:
    if: ${{ needs.pull_request_info.outputs.changes_not_markdown == 'true' }}
    name: Build tests image
    needs:
      - git_info
      - pull_request_info
{!{ tmpl.Exec "build_tests_template" (slice $ctx "dev") | strings.Indent 4 }!}

  go_generate:
    name: Go Generate
    needs:
      - git_info
      - pull_request_info
{!{ tmpl.Exec "go_generate_template" (slice $ctx) | strings.Indent 4 }!}

{!{ range $werfEnv := slice "CE" "EE" "BE" "SE" "SE-plus" "CSE" }!}
  build_{!{$werfEnv}!}:
    name: Build {!{$werfEnv}!}
    if: ${{ needs.pull_request_info.outputs.build_{!{$werfEnv}!} == 'true' }}
    needs:
      - git_info
      - pull_request_info
      - build_fe
    env:
      WERF_ENV: "{!{$werfEnv}!}"
{!{ tmpl.Exec "build_template" (slice $ctx "dev" $werfEnv) | strings.Indent 4 }!}
{!{ end }!}

  analyze_deckhouse:
    if: ${{ contains(github.event.pull_request.labels.*.name, 'analyze/svace') }}
    name: Deckhouse static analysis
    runs-on: [self-hosted, regular]
    needs:
      - build_fe
    steps:
{!{- $secrets := slice -}!}
{!{- $secrets = append ( slice "projects/data/24cb1d7c-717a-4f92-8547-26f632916a7a/Svace_CI" "SVACE_ANALYZE_HOST" "SVACE_ANALYZE_HOST" ) $secrets -}!}
{!{- $secrets = append ( slice "projects/data/24cb1d7c-717a-4f92-8547-26f632916a7a/Svace_CI" "SVACE_ANALYZE_SSH_USER" "SVACE_ANALYZE_SSH_USER" ) $secrets -}!}
{!{- $secrets = append ( slice "projects/data/24cb1d7c-717a-4f92-8547-26f632916a7a/Svace_CI" "SVACER_URL" "SVACER_URL" ) $secrets -}!}
{!{- $secrets = append ( slice "projects/data/24cb1d7c-717a-4f92-8547-26f632916a7a/Svace_CI" "SVACER_IMPORT_USER" "SVACER_IMPORT_USER" ) $secrets -}!}
{!{- $secrets = append ( slice "projects/data/24cb1d7c-717a-4f92-8547-26f632916a7a/Svace_CI" "SVACER_IMPORT_PASSWORD" "SVACER_IMPORT_PASSWORD" ) $secrets -}!}
{!{- $secrets = append ( slice "projects/data/24cb1d7c-717a-4f92-8547-26f632916a7a/Svace_CI" "SVACE_ANALYZE_SSH_PRIVATE_KEY" "SVACE_ANALYZE_SSH_PRIVATE_KEY" ) $secrets -}!}
{!{ tmpl.Exec "import_secrets" $secrets | strings.Indent 6 }!}
      - uses: deckhouse/modules-actions/svace_analyze@v4
        with:
          project_group: "DKP"
          ci_commit_ref_name: ${{ github.event.pull_request.head.ref }}
          ci_commit_hash: ${{ github.event.pull_request.head.sha }}
          svace_analyze_host: "${{ steps.secrets.outputs.SVACE_ANALYZE_HOST }}"
          svace_analyze_ssh_user: "${{ steps.secrets.outputs.SVACE_ANALYZE_SSH_USER }}"
          svacer_url: "${{ steps.secrets.outputs.SVACER_URL }}"
          svacer_import_user: "${{ steps.secrets.outputs.SVACER_IMPORT_USER }}"
          svacer_import_password: "${{ steps.secrets.outputs.SVACER_IMPORT_PASSWORD }}"
          svace_analyze_ssh_private_key: "${{ steps.secrets.outputs.SVACE_ANALYZE_SSH_PRIVATE_KEY }}"

  doc_web_build:
    name: Doc web build
    if: ${{ github.repository == 'deckhouse/deckhouse' }}
    # Wait for success build of modules.
    needs:
      - git_info
      - pull_request_info
{!{ tmpl.Exec "web_build_template" (slice $ctx "doc" "dev") | strings.Indent 4 }!}

  main_web_build:
    name: Main web build
    if: ${{ github.repository == 'deckhouse/deckhouse' }}
    # Wait for success build of modules.
    needs:
      - git_info
      - pull_request_info
{!{ tmpl.Exec "web_build_template" (slice $ctx "main" "dev") | strings.Indent 4 }!}

  tests:
    if: ${{ needs.pull_request_info.outputs.changes_not_markdown == 'true' }}
    name: Tests
    needs:
      - git_info
      - pull_request_info
{!{ tmpl.Exec "tests_before_build_template" (slice $ctx "unit") | strings.Indent 4 }!}

  tests_node_controller:
    if: ${{ needs.pull_request_info.outputs.changes_node_controller == 'true' }}
    name: Tests node-controller
    needs:
      - git_info
      - pull_request_info
{!{ tmpl.Exec "tests_node_controller_envtest_template" (slice $ctx) | strings.Indent 4 }!}

  tests_python_webhooks:
    if: ${{ needs.pull_request_info.outputs.changes_not_markdown == 'true' }}
    name: Tests python webhooks
    needs:
      - git_info
      - pull_request_info
{!{ tmpl.Exec "tests_webhooks_template" (slice $ctx) | strings.Indent 4 }!}

  tests_dmt_lint:
    name: Tests DMT lint
    needs:
    - git_info
    - pull_request_info
{!{ tmpl.Exec "tests_dmt_lint" (slice $ctx) | strings.Indent 4 }!}

  dhctl_tests:
    if: ${{ needs.pull_request_info.outputs.changes_not_markdown == 'true' }}
    name: Dhctl Tests
    needs:
      - git_info
      - pull_request_info
      - build_tests
{!{ tmpl.Exec "tests_template" (slice $ctx "dhctl" "build_tests") | strings.Indent 4 }!}

  golint:
    if: ${{ needs.pull_request_info.outputs.changes_not_markdown == 'true' }}
    name: Go Lint Warning
    needs:
      - git_info
      - pull_request_info
      - build_tests
    env:
      DIFF_BASE: ${{ github.event.pull_request.base.sha }}
{!{ tmpl.Exec "tests_template" (slice $ctx "golint_diff" "build_tests") | strings.Indent 4 }!}

  openapi_test_cases:
    if: ${{ needs.pull_request_info.outputs.changes_not_markdown == 'true' }}
    name: OpenAPI Test Cases
    needs:
      - git_info
      - pull_request_info
      - build_tests
{!{ tmpl.Exec "tests_template" (slice $ctx "openapi_test_cases" "build_tests") | strings.Indent 4 }!}

  validators:
    if: ${{ needs.pull_request_info.outputs.changes_not_markdown == 'true' }}
    name: Validators
    needs:
      - git_info
      - pull_request_info
      - build_tests
{!{ tmpl.Exec "tests_template" (slice $ctx "validators" "build_tests") | strings.Indent 4 }!}

  set_e2e_requirement_status:
    # if previous jobs were failed we do not need set status, because checks will be failed
    if: ${{ !failure() && needs.pull_request_info.outputs.changes_not_markdown == 'true' }}
    name: Set 'waiting for e2e' commit status
    needs:
      - git_info
      - pull_request_info
      - build_fe
{!{ range $werfEnv := slice "CE" "EE" "BE" "SE" "SE-plus" "CSE" }!}
      - build_{!{$werfEnv}!}{!{ end }!}
      - validators
      - openapi_test_cases
      - golint
      - go_generate
      - dhctl_tests
      - tests
    runs-on: "self-slim"
    steps:
{!{ tmpl.Exec "checkout_step" . | strings.Indent 6 }!}
      - name: Set commit status after e2e run
        id: set_e2e_requirement_status
        uses: {!{ index (ds "actions") "actions/github-script" }!}
        env:
          STATUS_TARGET_COMMIT: ${{needs.git_info.outputs.github_sha}}
          PR_LABELS: ${{ needs.pull_request_info.outputs.labels }}
        with:
          github-token: ${{secrets.BOATSWAIN_GITHUB_TOKEN}}
          script: |
            const e2eStatus = require('./.github/scripts/js/e2e-commit-status');

            await e2eStatus.setInitialStatus({github, context, core});

  # ============================================================================
  # CVE — Trivy scan on PR images.
  # TEMPORARILY DISABLED:
  # Re-enable by set the `if: ${{ needs.changed_images.outputs.changed_count != '0' }}`
  # guard once the underlying script is fixed. While disabled, the aggregator
  # below explicitly allows `cve: skipped`, so it does not block PR merges.
  # ============================================================================
  test_cve_report_main:
    name: Trivy scan dev images
    if: ${{ false }}
    # External/fork PRs gated by 'status/ok-to-test' via pull_request_info (setFailed → this job is skipped).
    needs:
      - pull_request_info
      - build_fe
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    runs-on: [self-hosted, large]
    env:
      WORKDIR: "cve-scan"
    steps:
      {!{ tmpl.Exec "checkout_full_step"           $ctx | strings.Indent 6 }!}
      {!{ tmpl.Exec "link_bin_step"                     | strings.Indent 6 }!}
      {!{ tmpl.Exec "cve_scan_type_pr"                  | strings.Indent 6 }!}
      {!{ tmpl.Exec "cve_scan_deckhouse_images"    $ctx | strings.Indent 6 }!}
      {!{ tmpl.Exec "cve_tests_upload_reports_artifacts"| strings.Indent 6 }!}
      {!{ tmpl.Exec "unlink_bin_step"                   | strings.Indent 6 }!}
      {!{ tmpl.Exec "cve_tests_set_pr_label"            | strings.Indent 6 }!}
  # ============================================================================
  # Rootless — default-user validation on PR images.
  # ============================================================================
  security_scan_images:
    name: Security scan images
    runs-on: [self-hosted, large]
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    needs:
      - pull_request_info
      - build_fe
    {!{ tmpl.Exec "security_scan_template" (slice $ctx "pr" "with_fail_report") | strings.Indent 4 }!}

  # ============================================================================
  # Antivirus — Dr.Web and Kaspersky scans on PR images.
  # ============================================================================
  {!{ tmpl.Exec "drweb_scan_job" "pr" | strings.Indent 2 }!}

  {!{ tmpl.Exec "kaspersky_scan_job" "pr" | strings.Indent 2 }!}

  {!{ tmpl.Exec "antivirus_notify_failure_job" . | strings.Indent 2 }!}

  # ============================================================================
  # Aggregator — single required check for branch protection.
  # Fails if any image scan did not finish with success
  # (covers blocker failure, scan failure, and skipped due to upstream issues).
  # Because this workflow is invoked via `uses:` from the build workflow, this
  # job appears on the PR's Checks tab natively — no extra commit-status
  # plumbing is required for it to be require-able by branch protection.
  # ============================================================================
  security_scan_images_required:
    name: Security scan images required
    runs-on: self-slim
    if: ${{ always() && needs.pull_request_info.result == 'success' }}
    needs:
      - pull_request_info
      - test_cve_report_main
      - security_scan_images
      - drweb-scan
      - kaspersky-scan
    steps:
      - name: Aggregate scan results
        run: |
          declare -A results=(
            [cve]="${{ needs.test_cve_report_main.result }}"
            [rootless]="${{ needs.security_scan_images.result }}"
            [drweb]="${{ needs.drweb-scan.result }}"
            [kaspersky]="${{ needs.kaspersky-scan.result }}"
          )
          # Antivirus jobs intentionally skip in test repositories
          # (self-hosted antivirus runners are only in the main repo). All
          # other image scans (changed_images, rootless) are expected to run
          # in both main and test repos.
          IS_MAIN_REPO=false
          if [[ "${{ github.repository }}" == "deckhouse/deckhouse" ]]; then
            IS_MAIN_REPO=true
          fi

          failed=0
          for name in "${!results[@]}"; do
            r="${results[$name]}"
            if [[ "$r" == "success" ]]; then
              echo "✅ $name: $r"
              continue
            fi
            # CVE SCAN is intentionally DISABLED for PR mode.
            if [[ "$name" == "cve" && "$r" == "skipped" ]]; then
              echo "ℹ️  $name: $r (temporarily disabled)"
              continue
            fi
            if [[ "$IS_MAIN_REPO" == "false" && ( "$name" == "drweb" || "$name" == "kaspersky" ) && "$r" == "skipped" ]]; then
              echo "ℹ️  $name: $r (allowed in test repository)"
              continue
            fi
            echo "::error::Scan '$name' result: $r"
            failed=1
          done
          exit $failed
