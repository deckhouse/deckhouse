{!{- $ctx := dict -}!}
{!{- $ctx = coll.Merge $ctx . }!}

name: Promote image to prod

on:
  workflow_dispatch:
    inputs:
      issue_id:
        description: 'Id of issue where label was set'
        required: false
      issue_number:
        description: 'Number of issue where label was set'
        required: false
      comment_id:
        description: 'Id of comment in issue where to put workflow run status'
        required: false
      editions:
        description: 'Comma separated editions to promote. Example: ee,fe,ce,be,se,se-plus'
        required: false

env:
{!{ tmpl.Exec "werf_envs" | strings.Indent 2 }!}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  pull-requests: read

jobs:
{!{ tmpl.Exec "promote_image" $ctx | strings.Indent 2 }!}
