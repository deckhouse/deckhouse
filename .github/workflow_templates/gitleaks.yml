name: Secret Scan

on:
  schedule:
    - cron: '0 0 * * *'
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

# Cancel in-progress jobs for the same PR (pull_request_target event) or for the same branch (schedule event).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
{!{- $secrets := slice -}!}
{!{- $secrets = append ( slice "projects/data/6db2f1ee-9b6f-4f4f-8381-2fb43060478a/team-ssdlc/loop" "webhook_url" "LOOP_SERVICE_NOTIFICATIONS" ) $secrets -}!}
{!{ tmpl.Exec "import_secrets" $secrets | strings.Indent 6 }!}
      # Full history scan on schedule.
      - name: Run Gitleaks full scan
        if: github.event_name == 'schedule'
        uses: deckhouse/modules-actions/gitleaks@main
        with:
          scan_mode: full
          gitleaks_version: v8.28.0

      # Diff scan on PR. The action checks out refs/pull/<num>/merge itself,
      # so the PR branch is scanned (not the base branch).
      - name: Run Gitleaks diff scan
        if: github.event_name == 'pull_request_target'
        uses: deckhouse/modules-actions/gitleaks@main
        with:
          scan_mode: diff
          gitleaks_version: v8.28.0
{!{ tmpl.Exec "send_fail_report" . | strings.Indent 6 }!}
