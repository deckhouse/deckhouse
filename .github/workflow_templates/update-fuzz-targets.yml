name: Update fuzzing targets

# Called from Build and test for dev branches after Build FE has produced
# build_report_FE. This workflow does not build images. It only reads the
# existing werf build report and extracts fuzz images.
on:
  workflow_call:

permissions:
  contents: read
  actions: read

jobs:
  update_fuzzing_targets:
    name: Update fuzzing targets
    runs-on: [self-hosted, regular]
    steps:
      - name: Download FE build report
        uses: {!{ index (ds "actions") "actions/download-artifact" }!}
        with:
          name: build_report_FE
          path: .

      - name: Extract fuzzing images
        run: |
          jq -r '
            .Images
            | to_entries[]
            | select(.key | endswith("-fuzz"))
            | .key + " " + .value.DockerTag
          ' images_tags_werf.json > fuzz-images.txt

          echo "Discovered fuzz images:"
          cat fuzz-images.txt

      - name: Upload fuzzing images list
        uses: {!{ index (ds "actions") "actions/upload-artifact" }!}
        with:
          name: fuzz-images
          path: fuzz-images.txt
          retention-days: 14
