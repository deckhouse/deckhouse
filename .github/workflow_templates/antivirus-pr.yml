name: Antivirus Scan on PR

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

env:
  SCAN_RESULTS_DIR: 'scans'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: true

jobs:
{!{ tmpl.Exec "pull_request_info_job" . | strings.Indent 2 }!}

{!{ tmpl.Exec "block-until-image-is-not-ready" . | strings.Indent 2 }!}

  get-tags:
    name: Get PR tag for scanning
    runs-on: [self-hosted, regular]
    # External/fork PRs gated by 'status/ok-to-test' via pull_request_info (setFailed → this job is skipped).
    needs:
      - pull_request_info
      - block-until-image-is-not-ready
    if: github.repository == 'deckhouse/deckhouse'
    outputs:
      tags: ${{ steps.set-pr-tag.outputs.tags }}
    steps:
      - name: Set PR tag
        id: set-pr-tag
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO_SUFFIX=${GITHUB_REPOSITORY#deckhouse/deckhouse-}
          if [[ ${REPO_SUFFIX} == ${GITHUB_REPOSITORY} ]] ; then
            TAG="pr${PR_NUMBER}"
          else
            TAG="pr${PR_NUMBER}-${REPO_SUFFIX}"
          fi
          echo "PR tag to scan: $TAG"
          echo "tags=$(printf '%s' "$TAG" | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> $GITHUB_OUTPUT

{!{ tmpl.Exec "drweb_scan_job" . | strings.Indent 2 }!}

{!{ tmpl.Exec "kaspersky_scan_job" . | strings.Indent 2 }!}

  set_security_antivirus_requirement_status:
    name: Set commit status after antivirus scan run
    runs-on: "ubuntu-latest"
    needs: [drweb-scan, kaspersky-scan]
    if: ${{ always() && needs.drweb-scan.result != 'skipped' && needs.kaspersky-scan.result != 'skipped' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
{!{ tmpl.Exec "checkout_step" . | strings.Indent 6 }!}
      - name: Install GitHub CLI
        run: sudo apt-get install gh -y
      - name: Auth with GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
      - name: Set PR Label
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "PR Number: $PR_NUMBER"
          if [ "${{ needs.drweb-scan.result }}" == "success" ] && [ "${{ needs.kaspersky-scan.result }}" == "success" ]; then
            gh pr edit "$PR_NUMBER" --add-label "security/antivirus/success"
          else
            gh pr edit "$PR_NUMBER" --add-label "security/antivirus/failed"
          fi

{!{ tmpl.Exec "antivirus_notify_failure_job" . | strings.Indent 2 }!}
