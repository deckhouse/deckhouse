{!{ define "security_scan_template" }!}
{!{- $ctx := index . 0 -}!}
{!{- $scanType := index . 1 -}!}
# <template: security_scan_template>
steps:
  {!{ tmpl.Exec "checkout_full_step" $ctx | strings.Indent 2 }!}
  {!{- $secrets := slice -}!}
  {!{- $secrets = append ( slice "projects/data/6db2f1ee-9b6f-4f4f-8381-2fb43060478a/github/registry_host" "DECKHOUSE_DEV_REGISTRY_HOST" "DECKHOUSE_DEV_REGISTRY_HOST" ) $secrets -}!}
  {!{- $secrets = append ( slice "projects/data/101ceaca-97cd-462f-aed5-070d9b9de175/dev-registry/writetoken" "login" "DECKHOUSE_DEV_REGISTRY_USER" ) $secrets -}!}
  {!{- $secrets = append ( slice "projects/data/101ceaca-97cd-462f-aed5-070d9b9de175/dev-registry/writetoken" "password" "DECKHOUSE_DEV_REGISTRY_PASSWORD" ) $secrets -}!}
  {!{- $secrets = append ( slice "projects/data/6db2f1ee-9b6f-4f4f-8381-2fb43060478a/github/fox_pull_secret" "DECKHOUSE_PRIVATE_REPO" "DECKHOUSE_PRIVATE_REPO" ) $secrets -}!}
  {!{ tmpl.Exec "import_secrets" $secrets | strings.Indent 2 }!}
  {!{ tmpl.Exec "login_dev_registry_step" $ctx | strings.Indent 2 }!}
  {!{ tmpl.Exec "link_bin_step"                     | strings.Indent 2 }!}
  - name: Running default user validation on ${{env.TAG}}
    env:
{!{- if (eq $scanType "pr") }!}
      TAG: ${{needs.pull_request_info.outputs.ref_slug}}
{!{- else }!}
      TAG: ${{needs.git_info.outputs.ci_commit_ref_slug}}
{!{- end }!}
      IMAGE: "${{ steps.secrets.outputs.DECKHOUSE_DEV_REGISTRY_HOST }}/sys/deckhouse-oss"
      DECKHOUSE_PRIVATE_REPO: ${{ steps.secrets.outputs.DECKHOUSE_PRIVATE_REPO }}
    run: |
      echo "⚓️ 🏎 Running default user validation on ${TAG}..."
      make cve-base-images-check-default-user
  {!{ tmpl.Exec "unlink_bin_step"                   | strings.Indent 2 }!}
# </template: security_scan_template>
{!{ end }!}

{!{ define "set_security_rootless_requirement_status" }!}
# <template: set_security_rootless_requirement_status>
set_security_rootless_requirement_status:
  name: Set commit status after security rootless scan run
  runs-on: "ubuntu-latest"
  needs:
    - pull_request_info
    - security_scan_images
  if: ${{ always() && needs.security_scan_images.result != 'skipped' }}
  permissions:
    contents: read
    pull-requests: write
  steps:
{!{ tmpl.Exec "checkout_step" . | strings.Indent 4 }!}
    - name: Install GitHub CLI
      run: sudo apt-get install gh -y
    - name: Auth with GitHub CLI
      run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
    - name: Set PR Label
      env:
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        echo "PR Number: $PR_NUMBER"
        if [ "${{ needs.security_scan_images.result }}" == "success" ]; then
          gh pr edit "$PR_NUMBER" --add-label "security/rootless/success"
        else
          gh pr edit "$PR_NUMBER" --add-label "security/rootless/failed"
        fi
# </template: set_security_rootless_requirement_status>
{!{- end -}!}
