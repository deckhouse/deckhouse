name: Milestone Changelog
description: Re-generates changelog for given milestone
inputs:
  milestone:
    description: Milestone object containing number and title
    required: true
  changelog-access-token:
    description: Github token
    required: true
  ssdlc-tools-pull-token:
    description: Changelog generator pull token
    required: true
runs:
  using: "composite"
  steps:
    - name: Parse input
      id: args
      shell: bash
      run: |
        echo "milestone_title=${{ fromJSON(inputs.milestone).title }}" >> $GITHUB_OUTPUT
        echo "milestone_number=${{ fromJSON(inputs.milestone).number }}" >> $GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install changelog generator
      shell: bash
      env:
        CHANGELOG_GENERATOR_VERSION: "v0.0.0+6f768ad3"
      run: |
        pip install --upgrade pip
        pip install "deckhouse-changelog-generator==${CHANGELOG_GENERATOR_VERSION}" \
          --index-url "https://token:${SSDLC_TOOLS_PULL_TOKEN}@fox.flant.com/api/v4/projects/5387/packages/pypi/simple"

    - name: Collect Changelog
      id: changelog
      shell: bash
      run: |
        SECTIONS_FILE="${RUNNER_TEMP}/allowed-sections.txt"
        deckhouse-write-changelog-sections \
          --repo-root "${GITHUB_WORKSPACE}" \
          --output "${SECTIONS_FILE}"

        deckhouse-collect-changelog \
          --repo-path "${GITHUB_WORKSPACE}" \
          --milestone "${{ steps.args.outputs.milestone_title }}" \
          --github-repo "${{ github.repository }}" \
          --github-token "${{ inputs.changelog-access-token }}" \
          --allowed-sections-file "${SECTIONS_FILE}"

    # Patch-version YAML changelog
    - name: Write Changelog YAML
      id: yaml_file
      shell: bash
      run: |
        mkdir -p ./CHANGELOG
        filename='./CHANGELOG/CHANGELOG-${{ steps.args.outputs.milestone_title }}.yml'
        cat > "$filename" <<"EOF"
        ${{ steps.changelog.outputs.release_yaml }}
        EOF

    # Cumulative markdown changelog
    - name: Write Changelog Markdown
      id: md_file
      shell: bash
      run: |
        filename='./CHANGELOG/CHANGELOG-${{ steps.changelog.outputs.minor_version }}.md'
        cat > "$filename" <<"EOF"
        ${{ steps.changelog.outputs.branch_markdown }}
        EOF

    - name: Check if changelog files differ from repository
      id: changelog_diff
      shell: bash
      run: |
        git add -A CHANGELOG/
        if git diff --cached --quiet HEAD; then
          git reset HEAD CHANGELOG/ 2>/dev/null || true
          echo "skip_pr=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Skipping create pull request: generated files under CHANGELOG/ are identical to the current branch (no changes to publish)."
          {
            echo "## Changelog pull request skipped"
            echo "Generated \`CHANGELOG/\` content matches the repository — **create pull request** was not run."
          } >> "$GITHUB_STEP_SUMMARY"
        else
          git reset HEAD CHANGELOG/ 2>/dev/null || true
          echo "skip_pr=false" >> "$GITHUB_OUTPUT"
        fi

    # Patch-version markdown changelog + malformed and impact digest
    - name: Create Pull Request
      if: steps.changelog_diff.outputs.skip_pr != 'true'
      uses: peter-evans/create-pull-request@v3.10.1
      with:
        commit-message: |
          Re-generate changelog ${{ steps.args.outputs.milestone_title }}

          Signed-off-by: deckhouse-BOaTswain <89150800+deckhouse-boatswain@users.noreply.github.com>
        base: main
        branch: changelog/${{ steps.args.outputs.milestone_title }}
        milestone: ${{ steps.args.outputs.milestone_number }}
        title: Changelog ${{ steps.args.outputs.milestone_title }}
        body: |
          ${{ steps.changelog.outputs.release_markdown }}

          For more information, see the [changelog](https://github.com/deckhouse/deckhouse/blob/main/CHANGELOG/CHANGELOG-${{ steps.changelog.outputs.minor_version }}.md) and minor version [release changes](https://github.com/deckhouse/deckhouse/releases/tag/${{ steps.changelog.outputs.minor_version }}.0).
        labels: changelog, auto, status/backport
        token: ${{ inputs.changelog-access-token }}
        delete-branch: true
