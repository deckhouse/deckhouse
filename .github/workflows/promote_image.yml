      - name: Copy attestations (SE)
        env:
          WERF_ENV: SE
          STAGE_REGISTRY_HOST: ${{ steps.secrets.outputs.DECKHOUSE_REGISTRY_STAGE_HOST }}
          DECKHOUSE_REGISTRY_HOST: ${{ secrets.DECKHOUSE_REGISTRY_HOST }}
        run: |
          set -euo pipefail

          REGISTRY_SUFFIX=$(echo "${WERF_ENV}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG=$(d8-build dk slugify --format docker-tag "${CI_COMMIT_TAG}")
          STAGE_PATH="${STAGE_REGISTRY_HOST}/deckhouse/${REGISTRY_SUFFIX}"
          PROD_PATH="${DECKHOUSE_REGISTRY_HOST}/deckhouse/${REGISTRY_SUFFIX}"

          DIGESTS_JSON="images_digests-att.json"

          if ! regctl image get-file "${STAGE_PATH}/install:${IMAGE_TAG}" /deckhouse/candi/images_digests.json > "${DIGESTS_JSON}" 2>/dev/null; then
            echo "⚠️ [$(date -u)] Could not read /deckhouse/candi/images_digests.json from '${STAGE_PATH}/install:${IMAGE_TAG}', skipping digest attestations copy"
            exit 1
          fi

          STAGE_OSS="${STAGE_REGISTRY_HOST}/sys/deckhouse-oss"
          while IFS= read -r IMG_DIGEST; do
            [[ -z "${IMG_DIGEST}" ]] && continue
            D_HEX="${IMG_DIGEST#sha256:}"
            SRC_ATT="${STAGE_OSS}:sha256-${D_HEX}.att"
            DST_ATT="${PROD_PATH}:sha256-${D_HEX}.att"
            if regctl image manifest "${SRC_ATT}" >/dev/null 2>&1; then
              echo "⚓️ 💫 [$(date -u)] Copying attestation '${SRC_ATT}' -> '${DST_ATT}'"
              regctl image copy "${SRC_ATT}" "${DST_ATT}"
            fi
          done < <(jq -r '[.. | strings | select(test("^sha256:[a-f0-9]{64}$"))] | unique | .[]' "${DIGESTS_JSON}")

          rm -rf ${DIGESTS_JSON}

      - name: Promote images from stage to prod (SE)
        env:
          WERF_ENV: SE
          STAGE_REGISTRY_HOST: ${{ steps.secrets.outputs.DECKHOUSE_REGISTRY_STAGE_HOST }}
          DECKHOUSE_REGISTRY_HOST: ${{ secrets.DECKHOUSE_REGISTRY_HOST }}
        run: |
          set -euo pipefail

          # CE/EE/FE -> ce/ee/fe
          REGISTRY_SUFFIX=$(echo "${WERF_ENV}" | tr '[:upper:]' '[:lower:]')

          IMAGE_TAG=$(d8-build dk slugify --format docker-tag "${CI_COMMIT_TAG}")

          STAGE_PATH="${STAGE_REGISTRY_HOST}/deckhouse/${REGISTRY_SUFFIX}"
          PROD_PATH="${DECKHOUSE_REGISTRY_HOST}/deckhouse/${REGISTRY_SUFFIX}"

          promote_with_att() {
            local SUBPATH="$1"
            local REPO_SRC REPO_DST SRC DST
            if [[ -z "${SUBPATH}" ]]; then
              REPO_SRC="${STAGE_PATH}"
              REPO_DST="${PROD_PATH}"
            else
              REPO_SRC="${STAGE_PATH}/${SUBPATH}"
              REPO_DST="${PROD_PATH}/${SUBPATH}"
            fi
            SRC="${REPO_SRC}:${IMAGE_TAG}"
            DST="${REPO_DST}:${IMAGE_TAG}"
            echo "⚓️ 💫 [$(date -u)] Promoting '${SRC}' => '${DST}'"
            regctl image copy "${SRC}" "${DST}"
            local DIGEST
            DIGEST=$(regctl image digest "${SRC}" | sed 's/^sha256://')
            if regctl image manifest "${REPO_SRC}:sha256-${DIGEST}.att" >/dev/null 2>&1; then
              echo "⚓️ 💫 [$(date -u)] Copying attestation for '${REPO_SRC}'"
              regctl image copy "${REPO_SRC}:sha256-${DIGEST}.att" "${REPO_DST}:sha256-${DIGEST}.att"
            else
              echo "⚓️ 💫 [$(date -u)] Attestation for '${REPO_SRC}' not found, skipping..."
            fi
          }

          promote_with_att ""
          promote_with_att "install"
          promote_with_att "install-standalone"
          promote_with_att "release-channel"

          DIGESTS_JSON="images_digests-promote.json"

          # Promote from images_digests.json
          if regctl image get-file "${STAGE_PATH}/install:${IMAGE_TAG}" /deckhouse/candi/images_digests.json > "${DIGESTS_JSON}" 2>/dev/null; then
            echo "⚓️ 💫 [$(date -u)] Promoting component images from images_digests.json (by digest)"
            STAGE_PATH="${STAGE_REGISTRY_HOST}/sys/deckhouse-oss"
            while IFS= read -r IMG_DIGEST; do
              [[ -z "${IMG_DIGEST}" ]] && continue
              SRC_REF="${STAGE_PATH}@${IMG_DIGEST}"
              DST_REF="${PROD_PATH}@${IMG_DIGEST}"
              echo "⚓️ 💫 [$(date -u)] Promoting '${SRC_REF}' -> '${DST_REF}'"
              regctl image copy "${SRC_REF}" "${DST_REF}"
            done < <(jq -r '[.. | strings | select(test("^sha256:[a-f0-9]{64}$"))] | unique | .[]' "${DIGESTS_JSON}")
            rm -rf ${DIGESTS_JSON}
          else
            echo "⚠️ [$(date -u)] Could not read /deckhouse/candi/images_digests.json from '${STAGE_PATH}/install:${IMAGE_TAG}'"
            exit 1
          fi

      - name: Check DKP images manifests in public registry (SE)
        env:
          WERF_ENV: SE
          DECKHOUSE_REGISTRY_READ_HOST: ${{secrets.DECKHOUSE_REGISTRY_READ_HOST}}
        run: |
          EDITION=$(echo ${WERF_ENV} | tr '[:upper:]' '[:lower:]')

          ./tools/check-release-images.sh --tag "${CI_COMMIT_TAG}" --edition "${EDITION}" --images-path "${DECKHOUSE_REGISTRY_READ_HOST}/deckhouse/"


