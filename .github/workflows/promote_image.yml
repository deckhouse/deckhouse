name: Promote image to prod

on:
  workflow_dispatch:
    inputs:
      issue_id:
        description: 'Id of issue where label was set'
        required: false
      issue_number:
        description: 'Number of issue where label was set'
        required: false
      comment_id:
        description: 'Id of comment in issue where to put workflow run status'
        required: false
      editions:
        description: 'Comma separated editions to promote. Example: ee,fe,ce,be,se,se-plus'
        required: false

env:

  # <template: werf_envs>
  DECKHOUSE_CLI_BUILD_VERSION: "v0.29.20"
  WERF_VERSION: "v2.63.1"
  WERF_ENV: "FE"
  WERF_TELEMETRY: "1"
  WERF_TELEMETRY_EXTRA_ATTRIBUTE_TEAM: "flantTeam=deckhouse/deckhouse"
  TEST_TIMEOUT: "15m"
  # Use fixed string 'sys/deckhouse-oss' for repo name. ${CI_PROJECT_PATH} is not available here in GitHub.
  REGISTRY_PATH: "sys/deckhouse-oss"
  # Registry for additional repositories used for testing Github Actions workflows.
  GHA_TEST_REGISTRY_PATH: "ghcr.io/${{ github.repository }}"
  # Need for ssh: default.
  DOCKER_BUILDKIT: "1"
  WERF_FINAL_IMAGES_ONLY: true
  WERF_LOG_TERMINAL_WIDTH: "200"
  WERF_LOG_TIME: true
  WERF_GIT_WORK_TREE_POOL_LIMIT: "10"
  GOPROXY: "${{vars.GOPROXY}}"
  # </template: werf_envs>

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  pull-requests: read

jobs:
  # <template: promote_image>
  detect_editions:
    name: Detect editions
    runs-on: "regular"
    outputs:
      PROMOTE_CE: ${{ steps.detect_editions.outputs.promote_ce }}
      PROMOTE_EE: ${{ steps.detect_editions.outputs.promote_ee }}
      PROMOTE_FE: ${{ steps.detect_editions.outputs.promote_fe }}
      PROMOTE_BE: ${{ steps.detect_editions.outputs.promote_be }}
      PROMOTE_SE: ${{ steps.detect_editions.outputs.promote_se }}
      PROMOTE_SE-plus: ${{ steps.detect_editions.outputs['promote_se-plus'] }}
    steps:
      - name: Detect editions
        id: detect_editions
        env:
          EDITIONS: ${{ github.event.inputs.editions || '' }}
        run: |
          echo "Promote editions filter: '${EDITIONS}' (empty => all)"
          RESTRICTED=no
          for edition in CE EE FE BE SE SE-plus ; do
            if grep -i ",${edition}," <<<",${EDITIONS}," 2>/dev/null 1>&2 ; then
              echo "  - enable promote of ${edition} edition."
              echo "PROMOTE_${edition}=true" >> $GITHUB_OUTPUT
              RESTRICTED=yes
            fi
          done
          if [[ $RESTRICTED == "no" ]] ; then
            echo "No restrictions. Enable promote for all editions."
            for edition in CE EE FE BE SE SE-plus ; do
              echo "PROMOTE_${edition}=true" >> $GITHUB_OUTPUT
            done
          fi

  promote_CE:
    name: Promote images (CE)
    needs:
      - detect_editions
    if: ${{ needs.detect_editions.outputs['promote_ce'] == 'true' && github.repository == 'deckhouse/deckhouse' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: [self-hosted, stage]
    env:
      CI_COMMIT_TAG: ${{ github.ref_name }}
    steps:
    # <template: promote_image_setup_steps>

      # </template: docker-config-isolation>
      - name: Isolate docker config
        id: docker-config-isolation
        run: |
          mkdir -p $RUNNER_TEMP/.docker
          echo "DOCKER_CONFIG=$RUNNER_TEMP/.docker" >> $GITHUB_ENV

      # </template: docker_config_isolation>
      # <template: import_secrets>
      - name: Split repository name
        id: split
        env:
          REPO: ${{ github.repository }}
        run: |
          if [ $REPO == "deckhouse/deckhouse" ]; then
            echo "name=deckhouse" >> $GITHUB_OUTPUT
          else
            echo "name=deckhouse-test" >> $GITHUB_OUTPUT
          fi
      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@v2
        with:
          url: https://seguro.flant.com
          path: github
          role: "${{ steps.split.outputs.name }}"
          method: jwt
          jwtGithubAudience: github-access-aud
          secrets: |
            projects/data/6db2f1ee-9b6f-4f4f-8381-2fb43060478a/github/registry_host DECKHOUSE_REGISTRY_STAGE_HOST | DECKHOUSE_REGISTRY_STAGE_HOST ;
            projects/data/101ceaca-97cd-462f-aed5-070d9b9de175/stage-registry/writetoken login | DECKHOUSE_REGISTRY_STAGE_USER ;
            projects/data/101ceaca-97cd-462f-aed5-070d9b9de175/stage-registry/writetoken password | DECKHOUSE_REGISTRY_STAGE_PASSWORD ;

      # </template: import_secrets>

      # <template: d8cli_install_step>
      - name: Install d8 CLI
        run: |
          mkdir -p bin
          INSTALL_DIR="$(pwd)/bin" VERSION=${DECKHOUSE_CLI_BUILD_VERSION} FORCE=yes bash -c "$(curl -fsSL https://raw.githubusercontent.com/deckhouse/deckhouse-cli/main/tools/install.sh)"
          mv "$(pwd)/bin/d8" "$(pwd)/bin/d8-build"
          echo "$(pwd)/bin" >> "$GITHUB_PATH"
      # </template: d8cli_install_step>

      # <template: login_stage_registry_step>
      - name: Check stage registry credentials
        id: check_stage_registry
        env:
          HOST: ${{ steps.secrets.outputs.DECKHOUSE_REGISTRY_STAGE_HOST }}
        run: |
          if [[ -n $HOST ]]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
            echo "web_registry_path=${{secrets.DECKHOUSE_REGISTRY_STAGE_HOST }}/deckhouse/site" >> $GITHUB_OUTPUT
          fi
      - name: Login to stage registry
        uses: docker/login-action@v2.1.0
        if: ${{ steps.check_stage_registry.outputs.has_credentials == 'true' }}
        with:
          registry: ${{ steps.secrets.outputs.DECKHOUSE_REGISTRY_STAGE_HOST }}
          username: ${{ steps.secrets.outputs.DECKHOUSE_REGISTRY_STAGE_USER }}
          password: ${{ steps.secrets.outputs.DECKHOUSE_REGISTRY_STAGE_PASSWORD }}
          logout: false
      # </template: login_stage_registry_step>

      # <template: login_readonly_registry_step>
      - name: Check readonly registry credentials
        id: check_readonly_registry
        env:
          HOST: ${{secrets.DECKHOUSE_REGISTRY_READ_HOST}}
        run: |
          if [[ -n $HOST ]]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
            echo "web_registry_path=${{secrets.DECKHOUSE_REGISTRY_READ_HOST }}/deckhouse/site" >> $GITHUB_OUTPUT
          fi
      - name: Login to readonly registry
        uses: docker/login-action@v2.1.0
        if: ${{ steps.check_readonly_registry.outputs.has_credentials == 'true' }}
        with:
          registry: ${{ secrets.DECKHOUSE_REGISTRY_READ_HOST }}
          username: ${{ secrets.DECKHOUSE_REGISTRY_READ_USER }}
          password: ${{ secrets.DECKHOUSE_REGISTRY_READ_PASSWORD }}
          logout: false
      # </template: login_readonly_registry_step>

      # <template: login_rw_registry_step>
      - name: Check rw registry credentials
        id: check_rw_registry
        env:
          HOST: ${{secrets.DECKHOUSE_REGISTRY_HOST}}
        run: |
          if [[ -n $HOST ]]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
            echo "web_registry_path=${{secrets.DECKHOUSE_REGISTRY_HOST }}/deckhouse/site" >> $GITHUB_OUTPUT
          fi
      - name: Login to rw registry
        uses: docker/login-action@v2.1.0
        if: ${{ steps.check_rw_registry.outputs.has_credentials == 'true' }}
        with:
          registry: ${{ secrets.DECKHOUSE_REGISTRY_HOST }}
          username: ${{ secrets.DECKHOUSE_REGISTRY_USER }}
          password: ${{ secrets.DECKHOUSE_REGISTRY_PASSWORD }}
          logout: false
      - name: Login to Github Container Registry
        uses: docker/login-action@v2.1.0
        if: ${{ steps.check_rw_registry.outputs.has_credentials != 'true' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false
      # </template: login_rw_registry_step>
    # </template: promote_image_setup_steps>

      - name: Copy attestations (CE)
        env:
          WERF_ENV: CE
          STAGE_REGISTRY_HOST: ${{ steps.secrets.outputs.DECKHOUSE_REGISTRY_STAGE_HOST }}
          DECKHOUSE_REGISTRY_HOST: ${{ secrets.DECKHOUSE_REGISTRY_HOST }}
        run: |
          set -euo pipefail

          REGISTRY_SUFFIX=$(echo "${WERF_ENV}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG=$(d8-build dk slugify --format docker-tag "${CI_COMMIT_TAG}")
          STAGE_PATH="${STAGE_REGISTRY_HOST}/deckhouse/${REGISTRY_SUFFIX}"
          PROD_PATH="${DECKHOUSE_REGISTRY_HOST}/deckhouse/${REGISTRY_SUFFIX}"

          DIGESTS_JSON="images_digests-att.json"

          if ! regctl image get-file "${STAGE_PATH}/install:${IMAGE_TAG}" /deckhouse/candi/images_digests.json > "${DIGESTS_JSON}" 2>/dev/null; then
            echo "⚠️ [$(date -u)] Could not read /deckhouse/candi/images_digests.json from '${STAGE_PATH}/install:${IMAGE_TAG}', skipping digest attestations copy"
            exit 1
          fi

          STAGE_OSS="${STAGE_REGISTRY_HOST}/sys/deckhouse-oss"
          while IFS= read -r IMG_DIGEST; do
            [[ -z "${IMG_DIGEST}" ]] && continue
            D_HEX="${IMG_DIGEST#sha256:}"
            SRC_ATT="${STAGE_OSS}:sha256-${D_HEX}.att"
            DST_ATT="${PROD_PATH}:sha256-${D_HEX}.att"
            if regctl image manifest "${SRC_ATT}" >/dev/null 2>&1; then
              echo "⚓️ 💫 [$(date -u)] Copying attestation '${SRC_ATT}' -> '${DST_ATT}'"
              regctl image copy "${SRC_ATT}" "${DST_ATT}"
            fi
          done < <(jq -r '[.. | strings | select(test("^sha256:[a-f0-9]{64}$"))] | unique | .[]' "${DIGESTS_JSON}")

          rm -rf ${DIGESTS_JSON}

      - name: Promote images from stage to prod (CE)
        env:
          WERF_ENV: CE
          STAGE_REGISTRY_HOST: ${{ steps.secrets.outputs.DECKHOUSE_REGISTRY_STAGE_HOST }}
          DECKHOUSE_REGISTRY_HOST: ${{ secrets.DECKHOUSE_REGISTRY_HOST }}
        run: |
          set -euo pipefail

          # CE/EE/FE -> ce/ee/fe
          REGISTRY_SUFFIX=$(echo "${WERF_ENV}" | tr '[:upper:]' '[:lower:]')

          IMAGE_TAG=$(d8-build dk slugify --format docker-tag "${CI_COMMIT_TAG}")

          STAGE_PATH="${STAGE_REGISTRY_HOST}/deckhouse/${REGISTRY_SUFFIX}"
          PROD_PATH="${DECKHOUSE_REGISTRY_HOST}/deckhouse/${REGISTRY_SUFFIX}"

          promote_with_att() {
            local SUBPATH="$1"
            local REPO_SRC REPO_DST SRC DST
            if [[ -z "${SUBPATH}" ]]; then
              REPO_SRC="${STAGE_PATH}"
              REPO_DST="${PROD_PATH}"
            else
              REPO_SRC="${STAGE_PATH}/${SUBPATH}"
              REPO_DST="${PROD_PATH}/${SUBPATH}"
            fi
            SRC="${REPO_SRC}:${IMAGE_TAG}"
            DST="${REPO_DST}:${IMAGE_TAG}"
            echo "⚓️ 💫 [$(date -u)] Promoting '${SRC}' => '${DST}'"
            regctl image copy "${SRC}" "${DST}"
            local DIGEST
            DIGEST=$(regctl image digest "${SRC}" | sed 's/^sha256://')
            if regctl image manifest "${REPO_SRC}:sha256-${DIGEST}.att" >/dev/null 2>&1; then
              echo "⚓️ 💫 [$(date -u)] Copying attestation for '${REPO_SRC}'"
              regctl image copy "${REPO_SRC}:sha256-${DIGEST}.att" "${REPO_DST}:sha256-${DIGEST}.att"
            else
              echo "⚓️ 💫 [$(date -u)] Attestation for '${REPO_SRC}' not found, skipping..."
            fi
          }

          promote_with_att ""
          promote_with_att "install"
          promote_with_att "install-standalone"
          promote_with_att "release-channel"

          DIGESTS_JSON="images_digests-promote.json"

          # Promote from images_digests.json
          if regctl image get-file "${STAGE_PATH}/install:${IMAGE_TAG}" /deckhouse/candi/images_digests.json > "${DIGESTS_JSON}" 2>/dev/null; then
            echo "⚓️ 💫 [$(date -u)] Promoting component images from images_digests.json (by digest)"
            STAGE_PATH="${STAGE_REGISTRY_HOST}/sys/deckhouse-oss"
            while IFS= read -r IMG_DIGEST; do
