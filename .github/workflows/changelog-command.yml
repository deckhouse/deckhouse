name: Changelog Command
on:
  repository_dispatch:
    types: [changelog-command]
jobs:
  changelog:
    name: Milestone Changelog
    runs-on: "regular"
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3.5.2
        with:
          fetch-depth: 0

      - name: Split repository name
        id: split
        env:
          REPO: ${{ github.repository }}
        run: |
          if [ $REPO == "deckhouse/deckhouse" ]; then
            echo "name=deckhouse" >> $GITHUB_OUTPUT
          else
            echo "name=deckhouse-test" >> $GITHUB_OUTPUT
          fi

      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@v2
        with:
          url: https://seguro.flant.com
          path: github
          role: "${{ steps.split.outputs.name }}"
          method: jwt
          jwtGithubAudience: github-access-aud
          secrets: |
            projects/data/6db2f1ee-9b6f-4f4f-8381-2fb43060478a/github/boatswain/CHANGELOG_ACCESS_TOKEN CHANGELOG_ACCESS_TOKEN | CHANGELOG_ACCESS_TOKEN ;
            projects/data/6db2f1ee-9b6f-4f4f-8381-2fb43060478a/github/fox_pull_secret SSDLC_TOOLS_PULL_TOKEN | SSDLC_TOOLS_PULL_TOKEN ;

      - name: Upgrade changelog
        uses: ./.github/actions/milestone-changelog
        with:
          milestone: ${{ toJSON( github.event.client_payload.pull_request.milestone ) }}
          changelog-access-token: ${{ steps.secrets.outputs.CHANGELOG_ACCESS_TOKEN }}
          ssdlc-tools-pull-token: ${{ steps.secrets.outputs.SSDLC_TOOLS_PULL_TOKEN }}

      - name: Add reaction for success
        uses: peter-evans/create-or-update-comment@v1
        with:
          token: ${{ secrets.CHANGELOG_ACCESS_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
          reaction-type: hooray
