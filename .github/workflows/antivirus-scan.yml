          docker cp ${CONTAINER_NAME}:/antivirus/scans/${SCAN_ID}/scan_results_threats.md ./scans/${SCAN_ID}/scan_results_threats.md

          if [ -f scans/${SCAN_ID}/scan_results_threats.md ]; then
