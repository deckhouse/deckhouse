name: Antivirus Scan

on:
  schedule:
    - cron: '0 0 * * 6' # 00:00 UTC Saturday = 03:00 MSK Sunday
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch or tag to scan'
        required: true
        type: string
        default: main
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

env:
  SCAN_RESULTS_DIR: 'scans'

# Cancel in-progress runs for the same PR (pull_request_target) or branch (schedule/dispatch).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:

  # </template: block-until-image-is-not-ready>
  block-until-image-is-not-ready:
    name: Block until the docker image is not ready
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
      actions: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v3.5.2
        with:
          ref: "main"
      - name: Block until the docker image is not ready
        id: block-image-dont-ready
        uses: actions/github-script@v6.4.1
        with:
          script: |
            const githubAction = require('./.github/scripts/js/helpers/github-actions')({github, context, core});
            const { isReleaseBranch } = require('./.github/scripts/js/helpers/utils');
            const isTag = (branch) => branch.includes("/tags/")

            let branchName;
            let prNum;

            // Skip for events without branch/PR context (schedule, repository_dispatch, etc.).
            // GetBranchNameFromContext reads context.payload.ref, which is undefined for such events and would throw.
            const supportedEvents = ['pull_request', 'pull_request_target', 'workflow_dispatch', 'push'];
            if (!supportedEvents.includes(context.eventName)) {
              core.info(`Skip a job for unsupported event: ${context.eventName}`);
              return true;
            }

            if (context.eventName === 'pull_request' || context.eventName === 'pull_request_target') {
              branchName = context.payload.pull_request.head.ref;
              prNum = context.payload.pull_request.number;
            } else if (context.eventName === 'workflow_dispatch') {
              branchName = context.payload.inputs.ci_commit_ref_name;
              prNum = context.payload.inputs.issue_number;
            }

            if (!branchName) {
              branchName = githubAction.GetBranchNameFromContext(context);
            }

            if (!branchName) {
              core.setFailed("Branch not found.");
              return false;
            }

            core.info(`${branchName} is main? ${branchName === 'main'}`)
            core.info(`${branchName} is release? ${isReleaseBranch(branchName)}`)
            core.info(`${branchName} is tag? ${isTag(branchName)}`)
            if (branchName === 'main' || isReleaseBranch(branchName) || isTag(branchName)) {
              core.info(`Skip a job because it's a tag, release or main branch: ${branchName}`);
              return true;
            }

            let infoText = `Check build workflow is completed for branch: ${branchName}`;
            if (prNum) {
              infoText += ` | PR: ${context.payload.repository.html_url}/pull/${prNum}`;
            }
            core.info(infoText);

            const { waitForJobInWorkflowIsCompletedWithSuccess } = require('./.github/scripts/js/validators/validate-job-in-workflow-is-ready')({ github, context, core });
            try {
              let workflowName = 'Build and test for dev branches';
              let jobName = 'Build FE';
              await waitForJobInWorkflowIsCompletedWithSuccess(branchName, workflowName, jobName);
            } catch(error) {
              core.setFailed(error);
            }


  # </template: block-until-image-is-not-ready>

  get-tags:
    name: Get tags for scanning
    runs-on: [self-hosted, regular]
    needs: block-until-image-is-not-ready
    # Skip PRs from forks: pull_request_target exposes base-repo secrets, and dev-registry tags for fork PRs are not built.
    if: ${{ github.repository == 'deckhouse/deckhouse' && (github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository) }}
    outputs:
      tags: ${{ steps.set-manual-tag.outputs.tags || steps.set-pr-tag.outputs.tags || steps.get-tags.outputs.tags || steps.set-default.outputs.tags }}
    steps:

      # <template: checkout_step>
      - name: Checkout sources
        uses: actions/checkout@v3.5.2

      # </template: checkout_step>
      - name: Check event type
        id: check-event
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.branch }}" ]; then
            echo "Manual run with branch: ${{ github.event.inputs.branch }}"
            echo "is_manual=true" >> $GITHUB_OUTPUT
            echo "is_pr=false" >> $GITHUB_OUTPUT
            echo "branch=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request_target" ]; then
            echo "PR run for #${{ github.event.pull_request.number }}"
            echo "is_manual=false" >> $GITHUB_OUTPUT
            echo "is_pr=true" >> $GITHUB_OUTPUT
          else
            echo "Scheduled run or manual without specific branch"
            echo "is_manual=false" >> $GITHUB_OUTPUT
            echo "is_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Get latest tags for scheduled run
        if: steps.check-event.outputs.is_manual == 'false' && steps.check-event.outputs.is_pr == 'false'
        id: get-tags
        run: |
          TAGS=$(git ls-remote --tags origin | grep -F tags/v | awk -F '/' '{print $3}' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$')
          TAGS_TO_SCAN=$(echo $TAGS | tr ' ' '\n' | sed 's/^v//' | sort -t. -k1,1n -k2,2n -k3,3n | awk -F. '{
          if ($2 != prev_minor) {
            if (prev_minor != "") {
              print "v" $1 "." prev_minor "." max_patch
            }
            prev_minor = $2
            max_patch = $3
          } else if ($3 > max_patch) {
              max_patch = $3
            }
          }
          END { print "v" $1 "." prev_minor "." max_patch }' | tail -3)
          TAGS=""
          for edition in fe ee se se-plus be ce cse
          do
            for tag in $TAGS_TO_SCAN
            do
              TAGS+=$'\n'"$edition:$tag"
            done
          done

          TAGS+=$'\n'"main"
          echo "Tags to scan: $TAGS"
          echo "tags=$(echo $TAGS | jq -R -s -c 'split(" ")')" >> $GITHUB_OUTPUT

      - name: Set manual tag
        if: steps.check-event.outputs.is_manual == 'true'
        id: set-manual-tag
        run: |
          ref=${{ github.event.inputs.branch }}
          TAGS=""
          if [[ "${ref}" =~ ^v?[0-9]+.[0-9]+.[0-9]+$ ]]; then
            for edition in fe ee se se-plus be ce cse
            do
              TAGS+=$'\n'"$edition:$ref"
            done
          else
            TAGS="${ref}"
          fi
          echo "Tags to scan: $TAGS"
          echo "tags=$(echo $TAGS | jq -R -s -c 'split(" ")')" >> $GITHUB_OUTPUT

      - name: Set PR tag
        if: steps.check-event.outputs.is_pr == 'true'
        id: set-pr-tag
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO_SUFFIX=${GITHUB_REPOSITORY#deckhouse/deckhouse-}
          if [[ ${REPO_SUFFIX} == ${GITHUB_REPOSITORY} ]] ; then
            TAG="pr${PR_NUMBER}"
          else
            TAG="pr${PR_NUMBER}-${REPO_SUFFIX}"
          fi
          echo "PR tag to scan: $TAG"
          echo "tags=$(printf '%s' "$TAG" | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> $GITHUB_OUTPUT

      - name: Set default tag (fallback)
        if: always()
        id: set-default
        run: |
          # Fallback if no tags were set
          if [ -z "${{ steps.set-manual-tag.outputs.tags }}${{ steps.set-pr-tag.outputs.tags }}${{ steps.get-tags.outputs.tags }}" ]; then
            echo "tags=[\"main\"]" >> $GITHUB_OUTPUT
          fi




  drweb-scan:
    name: Dr.Web Scan ${{ matrix.branch }}
    runs-on: [self-hosted, antivirus]

    if: github.repository == 'deckhouse/deckhouse'
    needs: get-tags
    strategy:
      matrix:
        branch: ${{ fromJson(needs.get-tags.outputs.tags) }}
      fail-fast: false
    permissions:
      id-token: write
    outputs:
      scan_id: ${{ steps.scan.outputs.scan_id }}
    steps:
      # <template: import_secrets>
      - name: Split repository name
        id: split
        env:
          REPO: ${{ github.repository }}
        run: |
          if [ $REPO == "deckhouse/deckhouse" ]; then
            echo "name=deckhouse" >> $GITHUB_OUTPUT
          else
            echo "name=deckhouse-test" >> $GITHUB_OUTPUT
          fi
      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@v2
        with:
          url: https://seguro.flant.com
          path: github
          role: "${{ steps.split.outputs.name }}"
          method: jwt
          jwtGithubAudience: github-access-aud
          secrets: |
            projects/data/6db2f1ee-9b6f-4f4f-8381-2fb43060478a/github/registry_host DECKHOUSE_DEV_REGISTRY_HOST | DECKHOUSE_DEV_REGISTRY_HOST ;
            projects/data/6db2f1ee-9b6f-4f4f-8381-2fb43060478a/github/registry_host DECKHOUSE_REGISTRY_STAGE_HOST | DECKHOUSE_STAGE_REGISTRY_HOST ;

      # </template: import_secrets>
      - name: Run drweb scan
        id: scan
        run: |
          registry_image_path=/sys/deckhouse-oss
          ref=$(echo "${{ matrix.branch }}" | awk -F':' '{ print $2 }' | tr -d '\n')
          if [ -z "${ref}" ]; then
            ref=$(echo "${{ matrix.branch }}" | tr -d '\n')
          fi
          ref_sanitized=$(echo "${ref}" | sed 's/[.\/]/-/g')
          SCAN_TIME=$(date '+%s')
          SCAN_ID="$SCAN_TIME-${{ github.run_id }}-${ref_sanitized}"
          if [[ "${ref}" =~ ^v?[0-9]+.[0-9]+.[0-9]+$ ]]; then
            echo "registry read"
            edition=$(echo "${{ matrix.branch }}" | tr -d '\n' | awk -F':' '{ print $1 }')
            SCAN_ID+="-${edition}"
            registry_image_path="/deckhouse/${edition}"
            registry_host=${{ secrets.DECKHOUSE_REGISTRY_READ_HOST }}
          elif [[ "${ref}" =~ ^release-[0-9]+\.[0-9]+$ ]]; then
            echo "registry stage"
            registry_host=${{ steps.secrets.outputs.DECKHOUSE_STAGE_REGISTRY_HOST }}
          else
            echo "registry dev"
            registry_host=${{ steps.secrets.outputs.DECKHOUSE_DEV_REGISTRY_HOST }}
          fi
          CONTAINER_NAME=registry_drweb
          SCAN_ID+="-$CONTAINER_NAME"
          echo "scan_id=${SCAN_ID}" >> $GITHUB_OUTPUT
          echo $CONTAINER_NAME
          docker exec ${CONTAINER_NAME} scanner ${ref} ${registry_host}${registry_image_path} ${SCAN_ID}

          mkdir -p scans/${SCAN_ID}
          docker cp ${CONTAINER_NAME}:/drweb/scans/${SCAN_ID}/scan_results_clean.md ./scans/${SCAN_ID}/scan_results_clean.md
          docker cp ${CONTAINER_NAME}:/drweb/scans/${SCAN_ID}/scan_results_threats.md ./scans/${SCAN_ID}/scan_results_threats.md

          if [ -f scans/${SCAN_ID}/scan_results_threats.md ]; then
            THREAT_COUNT=$(sed -n 's/.*Images with threats | \([0-9]\+\) |.*/\1/p' scans/${SCAN_ID}/scan_results_threats.md | head -1)
            ERRORS_COUNT=$(sed -n 's/.*Errors | \([0-9]\+\) |.*/\1/p' scans/${SCAN_ID}/scan_results_threats.md | head -1)
            if [ -n "$THREAT_COUNT" ] && [ "$THREAT_COUNT" -gt 0 ]; then
              echo "❌ THREATS DETECTED: $THREAT_COUNT images contain threats!"
              exit 1
            elif [ -n "$ERRORS_COUNT" ] && [ "$ERRORS_COUNT" -gt 0 ]; then
              echo "❌ ERRORS DETECTED: $ERRORS_COUNT!"
              exit 1
            else
              echo "✅ No threats detected ($THREAT_COUNT)"
            fi
          else
            echo "⚠️ The scan results file was not found"
            exit 1
          fi

          echo "✅ ${CONTAINER_NAME} scan completed for ${{ matrix.branch }}"

      - name: Upload scan artifacts
        if: github.repository == 'deckhouse/deckhouse' && always()
        uses: actions/upload-artifact@v4.4.0
        with:    
          name: drweb-scan-results-${{ steps.scan.outputs.scan_id }}
          path: scans/${{ steps.scan.outputs.scan_id }}
          retention-days: 5



  kaspersky-scan:
