        if: ${{ steps.check_rw_registry.outputs.has_credentials != 'true' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false
      # </template: login_rw_registry_step>

      # <template: werf_install_step>
      - name: Install werf-dk CLI
        run: |
          WERF_PATH="$RUNNER_TOOL_CACHE/werf-dk/${WERF_VERSION}-dk"
          echo "$WERF_PATH" >> "$GITHUB_PATH"
          CACHED_VERSION=$($WERF_PATH/werf version | tr -d '\n')
          if [[ "${WERF_VERSION}-dk" != "$CACHED_VERSION" ]]; then
            echo "Current werf is $CACHED_VERSION, downloading ${WERF_VERSION}-dk";
            mkdir -p "$WERF_PATH"
            curl -Lsfo "$WERF_PATH/werf" https://github.com/deckhouse/delivery-kit/releases/download/${WERF_VERSION}-dk/werf
            chmod +x "$WERF_PATH/werf"
          else
            echo "Current werf is $CACHED_VERSION, skipping download"
          fi
      # </template: werf_install_step>


      # <template: doc_release_version_template>
      - name: Set documentation version
        env:
          CI_COMMIT_REF_NAME: ${{needs.git_info.outputs.ci_commit_ref_name}}
        run: |
          echo "DOC_VERSION=${CI_COMMIT_REF_NAME/release-/v}" >> $GITHUB_ENV
      # </template: doc_release_version_template>

      - name: Generate PDF documentation
        env:
          WERF_ENV: "EE"
          WERF_REPO: "${{ steps.check_rw_registry.outputs.web_registry_path || steps.check_dev_registry.outputs.web_registry_path }}"
          WERF_SECONDARY_REPO: "${{ steps.check_dev_registry.outputs.web_registry_path }}"
          WERF_FINAL_IMAGES_ONLY: "false"
          DOC_VERSION: "${{ env.DOC_VERSION }}"
        run: |
          make docs-generate-pdf DOC_VERSION="${DOC_VERSION}"

      - name: Upload PDF files to S3
        if: ${{ success() }}
        env:
          AWS_ACCESS_KEY_ID: "${{ secrets.DOC_S3_ACCESS_KEY_ID_PROD }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.DOC_S3_SECRET_ACCESS_KEY_PROD }}"
          S3_BUCKET: "${{ secrets.DOC_S3_BUCKET_PROD }}"
          S3_REGION: "${{ secrets.DOC_S3_REGION }}"
          S3_EP: "${{ secrets.DOC_S3_EP }}"
          DOC_VERSION: "${{ env.DOC_VERSION }}"
        run: |
          for lang in en ru; do
            for guide in admin user; do
              docker run --rm \
                -e AWS_ACCESS_KEY_ID \
                -e AWS_SECRET_ACCESS_KEY \
                -v "${GITHUB_WORKSPACE}/pdf:/aws/pdf:ro" \
                amazon/aws-cli:2.27.22 \
                s3 cp \
                  "pdf/deckhouse-${guide}-guide_${lang}.pdf" \
                  "s3://${S3_BUCKET}/deckhouse-web-production/${DOC_VERSION}/docs-dkp/${lang}/pdf/deckhouse-${guide}-guide.pdf" \
                  --endpoint-url "https://${S3_EP}" \
                  --region "${S3_REGION}" \
                  --no-verify-ssl
            done
          done
