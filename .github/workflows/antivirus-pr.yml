  # </template: kaspersky_scan_job>


  set_security_antivirus_requirement_status:
    name: Set commit status after antivirus scan run
    runs-on: "ubuntu-latest"
    needs: [drweb-scan, kaspersky-scan]
    if: ${{ always() && needs.drweb-scan.result != 'skipped' && needs.kaspersky-scan.result != 'skipped' }}
    permissions:
      contents: read
      pull-requests: write
    steps:

      # <template: checkout_step>
      - name: Checkout sources
        uses: actions/checkout@v3.5.2

      # </template: checkout_step>
      - name: Install GitHub CLI
        run: sudo apt-get install gh -y
      - name: Auth with GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
      - name: Set PR Label
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "PR Number: $PR_NUMBER"
          if [ "${{ needs.drweb-scan.result }}" == "success" ] && [ "${{ needs.kaspersky-scan.result }}" == "success" ]; then
            gh pr edit "$PR_NUMBER" --add-label "security/antivirus/success"
          else
            gh pr edit "$PR_NUMBER" --add-label "security/antivirus/failed"
          fi


  # <template: antivirus_notify_failure_job>
  notify-failure:
    name: Send failure notification
    runs-on: [self-hosted, regular]
    needs: [drweb-scan, kaspersky-scan]
    if: always() && (needs.drweb-scan.result == 'failure' || needs.kaspersky-scan.result == 'failure')
    permissions:
      id-token: write
    steps:
      # <template: import_secrets>
      - name: Split repository name
        id: split
        env:
          REPO: ${{ github.repository }}
        run: |
          if [ $REPO == "deckhouse/deckhouse" ]; then
            echo "name=deckhouse" >> $GITHUB_OUTPUT
          else
            echo "name=deckhouse-test" >> $GITHUB_OUTPUT
          fi
      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@v2
        with:
          url: https://seguro.flant.com
          path: github
          role: "${{ steps.split.outputs.name }}"
          method: jwt
          jwtGithubAudience: github-access-aud
          secrets: |
            projects/data/b050f3bd-733f-4746-9640-9df80d484074/n8n_jobs_fails_url N8N_LOOP_NOTIFIER_URL | N8N_LOOP_NOTIFIER_URL ;

      # </template: import_secrets>

      - name: Check which jobs failed
        id: check-failures
        run: |
          FAILED_JOBS=""
          if [[ "${{ needs.drweb-scan.result }}" == "failure" ]]; then
            FAILED_JOBS="$FAILED_JOBS• Dr.Web Scan\n"
          fi
          if [[ "${{ needs.kaspersky-scan.result }}" == "failure" ]]; then
            FAILED_JOBS="$FAILED_JOBS• Kaspersky Scan\n"
          fi

          echo "failed_jobs=${FAILED_JOBS}" >> $GITHUB_OUTPUT
          echo "Failed jobs:"
          echo "${FAILED_JOBS}"

      - name: Send notification
        run: |
          workflow_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MESSAGE="🛑 Github Antivirus Scan Failed!\n\n"
          MESSAGE+="**Failed jobs:**\n"
          MESSAGE+="${{ steps.check-failures.outputs.failed_jobs }}\n"
          if [ "${{ github.event_name }}" == "pull_request_target" ]; then
            pr_url="https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
            MESSAGE+="**PR:** [#${{ github.event.pull_request.number }}]($pr_url)\n"
          fi
          MESSAGE+="**Workflow URL:** [View Run]($workflow_url)\n"

          curl -f -L -X POST "${{ steps.secrets.outputs.N8N_LOOP_NOTIFIER_URL }}" \
            -H "Content-Type: application/json" \
            --data "{\"type\": \"ci_fail\",\"message\":\"$MESSAGE\"}"
  # </template: antivirus_notify_failure_job>

