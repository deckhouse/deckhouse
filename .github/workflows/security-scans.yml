  # <template: antivirus_notify_failure_job>
  notify-failure:
    name: Send failure notification
    runs-on: [self-hosted, regular]
    needs: [drweb-scan, kaspersky-scan]
    if: always() && (needs.drweb-scan.result == 'failure' || needs.kaspersky-scan.result == 'failure')
    permissions:
      id-token: write
    steps:
      # <template: import_secrets>
      - name: Split repository name
        id: split
        env:
          REPO: ${{ github.repository }}
        run: |
          if [ $REPO == "deckhouse/deckhouse" ]; then
            echo "name=deckhouse" >> $GITHUB_OUTPUT
          else
            echo "name=deckhouse-test" >> $GITHUB_OUTPUT
          fi
      - name: Import secrets
        id: secrets
        uses: hashicorp/vault-action@v2
        with:
          url: https://seguro.flant.com
          path: github
          role: "${{ steps.split.outputs.name }}"
          method: jwt
          jwtGithubAudience: github-access-aud
          secrets: |
            projects/data/b050f3bd-733f-4746-9640-9df80d484074/n8n_jobs_fails_url N8N_LOOP_NOTIFIER_URL | N8N_LOOP_NOTIFIER_URL ;

      # </template: import_secrets>

      - name: Check which jobs failed
        id: check-failures
        run: |
          FAILED_JOBS=""
          if [[ "${{ needs.drweb-scan.result }}" == "failure" ]]; then
            FAILED_JOBS="$FAILED_JOBS• Dr.Web Scan\n"
          fi
          if [[ "${{ needs.kaspersky-scan.result }}" == "failure" ]]; then
            FAILED_JOBS="$FAILED_JOBS• Kaspersky Scan\n"
          fi

          echo "failed_jobs=${FAILED_JOBS}" >> $GITHUB_OUTPUT
          echo "Failed jobs:"
          echo "${FAILED_JOBS}"

      - name: Send notification
        run: |
          workflow_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MESSAGE="🛑 Github Antivirus Scan Failed!\n\n"
          MESSAGE+="**Failed jobs:**\n"
          MESSAGE+="${{ steps.check-failures.outputs.failed_jobs }}\n"
          if [ "${{ github.event_name }}" == "pull_request_target" ]; then
            pr_url="https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
            MESSAGE+="**PR:** [#${{ github.event.pull_request.number }}]($pr_url)\n"
          fi
          MESSAGE+="**Workflow URL:** [View Run]($workflow_url)\n"

          curl -f -L -X POST "${{ steps.secrets.outputs.N8N_LOOP_NOTIFIER_URL }}" \
            -H "Content-Type: application/json" \
            --data "{\"type\": \"ci_fail\",\"message\":\"$MESSAGE\"}"
  # </template: antivirus_notify_failure_job>


  # ============================================================================
  # Aggregator — single required check for branch protection.
  # Fails if any scan did not finish with success
  # (covers blocker failure, scan failure, and skipped due to upstream issues).
  # ============================================================================
  security_scans_required:
    name: Security scans required
    runs-on: ubuntu-latest
    if: ${{ always() && needs.pull_request_info.result == 'success' }}
    needs:
      - pull_request_info
      - block-until-image-is-not-ready
      - gitleaks_scan
      - test_cve_report_main
      - security_scan_images
      - drweb-scan
      - kaspersky-scan
    steps:
      - name: Aggregate scan results
        run: |
          declare -A results=(
            [blocker]="${{ needs.block-until-image-is-not-ready.result }}"
            [gitleaks]="${{ needs.gitleaks_scan.result }}"
            [cve]="${{ needs.test_cve_report_main.result }}"
            [rootless]="${{ needs.security_scan_images.result }}"
            [drweb]="${{ needs.drweb-scan.result }}"
            [kaspersky]="${{ needs.kaspersky-scan.result }}"
          )
          # Antivirus jobs intentionally skip in test repositories (self-hosted antivirus runners are only in main repo).
          IS_MAIN_REPO=false
          if [[ "${{ github.repository }}" == "deckhouse/deckhouse" ]]; then
            IS_MAIN_REPO=true
          fi

          failed=0
          for name in "${!results[@]}"; do
            r="${results[$name]}"
            if [[ "$r" == "success" ]]; then
              echo "✅ $name: $r"
              continue
            fi
            if [[ "$IS_MAIN_REPO" == "false" && ( "$name" == "drweb" || "$name" == "kaspersky" ) && "$r" == "skipped" ]]; then
              echo "ℹ️  $name: $r (allowed in test repository)"
              continue
            fi
            echo "::error::Scan '$name' result: $r"
            failed=1
          done
          exit $failed
