      # </template: login_dev_registry_step>


      # <template: read_werf_version_step>
      - name: Read werf version from werf_envs.yml
        id: read_werf_version
        run: |
          set -euo pipefail
          WERF_ENVS_FILE=".github/ci_includes/werf_envs.yml"
          if [[ ! -f "$WERF_ENVS_FILE" ]]; then
