          echo "Tests image name: '${TESTS_IMAGE_NAME}'" | tr '[:lower:]' '[:upper:]'
          echo "⚓️ 📥 [$(date -u)] Pull base golang image..."
          docker pull ${TESTS_IMAGE_NAME}
          # Persistent on-runner caches, created up front so the bind mounts are owned by the runner
          # user (Docker would otherwise create a missing host path as root, making it unwritable
          # in-container):
          #   envtest-assets                 - kubebuilder assets (etcd, kube-apiserver, kubectl) + setup-envtest + gotestfmt
          #   go-build-cache-node-controller - GOCACHE, so test binaries are not recompiled from scratch every run
          #   go-mod-cache-node-controller   - GOMODCACHE (dedicated, not the shared ~/go-pkg-cache which root
