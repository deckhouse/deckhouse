          function publish_image() {
            IMAGE_NAME=$1
            IMAGE_DST_REPO=$2
            IMAGE_DST_TAG=$3
            IMAGE_SRC_REPO="$(jq -r ".Images.\"${IMAGE_NAME}\".DockerRepo" images_tags_werf.json)"
