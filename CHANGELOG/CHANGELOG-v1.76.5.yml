user-authz:
  fixes:
    - summary: Honor CAR-independent RBAC in webhook and permission-browser
      pull_request: https://github.com/deckhouse/deckhouse/pull/21373
      impact: >-
        With enableMultiTenancy, effective access is now the union of CAR (within its limitNamespaces/namespaceSelector),
        AuthorizationRules, and plain RoleBindings/ClusterRoleBindings. Previously the webhook denied
        requests outside the CAR scope even when RBAC explicitly granted them: such existing bindings
        for subjects with a CAR silently become effective after the upgrade — review them. The CAR access
        level still does not apply outside its namespace limits. AccessibleNamespaces reflects the same
        union.
