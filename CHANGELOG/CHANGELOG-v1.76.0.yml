descheduler:
  features:
    - summary: >-
        Updated `descheduler` to 0.35, with native support for filtering pods by namespace label selector
        and pod protection based on storage classes.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18135
    - summary: Migrated conversion webhook from bash to ConversionWebhook CR-based mechanism.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18499
