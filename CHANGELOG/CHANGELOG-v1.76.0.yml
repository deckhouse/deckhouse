admission-policy-engine:
  features:
    - summary: Bumped Gatekeeper to 3.22.0 and Ratify to 1.4.0.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18539
    - summary: >-
        Grant kubeadm:cluster-admins group granular full access to module CRDs via dedicated ClusterRole
        d8:admission-policy-engine:admin-kubeconfig.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19633
  fixes:
    - summary: >-
        Prevent unintended Gatekeeper constraints from being rendered for SecurityPolicy when boolean
        fields are omitted.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18007
      impact: >-
        Workload Pods are no longer denied by unrelated SecurityPolicy checks (e.g. hostNetwork/hostPort)
        when corresponding policy fields are not explicitly set.
    - summary: Add metric and dashboard warning for truncated constraint violations (200 limit)
      pull_request: https://github.com/deckhouse/deckhouse/pull/18363
    - summary: Fixed enforcementAction for D8ReplicaLimits, added more template tests.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18407
    - summary: Fix SecurityPolicyException handling for hostPorts-only exceptions
      pull_request: https://github.com/deckhouse/deckhouse/pull/18535
    - summary: Restore denyVulnerableImages configuration for operator-trivy compatibility
      pull_request: https://github.com/deckhouse/deckhouse/pull/18838
    - summary: Fix high resource consumption for constraint d8denyexecheritage
      pull_request: https://github.com/deckhouse/deckhouse/pull/19070
    - summary: Changed default PSS policy to Baseline for unrecognized deckhouse versions
      pull_request: https://github.com/deckhouse/deckhouse/pull/18322
    - summary: Revert  Changed default PSS policy to Baseline for unrecognized deckhouse versions
      pull_request: https://github.com/deckhouse/deckhouse/pull/19187
    - summary: Refactor main documentation page
      pull_request: https://github.com/deckhouse/deckhouse/pull/20195
candi:
  features:
    - summary: Enable DRA alpha feature gates for multi allocations
      pull_request: https://github.com/deckhouse/deckhouse/pull/17993
      impact: Kubelet, api-server, controller-manager and scheduler will be restarted.
    - summary: Enabled DRA alpha feature gate `DRAPartitionableDevices`.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18362
      impact: Kubelet, api-server, controller-manager and scheduler will be restarted.
    - summary: Added multiversion parsing from `oss.yaml` in werf and tests.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17956
    - summary: DRA feature gate DRAExtendedResource now enabled by default for 1.34 clusters and above
      pull_request: https://github.com/deckhouse/deckhouse/pull/18970
    - summary: >-
        Added support for `x-kubernetes-sensitive-data` fields in custom resources with RBAC-based filtering
        and etcd encryption.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18241
      impact: Enabling the feature gate `CRDSensitiveData` restarts kube-apiserver.
