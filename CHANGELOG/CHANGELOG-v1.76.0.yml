cloud-provider-dvp:
  features:
    - summary: >-
        Added discovery and propagation of default StorageClass from parent cluster to child
        clusters in DVP.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18295
    - summary: Added readiness check resource to prevent lost OpenTofu state if resource is not ready.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18212
      impact: >-
        A new resource, `kubernetes_resource_ready_v1`, has been introduced to perform readiness
        checks for cloud resources, replacing `wait` blocks. After upgrading, the OpenTofu plan will
        include adding the new resources and removing `wait` blocks. Running `converge` is required
        to apply the changes and is safe: it does not modify existing cloud resources. During
        migration, readiness checks are skipped for resources older than 5 days. Related warnings
        may appear and can be safely ignored.
    - summary: >-
        Fail fast on dhctl operations if resources has incorrect status or conditions (like quota
        exceeded) with some limitations.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18212
    - summary: Added ServiceWithHealthchecks support to `cloud-provider-dvp`.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18141
    - summary: Added secrets with `node-manager` dependencies.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18112
    - summary: Added hybrid cluster support to `cloud-provider-dvp`.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17861
  fixes:
    - summary: >-
        fix LoadBalancer stuck in pending state — retry on conflict when updating
        ServiceWithHealthchecks and propagate IP to child cluster service status
      pull_request: https://github.com/deckhouse/deckhouse/pull/19609
    - summary: Fixed CVEs.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19362
    - summary: Fixed missing SSH public keys for ephemeral nodes.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19357
    - summary: >-
        Suppressed destructive changes when updating labels and annotations for cloud resources via
        OpenTofu.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19079
    - summary: Fixed invalid and unpredictable logic in the DeckhouseMachine controller.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18715
    - summary: Allowed using `additionalDisks` in master InstanceClasses.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17352
