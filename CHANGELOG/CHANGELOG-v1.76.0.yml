descheduler:
  features:
    - summary: >-
        Added `RemovePodsHavingTooManyRestarts` strategy to the `v1alpha2` API for evicting
        crash-looping pods.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19122
      impact: >-
        Pods exceeding the configured restart threshold are evicted, freeing node resources and
        allowing the scheduler to place fresh pods on healthier nodes.
    - summary: >-
        Added automatic enabling of Kubernetes Metrics API in `descheduler` policy when
        `metrics.k8s.io` is available in the cluster.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19064
      impact: >-
        If the cluster serves the `metrics.k8s.io` API (e.g. metrics-server is installed), the
        `descheduler` policy now includes `metricsProviders` with source KubernetesMetrics, so
        utilization-related strategies can use Metrics API data. The `descheduler` Pod may restart
        when this flag or descheduler CR-driven policy changes due to ConfigMap/checksum updates.
    - summary: Added configurable descheduling interval presets in ModuleConfig.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19029
    - summary: Migrated conversion webhook from bash to ConversionWebhook CR-based mechanism.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18499
    - summary: >-
        Updated `descheduler` to 0.35, with native support for filtering pods by namespace label
        selector and pod protection based on storage classes.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18135
