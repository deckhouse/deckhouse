node-manager:
  features:
    - summary: Migrated CAPS controller manager to lib-helm defines.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18880
    - summary: setting new label to indicate fencing mode.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18414
    - summary: Added automatic spot-terminated node handling with drain and instance cleanup.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18385
    - summary: Added gossip-based node failure detection and gRPC API to fencing-agent.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17771
      impact: >-
        The fencing-agent now uses gossip protocol (`memberlist`) for distributed node health
        monitoring.

        This prevents incorrect node reboots when control plane is unavailable but worker nodes are
        healthy.

        A new gRPC API is available via Unix socket at `/tmp/fencing-agent.sock` for querying node
        membership.
    - summary: Replaced NGINX implementation of apiserver-proxy with native Go application.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17619
      impact: >-
        During migration to the new Go-based implementation of apiserver-proxy, connection flaps to
        the API server may occur. This change exposes a new hostPort `6480` for health checks and
        upstreams statistics.
  fixes:
    - summary: >-
        Improve fencing-agent health monitor logging — warn on fallback feeding, error on watchdog
        starvation, add diagnostic context to all feeding log messages.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19400
      impact: >-
        Operators can now detect degraded fencing states (quorum loss, API unreachability) through
        log levels and diagnostic fields without parsing log messages.
    - summary: fix draining hook event generation
      pull_request: https://github.com/deckhouse/deckhouse/pull/19165
    - summary: bump grpc lib version in fencing-agent to fix CVE
      pull_request: https://github.com/deckhouse/deckhouse/pull/19019
    - summary: >-
        fix Cluster Autoscaler RBAC for CAPI providers, add missing machinedeployments/scale to
        write rule and patch verb to ClusterRole.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18818
    - summary: mitigate CVE-2026-33186
      pull_request: https://github.com/deckhouse/deckhouse/pull/18649
    - summary: caps fix inconsistent pending staticinstance
      pull_request: https://github.com/deckhouse/deckhouse/pull/18379
    - summary: >-
        Fencing controller no longer deletes Node objects for Notify-mode and Static/CloudStatic
        nodes.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18218
    - summary: fix go lint errors in node-controller
      pull_request: https://github.com/deckhouse/deckhouse/pull/18187
    - summary: >-
        Fix cluster-autoscaler deadlock when machine creation fails with a non-ResourceExhausted
        error, preventing scale-up to alternative node groups.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18154
    - summary: Fix capacity parsing logic for DVPInstanceClass and add test case for DVPSpecWorker
      pull_request: https://github.com/deckhouse/deckhouse/pull/17935
      impact: >-
        Capacity values (CPU/memory) for DVPInstanceClass are now correctly extracted according to
        spec shape. Nested `virtualMachine` fields are used and memory quantities like `Gi` are
        properly parsed.
    - summary: deleted incorrect drainTimeout fix
      pull_request: https://github.com/deckhouse/deckhouse/pull/16975
