istio:
  features:
    - summary: Enabled read-only CNI-node root filesystem.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19334
    - summary: Added monitoring of the reserved UID `1337` in pods.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18633
    - summary: Enabled trust domain validation in Istio control plane for federation and multicluster.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18502
      impact: >-
        Istiod now enforces trust domain validation. Each remote root CA is now scoped to its
        declared trust domain in the meshConfig caCertificates. Verify that all IstioFederation
        resources have correct `trustDomain` values matching the remote cluster configuration.
    - summary: Added validating webhooks for IstioFederation and IstioMulticluster resources.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18406
      impact: >-
        Creation of IstioFederation is only allowed when Istio federation is enabled in the module
        configuration. Creation of IstioMulticluster is only allowed when Istio multicluster is
        enabled in the module configuration.
    - summary: Added support for the `istio.io/rev:default` label.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18320
    - summary: Added optional Gateway API HTTPRoute/ListenerSet publishing.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16812
  fixes:
    - summary: fixed CVEs in module images
      pull_request: https://github.com/deckhouse/deckhouse/pull/19584
      impact: module pods will be restarted
    - summary: ingressGateway advertise FQDN does not create a ServiceEntry due to an error
      pull_request: https://github.com/deckhouse/deckhouse/pull/19528
    - summary: Tighten validation of Istio metadata endpoint URLs in federation and multicluster CRDs.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19369
    - summary: fixed CVE-2026-39882, CVE-2026-39883 and CVE-2026-35206
      pull_request: https://github.com/deckhouse/deckhouse/pull/19085
      impact: istio module pods will be restarted
    - summary: >-
        Fix ztunnel PodMonitor port name, VPA container target, and improve ambient mode version
        detection
      pull_request: https://github.com/deckhouse/deckhouse/pull/18857
    - summary: Remove duplicate ephemeral storage configuration from ztunnel DaemonSet
      pull_request: https://github.com/deckhouse/deckhouse/pull/18844
    - summary: fixed CVE-2026-33186 in v1.21.6 images
      pull_request: https://github.com/deckhouse/deckhouse/pull/18676
      impact: pods in namespace d8-istio will be restarted
    - summary: Remove unnecessary ClusterRole and ClusterRoleBinding manifests from Istio operator.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18663
    - summary: fixed CVE-2026-33186 in v1.25.2 images
      pull_request: https://github.com/deckhouse/deckhouse/pull/18636
      impact: pods in namespace d8-istio will be restarted
    - summary: Disable Gateway API deployment and GatewayClass controllers in Istio 1.21.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18581
    - summary: Reduce CPU and RAM for regenerate multicluster JWT token and sort ingressGateway
      pull_request: https://github.com/deckhouse/deckhouse/pull/18554
    - summary: Updated Istio Grafana dashboards and fixed upstream panel descriptions and PromQL.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18400
    - summary: >-
        Deduplicated federation ServiceEntry and DestinationRule resources by hostname across
        multiple IstioFederation CRs.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18375
      impact: >-
        ServiceEntry and DestinationRule resources for federated public services will be recreated
        with new names. This causes a brief traffic interruption for cross-cluster federated service
        routing during the first reconciliation after the update.
