    - summary: >-
        Grant kubeadm:cluster-admins group granular full access to module CRDs via dedicated ClusterRole
        d8:user-authz:admin-kubeconfig.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19633
  fixes:
    - summary: Fix multi-tenancy namespace visibility for users without ClusterAuthorizationRules
      pull_request: https://github.com/deckhouse/deckhouse/pull/18689
    - summary: Extend cluster-admin clusterrole  with kubelet-api-admin rights.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19888
    - summary: >-
        AuthorizationRule grants are now reflected in the accessiblenamespaces response from permission-browser-apiserver.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20005
