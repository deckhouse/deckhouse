cloud-provider-dvp:
  features:
    - summary: Add readiness check resource to prevent lost OpenTofu state if resource is not ready.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18212
      impact: >-
        A new resource, `kubernetes_resource_ready_v1`, has been introduced to perform readiness
        checks for cloud resources. It replaces the previously used `wait` blocks.

        After updating to this version, the OpenTofu plan will include the creation of
        `kubernetes_resource_ready_v1` resources and the removal of `wait` blocks. To apply these
        changes, you must run `converge`.

        The converge operation is safe and does not modify existing cloud resources. In a normal
        case, the plan should only contain resource creation operations (for example, `Plan: N to
        add`) and should not include `to change` or `to destroy` actions unless other configuration
        changes are present.

        During migration, readiness checks are automatically skipped for existing resources older
        than 5 days. In this case, converge may produce a warning such as the following:


        Warning: Resource is too old for checking ready. Skip readiness check.


        with module.static-node.kubernetes_resource_ready_v1.vm,

        on ../../../terraform-modules/static-node/main.tf line 138, in resource
        "kubernetes_resource_ready_v1" "vm":

        138: resource "kubernetes_resource_ready_v1" "vm" {


        Resource lifetime is 130h2m20.906973419s. Lifetime for skipping is 120h0m0s.


        This warning is expected and does not indicate a problem.
    - summary: >-
        Fail fast on dhctl operations if resources has incorrect status or conditions (like quota
        exceeded) with some limitations.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18212
