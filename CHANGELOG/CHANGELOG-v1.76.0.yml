      pull_request: https://github.com/deckhouse/deckhouse/pull/18834
    - summary: Added optional Gateway API HTTPRoute/ListenerSet publishing and updated oauth2-proxy auth
        responses.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16812
      impact: All dex-authenticator pods will be restarted
    - summary: Added self-service password reset via UserOperation.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18710
    - summary: >-
        Grant kubeadm:cluster-admins group granular full access to module CRDs via dedicated ClusterRole
        d8:user-authn:admin-kubeconfig.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19633
  fixes:
    - summary: Restore ContinueOnConnectorFailure flag handling in Dex configuration
      pull_request: https://github.com/deckhouse/deckhouse/pull/18219
    - summary: Disable implicit flow due to security concerns.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18288
    - summary: Add "cache" get parameter to prevent stale caches from breaking login page
      pull_request: https://github.com/deckhouse/deckhouse/pull/18976
    - summary: fixed openapi test in cse
      pull_request: https://github.com/deckhouse/deckhouse/pull/19088
    - summary: Improve basic-auth-proxy request handling, cache implementation, and shutdown behavior.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20089
    - summary: Fix user-api self-service password reset in closed-loop clusters and restrict it to local
        Dex users.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20371
user-authz:
  features:
    - summary: Restrict user roles from listing namespaces; use AccessibleNamespaces in non-CE editions
