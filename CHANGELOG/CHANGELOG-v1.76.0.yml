terraform-manager:
  features:
    - summary: >-
        Suppressed destructive changes when updating labels and annotations for cloud resources via
        OpenTofu.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19079
      impact: >-
        Unnecessary or destructive plan updates that could occur when updating labels and
        annotations via OpenTofu should be prevented now. If you encounter unexpected converge plans
        or cluster bootstrap issues when using OpenTofu-based providers (such as DVP, DynamiX,
        zVirt, or Yandex), report them to Deckhouse Technical Support.
    - summary: Skip depends_on meta-argument changes for data sources.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18212
      impact: >-
        Changes were introduced in the OpenTofu integration to support the new
        `kubernetes_resource_ready_v1` resource used by `cloud-provider-dvp` and avoid unnecessary
        or destructive plan changes when data sources depend on readiness checks. Other cloud
        providers are not affected. If you encounter unexpected converge plans or cluster bootstrap
        issues when using OpenTofu-based providers (such as DVP, DynamiX, zVirt, or Yandex), report
        them to Deckhouse Technical Support.
