    - summary: fix if node has bashible-uninitialized taint in race condition.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18133
    - summary: Fixed CVEs in `cloud-provider-azure`.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18067
    - summary: Fixed internal node IP discovery for static nodes in DVP clusters.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18441
    - summary: Added deletion of webhook configurations before destroying a Deckhouse deployment.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19041
    - summary: Fix containerd unmount for migration if /var/lib/containerd is mounted manually.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19179
    - summary: fix cve node-manager and opentofu.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19940
