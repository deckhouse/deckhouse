node-manager:
  features:
    - summary: Replaced NGINX implementation of apiserver-proxy with native Go application.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17619
      impact: >-
        During migration to the new Go-based implementation of apiserver-proxy, connection flaps to the
        API server may occur. This change exposes a new hostPort `6480` for health checks and upstreams
        statistics.
    - summary: Added gossip-based node failure detection and gRPC API to fencing-agent.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17771
      impact: >-
        The fencing-agent now uses gossip protocol (`memberlist`) for distributed node health monitoring.

        This prevents incorrect node reboots when control plane is unavailable but worker nodes are healthy.

        A new gRPC API is available via Unix socket at `/tmp/fencing-agent.sock` for querying node membership.
    - summary: setting new label to indicate fencing mode.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18414
    - summary: Added automatic spot-terminated node handling with drain and instance cleanup.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18385
    - summary: Migrated CAPS controller manager to lib-helm defines.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18880
  fixes:
    - summary: fix go lint errors in node-controller
      pull_request: https://github.com/deckhouse/deckhouse/pull/18187
    - summary: Fix capacity parsing logic for DVPInstanceClass and add test case for DVPSpecWorker
      pull_request: https://github.com/deckhouse/deckhouse/pull/17935
      impact: >-
        Capacity values (CPU/memory) for DVPInstanceClass are now correctly extracted according to spec
        shape. Nested `virtualMachine` fields are used and memory quantities like `Gi` are properly parsed.
    - summary: >-
        Fix cluster-autoscaler deadlock when machine creation fails with a non-ResourceExhausted error,
        preventing scale-up to alternative node groups.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18154
    - summary: >-
        Fixed GPU observability in node-manager for full GPU, MIG, and time-slicing workloads (dashboard
        links/queries, VRAM semantics, MIG slice visibility), stabilized DCGM profiling metrics pipeline,
        synced MIG profile config with upstream, and made custom MIG defaults explicit for unspecified
        GPU indexes.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18287
    - summary: deleted incorrect drainTimeout fix
      pull_request: https://github.com/deckhouse/deckhouse/pull/16975
    - summary: Fencing controller no longer deletes Node objects for Notify-mode and Static/CloudStatic
        nodes.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18218
    - summary: caps fix inconsistent pending staticinstance
      pull_request: https://github.com/deckhouse/deckhouse/pull/18379
    - summary: >-
        deploy capi controller and webhooks before basic resources to prevent race condition during upgrades.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18754
    - summary: mitigate CVE-2026-33186
      pull_request: https://github.com/deckhouse/deckhouse/pull/18649
    - summary: >-
        fix Cluster Autoscaler RBAC for CAPI providers, add missing machinedeployments/scale to write
        rule and patch verb to ClusterRole.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18818
    - summary: bump grpc lib version in fencing-agent to fix CVE
      pull_request: https://github.com/deckhouse/deckhouse/pull/19019
    - summary: fix to caps for use staticmachine creationtimestamp
      pull_request: https://github.com/deckhouse/deckhouse/pull/18821
    - summary: optimize node-controller cache resources usage.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19097
    - summary: fix draining hook event generation
      pull_request: https://github.com/deckhouse/deckhouse/pull/19165
    - summary: rollback inject capi conversion hook in crds as on-before-helm
      pull_request: https://github.com/deckhouse/deckhouse/pull/19137
    - summary: >-
        Improve fencing-agent health monitor logging — warn on fallback feeding, error on watchdog starvation,
        add diagnostic context to all feeding log messages.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19514
      impact: >-
        Operators can now detect degraded fencing states (quorum loss, API unreachability) through log
        levels and diagnostic fields without parsing log messages.
    - summary: Added cleanup for oversized MCM MachineSet revision history annotation
      pull_request: https://github.com/deckhouse/deckhouse/pull/19655
    - summary: fix webook validation in node-controller on cri changes in nodegroup.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20098
    - summary: hook to restore apiVersion on CAPI resources.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20374
    - summary: >-
        Include system labels in CAPI MachineDeployment capacity annotation for correct scale-from-zero
        behavior
      pull_request: https://github.com/deckhouse/deckhouse/pull/20387
      impact: >-
        On CAPI-based clusters (DVP, VCD, zVirt, Dynamix, HuaweiCloud), scale-from-zero now correctly
        handles pods with nodeSelector targeting system labels (node.deckhouse.io/group, node.deckhouse.io/type,
        node-role.kubernetes.io/<ng-name>). Previously such pods remained Pending indefinitely when NodeGroup
        had minPerZone=0. No user action required — the fix is applied automatically on upgrade.
    - summary: Add RBAC rules for node-manager
      pull_request: https://github.com/deckhouse/deckhouse/pull/19720
    - summary: Fix fencing-agent crash when starting on a node in maintenance mode.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20583
      impact: >-
        Previously, the fencing-agent would crash with "permission denied" on /dev/watchdog

        when the node had a maintenance annotation (e.g. during Deckhouse updates).

        Now the agent skips watchdog arming during maintenance and arms it automatically

        when maintenance ends.
    - summary: add rbac policies for persistantvolumes to manage from capi-controller-manager.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20646
