terraform-manager:
  features:
    - summary: Skip depends_on meta-argument changes for data sources.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18212
      impact: >-
        Changes were introduced in the OpenTofu integration to support the new
        `kubernetes_resource_ready_v1` resource used by the `cloud-provider-dvp`.

        These changes prevent unnecessary or destructive plan updates that could occur when data
        sources depend on readiness-check resources. The behavior of other cloud providers is not
        affected.

        If you encounter unexpected converge plans or cluster bootstrap issues when using
        OpenTofu-based providers (such as dvp, dynamics, zvirt, or yandex), please report them to
        Deckhouse Technical Support.
