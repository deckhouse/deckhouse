admission-policy-engine:
  features:
    - summary: >-
        Global refactor of constraints and tests, add support for container-level
        SecurityPolicyException
      pull_request: https://github.com/deckhouse/deckhouse/pull/18668
  fixes:
    - summary: Changed default PSS policy to Baseline for unrecognized deckhouse versions
      pull_request: https://github.com/deckhouse/deckhouse/pull/19663
    - summary: Security fix for CVE-2026-33186, CVE-2026-39883.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19461
    - summary: >-
        gatekeeper pods now tolerate csi-not-bootstrapped taint to prevent webhook deadlock during
        worker node replacement
      pull_request: https://github.com/deckhouse/deckhouse/pull/19383
candi:
  features:
    - summary: Add feature gate KubeletEnsureSecretPulledImages
      pull_request: https://github.com/deckhouse/deckhouse/pull/20413
    - summary: >-
        Bashible: master-only step 035 pre-pulls a curated whitelist of node images via ctr so
        kubelet finds them already in the containerd store when pods schedule.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20225
    - summary: Added ClusterRoleBinding in 71 bashible step to see logs.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20201
    - summary: migrate to unified builder with package manager and Go toolchain
      pull_request: https://github.com/deckhouse/deckhouse/pull/19882
    - summary: X-kubernetes-sensitive-data masking sensetive fields
      pull_request: https://github.com/deckhouse/deckhouse/pull/19634
    - summary: >-
        Added support for Kubernetes 1.36 and discontinued support for Kubernetes 1.31. Default
        Kubernetes version was changed 1.33->1.34.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19623
      impact: >-
        The minimum supported version of Kubernetes is now 1.32. All control plane components will
        restart.
    - summary: Add oss.yaml files for cloud provider modules
      pull_request: https://github.com/deckhouse/deckhouse/pull/18989
  fixes:
    - summary: >-
        Prefetch control-plane node images first during cloud bootstrap so install-control-plane no
        longer blocks on image pulls.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20373
    - summary: Fix 01-bootstrap-prerequisites.sh.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20367
    - summary: >-
        Bashible: d8 install deferred from step 004 to 062 (first real use); no longer blocks the
        install batch.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20225
    - summary: >-
        Bashible: disable unattended-upgrades via apt.conf kill switch + systemd mask + async stop
        instead of blocking disable --now / apt remove. Removes dpkg-lock stalls during bootstrap.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20225
    - summary: >-
        Bashible bundle: light-prep parallel groups, sub-step timing, early kubeadm:cluster-admins
        ClusterRoleBinding, skip first-run reboot.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20094
    - summary: >-
        kubelet config: fileCheckFrequency 20s -> 2s — kubelet picks up static-pod manifest changes
        on the next 2-second tick instead of the next 20-second tick.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20094
    - summary: >-
        kube-apiserver static pod: terminationGracePeriodSeconds=1 and aggressive startupProbe on
        bootstrap (runType=ClusterBootstrap); runtime keeps conservative values.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20094
    - summary: >-
        fix static node cleanup to wipe data on externally mounted volumes before unmounting,
        preventing stale data from causing re-bootstrap failures
      pull_request: https://github.com/deckhouse/deckhouse/pull/20066
    - summary: Set ownership of transferred binaries to root:root instead of deckhouse:deckhouse
      pull_request: https://github.com/deckhouse/deckhouse/pull/19796
    - summary: retry kube API errors in rpp-get during registry packages discovery
      pull_request: https://github.com/deckhouse/deckhouse/pull/19673
    - summary: min get 1 wave fixes
      pull_request: https://github.com/deckhouse/deckhouse/pull/19601
    - summary: increase runtimeRequestTimeout for kubelet
      pull_request: https://github.com/deckhouse/deckhouse/pull/19570
    - summary: Improve bootstrap logging and store bootstrap logs in /var/log/d8/bashible/bootstrap.log
      pull_request: https://github.com/deckhouse/deckhouse/pull/19231
    - summary: >-
        remove Python requirement from bashible bootstrap and switch Registry Packages Proxy package
        installation to static binaries.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18626
cert-manager:
