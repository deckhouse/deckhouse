      pull_request: https://github.com/deckhouse/deckhouse/pull/19629
    - summary: Added support for non-standard Linux release names
      pull_request: https://github.com/deckhouse/deckhouse/pull/19581
  fixes:
    - summary: Fixed infinite reconciliation of EgressGateway objects and improved status reporting.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19219
common:
  features:
    - summary: Add oss.yaml files for cloud provider modules
      pull_request: https://github.com/deckhouse/deckhouse/pull/18989
  fixes:
    - summary: Fix golangci-lint for image check-kernel-version
      pull_request: https://github.com/deckhouse/deckhouse/pull/19693
    - summary: fix StaticInstance preflight check for fails when SSHCredentials has no private key.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19527
    - summary: Normalize kernel version from uname to semver
      pull_request: https://github.com/deckhouse/deckhouse/pull/19329
      impact: >-
        Nodes with Debian 13 kernels (e.g. 6.12.74+deb13+1-cloud-amd64) previously failed the kernel
        version check and could not join the cluster.
control-plane-manager:
  features:
    - summary: >-
        Publish API ingress settings are moved to control-plane-manager module, ingress resource is
        moved to kube-system namespace.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18628
  fixes:
    - summary: Fix authorization-mode for webhookUrl mode
      pull_request: https://github.com/deckhouse/deckhouse/pull/19760
deckhouse:
  features:
    - summary: Add package health monitor.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19711
    - summary: Add grafana dashboard and monitoring for webhook handler
      pull_request: https://github.com/deckhouse/deckhouse/pull/19457
    - summary: Check registry pagination to enable incremental scan.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18898
  fixes:
    - summary: Fix packages deckhouse requirements.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19731
    - summary: Regenerate the only golden missed by the textual-clean.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19607
deckhouse-controller:
  fixes:
    - summary: Fixed adding the DEFAULT_RELEASE_CHANNEL env to CSE.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19785
dhctl:
  features:
    - summary: Add global flag dhctl, improve interactive logging.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19879
    - summary: add basic OpenTelemetry support to dhctl
      pull_request: https://github.com/deckhouse/deckhouse/pull/19738
    - summary: Logging refactoring for dhctl.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19422
  fixes:
    - summary: Fix panic in in-cluster converge-migration run of dhctl.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19823
    - summary: Fix static preflights for dhctl run outside an install container.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19809
    - summary: Fix panic in dhctl converge command
      pull_request: https://github.com/deckhouse/deckhouse/pull/19753
    - summary: fix panic dereference in dhctl destroy command.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19716
    - summary: Refactor SSH client configuration globals
      pull_request: https://github.com/deckhouse/deckhouse/pull/19705
    - summary: Struct options instead of global vars
      pull_request: https://github.com/deckhouse/deckhouse/pull/19704
    - summary: Replace app package references with options package in multiple files
      pull_request: https://github.com/deckhouse/deckhouse/pull/19702
    - summary: Fix dhctl bootstrap-phase install-deckhouse with kubeconfig.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19503
    - summary: add NodeReady wait to dhctl converge and improve etcd check output
      pull_request: https://github.com/deckhouse/deckhouse/pull/18991
docs:
  features:
    - summary: Update deckhouse web modules architecture section.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19758
    - summary: Add new security events documentation page
      pull_request: https://github.com/deckhouse/deckhouse/pull/19706
    - summary: Refactor the GUI installer documentation on the website and make it as the primary way.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19450
    - summary: Add oss.yaml files for cloud provider modules
      pull_request: https://github.com/deckhouse/deckhouse/pull/18989
    - summary: Add PDF generation.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18975
  fixes:
    - summary: Enhance PDF rendering features
      pull_request: https://github.com/deckhouse/deckhouse/pull/19868
    - summary: Add .vex and module.yaml to exception in CI linter.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19558
    - summary: Updated system requirements in the production ready guide.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19507
    - summary: Split DVP FAQ into smaller topic-based pages.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19413
extended-monitoring:
  fixes:
    - summary: >-
        Harden `CronJobSchedulingError` alert annotation against missing metrics and out-of-range
        timestamps to stop Prometheus log spam.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19399
ingress-nginx:
  features:
    - summary: Isolated configuration validation was implemented.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18145
      impact: All Ingress-NGINX controller pods will be restarted.
  fixes:
    - summary: VPA default mode spec was fixed.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19473
istio:
  features:
    - summary: Change API-proxy VPA update mode to fix an interruption in work
      pull_request: https://github.com/deckhouse/deckhouse/pull/19602
    - summary: Added Grafana dashboard for ztunnel component monitoring.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19468
    - summary: Add explicit configuration option `ambient.enabled` to manage Istio ambient mesh.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19318
    - summary: Changed preferred istio default subdomain for metadata-exporter
      pull_request: https://github.com/deckhouse/deckhouse/pull/19299
      impact: matadata-exporter pod will be restarted
    - summary: Implement graceful metadata secret renewal for multiclusters.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19278
  fixes:
    - summary: fixed discovery_operator_versions_to_install.go hook to migrate from 1.21 to 1.25
      pull_request: https://github.com/deckhouse/deckhouse/pull/19434
    - summary: ingressGateway advertise FQDN does not create a ServiceEntry due to an error
      pull_request: https://github.com/deckhouse/deckhouse/pull/19395
metallb:
  features:
    - summary: Added RBACv1 roles (User and ClusterAdmin) for MetalLoadBalancerClass resource.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19627
node-manager:
  features:
    - summary: >-
        Allow `ClusterEditor` to manage `NodeGroup` and extend `ClusterAdmin`/`User` RBAC for
        ClusterAPI and MCM resources used by `cluster-autoscaler` and `fencing-agent`.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19677
    - summary: Add Kyverno Chainsaw e2e tests for fencing-agent deploy and runtime verification.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19475
    - summary: Added Instance API v1alpha2 with unified machine and bashible status model
      pull_request: https://github.com/deckhouse/deckhouse/pull/18795
  fixes:
    - summary: add dh version to bashible-apiserver context
      pull_request: https://github.com/deckhouse/deckhouse/pull/19414
    - summary: add rbac policies for persistantvolumes to manage from capi-controller-manager.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19291
    - summary: fix to caps for use staticmachine creationtimestamp
      pull_request: https://github.com/deckhouse/deckhouse/pull/18821
registrypackages:
