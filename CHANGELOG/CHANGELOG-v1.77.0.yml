admission-policy-engine:
  features:
    - summary: >-
        Global refactor of constraints and tests, add support for container-level
        SecurityPolicyException
      pull_request: https://github.com/deckhouse/deckhouse/pull/18668
  fixes:
    - summary: Changed default PSS policy to Baseline for unrecognized deckhouse versions
      pull_request: https://github.com/deckhouse/deckhouse/pull/19663
    - summary: Security fix for CVE-2026-33186, CVE-2026-39883.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19461
    - summary: >-
        gatekeeper pods now tolerate csi-not-bootstrapped taint to prevent webhook deadlock during
        worker node replacement
      pull_request: https://github.com/deckhouse/deckhouse/pull/19383
candi:
  features:
    - summary: migrate to unified builder with package manager and Go toolchain
      pull_request: https://github.com/deckhouse/deckhouse/pull/19882
    - summary: Add oss.yaml files for cloud provider modules
      pull_request: https://github.com/deckhouse/deckhouse/pull/18989
  fixes:
    - summary: Set ownership of transferred binaries to root:root instead of deckhouse:deckhouse
      pull_request: https://github.com/deckhouse/deckhouse/pull/19796
    - summary: retry kube API errors in rpp-get during registry packages discovery
      pull_request: https://github.com/deckhouse/deckhouse/pull/19673
    - summary: min get 1 wave fixes
      pull_request: https://github.com/deckhouse/deckhouse/pull/19601
    - summary: increase runtimeRequestTimeout for kubelet
      pull_request: https://github.com/deckhouse/deckhouse/pull/19570
    - summary: Improve bootstrap logging and store bootstrap logs in /var/log/d8/bashible/bootstrap.log
      pull_request: https://github.com/deckhouse/deckhouse/pull/19231
    - summary: >-
        remove Python requirement from bashible bootstrap and switch Registry Packages Proxy package
        installation to static binaries.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18626
cert-manager:
  fixes:
    - summary: Security fixes for CVE-2026-33186, VE-2026-34986, CVE-2026-39883.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19461
ci:
  features:
    - summary: Action for cncf conformance tests
      pull_request: https://github.com/deckhouse/deckhouse/pull/19712
    - summary: Add k8s 1.36 to CI.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19337
  fixes:
    - summary: >-
        Add shared deckhouse/common WERF cache to avoid per-edition rebuilds and whitelist dev/candi
        and common/candi images
      pull_request: https://github.com/deckhouse/deckhouse/pull/19840
    - summary: Fix PDF build pipeline reliability in CI.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19780
    - summary: Reduce CI noise in PDF generation pipelines.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19779
    - summary: Fix CI for generating PDF documentation files.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19775
