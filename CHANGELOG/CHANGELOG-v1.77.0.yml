control-plane-manager:
  features:
    - summary: Add PKI/kubeconfig renewal libraries and structured expiration reports
      pull_request: https://github.com/deckhouse/deckhouse/pull/20129
    - summary: Add a shared `controlplane` API for reading local control-plane certificate expiration
      pull_request: https://github.com/deckhouse/deckhouse/pull/19959
    - summary: Add etcd keys signature support.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19427
    - summary: >-
        Publish API ingress settings are moved to control-plane-manager module, ingress resource is
        moved to kube-system namespace.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18628
  fixes:
    - summary: fixed private build in etcd
      pull_request: https://github.com/deckhouse/deckhouse/pull/20113
    - summary: >-
        calculate_resources_requests is now stable across the kubelet warm-up window — uses
        Node.Status.Capacity minus max(actual kubelet reservation, floor), so the second hook run
        does not re-render every CP static-pod manifest.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20094
    - summary: >-
        cpm DaemonSet now talks to apiserver via the local kubernetes-api-proxy static pod
        (127.0.0.1:6445), removing its dependency on cilium-initialised ClusterIP routing during
        bootstrap.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20094
    - summary: >-
        Leader election is now conditional (helm_lib_is_ha_to_value) — on for HA, off for
        single-master, where every cpm controller is already partitioned by spec.nodeName. Stops cpm
        from crashing with leader election lost when its very first reconcile rewrites
        apiserver/etcd.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20094
    - summary: >-
        Stop issuing `apiserver-kubelet-client` credentials in the `kubeadm:cluster-admins` group
        and rely on the dedicated kubelet API binding.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19966
    - summary: Admins now can manage modulereleases, moduledocumentations and modulesettingsdefinitions
      pull_request: https://github.com/deckhouse/deckhouse/pull/19931
    - summary: Fix `publishAPI` migration for clusters with legacy `user-authn` v1 settings.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19921
    - summary: Add performance tunning for etcd arbiter mode
      pull_request: https://github.com/deckhouse/deckhouse/pull/19897
    - summary: Fix authorization-mode for webhookUrl mode
      pull_request: https://github.com/deckhouse/deckhouse/pull/19760
csi-vsphere:
  fixes:
    - summary: Migrated storage policy support  from the `cloud-provider-vsphere` module.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19965
deckhouse:
  features:
    - summary: Persist default scanInterval on PackageRepository.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20357
    - summary: Surface scan results on PackageRepository status.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20279
    - summary: Add conditions summary to applications.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20273
    - summary: >-
        Package requirements gain a `noneOf` bucket — groups of forbidden module dependencies where
        no member may be installed (or installed at a version matching the per-member constraint).
        Completes the four-way bucket matrix alongside `mandatory`, `conditional`, and `anyOf`.
        NoneOf is checker-only and does not contribute to the dependency graph, so mutual conflict
        declarations between packages do not produce cycles.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20070
    - summary: >-
        Package requirements gain an `anyOf` bucket — groups of alternative module dependencies
        where at least one member must be installed. AnyOf is checker-only and does not contribute
        to the dependency graph, so mutual fallback references between packages do not produce
        cycles.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20064
    - summary: >-
        Package requirements now partition module dependencies into `mandatory` and `conditional`
        lists instead of using the `!optional` constraint suffix.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20047
    - summary: The PackageRepositoryOperation type field now uses an enum.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19951
    - summary: Add newly-found versions counter to PackageRepositoryOperation.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19929
    - summary: Packages cleanup orphan nelm releases.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19773
    - summary: Add package health monitor.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19711
    - summary: Add grafana dashboard and monitoring for webhook handler
      pull_request: https://github.com/deckhouse/deckhouse/pull/19457
    - summary: Check registry pagination to enable incremental scan.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18898
  fixes:
    - summary: Fix image extraction to respect opaque whiteouts.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20502
    - summary: Delete module documentation when module is disabled
      pull_request: https://github.com/deckhouse/deckhouse/pull/20434
    - summary: fixed src-artifact in webhook-operator
      pull_request: https://github.com/deckhouse/deckhouse/pull/20299
    - summary: Fix Scaled stuck Unknown on controller startup
      pull_request: https://github.com/deckhouse/deckhouse/pull/20169
    - summary: >-
        Add a readiness probe to the `webhook-handler` deployment that gates on `shell-operator`
        process health.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20158
    - summary: >-
        Replace deprecated VPA `updateMode` `Auto` with `InPlaceOrRecreate` for CSI controller and
        node VPAs.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20118
      impact: >-
        Cloud-provider and other modules using CSI helm_lib templates no longer trigger VPA
        deprecation warnings on upgrade. Existing CSI VPAs are updated to `InPlaceOrRecreate` on the
