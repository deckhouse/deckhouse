    - summary: change users for Yandex and opestack e2e tests
      pull_request: https://github.com/deckhouse/deckhouse/pull/18763
cilium-hubble:
  fixes:
    - summary: Fixed CVE-2026-33186 in the hubble-ui image.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18721
cloud-provider-dvp:
  fixes:
    - summary: >-
        update cloud-controller-manager dependencies and VEX metadata to address current CVE
        findings
      pull_request: https://github.com/deckhouse/deckhouse/pull/19272
    - summary: fixe cve
      pull_request: https://github.com/deckhouse/deckhouse/pull/18599
cni-simple-bridge:
  fixes:
    - summary: Updated base image reference to support new Werf import format.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19313
common:
  fixes:
    - summary: fix cve's in docker-registry docker_auth image.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19356
    - summary: Fixed an issue where Trivy could not detect VEX files in coredns images.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19316
