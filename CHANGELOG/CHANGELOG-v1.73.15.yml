    - summary: Remediated CVE-2026-32285 in crictl dependencies.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19072
    - summary: Added vex with CVE-2026-33186 for kubeadm and kubelet.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18783
    - summary: Added vex with CVE-2026-33186.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18700
terraform-manager:
  fixes:
    - summary: bump moby/spdystream to v0.5.1 in terraform-manager-dvp image to fix CVE
      pull_request: https://github.com/deckhouse/deckhouse/pull/19722
    - summary: fixed cve in terraform manager
      pull_request: https://github.com/deckhouse/deckhouse/pull/18892
    - summary: Implemented automatic VEX file merging from dhctl into terraform-manager images
      pull_request: https://github.com/deckhouse/deckhouse/pull/18892
    - summary: fixed cve in terraform manager and update version in terraform-manager
      pull_request: https://github.com/deckhouse/deckhouse/pull/18800
    - summary: Fixed critical CVEs in dependencies across all cloud providers
      pull_request: https://github.com/deckhouse/deckhouse/pull/18599
tools:
  fixes:
    - summary: Added HTTP client proxy support
      pull_request: https://github.com/deckhouse/deckhouse/pull/18583
upmeter:
  fixes:
    - summary: >-
        Fix CVE-2026-33186 (google.golang.org/grpc) in the upmeter image; drop unmaintained
        otel-contrib cortex exporter dependency by inlining the small Config type already used.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19380
    - summary: >-
        Add proper securityContext to the upmeter probe to meet the restricted security profile
        constraints.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18492
user-authn:
  features:
    - summary: >-
        Add UserOperation CR (Lock, Unlock, ResetPassword, Reset2FA) for local users and Lock/Unlock
        for external password-connector accounts.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19664
    - summary: add detail logging in some places for dex
      pull_request: https://github.com/deckhouse/deckhouse/pull/19595
    - summary: >-
        Add per-IP rate limit on Dex password endpoints and account lockout for LDAP / Crowd
        connectors.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19552
  fixes:
    - summary: Security fix for CVE-2026-34986.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19222

