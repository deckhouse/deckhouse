local-path-provisioner:
  fixes:
    - summary: >-
        Bump `local-path-provisioner` to `v0.0.34` to fix CVE-2025-62878 (path traversal via `StorageClass.parameters.pathPattern`,
        CVSS 10.0).
      pull_request: https://github.com/deckhouse/deckhouse/pull/19354
      impact: >-
        The `local-path-provisioner` Pod is restarted during the update. PV provisioning/teardown briefly
        pauses while the new Pod becomes Ready; existing volumes are not affected.
    - summary: >-
        Add wildcard tolerations to the helper pod template so PVC provisioning works on tainted nodes
        after local-path-provisioner v0.0.32+.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19449
    - summary: >-
        Backport HelperPod template validation to `local-path-provisioner` v0.0.34 to fix CVE-2026-44543
        (HelperPod Template Injection, GHSA-7fxv-8wr2-mfc4, CVSS 8.7 High).
      pull_request: https://github.com/deckhouse/deckhouse/pull/20329
      impact: >-
        The `local-path-provisioner` Pod is restarted during the update. PV provisioning/teardown briefly
        pauses while the new Pod becomes Ready; existing volumes are not affected. After the update the
        provisioner refuses to create a HelperPod whose template (loaded from the `local-path-config`
        ConfigMap) declares privileged containers, hostPath/custom volumes, host namespaces, added Linux
        capabilities or other security-sensitive fields, so any pre-existing manual override of `helperPod.yaml`
        that uses one of these fields must be removed before the upgrade.
    - summary: >-
        Update local-path-provisioner to v0.0.36 to pick up the upstream fix for CVE-2026-44543 (HelperPod
        template injection, CVSS 8.7).
      pull_request: https://github.com/deckhouse/deckhouse/pull/20449
      impact: >-
        Custom edits to the local-path-config ConfigMap that set unsafe HelperPod fields (privileged,
        capabilities, host namespaces, initContainers, custom volumes/volumeMounts, container probes/lifecycle,
        sysctls, etc.) will be rejected by the provisioner at startup. Default Deckhouse installations
        are unaffected.
    - summary: >-
        Update local-path-provisioner to v0.0.36 to align release-1.73 with the upstream fix for CVE-2026-44543
        (HelperPod template injection, CVSS 8.7) instead of carrying a separate backport patch.
      pull_request: https://github.com/deckhouse/deckhouse/pull/20455
      impact: >-
        The `local-path-provisioner` Pod is restarted during the update. Custom edits to the `local-path-config`
        ConfigMap that set unsafe HelperPod fields (privileged, capabilities, host namespaces, initContainers,
        custom volumes/volumeMounts, container probes/lifecycle, sysctls, etc.) will be rejected by the
        provisioner at startup. Default Deckhouse installations are unaffected.
