candi:
  features:
    - summary: Added support of the new module csi-vsphere.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14549
    - summary: Implemented adding metadata to VCD objects such as networks, virtual machines, and disks.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14505
  fixes:
    - summary: Fix opentofu CVE.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15402
    - summary: kubectl-exec makes a direct request to the control plane if the proxy is unavailable
      pull_request: https://github.com/deckhouse/deckhouse/pull/15279
ci:
  features:
    - summary: Switch e2e openstack to use commander.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15291
    - summary: Incorporate DeckhouseRelease switch into upgrade tests.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15288
    - summary: Remove unsupported k8s version from workflow.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15216
    - summary: Disable copying modules in e2e testing
      pull_request: https://github.com/deckhouse/deckhouse/pull/15014
    - summary: Creating more detailed logs for analysis and speeding up platform build
      pull_request: https://github.com/deckhouse/deckhouse/pull/14446
  fixes:
    - summary: Fix commander e2e test script.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15342
    - summary: Make Render workflow dependent on receiving PR information.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15016
    - summary: Set DCGM imports to the same stage.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14960
cloud-provider-dvp:
  features:
    - summary: Now cilium module is enabled if others CNIs not provided
      pull_request: https://github.com/deckhouse/deckhouse/pull/15084
    - summary: fix single-node LoadBalancer bug and add multi-LB per node support
      pull_request: https://github.com/deckhouse/deckhouse/pull/14883
  fixes:
    - summary: fix CVE-2025-22868
      pull_request: https://github.com/deckhouse/deckhouse/pull/15396
    - summary: Fix CVE-2025-22869 && CVE-2024-45337.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15390
cloud-provider-huaweicloud:
  fixes:
    - summary: fix providerID format and exclude 127.0.0.0/8 in node IP selection
      pull_request: https://github.com/deckhouse/deckhouse/pull/15183
cloud-provider-vcd:
  features:
    - summary: Implemented adding metadata to VCD objects such as networks, virtual machines, and disks.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14505
  fixes:
    - summary: Fix fetching VM templates from organization catalogs without direct access to organizastion
      pull_request: https://github.com/deckhouse/deckhouse/pull/14980
cloud-provider-yandex:
  fixes:
    - summary: Set CSI driver metadata querying timeouts
      pull_request: https://github.com/deckhouse/deckhouse/pull/15054
cloud-provider-zvirt:
  features:
    - summary: Added support zvirt cloud provider to cse.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14683
cni-cilium:
  fixes:
    - summary: fixed egress gateway reselection for case node hard reset
      pull_request: https://github.com/deckhouse/deckhouse/pull/15090
deckhouse:
  features:
    - summary: The module source deckhouse is the default source for modules.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15437
    - summary: Inject registry to module values.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14991
  fixes:
    - summary: fix shell-operator http client to handle resources correctly
      pull_request: https://github.com/deckhouse/deckhouse/pull/15182
deckhouse-controller:
  features:
    - summary: bump dmt version, add ignores
      pull_request: https://github.com/deckhouse/deckhouse/pull/15322
    - summary: LTS channel for modules
      pull_request: https://github.com/deckhouse/deckhouse/pull/15321
    - summary: bump dmt version, add ignores
      pull_request: https://github.com/deckhouse/deckhouse/pull/15311
    - summary: add structured webhook response contract with status codes
      pull_request: https://github.com/deckhouse/deckhouse/pull/15256
    - summary: add new objects to debug archive
      pull_request: https://github.com/deckhouse/deckhouse/pull/15047
    - summary: Add conversion rules exposure in ModuleSettingsDefinition object
      pull_request: https://github.com/deckhouse/deckhouse/pull/15032
      impact: >-
        ModuleSettingsDefinition objects now include conversion rules in the conversions field,
        enabling users to preview how module settings will be transformed between versions
    - summary: task queue performance improvements with linked list implementation
      pull_request: https://github.com/deckhouse/deckhouse/pull/14962
    - summary: handle errors while processing source modules
      pull_request: https://github.com/deckhouse/deckhouse/pull/14953
    - summary: add tracing to dependency container http client
      pull_request: https://github.com/deckhouse/deckhouse/pull/14298
  fixes:
    - summary: fix hook input and snapshot typo
      pull_request: https://github.com/deckhouse/deckhouse/pull/15411
    - summary: fix panic on snapshotIter
      pull_request: https://github.com/deckhouse/deckhouse/pull/15385
    - summary: fix null pointer error
      pull_request: https://github.com/deckhouse/deckhouse/pull/15361
    - summary: fixed bug with re-enabled module using old values
      pull_request: https://github.com/deckhouse/deckhouse/pull/15045
    - summary: Implement structured releaseQueueDepth calculation with hierarchical version delta tracking
      pull_request: https://github.com/deckhouse/deckhouse/pull/15031
      impact: >-
        The releaseQueueDepth metric now accurately reflects actionable release gaps with patch
        version normalization; major version tracking added for future alerting
deckhouse-tools:
  fixes:
    - summary: add tolerations support to DexAuthenticator configuration
      pull_request: https://github.com/deckhouse/deckhouse/pull/14869
dhctl:
  fixes:
    - summary: Fix opentofu CVE.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15402
    - summary: Fixed panic during dhctl destroy
      pull_request: https://github.com/deckhouse/deckhouse/pull/15305
    - summary: trigger control-plane pre/post hooks only if a node is being recreated/deleted
      pull_request: https://github.com/deckhouse/deckhouse/pull/14998
docs:
  features:
    - summary: add module.yaml metric
      pull_request: https://github.com/deckhouse/deckhouse/pull/15078
  fixes:
    - summary: Fixed back button on the second step of DVP GS.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15341
    - summary: Fixed note about yum and which in RED OS in the requirements section of GS.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15259
    - summary: Added a note about the OS based on Red Hat in The Getting Started step 5.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15188
    - summary: Fixed the local launch of documentation
      pull_request: https://github.com/deckhouse/deckhouse/pull/15162
documentation:
  features:
    - summary: add backend timeout metric
      pull_request: https://github.com/deckhouse/deckhouse/pull/15050
  fixes:
    - summary: add tolerations support to DexAuthenticator configuration
      pull_request: https://github.com/deckhouse/deckhouse/pull/14869
extended-monitoring:
  fixes:
    - summary: Fix device label missing in NodeDiskBytesUsage and NodeDiskInodesUsage
      pull_request: https://github.com/deckhouse/deckhouse/pull/15300
ingress-nginx:
  features:
    - summary: Added NGINX memory profiling for the Ingress controller.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14736
  fixes:
    - summary: Disabled log messages such as `Error obtaining Endpoints for Service...`.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15260
    - summary: fix NginxIngressDaemonSetReplicasUnavailable alert description
      pull_request: https://github.com/deckhouse/deckhouse/pull/15244
istio:
  fixes:
    - summary: Fixed metrics port for operator 1.25 and newer
      pull_request: https://github.com/deckhouse/deckhouse/pull/15124
monitoring-kubernetes:
  fixes:
    - summary: Add `tier=cluster` label
      pull_request: https://github.com/deckhouse/deckhouse/pull/15290
multitenancy-manager:
  fixes:
    - summary: patch critical CVEs in dependencies
      pull_request: https://github.com/deckhouse/deckhouse/pull/15312
      impact: >-
        Users should update to this patch release to mitigate known security vulnerabilities. No
        breaking changes expected.
node-manager:
  features:
    - summary: Add integrity patch for CSE
      pull_request: https://github.com/deckhouse/deckhouse/pull/15077
  fixes:
    - summary: change base image for d8-shutdown-inhibitor artifact
      pull_request: https://github.com/deckhouse/deckhouse/pull/15086
openvpn:
  fixes:
    - summary: >-
        ovpn-admin upgraded to fix the validation of static IP addresses, as well as add routes
        migration during the rotation of client certificates.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14578
      impact: the openvpn instances will be restarted.
prometheus:
  fixes:
    - summary: fix template indentation
      pull_request: https://github.com/deckhouse/deckhouse/pull/15434
      impact: fix template indentation
registry:
  features:
    - summary: Added configurable unmanaged mode
      pull_request: https://github.com/deckhouse/deckhouse/pull/14820
    - summary: 'Added registry check modes: default, relax'
      pull_request: https://github.com/deckhouse/deckhouse/pull/14820
    - summary: Disable change registry helper when registry module is enabled
      pull_request: https://github.com/deckhouse/deckhouse/pull/14820
registry-packages-proxy:
  fixes:
    - summary: small fix of erofs installation script
      pull_request: https://github.com/deckhouse/deckhouse/pull/15067
runtime-audit-engine:
  fixes:
    - summary: reduced memory limit floor for falco containers
      pull_request: https://github.com/deckhouse/deckhouse/pull/15301
    - summary: Fix containerd socket mountpoint (change its type from dir to file).
      pull_request: https://github.com/deckhouse/deckhouse/pull/15040
service-with-healthchecks:
  fixes:
    - summary: The module's security has been improved.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15358
terraform-manager:
  fixes:
    - summary: Fix opentofu CVE.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15402
tools:
  features:
    - summary: bump deckhouse-cli v0.18.0
      pull_request: https://github.com/deckhouse/deckhouse/pull/15451
    - summary: bump deckhouse-cli v0.18.0
      pull_request: https://github.com/deckhouse/deckhouse/pull/15443
user-authn:
  features:
    - summary: >-
        Propagate proxy envs to dex to allow requesting OIDC discovery endpoints in closed
        environments.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15292
    - summary: Add `status.lock` fields (`state`, `reason`, `message`, `until`) to the User CR
      pull_request: https://github.com/deckhouse/deckhouse/pull/15158
      impact: >-
        User lock information is now available directly in the User CR, improving visibility and
        integration with external systems
  fixes:
    - summary: Fix CVE-2025-22868
      pull_request: https://github.com/deckhouse/deckhouse/pull/15420
      impact: |-
        This update fixes a security vulnerability in the `user-authn` module (CVE-2025-22868)
        that could potentially allow bypass of authentication validation.
    - summary: Fix CVE-2025-30204, CVE-2025-22868, and CVE-2024-28180 in the user-authn module
      pull_request: https://github.com/deckhouse/deckhouse/pull/15208
      impact: Fixes multiple security vulnerabilities that could affect authentication components
    - summary: User now can't create groups with  recursive loops in nested group's hierarchy
      pull_request: https://github.com/deckhouse/deckhouse/pull/15139

