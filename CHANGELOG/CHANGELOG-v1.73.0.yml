user-authn:
  features:
    - summary: >-
        Increase Dex AuthRequest flexibility with token-bucket rate-limiting and global
        ResourceQuota
      pull_request: https://github.com/deckhouse/deckhouse/pull/15421
    - summary: >-
        Dex can run even if one of OIDC providers is not reachable. It resolves the issue when a
        single unreachable provider can compromise authentication in the cluster.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15379
    - summary: >-
        Propagate proxy envs to dex to allow requesting OIDC discovery endpoints in closed
        environments.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15292
    - summary: Add `status.lock` fields (`state`, `reason`, `message`, `until`) to the User CR
      pull_request: https://github.com/deckhouse/deckhouse/pull/15158
      impact: >-
        User lock information is now available directly in the User CR, improving visibility and
        integration with external systems
  fixes:
    - summary: Fix cert generation job deletion
      pull_request: https://github.com/deckhouse/deckhouse/pull/15764
    - summary: Show 'Access Denied' instead of 'Internal Error' for restricted local users
      pull_request: https://github.com/deckhouse/deckhouse/pull/15593
      impact: >-
        Users will see a clear error message when their login is restricted by allowed group or
        email, instead of a confusing internal error.
    - summary: >-
        Ensure validity of names for DexAuthenticator resources (truncate >63 and add deterministic
        5-char hash suffix)
      pull_request: https://github.com/deckhouse/deckhouse/pull/15544
    - summary: Fix CVE-2025-22868
      pull_request: https://github.com/deckhouse/deckhouse/pull/15420
      impact: |-
        This update fixes a security vulnerability in the `user-authn` module (CVE-2025-22868)
        that could potentially allow bypass of authentication validation.
    - summary: Fix CVE-2025-30204, CVE-2025-22868, and CVE-2024-28180 in the user-authn module
      pull_request: https://github.com/deckhouse/deckhouse/pull/15208
      impact: Fixes multiple security vulnerabilities that could affect authentication components
    - summary: User now can't create groups with  recursive loops in nested group's hierarchy
      pull_request: https://github.com/deckhouse/deckhouse/pull/15139
