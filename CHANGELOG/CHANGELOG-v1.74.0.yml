      pull_request: https://github.com/deckhouse/deckhouse/pull/16619
    - summary: make AllowTcpForwarding preflight check interrupt bootstrap proccess
      pull_request: https://github.com/deckhouse/deckhouse/pull/16250
    - summary: Fix endless converge loop for clusters with NAT instances
      pull_request: https://github.com/deckhouse/deckhouse/pull/16230
    - summary: Check all dhctl dependencies from single SSH connection.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16120
    - summary: Fix and refactor cleaning temp dir function for better cleaning.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15794
