admission-policy-engine:
  features:
    - summary: Added SecurityPolicyException CRD for fine-grained security policy exceptions
      pull_request: https://github.com/deckhouse/deckhouse/pull/16162
candi:
  features:
    - summary: Add k8s featureGates management via the control-plane-manager module.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16185
    - summary: added support for Kubernetes 1.34 and discontinued support for Kubernetes 1.29.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15518
      impact: >-
        The minimum supported version of Kubernetes is now 1.30. All control plane components will
        restart.
  fixes:
    - summary: Improve node-user retry logic to skip failing API servers.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16493
    - summary: bb-event-error-create function fix
      pull_request: https://github.com/deckhouse/deckhouse/pull/16411
    - summary: Bashible deckhouse path special case for AltLinux.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16407
    - summary: Exclude I/O loopback from node ip discovery.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16179
ci:
  features:
    - summary: >-
        Enhanced Gitleaks secret scanning with custom rules for Werf, HashiCorp Vault, and OpenBao
        tokens
      pull_request: https://github.com/deckhouse/deckhouse/pull/16532
      impact: >-
        Gitleaks now detects Werf secret keys in `.werf_secret_key` files, all HashiCorp Vault token
        types (hvs, hvb, hvr), and OpenBao tokens (S. prefix). This improves security by catching
        previously undetected secrets during code reviews and CI scans.
    - summary: Add scheduled Gitleaks full scan workflow for daily security monitoring
      pull_request: https://github.com/deckhouse/deckhouse/pull/16114
      impact: >-
        Enhanced security monitoring with automated daily scanning of the entire repository for
        potential secret leaks using Gitleaks v8.28.0. The workflow runs every day at midnight UTC
        and provides comprehensive coverage beyond the existing PR-based diff scanning.
    - summary: Set up automatic cleaning the stage registry.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16074
  fixes:
    - summary: Avoid duplication when creating a registry.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16580
    - summary: ci fix remove e2e labels
      pull_request: https://github.com/deckhouse/deckhouse/pull/16099
cloud-provider-dvp:
  fixes:
    - summary: Stop preferring fqdn to hostname in cloud-init configurations.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16124
cloud-provider-huaweicloud:
  features:
    - summary: allow users to overwrite default NIC in both CloudPermanent and CloudEphemeral
      pull_request: https://github.com/deckhouse/deckhouse/pull/15810
    - summary: add Virtual IP support
      pull_request: https://github.com/deckhouse/deckhouse/pull/15600
cloud-provider-openstack:
  fixes:
    - summary: fix discovery data merging for hybrid cases
      pull_request: https://github.com/deckhouse/deckhouse/pull/16067
cni-cilium:
  features:
    - summary: >-
        Add the ability to configure the mapDynamicSizeRatio parameter for specific nodes using
        CiliumNodeConfig.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16326
    - summary: Add SCTP support
      pull_request: https://github.com/deckhouse/deckhouse/pull/16297
control-plane-manager:
  features:
    - summary: Dynamic setting of terminated-pod-gc-threshold depends on number of nodes in cluster
      pull_request: https://github.com/deckhouse/deckhouse/pull/16266
      impact: >-
        After upgrading Deckhouse with this feature, the kube-controller-manager will be restarted,
        and the default value of terminated-pod-gc-threshold will be reconfigured
    - summary: Add k8s featureGates management via the control-plane-manager module.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16185
    - summary: Added logging before running the kubeadm command to make troubleshooting easier
      pull_request: https://github.com/deckhouse/deckhouse/pull/15943
  fixes:
    - summary: >-
        No more errors "failed to read authentication config file" in kube-apiserver after
        restarting pod control-plane-manager
      pull_request: https://github.com/deckhouse/deckhouse/pull/15975
deckhouse:
  features:
    - summary: Add symlink installer
      pull_request: https://github.com/deckhouse/deckhouse/pull/16559
    - summary: Add nelm client.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16020
    - summary: Add package manager.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16013
    - summary: Integrity control for modules - use read only file system model.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15019
  fixes:
    - summary: Fix symlink module installer.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16594
    - summary: Fix module restoring
      pull_request: https://github.com/deckhouse/deckhouse/pull/16575
    - summary: Fix and improve package management.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16505
deckhouse-controller:
  features:
    - summary: add package status service
      pull_request: https://github.com/deckhouse/deckhouse/pull/16465
    - summary: fix packages flow
      pull_request: https://github.com/deckhouse/deckhouse/pull/16310
    - summary: add application controller
      pull_request: https://github.com/deckhouse/deckhouse/pull/16189
    - summary: switch on nelm in controller logic
      pull_request: https://github.com/deckhouse/deckhouse/pull/16142
    - summary: >-
        Implement Package Repository Discovery System with automatic package scanning from OCI
        registries
      pull_request: https://github.com/deckhouse/deckhouse/pull/16125
    - summary: add controller for ApplicationPackageVersion resource
      pull_request: https://github.com/deckhouse/deckhouse/pull/16075
    - summary: Add foundational API structures and controllers for Package System.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16016
    - summary: collect-debug-info command has been moved to the d8 utility.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15767
    - summary: Restrict using of `d8ms-*` prefix for all objects.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15147
      impact: Objects with prefix `d8ms-` could NOT be created by users in their's D8 clusters.
  fixes:
    - summary: fix conversion applying for external modules
      pull_request: https://github.com/deckhouse/deckhouse/pull/16546
    - summary: pass metrics storage to addon/shell operator constructors
      pull_request: https://github.com/deckhouse/deckhouse/pull/16536
    - summary: Fixed module documentation collection from EROFS mounted modules
      pull_request: https://github.com/deckhouse/deckhouse/pull/16495
    - summary: handle metrics if hook are failed
      pull_request: https://github.com/deckhouse/deckhouse/pull/16319
    - summary: Fix incorrect time value in minor release notification messages
      pull_request: https://github.com/deckhouse/deckhouse/pull/16271
    - summary: bump go-openapi validate
      pull_request: https://github.com/deckhouse/deckhouse/pull/16183
