    - summary: Remediated CVE-2026-32285 in crictl dependencies.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19071
terraform-manager:
  features:
    - summary: >-
        Suppress destructive changes when add/remove/change labels and annotations for cloud
        resources via opentofu.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19080
      impact: >-
        These changes prevent unnecessary or destructive plan updates that could occur when data
        sources depend on changing labels and annotations. The behavior of other cloud providers is
        not affected.

        If you encounter unexpected converge plans or cluster bootstrap issues when using
        OpenTofu-based providers (such as dvp, dynamics, zvirt, or yandex), please report them to
        Deckhouse Technical Support.

