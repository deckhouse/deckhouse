candi:
  fixes:
    - summary: Fix default AWS subnets tags for LB controller autodiscovery
      pull_request: https://github.com/deckhouse/deckhouse/pull/10138
cert-manager:
  features:
    - summary: Add recursive settings.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14669
ci:
  features:
    - summary: Creating more detailed logs for analysis and speeding up platform build
      pull_request: https://github.com/deckhouse/deckhouse/pull/14446
cloud-provider-aws:
  fixes:
    - summary: fix incorrect template id for aws e2e cluster
      pull_request: https://github.com/deckhouse/deckhouse/pull/14605
cloud-provider-vsphere:
  fixes:
    - summary: fix main network escaping for names with special symbols
      pull_request: https://github.com/deckhouse/deckhouse/pull/14328
cni-cilium:
  fixes:
    - summary: enabled vlan-bpf-bypass feature to fix extra vlan interfaces issues
      pull_request: https://github.com/deckhouse/deckhouse/pull/14606
deckhouse:
  features:
    - summary: Add the edition available and enabled extenders.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14310
    - summary: Separate queues for critical and functional modules.
      pull_request: https://github.com/deckhouse/deckhouse/pull/13906
  fixes:
    - summary: Fixed a helm issue with patching arrays in deckhouse deployment.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14599
deckhouse-controller:
  features:
    - summary: Implement metrics collector library.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14472
    - summary: Disabling a module will delete its Pending ModuleReleases
      pull_request: https://github.com/deckhouse/deckhouse/pull/14463
    - summary: Deckhouse deployment upgrades now use Patch instead of Update
      pull_request: https://github.com/deckhouse/deckhouse/pull/14311
  fixes:
    - summary: add more verbosity to snapshot error
      pull_request: https://github.com/deckhouse/deckhouse/pull/14681
    - summary: >-
        Recursive CEL validation for all OpenAPI schema types, including scalars, arrays, and maps
        (additionalProperties).
      pull_request: https://github.com/deckhouse/deckhouse/pull/14428
docs:
  features:
    - summary: Remove using code-operator modules in the Deckhouse Code documentation.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14558
  fixes:
    - summary: Fix the documentation header.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14391
ingress-nginx:
  fixes:
    - summary: Ingress validation re-enabled.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14368
istio:
  fixes:
    - summary: Added api-proxy support for short-lived ServiceAccount tokens.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14137
local-path-provisioner:
  fixes:
    - summary: fixed go-generate
      pull_request: https://github.com/deckhouse/deckhouse/pull/14596
metallb:
  fixes:
    - summary: Fixed IP pool exhaustion on LoadBalancer deletion.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14315
monitoring-applications:
  fixes:
    - summary: redis dash turn off stacking for mem graph
      pull_request: https://github.com/deckhouse/deckhouse/pull/14647
node-manager:
  fixes:
    - summary: added placeholder for required field in `MachineDeployment` template
      pull_request: https://github.com/deckhouse/deckhouse/pull/14531
terraform-manager:
  fixes:
    - summary: Added probes for `kube-rbac-proxy`
      pull_request: https://github.com/deckhouse/deckhouse/pull/14637
    - summary: Added probes for `kube-rbac-proxy`
      pull_request: https://github.com/deckhouse/deckhouse/pull/14507
testing:
  features:
    - summary: >-
        Added a validation test to ensure all Go hook ScheduleConfigs have a non-empty crontab
        value.
      pull_request: https://github.com/deckhouse/deckhouse/pull/14318

