admission-policy-engine:
  features:
    - summary: add policy to deny exec/attach to pods with heritage deckhouse label
      pull_request: https://github.com/deckhouse/deckhouse/pull/16749
  fixes:
    - summary: >-
        Preserve explicitly empty lists ([]) in SecurityPolicy/OperationPolicy Values to ensure
        Gatekeeper constraints render and policies apply
      pull_request: https://github.com/deckhouse/deckhouse/pull/17308
candi:
  features:
    - summary: Add annotation for node by creating converger user.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16734
  fixes:
    - summary: Updated the bashible step to include Linux kernel versions that address CVE-2025-37999
      pull_request: https://github.com/deckhouse/deckhouse/pull/17300
    - summary: Make modify_user in add_node_user bashible step idempotent.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17111
    - summary: fallback to dnf package manager from yum install and remove bashbooster func's
      pull_request: https://github.com/deckhouse/deckhouse/pull/17012
    - summary: Ensure etcd dir has permissions 700 on all masters.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16967
    - summary: bashible 064 step criDir fallback
      pull_request: https://github.com/deckhouse/deckhouse/pull/16934
    - summary: bashible events generateName
      pull_request: https://github.com/deckhouse/deckhouse/pull/16768
    - summary: Moved the default values for registry in initConfiguration to dhctl
      pull_request: https://github.com/deckhouse/deckhouse/pull/16103
ci:
  features:
    - summary: Add k8s 1.34 to CI.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15453
    - summary: Make e2e removal automation.
      pull_request: https://github.com/deckhouse/deckhouse/pull/13173
  fixes:
    - summary: Fix the mechanism for sending reports.
      pull_request: https://github.com/deckhouse/deckhouse/pull/13440
    - summary: Fix k8s autoupdate report, lock the creation of multiple pr.
      pull_request: https://github.com/deckhouse/deckhouse/pull/13381
cloud-provider-dvp:
  features:
    - summary: clarify CSI errors
      pull_request: https://github.com/deckhouse/deckhouse/pull/16434
cloud-provider-dynamix:
  fixes:
    - summary: fixed a queue hang caused by the module components failing to start
      pull_request: https://github.com/deckhouse/deckhouse/pull/16796
cloud-provider-huaweicloud:
  fixes:
    - summary: fixed a queue hang caused by the module components failing to start
      pull_request: https://github.com/deckhouse/deckhouse/pull/16796
cloud-provider-vcd:
  fixes:
    - summary: fixed a queue hang caused by the module components failing to start
      pull_request: https://github.com/deckhouse/deckhouse/pull/16796
cloud-provider-zvirt:
  fixes:
    - summary: fixed a queue hang caused by the module components failing to start
      pull_request: https://github.com/deckhouse/deckhouse/pull/16796
cni-cilium:
  features:
    - summary: Allow configuring the InPlaceOrRecreate VPA update mode for Cilium components.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17252
      impact: |-
        Users can explicitly select the InPlaceOrRecreate VPA mode for Cilium pods via ModuleConfig.
        Default behavior remains unchanged.
control-plane-manager:
  features:
    - summary: the ability to enable and disable some scheduler extensions and set up custom values.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16892
    - summary: >-
        Implement etcd-arbiter mode for HA capability with less resources. This will allow to
        bootstrap only etcd node without control-plane components.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16716
      impact: Will restart all d8 pods on dkp release with this changes.
  fixes:
    - summary: >-
        control-plane-manager now uses `spec.nodeName` instead of `os.Hostname()` for node
        identification
      pull_request: https://github.com/deckhouse/deckhouse/pull/16953
deckhouse:
  fixes:
    - summary: validate deckhouse-registry secret
      pull_request: https://github.com/deckhouse/deckhouse/pull/17122
    - summary: Add module name and path to loading error.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16913
    - summary: validate deckhouse-registry secret for spaces or newlines.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16101
deckhouse-controller:
  features:
    - summary: Cleanup package repository operations.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16981
    - summary: add field manager to kube client and helm
      pull_request: https://github.com/deckhouse/deckhouse/pull/16830
    - summary: add Application statistics logic
      pull_request: https://github.com/deckhouse/deckhouse/pull/16809
    - summary: Adds isolated shell executions.
      pull_request: https://github.com/deckhouse/deckhouse/pull/11192
  fixes:
    - summary: fix copy-custom-certificate hook
      pull_request: https://github.com/deckhouse/deckhouse/pull/17228
    - summary: >-
        Fix stale ModuleConfigurationError metrics not being reset when ModuleRelease is deleted or
        module is disabled
      pull_request: https://github.com/deckhouse/deckhouse/pull/16940
    - summary: Rollback nelm version
      pull_request: https://github.com/deckhouse/deckhouse/pull/16770
    - summary: Remove track-termination-mode notation
      pull_request: https://github.com/deckhouse/deckhouse/pull/16612
    - summary: less dependencies from addon-operator
      pull_request: https://github.com/deckhouse/deckhouse/pull/11561
descheduler:
  features:
    - summary: >-
        update descheduler to the 1.34 version. 

        Descheduler evicts pods with a larger restart count first it should make workload balancing
        in the cluster more stable.

        Descheduler respects DRA resources.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16846
  fixes:
    - summary: patch crypto lib version to solve CVE-2025-47914/CVE-2025-58181
      pull_request: https://github.com/deckhouse/deckhouse/pull/17226
dhctl:
  features:
    - summary: allow updating master images
      pull_request: https://github.com/deckhouse/deckhouse/pull/17295
    - summary: Check if user shell differs from bash.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16980
    - summary: Wait for converger user will be presented on all master nodes.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16734
    - summary: Add debug output from ssh lib.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16717
    - summary: Added bootstrap support with the registry module
      pull_request: https://github.com/deckhouse/deckhouse/pull/16103
  fixes:
    - summary: dhctl delete object node from cluster in converge.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17163
    - summary: Change ssh logging.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17143
    - summary: dvp provider.kubeconfigDataBase64 preflight check
      pull_request: https://github.com/deckhouse/deckhouse/pull/16945
    - summary: Fix --skip-resources flag behaviour in destroy command.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16904
    - summary: Many fixes in destroy command and restart destroy command.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16904
    - summary: Fix dhctl bootstrap-phase abort running after dhctl bootstrap-phasebase-infra.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16829
    - summary: fix kube token handling
      pull_request: https://github.com/deckhouse/deckhouse/pull/16735
    - summary: save new master IPs and remove them when they are deleted
      pull_request: https://github.com/deckhouse/deckhouse/pull/15334
docs:
  features:
    - summary: Update pull mirror documentation in the [Deckhouse code section.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17256
    - summary: dashboard about not signed modules
      pull_request: https://github.com/deckhouse/deckhouse/pull/17083
    - summary: Add getting started section for Vault integration in the Deckhouse Code documentation.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17024
    - summary: Added Approval rules and CODEOWNERS documentation for Deckhouse Code.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16951
  fixes:
    - summary: Added examples for assigning manage roles in DVP.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17257
    - summary: Added the rosetta alert to all types of macos installations on the installer page.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17167
    - summary: Fixed nginx rules for installer links.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17088
    - summary: Add the items to the list of platforms supported by the GUI installer.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16874
    - summary: Small fixes on the GUI install page.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16817
    - summary: Fix registry-modules-watcher deleting all documentation when registry returns an error
      pull_request: https://github.com/deckhouse/deckhouse/pull/16771
    - summary: Fixed typo on the GUI installer page.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16719
go_lib:
  fixes:
    - summary: less dependencies from addon-operator
      pull_request: https://github.com/deckhouse/deckhouse/pull/11561
ingress-nginx:
  fixes:
    - summary: Correct controller termination has been fixed.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17041
      impact: restart controllers
    - summary: Architecture-bashed node affinity settings are provided.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16939
    - summary: >-
        Fixed the display of IP addresses in the status of Ingress resources with the LoadBalancer
        type.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15892
istio:
  features:
    - summary: Support InPlaceOrRecreate VPA update mode for Istio components.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17255
      impact: >-
        Users can explicitly configure the InPlaceOrRecreate VPA mode for Istio workloads in
        ModuleConfig.

        Default VPA mode for Istio has been updated to InPlaceOrRecreate.
loki:
  features:
    - summary: Change the default VPA update mode for Loki from Auto to InPlaceOrRecreate.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17254
      impact: |-
        The default VPA mode for Loki components is changed from Auto to InPlaceOrRecreate.
        Loki pods will now prefer in-place resource updates when supported by the cluster,
        falling back to pod recreation only when required.
metallb:
  fixes:
    - summary: Fixed endpoint health check logic to correctly handle duplicate IPs during VM migration.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15961
monitoring-kubernetes:
  fixes:
    - summary: Handle unsupported ValidatingAdmissionPolicy API versions on Kubernetes 1.34
      pull_request: https://github.com/deckhouse/deckhouse/pull/17007
node-manager:
  features:
    - summary: Add configurable swap mechanism for Kubernetes pods using new memorySwap NodeGroup field
      pull_request: https://github.com/deckhouse/deckhouse/pull/16747
      impact: Enabling swap for a NodeGroup will cause a kubelet restart on all nodes of that group
  fixes:
    - summary: bashible-apiserver retry on start failed
      pull_request: https://github.com/deckhouse/deckhouse/pull/17249
    - summary: fix capi_crds_cabundle_injection
      pull_request: https://github.com/deckhouse/deckhouse/pull/17193
    - summary: annotate draining node when deleting
      pull_request: https://github.com/deckhouse/deckhouse/pull/17189
    - summary: Removing shortNames from crd MachineSet to prevent collision with ModuleSource
      pull_request: https://github.com/deckhouse/deckhouse/pull/17170
    - summary: optional prom-rule enable
      pull_request: https://github.com/deckhouse/deckhouse/pull/17112
    - summary: use node ip to get ApiServer for CAPI on bootstrap.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17076
    - summary: Add middleware to bashible-apiserver to log bashible resource requests and responses.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17019
    - summary: Fix conditions calc for static NodeGroup.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16811
    - summary: CAPS logs noise reduction
      pull_request: https://github.com/deckhouse/deckhouse/pull/16805
    - summary: Updated go dependencies in the bashible-api-server
      pull_request: https://github.com/deckhouse/deckhouse/pull/16103
prometheus:
  features:
    - summary: improve redirects from Grafana to the Deckhouse UI when Grafana is disabled
      pull_request: https://github.com/deckhouse/deckhouse/pull/16988
      impact: no impact
  fixes:
    - summary: Fix rebuild of trickster
      pull_request: https://github.com/deckhouse/deckhouse/pull/17115
    - summary: Fix promql query for the queue variable in the dashboard for rabbitmq
      pull_request: https://github.com/deckhouse/deckhouse/pull/12388
registry:
  fixes:
    - summary: Added bootstrap support
      pull_request: https://github.com/deckhouse/deckhouse/pull/16103
tools:
  features:
    - summary: Change dmt version to 0.1.64
      pull_request: https://github.com/deckhouse/deckhouse/pull/17312
    - summary: Add d8_telemetry metric to track modules with critical flag
      pull_request: https://github.com/deckhouse/deckhouse/pull/16774
    - summary: add pagination to registry client
      pull_request: https://github.com/deckhouse/deckhouse/pull/16627
  fixes:
    - summary: update dmt version to 0.1.55
      pull_request: https://github.com/deckhouse/deckhouse/pull/16715
user-authn:
  features:
    - summary: Added Prometheus alert for Dex AuthRequest ResourceQuota monitoring.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17263
    - summary: Add refreshTokenAbsoluteLifetime parameter to limit maximum lifetime of refresh tokens
      pull_request: https://github.com/deckhouse/deckhouse/pull/17114
    - summary: Add `enableBasicAuth` support for LDAP provider.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17022
      impact: LDAP provider can now enable Basic Auth for the published Kubernetes API endpoint.
  fixes:
    - summary: Hide internal error details from users in Dex to prevent information disclosure
      pull_request: https://github.com/deckhouse/deckhouse/pull/17177
user-authz:
  features:
    - summary: >-
        Allow project Admins access to Roles, RoleBindings and AuthorizationRules on project
        namespaces
      pull_request: https://github.com/deckhouse/deckhouse/pull/17090
    - summary: Add BulkSubjectAccessReview API for checking multiple permissions in a single request
      pull_request: https://github.com/deckhouse/deckhouse/pull/17080
vertical-pod-autoscaler:
  features:
    - summary: update vpa module to 1.5.1
      pull_request: https://github.com/deckhouse/deckhouse/pull/16814
      impact: >-
        mode auto is deprecated and will be removed in a future API version. Use explicit modes like
        "Recreate", "Initial", or "InPlaceOrRecreate" instead.

